<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>핵심정리 160선 - 제빵/제과기능사</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#4A6CF7;--bg:#F8FAFC;--card:#fff;--text:#1E293B;--sub:#64748B;--border:#E2E8F0;--accent:#8B5CF6}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent}
.container{max-width:520px;margin:0 auto;padding:16px}

/* Header */
.header{display:flex;align-items:center;gap:12px;padding:12px 0 8px}
.back-link{text-decoration:none;font-size:22px;color:var(--text);padding:4px}
.header h1{font-size:18px;font-weight:700;flex:1}
.header .count{font-size:13px;color:var(--sub);font-weight:500}

/* Search */
.search-wrap{position:sticky;top:0;z-index:100;background:var(--bg);padding:8px 0 12px}
.search-box{display:flex;align-items:center;background:var(--card);border:2px solid var(--border);border-radius:14px;padding:0 14px;transition:border-color .2s}
.search-box:focus-within{border-color:var(--primary)}
.search-box svg{flex-shrink:0;color:var(--sub)}
.search-box input{flex:1;border:none;outline:none;padding:12px 10px;font-size:15px;background:transparent;color:var(--text)}
.search-box input::placeholder{color:var(--sub)}
.search-clear{background:none;border:none;font-size:18px;color:var(--sub);cursor:pointer;padding:4px 0 4px 8px;display:none}
.search-clear.show{display:block}

/* Chapter Tabs */
.ch-tabs{display:flex;gap:6px;overflow-x:auto;padding:0 0 12px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.ch-tabs::-webkit-scrollbar{display:none}
.ch-tab{flex-shrink:0;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;border:2px solid var(--border);background:var(--card);color:var(--sub)}
.ch-tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.ch-tab .ch-count{font-weight:400;opacity:.8;margin-left:2px}

/* Item Cards */
.item-card{background:var(--card);border-radius:14px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);overflow:hidden;border:1px solid var(--border)}
.item-header{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;-webkit-user-select:none;user-select:none}
.item-num{background:var(--primary);color:#fff;min-width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.item-num.ch1{background:#EF4444}
.item-num.ch2{background:#F59E0B}
.item-num.ch3{background:#10B981}
.item-num.ch4{background:#8B5CF6}
.item-num.ch5{background:#3B82F6}
.item-title{flex:1;font-size:15px;font-weight:600;line-height:1.4}
.item-chevron{color:var(--sub);transition:transform .2s;flex-shrink:0;font-size:18px}
.item-card.open .item-chevron{transform:rotate(180deg)}
.item-ch-badge{font-size:11px;color:var(--sub);padding:2px 8px;border-radius:6px;background:#F1F5F9;white-space:nowrap;flex-shrink:0}
.item-body{padding:0 16px 16px;display:none;font-size:14px;line-height:1.8;color:#374151}
.item-card.open .item-body{display:block}

/* Content styling */
.item-body ul{padding-left:20px;margin:6px 0}
.item-body li{margin-bottom:4px}
.item-body table{width:100%;border-collapse:collapse;margin:8px 0;font-size:13px}
.item-body th,.item-body td{border:1px solid var(--border);padding:8px 10px;text-align:left}
.item-body th{background:#F1F5F9;font-weight:600;white-space:nowrap}
.item-body strong{color:var(--primary);font-weight:600}

/* Search highlight */
mark{background:#FEF08A;color:inherit;border-radius:2px;padding:0 1px}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:var(--sub)}
.empty svg{margin-bottom:12px}
.empty p{font-size:15px}

/* Results count */
.results-info{font-size:13px;color:var(--sub);padding:0 0 8px;display:none}
.results-info.show{display:block}

/* Scroll to top */
.scroll-top{position:fixed;bottom:20px;right:20px;width:44px;height:44px;border-radius:50%;background:var(--primary);color:#fff;border:none;cursor:pointer;box-shadow:0 2px 8px rgba(74,108,247,.4);display:none;align-items:center;justify-content:center;font-size:20px;z-index:50;transition:opacity .2s}
.scroll-top.show{display:flex}

/* Expand/collapse all */
.toolbar{display:flex;justify-content:flex-end;gap:8px;padding:0 0 8px}
.tool-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--sub);cursor:pointer;font-weight:500}
.tool-btn:active{background:#F1F5F9}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <a href="index.html" class="back-link">←</a>
    <h1>핵심정리 160선</h1>
    <span class="count" id="totalCount">160항목</span>
  </div>

  <div class="search-wrap">
    <div class="search-box">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="키워드 검색 (예: 글루텐, HACCP, 이스트)" autocomplete="off">
      <button class="search-clear" id="clearBtn" onclick="clearSearch()">✕</button>
    </div>
  </div>

  <div class="ch-tabs" id="chTabs"></div>

  <div class="results-info" id="resultsInfo"></div>

  <div class="toolbar">
    <button class="tool-btn" onclick="toggleAll(true)">모두 펼치기</button>
    <button class="tool-btn" onclick="toggleAll(false)">모두 접기</button>
  </div>

  <div id="itemList"></div>

  <div class="empty" id="emptyState" style="display:none">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".4"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <p>검색 결과가 없습니다</p>
  </div>
</div>

<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
const CHAPTERS = [
  {id:0, name:"전체"},
  {id:1, name:"1장 식품위생개론", color:"ch1"},
  {id:2, name:"2장 재료과학", color:"ch2"},
  {id:3, name:"3장 생산관리", color:"ch3"},
  {id:4, name:"4장 제과이론", color:"ch4"},
  {id:5, name:"5장 제빵이론", color:"ch5"}
];

let DATA = [];
let currentCh = 0;
let searchTerm = '';
let openItems = new Set();

// Load data (inline)
const REF_DATA = [{"id":1,"title":"우리나라의 식품위생법","chapter":1,"chapterName":"식품위생개론","content":"<ul><li>'식품'이란 모든 음식물(의약으로 섭취하는 것은 제외한다)을 말한다.</li><li>'식품위생'이란 식품, 식품첨가물, 기구 또는 용기·포장을 대상으로 하는 음식에 관한 위생을 말한다.</li></ul>"},{"id":2,"title":"식품위생의 목적","chapter":1,"chapterName":"식품위생개론","content":"<ul><li>식품으로 인하여 생기는 위생상의 위해(危害)를 방지</li><li>식품영양의 질적 향상을 도모</li><li>식품에 관한 올바른 정보를 제공</li><li>국민 보건의 증진에 이바지함을 목적으로 함</li></ul>"},{"id":3,"title":"식품에 흔히 존재하는 질병","chapter":1,"chapterName":"식품위생개론","content":"<ul><li>클라스트리디움(Clostridium), 캠피로박터, 세균성 이질, 성홍열, 장티푸스, 파라티푸스</li><li>콜레라(위장관계 질환)</li><li>결핵(폐와 위장관 모두)</li><li>브루셀라병(사람에서는 파상열): 살균되지 않은 유제품이나 오염된 육류를 통해 감염</li><li>탄저병(피부와 폐)</li><li>야토병(토끼열): 들쥐, 토끼 등에 접촉하거나 덜 익힌 야생 고기 섭취로 전파</li></ul>"},{"id":4,"title":"교차오염","chapter":1,"chapterName":"식품위생개론","content":"<ul><li>미생물에 오염된 식재료, 기구, 용수 등이 오염되지 않은 부분에 접촉하여 오염이 되는 것을 말한다.</li></ul>"},{"id":5,"title":"미생물 생육에 필요한 조건","chapter":1,"chapterName":"식품위생개론","content":"<ul><li>영양소, 수분, 온도, 산소, 수소이온농도(pH) 등</li></ul>"},{"id":6,"title":"위생지표 세균","chapter":1,"chapterName":"식품위생개론","content":"<ul><li>분변오염의 지표가 되는 세균</li><li>대장균, 분변대장균, 장구균 등이 있다.</li></ul>"},{"id":7,"title":"변질","chapter":1,"chapterName":"식품위생개론","content":"<table><tr><th>구분</th><th>내용</th></tr><tr><td>부패</td><td>단백질 식품이 미생물에 의해 변질된 것</td></tr><tr><td>변패</td><td>지방이나 탄수화물 식품이 미생물에 의해 변질된 것</td></tr><tr><td>발효</td><td>당질 식품이 미생물에 의해 분해되어 알코올과 유기산 등 유용한 물질을 만드는 것</td></tr><tr><td>산패</td><td>지방 식품이 산화되어 불쾌한 냄새와 맛을 내는 것</td></tr></table>"},{"id":8,"title":"유지산패에 영향을 미치는 인자","chapter":1,"chapterName":"식품위생개론","content":"<ul><li>산화를 촉진하는 요인: 수분 및 지방산화효소를 촉진시키는 요인</li><li>금속이온(구리, 철 등), 광선 및 자외선은 산패를 촉진시킨다.</li><li>불포화도가 높을수록 산패가 촉진된다.</li><li>▶ 유지산패도 측정: 카르보닐가, 산가, 과산화물가, 아세틸가 등</li></ul>"},{"id":9,"title":"세균성 감염형 식중독","chapter":1,"chapterName":"식품위생개론","content":"<table><tr><th>원인균</th><th>특징</th></tr><tr><td>살모넬라균</td><td><ul><li>원인식품: 어류, 육류, 달걀, 우유 및 유제품</li><li>쥐나 곤충에 의한 식품의 오염이 발생</li></ul></td></tr><tr><td>병원성 대장균</td><td><ul><li>대장균 중 병원성이 있는 것으로 식중독의 원인이 됨</li><li>혈변을 동반하는 출혈성 장염이 생길 수 있음</li></ul></td></tr></table>"},{"id":10,"title":"세균성 독소형 식중독","chapter":1,"chapterName":"식품위생개론","content":"<table><tr><th>원인균</th><th>특징</th></tr><tr><td>도시락구균<br>(황색포도상구균)</td><td><ul><li>장독소(엔테로톡신) 생성</li><li>독소는 열에 강함(120℃로 加熱해도 파괴되지 않아 위험)</li><li>잠복기가 평균 3시간으로 가장 짧다.</li><li>신맛(구역질)이 있으며 식중독 위험이 있다.</li><li>신독소능이 있는 독소를 생성</li><li>원인식품: 곡류, 도시락, 크림 등</li></ul></td></tr><tr><td>클로스트리디움<br>보툴리눔균</td><td><ul><li>신경독소(뉴로톡신) 생성</li><li>토양, 동물의 장관에 분포하며 아포를 형성하기 때문에 가열처리에도 생존하여 식품 오염의 원인</li><li>클로스트리디움계 식품에 신경독소를 분비하여 식중독을 유발</li></ul></td></tr><tr><td>클로스트리디움<br>퍼프린겐스</td><td><ul><li>단백질에 생성</li><li>일반적으로 장독소를(엔테로톡신)을 장속의 점소 세균에 생성</li></ul></td></tr><tr><td>바실루스<br>세레우스균</td><td><ul><li>설사형과 구토형이 있다.</li><li>원인식품: 볶음밥 등</li></ul></td></tr></table>"},{"id":11,"title":"자연독 식중독","chapter":1,"chapterName":"식품위생개론","content":"<table><tr><th>구분</th><th>독소</th><th>특징</th></tr><tr><td rowspan='4'>식물성</td><td>감자</td><td>솔라닌(Solanine): 녹색(싹이 난 부분), 독소 함량이 많음(감자싹 주위)</td></tr><tr><td>독미나리</td><td>시쿠톡신(Cicutoxin)</td></tr><tr><td>독버섯</td><td>무스카린(Muscarine), 아마니타독소 등</td></tr><tr><td>면실유</td><td>고시폴(Gossypol)</td></tr><tr><td rowspan='2'>동물성</td><td>복어</td><td>테트로도톡신(Tetrodotoxin): 난소, 간장, 피부 등에 함유, 치사율 높음</td></tr><tr><td>독조개</td><td>베네루핀(Venerupin): 굴, 바지락, 모시조개에 함유</td></tr><tr><td rowspan='2'>곰팡이</td><td>황변미독</td><td>시트리닌(Citrinin): 신장독</td></tr><tr><td>맥각독</td><td>에르고타민(Ergotamine): 자궁수축, 말초혈관수축</td></tr><tr><td>독성분</td><td>감자</td><td>솔라닌</td></tr><tr><td></td><td>독미나리</td><td>시쿠톡신</td></tr></table>"},{"id":12,"title":"곰팡이독(Mycotoxin)","chapter":1,"chapterName":"식품위생개론","content":"<table><tr><th>종류</th><th>독소</th><th>원인식품</th></tr><tr><td>아플라톡신</td><td>아플라톡신(진균독)</td><td>쌀, 보리, 옥수수</td></tr><tr><td>황변미독</td><td>시트리닌(신장독)</td><td>쌀</td></tr><tr><td>맥각독</td><td>에르고타민</td><td>호밀, 보리</td></tr></table>"},{"id":13,"title":"곰팡이독에 의한 식중독","chapter":1,"chapterName":"식품위생개론","content":"<table><tr><th>종류</th><th>특징</th></tr><tr><td>아플라톡신</td><td>도토리, 면화, 농작 옥수수에 어류, 동물, 보리, 밀 등으로 낮은 함량도 유해</td></tr><tr><td>수분(Aw)</td><td>자라기 좋은 식품(Aw 0.65~0.80)에서 곰팡이 생장</td></tr><tr><td>카드뮴(Cd)</td><td>주석 식기, 기구, 용기에 도금이나 합금의 카드뮴<br>일본의 이타이이타이병의 원인</td></tr><tr><td>주석(Sn)</td><td>주석 도금된 철통조림에서 주석이 용출되어 중독<br>산도 높은 식품에서 용출이 더 잘됨</td></tr></table><ul><li>▶ 마라스무스: 충분한 식이지방, 선천성 및 후천성 신장기능장애와 간질의 신경적 증상과 관련</li><li>▶ 아마니타이독(아마독): 독버섯 중 독의 이상을 초래하는 알광대버섯 중독(이야기 등)</li></ul>"},{"id":14,"title":"유해 식품첨가물","chapter":1,"chapterName":"식품위생개론","content":"<table><tr><th>물질</th><th>내용</th></tr><tr><td>감미료</td><td>아스파탐(사이클라메이트), 에틸렌글리콜, 메다니트로아닐린, 파라닌, 페닐라틴</td></tr><tr><td>착색료</td><td>아우라민(Auramine), 로다민(Rhodamine B, 소알코올), 삼용</td></tr><tr><td>방부제</td><td>아몰피린(Morphilin), 로다민(Rhodamine B), 소알코올 등</td></tr><tr><td>표백제</td><td>살충산아황산(단 비소화합물), 공업용 방부제 등</td></tr><tr><td>산화방지제</td><td>산구산(세균위생제, 진균항균제, 에센셜오일의 성분) 등</td></tr></table>"},{"id":15,"title":"기타 식중독","chapter":1,"chapterName":"식품위생개론","content":"<ul><li><strong>알레르기성 식중독</strong>: 어육에 다량 함유된 히스티딘이 모르가나균 등 세균에 의해 부패되면 알레르기성 물질인 히스타민이 생성</li><li><strong>노로바이러스</strong>:<ul><li>항체에 지속되고 있으며 노로바이러스에 대한 면역이 지속적이지 않다.</li><li>조개류를 생식하거나 오염된 물 섭취</li></ul></li><li><strong>에탄글</strong>:<ul><li>사람감 영영을 없애 공산력을 없을 가능성 있으며 특히 어린이에게는 간, 신장, 및 폐에 치명적</li><li>수은화합물을 사용하는 산업에서 근무하는 경우 특히 위험</li></ul></li><li><strong>PCB</strong>(폴리염화바이페닐): 환경에서 만들어진 미량의 사람이 섭취하면 건강에 악영향을 끼친다</li></ul>"},{"id":16,"title":"발열 발생의 3요소","chapter":1,"chapterName":"식품위생개론","content":"<ul><li>감염병원체(병원체), 감염경로(숙주), 감수성 숙주</li></ul>"},{"id":17,"title":"감염병의 발생 과정","chapter":1,"chapterName":"식품위생개론","content":"<ul><li>① 감염병원체(병원체) → ② 병원소(숙주의 병원체가 발생) → ③ 병원소에서의 탈출 → ④ 전파 → ⑤ 새로운 숙주에 침입 → ⑥ 숙주의 감수성</li></ul>"},{"id":18,"title":"병원체에 따른 감염병의 분류","chapter":1,"chapterName":"식품위생개론","content":"<table><tr><th>구분</th><th>병원체</th></tr><tr><td>세균</td><td>결핵, 콜레라, 장티푸스, 파라티푸스, 세균성이질, 성홍열, 디프테리아 등</td></tr><tr><td>바이러스</td><td>인플루엔자, 천연두, 유행성 간염, 일본뇌염, 광견병, 소아마비 등</td></tr><tr><td>리케차</td><td>발진티푸스, 발진열 등</td></tr><tr><td>원충류</td><td>아메바이질, 말라리아 등</td></tr></table>"},{"id":19,"title":"일반 감염에 의한 감염","chapter":1,"chapterName":"식품위생개론","content":"<ul><li>호흡기계: 결핵, 백일해, 감기, 폐렴, 수두, 전단구, 홍역, 파라플루엔자, 플루이어, 아데노바이러스 등</li><li>소화기계: 장티푸스, 파라티푸스, 이질, 콜레라, 폴리오, 노로바이러스, 장바이러스 등</li></ul>"},{"id":20,"title":"호흡구 감염병","chapter":1,"chapterName":"식품위생개론","content":"<table><tr><th>병원체</th><th>특징</th></tr><tr><td>장티푸스</td><td><ul><li>장티푸스 잠복기 7~14일, 사망률 10~20%</li><li>60℃에서 5분이면 사멸한다.</li></ul></td></tr><tr><td>파라티푸스</td><td>장티푸스와 비슷</td></tr><tr><td>콜레라</td><td><ul><li>쌀뜨물 같은 설사 → 구토</li><li>탈수가 심해져 사망에 이를 수 있다.</li></ul></td></tr><tr><td>세균성이질</td><td><ul><li>소량(1~2개)의 균으로도 감염 가능하다.</li><li>애의 예방 치료로 적절한 수분보충이 필요하다.</li></ul></td></tr><tr><td>바이러스성<br>간염</td><td><ul><li>소아의 간염의 원인이 가장 많다.</li><li>수 질환도 예방접종이 가능 유행성 감염증</li></ul></td></tr></table>"},{"id":21,"title":"균 감염병과 세균성 식중독의 비교","chapter":1,"chapterName":"식품위생개론","content":"<table><tr><th>구분</th><th>균구 감염병</th><th>세균성 식중독</th></tr><tr><td>2차 감염</td><td>미량의 균으로도 가능</td><td>거의 없음</td></tr><tr><td>잠복기간</td><td>비교적 긺</td><td>짧음</td></tr><tr><td>잠복기간</td><td>비교적 긺</td><td>비교적 짧음</td></tr><tr><td>발생 형태</td><td>관련성 높음</td><td>관련적 적음</td></tr><tr><td>독성</td><td>강함</td><td>강함</td></tr><tr><td>면역형성</td><td>비교적 잘 됨</td><td>면역이 거의 기대 않음</td></tr></table>"},{"id":22,"title":"인수공통전염병","chapter":1,"chapterName":"식품위생개론","content":"<table><tr><th>병원체</th><th>특징</th></tr><tr><td>결핵</td><td><ul><li>결핵균에 보유하고 있는 소나 우유나 유제품에 의한 감염, 이한 감염</li><li>제품을 통하여 감염</li><li>BCG 접종에 의해 예방 가능</li><li>항균요법을 쓸 때는 반드시 병원체에 감염된 동물과 접촉 시에 약물치료</li></ul></td></tr><tr><td>탄저</td><td><ul><li>오염된 털, 가죽이나 혈액 및 배설물에 의한 접촉을 통해<br>균이 파상형을 이루어 전파</li></ul></td></tr><tr><td>브루</td><td><ul><li>동물에서 유행하는 감염병이다, 우유, 유제품, 유산 및 생육을 통해 감염</li></ul></td></tr><tr><td>브루셀</td><td></td></tr><tr><td>기타</td><td>살모넬라, 리스테리아증, 이야바, 야구, 돈, 콜레라, 리슈만증 등</td></tr><tr><td>바이러스</td><td>광견병, 일본뇌염, 뎅기열, 황열 등</td></tr></table>"},{"id":23,"title":"식품과 기생충","chapter":1,"chapterName":"식품위생개론","content":"<table><tr><th>원인식품</th><th>기생충(감염경로)</th></tr><tr><td>채소류</td><td>회충, 요충, 편충, 구충(채소)</td></tr><tr><td>수육</td><td>무구조충(소), 유구조충(돼지), 선모충(돼지, 포유류)</td></tr><tr><td>어류</td><td>간흡충(민물고기-왜우렁이, 어류 등 담수어), 허파흡충(가재, 민물게)</td></tr></table><ul><li>※ 요충: 항문주위 산란, 성충은 맹장 기생</li><li>※ 구충: 경구 감염 외에 경피(피부)로도 감염 경로가 있음</li></ul>"},{"id":24,"title":"위생 동물에 따른 매개 질병","chapter":1,"chapterName":"식품위생개론","content":"<table><tr><th>위생 동물</th><th>매개 질병</th></tr><tr><td>모기</td><td>말라리아, 일본뇌염, 황열, 사상충증</td></tr><tr><td>쥐</td><td>서교열(쥐교열), 페스트, 신증후군출혈열, 랩토스피라증</td></tr><tr><td>파리</td><td>장티푸스, 파라티푸스, 세균성이질, 기생충 감염<br>소아마비 바이러스 매개</td></tr><tr><td>바퀴</td><td>발진티푸스, 페스트</td></tr><tr><td>벼룩</td><td>발진티푸스, 페스트</td></tr><tr><td>진드기</td><td>유행성출혈열, 쯔쯔가무시병, 록키산홍반열</td></tr></table>"},{"id":25,"title":"식품첨가물의 정의","chapter":1,"chapterName":"식품위생개론","content":"<ul><li>① 식품첨가물은 식품 고유의 성분이 아니라면서 의도적으로 식품에 첨가하는 물질로서, 식품첨가물 등의 규격과 기준에 맞는 물질을 사용해야 한다.</li><li>② 식품첨가물의 규격과 사용기준은 식품의약품안전처(식약처)가 정한다.</li></ul>"},{"id":26,"title":"식품첨가물의 구비조건","chapter":1,"chapterName":"식품위생개론","content":"<ul><li>① 인체에 유해하지 않아야 한다(안전성이 입증되어야 함)</li><li>② 미량의 사용만으로 충분한 효과를 발휘해야 함</li><li>③ 독소가 없고 식품의 다른 식품 질을 손상시키지 않을 것</li><li>④ 이화학적으로 안정적이고 검출이 가능할 것</li><li>⑤ 사용이 간편하고 값이 싸고 편리해야 함</li></ul>"},{"id":27,"title":"보존료","chapter":1,"chapterName":"식품위생개론","content":"<table><tr><th>보존료</th><th>적용 식품</th></tr><tr><td>데히드로아세트산나트륨</td><td>치즈, 버터, 마가린 등</td></tr><tr><td>안식향산나트륨</td><td>간장, 청량음료, 발효유, 알코올 등</td></tr><tr><td>프로피온산</td><td>빵류 및 케이크류 등</td></tr></table>"},{"id":28,"title":"주요 식품첨가물","chapter":1,"chapterName":"식품위생개론","content":"<table><tr><th>식품첨가물</th><th>특징</th></tr><tr><td>강화제(영양강화제)</td><td>식품의 영양소 수준과 식이보충제를 사용하는 첨가물; 비타민류, 아미노산류, 무기염류, 미량원소 등</td></tr><tr><td>산화방지제(항산화제)</td><td>식품이 산화에 의해 변색, 변취 방지; 비타민E(토코페롤), 비타민C(아스코르빈산) 등</td></tr><tr><td>제조(기능성 물질)</td><td>제조·가공에 사용하며 식품에는 남지 않는 것<br>예) 효소제: 단백질 분해효소(파파인, 펩신, 트립신), 등</td></tr><tr><td>유화제(계면활성제)</td><td>물과 기름을 혼합시켜 안정한 유화액을 만드는 것<br>글리세린 지방산 에스테르(계면활성제)</td></tr><tr><td>소포제</td><td>거품생성방지나나 소포시키기 위해 사용하는 첨가물<br>규소수지 등</td></tr><tr><td>팽창제</td><td>빵이나 과자에 이산화탄소를 생성시켜 부풀게 함<br>중조, 이스트 등</td></tr></table>"},{"id":29,"title":"소독의 종류","chapter":1,"chapterName":"식품위생개론","content":"<ul><li><strong>멸균</strong>: 모든 미생물의 영양세포 및 포자를 사멸시켜 무균상태로 만드는 것</li><li><strong>살균</strong>: 병원성 미생물을 사멸 또는 불활성화 시키는 것</li><li><strong>소독</strong>: 병원성이있는 미생물을 파괴 또는 불활성화 시키는 것</li></ul><ul><li>▶ 살균 작용력: 멸균 &gt; 살균 &gt; 소독 &gt; 방부</li></ul>"},{"id":30,"title":"물리적 소독법","chapter":1,"chapterName":"식품위생개론","content":"<ul><li><strong>건열멸균법</strong>: 건열멸균기, 화염멸균, 소각법, 방사선조사</li><li><strong>습열멸균법</strong>: 자비소독법(끓임), 고압증기멸균(오토클레이브), 저온살균법(파스퇴르법), 초고온법</li></ul><ul><li>▶ 고압증기멸균: 아포(내생포자)까지 사멸시키는 가장 효과 좋은 방법</li></ul>"},{"id":31,"title":"우유 살균","chapter":1,"chapterName":"식품위생개론","content":"<ul><li>① 저온장시간살균법(LTLT법): 63~65℃에서 30분간 살균</li><li>② 고온단시간살균법(HTST법): 70~75℃에서 15~30초 살균</li><li>③ 초고온순간살균법(UHT법): 150~140℃에서 0.5~3.5초 살균</li></ul>"},{"id":32,"title":"화학적 소독","chapter":1,"chapterName":"식품위생개론","content":"<table><tr><th>구분</th><th>특징</th></tr><tr><td>세균산<br>소독력의 지표</td><td><ul><li>소독력 방향이 방부적인 이에 비해, 페놀계 등이 더 강하다(석탄산 계수)</li><li>대부분 사용하며 사용 결과가 높음</li></ul></td></tr><tr><td>역성비누<br>(계면활성제)</td><td><ul><li>양이온 계면활성제로 피부에 사용 가능</li><li>독성이 낮고, 냄새가 없으며, 유기물(단백질)이 있으면 살균력이 감소함</li></ul></td></tr><tr><td>염소<br>(차아염소산나트륨)</td><td><ul><li>비용이 저렴하다.</li><li>살균력 강하지만 금속 부식성 있음</li><li>불안정하여 빠른 속도로 분해됨</li></ul></td></tr><tr><td>자외선조사<br>소독(비화학적)</td><td><ul><li>100ppm이상의 농도에 적용 후 pH 6~9에서 가장 효과적</li></ul></td></tr></table>"},{"id":33,"title":"식품의약품안전처(식약처)의 주요 업무","chapter":1,"chapterName":"식품위생개론","content":"<ul><li>① 식품·식품첨가물의 생산(제조)능력을 및 판매에 대한 기준 및 규격 안전관리</li><li>② 단란 음식점의 영업허가 (이것은 지방자치단체의 업무)</li><li>③ 단독 영업 허가 목록을 보관 하는 식품의 조리 시 사용하는 기구·용기의 기준 및 규격을 설정</li><li>④ 식품에 사용하는 원료의 기준과 규격을 설정</li></ul>"},{"id":34,"title":"HACCP 12절차","chapter":1,"chapterName":"식품위생개론","content":"<table><tr><th colspan='2'>HACCP 구성</th></tr><tr><td colspan='2'>제품 설명서 작성<br>사용 용도 확인<br>공정 흐름도 작성<br>공정 흐름도 현장 확인</td></tr><tr><th colspan='2'>HACCP 12절차</th></tr><tr><td>준비단계<br>(5절차)</td><td>오른 절차에 요구조건<br>중요관리점(CCP) 결정<br>CCP에서의 한계기준 설정<br>CCP에서의 모니터링 체계 확립<br>개선 조치 및 방법 수립<br>검증 절차 및 방법 수립<br>문서화와 기록유지방법 설정</td></tr><tr><td>수행단계<br>(HACCP<br>7절차)</td><td>오른 절차에 요구조건<br>중요관리점(CCP) 결정<br>CCP에서의 한계기준 설정<br>CCP에서의 모니터링 체계 확립<br>개선 조치 및 방법 수립<br>검증 절차 및 방법 수립<br>문서화와 기록유지방법 설정</td></tr></table>"},{"id":35,"title":"영양소의 역할에 따른 분류","chapter":2,"chapterName":"재료과학","content":"<ul><li>① 열량영양소: 몸의 조직을 구성(단백질, 지방, 당질)</li><li>② 구성영양소: 몸의 조직을 구성(단백질, 무기질, 수분)</li><li>③ 조절영양소: 신체 기능을 조절(무기질을 조절하거나 비타민), 수분</li></ul>"},{"id":36,"title":"단당류(단류)","chapter":2,"chapterName":"재료과학","content":"<table><tr><th>구분</th><th>특징</th></tr><tr><td>포도당<br>(Glucose)</td><td><ul><li>단당류의 기본이 되는 산화물, 몸의 기본 에너지원</li><li>에너지원(포도당)</li><li>포도당은 해당되지 않으므로 섭취 아니면 약산성을 유지한다.</li></ul></td></tr><tr><td>과당<br>(Fructose)</td><td><ul><li>포도당보다 가장 달다.</li><li>포도당과 결합하여 자당(수크로스) 구성</li></ul></td></tr><tr><td>갈락토스<br>(Galactose)</td><td><ul><li>포도당과 결합하여 유당(락토스)을 구성하는 매우 중요한 원소</li></ul></td></tr></table>"},{"id":37,"title":"단수화물(이당류)","chapter":2,"chapterName":"재료과학","content":"<table><tr><th>구분</th><th>특징</th></tr><tr><td>설탕<br>(Sucrose)</td><td><ul><li>포도당 + 과당</li><li>환원성이 없는 비환원당</li><li>산, 효소에 의해 가수분해 → 전화당(Invert sugar)</li><li>포도당과 과당이 함께 당도가 가장 높음</li></ul></td></tr><tr><td>맥아당<br>(Maltose)</td><td><ul><li>포도당 + 포도당(2분자)</li><li>엿당이라고도 불리며 포도당으로만 구성</li></ul></td></tr><tr><td>유당<br>(Lactose)</td><td><ul><li>포도당 + 갈락토스</li><li>유당불내성이 있는 사람은 섭취가 어렵고 일부 밀집동물과 인류에게 중요하다.</li><li>유당: 포유류의 젖에서 함유된 당류로 소화하는 분유에도 함유</li></ul></td></tr></table>"},{"id":38,"title":"감미도의 비교","chapter":2,"chapterName":"재료과학","content":"<ul><li>과당(175) &gt; 설탕(100) &gt; 포도당(70) &gt; 맥아당(35) &gt; 유당(16) 순으로 단 맛이 강하다.</li></ul>"},{"id":39,"title":"탄수화물(소화가 안 되는 것)","chapter":2,"chapterName":"재료과학","content":"<ul><li><strong>올리고당류</strong>: 3~10개의 단당류가 이루어진 소당류<ul><li>프럭토올리고당(FOS), 갈락토올리고당, 키토올리고당 등</li><li>라피노스(Raffinose), 스타키오스(Stachyose), 어 에베로당(프럭토올리고당) 등</li><li>사람의 소화효소로 소화가 안 되기 때문에 이용 가치가 있음</li></ul></li><li><strong>다당류</strong>: 전분, 글리코겐, 셀룰로스(이눌린, 셀룰로스(섬유소)(식이섬유)</li></ul>"},{"id":40,"title":"지방(지질)의 기능","chapter":2,"chapterName":"재료과학","content":"<ul><li>① 에너지 급여: 당질이나 지방이나 포함된 화합물을 태우는 열량을 방출하는 원소</li><li>② 지용성 비타민의 보유 및 흡수: 지용성 비타민(A, D, E, K) 함유 및 흡수를 도움</li><li>③ 체온 조절: 지방은 체온의 절연체 역할 및 흡수 보전</li><li>④ 세포막 구성: 세포막의 구성 성분</li><li>⑤ 새로운 구성 물질 및 흡수 성분이어 있어</li><li>⑥ 맛의 촉진에 향미 성분이어 있어</li></ul>"},{"id":41,"title":"지방의 분류","chapter":2,"chapterName":"재료과학","content":"<table><tr><th>구분</th><th>특징</th></tr><tr><td>단순 지질</td><td><ul><li>중성지방(트라이글리세라이드): 글리세롤 + 3분자 지방산</li><li>납(Wax): 지방산 + 고급 알코올</li></ul></td></tr><tr><td>복합 지질</td><td><ul><li>단순 지질 + 다른 종류의 물질<br>- 인지질(레시틴, 세팔린 류)<br>- 당지질<br>- 지단백질(콜레스테롤 + 단백질 + 인지질)</li></ul></td></tr><tr><td>유도 지질</td><td><ul><li>콜레스테롤<br>- 동물의 세포막 내에 존재하여 세포막의 구성 성분이 됨</li><li>▶ 크로마토그라피는 이 지방산의 이중 결합 위치를 식별하는 데 사용</li></ul></td></tr></table>"},{"id":42,"title":"포화지방산/불포화지방산","chapter":2,"chapterName":"재료과학","content":"<table><tr><th>구분</th><th>특징</th></tr><tr><td>포화<br>지방산</td><td><ul><li>이중결합이 없는 지방산으로 대부분 동물성 지방</li><li>상온에서 고체 상태</li><li>대부분의 육류, 지방, 생선, 달걀, 지방이 주로 포화 지방산(40% 이상)</li><li>버터산, 팔미트산, 라우르산, 스테아르산, 카프르산 등</li></ul></td></tr><tr><td>불포화<br>지방산</td><td><ul><li>이중결합이 하나 이상 있는 지방산으로 주로 식물성 지방</li><li>불포화 지방산 중 불포화 지방산을 선택함</li><li>불포화지방산이 많을수록 산화·산패되기 쉬움(산패되기 쉬운 정도: 불포화도가 높을수록 산패가 잘됨)</li><li>리놀산(n-6), 아라키돈산(오메가-6), DHA, EPA(오메가-3 등)</li></ul></td></tr></table>"},{"id":43,"title":"필수지방산","chapter":2,"chapterName":"재료과학","content":"<ul><li>① 체내에서 합성이 충분히 않거나 전혀 않거나 반드시 식품으로 섭취해야 하는 지방산</li><li>② 리놀산(Linoleic acid), 아라키돈산(Arachidonic acid)</li><li>③ 필수지방산이 결핍되면 피부염, 아라키돈산(Arachidonic acid)이 됨</li></ul>"},{"id":44,"title":"단백질의 기능","chapter":2,"chapterName":"재료과학","content":"<ul><li>① 효소·호르몬·항체 형성</li><li>② 체구성 물질 형성</li><li>③ 체액 균형 유지</li><li>④ 산 염기 균형 유지</li><li>⑤ 나이아신 합성: 필수아미노산인 트립토판으로부터 나이아신 합성</li></ul>"},{"id":45,"title":"필수아미노산","chapter":2,"chapterName":"재료과학","content":"<table><tr><th>구분</th><th>필수아미노산</th></tr><tr><td>성인</td><td>류신, 아이소류신(이소류신), 발린, 메티오닌, 페닐알라닌, 트레오닌, 트립토판, 리신(라이신)</td></tr><tr><td>성장기<br>어린이</td><td>성인의 필수아미노산 + 히스티딘(10종)</td></tr></table>"},{"id":46,"title":"제한 아미노산","chapter":2,"chapterName":"재료과학","content":"<table><tr><th>식품</th><th>제한 아미노산</th></tr><tr><td>쌀, 밀가루, 옥수수</td><td>라이신(리신)</td></tr><tr><td>두류, 고기류</td><td>메티오닌</td></tr><tr><td>옥수수</td><td>라이신(리신), 트립토판</td></tr></table><ul><li>▶ 불완전단백질의 필수 아미노산들을 첨가하기 위해서 첨가되거나 또는 필요한 양에 비해 상대적으로 부족한 아미노산을 제한 아미노산이라 한다.</li><li>▶ 옥수수의 제한 아미노산: 라이신 + 트립토판</li></ul>"},{"id":47,"title":"루기칼","chapter":2,"chapterName":"재료과학","content":"<ul><li>① 수용성·염용성·알부민: 반이온·조절 영양소이다.</li><li>② 산업 식품과 알기(칼슘(Ca), 칼륨(K), 나트륨(Na) 등)의 함유 기준</li></ul><table><tr><th>식사 식품</th><th>원, 야채와 임신 식품의 식품 성분이 가장 많이 포함</th></tr><tr><td>알칼리성 식품</td><td>야채, 과일, 감자 등</td></tr><tr><td>산성 식품</td><td>육류, 달걀 노른자, 생선 등</td></tr></table>"},{"id":48,"title":"비타민(지용성)","chapter":2,"chapterName":"재료과학","content":"<table><tr><th>비타민</th><th>특징</th></tr><tr><td>비타민 A<br>(레티놀/<br>카로틴)</td><td><ul><li>눈의 망막색소 합성에 필요한 영양소</li><li>결핍증: 야맹증, 안구건조증, 피부각화</li><li>과잉증: 두통, 탈모, 피부건조</li></ul></td></tr><tr><td>비타민 D<br>(칼시페롤)</td><td><ul><li>칼슘과 인의 흡수를 촉진하는 역할</li><li>결핍증: 구루병(어린이), 골연화증(성인), 골다공증</li><li>과잉증: 고칼슘혈증, 신장결석</li></ul></td></tr><tr><td>비타민 E<br>(토코페롤)</td><td><ul><li>항산화 역할 도움</li><li>세포막을 산화에서 보호하는 역할</li><li>결핍증: 용혈성 빈혈</li></ul></td></tr><tr><td>비타민 K<br>(필로퀴논)</td><td><ul><li>혈액응고에 필요한 단백질(프로트롬빈)합성 관여</li><li>결핍증: 출혈 경향, 지혈불량</li></ul></td></tr></table>"},{"id":49,"title":"루기칼","chapter":2,"chapterName":"재료과학","content":"<ul><li>① 수용성·염용성·알부민: 반이온·조절 영양소이다.</li><li>② 신선 식품과 임기(칼슘(Na), 칼륨(K), 칼슘(Ca)) 등의 함유 기준</li></ul><table><tr><th>식사 식품</th><th>원, 야채와 임신 식품의 식품 성분이 가장 많이 포함</th></tr><tr><td>알칼리성 식품</td><td>채소, 과일, 감자 등</td></tr><tr><td>산성 식품</td><td>육류, 달걀, 생선, 곡류 등</td></tr></table>"},{"id":50,"title":"무기질 요소","chapter":2,"chapterName":"재료과학","content":"<table><tr><th>구분</th><th>무기질</th><th>기능</th></tr><tr><td rowspan='3'>당</td><td>아이오딘(요오드)</td><td>갑상선호르몬 → 해당물</td></tr><tr><td>칼슘이온</td><td>뼈·치아 구성, 혈액응고, 신경</td></tr><tr><td>알파티드이온</td><td>평균 → 다음비이다 → 구성물이다</td></tr><tr><td></td><td>철(Fe)</td><td>헤모글로빈(Hb) 구성 성분</td></tr><tr><td></td><td>아연(Zn)</td><td>효소 활성화</td></tr><tr><td></td><td>기타</td><td>셀레늄(Se), 이온당, 칼슘위 등이다</td></tr><tr><td></td><td>기타(기타)</td><td>철, 망간, 아연, 구리, 크롬</td></tr><tr><td>단백질</td><td>단(프로테인)</td><td>체내에서 필요하나 외부 물질로 공급되는 성분</td></tr></table>"},{"id":51,"title":"킬로칼로리(열량) 계산 - 영양 영양/칼로리","chapter":2,"chapterName":"재료과학","content":"<table><tr><th>영양소</th><th>4kcal</th><th>4kcal</th><th>9kcal</th></tr><tr><td>열량</td><td>당질 4kcal</td><td>단백질 4kcal</td><td>지방 9kcal</td></tr><tr><td>기타</td><td>알코올 7kcal</td><td></td><td></td></tr></table>"},{"id":52,"title":"한국인 영양섭취기준(한국영양학회, 2020)","chapter":2,"chapterName":"재료과학","content":"<ul><li>총 열량 중 탄수화물 55~65%, 지방 15~30%, 단백질 7~20%</li></ul>"},{"id":53,"title":"전분과 구성","chapter":2,"chapterName":"재료과학","content":"<table><tr><th>구분</th><th>아밀로스</th><th>아밀로펙틴</th></tr><tr><td>구성성분</td><td>직선형의 구조<br>(α-1,4 결합)</td><td>직선부위+가지부위<br>(α-1,4와 α-1,6 결합)</td></tr><tr><td>요오드 반응</td><td>청색</td><td>보라색</td></tr><tr><td>호화도/겔 형성</td><td>우수하여 겔형성</td><td>보통</td></tr><tr><td>노화</td><td>노화가 잘 됨</td><td>노화가 잘 안 됨</td></tr></table><ul><li>▶ 찰쌀(찹쌀)의 전분: 아밀로펙틴 100%</li><li>▶ 멥쌀(일반쌀) 전분: 아밀로펙틴 80% + 아밀로스 20%</li></ul>"},{"id":54,"title":"전분의 호화","chapter":2,"chapterName":"재료과학","content":"<ul><li>물과 같이 가열함에 따라 생 전분(β-전분)이 익힌 전분(α-전분)으로 변한다.</li></ul><table><tr><th>구분</th><th>내용</th></tr><tr><td>호화촉진</td><td><ul><li>전분의 입도가 작을수록</li><li>알칼리성(pH 높을수록)</li><li>수분 함량이 많을수록</li><li>물리적 처리(압력)</li></ul></td></tr><tr><td>호화억제</td><td><ul><li>소금(염류, 설탕) 또는 알코올 첨가 시</li><li>지방산과 전분 복합체 형성</li></ul></td></tr></table>"},{"id":55,"title":"전분의 노화","chapter":2,"chapterName":"재료과학","content":"<ul><li>익힌 전분(α-전분)이 생 전분(β-전분)으로 되돌아가는 현상</li></ul><table><tr><th>구분</th><th>내용</th></tr><tr><td>노화촉진</td><td><ul><li>수분 함량이 30~60%일 때 잘 일어남</li><li>아밀로스가 아밀로펙틴보다 노화가 잘 일어남</li><li>2~5℃에서 노화가 가장 잘 일어남</li></ul></td></tr><tr><td>노화억제</td><td><ul><li>-18℃ 이하, 60℃ 이상에서는 노화가 거의 일어나지 않음</li><li>설탕, 유화제(유지), 수분을 적게 또는 도 조절</li></ul></td></tr></table>"},{"id":56,"title":"전분의 호정화","chapter":2,"chapterName":"재료과학","content":"<ul><li>① 전분을 물기 없이 160~170℃의 높은 온도로 가열하면 덱스트린(Dextrin)으로 변화</li><li>② 호화시킨 것보다 소화율이 낮고, 단위면적 당 물을 많이 흡수하여 점성이 감소함</li></ul>"},{"id":57,"title":"전분의 당화","chapter":2,"chapterName":"재료과학","content":"<ul><li>전분에 산 또는 효소를 작용시켜 포도당, 맥아당 등 각종 형태로 분해하는 과정<br>전분 → (산 또는 β-아밀라아제) → 맥아당 → (α-아밀라아제) 등의 효소에 의해<br>α-아밀라아제에 의한 당화 효소의 작용이 더 효과적이다.</li></ul>"},{"id":58,"title":"밀의 구조","chapter":2,"chapterName":"재료과학","content":"<ul><li>배유부 83%: 탄수화물, 단백질 함유 부분</li><li>겨층 14%: 섬유질이 가는 부분</li><li>배아 3%: 지방, 비타민B, 미네랄 함유 부분</li></ul>"},{"id":59,"title":"단백질 함량에 따른 밀가루의 분류","chapter":2,"chapterName":"재료과학","content":"<table><tr><th>분류</th><th>단백질 함량</th><th>성질 및 용도</th></tr><tr><td>강력분<br>(Hard flour)</td><td>11~13%</td><td>탄력, 신장, 수분 흡수력이 강하다.<br>식빵, 마카로니류, 스파게티 등에 사용</td></tr><tr><td>중력분<br>(All purpose)</td><td>9~11%</td><td>면류, 다목적용 등에 사용<br>국수, 우동, 만두류 등에 사용</td></tr><tr><td>박력분<br>(Soft flour/<br>케이크분)</td><td>7~9%</td><td>탄력, 신장이 낮아 쉽게 부서짐<br>과자류, 케이크, 쿠키 등에 사용</td></tr><tr><td>단백질 함량에<br>따른 추가</td><td></td><td>▶ 강력분 &gt; 중력분 &gt; 박력분</td></tr></table>"},{"id":60,"title":"밀가루의 성분 및 특성","chapter":2,"chapterName":"재료과학","content":"<ul><li>탄수화물(전분) 및 글루텐 70%를 차지하며, 그 대부분은 전분이다.</li><li>밀가루 단백질의 대부분은 글루텐으로 약 75%를 차지한다.</li><li>글루텐 형성 단백질 : 글루테닌, 글리아딘</li><li>전분 : 글루텐보다 빛이 흡습성 3배 정도를 올춘다.</li><li>달라진의 전분입자 : 전분입자가 17~43%로 달라져 표면에 손상되어 있으면 2배 올 올춘다.</li><li>밀가루의 적정 수분함량은 4.5~8% 정도인다.</li><li>밀가루의 유통은 환원성 항산화물 기준으로 한다.</li><li>밀가루에 함유된 색소는 1~2% 증가</li></ul>"},{"id":61,"title":"밀가루의 글레덴 특성","chapter":2,"chapterName":"재료과학","content":"<ul><li>제빵 특성의 최우선 아이다고 닌을반을 보는 것은 마다 크산티필(Xanthophyll)이다.</li><li>글루텐이 많을수록 빵의 볼륨이 커진다.</li><li>숙성 : 소맥 글루텐(단백질 37~43%)는 스트레스가 거의 없다.</li><li>반죽의 특징<ul><li>신전성 : 글루텐이 탄력지체 않음/가질 수 있는 성질(달라질 수록 신전성 1~5%, 탄성 5 이상으로 최대 반죽 구조 강화).</li><li>탄력성 : 글루텐이 원상태로 되돌아오는 시간 단축.</li><li>신전성 : 아래실(아래질레스)보다 트리렌(올리고펩티드)등 특성이 있음.</li><li>반죽을 한번 경우에 따라 에너지를 이용하여 수분 비율을 이용하여 올 수 있다.</li></ul></li></ul>"},{"id":62,"title":"제과·제빵에서 감미재의 기능","chapter":2,"chapterName":"재료과학","content":"<ul><li>단맛을 부여하고, 감미재의 종류에 따라 특화한 향이 부여</li><li>수분을 보유하여 저장성을 높이고, 노화를 지연</li><li>글루텐을 연화시켜 제품의 속살과 기공을 부드럽게 함</li><li>제과 반죽에서 설탕과 함께 각설탕에 크림성(Air incorporation)을 부여</li><li>캐러멜화에 의해 착색 및 껍질 형성에 관여</li></ul>"},{"id":63,"title":"주요 감미료","chapter":2,"chapterName":"재료과학","content":"<table><tr><th>설탕</th><th>감미도의 기준</th></tr><tr><td>정화</td><td>-당도가 높아지 않은 같은 유사한 전을 도와줄 경우 설탕 사용<br>-수분을 보유하여 당밀이 함유된 전당당으로 사용<br>·카빠멜화와 전화 반응인 마이야르 반응이 가능</td></tr><tr><td>전화당</td><td>-이스코를 이하의 반죽 경우 반응 버터 사용<br>-원당제 시에는 설탕보다 흡습성이 양아 노화 방지 효과가 크다.</td></tr><tr><td>포도당</td><td>·설탕보다 빨리 노화, 속도가 기여해 얻어냄이 좋다.<br>·설탕보다 달콤 더 건조가 짧이 좋은 양.</td></tr></table>"},{"id":64,"title":"감미재에 대하여 알아두어야 할 점","chapter":2,"chapterName":"재료과학","content":"<ul><li>밀가루의 당도(%): <strong>총 고형분 = 총 당도 / 3분의 1</strong></li><li>감미재의 상호 대체<ul><li>대체 감미재(g) = 총 당도 / 대체 감미재의 감미도 × 100</li></ul></li><li>당도계 단위: Brix (%) = 당도(°Brix) × 1 / 100</li><li>포도당 = Dextrose Equivalent = (DE값) × (전분 대비 % 환산)</li></ul>"},{"id":65,"title":"이스트","chapter":2,"chapterName":"재료과학","content":"<ul><li>이스트는 주로 증식법으로 대량 생산하는 데 사용하여 '사카로미세스 세레비지에(Saccharomyces cerevisiae)'를 사용한다.</li><li>반죽에 발효에 의해 탄산가스를 생성하여 반죽을 팽창시킨다.</li><li>이스트의 세포는 48%까지 약 32°F(0℃), 6가지 형성 온도를 사용한다.</li><li>이스트 발효의 최적 온도: 약 4.5~4.8 pH</li><li>환성탄, 삼성발효(트리 단당)을 가장 잘 발효시킨다.</li><li>소과 성분으로는 인당글, 렙틴 등이 잘 발효된다.</li><li>마이야르 반응은 가장 기본적인 발효과정에서 나타난다.</li><li>이스트에 함유된 프로테아제는 단백질을 분해하여 반죽의 구조를 약화시킨다.</li><li>이스트를 냉동 보관 시에는 생이스트는 대량 사용한다.</li></ul>"},{"id":66,"title":"기공중(이스트)의 종류","chapter":2,"chapterName":"재료과학","content":"<ul><li>활성건조효모(이스트)의 사용량 내시한 사용량 대비하다 참가하기 위한 방법<ul><li>유리지방산을 사용하는 것이다.</li></ul></li><li>유기산도 포함되어 있어 단백질을 생성하고 분해 촉진 효과도 있다.</li><li>유리지방산 트리렌에 생성하고 분해하는 효과가 있다.</li><li>이스트 종류<ul><li>생이스트 : 수분 68~73%, 저장 기간이 짧다.</li><li>활성 건조 효모 : 수분 7.5% 이하, 냉동·냉장 가능.</li><li>인스턴트 건조 효모 : 수분 4% 이하, 물에 바로 용해 가능.</li></ul></li><li>반죽에서 이스트의 양을 줄이는 경우(감소시하는 조건): 물의 온도가 높을 때, 반죽 발효 시간이 길 때, 설탕 비율이 높을 때, 반죽의 pH 낮을 때</li></ul>"},{"id":67,"title":"제빵기를의 조건","chapter":2,"chapterName":"재료과학","content":"<ul><li>발효면적이 높아야 한다.</li><li>수분의 적합성이 있어야 한다.</li><li>충분히 얼음(물)과 기름도 넣어야 한다.</li><li>기름도 될마히게 오래 있어야 한다.</li><li>기름, 건전향기가, 카리보닐기가 낮아야 한다.</li></ul>"},{"id":68,"title":"제빵기를의 산패를 촉진시키는 요인","chapter":2,"chapterName":"재료과학","content":"<ul><li>신소가 능율수록, 복강도가 높을수록</li><li>온도가 높을수록</li><li>수분함량이 높을수록</li><li>산산성 아제(금속)이온이 있는 경우</li><li>금속이온 : 구리, 철</li></ul>"},{"id":69,"title":"쇼트닝 완료","chapter":2,"chapterName":"재료과학","content":"<ul><li>시험에서 기름을 사용하여 하루를 여러 곳에서 불필요한 물기에 내보낸다</li><li>기름 소화 시 단백질을 (기름을 시험 신설 후 기름 내에 올을) 검사 단계, 기존 분리비(기름/물)에 관하여</li><li>이후 산화, 그러나 감지, 경유재기 등이 주된 과정을 만들어냄.</li></ul>"},{"id":70,"title":"쇼트닝 완료 2","chapter":2,"chapterName":"재료과학","content":"<ul><li>발효 시각에 올(모든것) 하는 발효지를 도가 블을 내에서</li><li>시험에서 기름 사용</li><li>발효 시 산화물의 배열은 쇼트닝 내에 관리</li><li>시험에서 가장 많이 발생 기름은 산화, 이것도 결함이 생긴다.</li></ul>"},{"id":71,"title":"유지의 산패방법 4가지 / 유화제의 기능","chapter":2,"chapterName":"재료과학","content":"<ul><li>가치 지방 산소 방법 : 산소가 약한 산소</li><li>유화제(이유로아제) 제품에 방지하는 사항을 이 기관에서 일을 내어</li><li>밀도 대비 1~1.5% 첨가 기준 사용</li><li>산화방지제 : BHA, BHT</li></ul>"},{"id":72,"title":"유화의 종류 및 유화제의 기능","chapter":2,"chapterName":"재료과학","content":"<ul><li>종류<ul><li>이유화제 : 반죽의 점탄성(기름 단백질의 강도) 증가</li><li>일반적 유화제 : 기름/물 또는 물/기름 유화</li><li>소·외 허가 : 반죽에 의해 조작되어 pH 발효에 따른 다양한 반응</li></ul></li><li>이유화제의 가능<ul><li>소화 지방 기름이 갖고 있다면 올수 나타는 밭침을 살줄수 있다</li><li>밀가루 기름이 갖고 있다면 올수가 나타나서 용도에 맞는 변화를 알수 있다.</li><li>방향 : 이유화제가 발효되어서 좋은 품질을 가져다.</li></ul></li></ul>"},{"id":73,"title":"유통의 특성","chapter":2,"chapterName":"재료과학","content":"<ul><li>신선한 유유의 pH: 6.5~6.8</li><li>신선한 유유의 비중: 1.030~1.032</li><li>유유 규격의 유지방: 3% 이상, 고형분 12%</li><li>유유 단백질의 구성<table><tr><th>카제인</th><td>우유 단백질의 80% 정도<br>우유 산의 산과 전자작용을 하여 잠금 중에서 점도와 질을 유지하는<br>주요 유화제 형성기</td></tr><tr><th>유청단백질</th><td>우유의 20% 정도<br>열에 의한 변성이 빠르고 유리기가 의해 산화됨.<br>열 반응에 의해 아이탈 산화를 이용하여 반응을 유발</td></tr></table></li><li>※ 제빵용 유유는 pH 5.2~5.6, 점도 이상의 이유가 가장 적합하다.</li></ul>"},{"id":74,"title":"달걀","chapter":2,"chapterName":"재료과학","content":"<ul><li>달걀의 구성: 껍데기 10%, 흰자위 60%, 노른자위 30%; 흰자 수분 88%, 노른자 수분 50%</li><li>신선한 달걀은 달걀의 기공 막으로 많은 삼투압 차이로 인해 공기 일정량이 들어간다.</li><li>달걀의 특성<table><tr><th>교반 특성</th><th>내용</th></tr><tr><td>기포성</td><td>달걀 거품의 기름과 전란 기름을 사용하면 이런 성질이 사용된다.<br>달걀의 거품의 기름의 영향, 이 크림과 데니, 버터크림 등</td></tr><tr><td>농후화제</td><td>노른자의 레시틴 성분이 포함되어 사용한다.</td></tr><tr><td>결착성</td><td>제품의 다 부위 형성을 위한 포함하여 관화 치지를 활용 단백질 함유, 산화와 분해성으로 기름이 나타나는 방법으로 활용함.</td></tr><tr><td>기타</td><td>제품의 속 색 넣는 식, 산화물이 나타난다.</td></tr></table></li></ul>"},{"id":75,"title":"이스트","chapter":2,"chapterName":"재료과학","content":"<ul><li>이스트는 주로 증식법으로 대량 생산하는 데 사용하여 사카로미세스 세레비지에(Saccharomyces cerevisiae)를 사용한다.</li><li>반죽에 발효에 의해 탄산가스를 생성하여 반죽을 팽창시킨다.</li><li>이스트의 세포: 세포의 48% 정도가 수분이다.</li><li>이스트의 발효 최적 온도: 32도, 최적 pH 4.5~4.8</li><li>탄당, 삼성발효가 이당류인 당을 가장 잘 발효시킨다.</li><li>이스트에 함유된 치마아제는 단당류를 발효시킨다.</li><li>이스트에 함유된 인버타아제는 자당(sucrose)을 포도당과 과당으로 분해한다.</li><li>이스트 보관<ul><li>생이스트 : 0~10°C 냉장 보관</li><li>건조 이스트 : 10°C 이하 서늘한 곳 보관</li></ul></li></ul>"},{"id":76,"title":"이스트 푸드의 성분 및 기능","chapter":2,"chapterName":"재료과학","content":"<table><tr><th>성분</th><th>기능</th></tr><tr><td>산화제</td><td>반죽의 글루텐 구조를 강화하여 가스 보유력을 높임</td></tr><tr><td>환원제</td><td>글루텐 구조를 이완시켜 반죽의 신전성 증가</td></tr><tr><td>이스트영양원</td><td>이스트의 발효 촉진 (암모늄염, 인산염 등)</td></tr><tr><td>물조절제(pH조절제)</td><td>물의 경도와 pH를 조정하여 발효를 최적화</td></tr><tr><td>전분(충전제)</td><td>이스트 푸드 성분들을 희석하여 사용량 조절을 편리하게 함</td></tr></table>"},{"id":77,"title":"이스트의 영향 및 기능","chapter":2,"chapterName":"재료과학","content":"<ul><li>팽창 기능: 발효에 의한 탄산가스, 반죽을 팽창시킨다.</li><li>향미 생성: 발효 과정에서 알코올, 유기산, 에스테르 등 향미 성분 생성</li><li>반숙법<table><tr><th>유형</th><th>이스트 조절 방식</th><th>사용</th></tr><tr><td>전(한국)</td><td>발효 조건에 따른 이스트 양 조절</td><td>전</td></tr><tr><td>입도(외국)</td><td>이스트의 발효 속도를 완화하고 풍미를 높임</td><td>전</td></tr></table></li></ul>"},{"id":78,"title":"화학 팽창제","chapter":2,"chapterName":"재료과학","content":"<table><tr><th>팽창제</th><th>특징</th></tr><tr><td>베이킹파우더</td><td>탄산수소트륨(중탄산나트륨) + 산성제 + 부형제<br>조조를 베이킹파우더로 대체 시 조초의 3배를 사용</td></tr><tr><td>베이킹소다</td><td>탄산수소트륨만 든 것으로 알칼리 반응<br>베이킹파우더의 3~4배<br>다사과 또는 당밀 사용하여 이들고, 공기/이산화탄소 소다<br>탄산수소트륨, 탄산수소칼슘</td></tr><tr><td>암모늄계</td><td>염화 암모늄, 탄산 암모늄</td></tr><tr><td>이스파타</td><td>중조를 기반 제조되어 가격이 싸서 섞어, 무취로 사용<br>상점에 냄새가 생기면 산성제, 색상이 이상하거나 발효에 이상이 있는 경우 사용</td></tr></table>"},{"id":79,"title":"물의 경도에 따른 분류","chapter":2,"chapterName":"재료과학","content":"<table><tr><th>물 종류</th><th>설명</th></tr><tr><td>연수 (0ppm 이하)</td><td>•반죽이 허용하여 자기고, 발효를 글루텐이 허약이 반죽이 연하여 너무 끈끈함.<br>•대체 자용성이 저해<br>•대책 속도가 증가<br>•탄산성분 성질이 있음.</td></tr><tr><td>경수 (180ppm이상)</td><td>•반죽에 사용되면 글루텐 조직을 강화시켜 반죽의 말이 딱딱해지고 발효 지연<br>•발효 시간의 단축 및 이스트 활성을 높여 가스보유력 향상</td></tr><tr><td>아경수 (120~180ppm)</td><td>•중성이나 약알카리의 아경수가 제빵용 물로 가장 좋다.</td></tr></table>"},{"id":80,"title":"물의 pH에 따른 제빵 특성","chapter":2,"chapterName":"재료과학","content":"<ul><li>정상 적합 물의 pH: 7이어야 한다.</li><li>발효를 위해서는 pH는 약산성(5~6)이 적합하다.</li><li>산성 물 (pH 낮음) : 반죽이 연해지고 끈끈하여 이스트 발효는 촉진된다.</li><li>알카리성 물 (pH 높음) : 반죽이 딱딱해지고 발효 지연</li><li>조치 : 빵아에 유리 첨가 및 단수 신상 이스트 푸드의 탄수화물을 이용<br>(단성의 인전 이용)<br>물 종류 불량</li><li>물의 사용량<ul><li>발효도가 높을 때 : 반죽이 많이 말하는 영어로 영어에 이르는 수분의 포함하여<br>기타이 가져오다.<br>물 함양이 높을 때 : 반죽이 연해지고 신전성 증가<br>물 함양이 낮을 때 : 반죽이 딱딱하여 성형성이 떨어진다.</li></ul></li><li>※ 빵에서 pH 5.2~5.6, 점도 적산의 이유가 가장 적합하다.</li></ul>"},{"id":81,"title":"강수와 연수 사용 시 조치사항","chapter":2,"chapterName":"재료과학","content":"<table><tr><th>구분</th><th>조치사항</th></tr><tr><td>강수</td><td>•이스트의 사용량을 늘리거나 이스트푸드 사용량 늘림<br>•발효 시간을 늘리거나, 이스트푸드 산성제 첨가<br>•빵이 딱딱한 경우 pH로 높이거나 이스트 이용 증량 및 연화<br>•산성 저감제 첨가 및 풀먹임 효과 등)</td></tr><tr><td>연수</td><td>•발효 떠한이 강수보다 이뤄 먼저 반죽이 2%장도 강수<br>•이스트 양을 줄이거나, 이스트 활성 줄임<br>•이스트 적정 함량을 도구 공기를 약한 상태에서 사용시키거나 오도록 함</td></tr></table>"},{"id":82,"title":"초콜릿","chapter":2,"chapterName":"재료과학","content":"<ul><li>초콜릿의 주 구성 성분: 카카오 58/62(5%), 카카오지방(30%/37%)</li><li>카카오버터의 융점: 35~37°C</li><li>초콜릿을 템퍼링하는 공정 온도: 40~50°C</li><li>템퍼링 초콜릿 보관 온도: 40~45°C</li></ul>"},{"id":83,"title":"초콜릿의 특성","chapter":2,"chapterName":"재료과학","content":"<ul><li>팻 블룸(Fat Bloom)이 일어나지 않는다.</li><li>초콜릿 보관 시 직사광선 사용된다.</li><li>팻 블룸 : 과도한 온도 변화로 표면이 하얗게 굳는다.</li><li>초콜릿에서 좋은 쓴맛/향기를 특성<ul><li>초콜릿에 함유된 높은 온도에 의해 지방이 산화된 노화성 노출 생긴다.<br>한 경우 온도 글리세로도 살아 크림화 되니다.</li><li>초콜릿에 향기 특성은 초콜릿 속에 초콜릿 반죽이 빠져 나와 표면에 결정이 나타나는 현상</li></ul></li></ul>"},{"id":84,"title":"초콜릿 블룸의 종류","chapter":2,"chapterName":"재료과학","content":"<ul><li>초콜릿 블룸의 높은 온도에 의해 지방이 산화되어 새롭게 수분을 빨리 흡수, 지방 산화물이 노출된 노화성 생긴다.<br>한 경우 온도 글리세로도 살아 크림화 되니다.</li><li>지방 블룸 : 표면에 오도 초콜릿 반죽이 빠져 나와 표면에 결정이 나타나는 현상</li><li>설탕 블룸 : 초콜릿 수분이 표면에 맺혀 설탕이 녹고 재결정화 되는 현상</li><li><strong>지방 블룸 제시</strong> : 초콜릿을 잘 적절히 냉각·결정화 하여 지방 블룸 방지</li><li><strong>설탕 블룸 방지</strong> : 서늘하고 건조한 장소, 온도가 갑자기 올라가서 현상이 나타남. 서늘하고 건조한 장소에 보관</li></ul>"},{"id":85,"title":"소금의 역할","chapter":2,"chapterName":"재료과학","content":"<ul><li>제빵에서 소금은 가장 기본적인 맛을 높이는 기능을 한다.</li><li>카제인화가 잘 이루어서 이유 단백질을 생성하거나 부패를 방지하는 기능이 있다.</li><li>반죽의 글루텐을 연화시켜 부드럽게 하는 역할도 한다.</li><li>유리지방이 사용하여 이스트의 발효를 억제하는 기능도 있다.</li><li>반죽의 물을 올(물을 부여가) 가장 기본 제품에 사용한다.</li><li>반죽의 흡수량을 줄인다(글루텐을 강화시켜 반죽을 탄탄하게 함).</li></ul>"},{"id":86,"title":"향신료의 종류 및 특성","chapter":2,"chapterName":"재료과학","content":"<table><tr><th>향신료</th><th>설명</th></tr><tr><td>계피</td><td>밀당 자루/밀로부터 비교적입로 만들어, 자극적이고 향기 독특한 맛</td></tr><tr><td>너트맥</td><td>인도네시아 섬에 생산물로부터 수류화가 늘어남. Mints(향의 종류)<br>Machine(향기와, 시설)<br>Market(시장)</td></tr><tr><td>생강</td><td>1개로 경우 밀의 경우 이전보다 불어남. 쿠키 등에 사용</td></tr></table>"},{"id":87,"title":"주류","chapter":2,"chapterName":"재료과학","content":"<ul><li>발효주는 당질을 원료로 한다.</li><li>발효주에 포함되는 주류와 각종 열의 증류물로 미를 내는 것은 증류주이다.</li><li>주요 종류<ul><li>포도주(와인) : 포도, 배 등의 과일을 이용하여 거품</li><li>키리 종류 : 진, 보드카, 럼, 위스키, 브랜디</li><li>과실주류 : 키요 마라쿠야, 무비따, 크라이스, 바나나 등</li></ul></li></ul>"},{"id":88,"title":"겔화·응결성제화의 종류","chapter":2,"chapterName":"재료과학","content":"<ul><li>모노다 클리세라이드 : 모노 클리세라이드 50%, 다-클리세라이드 30~40%</li><li>아설팜 칼륨(K), SSL 등</li></ul>"},{"id":89,"title":"안정제品목의 종류","chapter":2,"chapterName":"재료과학","content":"<ul><li>한천<ul><li>우뭇가사리에서 추출하여 고소이와 안정적 역할</li><li>냉각에 의해 1~1.5%, 탄성 사용</li><li>펙틴보다 대체로 겔 형태를 더 만들어낼 수 있어 이용함.</li></ul></li><li>젤라틴<ul><li>주로 동물, 아이크로젤, 마기젤로 등, 두뇌 등 성분들을 주로 탄수화물로 구성됨</li><li>밀도 대비 1% 정도 사용</li></ul></li><li>펙틴<ul><li>주로 과일, 설탕, 아이크로젤, pH 2.8~3.4의 조건에서 겔 형성</li><li>겔라틴 잘 안된 경우</li></ul></li></ul>"},{"id":90,"title":"제빵직업의 시작기계","chapter":2,"chapterName":"재료과학","content":"<ul><li>퍼들그래프 : 밀가루의 흡수율, 믹싱 시간, 밀가루 내 단구성 정도의 측정 방법 분석</li><li>아밀로그래프 : 밀가루의 호화 온도, 호화도, 점도의 변화 분석</li><li>익스텐소그래프 : 반죽의 신장성과 항력을 축정하여 밀가루의 질 분석</li><li>믹소그래프 : 반죽 형성 능력과 밀가루의 다양한 특성을 측정. 먹은 내용 없다.</li></ul>"},{"id":91,"title":"기업활동의 구성 요소(7M)","chapter":3,"chapterName":"생산관리 및 제과제빵 기구","content":"<table><tr><th>1차 관리 요소</th><th>2차 관리</th></tr><tr><td>Man(인원, 급여 장)</td><td>Method(방법)</td></tr><tr><td>Material(재료, 물질)</td><td>Minute(시간, 공정)</td></tr><tr><td>Machine(기계, 설비)</td><td>Market(시장)</td></tr><tr><td>Money(자본, 원가)</td><td></td></tr></table>"},{"id":92,"title":"원가계산의 구조","chapter":3,"chapterName":"생산관리 및 제과제빵 기구","content":"<table><tr><th colspan='4'>원가 구조</th></tr><tr><td>직접비</td><td>직접재료비<br>직접노무비<br>직접제조비</td><td>제조원가</td><td rowspan='2'>판매가격</td></tr><tr><td>간접비</td><td>간접재료비<br>간접노무비<br>간접제조비</td><td>제조원가<br>(간접비)</td></tr><tr><td colspan='2'>판매비와 관리비<br>일반관리비</td><td colspan='2'>이익</td></tr></table><ul><li>기본원가 = 직접재료비+직접노무비+직접경비</li><li>직접원가 = 직접재료비+직접노무비+직접제조비</li><li>제조원가 = 직접원가+제조간접비(간접재료비+간접노무비+간접경비)</li><li>총원가 = 제조원가+판매비와 관리비</li><li>판매가격 = 총원가+이익</li></ul>"},{"id":93,"title":"원서","chapter":3,"chapterName":"생산관리 및 제과제빵 기구","content":"<ul><li>막과의 생산원가 비율은 제품의 50~60%가 적당</li><li>직접재료 비율<ul><li>스트레이트 법 : 신선원재료단 사용하는 것이 원칙이다, 이후 적합한 방법으로 사용</li><li>스펀지 법 : 신선원재료단 사용하거나, 이후 적합한 방법으로 사용. 상업용 제품에 맞는 방법으로 사용</li></ul></li></ul>"},{"id":94,"title":"원서(계속)","chapter":3,"chapterName":"생산관리 및 제과제빵 기구","content":"<ul><li>공장 설비의 총 가용 생산성 능력은 나타나는 기능이다.</li><li>생산성 능력 공장에서 나타난 특성을 보여주는 기능</li><li>공장 생산성 분석<ul><li>인건오 분析 : 가격 가격 기능 분석, 노동 인원 기본 분석<br>내부오 분析 : 생산제품 기능 분석</li><li>내료 오분析 : 생산제품 기능 분석<br>설비 오분析 : 설비·장소의 사용 가치를 결정지을 중요 시에 대해 결정</li><li>이에 따르는 생산비와 분석 시와 공제, 노동 인원 및 설비, 시간 등 공제를 이용한다.</li></ul></li></ul>"},{"id":95,"title":"파이 롤러","chapter":3,"chapterName":"생산관리 및 제과제빵 기구","content":"<ul><li>반죽을 일정한 두께로 말아 제품 제사하는 기계</li><li>스위트 롤, 데니쉬 페이스트리, 크루아상, 파이 크로스트리 등 이 도구 밀어폄, 맹도 도구의 제조에 사용</li><li>밀판 위로 반죽이 지나치는 가려진 사이의 간격 만큼 (압연 롤러)</li><li>밀린 맞는 반죽이 어지진 지나치는 가려진 간격 만큼</li></ul>"},{"id":96,"title":"제빵 전문 도구","chapter":3,"chapterName":"생산관리 및 제과제빵 기구","content":"<table><tr><th>분류기</th><th>1회 발효를 마친 반죽에 정확한 크기의 반죽의 분할</th></tr><tr><td>라운더</td><td>분류된 반죽을 둥그렇게 말아 내거나 각각 내열인 스트레스 빌반죽의 성형 제공 중간 발효 단계 역할을 하는 장비, 다시 납여서 반죽이 완전히 통합되지 않은 상태로 납여서 반죽을 나누는 방법으로 안용</td></tr><tr><td>정형기</td><td>중간 발효 후 마친 반죽을 적합하게 조정하여 원하게 형틀의 반죽으로 성형 되어 납여 반죽을 나누는 방법으로 안용</td></tr><tr><td>발효기</td><td>성형된 반죽을 발효하는데 필수 기계 사용<br>이것이 이미지 적절히 쉬어 온도·습도·시간을 조절하여 자동 제어</td></tr><tr><td>도우 컨디셔너</td><td>냉동반죽을 자동으로 조절 가능(냉동 3~4기)</td></tr></table>"},{"id":97,"title":"팽창 형태에 따른 분류","chapter":4,"chapterName":"제과이론","content":"<table><tr><th>분류</th><th>특징 및 제품</th></tr><tr><td>화학적 팽창법</td><td>화학적 팽창제(베이킹파우더 등)을 이용하여 이산화탄소를 생성하여 팽창<br>쿠키, 케이크, 파이 등</td></tr><tr><td>이스트형 팽창법</td><td>이스트 발효에 의해 이산화탄소를 생성하여 팽창<br>빵, 롤, 도넛, 커피케이크, 데니쉬 페이스트리</td></tr><tr><td>공기 팽창법</td><td>크림화(공기 포집)에 의해 기포를 형성하여 제품 팽창<br>스폰지케이크, 레이어 케이크 등 다양한 형태</td></tr><tr><td>복합형 팽창법</td><td>두 가지 이상의 팽창 방법을 사용하는 방법<br>+생각되는 것은 포함(물리적, 이스트, 화학 패창)</td></tr></table>"},{"id":98,"title":"반죽형 반죽의 특징","chapter":4,"chapterName":"제과이론","content":"<ul><li>밀가루, 달걀, 설탕, 유지를 구성 재료로 하여 상당량의 유지를 함유한다.</li><li>일반적으로 달걀보다 밀가루 더 많이 사용하는 반죽으로 비교적 무겁다.</li><li>유지 사용량이 많아 제품의 부드러우나, 구조가 약하여 쉽게 부서지는 경향이 있다.</li><li>대부분 화학 팽창제를 사용</li><li>종류 : 레이어 케이크, 파운드 케이크, 과일 케이크, 이들 등</li></ul>"},{"id":99,"title":"반죽형 반죽의 방법","chapter":4,"chapterName":"제과이론","content":"<table><tr><th>방법</th><th>설명</th></tr><tr><td>단단법</td><td>모든 재료를 한번에 넣고 믹싱하는 방법(크리밍파우더 방식)<br>노력과 시간을 절약할 수 있어서 공업적 제빵에 주로 사용</td></tr><tr><td>크림법</td><td>유지, 설탕을 먼저 부드럽게 크림화하고, 이어서 달걀을 추가한 다음<br>가루 재료를 혼합하는 방법<br>부분적으로 유지를 잘 늘여서 크림 한 다음, 달걀을 나누어 넣어 유지를<br>계 혼합하는 방법</td></tr><tr><td>블렌딩법</td><td>유지와 밀가루를 먼저 혼합하여 유지가 밀가루 입자를 코팅한 다음<br>나머지 재료를 넣는 방법으로 유지를 충분히 섞으면 반죽을 만드는<br>방법이다.<br>21℃ 정도의 유지를 사용하면 달걀을 더 넣을 수 있다.</td></tr><tr><td>설탕/물<br>반죽법</td><td>설탕을 물에 먼저 녹인 후 이산화탄소 가스와 후 하나의 재료를 넣어 반죽을 만드는<br>방법이다.<br>설탕과 물의 비율 2 : 1(설탕 66.7%)</td></tr></table>"},{"id":100,"title":"거품형 반죽의 특징","chapter":4,"chapterName":"제과이론","content":"<ul><li>밀가루보다 달걀의 양이 많이, 유형에 비율이 이용하여 반죽을 부풀리는 방법이다.</li><li>소프트(달걀 단백질의 기포 형성 능력)와 달걀과 더불어 크림을 사용하는 것이 제품 부피에 큰 영향을 준다.</li><li>유지 함량이 적어 제품이 가볍고 부드러운 편이다.</li><li>쇼트닝이성이 낮아 제품 조직이 탄탄하면서도 가볍다.</li></ul>"},{"id":101,"title":"수율과 단백질 낮는 방법","chapter":4,"chapterName":"제과이론","content":"<ul><li>한천이나 노른자를 개 넣어 부드럽게 넣는 방법<ul><li>달걀 낮은 경우를 피하는 법 : 달걀 달라질이 상태를 조정하여 얼라이는 37~43%까지 맞춰져야 제품 형성</li></ul></li><li>밀합 방법<ul><li>고화된 재료와 오일 뻑뻑해 결과가 나오기 때문에 빠르게 일정 정도 불리게 된다.<br>높은 분들이 3~4배 증기를 부어 충분히 이어지게 한다.</li></ul></li><li>단단케이크<ul><li>낮은 재료와 오일 뻑뻑한 온도 저항이 일정하게 단단한 빵이 성형되어야 한다.</li></ul></li></ul>"},{"id":102,"title":"시폰형 반죽의 특징","chapter":4,"chapterName":"제과이론","content":"<ul><li>반죽형과 거품형 반죽의 두가지가 모두 사용되어 있다.</li><li>달걀흰자 거품과 다른 재료를 따로 제조한 후 두 가지를 혼합하여 반죽을 완성한다.</li><li>유지를 사용하고 가벼운 구조의 반죽을 가져 스폰지케이크와 같이 부드러운 부피를 가진다.</li></ul>"},{"id":103,"title":"시폰 케이크 제조 시 성형 전 온도에서 분리되는 원인","chapter":4,"chapterName":"제과이론","content":"<ul><li>반죽의 수분이 많은 경우</li><li>달걀흰자 온도가 낮은 경우</li><li>설탕 양이 과다한 경우</li></ul>"},{"id":104,"title":"파운드케이크(Baker's %) 재료량 계산","chapter":4,"chapterName":"제과이론","content":"<ul><li>밀가루 비율(%): 재료의 비율은 밀가루를 100%로 기준<br>밀가루 사용량(g) = (총 재료비율/밀가루 비율%) × 밀가루 비율<br>총원료량 = 총재료비(밀가루+달걀+유지+설탕 등)</li></ul>"},{"id":105,"title":"고품빵과과 저품빵과의 비교(반죽형 반죽)","chapter":4,"chapterName":"제과이론","content":"<table><tr><th>구분</th><th>고온단시간</th><th>저온장시간</th></tr><tr><td>설탕/밀가루 양</td><td>설탕 > 밀가루</td><td>설탕 > 밀가루</td></tr><tr><td>달걀과 유지 양</td><td>설탕 > 달걀</td><td>달걀 > 설탕</td></tr><tr><td>달걀보다 지방 양</td><td>지방 > 달걀</td><td>달걀 > 지방</td></tr><tr><td>지방보다 사용량 양</td><td>더 많이</td><td>더 적이</td></tr><tr><td>화학 팽창제 사용량</td><td>더 적게</td><td>다(가)많이</td></tr><tr><td>반죽 온도</td><td>다(가) 높다(저온)</td><td>높은(저온)</td></tr><tr><td>고온 시간</td><td>적당 시간</td><td>적당 시간</td></tr></table>"},{"id":106,"title":"제품의 계량","chapter":4,"chapterName":"제과이론","content":"<ul><li>제품의 제조에 정확히 재료를 철저하고 섬세하게 계량하여 준<br>비한다.</li><li>가루나 달라지가 재료를 처음이라면 무게를 측정하고, '계'는 측정량의 오차가 있으며, 기름 이상은 액체 재료를 계량하는 방법을 사용한다.</li><li>고정된 체 위에 달걀·스프레드 방법으로 계량한다.</li></ul>"},{"id":107,"title":"반죽 온도의 영향","chapter":4,"chapterName":"제과이론","content":"<table><tr><th>반죽 온도</th><th>영향</th></tr><tr><td>높을 때</td><td>•기공이 좋아지나 좋은 기공이 있을 때 제품을 얻을 수 있다.<br>•기포가 크고 고르지 않은 기공이 제품의 조직이 거칠어진다.</td></tr><tr><td>낮을 때</td><td>•기공이 조밀하고 상대적으로 좋은 조직의 제품을 얻을 수 있다.<br>•기공이 조밀하고 조직이 균일한 제품이 안되는 것이다.</td></tr></table>"},{"id":108,"title":"제과의 반죽온도","chapter":4,"chapterName":"제과이론","content":"<ul><li>마찰계수 = (실제반죽온도×6) - (실내온도+밀가루온도+설탕온도+달걀온도+수돗물온도)</li><li>사용할 물 온도 = (희망반죽온도×6) - (실내온도+밀가루온도+설탕온도+달걀온도+마찰계수)</li></ul>"},{"id":109,"title":"제품별 적정 반죽온도","chapter":4,"chapterName":"제과이론","content":"<table><tr><th>제품</th><th>온도</th></tr><tr><td>엔젤/레이어 케이크, 파운드 케이크</td><td>22~24°C</td></tr><tr><td>스펀지케이크</td><td>20~24°C</td></tr><tr><td>가볍게 베이크(스트레이트 케이크)</td><td>22~25°C</td></tr><tr><td>파이/파이스트리(퍼프 페이스트리)</td><td>18~20°C</td></tr><tr><td>수</td><td>40°C 정도</td></tr></table>"},{"id":110,"title":"반죽의 비중","chapter":4,"chapterName":"제과이론","content":"<ul><li>반죽의 비중이 낮을수록 반죽 속 공기 포집량 많음 → 부피 크고 기공 큼 → 부드러운 제품</li><li>비중 = (반죽 무게 - 컵 무게) / (물 무게 - 컵 무게)</li></ul>"},{"id":111,"title":"제품별 반죽 비중","chapter":4,"chapterName":"제과이론","content":"<table><tr><th>제품</th><th>적정 비중</th><th>비고</th></tr><tr><td>파운드 케이크</td><td>0.80~0.90</td><td></td></tr><tr><td>레이어 케이크</td><td>0.75~0.85</td><td>반죽형 케이크</td></tr><tr><td>스펀지 케이크</td><td>0.45~0.55</td><td></td></tr><tr><td>시폰/롤 케이크</td><td>0.45~0.50</td><td>거품형 케이크</td></tr></table>"},{"id":112,"title":"반죽의 pH가 제품에 미치는 영향","chapter":4,"chapterName":"제과이론","content":"<table><thead><tr><th>구분</th><th>산성</th><th>알칼리성</th></tr></thead><tbody><tr><td>맛</td><td>-</td><td>쓰다</td></tr><tr><td>조직</td><td>조밀하다</td><td>거칠다</td></tr><tr><td>껍질 색</td><td>옅은 색</td><td>진한 색</td></tr><tr><td>향</td><td>연한 향</td><td>강한 향</td></tr><tr><td>부피</td><td>작다</td><td>크다</td></tr></tbody></table><ul><li>산도가 높은 제품: 엔젤푸드, 레이어 케이크, 과일 케이크</li><li>알칼리도가 높은 제품: 데블스 푸드 케이크, 초콜릿 케이크</li></ul>"},{"id":113,"title":"제품별 비중","chapter":4,"chapterName":"제과이론","content":"<ul><li>반죽 밀도가 굵은 데빌스 푸드 케이크의 비중: 0.45 cm³/g</li><li>제품별 비중:<table><thead><tr><th>제품</th><th>비중</th><th>팽창비율</th></tr></thead><tbody><tr><td>파운드 케이크</td><td>2.40 cm³/g</td><td>70%</td></tr><tr><td>레이어 케이크</td><td>2.96 cm³/g</td><td>70%</td></tr><tr><td>엔젤 푸드 케이크</td><td>4.71 cm³/g</td><td>60~70%</td></tr><tr><td>스펀지 케이크</td><td>5.08 cm³/g</td><td>50~60%</td></tr></tbody></table></li></ul>"},{"id":114,"title":"오버 베이킹과 언더 베이킹","chapter":4,"chapterName":"제과이론","content":"<table><thead><tr><th></th><th>오버 베이킹</th><th>언더 베이킹</th></tr></thead><tbody><tr><td>오버 베이킹</td><td><ul><li>높은 온도에서 단시간 굽는 방법</li><li>제품이 두꺼울 때 대사용</li><li>향미와 외관이 좋지 않다</li><li>수분의 손실이 커서 제품의 무게가 가볍다</li></ul></td><td></td></tr><tr><td>언더 베이킹</td><td></td><td><ul><li>낮은 온도에서 장시간 굽는 방법</li><li>제품이 얇을 때 대사용</li><li>중앙 부분이 약간 설익어 주저앉기 쉽다</li><li>수분이 폭기하여 습한 상태이기 때문에 내부에 눅진눅진하다</li><li>속이 거칠어지기 쉽다</li></ul></td></tr></tbody></table>"},{"id":115,"title":"튀김기름","chapter":4,"chapterName":"제과이론","content":"<ul><li>튀김기름의 적정온도: 180~195°C</li><li>온도가 낮은 원인:<ul><li>한꺼번에 너무 많은 양을 투입</li><li>튀김기름의 4% 이상의 물, 수분, 공기(거품)이 섞임</li><li>온도조절 밸브에 이상이 있을 때</li></ul></li></ul><table><thead><tr><th>온도가 낮아지면</th><th>온도가 높아지면</th></tr></thead><tbody><tr><td>캐럿, 고구마처럼 당분이 높은 반죽은 쉽게 타기 때문에 낮은 온도에서 오래 튀긴다. 수분 흡수량이 늘어 기름기가 많아진다. 속이 부족하다</td><td>표면이 빨리 착색되어 내부는 부족하게 익는다. 수분 증발이 심하고 단백질 변성이 빠르게 일어나 수분 흡수가 적어진다. 속이 거칠어지기 쉽다</td></tr></tbody></table>"},{"id":116,"title":"충전 및 장식","chapter":4,"chapterName":"제과이론","content":"<table><thead><tr><th>가이드</th><th>내용</th></tr></thead><tbody><tr><td>가이드</td><td>단 아이싱, 크림 아이싱, 조합형 아이싱</td></tr><tr><td>글레이즈</td><td>도토 글레이즈의 적정온도: 43~50°C</td></tr><tr><td>크림</td><td>버터크림, 휘핑크림, 생크림, 커스터드, 가나슈 크림 등</td></tr><tr><td>머랭</td><td>냉제 머랭, 온제 머랭, 스위스 머랭 이탈리안 머랭</td></tr></tbody></table><ul><li>냉동 이후 아이싱의 기포를 풀리는 시간에 도동 글레이즈의 작업온도: 38~40°C</li><li>아이싱에 사용하는 기름을 풀리는 시간에 도동 글레이즈의 시럽 사용량: 20~30%이다.</li><li>이이싱 표면을 끈적이게 하는 사용량을 풀리는 시간에 도 조절한다. 일반적으로 반죽 대비 40%, 크림 40%, 과일 40%이다.</li><li>슈가크래프트는 설탕 반죽이 굳어지는 특성을 이용한 케이크 장식방법이다.</li><li>가나슈 크림을 설탕 반죽이 굳어지는 특성을 이용하다.</li></ul>"},{"id":117,"title":"머랭","chapter":4,"chapterName":"제과이론","content":"<ul><li>달걀흰자에 설탕을 넣어 거품을 만들어 거품을 안정시켜 제조, 흰자와 설탕의 비율은 1:2이다.</li><li>달걀흰자 거품 안정시키기 위해 산을 넣거나 기름기를 제거하여 제조한다, 색상을 일정 상태로 유지한다.</li><li>머랭의 최적 pH 5.5~6.0</li></ul><table><thead><tr><th></th><th>냉제 머랭</th><th>온제 머랭</th></tr></thead><tbody><tr><td>냉제 머랭</td><td><ul><li>흰자 100에 대하여 설탕 200의 비율</li><li>실내온도에서 달걀흰자에 거품을 내다가 설탕을 서서히 넣은 다음에 거품을 만드는 방법</li><li>기름을 인정된 위하여 소금 0.5%나 소석회 0.1%를 첨가하기도 한다.</li></ul></td><td></td></tr><tr><td>온제 머랭</td><td></td><td><ul><li>흰자 100에 대하여 설탕 200의 비율</li><li>달걀흰자 설탕을 43°C로 가열한 후 거품을 내어 만드는 방법</li><li>기름을 인정시키기 위하여 식초도 첨가함</li></ul></td></tr><tr><td>스위스 머랭</td><td colspan=\"\">흰자 1/3 설탕 2/3 = 1:2, 43°C로 가열하면서 설탕을 첨가하여 낼는 방법, 남은 설탕을 넣어 설탕에 거품을 내어 합쳐 혼합</td></tr><tr><td>이탈리안 머랭</td><td colspan=\"\">흰자 기포를 올린뒤 뜨거운 시럽을 넣어 머랭을 안정시키는 방법, 생크림 대용으로 많이 사용된다.</td></tr></tbody></table>"},{"id":118,"title":"퐁당(Fondant)","chapter":4,"chapterName":"제과이론","content":"<ul><li>설탕 100에 물 30을 넣고 끓여 114~118°C로 끓여서 사용하는 것</li><li>적정 재결정화를 위한 퐁당 시작 온도: 38~48°C에서 사용하는 것이 좋다.</li><li>설탕의 재결정을 이용하여 퐁당, 전당당, 주석산 등을 첨가한다.</li></ul>"},{"id":119,"title":"포장","chapter":4,"chapterName":"제과이론","content":"<ul><li>일반적인 빵/과자 재품의 냉각온도: 35~40°C, 습도 38%</li><li>포장 포함장치 부품이 각 파트을 기간으로 분류하여 각 제품을 보관할 수 있다.</li><li>포장봉투 안에 밀봉을 해야 한다, 포장재료에는 폴리프로필렌(PP), 폴리프로필렌(PP) 등이 있다.</li></ul>"},{"id":120,"title":"파운드 케이크","chapter":4,"chapterName":"제과이론","content":"<ul><li>파운드 케이크의 기본 배합 비율(%):<br>밀가루(100) : 설탕(100) : 달걀(100) : 유지(100)</li><li>1:1:1:1의 비율이지만 최근에는 설탕의 양을 증가하여 이용하고 있다.</li><li>제품의 모양과 맛을 좋게 한다</li><li>파운드 케이크의 종류 및 특성:<table><thead><tr><th>과일 파운드 케이크</th><th>과일을 첨가 케이크의 특성으로 과일을 충분한 케이크</th></tr><tr><td>과일 파운드 케이크</td><td>과일을 첨가한 케이크의 특성으로 과일을 충분한 케이크</td></tr><tr><td>도카 파운드 케이크</td><td>커피를 넣어 만든 케이크</td></tr></thead></table></li></ul>"},{"id":121,"title":"레이어 케이크","chapter":4,"chapterName":"제과이론","content":"<ul><li>반죽 온도: 24~26°C</li><li>굽기: 180°C, 팬에서 25~35분간</li><li>비중의 범위: 0.80~0.85</li><li>재료용 도는 5가지 배합법</li></ul><table><thead><tr><th>배합법</th><th>블렌딩 레이어</th><th>레이어 라이너</th><th>데블스 푸드</th><th>초콜릿</th></tr></thead><tbody><tr><td>설탕</td><td>설탕, 쇼트닝+1</td><td>설탕+쇼트닝+1</td><td>설탕, 쇼트닝, 달걀+<br>초콜릿+설탕</td><td>설탕 + 쇼트닝+1</td></tr><tr><td>달걀</td><td>달걀+25~친전</td><td>설탕+30+최종 설탕+30+그럼+(1.5)~전전</td><td>설탕 + 소다</td><td></td></tr><tr><td>유화유</td><td>설탕+25~전전</td><td>설탕+30+최종 설탕+30+그럼+(1.5)~전전</td><td>설탕 + 소다</td><td></td></tr></tbody></table>"},{"id":122,"title":"스펀지 케이크","chapter":4,"chapterName":"제과이론","content":"<ul><li>재료명(%), 박력분(100), 설탕(166), 달걀(166), 소금(2)</li><li>배합에 의한 온도의 적절한 키 점도를 최적화 시킨다.</li><li>달걀의 기포성 이용하여 많은 기포를 생기게 한다.<ul><li>저율배합의 스펀지 케이크에서는 비중이 0.50~0.55이다</li><li>고율배합의 스펀지 케이크에서는 비중이 50~60%이다</li></ul></li><li>스펀지 케이크의 비중은 0.54 cm³/g이며, 팬의 비중은 50~60%이다.</li><li>파스티야제는 공사제 시스템의 비중을 측정하는 180~190°C가 적합하다.</li></ul>"},{"id":123,"title":"롤 케이크","chapter":4,"chapterName":"제과이론","content":"<ul><li>말기, 쇼트, 롤, 조합 및 롤이 다양하다.</li><li>롤케이크를 말기 위해서는 약 70%는 굽기를 권장한다.</li><li>스펀지케이크 반죽에 소량의 설탕을 증가시켜 있으면 더 잘 말린다.</li></ul>"},{"id":124,"title":"롤 케이크 말기 시 표면이 터짐 방지법","chapter":4,"chapterName":"제과이론","content":"<ul><li>설탕의 일부를 물엿이나 꿀로 대치한다.</li><li>노른자의 비율을 늘린다.</li><li>베이킹 230~240°C로 발생한 경우 평탄화를 설탕하여 단시간 사용되고 단시간 방법을 추가하여 베이킹 사용이 단시간 대안이 될 수 있다.</li><li>밀가루를 아직 발생할 경우 수분이 설탕하여 단시간 사용한다.</li><li>반죽 구도 구간 설탕되어 진행 중인 설탕 상태를 파악한다.</li></ul>"},{"id":125,"title":"엔젤푸드 케이크","chapter":4,"chapterName":"제과이론","content":"<ul><li>노른자와 유지를 사용하지 않고 사용한다.</li><li>케이크에서 반죽은 비율이 적정 선으로 활용한다.</li><li>신선한 달걀보다 보존한 달걀의 비중이 크기 때문에 거품 내는 성질은 비율을 사용한다.</li></ul>"},{"id":126,"title":"파운드 페이스트리","chapter":4,"chapterName":"제과이론","content":"<ul><li>밀가루에 버터 유지를 넣은 반죽 유지와 분리된 반죽 유지와 분리된 반죽을 끈끈한 성질로 분리한다.</li><li>소금을 사용하면 자주 유지보다 좋은 특성을 유지한다.</li><li>마지막 공정에 반죽의 비율에 맞춰 공정을 전제하여 평가하고 진행한다.</li><li>마지막 공정: 반죽 처리 → 접기 → 휴지 → 성형이다.</li></ul>"},{"id":127,"title":"애플 파이","chapter":4,"chapterName":"제과이론","content":"<ul><li>파이 반죽 제조시의 목적:<ul><li>찬 재료의 수분기를 기름이 흡수한다.</li><li>밀가루의 수분 흡수를 높인다.</li><li>유지의 크기를 조절한다.</li><li>유지나 단단한 정도의 균형 잡힌 정도를 달성한다.</li></ul></li><li>충전물 온도가 너무 낮으면 충전물 수분이 파이 껍질에 침투해 수분이 20% 이상 과다 흡수가 된다.</li><li>건포도를 굽기 전날 물에 충분히 흡수하여 사용시, 설탕을 함께 40%고 이하로 사용한다.</li></ul>"},{"id":128,"title":"샤블레","chapter":4,"chapterName":"제과이론","content":"<ul><li>밀가루, 달걀, 각각의 재료들을 기본재료로 만들어, 기본재료에 성분과 달걀의 비율을 확인한다.</li><li>슈를 굽기 전 단계는 높은 온도로 사용된다.</li><li>배합 온도가 기준에 다른 재료를 기준에 놓고, 기포를 발생시켜 크림을 올릴 수 있는 상태로 만든다.</li></ul>"},{"id":129,"title":"쿠키","chapter":4,"chapterName":"제과이론","content":"<ul><li>쿠키의 특성상이 중요하여, 설탕, 쇼트닝의 배합이 적정 비율이 중요하다.</li></ul><table><thead><tr><th>쿠키 파이의 큰 이유</th><th>쿠키 파이의 적은 이유</th></tr></thead><tbody><tr><td>유지가 많다</td><td>유지가 적다</td></tr><tr><td>알칼리성 팽창제 사용</td><td>산성 글루텐을 많이 사용</td></tr><tr><td>알칼리성 반죽</td><td>산성 반죽</td></tr><tr><td>설탕의 비율이 크다, 굽기</td><td>설탕의 비율이 작다, 굽기</td></tr><tr><td>굽기 온도가 낮다.</td><td>굽기 온도가 높다.</td></tr></tbody></table><ul><li>쿠키 파티즈를 굽기 전 위해 특성 조건:</li><li>정원형의 쿠키는 양쪽 면 이상 아이싱을 사용할 수 있다.</li><li>달걀은 쿠키 반죽에 구조를 주기 위해 이용한다.</li><li>모든 온도를 잘 맞출 것</li></ul>"},{"id":130,"title":"케이크 도넛","chapter":4,"chapterName":"제과이론","content":"<ul><li>일반적인 케이크 도넛의 튀김 온도: 180~195°C이다.</li><li>케이크 기름의 발연 임계온도는 165°C이상 발연이다.</li><li>튀김 기름의 발연 임계는 12~15cm 정도가 좋다.</li><li>도넛을 설탕 아이싱에 담글 때 온도: 40°C이상이 우선이다.</li><li>도넛 아이싱 시 주요 사항:<ul><li>설탕 온도에 따라 아이싱 첨가를 증가시킨다.</li><li>낮은 온도 팬은 다음의 더 빠른 식히면서 이이싱 접착이 빠른 편이다.</li><li>아이싱에 나눠주는 방법은 이이싱하여 21~25% 정도이다.</li></ul></li></ul>"},{"id":131,"title":"냉과","chapter":4,"chapterName":"제과이론","content":"<ul><li>젤라틴의 원료: 뼈, 껍데기, 연골, 발굽, 힘줄</li><li>젤라틴은 냉각시켜 굳히는 냉과 종류를 사용한다.</li><li>젤라틴을 아이싱이나 충전물에 따라 다른 원과 비율이 다를 수 있다.</li></ul><table><thead><tr><th>냉과</th><th>내용</th></tr></thead><tbody><tr><td>냉과 45종</td><td><ul><li>부드러운 젤라틴 첨가되는 제품 분류 대비 매핑</li><li>판젤라틴(sheet형제) 사용: 50~60ppm 사용한다.</li><li>L-시스테인의 젤라틴 첨가 10~700ppm을 사용하는 것이 적합하다.</li></ul></td></tr><tr><td>온도 조건</td><td><ul><li>반죽 사용할 경우 거품제 위하여 0.5% 설탕으로 반죽 사용 확인 후 제품을 안정시키기 위하여 식초도 첨가함</li></ul></td></tr></tbody></table>"},{"id":132,"title":"밀가루","chapter":4,"chapterName":"제과이론","content":"<ul><li>밀가루는 반죽을 한 덩이로 만들어 반죽으로 만든 뒤 약 20분간성형 공정을 한다.</li><li>밀가루를 선정할 때 이유:<ul><li>잘못된 선정의 경우<br>-설탕기가 공제된 경우 글루텐 기준 파악 곤란<br>-혼합 이후 반죽이 균일하지 않은 경우<br>-효소를 다소 영향 미세화 처리하여 맛이 좋지 않은 경우</li></ul></li></ul>"},{"id":133,"title":"마지팬","chapter":4,"chapterName":"제과이론","content":"<table><thead><tr><th>구분</th><th>아몬드:설탕</th></tr></thead><tbody><tr><td>마지팬</td><td>1:1</td></tr><tr><td>로 마지팬</td><td>1:0.5</td></tr></tbody></table>"},{"id":134,"title":"제과 제품평가의 특성","chapter":4,"chapterName":"제과이론","content":"<table><thead><tr><th></th><th>내용</th></tr></thead><tbody><tr><td>외부평가</td><td>부피, 껍질색, 형태와 균형, 굽기 상태, 껍질의 특성</td></tr><tr><td>내부평가</td><td>기공, 속색, 속결, 향과 맛</td></tr></tbody></table>"},{"id":135,"title":"베이커스 퍼센트","chapter":5,"chapterName":"제빵이론","content":"<ul><li>밀가루의 양을 항상 100%로 보고, 그 외의 재료들이 차지하는 비율을 나타내는 것</li></ul><table><thead><tr><th colspan='2'>공식</th></tr></thead><tbody><tr><td>각 재료의 무게(g) ÷ 밀가루의 무게(g) × 각 재료의 비율(%)</td></tr><tr><td>총반죽 무게(%) = 총재료비율(%) ÷ 밀가루 비율(%)</td></tr><tr><td>밀가루 비율(%) = 총재료비율(%) ÷ 총반죽 비율(%)</td></tr></tbody></table>"},{"id":136,"title":"믹싱의 단계","chapter":5,"chapterName":"제빵이론","content":"<table><thead><tr><th>단계</th><th>내용</th></tr></thead><tbody><tr><td>픽업 단계</td><td>반죽은 온기가 없고 끈기 없이 성형되는 상태이다.<br>글루텐의 형성이 시작이 시작이 되는 단계</td></tr><tr><td>클린업 단계</td><td>글루텐이 형성되기 시작이 되는 단계<br>스윙키/자동반죽기를 이용하면 단계 이전에 익숙함 부분이 없어서 시간을 단축한다.</td></tr><tr><td>발전 단계</td><td>글루텐 형성 가장 많이 생성되고 발달하며 단단한 단계<br>스윙키가 하나 이상은 반죽으로 빠져 나오지 않는 상태가 될 수 있다.</td></tr><tr><td>최종 단계</td><td>단판성 신경의 가장 좋은 반죽이 부드럽고도 단계<br>나는 느 최적의 상태이다.<br>전분도, 제수도 등의 특성들을 확인한다.<br>반죽의 선택과는 성형 대부분의 것</td></tr><tr><td>렛다운 단계</td><td>렛다운 단계를 넘어서 과반죽이 된 단계의 상태들을 파악하면 된다.</td></tr><tr><td>파괴 단계</td><td>글루텐의 파괴가 진화하여 탄력성의 완전 손실이 일어나는 단계</td></tr></tbody></table>"},{"id":137,"title":"반죽의 이상 손도","chapter":5,"chapterName":"제빵이론","content":"<ul><li>제빵과정(이론): 클린업(중) → 발전 단계(고) → 최종(저) 최종단계(저)</li><li>반죽이 균열이 생긴다면 단순한 균열에 대한 교육 및 교재 발효 시간이 지연된다.</li><li>반죽 이상 선정, 단탄성, 점성 등 동시에 부패 교재 발효 시간의 지연 시 처리한다. 일부분의 선택한 이후 반죽의 발효시간을 더욱 단축시켜 적합하다.</li></ul>"},{"id":138,"title":"반죽의 상태","chapter":5,"chapterName":"제빵이론","content":"<ul><li>반죽의 최적의 이상 상태를 위치하면 반죽<br>온도 이상 반죽 최상 이내 반죽 탄력성에 최상 높은 것이 좋다.</li><li>언더 믹싱(과소반죽): 비중이 최상 상태와 달리 이상의 상태로 분리 중지 않다.</li></ul>"},{"id":139,"title":"반죽의 흡수율","chapter":5,"chapterName":"제빵이론","content":"<ul><li>밀가루: 단백질 1% 증가 → 흡수율 1.5% 증가</li><li>반죽 온도: 반죽 온도가 5도씨 올라갈 때마다 → 흡수율 +3% 상승<br>반죽 온도 1% 올라 → 흡수율 2% 감소</li><li>설탕: 설탕 5% 증가 → 흡수율 1% 감소</li><li>손상전분: 손상전분 1% 증가 → 흡수율 2% 증가</li><li>탈지분유: 손상전분 1% 증가 → 흡수율 0.75% 증가</li></ul>"},{"id":140,"title":"스트레이트법에서의 최적온도 계산법","chapter":5,"chapterName":"제빵이론","content":"<ul><li>마찰계수 = (결과 반죽 온도×3) - (실내 온도+밀가루 온도+수돗물 온도)</li><li>사용할 물 온도 = (희망 반죽 온도×3) - (실내온도+밀가루 온도+마찰계수)</li><li>사용 얼음 양 = 총 사용량×(수돗물 온도-사용할 물 온도) ÷ (80+수돗물 온도)</li></ul>"},{"id":141,"title":"스펀지/도법에서의 물온도 계산","chapter":5,"chapterName":"제빵이론","content":"<ul><li>마찰계수 = (결과 반죽 온도×4) - (실내+밀가루 온도+수돗물 온도+스펀지 온도)</li><li>사용할 물 온도 = (희망 반죽 온도×4) - (실내온도+밀가루 온도+마찰계수+스펀지 반죽온도)</li><li>사용 얼음 량 = 스트레이트법과 동일</li></ul>"},{"id":142,"title":"1차 발효","chapter":5,"chapterName":"제빵이론","content":"<ul><li>이스트가 가장 좋은 조건이 있는 시간을 단축 할 수 없는 조건</li><li>1차 발효실의 적정온도: 27°C, 실내 습도 75~80%</li><li>발효 완료 후 사용되는 발효 판단법 이상인 경우 두 가지로 확인한다.</li></ul><table><thead><tr><th></th><th>크다</th><th>작다</th></tr></thead><tbody><tr><td>반죽 온도</td><td>낮음수록</td><td>낮음수록</td></tr><tr><td>발효 시간</td><td>낮음수록</td><td>낮음수록</td></tr><tr><td>발효 시간</td><td>낮음수록</td><td>낮음수록</td></tr><tr><td>발효 습도</td><td>낮음수록</td><td>낮음수록</td></tr></tbody></table>"},{"id":143,"title":"분할","chapter":5,"chapterName":"제빵이론","content":"<ul><li>분할은 15~20분 이내로 분리하는 것이 기본이다.</li><li>기계적 분할은 두 개의 분리 기준으로 분류하여 반반씩<br>분할/발효 단계를 나눈다.</li><li>분할 및 발효구간의 관계된 라운딩 빙법은:<br>- 분리 기 내 냉각에 접촉에 의한 발생 빙법</li></ul>"},{"id":144,"title":"둥글리기의 목적","chapter":5,"chapterName":"제빵이론","content":"<ul><li>분할된 단위반죽의 균형 구조와 방법을 재정형 유지<br>가스 유지를 확인한다.</li><li>분할된 반죽이 균일 경화하여 수분을 보유 이후 발효가 가스 유지 확인한다. 발효에서는 이스트나 최적화가 다른 무게의 가스 산화에 대한 문제가 없다.</li><li>분할과 단단한 성형하여 단단한 단계이 원활히 형성 이후 확인한다.</li><li>분할과 단단한 단계를 균일하게하며 발표를 균일하게 촉진 이후 발효가 가능하여 연속으로 진행한다.</li></ul>"},{"id":145,"title":"중간 발효","chapter":5,"chapterName":"제빵이론","content":"<ul><li>분할한 반죽의 올바른 반죽 한 번에 충분히 숙기 시간(5~15분)이다.</li><li>분할의 발효에서 충분이 공간하여 균일의 설탕 중간 발효 이후 확인한다.</li><li>분할에서는 설탕 발효 충분히 진행이 중간 발효를 위해 분할반죽 라운딩이 된다. <br>분할된 단계는 분할에 중간 이후 충분히 성형하여 균일한 과정 전 중간 발효를 수행해야 한다. (Over head proof)</li><li>벤치 타임(Bench time) 또는 오버헤드 프루프(Over head proof)라고도 한다.</li></ul>"},{"id":146,"title":"정형","chapter":5,"chapterName":"제빵이론","content":"<ul><li>성형기: 가스빼기(밀기) → 말기 → 봉하기</li><li>정형이 잘못되어 있을 때에도 성형/발효의 완성을 결정한다.</li></ul>"},{"id":147,"title":"발효","chapter":5,"chapterName":"제빵이론","content":"<ul><li>반죽은 일정도 발전이 이루어지면 아마, 대한 인정성이 이루어진 이후, 무게 이후가 적합하게 발전된다.</li><li>반죽기는 반죽 무게가 0~1~2% 농도를 사용한다.</li><li>반죽기는 반죽 무게가 0~1~2% 농도를 사용한다.<br>반죽의 정형을 만드는 분류는 비교단에 이후 전 비율을 사용한다.</li><li>반죽의 비중 적정 비중:<ul><li>상업 이전의 비중: 3.2~3.5 cm³/g(g/ml단위도 3.36 cm³/g)</li><li>빵의 반죽의 비중: 3.4~4.0 cm³/g</li></ul></li></ul>"},{"id":148,"title":"2차 발효","chapter":5,"chapterName":"제빵이론","content":"<ul><li>성형의 발효를 전진 둘다 성별 발효에 관련 발효 실력을 빠르게 발효를 내기 때문에 도 발효를 낮추어 적합하게 맞춘다.</li><li>2차 발효 온도의 기준:<ul><li>판 이후의 온도: 38~43°C, 설탕 습도 75~90%</li><li>중간 정도 발효의 온도:<ul><li>성형에서 발효가 너무 오래하면 발효가 낮아지기 때문에 (1~4)시간 동안에 발효를 균형하거나 결과 위치를 한다.</li><li>성형한 반죽은 6~8에이하로 낮추어진 표준 이후, 균형에 대한 것 기본을 한다.</li></ul></li><li>성형한 반죽에 이상의 처리<br>- 반죽도 이하로 낮추어진 문제를 발효처리한다.</li></ul></li></ul>"},{"id":149,"title":"굽기","chapter":5,"chapterName":"제빵이론","content":"<ul><li>일반적인 오븐의 사용 범위: 180~200°C</li><li>오븐에 사용되는 이상에 의해 이상의 필요에 대한 특성이 된다.</li><li>반죽의 오도를 너무 낮으면 너무 오래한다.</li></ul><table><thead><tr><th></th><th>내용</th></tr></thead><tbody><tr><td>반죽 결과</td><td><ul><li>낮은 온도에 의한 급기 굽기 방법<br>• 아이싱 기름이 지나치면 빠른 수분 없이 굽기 가능한 상태<br>• 아이싱 기름이 지나치면 낮은 수분이 없이 굽기의 특성상 사용할 수 있다</li></ul></td></tr><tr><td>오버 베이킹</td><td><ul><li>낮은 온도에서 오래 굽기 방법<br>• 내측 온도가 너무 낮으면 걸친다. 이걸 오버 베이킹이라 한다</li></ul></td></tr><tr><td>스케일</td><td><ul><li>굽기 조절 개별 및 품질 관리<br>• 굽기 스케일의 상단부 이하 (15~20분가량)</li></ul></td></tr><tr><td>이탈리안 구공식</td><td><ul><li>굽기 작업 전 굽기 방법으로 굽기 기준에 맞추어 실행</li></ul></td></tr></tbody></table><ul><li>굽기에 굽기가 아닌 오버 베이킹 이상 오버 베이킹인 경우 현재 굽기 온도:<ul><li>대류 이상시: 설정범위 10~49°C<br>• 설정 이상시 설탕 + 설탕이 잡기 이상적인 온도는 45~54°C</li><li>오스트 이상시: 60~63°C<br>• 최소 이상시 굽기 온도 이상: 온도 54°C<br>• 소유 이상 불필요 60 이하 온도 이상이면 60°C 이상이다.</li></ul></li></ul>"},{"id":150,"title":"냉각 및 저장방법","chapter":5,"chapterName":"제빵이론","content":"<ul><li>냉각 및 보관에 관해서 냉각 결과 온도: 35~40°C, 실내 습도 38%</li><li>냉각 기름은 이의 이상 조건으로 대표적인 냉각 보관의 자연냉각이 우선적으로 적합하다.</li></ul><table><thead><tr><th>포장 온도에서</th><th>내용</th></tr></thead><tbody><tr><td>높은 온도</td><td><ul><li>냉각의 첫 번째 조건 상태에서 이루어지는 조건 결과가 이루어진다.</li><li>기름이 낮아지는 관계는 항상 처리한다.<br>• 기름을 인정된 위하여 소금 0.5% 정도의 식초를 첨가하기도 한다.</li></ul></td></tr><tr><td>낮은 온도</td><td><ul><li>기름을 인정시키기 위하여 식초도 첨가한다.<br>• 기름의 이하 이상의 원래의 낮은 냉각상태와 같이 냉각온도를 함께한다.</li></ul></td></tr></tbody></table>"},{"id":151,"title":"빵의 노화","chapter":5,"chapterName":"제빵이론","content":"<ul><li>노화: 빵이 굳고 결정구조로 되면서 냄새, 맛이 변하는 것이다.</li><li>일반적으로 빵 0~5도씨에서 노화가 가장 빠르게 일어난다.</li><li>빵의 노화 속도는 수분 손실을 따라서 노화가 나타난다.</li><li>노화 지연 방법:<ul><li>유화제 사용</li><li>포장 및 냉동 보관</li><li>설탕 및 유지 첨가량 증가</li><li>냉동 빵의 냉동 온도: -18°C이하</li></ul></li></ul>"},{"id":152,"title":"스트레이트법(직접반죽법)","chapter":5,"chapterName":"제빵이론","content":"<ul><li>반죽법: 모든 재료를 한꺼번에 넣어 반죽하는 스트레이트 방법 - 2~3%</li><li>발효 시간 사용하는 발효 시간: 2~4시간(최종 이상 스트레이스트 4%)</li><li>스트레이트법 이상 결과 적합하게 하는 이후:<ul><li>반응 스트레이트법 결과 26~27°C</li></ul></li></ul><table><thead><tr><th></th><th>스트레이트법</th></tr></thead><tbody><tr><td>장점</td><td><ul><li>생산이 단순화 가능, 제조 시간이 단축될 수 있다.<br>• 기계 이후에 이상이 생겨도 손실을 줄일 수 있다.</li></ul></td></tr><tr><td>단점</td><td><ul><li>발효 이후에 발효 이외에는 발효 공정이 고정되어 있다.<br>• 빵의 풍미가 적다</li></ul></td></tr></tbody></table>"},{"id":153,"title":"베이상스트레이트법으로 인한 발효량이 줄어드는 조치","chapter":5,"chapterName":"제빵이론","content":"<ul><li>1차 발효시의 최적 시간을 줄이기 위한</li><li>이스트 사용량 20~25% 증량</li><li>반죽의 사용 이상의 100%</li><li>설탕 1% 증량</li><li>소금 1% 이하 중량</li><li>이스트 푸드: 생략</li><li>반죽온도 30~31°C로 높임<br>* 별도 발효에서도 이상의 기준에 따라 시간을 단축 할 수 있는 조건들은 따라서 사용이 되는 유의점이다.</li></ul>"},{"id":154,"title":"스펀지 도법","chapter":5,"chapterName":"제빵이론","content":"<ul><li>대규모 반죽을 적합하게 이스트, 이스트 푸드, 개량제 등이 사용되어 많은 빵에 자주 사용되지 않는다.</li><li>스펀지 반죽의 발효 이상 결과 참조:<ul><li>반죽결과는 23~27°C, 분량 반죽온도 나는 법 26~27°C</li><li>발효시간(중간): 70~80% 정도로 발효된다.</li><li>도 반죽의 이후 발효시간은 26.5~27°C이다.</li></ul></li><li>스펀지의 법의 특성:<ul><li>세공 완성성이 정돈하여 단계 발효 완료적으로 할 수 있다. 발효 단계 기준으로 이루어진다.<br>발효 시간이 이후에 이상의 반죽 단계가 이루어지다. 발효 시간이 짧아지지 않는다.<br>설탕 단계가 공정이 이루어진 선택 이전에 이루어 20% 이후 부가 선택이 된다.</li></ul></li></ul><table><thead><tr><th></th><th>스펀지 도법</th></tr></thead><tbody><tr><td>장점</td><td><ul><li>정밀 완성성이 이루어져 발효 품질 완성을 할 수 있다.</li><li>발효 시간이 짧이 이루어질 수 있다. 발효 이상의 이루어진다.</li><li>발효 단계의 이후 이상의 이루어진다.</li></ul></td></tr><tr><td>단점</td><td><ul><li>제조 시스템이 없이 이루어지거나 발효 공정이 이루어지 않는다.</li><li>발효 이상의 이후 이상의 이루어진다.</li><li>발효 시간 이후 이상이 이루어지고 스펀지 발효 이후에 재발효가 발효 이루어진다.</li></ul></td></tr></tbody></table>"},{"id":155,"title":"액체발효법","chapter":5,"chapterName":"제빵이론","content":"<ul><li>브루를 용매로 스타터를 대신/설탕 민물밖에 원반죽 사용<br>보루 용량은 완전하게 위치를 발효시켜 안정시키는 것을 이용한다.</li></ul>"},{"id":156,"title":"연속식 제빵법","chapter":5,"chapterName":"제빵이론","content":"<ul><li>설명기가 구성성분으로 연속하여 저장되는 것들로 한다.</li><li>재료를 분류하여 이후 설탕이 사용될 수 있다.</li><li>발효 손상 이후의 발효</li></ul><table><thead><tr><th></th><th>연속식</th></tr></thead><tbody><tr><td>단점</td><td>산화제가 많은 이후에 많이 들어간다.</td></tr></tbody></table>"},{"id":157,"title":"노타임 반죽법","chapter":5,"chapterName":"제빵이론","content":"<ul><li>신선제를 이용하여 빵을 만들 때 발효 시간을 감소시키기 위해 발효 시간을 감소시키는 방법<ul><li>단백 5~H7를 활용하고 비단백성 반죽에의 구조를 이용하는 법</li></ul></li><li>환원제를 사용한 반죽 발효는 빈 시작 2~3회에 이후 빠른 발효 준비를 확인할 시 반죽한다.<ul><li>이스트 사용량 0.5~1%을 줄인다.</li><li>설탕이 사용될 경우 이상의 양은 낮추어진다.</li><li>이스트 사용량 30~50ppm 줄인다.</li><li>이스트 사용량 반죽온도가 30~32°C에서는.</li></ul></li></ul>"},{"id":158,"title":"냉동반죽 이스트를 사용한 제법의 특성","chapter":5,"chapterName":"제빵이론","content":"<ul><li>반죽법으로 이스트를 이용하는 품질은 이용하는 제법을 고정되어 사용한다.</li><li>물의 이스트를 사용하여 생산하기보다 이스트 없이 이상의 단계가 없는 상태이다.</li><li>단기능이 설탕 이후에 이루어지고 이이싱에 의하여 설탕의 확인이 된다.</li><li>노름·작업 일부의 이후에 이루어지고 글루텐이 충분히 발달할 수 있도록 설탕함량을 확인하여 굽기 이루어진다.</li><li>냉동속도는 빠른 속도에서 냉동시킴으로 -40°C에서 급냉동 하는 것이 원칙이다.</li><li>데워서 이상의 기준을 냉동반죽법으로 이루어진다. 냉동에서 해동 시간 10~700ppm을 기준 처리 이후</li><li>냉동 이상 시간이 이루어지고 반죽을 확인하여 미스트 없이 이상이 될 수 있도록 기준을 설탕가한다.</li></ul>"},{"id":159,"title":"건포도 전처리 목적으로 건포도 품질 향상 특성","chapter":5,"chapterName":"제빵이론","content":"<ul><li>제빵에 사용되기 전에 건포도를 이상의 상태로 내가 가까운 상태로 이루어진다.</li><li>건포도는 이상의 처리후 이상으로 이루어지는 이후 이상에도 이루어진다.</li><li>건포도는 반죽에 참가한 뒤에 가장 좋은 이후 이상의 이후에 이루어진다.</li></ul>"},{"id":160,"title":"제빵의 평가기준","chapter":5,"chapterName":"제빵이론","content":"<table><thead><tr><th></th><th>내용</th></tr></thead><tbody><tr><td>외부평가</td><td>부피, 껍질색, 형태와 균형, 굽기 상태, 껍질의 특성, 균열(터짐 및 찢어짐&소도)</td></tr><tr><td>내부평가</td><td>기공, 속색, 색상, 향과 맛</td></tr></tbody></table>"}];
DATA = REF_DATA; init();

function init() {
  renderTabs();
  renderItems();
  setupSearch();
  setupScroll();
}

function renderTabs() {
  const counts = {};
  DATA.forEach(d => { counts[d.chapter] = (counts[d.chapter]||0) + 1; });
  const el = document.getElementById('chTabs');
  el.innerHTML = CHAPTERS.map(ch => {
    const cnt = ch.id === 0 ? DATA.length : (counts[ch.id]||0);
    return `<div class="ch-tab${ch.id===currentCh?' active':''}" data-ch="${ch.id}" onclick="selectCh(${ch.id})">${ch.name}<span class="ch-count">(${cnt})</span></div>`;
  }).join('');
}

function selectCh(ch) {
  currentCh = ch;
  openItems.clear();
  document.querySelectorAll('.ch-tab').forEach(t => t.classList.toggle('active', +t.dataset.ch === ch));
  renderItems();
}

function getFiltered() {
  let items = DATA;
  if(currentCh > 0) items = items.filter(d => d.chapter === currentCh);
  if(searchTerm) {
    const terms = searchTerm.toLowerCase().split(/\s+/).filter(Boolean);
    items = items.filter(d => {
      const text = (d.title + ' ' + d.content).toLowerCase();
      return terms.every(t => text.includes(t));
    });
  }
  return items;
}

function highlightText(text, isHTML) {
  if(!searchTerm) return text;
  const terms = searchTerm.split(/\s+/).filter(Boolean);
  if(!terms.length) return text;
  if(isHTML) {
    // Only highlight text nodes, not tags
    terms.forEach(term => {
      const re = new RegExp(`(?<=>)([^<]*?)(${escRe(term)})`, 'gi');
      text = text.replace(re, (m, before, match) => before + '<mark>' + match + '</mark>');
      // Also highlight text at start (before any tag)
      const re2 = new RegExp(`^([^<]*?)(${escRe(term)})`, 'gi');
      text = text.replace(re2, (m, before, match) => before + '<mark>' + match + '</mark>');
    });
  } else {
    terms.forEach(term => {
      const re = new RegExp(`(${escRe(term)})`, 'gi');
      text = text.replace(re, '<mark>$1</mark>');
    });
  }
  return text;
}

function escRe(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function renderItems() {
  const items = getFiltered();
  const list = document.getElementById('itemList');
  const empty = document.getElementById('emptyState');
  const info = document.getElementById('resultsInfo');
  const totalEl = document.getElementById('totalCount');

  if(searchTerm) {
    info.textContent = `"${searchTerm}" 검색 결과: ${items.length}건`;
    info.classList.add('show');
    totalEl.textContent = items.length + '건';
  } else {
    info.classList.remove('show');
    totalEl.textContent = items.length + '항목';
  }

  if(!items.length) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  list.innerHTML = items.map(d => {
    const isOpen = openItems.has(d.id) || (searchTerm && items.length <= 5);
    const chClass = 'ch' + d.chapter;
    const title = highlightText(escHTML(d.title), false);
    const content = searchTerm ? highlightText(d.content, true) : d.content;
    return `<div class="item-card${isOpen?' open':''}" data-id="${d.id}">
      <div class="item-header" onclick="toggleItem(${d.id})">
        <div class="item-num ${chClass}">${String(d.id).padStart(2,'0')}</div>
        <div class="item-title">${title}</div>
        <span class="item-chevron">▾</span>
      </div>
      <div class="item-body"${isOpen?' style="display:block"':''}>${content}</div>
    </div>`;
  }).join('');
}

function escHTML(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleItem(id) {
  if(openItems.has(id)) openItems.delete(id); else openItems.add(id);
  const card = document.querySelector(`.item-card[data-id="${id}"]`);
  if(card) {
    card.classList.toggle('open');
    const body = card.querySelector('.item-body');
    body.style.display = card.classList.contains('open') ? 'block' : 'none';
  }
}

function toggleAll(open) {
  const items = getFiltered();
  if(open) items.forEach(d => openItems.add(d.id));
  else openItems.clear();
  renderItems();
}

function setupSearch() {
  const input = document.getElementById('searchInput');
  const clear = document.getElementById('clearBtn');
  let timer;
  input.addEventListener('input', () => {
    clearTimeout(timer);
    const val = input.value.trim();
    clear.classList.toggle('show', val.length > 0);
    timer = setTimeout(() => {
      searchTerm = val;
      openItems.clear();
      renderItems();
    }, 200);
  });
}

function clearSearch() {
  const input = document.getElementById('searchInput');
  input.value = '';
  searchTerm = '';
  document.getElementById('clearBtn').classList.remove('show');
  openItems.clear();
  renderItems();
  input.focus();
}

function setupScroll() {
  const btn = document.getElementById('scrollTop');
  window.addEventListener('scroll', () => {
    btn.classList.toggle('show', window.scrollY > 400);
  }, {passive:true});
}
</script>
</body>
</html>
