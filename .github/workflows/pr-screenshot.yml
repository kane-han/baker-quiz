name: PR Screenshot

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - '*.html'
      - '*.js'
      - '*.css'
      - 'data/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Start server and take screenshots
        run: |
          npx http-server . -p 3000 -s &
          sleep 3
          node .github/scripts/take-screenshots.js

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-screenshots
          path: .github/screenshots/*.png
          retention-days: 7

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const resultsPath = '.github/screenshots/results.json';
            if (!fs.existsSync(resultsPath)) {
              console.log('No screenshots taken');
              return;
            }
            const results = JSON.parse(fs.readFileSync(resultsPath, 'utf-8'));
            if (results.length === 0) return;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments) {
              if (c.body?.includes('<!-- pr-screenshot-bot -->')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const pages = results.map(r => `- **${r.name}** (${r.viewport})`).join('\n');

            const body = [
              '<!-- pr-screenshot-bot -->',
              '## 📸 PR 스크린샷',
              '',
              pages,
              '',
              `> 🔗 [스크린샷 다운로드 (Artifacts)](${runUrl}#artifacts)`,
              '',
              '---',
              '*자동 생성된 스크린샷입니다*',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
