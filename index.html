<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>제빵/제과기능사 모의고사</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#4A6CF7;--correct:#22C55E;--wrong:#EF4444;--bg:#F8FAFC;--card:#fff;--text:#1E293B;--sub:#64748B;--border:#E2E8F0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent}
.container{max-width:480px;margin:0 auto;padding:16px}
h1{font-size:20px;text-align:center;padding:20px 0;font-weight:700}
.home-card{background:var(--card);border-radius:16px;padding:24px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);cursor:pointer;transition:transform .15s;border:2px solid transparent}
.home-card:active{transform:scale(.97)}
.home-card .emoji{font-size:40px;margin-bottom:12px}
.home-card .title{font-size:18px;font-weight:700;margin-bottom:4px}
.home-card .desc{font-size:14px;color:var(--sub)}
.progress-bar{background:var(--border);border-radius:8px;height:6px;margin-bottom:16px;overflow:hidden}
.progress-fill{background:var(--primary);height:100%;border-radius:8px;transition:width .3s}
.progress-text{font-size:13px;color:var(--sub);text-align:center;margin-bottom:12px}
.q-card{background:var(--card);border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.q-num{font-size:13px;color:var(--primary);font-weight:700;margin-bottom:8px}
.q-text{font-size:15px;line-height:1.6;margin-bottom:16px;word-break:keep-all}
.option{display:flex;align-items:flex-start;padding:12px 14px;border:2px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer;transition:all .15s;font-size:14px;line-height:1.5;gap:10px}
.option:active{transform:scale(.98)}
.option.selected{border-color:var(--primary);background:#EEF2FF}
.option.correct{border-color:var(--correct);background:#F0FDF4}
.option.wrong{border-color:var(--wrong);background:#FEF2F2}
.option .circle{min-width:24px;height:24px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--sub);flex-shrink:0}
.option.selected .circle{border-color:var(--primary);background:var(--primary);color:#fff}
.option.correct .circle{border-color:var(--correct);background:var(--correct);color:#fff}
.option.wrong .circle{border-color:var(--wrong);background:var(--wrong);color:#fff}
.option-text{flex:1}
.btn{display:block;width:100%;padding:16px;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;transition:all .15s;text-align:center}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff}
.btn-outline{background:transparent;color:var(--primary);border:2px solid var(--primary);margin-top:10px}
.btn-group{position:fixed;bottom:0;left:0;right:0;background:var(--bg);padding:12px 16px;border-top:1px solid var(--border)}
.btn-group .container{padding:0;max-width:480px;margin:0 auto}
.btn-row{display:flex;gap:10px}
.btn-row .btn{flex:1}
.result-card{background:var(--card);border-radius:16px;padding:28px;text-align:center;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.score-circle{width:140px;height:140px;border-radius:50%;margin:0 auto 16px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:40px;font-weight:800}
.score-circle.pass{background:#DCFCE7;color:var(--correct)}
.score-circle.fail{background:#FEE2E2;color:var(--wrong)}
.score-circle small{font-size:14px;font-weight:500;margin-top:2px}
.score-label{font-size:15px;color:var(--sub);margin-top:8px}
.stat-row{display:flex;justify-content:space-around;margin-top:20px}
.stat-item{text-align:center}
.stat-num{font-size:22px;font-weight:700}
.stat-label{font-size:12px;color:var(--sub);margin-top:2px}
.review-toggle{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px}
.review-dot{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;cursor:pointer}
.review-dot.c{background:var(--correct)}
.review-dot.w{background:var(--wrong)}
.review-dot.s{background:var(--sub)}
.explain{background:#F1F5F9;border-radius:10px;padding:14px;margin-top:12px;font-size:13px;line-height:1.7;color:#475569}
.explain strong{color:var(--text)}
.top-nav{display:flex;align-items:center;padding:12px 0}
.back-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:8px;margin-left:-8px;color:var(--text)}
.scroll-pad{padding-bottom:90px}
.tab-bar{display:flex;background:var(--card);border-radius:12px;padding:4px;margin-bottom:16px;box-shadow:0 1px 2px rgba(0,0,0,.06)}
.tab{flex:1;padding:10px;text-align:center;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;color:var(--sub);transition:all .2s}
.tab.active{background:var(--primary);color:#fff}
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>
const EXAMS = {
bread: [{
  title: "모의고사 1회", desc: "60문제 · 해설 포함",
  questions: [
{q:"경구감염병의 예방대책으로 잘못된 것은?",o:["숙주 감수성 유지","식품취급자의 개인위생 관리","음용수의 위생 유지","환자 및 보균자의 발견과 격리"],a:0,e:"감수성은 숙주에 침입한 병원체에 대항하지 못하는 상태로 면역의 반대 의미이다. 감수성이 높을수록 감염이 잘 된다. 예방대책은 감수성을 '낮추는 것'이지 '유지'하는 것이 아니다."},
{q:"발효가 지나친 반죽으로 빵을 구웠을 때의 제품 특성이 아닌 것은?",o:["제품의 조직이 고르다.","부피가 작다.","시큼한 냄새가 있다.","빵 껍질 색이 밝다."],a:0,e:"발효가 지나친 반죽(지친 반죽)으로 빵을 구우면 부피가 처음에는 크게 나오지만 냉각 후 주저앉아 작게 되며, 발효 향이 강하여 시큼한 냄새가 나고, 잔당이 적어져 껍질 색이 밝게 나온다. 제품의 조직은 거칠다."},
{q:"빵을 구울 때 오븐 스프링(oven spring)이 일어나는 현상과 가장 적은 것은?",o:["캐리멜화가 일어나 껍질의 신장성을 증가시킨다.","탄산가스의 용해도가 감소한다.","알코올의 휘발로 증기압이 생긴다.","가스압이 증가한다."],a:0,e:"캐러멜화는 굽기 과정에서 표피 부분이 150~200°C 정도의 고온에서 갈색 물질을 생성하여 껍질 색을 진하게 만드는 반응으로 껍질의 신장성과는 관련이 없다. 오븐 스프링은 가스압과 수증기압의 증가, 알코올과 탄산가스의 증발로 인하여 일어난다."},
{q:"스펀지 도우법에 대한 설명으로 틀린 것은?",o:["스펀지 발효가 지나치면 제품의 기공이 두껍다.","밀가루에는 아밀라아제가 충분히 함유되어야 한다.","스펀지는 발효되는 동안 스펀지 브레이크 현상을 보인다.","스펀지 발효가 부족하면 빵 속의 색깔이 어둡게 된다."],a:3,e:"스펀지 도우법에서 스펀지 반죽에는 이스트의 먹이가 되는 설탕을 넣지 않기 때문에 아밀라아제가 풍부한 밀가루를 사용하며, 스펀지 발효가 부족해도 잔당이 많이 남지 않기 때문에 빵 속 색깔이 어둡지 않게 된다.\n※ 스펀지 브레이크: 발효 동안 시간이 경과함에 따라 스펀지 부피가 계속 증가하여 최대에 이르렀다가 줄어드는 지점"},
{q:"다음 식품첨가물 중 표백제가 아닌 것은?",o:["소브산","메타중아황산나트륨","아황산나트륨","차아황산나트륨"],a:0,e:"소브산(sorbic acid)은 주로 방부제로 사용되는 식품첨가물이다. 표백제가 아니다."},
{q:"냉동 반죽 제조 시 사용하는 재료에 대한 설명이 틀린 것은?",o:["가수율을 다소 줄여 냉동 중 얼음 결정에 의해 효모가 사멸되는 것을 방지한다.","단백질 함량이 높은 밀가루를 사용하면 해동, 발효 후 구울 때 부피가 큰 제품이 된다.","냉동 중 생성되는 글루타치온의 양을 줄이기 위해 효모 사용량을 줄인다.","반죽 산화제로 비타민 C 사용량을 늘린다."],a:2,e:"반죽을 냉동할 때 이스트가 동해를 입어 사멸할 때 글루타치온이 생성되어 반죽구조를 손상시킨다. 따라서 냉동 반죽 제조 시에 물의 사용량을 줄이고 효모의 사용량은 2배 늘린다."},
{q:"완제품이 500g 짜리인 식빵 4개를 만들려고 한다. 여기에 필요한 총 반죽량은 약 얼마인가?\n(단, 발효 손실 2%, 굽기 손실 12%이며, 결과값은 소수 첫째 자리에서 반올림한다.)",o:["2319g","2423g","1725g","2500g"],a:0,e:"완제품 중량 = 500×4 = 2000g\n굽기 손실 반영한 반죽무게 = 2000/(1-0.12) = 2273g\n발효 손실 반영한 반죽무게 = 2273/(1-0.02) = 2319g"},
{q:"액체발효법에서 사용하는 소포제(anti forming agent)로 적합하지 않은 것은?",o:["탄소수가 적은 지방산","분유","쇼트닝","실리콘 화합물"],a:1,e:"소포제는 발효 중 발생하는 거품을 억제하기 위해 사용되며, 일반적으로 탄소수가 적은 지방산, 쇼트닝, 실리콘 화합물 등이 효과적으로 사용된다. 분유는 소포제로 적합하지 않다."},
{q:"손에 화농성 염증이 있는 종사자가 만든 식품을 먹고 감염될 수 있는 식중독은?",o:["살모넬라 식중독","장염비브리오 식중독","보툴리누스 식중독","황색포도상구균 식중독"],a:3,e:"포도상구균은 화농성 질환의 대표적인 식품균으로 특히 황색포도상구균이 사람에게 병원성을 나타낸다. 화농성 질병이 있는 사람은 식품 취급을 하지 않아야 한다."},
{q:"빵 반죽 혼합 시 최종온도에 중요한 영향을 주는 요소와 거리가 먼 것은?",o:["이스트 온도","마찰계수","물 온도","밀가루 온도"],a:0,e:"빵 반죽 온도를 구할 때 밀가루, 물, 마찰계수가 중요한 인자이다. 이스트 온도는 사용량이 적어 최종 온도에 큰 영향을 미치지 않는다."},
{q:"다음 중 메일라드 반응(Maillard reaction)에 영향을 주는 요인으로 가장 영향력이 적은 것은?",o:["온도","수분","당의 종류","염류의 농도"],a:3,e:"메일라드 반응은 환원당과 단백질을 고온으로 가열하면 갈색의 중합체인 멜라노이딘을 생성하는 반응으로 온도가 높을수록, 수분의 양이 적을수록(수분활성도 0.6~0.8), 이당류보다 단당류(감미도가 높을수록 빠름)에서 빠르게 일어난다. 염류의 농도는 영향력이 가장 적다."},
{q:"성형한 식빵 반죽을 팬에 넣을 때 이음매의 위치는 어느 쪽이 가장 좋은가?",o:["위","아래","우측","좌측"],a:1,e:"반죽을 봉합한 이음매가 바닥을 향하지 않으면 2차 발효와 굽기 시 이음매가 벌어진다. 따라서 이음매는 아래쪽이 가장 좋다."},
{q:"탈지분유가 전지분유에 비해서 다른 점은?",o:["단백질이 풍부하다.","유당을 많이 함유한다.","지방질이 적다.","무기질이 적다."],a:2,e:"탈지분유는 지방을 거의 제거한 탈지유의 수분을 제거하여 분말화시킨 것이다. 따라서 전지분유에 비해 지방질이 적다."},
{q:"자연독식중독과 그 독성물질이 잘못 연결된 것은?",o:["테트로도톡신 – 복어중독","무스카린 – 버섯중독","베네루핀 – 모시조개중독","솔라닌 – 맥각중독"],a:3,e:"솔라닌은 감자의 싹과 녹색부위에 존재하는 감자독이다. 맥각중독을 일으키는 성분은 에르고타민, 에르고톡신이다."},
{q:"HACCP의 7원칙에 해당하지 않는 것은?",o:["한계기준 설정","문서화 및 기록유지방법 설정","HACCP 팀 구성","위해요소분석"],a:2,e:"HACCP은 준비 단계의 5절차와 적용단계의 7단계가 있으며, HACCP 팀 구성은 준비 단계 5절차 중에서 첫 번째이다. 7원칙에는 해당하지 않는다."},
{q:"빵굽기 과정에서 오븐 스프링(Oven spring)에 의한 반죽 부피의 팽창 정도로 가장 적당한 것은?",o:["본래 크기의 약 1/3 까지","본래 크기의 약 1/5 까지","본래 크기의 약 1/2 까지","본래 크기의 약 1/6 까지"],a:0,e:"오븐 스프링은 반죽 온도가 49°C 정도까지 오르면 급격히 부풀어 본래 크기 1/3 정도로 부피가 팽창하는 것을 말한다."},
{q:"달걀의 특징적 성분으로 지방의 유화력이 강한 성분은?",o:["스테롤(sterol)","세팔린(cephalin)","아비딘(avidin)","레시틴(lecithin)"],a:3,e:"달걀의 노른자에 들어있는 레시틴은 유화성이 좋아 천연 유화제로 사용된다."},
{q:"하루에 섭취하는 총에너지 중 식품 이용을 위한 에너지 소모량은 평균 얼마인가?",o:["30%","60%","10%","20%"],a:2,e:"식품 이용을 위한 에너지 소비량은 식품 섭취 후 소화, 흡수, 대사, 이동, 저장을 위해 필요한 에너지로, 일반적으로 총에너지 섭취량의 약 10% 정도이다."},
{q:"단맛의 강도 순서로 옳은 것은?",o:["과당 > 설탕 > 포도당 > 맥아당","맥아당 > 과당 > 설탕 > 포도당","설탕 > 과당 > 포도당 > 맥아당","포도당 > 설탕 > 과당 > 맥아당"],a:0,e:"감미도의 순서: 과당(170) > 전화당(135) > 설탕(100) > 포도당(74) > 맥아당(60) > 갈락토스(33) > 유당(16)"},
{q:"제과·제빵공장에서 생산관리 시 매일 점검할 사항이 아닌 것은?",o:["출근율","원재료율","제품당 평균 단가","설비 가동율"],a:2,e:"생산관리는 설비 가동률, 직원의 출근율, 원재료율 등을 매일 점검하여 손실을 방지하여야 한다. 제품당 평균 단가는 매일 확인하기보다는 주기적으로 점검해야 할 항목이다."},
{q:"향신료에 대한 설명으로 틀린 것은?",o:["스파이스는 주로 열대지방에서 생산되는 향신료로 뿌리 열매, 꽃, 나무껍질 등 다양한 부위가 이용된다.","박하는 뿌리에 함유된 약 1%의 박하유에 박하 향 물질이 이용된다.","허브는 주로 온대지방의 향신료로 식물의 잎이나 줄기가 주로 이용된다.","향신료는 고대 이집트, 중동 등에서 방부제, 의약품의 목적으로 사용되던 것이 식품에 이용된 것이다."],a:1,e:"박하는 잎에 함유된 박하유(페퍼민트 오일) 성분에서 특유의 향이 나오며, 뿌리가 아니라 잎이 주요 이용 부위이다."},
{q:"중간발효에 대한 설명으로 옳은 것은?",o:["중간발효 중 습도가 높으면 껍질이 형성되어 빵 속에 단단한 소용돌이가 생성된다.","상대습도 85% 전후로 시행한다.","중간발효가 잘되면 글루텐이 잘 발달한다.","중간발효 온도는 27~29°C가 적당하다."],a:3,e:"중간발효의 온도는 27~29°C가 적당하다.\n① 상대습도가 낮으면 표면이 건조하여 껍질이 형성될 수 있다.\n② 상대습도 70~75% 정도로 조절한다.\n③ 중간발효는 손상된 글루텐의 구조를 재정비하기 위하여 한다."},
{q:"식품에 미생물이 작용하여 부패시키는 과정에서 주로 식품의 표면에서 번식하는 것은?",o:["호기성 세균","혐기성 세균","통성혐기성 세균","미호기성 세균"],a:0,e:"호기성 세균은 산소가 있는 환경에서 생존하고 번식하는 세균으로 식품 표면에서 쉽게 증식한다.\n② 혐기성 세균: 산소가 없는 환경에서 번식하며, 주로 식품 내부나 밀폐된 환경에서 활동\n③ 통성혐기성 세균: 산소 유무에 상관없이 번식\n④ 미호기성 세균: 산소가 매우 적은 환경에서 자라는 세균"},
{q:"500g의 식빵을 2개 만들려고 한다. 총 배합률은 180%이고, 발효 손실은 1%, 굽기 손실은 12%라고 가정할 때 사용할 밀가루 무게는 약 얼마인가?\n(단, 계산의 답은 소수점 첫째 자리에서 반올림한다.)",o:["568g","284g","638g","319g"],a:2,e:"완제품의 무게: 500g×2 = 1000g\n발효손실 감안한 무게: 1000/(1-0.01) = 1010g\n굽기손실 감안한 무게: 1010/(1-0.12) = 1148g\n밀가루의 무게 = 밀가루 비율(%) × 총 반죽 무게 / 총 배합률(%)\n= 100% × 1148g / 180% = 638g"},
{q:"1차 발효 종말점을 판단하는 방법으로 틀린 것은?",o:["반죽 온도나 pH가 변한 것을 측정하여 판정한다.","반죽 표면을 손가락으로 찔러보아 판정한다.","소모된 발효 가능한 당의 양을 측정하여 판정한다.","발효 시간, 부피 팽창, 망상구조 등으로 판정한다."],a:2,e:"발효 완료 시점을 당의 양을 측정하여 판단하지 않는다. 1차 발효 상태의 확인은 ①, ②, ④의 방법으로 확인한다."},
{q:"밀가루 2000g, 총 배합률이 180%일 때 총 반죽 무게는?",o:["1800g","3600g","2000g","5400g"],a:1,e:"밀가루 무게 = 밀가루 비율 × 총 반죽무게 / 총 배합률\n2000g = 100% × x / 180%\nx = 2000 × 180 / 100 = 3600g"},
{q:"유용한 장내세균의 발육을 촉진하여 정장 작용을 하는 당은?",o:["포도당","유당","설탕","맥아당"],a:1,e:"유당(lactose)은 장내 유익균(비피더스균 등)의 성장을 촉진하여 정장 작용을 한다."},
{q:"일반적인 스펀지도법으로 식빵을 만들 때 본반죽(dough)의 가장 적당한 온도는?",o:["27°C 정도","34°C 정도","24°C 정도","30°C 정도"],a:0,e:"스펀지도법에서 본반죽의 적정 온도는 27°C 정도이다."},
{q:"제빵에서의 수분 분포에 관한 설명으로 틀린 것은?",o:["발효를 거치는 동안 전분의 가수분해에 의해서 반죽 내 수분량이 변화한다.","물이 반죽에 균일하게 분산되는 시간은 보통 10분 정도이다.","소금은 글루텐을 단단하게 하여 글루텐 흡수량을 감소시킨다.","1차 발효와 2차 발효를 거치는 동안 생성된 수분은 대부분 전분에 의해 흡수된다."],a:3,e:"1차, 2차 발효 중 생성된 수분은 대부분 전분이 아닌 글루텐에 의해 흡수된다."},
{q:"다음 중 인수공통감염병은?",o:["장티푸스","콜레라","세균성 이질","탄저"],a:3,e:"탄저는 동물과 사람 모두에게 감염될 수 있는 인수공통감염병이다. 장티푸스, 콜레라, 세균성 이질은 사람 간 전파되는 감염병이다."},
{q:"파리가 전파하는 질병이 아닌 것은?",o:["발진티푸스","파라티푸스","회충","결핵"],a:3,e:"결핵은 공기 매개 감염(비말핵 감염)으로 파리가 전파하지 않는다."},
{q:"효소를 구성하는 주요 구성 물질은?",o:["지질","탄수화물","비타민","단백질"],a:3,e:"효소는 생체 내 화학반응을 촉매하는 물질로, 주요 구성 물질은 단백질이다."},
{q:"소독제와 그 소독 효과의 관계가 옳은 것은?",o:["크레졸 – DNA 파괴","염소 – 단백질 변성","과산화수소 – 단백질 응고","역성비누 – 세포벽 손상"],a:1,e:"염소는 미생물의 단백질을 변성시켜 소독 효과를 나타낸다."},
{q:"강력분과 박력분의 성상에서 가장 중요한 차이점은?",o:["전분 함량의 차이","비타민 함량의 차이","지방 함량의 차이","단백질 함량의 차이"],a:3,e:"강력분과 박력분의 가장 중요한 차이는 단백질(글루텐) 함량이다. 강력분은 단백질 함량이 높고, 박력분은 낮다."},
{q:"외부가치 7100만원, 생산가치 3000만원, 인건비 1400만원인 경우 노동 분배율은 약 얼마인가?",o:["237%","20%","47%","42%"],a:2,e:"노동분배율 = 인건비/생산가치 × 100\n= 1400/3000 × 100 = 46.7% ≈ 47%"},
{q:"빵 재반죽의 발효에 필수적인 재료가 아닌 것은?",o:["분유","밀가루","이스트","물"],a:0,e:"빵 재반죽의 발효에 필수적인 재료는 밀가루, 이스트, 물이다. 분유는 필수 재료가 아니다."},
{q:"미생물이 탄수화물을 분해하였을 때 생성될 수 있는 물질은?",o:["암모니아","메르캅탄","젖산","아민류"],a:2,e:"탄수화물 분해(발효) 시 젖산, 알코올, 초산 등이 생성된다. 암모니아, 메르캅탄, 아민류는 단백질 분해 산물이다."},
{q:"다음 중 빵의 노화가 가장 빨리 진행되는 온도는?",o:["0°C","-18°C","20°C","35°C"],a:0,e:"빵의 노화(staling)는 0~5°C에서 가장 빠르게 진행된다. -18°C 이하에서는 노화가 억제되고, 높은 온도에서는 상대적으로 느리다."},
{q:"팥 앙금빵을 제조 시 주의 사항으로 틀린 것은?",o:["발효가 완료되면 달걀물을 칠해준다.","팥앙금은 미리 치대어 놓는다.","분할 무게 45g에 앙금은 30g 정도가 좋다.","앙금이 반죽 밑으로 내려가게 한다."],a:3,e:"앙금이 반죽 밑으로 내려가면 굽는 과정에서 바닥이 타거나 모양이 변형될 수 있다. 앙금은 반죽 중앙에 위치해야 한다."},
{q:"부종이 심한 사람에게 특히 제한해야 하는 무기질은?",o:["Fe","P","Ca","Na"],a:3,e:"나트륨(Na)은 체내 수분 보유를 촉진하므로 부종이 심한 사람에게 제한해야 한다."},
{q:"제빵 시 혼합 시간에 관한 설명 중 틀린 것은?",o:["저울배합은 고울배합에 비해 혼합시간이 길다.","단백질 함량이 높은 밀가루는 혼합시간이 길다.","온도가 높으면 혼합시간이 짧아진다.","소금 사용량이 많으면 혼합시간이 길어진다."],a:0,e:"저울배합(lean formula)은 유지/설탕이 적어 글루텐 발달이 빠르므로 혼합시간이 짧다. 고울배합(rich formula)은 유지/설탕이 많아 글루텐 발달을 방해하므로 혼합시간이 길다."},
{q:"적혈구의 혈색소 감소, 체중감소 및 신장장해, 칼슘대사 이상과 호흡장해를 유발하는 유해성 금속물질은?",o:["아연(Zn)","납(Pb)","주석(Sn)","구리(Cu)"],a:1,e:"납(Pb)은 적혈구 혈색소 감소, 체중감소, 신장장해, 칼슘대사 이상 등을 유발하는 유해성 금속물질이다."},
{q:"탄소 수가 아래와 같을 때, 일반적으로 포화지방산의 융점이 가장 높아 상온에서 가장 딱딱한 유지가 되는 것은?\n(ⓐ 6개, ⓑ 10개, ⓒ 14개, ⓓ 18개)",o:["ⓑ","ⓒ","ⓐ","ⓓ"],a:3,e:"포화지방산의 탄소 수가 많을수록(사슬이 길수록) 융점이 높아 상온에서 더 딱딱한 유지가 된다. 따라서 탄소 수 18개(ⓓ)가 가장 딱딱하다."},
{q:"다음 중 식품위생법에서 정하는 식품접객업에 속하지 않는 것은?",o:["제과점","휴게음식점","식품소분업","유흥주점"],a:2,e:"식품접객업에는 휴게음식점, 일반음식점, 단란주점, 유흥주점, 위탁 급식, 제과점 영업이 있다. 식품소분업은 식품접객업에 해당하지 않는다."},
{q:"충전물 제조에 필요한 안정제에 대한 설명으로 틀린 것은?",o:["겔화제라고도 한다.","과일 필링에 농후제로 로커스트 빈 검을 주로 사용한다.","증점제라고도 한다.","과일 필링에 전분은 증점제로 쓰지 않는다."],a:3,e:"과일 필링(Fruit Filling)에는 전분, 로커스트 빈 검, 젤라틴 등을 증점제로 사용하여 필링의 점도를 조절하고 안정성을 유지한다. 전분도 증점제로 사용된다."},
{q:"굽기 과정 중 일어나는 현상에 대한 설명 중 틀린 것은?",o:["단백질 변성과 효소의 불활성화","효소의 활성과 향의 발달","오븐 팽창과 전분 호화 발생","캐러멜화와 갈변 반응의 억제"],a:3,e:"굽기 과정에서 150~160°C가 넘어가면 캐러멜화와 마이야르 반응의 갈변반응이 일어나 껍질 색이 진하게 된다. 갈변 반응은 '억제'되는 것이 아니라 '촉진'된다.\n①② 굽기 과정 중 효소는 60°C까지 활발해지고, 60°C 이상이 되면 서서히 감소하다가 불활성화된다."},
{q:"초콜릿 제조 공정 중 1차 가공과 2차 가공에 해당하는 작업의 연결이 옳은 것은?",o:["1차 가공 : 분쇄, 2차 가공 : 볶기","1차 가공 : 정제, 2차 가공 : 정형","1차 가공 : 정제, 2차 가공 : 템퍼링","1차 가공 : 껍질 제거, 2차 가공 : 콘칭"],a:2,e:"초콜릿 제조 공정에서 1차 가공에서는 카카오 빈을 정제하여 카카오 매스를 만들고, 2차 가공에서는 이 카카오 매스를 템퍼링하여 초콜릿의 질감을 개선하고 광택을 부여한다."},
{q:"퐁당(Fondant) 제조 시 아이싱의 끈적거림 방지법으로 잘못된 것은?",o:["아이싱에 최소의 액체를 사용한다.","80°C로 가온한 아이싱 크림을 사용한다.","굳은 퐁당(Fondant)을 여리게 할 때 설탕 시럽을 첨가한다.","전분이나 밀가루와 같은 흡수제를 사용한다."],a:1,e:"아이싱의 끈적거림을 방지하는 방법으로 ①과 ④의 방법과 40°C 정도의 가온한 아이싱 크림을 사용한다. 80°C는 너무 높은 온도이다.\n③ 굳은 퐁당을 여리게 할 때 소량의 물을 넣고 가온하거나 설탕 시럽을 첨가한다."},
{q:"다음 중 교차오염의 원인과 거리가 먼 것은?",o:["설치류와 해충","종사자(작업자)의 손","휘파와 고무주걱","식품첨가물"],a:3,e:"식품첨가물은 교차오염과 가장 거리가 멀다.\n※ 교차오염은 오염된 물질이 다른 식품, 조리도구, 기구, 표면 등을 통해 전파되는 현상이다."},
{q:"제빵에서 유지의 기능이 아닌 것은?",o:["연화 작용","공기 포집","저장성 향상","흡수율 증가"],a:3,e:"제빵에서 유지의 기능은 쇼트닝성, 가소성, 크림성, 유화성, 안정성, 저장성, 식감 등이며, 흡수율은 유지의 기능이 아니다."},
{q:"물과 기름처럼 서로 혼합이 잘 되지 않는 두 종류의 액체를 혼합, 분산시켜주는 첨가물은?",o:["팽창제","유화제","피막제","소포제"],a:1,e:"물과 기름처럼 서로 혼합되지 않는 두 종류의 액체를 혼합시켜 주는 첨가물은 유화제이다."},
{q:"작업장 내 설비기기에 대한 관리로 틀린 것은?",o:["세척, 소독 시설은 용도별로 구별하여 사용한다.","냉장고 내부에 온도표시 판넬을 설치하여 안전한 유지관리가 되도록 한다.","작업장 내에는 기구 등을 세척하거나 소독할 수 있는 시설이나 장비를 갖추고 있어야 한다.","이물질, 찌든 때 등은 설비기기 사용 후 제거되어야 한다."],a:1,e:"작업장에서 냉장고의 온도표시 판넬을 내부에 설치하면 확인이 어렵고, 온도측정 장비가 습기나 내부 상태에 따라 손상될 가능성이 높기 때문에 외부에 설치하는 것이 효율적이다."},
{q:"제빵용 믹서의 종류에 속하지 않는 것은?",o:["수직 믹서","원형 믹서","수평 믹서","스파이럴 믹서"],a:1,e:"제과 및 제빵용 믹서로 수평믹서, 수직믹서, 스파이럴믹서, 연속식 믹서 등이 사용된다. 원형 믹서는 제과제빵에서 분류되는 믹서의 종류가 아니다."},
{q:"이스트 푸드를 구성하는 각 성분의 역할로 틀린 것은?",o:["아스코르브산 – 반죽의 되기 증가","제1인산칼슘 – 반죽의 pH 조절","황산칼슘 – 물의 경도 조절","황산암모늄 – 이스트의 발효 촉진"],a:0,e:"아스코르브산(비타민 C)은 반죽조절제(산화제)로 사용되어 글루텐 구조를 강화하고, 반죽의 탄력을 높이는 역할을 한다. 하지만 반죽의 되기를 조절하지는 않는다."},
{q:"팬기름의 사용에 대한 설명으로 거리가 먼 것은?",o:["발연점이 높아야 한다.","산패에 강해야 한다.","반죽 무게의 3~4%를 사용한다.","기름이 과다하면 바닥 껍질이 두껍고 색이 어둡다."],a:2,e:"팬닝 시 사용하는 팬기름은 반죽 무게의 0.1~0.2% 정도를 사용한다. 3~4%는 과다한 양이다."},
{q:"제빵 시 굽기 및 냉각 손실이 12%이고, 완제품이 500g이라면 분할량은 약 얼마인가?",o:["585g","575g","568g","580g"],a:2,e:"냉각 손실을 감안한 분할량: 500g/(1-0.12) = 568g"},
{q:"식빵의 냉각 방법 중 자연 냉각 시 일반적으로 소요되는 시간은?",o:["3시간","30분","6시간","1시간"],a:0,e:"자연 냉각은 바람이 없는 실내의 실온에서 3~4시간 정도 냉각시키는 방법이다."},
{q:"다음 중 효소에 대한 설명으로 틀린 것은?",o:["효소는 특정 기질에 선택적으로 작용하는 기질 특이성이 있다.","효소반응은 온도, pH, 기질 농도 등에 영향을 받는다.","β-아밀라아제를 액화효소, α-아밀라아제를 당화효소라고 한다.","생체 내의 화학반응을 촉진하는 생체촉매이다."],a:2,e:"α-아밀라아제를 액화효소, β-아밀라아제를 당화효소라 한다. 보기에서는 반대로 서술하고 있으므로 틀린 설명이다."},
{q:"스펀지도법에서 스펀지의 밀가루 비율을 증가시킴으로서 얻을 수 있는 효과가 아닌 것은?",o:["풍미의 증가","기계설비 감소","도(dough) 발효시간 단축","도(dough) 반죽시간 단축"],a:1,e:"스펀지 도우법에서 스펀지의 밀가루 사용량이 늘어나면 ① 풍미 증가, ③ 발효시간 단축, ④ 반죽시간 단축의 효과가 있다. 기계설비가 감소하지는 않는다."},
{q:"표준 스트레이트법에서 반죽의 온도로 적합한 것은?",o:["22 ~ 24°C","29 ~ 30°C","18 ~ 20°C","26 ~ 27°C"],a:3,e:"표준 스트레이트법에서 적정 반죽 온도는 26~27°C이다."}
]},

{q:"향신료(spice& herb)에 대한 설명으로 틀린 것은?",o:["향신료는 주로 전분질 식품의 맛을 내는데 사용된다.","향신료는 고대 이집트, 중동 등에서 방부제, 의약품의 목적으로 사용되던 것이 식품으로 이용된 것이다.","스파이스는 주로 열대지방에서 생산되는 향신료로 뿌리, 열매, 꽃, 나무껍질 등 다양한 부위가 이용된다.","허브는 주로 온대지방의 향신료로 식물의 잎이나 줄기가 주로 이용된다."],a:0},

{q:"블랜딩법으로 제조할 경우 해당하는 사항은?",o:["달걀과 설탕을 넣고 거품 올리기 전 온도를 43℃로 중탕한다.","21℃ 정도의 품온을 갖는 유지를 사용하여 배합을 한다.","젖은상태(wet peak) 머랭을 사용하여 밀가루와 혼합한다.","반죽기의 반죽속도는 고속-중속-고속의 순서로 진행한다."],a:1},

{q:"다음 중 숙성한 밀가루에 대한 설명으로 틀린 것은?",o:["밀가루의 황색색소가 공기 중의 산소에 의해 더욱 진해진다.","환원성 물질이 산화되어 반죽의 글루텐 파괴가 줄어든다.","밀가루의 ph가 낮아져 발효가 촉진된다.","글루텐의 질이 개선되고 흡수성을 좋게 한다."],a:0},
{q:"빵, 과자 중에 많이 함유된 탄수화물이 소화, 흡수되어 수행하는 기능이 아닌 것은?",o:["에너지를 공급한다.","단백질 절약 작용을 한다.","뼈를 자라게 한다.","분해되면 포도당이 생성된다."],a:2},
{q:"단당류의 성질에 대한 설명 중 틀린 것은?",o:["선광성이 있다.","물에 용해되어 단맛을 가진다.","산화되어 다양한 알코올을 생성한다.","분자내의 카르보닐기에 의하여 환원성을 가진다."],a:2},
{q:"생체 내에서 지방의 기능으로 틀린 것은?",o:["생체기관을 보호한다.","체온을 유지한다.","효소의 주요 구성 성분이다.","주요한 에너지원이다."],a:2},
{q:"트립토판 360 mg은 체내에서 니아신 몇 mg으로 전환 되는가?",o:["0.6 mg","6 mg","36 mg","60 mg"],a:1},
{q:"다음 중 체중 1kg당 단백질 권장량이 가장 많은 대상으로 옳은 것은?",o:["1~2세 유아","9~11세 여자","15~19세 남자","65세 이상 노인"],a:0},
{q:"원인균이 내열성포자를 형성하기 때문에 병든 가축의 사체를 처리할 경우 반드시 소각처리 하여야 하는 인수공통감염병은?",o:["돈단독","결핵","파상열","탄저병"],a:3},
{q:"해수세균의 일종으로 식염농도 3%에서 잘 생육하며 어패류를 생식할 경우 중독될 수 있는 균은?",o:["보툴리누스균","장염 비브리오균","웰치균","살모넬라균"],a:1},
{q:"다음 중 유지의 산화방지를 목적으로 사용되는 산화 방지제는?",o:["Vitamin B","Vitamin D","Vitamin E","Vitamin K"],a:2},
{q:"다음 중 사용이 허가되지 않은 유해감미료는?",o:["사카린(Saccharin)","아스파탐(Aspartame)","소프비톨(Sorbitol)","둘신(Dulcin)"],a:3},
{q:"화농성 질병이 있는 사람이 만든 제품을 먹고 식중독을 일으켰다면 가장 관계가 깊은 원인균은?",o:["장염비브리오균","살모넬라균","보툴리누스균","황색포도상구균"],a:3},
{q:"미나마타병은 어떤 중금속에 오염된 어패류의 섭취 시 발생되는가?",o:["수은","카드뮴","납","아연"],a:0},
{q:"세균의 대표적인 3가지 형태분류에 포함되지 않는 것은?",o:["구균(coccus)","나선균(spirillum)","간균(bacillus)","페니실린균(penicillium)"],a:3},
{q:"경구전염병의 예방법으로 부적합한 것은?",o:["모든 식품을 일광 소독한다.","감염원이나 오염물을 소독한다.","보균자의 식품취급을 금한다.","주위환경을 청결히 한다."],a:0},
{q:"질병 발생의 3대 요소가 아닌 것은?",o:["병인","환경","숙주","항생제"],a:3},
{q:"다음 중 조리사의 직무가 아닌 것은?",o:["집단급식소에서의 식단에 따른 조리 업무","구매식품의 검수 지원","집단급식소의 운영일지 작성","급식설비 및 기구의 위생, 안전 실무"],a:2}
]}

cake: [{
  title: "모의고사 1회", desc: "60문제 · 해설 포함",
  questions: [
{q:"스펀지케이크를 만드는 재료 중에서 연화작용과 관계없는 재료는?",o:["노른자","흰자","팽창제","설탕"],a:2,e:"스펀지케이크는 달걀의 거품성을 이용하여 팽창시키는 제품으로, 팽창제는 거의 사용을 하지 않으며 연화작용과도 가장 관련성이 없다.\n• 스펀지 케이크의 4대 재료: 밀가루(박력분), 설탕, 달걀, 소금"},
{q:"다음 공장 설비 중 제품의 생산능력은 최종적으로 어떤 설비가 가장 중요한 기준이 되는가?",o:["발효기","오븐","작업 테이블","믹서"],a:1,e:"공장에서 제품의 생산능력은 오븐을 기준으로 한다. 오븐의 생산능력보다 믹서와 발효실에서 만들어지는 반죽이 많으면 반죽이 지킬 수 있기 때문이다."},
{q:"생산부서의 지난 달 원가관련 자료가 아래와 같을 때 생산가치율은 얼마인가?\n(근로자: 100명, 인건비: 170,000,000, 생산액: 1,000,000,000, 외부가치: 700,000,000, 생산가치: 300,000,000, 감가상각비: 20,000,000)",o:["35%","40%","25%","30%"],a:3,e:"생산가치율(%) = 생산가치/생산금액 × 100\n= 300,000,000/1,000,000,000 × 100 = 30%"},
{q:"신장독성을 나타내는 황변미독은?",o:["시트레오비리딘(citreoviridin)","시트리닌(citrinin)","루테오스키린(luteoskyrin)","아이슬란디톡신(islanditoxin)"],a:1,e:"신장독성을 나타내는 황변미독은 시트리닌이다."},
{q:"다음 중 제빵용 효모에 함유되어 있지 않은 효소는?",o:["인버타아제","락타아제","프로테아제","말타아제"],a:1,e:"이스트에는 유당(락토스)을 분해하는 효소(락타아제)가 없어서 유당을 분해하지 못한다. 제빵용 효모에는 말타아제, 인버타아제, 프로테아제, 짜마아제, 리파아제 등의 효소가 들어있다."},
{q:"식품첨가물인 규소수지의 용도는?",o:["추출제","거품제거제","피막제","이형제"],a:1,e:"거품제거제(소포제)는 거품생성을 방지하거나 감소시키는 첨가물로 규소수지(실리콘수지) 1종만 허용되어 있다."},
{q:"커스터드 크림과 생크림을 혼합하여 제조한 제품은?",o:["로얄 아이싱(royal icing)","디프로매트 크림(diplomat cream)","퐁당(fondant)","사워 크림(sour cream)"],a:1,e:"디프로매트 크림은 우유로 만든 커스터드 크림에 생크림을 혼합하여 부드럽고 가벼운 질감을 준다."},
{q:"밀가루에 충전용 유지를 넣고 스크래퍼를 이용하여 유지와 밀가루를 섞어가며 유지를 잘라 사용하는 방법은 무엇이라 하는가?",o:["스코틀랜드식법","영국식법","프랑스식법","미국식법"],a:0,e:"파프 페이스트리 제조 과정의 스코틀랜드식에 대한 설명이다. 프랑스식(접이식 반죽 또는 롤인타입)은 밀가루에 물과 유지의 일부를 넣어 글루텐을 발전시켜 반죽한 후, 충전용 유지를 넣어 밀어내고 접기를 반복한다."},
{q:"베이킹파우더를 많이 사용한 제품의 결과와 거리가 먼 것은?",o:["밀도가 크고 부피가 작다.","속 색이 어둡다.","오븐 스프링이 커서 찌그러들기 쉽다.","속결이 거칠다."],a:0,e:"베이킹파우더를 많이 사용하면 밀도가 작고 부피가 크다(과도하게 팽창). 속 색이 어두워지고, 찌그러들기 쉬우며, 속결이 거칠어진다."},
{q:"다음 중 반죽형 케이크에 대한 설명으로 틀린 것은?",o:["밀가루, 달걀, 분유 등과 같은 재료에 의해 케이크의 구조가 형성된다.","유지의 공기 포집력, 화학적 팽창제에 의해 부피가 팽창하기 때문에 부드럽다.","제품의 특징은 기공이 크고 가볍다.","레이어 케이크, 파운드 케이크, 마들렌 등이 반죽형 케이크에 해당된다."],a:2,e:"반죽형 케이크는 기공이 작고 촘촘하며, 밀도가 높은 편이다. 기공이 크고 가벼운 케이크는 거품형 케이크의 특징이다."},
{q:"짜는 형태의 쿠키에 분당을 사용하는 이유로 가장 알맞은 것은?",o:["퍼짐이 커진다.","감미도가 낮아진다.","제품의 형태를 잘 유지한다.","가격이 저렴하다."],a:2,e:"쿠키 반죽 중에 남아있는 설탕은 쿠키의 퍼짐에 중요한 영향을 미치는데, 고운 입자의 설탕(분당)은 퍼짐성이 나쁘며 조밀하고 밀집된 기공을 만들기 때문에 짜는 형태의 쿠키에서 형태를 잘 유지할 수 있도록 한다.\n※ 입자가 굵은 설탕은 퍼짐성이 좋다."},
{q:"아밀라아제(amylase)는 무엇을 분해하는가?",o:["탄수화물","비타민","지방질","단백질"],a:0,e:"아밀라아제는 탄수화물을 분해하는 효소로 전분을 맥아당으로 분해한다."},
{q:"케이크 제조 시 제품의 부피가 크게 팽창했다가 가라앉는 원인이 아닌 것은?",o:["설탕 사용의 부족","베이킹파우더 증가","밀가루 사용의 부족","물 사용량의 증가"],a:0,e:"설탕의 사용량이 적은 경우 비중이 감소하고, 기공이 닫혀 단단한 조직감과 반죽의 팽창이 적게 일어나 최종 제품의 부피가 작아진다. 크게 팽창했다가 가라앉는 현상의 원인은 아니다."},
{q:"pH가 5인 물을 증류수로 100배 희석했을 때 pH는?",o:["9","3","7","5"],a:2,e:"pH 1만큼의 차이는 수소이온농도 10배의 차이를 말한다. pH 1을 상승시키려면 중성의 물을 10배 희석해야 하므로 100배로 희석하면 pH가 2만큼 상승되어 pH 7이 된다."},
{q:"다음 중 필수지방산이 아닌 것은?",o:["리놀레산","아라키돈산","스테아르산","리놀렌산"],a:2,e:"필수지방산은 리놀레산, 리놀렌산(식물성), 아라키돈산(동물성)이 있다. 스테아르산은 포화지방산으로 필수지방산이 아니다."},
{q:"다음 중 익히는 방법이 나머지 셋과 다른 것은?",o:["엔젤푸드 케이크","파운드케이크","스펀지케이크","찜 케이크"],a:3,e:"엔젤푸드 케이크, 파운드케이크, 스펀지케이크는 오븐에서 굽는 방식이며, 찜 케이크는 찜통에서 증기로 익히는 방식이다."},
{q:"카카오의 배유에 대한 설명으로 옳은 것은?",o:["좋은 초콜릿을 만들기 위해서는 한 종류의 배유로 혼합한다.","배유를 카카오 빈이라고 한다.","카카오 버터가 많이 함유되어 있다.","단백질과 무질소 추출물이 많다."],a:2,e:"① 다양한 품종의 배유를 혼합하면 복합적이고 풍부한 맛을 얻을 수 있어 좋은 초콜릿을 만들 수 있다.\n② 카카오 원두를 카카오 빈이라 한다.\n④ 카카오 배유에는 카카오 버터가 많이 함유하고 있으며, 단백질과 무질소 추출물의 함량은 높지 않다."},
{q:"케이크 제조에 있어 달걀의 기능으로 가장 거리가 먼 것은?",o:["결합작용","팽창작용","착색작용","유화작용"],a:0,e:"달걀은 케이크 제조에서 유화제, 팽창제 등으로 사용된다. 달걀노른자의 카로티노이드 색소로 약간의 착색작용도 있으나 보기 중에서 결합작용이 가장 거리가 멀다."},
{q:"생크림 원료를 가열하거나 냉동시키지 않고 직접 사용할 수 있게 보존하는 적합한 온도는?",o:["-18°C 이하","15 ~ 18°C","3 ~ 5°C","21°C 이상"],a:2,e:"생크림의 적정 보관온도는 0~10°C이며, 휘핑할 때 적정 품온은 3~7°C 정도이다."},
{q:"복어 중독을 일으키는 성분은?",o:["무스카린","솔라닌","아코티닌","테트로도톡신"],a:3,e:"복어 중독을 일으키는 독성물질은 테트로도톡신이다.\n무스카린 – 독버섯, 솔라닌 – 감자, 아코티닌 - 투구꽃"},
{q:"시간과 노력이 절감되는 케이크 반죽방법은?",o:["1단계법","설탕/물법","블렌딩법","크림법"],a:0,e:"1단계법은 모든 재료를 한꺼번에 넣고 반죽하는 방법으로 시간과 노동력을 절약할 수 있어 대량생산에 적합하다."},
{q:"특이동적 작용이 강하여 과잉 섭취하였을 경우 체온과 혈압이 증가하며 피로가 쉽게 오는 영양소는?",o:["비타민","지방","단백질","탄수화물"],a:2,e:"특이동적 작용은 섭식 후 대사활동이 일반적인 수준 이상으로 이루어져 에너지 소비량이 증가되는 현상으로 특히 단백질이 과잉 섭취하였을 때 체온과 혈압이 증가하여 피로가 쉽게 올 수 있다."},
{q:"쇼트브레드 쿠키 제조 시 성형을 용이하게 하기 위한 조치 사항으로 옳은 것은?",o:["반죽을 실온에서 말린 후 성형한다.","반죽 완료 후 휴지를 시켜 가소성을 갖도록 한다.","밀가루의 글루텐이 발달하도록 오랫동안 믹싱한다.","액체 재료의 사용량을 늘려 반죽을 무르게 한다."],a:1,e:"쇼트브레드 쿠키는 유지를 많이 사용하는 제품으로 유지가 녹아 흐르지 않도록 반죽을 차게 만들고, 반죽 완료 후 냉장 온도에서 휴지시켜 가소성을 갖도록 하면 성형이 용이해지고 모양도 잘 유지된다."},
{q:"슈의 제조 공정상 구울 때 주의할 사항 중 잘못된 것은?",o:["너무 빨리 오븐에서 꺼내면 찌그러지거나 주저앉기 쉽다.","220°C 정도의 오븐에서 바삭한 상태로 굽는다.","너무 빠른 껍질 형성을 막기 위해 처음에 윗불을 약하게 한다.","굽는 중간 오븐 문을 자주 여닫아 수증기를 제거한다."],a:3,e:"슈는 굽기 중 발생하는 증기압으로 팽창하는 제품으로 굽기 중에 오븐의 문을 자주 열면 찬 공기가 유입되어 슈의 팽창을 방해하여 슈가 주저앉는 원인이 된다."},
{q:"쥐가 직간접으로 옮기는 질병이 아닌 것은?",o:["신증후군출혈열","말라리아","살모넬라증","페스트"],a:1,e:"쥐가 매개하는 질병으로는 신증후군출혈열, 페스트, 렙토스피라증, 쯔쯔가무시병, 살모넬라증 등이 있다. 말라리아는 모기가 매개하는 질병이다."},
{q:"다음 중 세균성 식중독 중 일반적으로 치사율이 가장 높은 것은?",o:["장염 비브리오에 의한 식중독","포도상구균에 의한 식중독","살모넬라균에 의한 식중독","보툴리누스균에 의한 식중독"],a:3,e:"세균성 식중독 중에서 가장 치사율이 높은 식중독은 보툴리누스균에 의한 식중독이다. 보툴리누스균은 강력한 신경독소를 생성하여 치사율이 매우 높다."},
{q:"식품위생법에서 식품을 제조, 가공, 조리 또는 보존하는 과정에서 감미, 착색, 표백 또는 산화방지 등을 목적으로 식품에 사용되는 물질로 정의한 것은?",o:["식품재료물","식품포장물","식품가공물","식품첨가물"],a:3,e:"식품첨가물에 대한 정의이다."},
{q:"화이트 레이어 케이크에서 밀가루 100%, 설탕 120%, 유화 쇼트닝 54%를 사용한 경우 우유 사용량은?",o:["85%","90%","80%","72%"],a:3,e:"• 흰자 사용량 = 쇼트닝×1.43 = 54×1.43 = 77.2\n• 우유 사용량 = 설탕+30-흰자 = 120+30-77.2 = 72.8%"},
{q:"반죽형의 부드러움과 거품형의 기공과 조직을 갖춘 제품을 만들고자 할 때 사용되는 반죽법은?",o:["블렌딩법","크림법","시퐁법","별립법"],a:2,e:"시풍형 반죽은 흰자와 설탕을 섞어 거품형의 머랭을 만들고, 노른자는 다른 재료와 혼합하여 반죽형 반죽을 만든 후 두 가지를 혼합하여 제품을 만드는 방식으로 거품형의 기공과 반죽형의 부드러움을 가지는 반죽이다."},
{q:"제빵에서 밀가루, 이스트, 물과 함께 기본적인 필수재료는?",o:["유지","소금","분유","설탕"],a:1,e:"제빵에서 4대 기본재료는 밀가루, 이스트, 물, 소금이다."},
{q:"도넛의 튀김 기름이 갖추어야 할 조건은?",o:["산패취가 없다.","산화와 가수분해가 쉽게 일어난다.","저장 중 안정성이 낮다.","발연점이 낮다."],a:0,e:"튀김기름은 발연점이 높고, 산패에 대한 안정성이 있어야 하며, 저장 중 안정성이 높아야 한다. 산패취가 없어야 한다."},
{q:"아이싱이 너무 되게 제조되었을 경우의 조치법으로 틀린 것은?",o:["설탕시럽(설탕 : 물 = 2 : 1)을 사용한다.","물을 사용한다.","젤라틴 분말을 사용한다.","가온을 시킨다."],a:2,e:"아이싱이 굳어지거나 너무 되게 제조되었을 때 소량의 물을 넣고 43°C로 만들어주거나 설탕 시럽(설탕:물=2:1)을 더 넣어 연하게 만든다. 젤라틴 분말은 오히려 아이싱을 더 단단하게 만든다.\n※ 아이싱의 끈적거림을 방지하기 위해 안정제(젤라틴, 한천 등)나 흡수제(전분, 밀가루 등)를 사용한다."},
{q:"다음 중 환원당이 아닌 당은?",o:["과당","포도당","맥아당","자당"],a:3,e:"모든 단당류와 맥아당, 유당은 환원당이고, 설탕(자당)과 전분은 비환원당이다."},
{q:"2차 발효에 있어서 발효실 관리에 중요한 요인이 아닌 것은?",o:["발효 시간","성형 모양","발효 온도","내부 습도"],a:1,e:"2차 발효 발효실의 중요한 관리 요소는 발효 온도, 발효 시간, 내부 습도(상대 습도)이다. 성형 모양은 발효실 관리 요인이 아니다."},
{q:"다음 중 동물성 유지에 해당하는 것은?",o:["대두유","코코아 버터","면실유","버터"],a:3,e:"버터는 우유 지방 80% 이상인 동물성 유지이다. 대두유, 코코아 버터, 면실유는 식물성 유지이다."},
{q:"전통적인 스펀지케이크 반죽과 제노와즈 반죽의 가장 큰 차이점은?",o:["유지 함량","설탕 함량","달걀 함량","밀가루 함량"],a:0,e:"제노와즈 반죽은 스펀지케이크 반죽에 유지를 녹여 만드는 방법으로 스펀지케이크보다 부드러운 제품을 만들 수 있다. 가장 큰 차이점은 유지 함량이다."},
{q:"식품의 부패와 미생물에 대한 설명이 옳은 것은?",o:["식품을 냉장 저장하면 미생물이 사멸되므로 부패를 완전히 막을 수 있다.","부패하기 쉬운 식품에는 수분과 영양원이 충분하므로 온도관리가 중요하다.","일단 냉동시켰던 식품도 해동하여도 세균이 증식될 수 없다.","어패류의 부패에 관계하는 세균은 주로 고온균이다."],a:1,e:"① 냉장 저장은 미생물을 사멸시키지 못하고, 성장속도만 늦춘다.\n③ 냉동했던 식품도 해동 후 적절한 환경에서는 세균이 다시 증식할 수 있다.\n④ 어패류의 부패에는 주로 저온성 세균이 관여한다."},
{q:"제과 생산관리에서 제1차 관리의 3대 요소가 아닌 것은?",o:["자금(Money)","방법(Method)","사람(Man)","재료(Material)"],a:1,e:"• 제1차 관리 요소: Man(사람, 질과 양), Material(재료, 품질), Money(자금, 원가)\n• 제2차 관리 요소: Method(방법), Minute(시간, 공정), Machine(기계, 시설), Market(시장)"},
{q:"스펀지케이크를 더운 방법으로 제조 시 달걀과 설탕을 혼합하여 몇 도로 중탕하는 것이 가장 적당한가?",o:["43°C","30°C","25°C","10°C"],a:0,e:"스펀지 반죽에서 공립법 중 더운 믹싱법은 달걀과 설탕을 혼합하여 37~43°C까지 중탕하여 거품을 내는 방법이다."},
{q:"어떤 제품 100개의 원재료비가 50,000원, 노무비 및 기타 제조 경비가 원재료의 50%일 때 제품 1개의 제조원가는?\n(단, 수율은 93.7%이다.)",o:["900원","1000원","750원","800원"],a:3,e:"• 100개의 원재료비: 50,000\n• 노무비 및 기타제조경비: 50,000×0.5 = 25,000\n• 수율 미고려 시 1개당 제조원가: (50,000+25,000)/100개 = 750원\n• 수율 93.7% 반영 1개당 제조원가: 750/0.937 = 800.43원 ≈ 800원"},
{q:"빵 제품 냉각에 대한 설명으로 틀린 것은?",o:["냉각된 제품의 수분함량은 38%를 초과하지 않는다.","빵의 수분은 내부에서 외부로 이동하여 평형을 이루지 못한다.","일반적인 제품에서 냉각 중에 수분 손실이 12% 정도가 된다.","냉각된 빵의 내부 온도가 32 ~ 35°C에 도달하였을 때 절단, 포장한다."],a:2,e:"빵 제품을 냉각할 때 일반적으로 평균 2% 정도의 수분 손실이 일어난다. 12%가 아니다. 빵의 적정 냉각온도와 수분함량은 35~40°C, 38% 정도이다."},
{q:"케이크 위에 파인애플, 키위 등을 사용한 후 젤라틴액을 씌울 때는 쉽게 굳지 않는데 그 이유는?",o:["특별한 향기 때문에","색이 진해서","설탕이 부족하므로","과일 내의 효소 때문에"],a:3,e:"파인애플의 브로멜린, 키위의 액티니딘 등은 단백질의 분해효소로 단백질인 젤라틴의 응고를 방해한다."},
{q:"다음 생물학적 위해요소 중 가장 열에 약한 것은?",o:["테트로도톡신","보툴리눔독신","삭시톡신","아플라톡신"],a:1,e:"보툴리눔독신은 클로스트리디움 보툴리눔균에 의해 생성되는 신경독(뉴로톡신)으로 비교적 열에 약하다.\n※ 자연적으로 생성되는 천연유독 성분(테트로도톡신, 삭시톡신 등)은 열에 강하여 높은 온도로 가열하여도 독성이 분해되지 않는다."},
{q:"천연 정유에 향료를 혼합하여 만든 것으로 내열성이 강해 빵과 같은 가열식품에 이용하는 향료는?",o:["유성향료","유화향료","수용성향료","분말향료"],a:0,e:"유성향료는 글리세린, 식물성 기름 등의 천연 정유에 향료를 용해시켜 만든 것으로 내열성이 강하여 빵과 같은 가열식품에 많이 이용된다.\n※ 유화향료: 유성향료를 물에 잘 분산되도록 유화제를 사용한 것으로 음료나 크림같은 수분이 많은 제품에 주로 사용된다."},
{q:"일반적인 파운드케이크의 비용적(cm³/g)은 얼마인가?",o:["1.0 cm³/g","0.5 cm³/g","4.8 cm³/g","2.4 cm³/g"],a:3,e:"일반적인 파운드케이크의 비용적은 2.40cm³/g이다."},
{q:"밀가루 성분 중 함량이 많을수록 노화가 촉진되는 것은?",o:["아밀로오스","수분","단백질","비수용성 펜토산"],a:0,e:"밀가루 전분에 함유된 대표적 다당류로 아밀로오스와 아밀로펙틴이 있으며, 이 중 아밀로오스가 많을수록 노화가 촉진된다."},
{q:"작업장에 들어가기 전 작업자의 위생복장 착용방법이 아닌 것은?",o:["장신구, 반지 등을 반입하지 않는다.","반팔 위생복의 착용은 지양하도록 한다.","필기구는 주머니에 넣어서 사용한다.","위생모는 머리 전체를 감싸도록 하여 머리카락이 나오지 않도록 한다."],a:2,e:"작업장에서 필기구를 휴대하거나 주머니에 넣는 행동은 식품에 오염가능성을 높일 수 있어 위생적으로 좋지 않은 행동이다."},
{q:"다음 중 작업공간의 살균에 가장 적당한 것은?",o:["자비 살균","가시광선 살균","자외선 살균","적외선 살균"],a:2,e:"작업공간의 살균은 자외선 살균이 적당하며, 가시광선이나 적외선은 살균효과가 크지 않다. 자비 살균은 기구나 장비를 끓여 살균하는 방식이다."},
{q:"데블스푸드 케이크를 제조하기 위해 밀가루 100, 설탕 170, 쇼트닝 70, 더치 코코아 20, 소금 2, 베이킹파우더 3을 사용하려 할 때 전란과 우유의 비율은?",o:["전란 77, 우유 153","전란 699, 우유 140","전란 88, 우유 152","전란 66, 우유 176"],a:0,e:"데블스푸드 케이크의 배합률\n• 전란 = 쇼트닝×1.1 = 70×1.1 = 77\n• 우유 사용량 = 설탕+30+(코코아×1.5)-전란\n= 170+30+(20×1.5)-77 = 153"},
{q:"이탈리안 머랭 설명으로 맞는 것은?",o:["주석산 크림을 넣으면 거품이 가라앉는다.","설탕과 물로 시럽을 만들어 달걀흰자에 넣어 머랭을 만드는 방법이다.","시럽의 온도는 100°C로 하면 된다.","흰자와 설탕을 혼합하여 중탕으로 가열하여 만든다."],a:1,e:"이탈리안 머랭은 달걀흰자로 거품을 올리면서 설탕과 물로 만든 뜨거운 시럽을 실같이 흘려 넣으며 만든다.\n① 주석산 크림을 넣으면 거품을 튼튼하게 만든다.\n③ 시럽의 온도는 114~118°C 정도로 한다.\n④ 흰자와 설탕을 혼합하여 중탕으로 만드는 머랭은 스위스 머랭이다."},
{q:"밀의 제분 과정 중 조질 시 가수를 하는 목적이 아닌 것은?",o:["전분입자의 호화","밀가루의 품질 향상","배유의 분쇄 촉진","외피와 배유의 분리 촉진"],a:0,e:"밀의 제분 과정 중 조질은 제분공정에서 외피와 배유를 깨끗하게 분리시키기 위하여 수분을 고루 분포시키는 가수작업이다. 전분입자의 호화는 가수의 목적이 아니다."},
{q:"빵, 과자 제조 시 계량에 관한 설명 중 옳은 것은?",o:["계량(measurement)은 무게 단위보다는 부피 단위로 한다.","1mg(miligram)은 (1/10g)이다.","1g은 (1/1000)kg이다.","1dg(decigram)은 (1/100g)이다."],a:2,e:"① 제과제빵에서 사용되는 재료는 부피보다 무게 단위로 계량한다.\n② 1mg은 (1/1000g)이다.\n④ 1dg는 (1/10g)이다."},
{q:"다음 중 병원체가 바이러스인 질병은?",o:["결핵","성홍열","디프테리아","폴리오"],a:3,e:"폴리오는 병원체가 바이러스이다. 결핵, 성홍열, 디프테리아의 병원체는 세균이다."},
{q:"우유를 살균할 때 많이 이용되는 저온장시간 살균법으로 가장 적합한 온도는?",o:["18 ~ 20°C","63 ~ 65°C","98 ~ 100°C","38 ~ 40°C"],a:1,e:"우유살균법 중 저온장시간살균법(LTLT법)은 61~65°C에서 30분간 처리한다."},
{q:"제과공장 설계 시 고려해야 할 환경 조건과 가장 거리가 먼 것은?",o:["산업단지에 위치하여야 한다.","폐수와 폐기물 처리에 편리한 곳이어야 한다.","환경 및 주위가 깨끗한 곳이어야 한다.","양질의 물을 충분히 얻을 수 있어야 한다."],a:0,e:"제과공장이 꼭 산업단지에 위치해야 할 이유는 없다. ②, ③, ④는 제과공장의 입지를 위하여 필요한 조건이다."},
{q:"인수공통감염병으로만 짝지어진 것은?",o:["결핵, 유행성 간염","홍역, 브루셀라증","탄저, 리스테리아증","폴리오, 장티푸스"],a:2,e:"유행성 간염, 홍역, 폴리오, 장티푸스는 인수공통감염병이 아니다.\n인수공통감염병:\n• 세균성: 탄저, 결핵, 살모넬라증, 브루셀라증, 리스테리아증 등\n• 바이러스성: 광견병, 일본뇌염, 뉴캐슬병, 황열 등"},
{q:"반죽의 비중에 대한 설명으로 틀린 것은?",o:["비중은 같은 부피의 반죽 무게를 같은 부피의 물 무게로 나눈 것이다.","비중이 낮을수록 공기 함유량이 많아서 제품이 가볍고 조직이 거칠다.","비중이 높을수록 공기 함유량이 적어서 제품의 기공이 조밀하다.","비중이 같아도 제품의 식감은 다를 수 있다."],a:1,e:"비중은 같은 부피의 반죽 무게를 같은 부피의 물 무게로 나눈 것이다. 비중이 낮을수록 공기 함유량이 많지만, 그렇다고 조직이 반드시 거칠다고 할 수는 없다."},
{q:"충전물 제조 시 가열하여 사용해야 하는 검류는?",o:["젤라틴","아라비아검","CMC","알긴산 나트륨"],a:0,e:"충전물 제조 시 안정제로 사용되는 젤라틴은 가열하면 녹고 냉각하면 다시 굳는 재료로 가열하여 사용하는 검류이다. 아라비아검, CMC, 알긴산 나트륨은 가열 없이도 손쉽게 물에 용해되는 검류이다."},
{q:"교차오염을 예방하는 방법이 아닌 것은?",o:["도마와 칼 사용 시 가공된 식품보다 원재료를 먼저 처리한다.","철저한 개인위생과 손 씻기를 한다.","원재료와 가공된 식품은 각각 다른 기구를 사용한다.","깨끗하고 위생적인 설비와 도구를 사용한다."],a:0,e:"원재료와 가공된 식품의 처리는 각각 다른 기구를 사용하는 것이 좋으나 그렇지 못한 경우라면 가공된 식품을 먼저 처리하고 원재료를 나중에 처리하는 것이 교차오염을 막는 방법이다."},
{q:"도넛의 제품결함에 대한 설명으로 틀린 것은?",o:["도넛을 피복한 글레이즈(glaze)가 갈라지는 것은 과도한 수분 증발 때문으로 검류를 약간 사용하면 효과가 있다.","황화현상을 방지하기 위하여 첨가하는 스테아린은 유지의 융점을 높여 경화제 역할을 한다.","도넛을 피복한 설탕이 기름을 흡수하여 나타나는 황화현상을 방지하기 위하여 튀김기름에 스테아린을 약 10% 정도 혼합한다.","도넛을 피복한 설탕이나 포도당이 수분에 의해 녹아 시럽처럼 변하는 것을 발한 현상이라 한다."],a:2,e:"황화현상을 방지하기 위하여 첨가하는 스테아린은 3~6%를 첨가한다. 10%는 과다하다.\n※ 황화현상: 도넛의 기름이 설탕을 녹여 끈적거리게 만드는 현상"}
]},
{title:"2011년 5회",questions:[
{q:"머랭 제조에 대한 설명으로 옳은 것은?",o:["기름기나 노른자가 없어야 튼튼한 거품이 나온다.","일반적으로 흰자 100에 대하여 설탕 50의 비율로 만든다.","저속으로 거품을 올린다.","설탕을 믹싱 초기에 첨가하여야 부피가 커진다."],a:0},

{q:"반죽형 케이크의 반죽 제조법에 대한 설명이 틀린 것은?",o:["크림법: 유지와 설탕을 넣어 가벼운 크림상태로 만든 후 계란을 넣는다.","블렌딩법: 밀가루와 유지를 넣고 유지에 의해 밀가루가 가볍게 피복되도록 한 후 건조, 액체 재료를 넣는다.","설탕물법: 건조 재료를 혼합한 후 설탕 전체를 넣어 포화용액을 만드는 방법이다.","1단계법: 모든 재료를 한꺼번에 넣고 믹싱하는 방법이다."],a:2},
{q:"일반적으로 초콜릿은 코코아와 카카오 버터로 나누어져있다. 초콜릿 56%를 사용할 때 코코아의 양은 얼마인가?",o:["35%","37%","38%","41%"],a:1},
{q:"반죽온도 조절을 위한 고려사항으로 적절하지 않은 것은?",o:["마찰계수를 구하기 위한 필수적인 요소는 반죽결과 온도, 원재료온도, 작업장 온도, 사용되는 물온도, 작업장 상대습도이다.","기준되는 반죽온도보다 결과온도가 높다면 사용하는 물 일부를 얼음으로 사용하여 희망하는 반죽온도를 맞춘다.","마찰계수란 일정량의 반죽을 일정한 방법으로 믹싱할 때 반죽온도에 영향을 미치는 마찰열을 실질적인 수치로 환산한 것이다.","계산된 사용수 온도가 56℃이상일 때는 뜨거운 물을 사용할 수 없으며, 영하로 나오더라도 절대치의 차이라는 개념에서 얼음계산법을 적용한다."],a:2},
{q:"파운드 케이크를 패닝할 때 밑면의 껍질 형성을 방지하기 위한 팬으로 가장 적합한 것은?",o:["일반팬","이중팬","은박팬","종이팬"],a:1},
{q:"유화제를 사용하는 목적이 아닌 것은?",o:["물과 기름이 잘 혼합되게 한다.","빵이나 케익을 부드럽게 한다.","빵이나 케익이 노화되는 것을 지연시킬 수 있다.","달콤한 맛이 나게 하는데 사용한다."],a:3},
{q:"케이크 제품의 굽기 후 제품 부피가 기준보다 작은 경우의 원인이 아닌 것은?",o:["틀의 바닥에 공기나 물이 들어갔다.","반죽의 비중이 높았다.","오븐의 굽기 온도가 높았다.","반죽을 패닝한 후 오래 방치했다."],a:2},
{q:"도넛 글레이즈가 끈적이는 원인과 대응방안으로 틀린 것은?",o:["유지 성분과 수분의 유화 평형 불안정 - 원재료 중 유화제 함량을 높임","온도, 습도가 높은 환경 - 냉장 진열장 사용 또는 통풍이 잘되는 장소 선택","안정제, 농후화제 부족 - 글레이즈 제조시 첨가된 검류의 함량을 높임","도넛 제조 시 지친 반죽, 2차 발효가 지나친 반죽 사용 - 표준 제조 공정 준수"],a:0},
{q:"도넛 튀김용 유지로 가장 적당한 것은?",o:["라드","유화쇼트닝","면실유","버터"],a:2},
{q:"초콜릿 제품을 생산하는데 필요한 도구는?",o:["디핑 포크 (Dipping forks)","오븐 (oven)","파이 롤러 (pie roller)","워터 스프레이 (water spray)"],a:0},

{q:"제빵 시 굽기 단계에서 일어나는 반응에 대한 설명으로 틀린 것은?",o:["반죽온도가 60℃로 오르기 까지 효소의 작용이 활발해지고 휘발성 물질이 증가한다.","글루텐은 90℃부터 굳기 시작하여 빵이 다 구워질때까지 천천히 계속 된다.","반죽온도가 60℃에 가까워지면 이스트가 죽기 시작한다. 그와 함께 전분이 호화하기 시작한다.","표피부분이 160℃를 넘어서면 당과 아미노산이 마이야르 반응을 일으켜 멜라노이드를 만들고, 당의 캐러멜화 반응이 일어나고 전분이 덱스트린으로 분해된다."],a:1},
{q:"어느 제과점의 이번 달 생산예상 총액이 1000만원인 경우, 목표 노동 생산성은 5000원/시/인, 생산 가동 일수가 20일, 1일 작업시간 10시간인 경우 소요인원은?",o:["4명","6명","8명","10명"],a:0},

{q:"다음 제품 중 2차 발효실의 습도를 가장 높게 설정해야 되는 것은?",o:["호밀빵","햄버거빵","불란서빵","빵 도넛"],a:1},
{q:"노타임 반죽법에 사용되는 산화, 환원제의 종류가 아닌 것은?",o:["ADA(azodicarbonamide)","L-시스테인","소르브산","요오드칼슘"],a:2},

    <div class="top-nav">
      <button class="back-btn" onclick="state.screen='home';render()">←</button>
      <div style="flex:1;text-align:center;font-weight:600;font-size:14px">${c.emoji} ${c.name}</div>
    </div>
    ${list.map((ex,i)=>`
    <div class="home-card" onclick="startExam(${i})">
      <div class="title">${ex.title}</div>
      <div class="desc">${ex.desc || '60문제 · 4지선다'}</div>
    </div>`).join('')}`;
}

function startExam(idx) {
  const cat=state.cat;
  state = { screen:'quiz', cat, idx, answers:new Array(EXAMS[cat][idx].questions.length).fill(-1), current:0, submitted:false, viewMode:'single' };
  render();
}

function renderQuiz() {
  const exam=getExam(), total=exam.questions.length;
  const answered=state.answers.filter(a=>a!==-1).length;
  state.viewMode==='single' ? renderSingleQ(exam,total,answered) : renderAllQ(exam,total,answered);
}

function renderSingleQ(exam,total,answered) {
  const i=state.current, q=exam.questions[i], L=['①','②','③','④'];
  const catName=CAT_INFO[state.cat].name;
  app.innerHTML = `
    <div class="top-nav">
      <button class="back-btn" onclick="goBack()">←</button>
      <div style="flex:1;text-align:center;font-weight:600;font-size:14px">${catName} ${exam.title}</div>
      <button class="back-btn" style="margin-left:auto;margin-right:-8px;font-size:14px" onclick="toggleView()">☰</button>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${(answered/total)*100}%"></div></div>
    <div class="progress-text">${answered}/${total} 답변 완료</div>
    <div class="scroll-pad">
      <div class="q-card">
        <div class="q-num">문제 ${i+1} / ${total}</div>
        <div class="q-text">${q.q.replace(/\n/g,'<br>')}</div>
        ${q.o.map((opt,j)=>`<div class="option ${state.answers[i]===j?'selected':''}" onclick="sel(${i},${j})"><div class="circle">${L[j]}</div><div class="option-text">${opt}</div></div>`).join('')}
      </div>
    </div>
    <div class="btn-group"><div class="container"><div class="btn-row">
      <button class="btn btn-outline" onclick="prevQ()" ${i===0?'disabled style="opacity:.4"':''}>← 이전</button>
      ${i===total-1?`<button class="btn btn-primary" onclick="submit()">채점하기</button>`:`<button class="btn btn-primary" onclick="nextQ()">다음 →</button>`}
    </div></div></div>`;
}

function renderAllQ(exam,total,answered) {
  const L=['①','②','③','④'], catName=CAT_INFO[state.cat].name;
  app.innerHTML = `
    <div class="top-nav">
      <button class="back-btn" onclick="goBack()">←</button>
      <div style="flex:1;text-align:center;font-weight:600;font-size:14px">${catName} ${exam.title}</div>
      <button class="back-btn" style="margin-left:auto;margin-right:-8px;font-size:14px" onclick="toggleView()">1개씩</button>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${(answered/total)*100}%"></div></div>
    <div class="progress-text">${answered}/${total} 답변 완료</div>
    <div class="scroll-pad">
      ${exam.questions.map((q,i)=>`<div class="q-card" id="q${i}"><div class="q-num">문제 ${i+1}</div><div class="q-text">${q.q.replace(/\n/g,'<br>')}</div>${q.o.map((opt,j)=>`<div class="option ${state.answers[i]===j?'selected':''}" onclick="sel(${i},${j})"><div class="circle">${L[j]}</div><div class="option-text">${opt}</div></div>`).join('')}</div>`).join('')}
    </div>
    <div class="btn-group"><div class="container"><button class="btn btn-primary" onclick="submit()">채점하기 (${answered}/${total})</button></div></div>`;
}

function sel(qi,oi) { state.answers[qi]=oi; render(); }
function prevQ() { if(state.current>0){state.current--;render();window.scrollTo(0,0);} }
function nextQ() { if(state.current<getExam().questions.length-1){state.current++;render();window.scrollTo(0,0);} }
function toggleView() { state.viewMode=state.viewMode==='single'?'all':'single'; render(); window.scrollTo(0,0); }
function goBack() { if(state.answers.some(a=>a!==-1)&&!state.submitted){if(!confirm('시험을 종료하시겠습니까?'))return;} state.screen='exams'; render(); }
function submit() {
  const u=state.answers.filter(a=>a===-1).length;
  if(u>0&&!confirm(`아직 ${u}문제를 풀지 않았습니다.\n그래도 채점하시겠습니까?`))return;
  state.submitted=true; state.screen='result'; render(); window.scrollTo(0,0);
}

function renderResult() {
  const exam=getExam(), total=exam.questions.length, catName=CAT_INFO[state.cat].name;
  let correct=0,wrong=0,skipped=0;
  state.answers.forEach((a,i)=>{if(a===-1)skipped++;else if(a===exam.questions[i].a)correct++;else wrong++;});
  const score=Math.round((correct/total)*100), pass=score>=60;
  app.innerHTML = `
    <div class="top-nav"><button class="back-btn" onclick="state.screen='exams';render()">←</button><div style="flex:1;text-align:center;font-weight:600;font-size:14px">채점 결과</div></div>
    <div class="result-card">
      <div style="font-size:15px;font-weight:600;margin-bottom:16px">${catName} ${exam.title}</div>
      <div class="score-circle ${pass?'pass':'fail'}">${score}<small>점</small></div>
      <div style="font-size:20px;font-weight:700;margin-top:8px;color:${pass?'var(--correct)':'var(--wrong)'}">${pass?'🎉 합격!':'😢 불합격'}</div>
      <div class="score-label">합격 기준: 60점 이상</div>
      <div class="stat-row">
        <div class="stat-item"><div class="stat-num" style="color:var(--correct)">${correct}</div><div class="stat-label">정답</div></div>
        <div class="stat-item"><div class="stat-num" style="color:var(--wrong)">${wrong}</div><div class="stat-label">오답</div></div>
        <div class="stat-item"><div class="stat-num" style="color:var(--sub)">${skipped}</div><div class="stat-label">미답</div></div>
      </div>
    </div>
    <button class="btn btn-primary" onclick="showReview('wrong')">오답 확인하기</button>
    <button class="btn btn-outline" onclick="showReview('all')">전체 문제 확인</button>
    <button class="btn btn-outline" onclick="startExam(${state.idx})">다시 풀기</button>
    <button class="btn btn-outline" onclick="state.screen='exams';render()">시험 목록</button>
    <button class="btn btn-outline" onclick="state.screen='home';render()">홈으로</button>
    <div style="height:20px"></div>`;
}

function showReview(f) { state.screen='review'; state.reviewFilter=f; render(); window.scrollTo(0,0); }

function renderReview() {
  const exam=getExam(), total=exam.questions.length, L=['①','②','③','④'], f=state.reviewFilter||'all';
  let idx=[];
  for(let i=0;i<total;i++){if(f==='all')idx.push(i);else if(f==='wrong'&&state.answers[i]!==exam.questions[i].a)idx.push(i);}
  app.innerHTML = `
    <div class="top-nav"><button class="back-btn" onclick="state.screen='result';render()">←</button>
      <div style="flex:1;text-align:center;font-weight:600;font-size:14px">${f==='wrong'?'오답 노트':'전체 문제 확인'} (${idx.length}문제)</div></div>
    <div class="tab-bar">
      <div class="tab ${f==='all'?'active':''}" onclick="showReview('all')">전체</div>
      <div class="tab ${f==='wrong'?'active':''}" onclick="showReview('wrong')">오답만</div>
    </div>
    <div class="review-toggle">
      ${Array.from({length:total},(_,i)=>{const m=state.answers[i],a=exam.questions[i].a,c=m===-1?'s':m===a?'c':'w';return`<div class="review-dot ${c}" onclick="scrollR(${i})">${i+1}</div>`;}).join('')}
    </div>
    ${idx.map(i=>{const q=exam.questions[i],m=state.answers[i],c=q.a;
      return`<div class="q-card" id="rq${i}">
        <div class="q-num" style="color:${m===c?'var(--correct)':'var(--wrong)'}">문제 ${i+1} ${m===c?'✓ 정답':'✗ 오답'}</div>
        <div class="q-text">${q.q.replace(/\n/g,'<br>')}</div>
        ${q.o.map((opt,j)=>{let cls='';if(j===c)cls='correct';else if(j===m&&m!==c)cls='wrong';return`<div class="option ${cls}"><div class="circle">${L[j]}</div><div class="option-text">${opt}</div></div>`;}).join('')}
        <div class="explain">
          <strong>정답: ${L[c]} ${q.o[c]}</strong>
          ${m!==-1&&m!==c?`<br>내 답: ${L[m]} ${q.o[m]}`:''}
          ${m===-1?'<br>⚠️ 미답변':''}
          <br><br>${(q.e||'').replace(/\n/g,'<br>')}
        </div>
      </div>`;}).join('')}
    <div style="height:20px"></div>`;
}

function scrollR(i) { const el=document.getElementById('rq'+i); if(el)el.scrollIntoView({behavior:'smooth',block:'center'}); }

render();
</script>
</body>
</html>
