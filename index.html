{title:"2011년 4회",desc:undefined,questions:[{q:"성형한 파이 반죽에 포크 등을 이용하여 구멍을 내주는 가장 주된 이유는?",o:["제품을 부드럽게 하기 위해","제품의 수축을 막기 위해","제품의 원활한 팽창을 위해","제품에 기포나 수포가 생기는 것을 막기 위해"],a:3,e:"굽기 시 충전물이 끓어 넘치는 것 방지 표면에 기포, 수포 생기는것 방지",r:99,c:"manufacturing"},
{q:"다음 중 반죽형 케이크의 반죽 제조법에 해당하는 것은?",o:["공립법","별립법","머랭법","블렌딩법"],a:3,e:"반죽형 케이크는 블렌딩법으로 반죽을 필요로함 제과",r:99,c:"manufacturing"},
{q:"다음의 조건에서 물 온도를 계산하면? 반죽희망 온도 23℃, 밀가루 온도 25℃, 실내 온도 25℃, 설탕 온도 25℃, 소트닝 온도 20℃, 계란 온도 20℃, 수돗물 온도 23℃, 마찰계수 20",o:["0℃","3℃","8℃","12℃"],a:1,e:"사용수 온도 = (희망온도 × 6) - (밀가루 + 실내 + 설탕 + 쇼트닝 + 계란 + 마찰계수) = (23×6) - (25+25+25+20+20+20) = 138 - 135 = 3℃이다.",r:85,v:0,c:"manufacturing"},
{q:"제분에 대한 설명 중 틀린 것은?",o:["넓은 의미의 개념으로 제분이란 곡류를 가루로 만드는 것이지만 일반적으로 밀을 사용하여 밀가루를 제조하는 것을 제분이라고 한다.","밀은 배유부가 치밀하거나 단단하지 못하여 도정 할 경우 싸라기가 많이 나오기 때문에 처음부터 분말화하여 활용하는 것을 제분이라고 한다.","제분 시 밀기울이 많이 들어가면 밀가루의 회분함량이 낮아진다.","제분율이란 밀을 제분하여 밀가루를 만들 때 밀에 대한 밀가루의 백분율을 말한다."],a:2,e:"제분 시 밀기울이 많이 들어가면 밀가루의 회분함량이 높아진다 제과",r:99,c:"ingredients"},
{q:"스펀지케이크를 만들 때 설탕이 적게 들어감으로 해서 생길 수 있는 현상은?",o:["오븐에서 제품이 주저앉는다.","제품의 껍질이 두껍다.","제품의 껍질이 갈라진다.","제품의 부피가 증가한다."],a:2,e:"스폰지 케이크에서의 설탕은 달걀의 기포를 안정기키고 노화방지 역할을 하고, 반죽에 윤기를 준다. 그러므로 설탕을 적게 들어간다면 반죽의 윤기가 감소하므로 제품의 껍질이 갈라진다.",r:99,c:"manufacturing"},
{q:"튀김 기름의 조건으로 틀린 것은?",o:["발연점(smoking point)이 높아야 한다.","산패에 대한 안정성이 있어야 한다.","여름철에 융점이 낮은 기름을 사용한다.","산가(acid value)가 낮아야 한다."],a:2,e:"여름엔 더우니까 융점이 높아야 함 겨울엔 추우니까 융점이 낮아도 됨",r:99,c:"ingredients"},
{q:"슈(Choux)에 대한 설명이 틀린 것은?",o:["팬닝 후 반죽표면에 물을 분사하여 오븐에서 껍질이 형성되는 것을 지연시킨다.","껍질반죽은 액체재료를 많이 사용하기 때문에 굽기 중 증기 발생으로 팽창한다.","오븐의 열 분배가 고르지 않으면 껍질이 약하여 주저앉는다.","기름칠이 적으면 껍질 밑부분이 접시모양으로 올라오거나 위와 아래가 바뀐 모양이 된다."],a:3,e:"기름칠이 적으면 밑면이 옆으로 퍼지지못해 밑면이 좁아짐 / 굽는 온도가 낮으면 팽창하지 않아 공처럼 둥글게 됨",r:99,c:"manufacturing"},
{q:"케이크 반죽의 pH가 적정 범위를 벗어나 알칼리일 경우 제품에서 나타나는 현상은?",o:["부피가 작다.","향이 약하다.","껍질색이 여리다.","기공이 거칠다."],a:3,e:"0에 가까울 수록 산성 7은 중성 14에 가까울수록 알칼리 산성일 경우 머랭에 레몬즙을 넣으면 단단해짐을 예를 들수 있다. 즉, 산성을 띄는 반죽인 경우 단단하며 부피가 작고 기공이 조밀하며 색이 밝고 향이 적다. 알칼리일 경우 산성과 반대를 생각하면 되는데 알칼리 반죽인 경우 진반죽이며 기공이 거칠어서 부피가 크고 향이 진하다. 베이킹 소다가 알칼리 성분을 띄고 있고 초코 제품에 베이킹 소다가 들어갈 경우 색이 진해져 먹음직스러워진다.",r:99,c:"manufacturing"},
{q:"소규모 주방설비 중 작업의 효율성을 높이기 위한 작업 테이블의 위치로 가장 적당한 것은?",o:["오븐 옆에 설치한다.","냉장고 옆에 설치한다.","발효실 옆에 설치한다.","주방의 중앙부에 설치한다."],a:3,e:"소규모 주방에서 작업 테이블은 주방 중앙부에 설치하여 사방에서 접근할 수 있도록 하는 것이 효율적이다.",r:82,c:"manufacturing"},
{q:"고율배합의 제품을 굽는 방법으로 알맞은 것은?",o:["저온 단시간","고온 단시간","저온 장시간","고온 장시간"],a:2,e:"고율 배합=저온 장시간 저율 배합=고온 단시간 제과",r:99,c:"manufacturing"},
{q:"다음 중 비용적이 가장 큰 케이크는?",o:["스펀지케이크","파운드케이크","화이트레이어케이크","초콜릿케이크"],a:0,e:"비중이 낮은 스펀지 케이크.비중 0.4 비용적이란 1그램당 부푸는 부피?라고 생각하면 됩니당 비중이 낮을수록 반죽에 포함되어있는 공기가 많고 그만큼 부푼다고 생각해보면 스펀지 케이크가 비중이 제일 낮기 때문에 비용적이 가장 크다! 반대로 파운드케이크는 비중이 높기 때문에 많이 부풀지 않아여~",r:99,c:"manufacturing"},
{q:"어떤 과자반죽의 비중을 측정하기 위하여 다음과 같이 무게를 달았다면 이 반죽의 비중은? (비중컵=50g, 비중컵＋물=250g, 비중컵＋반죽=170g)",o:["0.40","0.60","0.68","1.47"],a:1,e:"비중 = (비중컵+반죽 - 비중컵) ÷ (비중컵+물 - 비중컵)\n= (170-50) ÷ (250-50) = 120 ÷ 200 = 0.60",r:93,c:"manufacturing"},
{q:"같은 크기의 팬에 각 제품의 비용적에 맞는 반죽을 팬닝 하였을 경우 반죽량이 가장 무거운 반죽은?",o:["파운드 케이크","레이어 케이크","스펀지 케이크","소프트 롤 케이크"],a:0,e:"파운드 케이크=반죽 1g당 팬용적은 2.40cm3 레이어 케이크=반죽 1g당 팬용적은 2.96cm3 스펀지 케이크=반죽 1g당 팬용적은 5.08cm3이다 제과",r:99,c:"manufacturing"},
{q:"흰자를 거품내면서 뜨겁게 끓인 시럽을 부어 만든 머랭은?",o:["냉제 머랭","온제 머랭","스위스 머랭","이탈리안 머랭"],a:3,e:"냉제머랭 (프렌치머랭) : 차가운 상태의 흰자를 휘핑해 거품을 내는것, 설탕을 한번에 넣지않고 조금씩 나누어 휘핑친다 온제머랭 = 스위스머랭 : 흰자에 설탕을 넣은 후 중탕을하면서 휘핑. 케이크 크림으로 적합",r:99,c:"ingredients"},
{q:"도넛과 케이크의 글레이즈(glaze) 사용 온도로 가장 적합한 것은?",o:["23℃","34℃","49℃","68℃"],a:2,e:"도넛 글레이즈 시 온도: 40∼50℃가 적당하다.",r:99,c:"manufacturing"},
{q:"다음 중 1mg과 같은 것은?",o:["0.0001 g","0.001 g","0.1g","1000 g"],a:1,e:"1g = 0.001kg = 1000mg",r:99,c:"manufacturing"},
{q:"냉동반죽의 장점이 아닌 것은?",o:["노동력 절약","작업 효율의 극대화","설비와 공간의 절약","이스트푸드의 절감"],a:3,e:"냉동 반죽을 하게 되면 이스트 푸드량은 증가한다. 제과",r:99,c:"manufacturing"},
{q:"3% 이스트를 사용하여 4 시간 발효시켜 좋은 결과를 얻는다고 가정할 때 발효시간을 3 시간으로 줄이려 한다. 이때 필요한 이스트 양은? (다른 조건은 같다고 본다.)",o:["3.5%","4%","4.5%","5%"],a:1,e:"이스트양 구하기=이스트양×시간/줄일시간 줄일시간 3시간 이스트양 3% 시간 4시간 따라서 이스트양 3% × 시간 4 ÷ 줄일시간 3시간 = 4",r:99,c:"ingredients"},
{q:"식빵의 온도를 28℃까지 냉각한 후 포장할 때 식빵에 미치는 영향은?",o:["노화가 일어나서 빨리 딱딱해진다.","빵에 곰팡이가 쉽게 발생한다.","빵의 모양이 찌그러지기 쉽다.","식빵을 슬라이스하기 어렵다."],a:0,e:"냉각시 노화가 느리게 일어난다.",r:99,c:"manufacturing"},
{q:"버터 톱 식빵 제조 시 분할손실이 3%이고, 완제품 500g 짜리 4개를 만들 때 사용하는 강력분의 양으로 가장 적당한 것은? (총 배합률은 195.8% 이다.)",o:["약 1065g","약 2140g","약 1053g","약 1123g"],a:2,e:"완제품 무게 = 500g × 4 = 2000g. 분할손실 3% 역산: 2000 ÷ (1-0.03) = 2000 ÷ 0.97 ≈ 2061.9g. 총 배합률 195.8%에서 밀가루 비율은 100/195.8이므로, 밀가루 = 2061.9 × (100/195.8) ≈ 1053g이다.",r:95,c:"manufacturing"},
{q:"빵 속에 줄무늬가 생기는 원인으로 옳은 것은?",o:["덧가루 사용이 과다한 경우","반죽개량제의 사용이 과다한 경우","밀가루를 체로 치지 않은 경우","너무 되거나 진 반죽인 경우"],a:0,e:"빵 속에 줄무늬가 생기는 원인은 덧가루 사용이 과다한 경우이다. 덧가루가 반죽 사이에 층을 형성하여 줄무늬가 나타난다.",r:93,c:"ingredients"},
{q:"하나의 스펀지 반죽으로 2~4개의 도우(dough)를 제조하는 방법으로 노동력, 시간이 절약되는 방법은?",o:["가당 스펀지법","오버나잇 스펀지법","마스터 스펀지법","비상 스펀지법"],a:2,e:"마스터 스펀지법은 스폰지법의 가장 큰 단점인 생산성 저하를 보완하가 위해 만든 제법이다",r:99,c:"manufacturing"},
{q:"반죽이 팬 또는 용기에 가득 차는 성질과 관련된 것은?",o:["흐름성","가소성","탄성","점탄성"],a:0,e:"제빵 시 반죽이 팬 또는 용기에 가득 차는 성질과 관련된 것은 흐름성이며, 제품 제조 시 믹싱을 할 때 빵에 탄력성, 신장성, 흐름성, 가소성을 부여한다.",r:99,c:"ingredients"},
{q:"다음 중 냉동 반죽을 저장할 때의 적정 온도로 옳은 것은?",o:["-1 ~ -5℃ 정도","-6 ~ -10℃ 정도","-18 ~ -24℃ 정도","-40℃ ~ -45℃ 정도"],a:2,e:"냉동 반죽의 적정 저장 온도는 -18~-24℃이다. 이 온도에서 이스트 활동이 완전히 억제되고 반죽 품질이 유지된다.",r:93,c:"hygiene"},
{q:"다음 재료 중 식빵 제조 시 반죽 온도에 가장 큰 영향을 주는 것은?",o:["설탕","밀가루","소금","반죽개량제"],a:1,e:"밀가루 다음은 물이다",r:99,c:"manufacturing"},
{q:"빵 표피의 갈변반응을 설명한 것 중 옳은 것은?",o:["이스트가 사멸해서 생긴다.","마가린으로부터 생긴다.","아미노산과 당으로부터 생긴다.","굽기 온도 때문에 지방이 산패되어 생긴다."],a:2,e:"빵 표피의 갈변반응은 아미노산과 당의 마이야르 반응(비효소적 갈변) 및 당의 캐러멜화에 의해 발생한다.",r:82,c:"nutrition"},
{q:"제빵용으로 주로 사용되는 도구는?",o:["모양깍지","돌림판(회전판)","짤주머니","스크래퍼"],a:3,e:"스크래퍼는 반죽을 자르고, 작업대를 정리하며, 볼에서 반죽을 긁어내는 등 제빵에서 주로 사용하는 도구이다.",r:85,c:"manufacturing"},
{q:"빵 제품의 껍질색이 연한 원인 설명으로 거리가 먼 것은?",o:["1차 발효 과다","낮은 오븐 온도","덧가루 사용 과다","고율배합"],a:3,e:"고율배합은 설탕량이 많기 때문에 색이 진하다",r:99,c:"manufacturing"},
{q:"둥글리기(Rounding) 공정에 대한 설명으로 틀린 것은?",o:["덧가루, 분할기 기름을 최대로 사용한다.","손 분할, 기계분할이 있다.","분할기의 종류는 제품에 적합한 기종을 선택한다.","둥글리기 과정 중 큰 기포는 제거되고 반죽온도가 균일화된다."],a:0,e:"둥글리기가 작업대에 손바닥으로 원그리듯 돌리는건데 덧가루 넘 많으면 안 돌아가고 쉬익쉬익하면서 걍 이동함 그리고 기름 많으면 질어질걸",r:99,c:"manufacturing"},
{q:"오랜 시간 발효 과정을 거치지 않고 혼합 후 정형하여 2차 발효를 하는 제빵 법은?",o:["재반죽법","스트레이트법","노타임법","스펀지법"],a:2,e:"1. 재반죽법 : 스트레이트법의 변형으로 물만 8%정도 남겨 두었다가 발효 후 나머지 물을 넣고 반죽하는 방법 2. 스트레이트법 :모든 재료를 한꺼번에 믹서에 넣고 하는 반죽으로 주로 소규모 제과점에서 사용 4. 스펀지법 : 대규모 제빵공장에서 사용하는 방법으로 스펀지와 도우로 두번 반죽한다.",r:99,c:"manufacturing"},
{q:"밀가루 중에 가장 많이 함유된 물질은?",o:["단백질","지방","전분","회분"],a:2,e:"밀가루는 65~78%의 탄수화물로 구성되어있으며, 밀의 탄수화물 중 전분이 70%를 차지한다. 단백질은 6~15%, 수분은 13~14%, 회분은 1% 이하로 구성된다.",r:99,c:"ingredients"},
{q:"우유를 살균할 때 고온단시간살균법(HTST)으로서 가장 적합한 조건은?",o:["72℃에서 15초 처리","75℃ 이상에서 15분 처리","130℃에서 2 ~ 3초 이내 처리","62 ~ 65℃에서 30분 처리"],a:0,e:"저온장시간 : 60~65도 30분간가열 고온단시간 : 71.7도 15초간 가열 초고온순간 : 130~150도 3초가열",r:99,c:"hygiene"},
{q:"다음 중 효소와 온도에 대한 설명으로 틀린 것은?",o:["효소는 일종의 단백질이기 때문에 열에 의해 변성된다.","최적온도 수준이 지나도 반응 속도는 증가한다.","적정온도 범위에서 온도가 낮아질수록 반응속도는 낮아진다.","적정 온도 범위 내에서 온도 10℃ 상승에 따라 효소 활성은 약 2배로 증가한다."],a:1,e:"최적온도가 높아지면 사멸하고 낮아지면 번식을 멈춥니다!",r:99,c:"nutrition"},
{q:"다음의 초콜릿 성분이 설명하는 것은? 글리세린 1개에 지방산 3개가 결합한 구조이다. 실온에서는 단단한 상태이지만, 입안에 넣는 순간 녹게 만든다. 고체로부터 액체로 변하는 온도범위(가소성)가 겨우 2~3℃로 매우 좁다.",o:["카카오매스","카카오기름","카카오버터","코코아파우더"],a:2,e:"카카오버터는 글리세린 1개에 지방산 3개가 결합한 트리글리세라이드로, 가소성 범위가 2~3℃로 매우 좁아 입안에서 빠르게 녹는다.",r:93,v:0,c:"ingredients"},
{q:"패리노그래프 커브의 윗부분이 200B.U.에 닿는 시간을 무엇이라고 하는가?",o:["반죽시간(peak time)","도달시간(arrival time)","반죽형성시간(dough development time)","이탈시간(departure time)"],a:1,e:"도달시간(arrival time)은 패리노그래프 커브의 윗부분이 특정 B.U. 기준선에 처음 도달하는 시간이다. 이 문제에서는 200B.U. 기준선에 닿는 시간을 묻고 있으며, 이것이 도달시간이다.",r:93,v:0,c:"manufacturing"},
{q:"다음에서 탄산수소나트륨(중조)이 반응에 의해 발생하는 물질이 아닌 것은?",o:["CO2","H2O","C2H5OH","Na2CO3"],a:2,e:"C2H5OH = 에탄올 제빵 중 효모/발효종에 의해 발생",r:99,c:"ingredients"},
{q:"제빵에 사용하는 물로 가장 적합한 형태는?",o:["아경수","알칼리수","증류수","염수"],a:0,e:"제빵에는 아경수(120~180ppm)가 적합하다.",r:99,c:"ingredients"},
{q:"유지의 경화란?",o:["포화 지방산의 수증기 증류를 말한다.","불포화 지방산에 수소를 첨가하는 것이다.","규조토를 경화제로 하는 것이다.","알칼리 정제를 말한다."],a:1,e:"유지의 경화는 불포화 지방산에 수소를 첨가(수소첨가)하여 포화도를 높이는 공정이다. 액체 유지를 고체 지방으로 전환시킨다.",r:93,c:"ingredients"},
{q:"아밀로그래프에 관한 설명 중 틀린 것은?",o:["반죽의 신장성 측정","맥아의 액화효과 측정","알파 아밀라아제의 활성 측정","보통 제빵용 밀가루는 약 400~600 B.U."],a:0,e:"반죽의 신장성 측정은 익스텐소그래프로 할 수 있다",r:99,c:"ingredients"},
{q:"쇼트닝에 대한 설명으로 틀린 것은?",o:["라드(돼지기름) 대용품으로 개발되었다.","정제한 동·식물성 유지로 만든다.","온도 범위가 넓어 취급이 용이하다.","수분을 16% 함유하고 있다."],a:3,e:"버터가 수분을 15% 정도 함유하고 있는반면, 쇼트닝은 수분이 없는 유지방으로 버터와 함께 사용하면 더욱 바삭바삭해진다. 제과",r:99,c:"ingredients"},
{q:"다음 중 당 알코올(sugar alcohol)이 아닌 것은?",o:["자일리톨","솔비톨","갈락티톨","글리세롤"],a:3,e:"글리세롤은 지방 중에 가장 기본 단위는 지방산과 글리세린 중 기본은 글리세린이며 다른 말로 글리세롤이라고 한다. 쉽게 말하면 예) 탄수화물의 기본단위가 단당류이고 단당류 중 기본은 포도당",r:99,c:"manufacturing"},
{q:"케이크 제품에서 계란의 기능이 아닌 것은?",o:["영양가 증대","결합제 역할","유화작용 저해","수분 증발 감소"],a:2,e:"노른자는 유화작용하는 레시틴이 있습니다.",r:99,c:"nutrition"},
{q:"맥아당은 이스트의 발효과정 중 효소에 의해 어떻게 분해되는가?",o:["포도당＋포도당","포도당＋과당","포도당＋유당","과당＋과당"],a:0,e:"포도당 + 포도당으로 구성되며 이스트에 말타아제에 의해 분해된다.",r:99,c:"ingredients"},
{q:"육두구과의 상록활엽교목에 맺히는 종자를 말리면 넛메그가 된다. 이 넛메그의 종자를 싸고 있는 빨간 껍질을 말린 향신료는?",o:["생강","클로브","메이스","시너먼"],a:2,e:"인토네시아 원산의 육두구과의 삭록활엽교목의 열매(종자)를 말리면 넛메그가 되며, 넛메그의 종자를 싸고 있는 빨간 겁질을 말리면 메이스가 된다 제과",r:99,c:"ingredients"},
{q:"밀 제분 공정 중 정선기에 온 밀가루를 다시 마쇄하여 작은 입자로 만드는 공정은?",o:["조쇄공정(break roll)","분쇄공정(reduct roll)","정선공정(milling separator)","조질공정(tempering)"],a:1,e:"분쇄공정(reduct roll)은 정선기를 통과한 밀가루를 다시 마쇄하여 더 작은 입자로 만드는 공정이다.",r:85,c:"ingredients"},
{q:"수크라아제(sucrase)는 무엇을 가수분해 시키는가?",o:["맥아당","설탕","전분","과당"],a:1,e:"설탕(sucrose) >> 가수분해효소 (sucrase)",r:99,c:"ingredients"},
{q:"리놀렌산(linolenic acid)의 급원식품으로 가장 적합한 것은?",o:["라드","들기름","면실유","해바라기씨유"],a:1,e:"리놀렌산(linolenic acid)의 대표적 급원식품은 들기름이다. 들깨에 α-리놀렌산이 약 60% 함유되어 있다.",r:90,c:"nutrition"},
{q:"새우, 게 등의 겉껍질을 구성하는 chitin의 주된 단위성분은?",o:["갈락토사민(galactosamine)","글루코사민(glucosamine)","글루쿠로닉산(glucuronic acid)","갈락투로닉산(galacturonic acid)"],a:1,e:"키틴(chitin)의 주된 단위성분은 글루코사민(glucosamine)이다. N-아세틸글루코사민이 결합한 다당류이다.",r:93,c:"manufacturing"},
{q:"단백질에 대한 설명으로 틀린 것은?",o:["조직의 삼투압과 수분평형을 조절한다.","약 20여 종의 아미노산으로 되어있다.","부족하면 2차적 빈혈을 유발하기 쉽다.","동물성 식품에만 포함되어 있다."],a:3,e:"단백질은 동물성 식품(육류, 생선, 달걀, 유제품)뿐만 아니라 식물성 식품(두류, 곡류, 견과류 등)에도 포함되어 있다. 따라서 '동물성 식품에만 포함되어 있다'는 설명은 틀린 것이다.",r:99,c:"nutrition"},
{q:"건강한 성인이 식사 시 섭취한 철분이 200mg인 경우 체내 흡수된 철분의 양은?",o:["1~5mg","10~30mg","100~15mg","200mg"],a:1,e:"체내 흡수된 철분의 양 5~15% 제과",r:99,c:"nutrition"},
{q:"착색료에 대한 설명으로 틀린 것은?",o:["천연색소는 인공색소에 비해 값이 비싸다","타르색소는 카스텔라에 사용이 허용되어 있다.","인공색소는 색깔이 다양하고 선명하다.","레토르트 식품에서 타르색소가 검출되면 안 된다."],a:1,e:"타르는 인공색소에 해당합니다. 타르=담배가 아니고 타르는 석탄계에서 추출한 성분으로 만들었으며, 이로 만든 색소계열을 타르색소라고 합니다. 물론, 타르 자체의 성분은 담배, 아스팔트 등의 산업에 사용되긴 하지만, 식품산업에서는 해당 성분을 식품에 착색료로 사용량 및 사용범위를 규정하고 있습니다. 특히 식품공전 등에 따르면 레토르트 식품에서는 타르색소가 검출되서는 안됩니다.",r:99,c:"ingredients"},
{q:"다음 중 작업공간의 살균에 가장 적당한 것은?",o:["자외선 살균","적외선 살균","가시광선 살균","자비살균"],a:0,e:"스텐컵 소독할 때 자외선살균 소독고 사용함",r:99,c:"hygiene"},

const CH_INFO = {

function getChapterQuestions(cat, ch) {
 const qs = [];
 EXAMS[cat].forEach(exam => exam.questions.forEach(q => { if(q.c===ch) qs.push(q); }));
 return qs;
}
function isCalcQuestion(q) {
 const p=/\d+\s*(g|kg|%|℃|°C|cc|kcal|cal|원|만원|포대|개|시간|분|초|L|ml|ppm)/i;
 const hasCalcQ=p.test(q.q)||/얼마|몇\s*(g|kg|시간|분|개|포대|℃|°C|%|원|만원)|배합률|비중|비용적|손실|수율|칼로리|열량/.test(q.q);
 const numOpts=q.o.filter(o=>/\d/.test(o)).length;
 return hasCalcQ&&numOpts>=3;
}
function getCalcQuestions(cat, ch) {
 const qs=[];
 EXAMS[cat].forEach(exam=>exam.questions.forEach(q=>{if(q.c===ch&&isCalcQuestion(q))qs.push(q);}));
 return qs;
}
function getAllCalcQuestions(cat) {
 const qs=[];
 EXAMS[cat].forEach(exam=>exam.questions.forEach(q=>{if(isCalcQuestion(q))qs.push(q);}));
 return qs;
}
function shuffleArray(arr) {
 const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a;
}

// ========== LOCAL STORAGE ==========
function getHistory() { return JSON.parse(localStorage.getItem('baker-quiz-history')||'[]'); }
function saveResult() {
 const exam=getExam(), total=exam.questions.length;
 let correct=0,wrong=0,skipped=0;
 const wrongQs=[];
 state.answers.forEach((a,i)=>{
 if(a===-1)skipped++;
 else if(a===exam.questions[i].a)correct++;
 else{wrong++;wrongQs.push(i);}
 });
 const score=Math.round((correct/total)*100);
 const record={cat:state.cat,idx:state.idx,title:exam.title,date:new Date().toISOString().slice(0,10),score,correct,wrong,skipped,total,wrongQs};
 const history=getHistory();
 history.push(record);
 localStorage.setItem('baker-quiz-history',JSON.stringify(history));
}
// ========== 풀이 기록 (문제 단위) ==========
function getLog() { return JSON.parse(localStorage.getItem('baker-quiz-log')||'[]'); }
function saveLog(log) { localStorage.setItem('baker-quiz-log',JSON.stringify(log)); }
function makeQid(cat, examIdx, qIdx) { return cat[0]+'-'+examIdx+'-'+qIdx; }
function makeQidFromText(q) { return 'h-'+q.substring(0,20).replace(/[^가-힣a-zA-Z0-9]/g,''); }
function logAnswers() {
 const exam=getExam(), today=new Date().toISOString().slice(0,10), log=getLog();
 exam.questions.forEach((q,i)=>{
 if(state.answers[i]===-1)return;
 let qid;
 if(state.chapterMode||state.weakMode) { qid=makeQidFromText(q.q); }
 else { qid=makeQid(state.cat,state.idx,i); }
 log.push({id:qid,c:q.c||'manufacturing',picked:state.answers[i],correct:state.answers[i]===q.a,date:today});
 });
 saveLog(log);
}
function getQStats() {
 const log=getLog(), stats={};
 log.forEach(r=>{
 if(!stats[r.id])stats[r.id]={id:r.id,c:r.c,right:0,wrong:0,lastWrongDate:null,lastPicked:null};
 const s=stats[r.id];
 if(r.correct)s.right++;
 else{s.wrong++;s.lastWrongDate=r.date;s.lastPicked=r.picked;}
 });
 return stats;
}
function getChapterStats(cat) {
 const log=getLog(), chapters={};
 const catPrefix=cat[0]+'-';
 log.forEach(r=>{
 if(!r.id.startsWith(catPrefix)&&!r.id.startsWith('h-'))return;
 const ch=r.c||'manufacturing';
 if(!chapters[ch])chapters[ch]={right:0,wrong:0,total:0};
 chapters[ch].total++;
 if(r.correct)chapters[ch].right++;else chapters[ch].wrong++;
 });
 return chapters;
}
function getWeakestChapter(cat) {
 const stats=getChapterStats(cat);
 let worst=null,worstRate=101;
 for(const[ch,s]of Object.entries(stats)){
 if(s.total<5)continue;
 const rate=Math.round(s.right/s.total*100);
 if(rate<worstRate){worstRate=rate;worst={chapter:ch,rate};}
 }
 return worst;
}
function getWeakQuestions(cat) {
 const stats=getQStats(), weak=[];
 for(const[id,s]of Object.entries(stats)){
 if(!id.startsWith(cat[0]+'-')&&!id.startsWith('h-'))continue;
 const weight=s.wrong-(s.right*0.5);
 if(weight>0)weak.push({...s,weight});
 }
 weak.sort((a,b)=>b.weight-a.weight);
 return weak;
}
function findQuestionById(qid) {
 if(qid.startsWith('h-')){
 const hash=qid.substring(2);
 for(const cat of['bread','cake']){
 for(const exam of EXAMS[cat]){
 for(const q of exam.questions){
 if(q.q.substring(0,20).replace(/[^가-힣a-zA-Z0-9]/g,'')===hash)return q;
 }
 }
 }
 } else {
 const[c,ei,qi]=qid.split('-');
 const cat=c==='b'?'bread':'cake';
 if(EXAMS[cat][+ei]&&EXAMS[cat][+ei].questions[+qi])return EXAMS[cat][+ei].questions[+qi];
 }
 return null;
}

function getBestScore(cat,idx) {
 const records=getHistory().filter(r=>r.cat===cat&&r.idx===idx);
 if(!records.length)return null;
 return Math.max(...records.map(r=>r.score));
}
function getAttemptCount(cat,idx) {
 return getHistory().filter(r=>r.cat===cat&&r.idx===idx).length;
}

 <div style="display:flex;align-items:center;gap:12px">

 <div style="flex:1">
 <div class="title">전체 계산 문제</div>
 <div class="desc">모든 과목 랜덤 20문제</div>
 <div class="desc" style="margin-top:4px;color:#F59E0B;font-weight:600">${allCalc.length}문제 보유</div>
 </div>
 </div>
 </div>
 ${chKeys.map(ch=>{const info=CH_INFO[ch],qs=getCalcQuestions(state.cat,ch);if(!qs.length)return'';return`
 <div class="home-card" onclick="startCalcQuiz('${ch}')">
 <div style="display:flex;align-items:center;gap:12px">
 <div style="font-size:32px">${info.emoji}</div>
 <div style="flex:1">
 <div class="title">${info.name}</div>
 <div class="desc">${info.desc}</div>
 <div class="desc" style="margin-top:4px;color:#F59E0B;font-weight:600">계산 ${qs.length}문제</div>
 </div>
 </div>
 </div>`;}).join('')}
 <div style="padding:12px;text-align:center;font-size:12px;color:var(--sub)">각 과목에서 계산 문제만 랜덤 출제됩니다 (최대 20문제)</div>`;
}
function startCalcQuiz(ch) {
 const cat=state.cat;
 const allQs=ch==='all'?getAllCalcQuestions(cat):getCalcQuestions(cat,ch);
 const selected=shuffleArray(allQs).slice(0,20);
 if(!selected.length){alert('계산 문제가 없습니다.');return;}
 const title=ch==='all'?'전체 계산 문제':CH_INFO[ch].name+' 계산';
 state = { screen:'timerSelect', cat, idx:0, answers:new Array(selected.length).fill(-1), current:0, submitted:false, viewMode:'all', chapterExam:{title,desc:`계산 문제 · ${selected.length}문제`,questions:selected}, chapterMode:true, calcMode:true, chapter:ch, timerEnd:null };
 showTimerSelect(true);
}

// ========== 타이머 ==========
let timerInterval=null;
function clearTimer() { if(timerInterval){clearInterval(timerInterval);timerInterval=null;} }
function startTimer(seconds) {
 clearTimer();
 state.timerEnd=Date.now()+seconds*1000;
 timerInterval=setInterval(()=>{
 const left=Math.max(0,state.timerEnd-Date.now());
 if(left<=0){clearTimer();state.submitted=true;logAnswers();saveResult();state.screen='result';render();window.scrollTo(0,0);return;}
 const el=document.getElementById('timer-display');
 if(el){const m=Math.floor(left/60000),s=Math.floor((left%60000)/1000);el.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');el.style.color=left<=300000?'var(--wrong)':'var(--sub)';}
 },1000);
}
function getTimerHTML() {
 if(!state.timerEnd)return '';
 const left=Math.max(0,state.timerEnd-Date.now());
 const m=Math.floor(left/60000),s=Math.floor((left%60000)/1000);
 const color=left<=300000?'var(--wrong)':'var(--sub)';
 return `<span id="timer-display" style="font-size:13px;font-weight:700;color:${color};min-width:50px;text-align:right">⏱ ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}</span>`;
}
function onTimerSelected(v) {
 if(v>0) startTimer(v);
 state.screen='quiz';
 render();
}
function onCustomTimer() {
 const el=document.getElementById('custom-min');
 const v=parseInt(el.value);
 if(!v||v<1||v>180){el.style.borderColor='var(--wrong)';return;}
 onTimerSelected(v*60);
}
function showTimerSelect(isShort) {
 const presets=isShort?[{l:'15분',v:900},{l:'20분',v:1200},{l:'30분',v:1800}]:[{l:'30분',v:1800},{l:'45분',v:2700},{l:'60분',v:3600}];
 app.innerHTML=`
 <div style="display:flex;align-items:center;justify-content:center;min-height:70vh">
 <div style="text-align:center;width:100%;max-width:320px;padding:0 16px">
 <div style="font-size:48px;margin-bottom:12px">⏱</div>
 <div style="font-size:18px;font-weight:700;margin-bottom:20px">타이머 설정</div>
 <div style="display:flex;gap:8px;margin-bottom:16px">
 ${presets.map(o=>`<button class="btn btn-outline" style="flex:1;padding:14px 0;font-size:15px" onclick="onTimerSelected(${o.v})">${o.l}</button>`).join('')}
 </div>
 <div style="display:flex;gap:8px;align-items:center;margin-bottom:16px">
 <div style="flex:1;display:flex;align-items:center;border:2px solid var(--border);border-radius:12px;padding:4px 12px;background:var(--card)">
 <input id="custom-min" type="number" min="1" max="180" placeholder="직접 입력" style="flex:1;border:none;outline:none;font-size:15px;padding:10px 0;background:transparent;width:60px;color:var(--text)" onkeydown="if(event.key==='Enter')onCustomTimer()">
 <span style="font-size:14px;color:var(--sub);white-space:nowrap">분</span>
 </div>
 <button class="btn btn-primary" style="padding:14px 20px;white-space:nowrap" onclick="onCustomTimer()">시작</button>
 </div>
 <button class="btn" style="color:var(--sub);font-size:14px;padding:12px" onclick="onTimerSelected(0)">타이머 없이 시작</button>
 </div>
 </div>`;
}

function startChapterQuiz(ch) {
 const cat=state.cat;
 const allQs=getChapterQuestions(cat,ch);
 const selected=shuffleArray(allQs).slice(0,20);
 const chInfo=CH_INFO[ch];
 state = { screen:'timerSelect', cat, idx:0, answers:new Array(selected.length).fill(-1), current:0, submitted:false, viewMode:'all', chapterExam:{title:chInfo.name,desc:`${chInfo.desc} · ${selected.length}문제`,questions:selected}, chapterMode:true, chapter:ch, timerEnd:null };
 showTimerSelect(true);
}

function startExam(idx) {
 const cat=state.cat;
 state = { screen:'timerSelect', cat, idx, answers:new Array(EXAMS[cat][idx].questions.length).fill(-1), current:0, submitted:false, viewMode:'all', chapterExam:null, chapterMode:false, timerEnd:null };
 showTimerSelect(false);
}

function renderQuiz() {
 const exam=getExam(), total=exam.questions.length;
 const answered=state.answers.filter(a=>a!==-1).length;
 state.viewMode==='single' ? renderSingleQ(exam,total,answered) : renderAllQ(exam,total,answered);
}

function renderSingleQ(exam,total,answered) {
 const i=state.current, q=exam.questions[i], L=['①','②','③','④'];
 const catName=CAT_INFO[state.cat].name;
 app.innerHTML = `
 <div class="top-nav">
 <button class="back-btn" onclick="goBack()">←</button>
 <div style="flex:1;text-align:center;font-weight:600;font-size:14px">${catName} ${exam.title}</div>
 <button class="back-btn" style="margin-left:auto;margin-right:-8px;font-size:14px" onclick="toggleView()">☰</button>
 </div>
 <div style="display:flex;align-items:center;gap:10px">
 <div class="progress-bar" style="flex:1"><div class="progress-fill" style="width:${(answered/total)*100}%"></div></div>
 ${getTimerHTML()}
 </div>
 <div class="progress-text">${answered}/${total} 답변 완료</div>
 <div class="scroll-pad">
 <div class="q-card">
 <div class="q-num">문제 ${i+1} / ${total}</div>
 <div class="q-text">${q.q.replace(/\n/g,'<br>')}</div>
 ${q.o.map((opt,j)=>`<div class="option ${state.answers[i]===j?'selected':''}" onclick="sel(${i},${j})"><div class="circle">${L[j]}</div><div class="option-text">${opt}</div></div>`).join('')}
 </div>
 </div>
 <div class="btn-group"><div class="container"><div class="btn-row">
 <button class="btn btn-outline" onclick="prevQ()" ${i===0?'disabled style="opacity:.4"':''}>← 이전</button>
 ${i===total-1?`<button class="btn btn-primary" onclick="submit()">채점하기</button>`:`<button class="btn btn-primary" onclick="nextQ()">다음 →</button>`}
 </div></div></div>`;
}

function renderAllQ(exam,total,answered) {
 const L=['①','②','③','④'], catName=CAT_INFO[state.cat].name;
 app.innerHTML = `
 <div class="top-nav">
 <button class="back-btn" onclick="goBack()">←</button>
 <div style="flex:1;text-align:center;font-weight:600;font-size:14px">${catName} ${exam.title}</div>
 <button class="back-btn" style="margin-left:auto;margin-right:-8px;font-size:14px" onclick="toggleView()">1개씩</button>
 </div>
 <div style="display:flex;align-items:center;gap:10px">
 <div class="progress-bar" style="flex:1"><div class="progress-fill" style="width:${(answered/total)*100}%"></div></div>
 ${getTimerHTML()}
 </div>
 <div class="progress-text">${answered}/${total} 답변 완료</div>
 <div class="scroll-pad">
 ${exam.questions.map((q,i)=>`<div class="q-card" id="q${i}"><div class="q-num">문제 ${i+1}</div><div class="q-text">${q.q.replace(/\n/g,'<br>')}</div>${q.o.map((opt,j)=>`<div class="option ${state.answers[i]===j?'selected':''}" onclick="sel(${i},${j})"><div class="circle">${L[j]}</div><div class="option-text">${opt}</div></div>`).join('')}</div>`).join('')}
 </div>
 <div class="btn-group"><div class="container"><button class="btn btn-primary" onclick="submit()">채점하기 (${answered}/${total})</button></div></div>`;
}

function sel(qi,oi) { state.answers[qi]=state.answers[qi]===oi?-1:oi; render(); }
function prevQ() { if(state.current>0){state.current--;render();window.scrollTo(0,0);} }
function nextQ() { if(state.current<getExam().questions.length-1){state.current++;render();window.scrollTo(0,0);} }
function toggleView() { state.viewMode=state.viewMode==='single'?'all':'single'; render(); window.scrollTo(0,0); }
function goBack() { if(state.answers.some(a=>a!==-1)&&!state.submitted){if(!confirm('시험을 종료하시겠습니까?'))return;} clearTimer(); state.screen=state.weakMode?'analytics':state.calcMode?'calcCat':state.chapterMode?'chapterCat':'exams'; state.chapterExam=null; render(); }
function submit() {
 const u=state.answers.filter(a=>a===-1).length;
 if(u>0&&!confirm(`아직 ${u}문제를 풀지 않았습니다.\n그래도 채점하시겠습니까?`))return;
 clearTimer(); state.submitted=true; logAnswers(); saveResult(); state.screen='result'; render(); window.scrollTo(0,0);
}

function renderResult() {
 const exam=getExam(), total=exam.questions.length, catName=CAT_INFO[state.cat].name;
 let correct=0,wrong=0,skipped=0;
 state.answers.forEach((a,i)=>{if(a===-1)skipped++;else if(a===exam.questions[i].a)correct++;else wrong++;});
 const score=Math.round((correct/total)*100), pass=score>=60;
 app.innerHTML = `
 <div class="top-nav"><button class="back-btn" onclick="state.screen='${state.weakMode?'analytics':state.calcMode?'calcCat':state.chapterMode?'chapterCat':'exams'}';render()">←</button><div style="flex:1;text-align:center;font-weight:600;font-size:14px">채점 결과</div></div>
 <div class="result-card">
 <div style="font-size:15px;font-weight:600;margin-bottom:16px">${catName} ${exam.title}</div>
 <div class="score-circle ${pass?'pass':'fail'}">${score}<small>점</small></div>
 <div style="font-size:20px;font-weight:700;margin-top:8px;color:${pass?'var(--correct)':'var(--wrong)'}">${pass?'🎉 합격!':'😢 불합격'}</div>
 <div class="score-label">합격 기준: 60점 이상</div>
 <div class="stat-row">
 <div class="stat-item"><div class="stat-num" style="color:var(--correct)">${correct}</div><div class="stat-label">정답</div></div>
 <div class="stat-item"><div class="stat-num" style="color:var(--wrong)">${wrong}</div><div class="stat-label">오답</div></div>
 <div class="stat-item"><div class="stat-num" style="color:var(--sub)">${skipped}</div><div class="stat-label">미답</div></div>
 </div>
 </div>
 <button class="btn btn-primary" onclick="showReview('wrong')">오답 확인하기</button>
 <button class="btn btn-outline" onclick="showReview('all')">전체 문제 확인</button>
 ${state.weakMode?`<button class="btn btn-outline" onclick="startWeakQuiz()">다시 풀기 (새 랜덤)</button>`:state.calcMode?`<button class="btn btn-outline" onclick="startCalcQuiz('${state.chapter}')">다시 풀기 (새 랜덤)</button>`:state.chapterMode?`<button class="btn btn-outline" onclick="startChapterQuiz('${state.chapter}')">다시 풀기 (새 랜덤)</button>`:`<button class="btn btn-outline" onclick="startExam(${state.idx})">다시 풀기</button>`}
 <button class="btn btn-outline" onclick="state.screen='${state.weakMode?'analytics':state.calcMode?'calcCat':state.chapterMode?'chapterCat':'exams'}';render()">${state.weakMode?'학습 분석':state.calcMode?'계산 문제':state.chapterMode?'챕터 목록':'시험 목록'}</button>
 <button class="btn btn-outline" onclick="state.screen='home';render()">홈으로</button>
 <div style="height:20px"></div>`;
}

function showReview(f) { state.screen='review'; state.reviewFilter=f; render(); window.scrollTo(0,0); }

function renderReview() {
 const exam=getExam(), total=exam.questions.length, L=['①','②','③','④'], f=state.reviewFilter||'all';
 let idx=[];
 for(let i=0;i<total;i++){if(f==='all')idx.push(i);else if(f==='wrong'&&state.answers[i]!==exam.questions[i].a)idx.push(i);}
 app.innerHTML = `
 <div class="top-nav"><button class="back-btn" onclick="state.screen='result';render()">←</button>
 <div style="flex:1;text-align:center;font-weight:600;font-size:14px">${f==='wrong'?'오답 노트':'전체 문제 확인'} (${idx.length}문제)</div></div>
 <div class="tab-bar">
 <div class="tab ${f==='all'?'active':''}" onclick="showReview('all')">전체</div>
 <div class="tab ${f==='wrong'?'active':''}" onclick="showReview('wrong')">오답만</div>
 </div>
 <div class="review-toggle">
 ${Array.from({length:total},(_,i)=>{const m=state.answers[i],a=exam.questions[i].a,c=m===-1?'s':m===a?'c':'w';return`<div class="review-dot ${c}" onclick="scrollR(${i})">${i+1}</div>`;}).join('')}
 </div>
 ${idx.map(i=>{const q=exam.questions[i],m=state.answers[i],c=q.a;
 return`<div class="q-card" id="rq${i}">
 <div class="q-num" style="color:${m===c?'var(--correct)':'var(--wrong)'}">문제 ${i+1} ${m===c?'✓ 정답':'✗ 오답'}</div>
 <div class="q-text">${q.q.replace(/\n/g,'<br>')}</div>
 ${q.o.map((opt,j)=>{let cls='';if(j===c)cls='correct';else if(j===m&&m!==c)cls='wrong';return`<div class="option ${cls}"><div class="circle">${L[j]}</div><div class="option-text">${opt}</div></div>`;}).join('')}
 <div class="explain">
 <strong>정답: ${L[c]} ${q.o[c]}</strong>
 ${m!==-1&&m!==c?`<br>내 답: ${L[m]} ${q.o[m]}`:''}
 ${m===-1?'<br>⚠️ 미답변':''}
 <br><br>${(q.e||'').replace(/\n/g,'<br>')}
 ${q.v===0?'<div class="ai-badge unverified">⚠️ 정답 미검증 (comcbt 대조 불가)</div>':q.r&&q.r<99?`<div class="ai-badge ${q.r>=90?'high':q.r>=75?'mid':'low'}">🤖 AI 해설 신뢰도 ${q.r}%</div>`:''}
 </div>
 </div>`;}).join('')}
 <div style="height:20px"></div>`;
}

function scrollR(i) { const el=document.getElementById('rq'+i); if(el)el.scrollIntoView({behavior:'smooth',block:'center'}); }

// ========== 학습 분석 화면 ==========
function renderAnalytics() {
 const log=getLog();
 if(!log.length){
 app.innerHTML=`<div class="top-nav"><button class="back-btn" onclick="state.screen='home';render()">←</button><div style="flex:1;text-align:center;font-weight:600;font-size:14px">학습 분석</div></div>
 <div class="result-card"><div style="font-size:48px;margin-bottom:16px">📊</div><div style="font-size:16px;font-weight:600">아직 풀이 기록이 없어요</div><div style="font-size:14px;color:var(--sub);margin-top:8px">시험을 풀면 학습 분석이 시작됩니다</div></div>`;
 return;
 }
 const chKeys=['ingredients','manufacturing','nutrition','hygiene','management'];
 const L=['①','②','③','④'];
 let chaptersHtml='';
 for(const cat of['bread','cake']){
 const cs=getChapterStats(cat), ci=CAT_INFO[cat];
 const hasData=Object.values(cs).some(s=>s.total>0);
 if(!hasData)continue;
 chaptersHtml+=`<div style="font-size:14px;font-weight:700;margin:16px 0 8px">${ci.emoji} ${ci.name}</div>`;
 for(const ch of chKeys){
 const s=cs[ch]||{right:0,wrong:0,total:0};
 if(!s.total)continue;
 const rate=Math.round(s.right/s.total*100);
 const info=CH_INFO[ch];
 const color=rate>=80?'var(--correct)':rate>=60?'var(--primary)':'var(--wrong)';
 chaptersHtml+=`<div style="margin-bottom:10px">
 <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span>${info.emoji} ${info.name}</span><span style="font-weight:700;color:${color}">${rate}% <span style="font-weight:400;color:var(--sub)">(${s.right}/${s.total})</span></span></div>
 <div style="background:var(--border);border-radius:6px;height:8px;overflow:hidden"><div style="background:${color};height:100%;width:${rate}%;border-radius:6px;transition:width .3s"></div></div>
 </div>`;
 }
 }
 // 오답 TOP 10
 const allWeak=[...getWeakQuestions('bread'),...getWeakQuestions('cake')];
 allWeak.sort((a,b)=>b.weight-a.weight);
 const top10=allWeak.slice(0,10);
 let weakHtml='';
 if(top10.length){
 weakHtml=`<div style="font-size:14px;font-weight:700;margin:20px 0 8px">자주 틀리는 문제 TOP ${top10.length}</div>`;
 top10.forEach((s,i)=>{
 const q=findQuestionById(s.id);
 if(!q)return;
 weakHtml+=`<div class="q-card" style="padding:14px">
 <div style="display:flex;justify-content:space-between;margin-bottom:6px">
 <span class="q-num" style="color:var(--wrong)">#${i+1}</span>
 <span style="font-size:12px;color:var(--sub)">${s.wrong}회 오답 · ${s.right}회 정답</span>
 </div>
 <div style="font-size:13px;line-height:1.5;color:var(--text)">${q.q.length>60?q.q.substring(0,60)+'...':q.q}</div>
 ${s.lastPicked!==null?`<div style="font-size:12px;color:var(--wrong);margin-top:4px">마지막 오답: ${L[s.lastPicked]} ${q.o[s.lastPicked]||''}</div>`:''}
 <div style="font-size:12px;color:var(--correct);margin-top:2px">정답: ${L[q.a]} ${q.o[q.a]}</div>
 </div>`;
 });
 }
 // 취약 복습 버튼
 const weakCount=allWeak.length;
 const weakBtn=weakCount>0?`<button class="btn btn-primary" onclick="startWeakQuiz()" style="margin-top:16px">🔄 취약 문제 복습 (${Math.min(weakCount,20)}문제)</button>`:'';
 app.innerHTML=`
 <div class="top-nav"><button class="back-btn" onclick="state.screen='home';render()">←</button><div style="flex:1;text-align:center;font-weight:600;font-size:14px">📊 학습 분석</div></div>
 <div class="result-card" style="padding:16px;text-align:left">
 <div style="text-align:center;margin-bottom:12px;font-size:13px;color:var(--sub)">총 ${log.length}문제 풀이 · 정답률 ${Math.round(log.filter(r=>r.correct).length/log.length*100)}%</div>
 ${chaptersHtml}
 </div>
 ${weakHtml}
 ${weakBtn}
 <button class="btn btn-outline" onclick="if(confirm('풀이 기록을 초기화할까요?')){localStorage.removeItem('baker-quiz-log');state.screen='home';render()}" style="margin-top:10px;font-size:13px;color:var(--sub)">풀이 기록 초기화</button>
 <div style="height:20px"></div>`;
}

function startWeakQuiz() {
 const allWeak=[...getWeakQuestions('bread'),...getWeakQuestions('cake')];
 allWeak.sort((a,b)=>b.weight-a.weight);
 const pool=allWeak.slice(0,Math.max(allWeak.length,40));
 const selected=shuffleArray(pool).slice(0,20);
 const questions=selected.map(s=>findQuestionById(s.id)).filter(Boolean);
 if(!questions.length){alert('복습할 문제가 없습니다.');return;}
 state={screen:'timerSelect',cat:'bread',idx:0,answers:new Array(questions.length).fill(-1),current:0,submitted:false,viewMode:'all',chapterExam:{title:'취약 문제 복습',desc:`가중치 기반 ${questions.length}문제`,questions},chapterMode:false,weakMode:true,timerEnd:null};
 showTimerSelect(true);
}

render();
</script>
</body>
</html>
