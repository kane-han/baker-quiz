{q:"계란 40%를 사용하여 만든 커스터드 크림과 비슷한 되기로 만들기 위하여 계란 전량을 옥수수 전분으로 대치한다면 얼마 정도가 가장 적합한가?",o:["10%","20%","30%","40%"],a:0,e:"계란 40%를 옥수수 전분으로 완전히 대치할 때는 약 10%가 적합하다. 옥수수 전분의 호화·농후화 능력이 계란보다 훨씬 강하기 때문에 소량으로도 동일한 되기를 낼 수 있다.",r:95,c:"ingredients"},
{q:"비중 컵의 물을 담은 무게가 300g이고, 반죽을 담은 무게가260g일 때 비중은? (단, 비중 컵의 무게는 50g이다.)",o:["0.64","0.74","0.84","1.04"],a:2,e:"(반죽담은무게-비중컵무게)÷(물담은무게-비중컵무게) (260-50)÷(300-50) 210÷250=0.84",r:99,c:"manufacturing"},
{q:"작업을 하고 남은 초콜릿의 가장 알맞은 보관법은?",o:["15~21℃의 직사광선이 없는 곳에 보관","냉장고에 넣어 보관","공기가 통하지 않는 습한 곳에 보관","따뜻한 오븐 위에 보관"],a:0,e:"초콜릿은 15~21℃의 서늘하고 직사광선이 없는 곳에서 보관하는 것이 적합하다. 냉장고나 습한 곳은 블룸 현상을 일으킨다.",r:93,c:"ingredients"},
{q:"거품형 쿠키로서 전란을 사용하여 만드는 쿠키는?",o:["드롭쿠키","스냅쿠키","스펀지쿠키","머랭쿠키"],a:2,e:"스펀지 쿠키는 거품형으로 전란을 사용하여 만든다. 머랭 쿠키는 흰자만, 드롭 쿠키와 스냅 쿠키는 반죽형이다.",r:85,c:"manufacturing"},
{q:"푸딩 표면에 기포 자국이 많이 생기는 경우는?",o:["가열이 지나친 경우","계란의 양이 많은 경우","계란이 오래된 경우","오븐 온도가 낮은 경우"],a:0,e:"푸딩 표면에 기포 자국이 많이 생기는 경우는 가열이 지나친 경우이다. 고온에서 급격히 가열되면 수분이 끓어 기포가 형성된다.",r:93,c:"ingredients"},
{q:"냉동제법으로 배합표를 작성하는 방법이 옳은 것은?",o:["밀가루 단백질 함량 0.5~20％ 감소","수분함량 1~2% 감소","이스트 함량 2~3％ 사용","설탕 사용량 1~2％ 감소"],a:1,e:"냉동제법 배합표에서는 수분함량을 1~2% 감소시켜 냉동 시 결빙을 줄인다.",r:85,c:"ingredients"},
{q:"어떤 제품의 가격이 600원일 때 제조원가는? (단, 손실율은 10%이고, 이익률(마진율)은 15% 가격은 부가가치세 10%를 포함한 가격이다.)",o:["431원","444원","474원","545원"],a:0,e:"개당 원가가 a원이라고 해보겠습니다. (이 a원을 구해야 합니다.) 그런데 손실율이 10%라면 110%를 구비해 둬야 합니다. 따라서 그 원가를 분배하면 1.1a원이 됩니다. 이렇게 비용을 부담하고도 이익률이 15%로 가격을 책정하면 가격은 1.1a * 1.15 = 1.265a가 됩니다. 여기에 부가세가 붙으면 다시 1.1이 곱해져서 1.3915a가 됩니다. 1.3915a = 600 a = 600/1.3915 a = 431.189...가 됩니다. 원단위로는 431원이 됩니다. -출처 네이버 지식in- 600(판매가)÷1.1(부가가치세)÷1.15(이익)÷1.1(손실)",r:99,c:"management"},
{q:"성형에서 반죽의 중간발효 후 밀어 펴기 하는 과정의 주된 효과는?",o:["글루텐 구조의 재정돈","가스를 고르게 분산","부피의 증가","단백질의 변성"],a:1,e:"밀어펴기의 주된 효과는 반죽 내 가스를 고르게 분산시켜 균일한 기공 구조를 형성하는 것이다. 이 과정에서 큰 기포가 제거되고 가스가 균일하게 퍼져 성형 후 최종 제품의 기공이 고르게 된다.",r:93,c:"manufacturing"},
{q:"식빵 배합에서 소맥분 대비 6%의 탈지분유를 사용할 때의 현상이 아닌 것은?",o:["발효를 촉진 시킨다.","믹싱 내구성을 높인다.","표피색을 진하게 한다.","흡수율을 증가시킨다."],a:0,e:"탈지분유는 유당이 마이야르 반응을 촉진하여 표피색을 진하게 하고, 흡수율과 믹싱 내구성을 높인다. 그러나 유당은 이스트가 발효에 이용할 수 없어 발효를 촉진시키지 않고 오히려 약간 억제한다.",r:93,c:"manufacturing"},
{q:"제빵용 팬기름에 대한 설명으로 틀린 것은?",o:["종류에 상관없이 발연점이 낮아야 한다.","백색 광유 (mineral oil)도 사용된다.","정제라드, 식물유, 혼합유도 사용된다.","과다하게 칠하면 밑껍질이 두껍고 어둡게 된다."],a:0,e:"팬기름은 발연점이 높아야 한다",r:99,c:"ingredients"},
{q:"발효가 지나친 반죽으로 빵을 구웠을 때의 제품 특성이 아닌 것은?",o:["빵껍질색이 밝다.","신냄새가 있다.","체적이 적다.","제품의 조직이 고르다."],a:3,e:"발효가 지나친 반죽으로 빵을 구웠을 때 기공이 거칠다 제과",r:99,c:"manufacturing"},
{q:"다음 중 파이롤러를 사용하기에 부적합한 제품은?",o:["스위트롤","데니시 페이스트리","크로와상","브리오슈"],a:3,e:"브리오슈는 버터와 달걀이 많이 들어가는 부드러운 빵으로, 파이롤러가 아닌 손 성형이 적합하다. 나머지는 밀어 펴는 공정이 필요한 제품이다.",r:93,c:"manufacturing"},
{q:"반죽의 수분흡수와 믹싱 시간에 공통적으로 영향을 주는 재료가 아닌 것은?",o:["밀가루의 종류","설탕 사용량","분유 사용량","이스트푸드 사용량"],a:3,e:"반죽의 수분흡수와 믹싱 시간에 공통적으로 영향을 주는 것은 밀가루 종류, 설탕·분유 사용량이다. 이스트푸드는 발효에 영향을 주지 흡수율이나 믹싱에는 직접 영향이 적다.",r:93,c:"ingredients"},
{q:"불란서빵의 필수재료와 거리가 먼 것은?",o:["밀가루","분유","분유사용량","이스트"],a:1,e:"불란서빵(바게트)의 필수재료는 밀가루, 물, 소금, 이스트이다. 분유는 사용하지 않으므로 필수재료와 거리가 멀다.",r:85,c:"ingredients"},
{q:"다음 중 이스트가 오븐 내에서 사멸되기 시작하는 온도는?",o:["40℃","60℃","80℃","100℃"],a:1,e:"이스트는 오븐 내에서 약 60℃부터 사멸하기 시작한다.",r:82,c:"ingredients"},
{q:"일반적으로 표준식빵 제조 시 가장 적당한 2차 발효실 습도는?",o:["95%","85%","65%","55%"],a:1,e:"표준식빵 제조 시 2차 발효실 습도는 약 85%가 적당하다.",r:82,c:"manufacturing"},
{q:"굽기 후 빵을 썰어 포장하기에 가장 좋은 온도는?",o:["17℃","27℃","37℃","47℃"],a:2,e:"굽기 후 빵을 썰어 포장하기에 가장 좋은 빵 속 온도는 약 37℃이다. 이 온도에서 빵이 충분히 냉각되어 형태가 안정되면서도 수분이 적절히 유지되어 썰기와 포장에 적합한 상태가 된다.",r:90,c:"manufacturing"},
{q:"발효 중 가스 생성이 증가하지 않는 경우는?",o:["이스트를 많이 사용할 때","소금을 많이 사용할 때","반죽에 약산을 소량 첨가할 때","발효실 온도를 약간 높일 때"],a:1,e:"소금은 이스트의 삼투압을 높여 발효를 억제하므로, 소금을 많이 사용하면 가스 생성이 감소한다.",r:85,c:"manufacturing"},
{q:"일반적인 스펀지/도법에서 가장 적당한 스펀지 온도는?",o:["12~15℃","18~20℃","23~25℃","29~32℃"],a:2,e:"스펀지도법에서 스펀지 온도는 24도이다",r:99,c:"nutrition"},
{q:"반죽의 변화단계에서 생기 있는 외관이 되며 매끄럽고 부드러우며 탄력성이 증가되어 강하고 단단한 반죽이 되었을 때의 상태는?",o:["클린업 상태 (clean up)","픽업 상태 (pick up)","발전 상태 (development)","렛다운 상태 (let down)"],a:2,e:"발전 상태(development)에서는 반죽이 매끄럽고 부드러우며 탄력성이 증가하여 강하고 단단해진다.",r:85,c:"manufacturing"},
{q:"밀가루를 전문적으로 시험하는 기기로 이루어진 것은?",o:["패리노그래프, 가스크로마토그래피, 익스텐소그래프","패리노그래프, 아밀로그래프, 파이브로 미터","패리노그래프, 익스텐소그래프, 아밀로그래프","아밀로그래프 ,익스텐소그래프, 펑츄어 테스터"],a:2,e:"패리노그래프(흡수율·믹싱특성), 익스텐소그래프(신장성·저항), 아밀로그래프(호화특성)가 밀가루 전문 시험 기기의 올바른 조합이다.",r:90,c:"ingredients"},
{q:"소맥분의 패리노그래프를 그려 보니 믹싱타임(mixing time)이 매우 짧 은 것으로 나타났다. 이 소맥분을 빵에 사용할 때 보완법으로 옳은 것은?",o:["소금 양을 줄인다.","탈지분유를 첨가한다.","이스트 양을 증가시킨다.","pH를 낮춘다."],a:1,e:"믹싱타임이 매우 짧은 소맥분은 단백질이 약하므로 탈지분유를 첨가하여 반죽을 강화한다.",r:85,c:"ingredients"},
{q:"유지의 경화란 무엇인가?",o:["경유를 정제하는 것","지방산가를 계산하는 것","우유를 분해하는 것","불포화지방산에 수소를 첨가하여 고체화시키는 것"],a:3,e:"유지의 경화란 불포화지방산에 수소를 첨가하여 고체 상태로 만드는 것이다.",r:85,c:"nutrition"},
{q:"아이싱에 사용하는 재료 중 안정제의 기능과 거리가 먼 것은?",o:["펙틴","밀 전분","옥수수 전분","소금"],a:3,e:"아이싱의 안정제로는 펙틴, 밀 전분, 옥수수 전분 등이 사용된다. 소금은 안정제가 아니라 맛을 내는 조미료이다.",r:90,c:"ingredients"},
{q:"제빵에서 글루텐을 강하게 하는 것은?",o:["전분","우유","맥아","산화제"],a:3,e:"산화제 : 글루텐의 탄력성을 부여",r:99,c:"ingredients"},
{q:"식용유지의 산패 촉진 요인이 아닌 것은?",o:["산소 가스","질소 가스","동(銅)","자외선"],a:1,e:"질소가스는 반응성이 적기 때문에 식용 유지와의 산패 반응의 요인으로는 거리가 멀다",r:99,c:"ingredients"},
{q:"이스트 푸드의 구성성분 중 칼슘염의 주요 기능은?",o:["이스트 성장에 필요하다.","반죽에 탄성을 준다.","오븐팽창이 커진다.","물조절제의 역할을 한다."],a:3,e:"이스트푸드의 칼슘염은 물 조절제(water conditioner) 역할을 하여 반죽에 사용하는 물의 경도를 조절한다. 적정 경도의 물은 이스트 활성과 글루텐 형성에 최적 환경을 제공한다.",r:85,c:"nutrition"},
{q:"α 전분이 β전분으로 되돌아가는 현상은?",o:["호화","산화","노화","호정화"],a:2,e:"노화는 알파전분의 퇴화(베타화)가 주원인",r:99,c:"ingredients"},
{q:"밀가루의 단백질에 작용하는 효소는?",o:["말타아제","아밀라아제","리파아제","프로테아제"],a:3,e:"프로테아제는 밀가루의 단백질(글루텐)에 작용하는 효소이다. 말타아제는 맥아당, 아밀라아제는 전분, 리파아제는 지방에 작용한다.",r:93,c:"ingredients"},
{q:"유황을 함유한 아미노산으로 -s-s- 결합을 가진 것은?",o:["리신 (lysine)","루신(leucine)","시스틴 (cystine)","글루타민산(gletamic acid)"],a:2,e:"시스틴(cystine)은 두 분자의 시스테인이 -S-S- 결합(이황화결합)으로 연결된 아미노산이다.",r:85,c:"nutrition"},
{q:"우유에서 유지방을 분리하고 나머지를 가열 건조시킨 것은?",o:["전지분유","발효유","고지방분유","탈지분유"],a:3,e:"탈지분유는 우유에서 유지방을 분리(탈지)하고 나머지를 가열 건조시킨 것이다.",r:85,c:"ingredients"},
{q:"연수를 사용했을 때 나타나는 현상이 아닌 것은?",o:["반죽의 점착성이 증가한다.","가수량이 감소한다.","오븐 스프링이 나쁘다.","반죽의 탄력성이 강하다."],a:3,e:"연수를 사용하면 글루텐이 약해져 반죽 점착성이 증가하고 오븐 스프링이 나빠진다. 반죽의 탄력성이 강해지는 것은 연수가 아닌 경수의 특성이다.",r:93,c:"manufacturing"},
{q:"빵 반죽이 발효되는 동안 이스트는 무엇을 생성하는가?",o:["물, 초산","산소, 알데히드","수소, 젖산","탄산가스, 알코올"],a:3,e:"빵 반죽 발효 중 이스트는 당을 분해하여 탄산가스와 알코올을 생성한다.",r:85,c:"manufacturing"},
{q:"다음 중 제분율을 구하는 식으로 적합한 것은?",o:["식1","식2","식3","식4"],a:0,e:"제분율 = (밀가루 무게 ÷ 밀 무게) × 100으로 구한다. 이는 밀 전체 중 실제로 추출된 밀가루의 비율을 나타낸다.",r:82,c:"manufacturing"},
{q:"다음 그림과 같이 계란의 신선도를 검사하기 위하여 소금물 (8% 정도)에 계란을 넣었을 때 가장 신선한 것은?",o:["1","2","3","4"],a:3,e:"달걀을 물에 넣었을 때 가라앉는다면 신선한 것이다. 반면, 위로 기울어지거나 뜬다면 상한 것으로 봐야 한다. 상한 달걀이 물에 뜨는 이유는 보관 과정에서 달걀 내 공기가 드나드는 공간인 기실을 통해 수분이 증발하기 때문이다. 따라서 문제의 답은 4번이다.",r:99,c:"ingredients"},
{q:"과자를 50g 섭취하였을 때 지방으로부터 얻을 수 있는 열량은? (단, 과자 100g당 영양소 함량은 단백질 8.0g , 지질 17.2g당질 41.4g 이다.)",o:["77.4kcal","154.8kcal","34.4kcal","68.8kcal"],a:0,e:"17.2×9칼로리×50/100 제빵",r:99,c:"nutrition"},
{q:"소화 시 담즙의 작용은?",o:["지방을 유화시킨다.","지방질을 가수분해한다.","단백질을 가수분해한다.","콜레스테롤을 가수분해 한다."],a:0,e:"담즙(쓸개즙)은 지방을 유화시키는 작용을 한다. 담즙 자체는 효소가 아니며, 지방을 작은 입자로 나누어 리파아제의 작용을 돕는다.",r:93,c:"nutrition"},
{q:"무기질에 대한 설명으로 틀린 것은?",o:["황(S)은 당질 대사에 중요하며 혈액을 알칼리성으로 유지시킨다.","칼슘(Ca)은 주로 골격과 치아를 구성하고 혈액응고작용 을 돕는다.","나트륨(Na)은 주로 세포 외액에 들어있고 삼투압 유지에 관여한다.","요오드(I)SMS 갑상선호르몬의 주성분으로 결핍되면 갑상선종을 일으킨다."],a:0,e:"마그네슘이 결핍시 혈압&수족냉증이 생깁니다 마그네슘은 다시마,견과류,바나나,콩류,아보카도,우유입니다",r:99,c:"nutrition"},
{q:"단백질 효율(PER)은 무엇을 측정하는 것인가?",o:["단백질의 질","단백질의 열량","단백질의 양","아미노산 구성"],a:0,e:"단백질 효율(PER, Protein Efficiency Ratio)은 단백질의 질을 측정하는 방법으로, 섭취한 단백질 1g당 체중 증가량을 나타낸다.",r:93,c:"nutrition"},
{q:"다당류에 속하는 것은?",o:["맥아당","설탕","포도당","전분"],a:3,e:"단당류 - 포도당 이당류 - 맥아당, 설탕 다당류 - 전분",r:99,c:"ingredients"},
{q:"세균성식중독과 비교하여 경구전염병의 특성이 아닌 것은?",o:["미량의 균으로도 감염된다.","비교적 잠복기가 짧다.","2차 감염이 빈번하다.","음용수로 인해 감염된다."],a:1,e:"경구전염병의 특성. 미량의 균으로 감염된다/ 잠복기는 일반적으로 길다./ 2차감염이 많고 파상적 전파/ 음용수에 의해 감염된다.",r:99,c:"hygiene"},
{q:"미생물에 의한 오염을 최소화하기 위한 작업장 위생관리 방법으로 바람직하지 않은 것은?",o:["소득액으로 벽, 바닥, 천장을 세척한다.","빵상자, 수송차량, 매장 진열대는 항상 온도를 높게 관리한다.","깨끗하고 뚜껑이 있는 재료통을 사용한다.","적절한 환기와 조명시설이 된 저장실에 재료를 보관 한다."],a:1,e:"빵상자, 수송차량, 매장 진열대의 온도를 항상 높게 관리하면 미생물 증식이 촉진된다. 온도를 낮게 관리해야 한다.",r:93,c:"hygiene"},
{q:"아래에서 설명하는 식품첨가물은? 빵의 부패의 원인이 되는 곰팡이나 부패균에 유효하고 빵의 발효에 필요한 효모에는 작용하지 않는다. 이러한 특성으로 인해 빵이나 양과자의 보존료로 쓰인다.",o:["안식향산","토코페롤","이소로이신","프로피온산"],a:3,e:"프로피온산은 빵의 곰팡이와 부패균에 유효하면서 효모에는 작용하지 않아 빵·양과자의 보존료로 사용된다.",r:85,v:0,c:"ingredients"},
{q:"이형제의 용도는?",o:["가수분해에 사용된 산제의 중화제로 사용된다.","제과/제빵을 구울 때 형틀에서 제품의 분리를 용이하게 한다.","거품을 소멸, 억제하기 위해 사용하는 첨가물이다.","원료가 덩어리지는 것을 방지하기 위해 사용한다."],a:1,e:"이형제는 제과·제빵을 구울 때 형틀에서 제품의 분리를 용이하게 하는 첨가물이다.",r:85,c:"ingredients"},
{q:"결핵의 주요한 감염원이 될 수 있는 것은?",o:["토끼고기","양고기","돼지고기","불완전 살균우유"],a:3,e:"불완전 살균우유로 감염되는 병 :결핵,Q열,파상열",r:99,c:"hygiene"},
{q:"복어 중독의 원인 물질은?",o:["테트로도톡신 (tetrodotoxin)","삭시톡신 (saxitoxin)","베네루핀 (venerupin)","안드로메도톡신 (andromedotoxin)"],a:0,e:"복어 중독의 원인 물질은 테트로도톡신(tetrodotoxin)이다. 삭시톡신은 조개독, 베네루핀은 굴독이다.",r:93,c:"hygiene"},
{q:"고시폴(gossypol)은 어떤 식품에서 발생할 수 있는 식중독의 원인 성분인가?",o:["고구마","풋살구","보리","면실유"],a:3,e:"고시폴(gossypol)은 면실유(면화씨 기름)에 함유된 독성물질이다.",r:82,c:"hygiene"},
{q:"아폴라톡신은 다음 중 어디에 속하는가?",o:["고구마","효모독","세균독","곰팡이독"],a:3,e:"아플라톡신은 아스페르길루스(Aspergillus) 곰팡이가 생성하는 곰팡이독(mycotoxin)이다.",r:85,c:"hygiene"},
{q:"발효가 부패와 다른 점은?",o:["미생물이 작용한다.","생산물을 식용으로 한다.","단백질의 변화반응이다.","성분의 변화가 일어난다."],a:1,e:"발효는 미생물의 작용으로 생산물을 식용(또는 유용)하게 이용하는 것이고, 부패는 유해한 산물을 생성하는 것이다.",r:90,c:"hygiene"},
{q:"원인균이 내열성포자를 형성하기 때문에 병든 가축의 사체를 처리할 경우 반드시 소각처리 하여야 하는 인수 공통전염병은?",o:["돈단독","결핵","파상열","탄저병"],a:3,e:"탄저병은 원인균(탄저균)이 내열성 포자를 형성하므로, 병든 가축의 사체를 소각 처리해야 한다. 매몰이나 일반 소독으로는 포자를 완전히 사멸시킬 수 없다.",r:90,c:"hygiene"}]},
{title:"2008년 4회",desc:undefined,questions:[{q:"다음 중 크림법에서 가장 먼저 배합하는 재료의 조합은?",o:["유지와 설탕","계란과 설탕","밀가루와 설탕","밀가루와 계란"],a:0,e:"크림법: 유지와 설탕을 믹싱하여 크림을 만든 후 계란을 서서히 넣으면서 부드러운 크림을 만든 다음 밀가루를 넣어 반죽을 합니다. 간단히 말하자면(유지와 설탕->계란->밀가루) 제빵",r:99,c:"ingredients"},
{q:"스펀지케이크를 제조하기 위한 필수적인 재료들만으로 짝지어진 것은?",o:["전분, 유지, 물엿, 계란","설탕, 계란, 소맥분, 소금","소맥분, 면실유, 전분, 물","계란, 유지, 설탕, 우유"],a:1,e:"스펀지케이크의 필수 재료는 설탕, 계란, 소맥분(밀가루), 소금이다. 유지, 전분, 물엿, 물 등은 선택 재료이다.",r:93,c:"ingredients"},
{q:"쿠키가 잘 퍼지지(spread) 않는 이유가 아닌 것은?",o:["고운 입자의 설탕 사용","과도한 믹싱","알칼리 반죽 사용","너무 높은 굽기 온도"],a:2,e:"알칼리 반죽은 반죽의 pH를 높여 글루텐을 약화시키고 퍼짐성을 촉진하므로 쿠키가 잘 퍼지게 한다. 따라서 알칼리 반죽 사용은 쿠키가 잘 퍼지지 않는 이유가 아니다.",r:93,c:"manufacturing"},
{q:"계란의 기포성과 포집성이 가장 좋은 온도는?",o:["0℃","5℃","30℃","50℃"],a:2,e:"계란의 기포성과 포집성은 약 30℃에서 가장 좋다. 이 온도에서 점도가 적당하여 기포 형성과 유지가 최적이다.",r:90,c:"ingredients"},
{q:"파운드케이크 제조시 윗면이 터지는 경우가 아닌 것은?",o:["굽기 중 껍질 형성이 느릴 때","반죽 내의 수분이 불충분할 때","설탕 입자가 용해되지 않고 남아 있을 때","반죽을 팬에 넣은 후 굽기까지 장시간 방치할 때"],a:0,e:"굽기 중 껍질 형성이 느리면 내부 팽창압이 분산되어 오히려 터짐이 방지된다. 반면 껍질이 빨리 형성되면 내부 가스가 빠져나가지 못해 표면이 터진다. 수분 부족, 미용해 설탕, 장시간 방치는 윗면 터짐의 원인이 된다.",r:93,c:"manufacturing"},
{q:"유화 쇼트닝을 60% 사용해야 할 옐로우 레이어 케이크 배합에 32%의 초콜릿을 넣어 초콜릿 케이크를 만든다면 원래의 쇼트닝 60%는 얼마로 조절해야 하는가?",o:["48%","54%","60%","72%"],a:1,e:"줄여야 할 유지(쇼트닝)의 양 = 코코아버터양 / 2 코코아버터의 양 = 초콜릿 x (3/8) = 32% x (3/8) = 12% → 줄여야 할 유지의 양 = 12% / 2 = 6% 따라서 유지 조절양 = 60% - 6% = 54%",r:99,c:"ingredients"},
{q:"비중이 높은 제품의 특징이 아닌 것은?",o:["기공이 조밀하다.","부피가 작다.","껍질색이 진하다.","제품이 단단하다."],a:2,e:"비중이 높은 경우: 기공이 작고 조밀하여 무겁고 부피가 작음 비중이 낮은 경우: 기공이 열려 조직이 거칠고 제품의 부피가 큼",r:99,c:"manufacturing"},
{q:"다음 제품 중 굽기 전 충분히 휴지를 한 후 굽는 제품은?",o:["오믈렛","버터스펀지 케이크","오렌지 쿠키","퍼프 페이스트리"],a:3,e:"퍼프 페이스트리는 밀어펴기와 접기를 반복한 후 충분히 휴지한 뒤 굽는다. 휴지를 통해 글루텐을 이완시킨다.",r:85,c:"manufacturing"},
{q:"도넛의 글레이즈 사용온도로 가장 적합한 것은?",o:["20℃","30℃","50℃","70℃"],a:2,e:"도넛의 글레이즈 사용온도는 약 50℃가 적합하다. 이 온도에서 적절한 유동성으로 코팅이 잘 된다.",r:82,c:"manufacturing"},
{q:"커스터드푸딩은 틀에 몇 % 정도 채우는가?",o:["55%","75%","95%","115%"],a:2,e:"커스터드 푸딩은 틀에 약 95% 정도 채운다. 커스터드는 굽는 동안 팽창이 거의 없으므로 틀을 거의 가득 채워도 넘치지 않는다.",r:87,c:"manufacturing"},
{q:"데커레이션케이크 재료인 생크림에 대한 설명으로 틀린 것은?",o:["크림 100에 대하여 1.0~1.5%의 분설탕을 사용하여 단맛을 낸다.","유지방 함량 35~45%정도의 진한 생크림을 휘핑 하여 사용한다.","휘핑 시간이 적정시간보다 짧으면 기포의 안정성이 약해진다.","생크림의 보과이나 작업 시 제품온도는 3~7℃가 좋다."],a:0,e:"생크림에 설탕을 첨가할 때 크림 100에 대하여 1.0~1.5%는 너무 적은 양이다. 일반적으로 생크림 대비 8~12%의 설탕을 첨가하므로 이 설명이 틀렸다.",r:90,c:"ingredients"},
{q:"완성된 반죽형 케이크가 단단하고 질길 때 그 원인이 아닌 것은?",o:["부적절한 밀가루의 사용","달걀의 과다 사용","높은 굽기 온도","팽창제의 과다 사용"],a:3,e:"반죽형 케이크가 단단하고 질긴 원인은 부적절한 밀가루(강력분), 달걀 과다, 높은 굽기 온도 등이다. 팽창제를 과다 사용하면 오히려 제품이 과도하게 부풀어 가볍고 부서지기 쉬우므로, 단단하고 질긴 것의 원인이 아니다.",r:85,c:"manufacturing"},
{q:"다음 제품 중 성형하여 패닝 할 때 반죽의 간격을 가장 충분히 유지하여야 하는 제품은?",o:["오믈렛","쇼트 브레드 쿠키","핑거 쿠키","슈"],a:3,e:"슈는 오븐에서 크게 팽창하므로 패닝 시 반죽 간격을 충분히 유지해야 한다.",r:82,c:"manufacturing"},
{q:"케이크 제품의 기공이 조밀하고 속이 축축한 결점의 원인이 아닌 것은?",o:["액체 재료 사용량 과다","과도한 액체당 사용","너무 높은 오븐 온도","계란 함량의 부족"],a:3,e:"계란 함량이 부족하면 완제품의 기공이 조밀하나 속은 축축헐 수가 없다. 계란 함량이 많고 휘핑이 적절하지 못하는 경우라면, 기공이 조밀하고 속이 축축한 결점이 생김",r:99,c:"manufacturing"},
{q:"데커레이션케이크 100개를 1명이 아이싱 할 때 5시간이 필요 하다면, 1400개를 7시간 안에 아이싱 하는데 필요한 인원수는? (단, 작업의 능률은 동일하다.)",o:["10명","12명","14명","16명"],a:0,e:"100개를 1명이 아이싱할 때 5시간 필요하면 1시간에 20개 아이싱 할 수 있음 1명이 7시간 아이싱하면 20개*7시간은 140개 1400개를 아이싱하려면 1400개/140=10명",r:99,c:"manufacturing"},
{q:"이스트를 2% 사용했을 때 최적 발효시간이 120분이라면 발효시간을 90분으로 단축할 때 이스트를 약 몇 % 사용해야 하는가?",o:["1.5 %","2.7%","3.5%","4.0"],a:1,e:"- 2%일때 120분 소요되었으므로 1%일때 소요시간은 60분임 - 발효시간을 90분으로 단축한다 하였으므로 60/90=0.66%가 되고 - 여기에 2%를 더해주면 2.66%가 되어 정답은 \"나\"의 2.7%가 됨",r:99,c:"ingredients"},
{q:"수돗물 온도 18℃, 사용할 물 온도 9℃, 사용물량 10kg일 때 얼음 사용량은 약 얼마인가?",o:["0.81kg","0.92kg","1.11kg","1.21kg"],a:1,e:"얼음사용량=물사용량*(수돗물온도-사용할물온도) ----------------------------- 80 + 수돗물온도 = 10*(18-9)/(80+18) = 91.8",r:99,c:"manufacturing"},
{q:"성형공정의 방법이 순서대로 옳게 나열된 것은?",o:["반죽 →중간 발효→분할→둥글리기→정형","분할→둥글리기→중간 발효→정형→팬닝","둥글리기→중간 발효→정형→팬닝→2차 발효","중간 발효→정형→팬닝→2차 발효→굽기"],a:1,e:"성형공정 순서: 분할 → 둥글리기 → 중간발효 → 정형 → 팬닝",r:77,c:"manufacturing"},
{q:"제빵시 적량보다 설탕을 적게 사용하였을 때의 결과가 아닌 것은?",o:["부피가 작다.","색상이 검다.","모서리가 둥글다.","속결이 거칠다."],a:1,e:"설탕이 적으면 메일라드 반응과 캐러멜화가 부족하여 껍질 색상이 옅고(밝고) 연하게 된다. '색상이 검다'는 것은 설탕이 적을 때가 아니라 설탕이 과다할 때 나타나는 현상이다.",r:93,c:"ingredients"},
{q:"다음 중 빵 제품이 가장 빨리 노화되는 온도는?",o:["-18℃","3℃","27℃","40℃"],a:1,e:"수분함량30~60%,온도0~4°C일때 노화가 됨",r:99,c:"manufacturing"},
{q:"빵 반죽(믹싱)시 반죽 온도가 높아지는 주 이유는?",o:["이스트가 번식하기 때문에","원료가 용해되기 때문에","글루텐이 발전하기 때문에","마찰열이 생기기 때문에"],a:3,e:"빵 반죽 믹싱 시 온도가 높아지는 주 이유는 믹서 날과 반죽 사이의 마찰열 때문이다.",r:77,c:"manufacturing"},
{q:"식빵의 가장 일반적인 포장 적온은?",o:["15℃","25℃","35℃","45℃"],a:2,e:"포장온도 35~40도 높은 온도에서의 포장 시 1)썰기가 어려워 형태가 변하기 쉽다. 2)포장지에서 수분과다로 곰팡이가 발생하고 형태를 유지하기가 어렵다. 낮은 온도에서의 포장 시 1)노화가 가속된다. 2)껍질이 건조된다.",r:99,c:"manufacturing"},
{q:"다음은 어떤 공정의 목적인가? 자른 면의 점착성을 감소시키고 표피를 형성하여 탄력을 유지시킨다.",o:["분할","둥글리기","중간발효","정형"],a:1,e:"둥글리기(라운딩) 공정은 분할로 생긴 자른 면의 점착성을 줄이고 반죽 표면에 얇은 막(표피)을 형성하여 탄력을 회복시키는 것이 주목적이다.",r:85,v:0,c:"manufacturing"},
{q:"제빵 제조공정의 4대 중요 관리항목에 속하지 않는 것은?",o:["시간 관리","온도 관리","공정 관리","영양 관리"],a:3,e:"제빵 제조공정의 4대 관리항목은 시간관리, 온도관리, 공정관리, 위생관리이다. 영양관리는 포함되지 않는다.",r:82,c:"manufacturing"},
{q:"반죽의 내부 온도가 60℃에 도달하지 않은 상태에서 온도상승에 따른 이스트의 활동으로 부피의 점진적인 증가가 진행되는 현상은?",o:["호화(gelatinization)","오븐스프링(oven spring)","오븐라이즈(oven rise)","캐러멜화(caramelization)"],a:2,e:"오븐라이즈 - 빵반죽을 처음 오븐에 넣었을 때 0~5분간 일어나는 현상 - 40~60도 되기전에는 이스트가 죽지 않아 이스트의 활동으로 가스발생하며 점진적인 부피증가현상이 일어난다. 오븐 스프링 - 빵 반죽을 오븐에 넣은 후 5~8분 이후에 일어나는 현상 - 반죽 내부온도가 60도가 되면 이스트가 사멸됨 - 전분의 호화현상에 및 반죽 속 탄산가스의 기화, 공기 팽창 및 알코올과 수분 증발에 의해 급속히 부피 증가 현상이 일어나며 완제품 크기의 40%만큼 부풀어 오른다.",r:99,c:"manufacturing"},
{q:"냉동제법에서 믹싱 다음 단계의 공정은?",o:["1차 발효","분할","해동","2차 발효"],a:1,e:"냉동제법에서는 믹싱 후 1차 발효를 거치지 않고 바로 분할한다. 냉동 전 발효를 최소화하여 이스트 손상을 줄인다.",r:90,c:"manufacturing"},
{q:"가스 발생력에 영향을 주는 요소에 대한 설명으로 틀린 것은?",o:["포도당, 자당, 과당, 맥아당 등 당의 양과 가스 발생력 사이의 관계는 당량 3~5%까지 비례하다가 그 이상이 되면 가스 발생력이 약해져 발효시간이 길어진다.","반죽온도가 높을수록 가스 발생력은 커지고 발효시간은 짧아진다.","반죽이 산성을 띨수록 가스 발생력이 커진다.","이스트양과 가스 발생력은 반비례하고, 이스트양과 발효시간은 비례한다."],a:3,e:"이스트양이 증가하면 가스 발생력도 증가하고 발효시간은 단축된다. 즉 이스트양과 가스 발생력은 비례하므로, '반비례한다'는 설명이 틀리다.",r:93,c:"ingredients"},
{q:"식빵 50개, 파운드케이크 300개, 앙금빵 200개를 제조하는데 5명이 10시간 동안 작업하였다. 1인 1시간 기준의 노무비가 1000원일 때 개당 노무비는 약 얼마인가?",o:["81원","91원","100원","105원"],a:1,e:"5명 -> 10시간 -> 550(50+300+200)개 5명 -> 1시간 -> 55개 1명 -> 1시간 -> 11개 1000/11=90.9",r:99,c:"manufacturing"},
{q:"우유식빵 완제품 500g짜리 5개를 만들 때 분할손실이 4%이라면 분할 전 총 반죽무게는 약 얼마인가?",o:["2604g","2505g","2518g","2700g"],a:0,e:"500×5÷(1-4/100)",r:99,c:"manufacturing"},
{q:"하스브레드의 종류에 속하지 않는 것은?",o:["불란서빵","베이글빵","비엔나빵","아이리시빵"],a:1,e:"베이글은 반죽을 먼저 끓는 물에 데친 후 오븐에 굽는 독특한 공정으로 제조되며, 팬 없이 오븐 바닥에서 직접 굽는 하스브레드(hearth bread)에 속하지 않는다.",r:93,c:"manufacturing"},
{q:"물을 결합수와 유리수로 나눌 때 다음 그래프에서 유리수의 영역에 속하는 부분은?",o:["A","B","C","A, B, C"],a:2,e:"수분활성도(Aw) 등온흡습 곡선에서 C 영역은 자유롭게 이동 가능한 유리수(자유수)에 해당하며, A 영역은 결합수, B 영역은 준결합수에 해당한다.",r:82,v:0,c:"ingredients"},
{q:"다음 중 식물계에는 존재하지 않는 당은?",o:["과당","유당","설탕","맥아당"],a:1,e:"유당은 동물성 당",r:99,c:"ingredients"},
{q:"모노글리세리드(monoglyceride)와 디글리세리드(diglyceride)는 제과에 있어 주로 어떤 역할을 하는가?",o:["유화제","항산화제","감미제","필수영양제"],a:0,e:"모노글리세리드와 디글리세리드는 친수성·친유성을 모두 가져 유화제로 작용한다.",r:82,c:"ingredients"},
{q:"다음 중 쇼트닝을 몇 % 정도 사용했을 때 빵 제품의 최대부피를 얻을 수 있는가?",o:["2%","4%","8%","12%"],a:1,e:"쇼트닝을 약 4% 사용했을 때 빵 제품의 최대 부피를 얻을 수 있다. 그 이상 사용하면 글루텐 형성을 방해하여 오히려 부피가 줄어든다.",r:95,c:"ingredients"},
{q:"탈지분유 20g을 물 80g에 넣어 녹여 탈지분유액을 만들었을 때 탈지분유액 중 단백질의 함량은 몇 %인가? (단, 탈지분유 조성은 수분4%, 유당 57%, 단백질35%, 지방4%이다.)",o:["5.1%","6%","7%","8.75%"],a:2,e:"탈지분유 20g 중 단백질 = 20×0.35 = 7g. 탈지분유액 총량 = 20+80 = 100g. 단백질 비율 = 7/100 = 7%이다.",r:95,c:"ingredients"},
{q:"계란 중에서 껍질을 제외한 고형질은 약 몇 %인가?",o:["15%","25%","35%","45%"],a:1,e:"수분 75% 고형질 25%",r:99,c:"ingredients"},
{q:"제빵용 효모에 의하여 발효되지 않는 당은?",o:["포도당","과당","맥아당","유당"],a:3,e:"제빵용 효모(이스트)는 포도당, 과당, 맥아당, 설탕을 발효시킬 수 있지만, 유당(lactose)은 발효시키지 못한다.",r:90,c:"ingredients"},
{q:"제빵에서 소금의 역할이 아닌 것은?",o:["글루텐을 강화시킨다.","유해균의 번식을 억제 시킨다.","빵의 내상을 희게 한다.","맛을 조절한다."],a:2,e:"제빵에서의 소금의 역할에는 1.빵에 맛을 준다 2. 이스트의 발효를 억제해 발효속도를 늦춘다 3.글루텐을 강화시켜 반죽을 견고하게 한다 4. 당분해를 억제시켜 껍질색을 조절한다 5.삼투압에 의해 세균등의 잡균번식을 억제시킨다.",r:99,c:"ingredients"},
{q:"이스트에 질소 등의 영양을 공급하는 제빵용 이스트 푸드의 성분은?",o:["칼슘염","암모늄염","브롬염","요오드염"],a:1,e:"이스트 푸드의 성분 중 암모늄염(황산암모늄, 인산암모늄 등)은 이스트에 질소원을 공급하여 발효를 촉진하는 역할을 한다.",r:93,c:"nutrition"},
{q:"밀가루 25g에서 젖은 글루텐을 9g 얻었다면 건조글루텐의 함량은?",o:["3%","5%","7%","12%"],a:3,e:"젖은 글루텐(%): (젖은 글루텐÷밀가루중량)×100 = (9 ÷ 25) ×100 = 36 건조 글루텐(%): 젖은글루텐÷3 = 36 ÷ 3 = 12",r:99,c:"ingredients"},
{q:"안정제를 사용하는 목적으로 적합하지 않은 것은?",o:["아이싱의 끈적거림 방지","크림 토핑의 거품 안정","머랭의 수분 배출 촉진","포장성 개선"],a:2,e:"안정제의 목적은 거품 안정, 끈적거림 방지, 포장성 개선 등이다. 머랭의 수분 배출 촉진은 안정제의 목적이 아니라, 오히려 수분 보유를 돕는다.",r:93,c:"ingredients"},
{q:"아미노산에 대한 설명으로 틀린 것은?",o:["식품 단백질을 구성하는 아미노산은 20여 가지이다.","단백질을 구성하는 아미노산은 거의 L-형이다.","아미노산은 물에 녹아 양이온과 음이온의 양전하를 갖는다.","아미노기(-NH2)는 산성을, 카르복실기(-COOH)는 염기성을 나타낸다."],a:3,e:"아미노기(-NH2)는 염기성을, 카르복실기(-COOH)는 산성을 나타낸다. 설명이 반대로 되어 있으므로 틀린 내용이다.",r:90,c:"nutrition"},
{q:"세계보건기구(WHO)는 성인의 경우 하루 섭취열량 중 트랜스 지방의 섭취를 몇% 이하로 권고하고 있는가?",o:["0.5%","1%","2%","3%"],a:1,e:"세계보건기구(WHO)는 트랜스지방 섭취를 하루 총 열량의 1% 이하로 권고하고 있다.",r:82,c:"nutrition"},
{q:"아밀로그래프의 최고점도(maximum viscosity)가 너무 높을 때 생기는 결과가 아닌 것은?",o:["효소의 활성이 약하다.","반죽의 발효상태가 나쁘다.","효소에 대한 전분, 단백질 등의 분해가 적다.","가스 발생력이 강하다."],a:3,e:"아밀로그래프 최고점도가 높으면 효소 활성이 약하여 전분 분해가 적고 발효상태가 나쁘다. 가스 발생력이 강한 것은 효소 활성이 높을 때의 특성이다.",r:93,c:"ingredients"},
{q:"전분을 가수분해 할 때 처음 생성되는 덱스트린은?",o:["에리트로덱스트린 (erythrodextrin)","아밀로덱스트린 (anylodextrin)","아크로덱스트린 (ackrodextrin)","말토덱스트린 (maltodextrin)"],a:1,e:"전분을 가수분해할 때 처음 생성되는 덱스트린은 아밀로덱스트린(amylodextrin)이다. 요오드 반응에서 청색을 나타내며, 전분이 초기 단계로 분해된 고분자 덱스트린이다.",r:93,c:"ingredients"},
{q:"섬유소(cellulose)를 완전하게 가수분해하면 어떤 물질로 분해되는가?",o:["포도당(glucose)","설탕(sucrose)","아밀로오스(amylose)","맥아당 (maltose)"],a:0,e:"섬유소(셀룰로스)를 완전히 가수분해하면 포도당(glucose)이 된다. 셀룰로스는 포도당의 β-1,4 결합 중합체이다.",r:93,c:"ingredients"},
{q:"소화기관에 대한 설명으로 틀린 것은?",o:["위는 강알칼리의 위액을 분비한다.","이자(췌장)는 당대사호르몬의 내분비선이다.","소장은 영양분을 소화 ․ 흡수한다.","대장은 수분을 흡수하는 역할을 한다."],a:0,e:"위는 강산성의 위액을 분비한다. 제빵",r:99,c:"nutrition"},
{q:"1일 섭취 열량이 2000kcal 인 성인의 경우 지방에 의한 섭취 열량으로 가장 적합한 것은?",o:["700~900kcal","500~700kcal","300~500kcal","100~300kcal"],a:2,e:"이상적인 영양소 섭취 비율 탄수화물 65% 단백질 15% 지방 20% 2000*0.2=400이니까 300~500kcal가 정답",r:99,c:"nutrition"},
{q:"무기질의 일반적인 기능이 아닌 것은?",o:["단백질의 절약 작용","체액의 산, 염기 평형유지","체조직의 구성 성분","생리적 작용에 대한 촉매 작용"],a:0,e:"무기질은 체조직 구성, 산·염기 평형, 효소 촉매 등의 기능을 한다. 단백질 절약 작용은 탄수화물의 기능이다.",r:85,c:"nutrition"},
{q:"음식 100g 중 질소 함량이 4g이라면 음식에는 몇 g의 단백질이 함유된 것인가? (단, 단백질 1g에 는 16%의 질소가 함유되어 있다.)",o:["25g","35g","50g","64g"],a:0,e:"질소 함량 4g이 해당 단백질의 16%이므로 단백질 무게 = 4g / 16% = 4g / 0.16 = 25g",r:99,c:"nutrition"},
{q:"부패의 진행에 수반하여 생기는 부패산물이 아닌 것은?",o:["암모니아","황화수소","메르캅탄","일산화탄소"],a:3,e:"일산화탄소= 연탄의 연소가스/자동차의 배기가스/ 화재발생시 산소가 부족할때 발생",r:99,c:"hygiene"},
{q:"다음 중 치명율이 가장 높은 것은?",o:["보툴리누스균에 의한 식중독","살모넬라 식중독","황색포도상구균 식중독","장염비브리오 식중독"],a:0,e:"보툴리누스균 식중독은 치명률이 가장 높다(30~70%). 강력한 신경독소를 생성하기 때문이다.",r:85,c:"hygiene"},
{q:"미나마타(minamata)병의 원인 물질은?",o:["카드뮴(cd)","구리(cu)","수은(hg)","납(pb)"],a:2,e:"미나마타병은 메틸수은(유기수은) 중독에 의해 발생한다. 일본 미나마타만에서 처음 발견되었다.",r:82,c:"hygiene"},
{q:"식품 등을 통해 전염되는 경구전염병의 특징이 아닌 것은?",o:["원인 미생물은 세균, 바이러스 등이다.","미량의 균량에서도 감염을 일으킨다.","2차 감염이 빈번하게 일어난다.","화학물질이 주요 원인이 된다."],a:3,e:"화학물질이 주요 원인이 되는 것은 경구전염병이 아니라 화학적 식중독의 특징이다. 경구전염병은 세균, 바이러스 등 미생물이 원인이다.",r:93,c:"hygiene"},
{q:"식품의 변질에 관여하는 요인과 거리가 먼 것은?",o:["pH","압력","수분","산소"],a:1,e:"식품 변질에 관여하는 요인은 pH, 수분, 산소, 온도 등이다. 압력은 상대적으로 식품 변질에 미치는 영향이 적다.",r:90,c:"ingredients"},
{q:"밀가루의 표백과 숙성기간을 단축시키는 밀가루 개량제로 적합하지 않은 것은?",o:["과산화벤조일","과황산암모늄","아질산나트륨","이산화염소"],a:2,e:"아질산나트륨은 햄,소세지등 고기의 발색제 제빵",r:99,c:"nutrition"},
{q:"노로바이러스에 대한 설명으로 틀린 것은?",o:["이중나선구조 RNA 바이러스이다.","사람에게 급성장염을 일으킨다.","오염음식물을 섭취하거나 감염자와 접촉하면 전염된다.","환자가 접촉한 타월이나 구토물 등은 바로 세탁하거나 제거하여야 한다."],a:0,e:"노로바이러스는 단일가닥(single-stranded) RNA 바이러스이다. 이중나선구조 RNA라는 설명은 틀리다.",r:93,c:"hygiene"},
{q:"다음 중 동종간의 접촉에 의한 전염성이 없는 것은?",o:["세균성 이질","조류독감","광우병","구제역"],a:2,e:"광우병(BSE)은 변형 프리온 단백질에 의한 질환으로 동종 간 접촉에 의한 전염성이 없다.",r:82,c:"hygiene"},
{q:"식중독균 등 미생물의 성장을 조절하기 위해 사용하는 저장방법과 그 예의 연결이 틀린 것은?",o:["산소제거 - 진공포장 햄","PH조절 - 오이피클","온도 조절 - 냉동 생선","수분활성도 저하 - 상온 보관 우유"],a:3,e:"상온 보관 우유는 수분활성도가 높아 미생물 성장을 억제하지 못한다. 수분활성도 저하의 예는 건조식품, 설탕절임, 소금절임 등이다.",r:93,c:"ingredients"},
{q:"탄수화물이 많이 든 식품을 고온에서 가열하거나 튀길 때 생성되는 발암성 물질은?",o:["니트로사민(nitrosamine)","다이옥신(dioxins)","벤조피렌(benzopyrene)","아크릴 아마이드(acrylamide)"],a:3,e:"아크릴아마이드는 탄수화물이 많은 식품을 120℃ 이상 고온에서 가열·튀길 때 아스파라긴과 환원당의 반응으로 생성되는 발암성 물질이다.",r:93,c:"nutrition"}]},
{title:"2008년 5회",desc:undefined,questions:[{q:"케이크 반죽의 팬닝에 대한 설명으로 틀린 것은?",o:["케이크의 종류에 따라 반죽량을 다르게 패닝한다.","새로운 팬은 비용적을 구하여 패닝한다.","팬용적을 구하기 힘든 경우는 유채씨를 사용하여 측정할 수 있다.","비중이 무거운 반죽은 분할량을 작게 한다."],a:3,e:"비중이 무거운 반죽은 가벼운 반죽보다 부피 팽창이 작으므로 분할량을 더 많이(크게) 해야 원하는 제품 크기를 얻을 수 있다. '분할량을 작게 한다'는 설명이 틀렸다.",r:93,c:"manufacturing"},
{q:"푸딩 제조공정에 관한 설명으로 틀린 것은?",o:["모든 재료를 섞어서 체에 거른다.","푸딩컵에 반죽을 부어 중탕으로 굽는다.","우유와 설탕을 섞어 설탕이 캐러멜화될 때까지 끓인다.","다른 그릇에 계란, 소금 및 나머지 설탕을 넣고 혼합한 후 우유를 섞는다."],a:2,e:"우유와 설탕을 섞어 끓기 직전인 80~90°C까지 데운다.",r:99,c:"ingredients"},
{q:"무스크림을 만들 때 가장 많이 이용되는 머랭의 종류는?",o:["이탈리안 머랭","스위스 머랭","온제 머랭","냉제 머랭"],a:0,e:"이탈리안머랭은 114도에서116도의시럽을넣어만드는것이기때문에 굽지않는 무스크림을소독할수있어서이탈리안머랭을사용한다",r:99,c:"ingredients"},
{q:"고율배합에 대한 설명으로 틀린 것은?",o:["믹싱 중 공기 혼입이 많다.","설탕 사용량이 밀가루 사용량보다 많다.","화학 팽창제를 많이 쓴다.","촉촉한 상태를 오랫동안 유지시켜 신선도를 높이고 부드러움이 지속되는 특징이 있다."],a:2,e:"고율배합은 설탕과 액체가 많이 들어가기 때문에 공기가 많이 들어간다. 이렇게 들어간 공기가 오븐에서 팽창하기 때문에 화학 팽창제를 많이 사용할 필요가 없다.",r:99,c:"manufacturing"},
{q:"케이크 반죽의 ph 가 적정 범위를 벗어나 알칼리일 경우 제품에서 나타나는 현상은?",o:["부피가 작다","향이 약하다","껍질색이 여리다.","기공이 거칠다"],a:3,e:"0에 가까울 수록 산성 7은 중성 14에 가까울수록 알칼리 산성일 경우 머랭에 레몬즙을 넣으면 단단해짐을 예를 들수 있다. 즉, 산성을 띄는 반죽인 경우 단단하며 부피가 작고 기공이 조밀하며 색이 밝고 향이 적다. 알칼리일 경우 산성과 반대를 생각하면 되는데 알칼리 반죽인 경우 진반죽이며 기공이 거칠어서 부피가 크고 향이 진하다. 베이킹 소다가 알칼리 성분을 띄고 있고 초코 제품에 베이킹 소다가 들어갈 경우 색이 진해져 먹음직스러워진다.",r:99,c:"manufacturing"},
{q:"언더베이킹(under baking)에 대한 설명 중 틀린 것은?",o:["제품의 윗부분이 올라간다.","제품의 중앙부분이 터지기 쉽다.","케이크 속이 익지 않을 경우도 있다.","제품의 윗부분이 평평하다."],a:3,e:"4. 제품의 윗부분이 평평하다. 언더베이캉은 낮은온도로 오래굽기 때문에 점점 부풀어서 평평할 수가 없습니다.",r:99,c:"manufacturing"},
{q:"다음 제품 중 정형하여 패닝 할 경우 제품의 간격을 가장 충분히 유지하여야 하는 제품은?",o:["슈","오믈렛","애플파이","쇼트브레드쿠키"],a:0,e:"슈는 오븐에서 수증기에 의해 크게 팽창하므로 다른 제품보다 간격을 충분히 두어야 한다. 팽창률이 2~3배에 달한다.",r:90,c:"manufacturing"},
{q:"다음 중 화학적 팽창 제품이 아닌 것은?",o:["과일 케이크","팬 케이크","파운드 케이크","시퐁 케이크"],a:3,e:"시퐁케이크는 베이킹파우더를 사용하지 않는다.",r:99,c:"manufacturing"},
{q:"도넛의 흡유량이 높았을 때 그 원인은?",o:["고율배합 제품이다.","튀김시간이 짧다.","튀김온도가 높다.","휴지시간이 짧다."],a:0,e:"도넛 수분 과다 : 팽창과다, 흡유 과다, 형태불균형, 혹돌출, 외부링모양 과대 도넛 수분 부족 : 팽창부족, 형태불균형, 갈라짐, 점도가 큼, 외피에 톱늬모양 발생",r:99,c:"manufacturing"},
{q:"아이싱에 많이 쓰이는 퐁당(fondant)을 만들 때 끓이는 온도로 가장 적당한 것은?",o:["106~110℃","114~118℃","120~124℃","130~134℃"],a:1,e:"퐁당은 설탕 시럽을 114~118℃까지 끓인 후 냉각하면서 교반하여 미세한 결정을 만든다. 이 온도 범위가 적절한 결정 크기를 형성한다.",r:93,c:"ingredients"},
{q:"다음 제품 중 냉과류에 속하는 제품은?",o:["무스 케이크","젤리 롤 케이크","양갱","시퐁 케이크"],a:0,e:"냉과류 : 무스, 푸딩, 바바로와, 젤리, 블라망제 1. 무스케이크 - 냉과자류 2. 젤리롤케이크 - 양과자류(롤케이크) 3. 소프트롤케이크 - 양과자류(롤케이크) 4. 양갱 - 생과자류(화과자)",r:99,c:"ingredients"},
{q:"다음 기계 설비 중 대량 생산업체에서 주로 사용하는 설비로 가장 알맞은 것은?",o:["터널오븐","데크오븐","전자렌지","생크림용 탁상믹서"],a:0,e:"터널오븐은 반죽이 컨베이어를 따라 이동하면서 구워지는 대량 생산용 설비이다.\n• 데크오븐은 소규모, 전자렌지와 탁상믹서는 대량 생산과 거리가 멀다.",r:93,c:"manufacturing"},
{q:"스펀지 케이크를 부풀리는 주요 방법은?",o:["계란의 기포성에 의한 방법","이스트에 의한 방법","화확팽창제에 의한 방법","수증기 팽창에 의한 방법"],a:0,e:"물리적팽창방법으로 계란의 기포성을 이용한다",r:99,c:"ingredients"},
{q:"데블스 푸드 케이크 제조시 반죽의 비중을 측정하기 위해 필요한 무게가 아닌 것은?",o:["비중컵의 무게","코코아를 담은 비중컵의 무게","물을 담은 비중컵의 무게","반죽을 담은 비중컵의 무게"],a:1,e:"비중 = (반죽을 담은 비중컵 무게 - 빈 비중컵 무게) / (물을 담은 비중컵 무게 - 빈 비중컵 무게)\n필요한 것: 빈 비중컵, 물을 담은 비중컵, 반죽을 담은 비중컵의 무게이다. 코코아를 담은 비중컵의 무게는 필요하지 않다.",r:93,c:"manufacturing"},
{q:"다음 중 쿠키의 퍼짐성이 작은 이유가 아닌 것은?",o:["믹싱이 지나침","높은 온도의 오븐","너무 진 반죽","너무 고운 입자의 설탕 사용"],a:2,e:"반죽이 너무 질면 흐름성이 커져 제품이 퍼지게 된다.",r:99,c:"manufacturing"},
{q:"2차 발효시 발효실 의 평균 온도와 습도는?",o:["28~30℃, 60~65%","30~35℃, 65~95%","35~38℃, 75~90%","40~45℃, 80~95%"],a:2,e:"2차 발효(최종 발효)의 표준 조건은 온도 35~40℃, 상대습도 75~90%이다. 35~38℃, 75~90%가 가장 적합한 범위이다.",r:93,c:"manufacturing"},
{q:"냉동반죽 법에서 1차 발효 시간이 길어질 경우 일어나는 현상은?",o:["냉동 저장성이 짧아진다.","제품의 부피가 커진다.","이스트의 손상이 작아진다.","반죽온도가 낮아진다."],a:0,e:"1차 발효가 길어지면 이스트가 많이 소모되고 글루텐 구조가 약해져 냉동 시 빙결정에 의한 손상이 커진다. 따라서 냉동 저장성이 짧아진다.",r:95,c:"manufacturing"},
{q:"팬 기름칠을 다른 제품 보다 더 많이 하는 제품은?",o:["베이글","바게트","단팥빵","건포도 식빵"],a:3,e:"건포도 식빵은 건포도의 당분이 굽는 과정에서 팬에 눌어붙기 쉬우므로 다른 제품보다 팬에 기름칠을 더 많이 해야 한다.",r:82,c:"manufacturing"},
{q:"냉동반죽의 가스 보유력 저하요인이 아닌 것은?",o:["냉동반죽의 빙결정","해동시 탄산가스 확산에 기포수의 감소","냉동시 탄산가스 용해도증가에 의한 기포수의 감소","냉동과 해동 및 냉동저장에 따른 냉동반죽 물성의 강화"],a:3,e:"냉동과 해동 및 냉동저장에 따른 냉동반죽 물성의 '강화'가 아니라 '약화'가 일어난다. 빙결정 형성, 탄산가스 확산에 의한 기포 감소, 용해도 변화는 모두 가스 보유력을 저하시키는 요인이다.",r:93,c:"manufacturing"},
{q:"발효에 영향을 주는 요소로 볼 수 없는 것은?",o:["이스트의 양","쇼트닝의 양","온도","ph"],a:1,e:"쇼트닝은 발효에 직접적인 영향을 주지 않는다. 이스트의 양, 온도, pH는 이스트 활성에 직접 영향을 미치는 발효 요인이다.",r:85,c:"ingredients"},
{q:"다음 중 표준 스트레이트법 에서 믹싱 후 반죽 온도로 가장 적합한 것은?",o:["21℃","27℃","33℃","39℃"],a:1,e:"스트레이트법의 표준 반죽 온도는 27℃이다. 이 온도에서 이스트 발효와 글루텐 발전이 최적화된다.",r:82,c:"manufacturing"},
{q:"식빵의 굽기 후 포장온도로 가장 적합한 것은?",o:["25~30℃, 60~65%","30~35℃, 65~95%","35~38℃, 75~90%","40~45℃, 80~95%"],a:1,e:"식빵의 굽기 후 포장 적정 온도는 30~35℃, 상대습도 65~95% 범위이다. 이 조건에서 포장하면 수분 응결과 노화를 방지할 수 있다.",r:99,c:"manufacturing"},
{q:"굽기를 할 때 일어나는 반죽의 변화가 아닌 것은?",o:["오븐팽창","단백질 열변성","전분의 호화","전분의 노화"],a:3,e:"노화는 오븐에서 나오자마자 시작된다.",r:99,c:"manufacturing"},
{q:"소규모 제과점용으로 가장 많이 사용되며 반죽을 넣는 입구와 제품을 꺼내는 출구가 같은 오븐은?",o:["컨벡션오븐","터널오븐","릴 오븐","데크오븐"],a:3,e:"오븐 넣는 입구와 나오는 출구가 다른 것은 터널 오븐입니다.",r:99,c:"manufacturing"},
{q:"베이커스 퍼센트(bakers percent)에 대한 설명으로 맞는 것은?",o:["전체 재료의 양을 100%로 하는 것이다.","물의 양을 100%로 하는 것이다.","밀가루의 양을 100%로 하는 것이다.","물과 밀가루의 양의 합을 100%로 하는 것이다."],a:2,e:"베이커스 퍼센트는 밀가루의 양을 100%로 기준하여 다른 재료의 비율을 나타내는 방법이다. 전체 재료 합계나 물 기준이 아니다.",r:93,c:"ingredients"},
{q:"식빵의 표피에 작은 물방울이 생기는 원인과 거리 가 먼 것은?",o:["수분 과다 보유","발효부족 (under proofing)","오븐의 윗불 온도가 높음","지나친 믹싱"],a:3,e:"지나친 믹싱은 글루텐 구조를 약화시킬 수 있지만 표피에 물방울이 맺히는 현상과는 직접적인 관련이 없다. 수분 과다, 발효부족, 윗불 온도가 높은 경우가 표피 물방울의 주요 원인이다.",r:90,c:"manufacturing"},
{q:"원가의 구성에서 직접원가에 해당되지 않는 것은?",o:["직접재료비","직접노무비","직접경비","직접판매비"],a:3,e:"원가는 직접비( 재료비, 노무비, 경비)에 제조간접비를 가산한 제조원가,그리고 그것에 판매, 일반관리비를 가산한 총원가로 구성된다",r:99,c:"management"},
{q:"반죽의 혼합과정 중 유지를 첨가하는 방법으로 옳은 것은?",o:["밀가루 및 기타재료와 함께 계량하여 혼합하기 전에 첨가한다.","반죽이 수화되어 덩어리를 형성하는 클린업 단계에서 첨가한다.","반죽의 글루텐 형성 중간 단계에서 첨가한다l","반죽의 글루텐 형성 최종 단계에서 첨가한다."],a:1,e:"유지는 반죽이 수화되어 덩어리를 형성하는 클린업 단계에서 첨가한다. 너무 일찍 넣으면 글루텐 형성을 방해하고, 너무 늦게 넣으면 고르게 분산되지 않는다.",r:93,c:"ingredients"},
{q:"빵제품에서 볼 수 있는 노화현상이 아닌 것은?",o:["맛과 향의증진","조직의 경화","전분의 결정화","소화율의 저하"],a:0,e:"노화가 진행되면 맛과 향이 감소하지, 증진되지 않는다. 조직의 경화, 전분의 결정화, 소화율의 저하는 모두 노화 현상이다.",r:85,c:"ingredients"},
{q:"분할기에 의한 기계식 분할시 분할의 기준이 되는 것은?",o:["무게","모양","배합율","부피"],a:3,e:"분할기에 의한 기계식 분할은 반죽의 부피를 기준으로 일정하게 분할한다. 기계식 분할기는 피스톤 또는 격실의 용적(부피)으로 반죽을 나누는 방식이다.",r:90,c:"manufacturing"},
{q:"탈지분유를 빵에 넣으면 발효시 ph 변화에 어떤 영향을 미치는가?",o:["ph 저하를 촉진 시킨다.","ph 상승을 촉진 시킨다.","ph 변화에 대한 완충 역할을 한다.","ph가 중성을 유지하게 된다."],a:2,e:"탈지분유는 완충 작용을 하여 발효 중 pH가 급격히 변하는 것을 방지한다. 이는 분유에 포함된 인산염과 단백질의 완충 능력 때문이다.",r:90,c:"ingredients"},
{q:"일반 식염을 구성하는 대표적인 원소는?",o:["나트륨 ,염소","칼슘 ,탄소","마그네슘, 염소","칼륨, 탄소"],a:0,e:"일반 식염(NaCl)은 나트륨(Na)과 염소(Cl)로 구성되어 있다.",r:85,c:"nutrition"},
{q:"제빵에서 밀가루, 이스트, 물과 함께 기본적인 필수재료는?",o:["분유","유지","소금","설탕"],a:2,e:"제빵의 4대 기본 필수재료는 밀가루, 이스트, 물, 소금이다. 소금은 발효 조절, 글루텐 강화, 풍미 부여 등 필수적인 역할을 한다.",r:75,c:"ingredients"},
{q:"패리노그래프(farinograph)의 기능이 아닌 것은?",o:["산화제 첨가 필요한 측정","밀가루의 흡수율 측정","믹싱시간 측정","믹싱내구성 측정"],a:0,e:"패리노그래프는 밀가루의 흡수율, 믹싱시간, 믹싱내구성을 측정하는 기기이다. 산화제 첨가 필요량 측정은 패리노그래프의 기능이 아니다.",r:93,c:"ingredients"},
{q:"일시적 경수에 대하여 바르게 설명한 것은?",o:["탄산염에 기인한다.","모든 염이 황산염의 형태로만 존재한다.","끓여도 제거되지 않는다.","연수로 변화시킬 수 없다."],a:0,e:"일시적 경수 : 탄산칼슘의 형태로 들어있는 경수로, 끓이면 불용성탄산염으로 분해되고 가라앉아 연수가됨. 영구적 경수 : 황산칼슘, 황산마그네슘이 들어있는 경수로, 끓여도 불변함.",r:99,c:"ingredients"},
{q:"베이킹파우더의 일반적인 구성 물질이 아닌 것은?",o:["탄산수소나트륨","전분","주석산크림","암모늄"],a:3,e:"베이킹파우더 : 탄산수소나트륨(소다)에 산과 녹말을 섞어서 제조한것.",r:99,c:"ingredients"},
{q:"다음 중 동물성 단백질은?",o:["덱스트린","아밀로오스","글루텐","젤라틴"],a:3,e:"젤라틴은 동물의 가죽, 뼈, 힘줄 등에서 추출한 동물성 단백질이다. 덱스트린은 전분 분해물, 아밀로오스는 전분 성분, 글루텐은 식물성 단백질이다.",r:90,c:"ingredients"},
{q:"자당을 인버타아제로 가수분해하여 10.52%의 전화당을 얻었다면 포도당과 과당의 비율은?",o:["포도당 5.26%, 과당 5.26%","포도당 7.0%, 과당 3.52%","포도당 3.52%, 과당 7.0%","포도당 2.63%, 과당 7.89%"],a:0,e:"자당의 가수분해(전화)는 자당 → 포도당 + 과당으로, 포도당과 과당이 동량(1:1)으로 생성된다.\n따라서 포도당 5.26%, 과당 5.26%이다.",r:95,c:"ingredients"},
{q:"제과/제빵에서 유지의 기능이 아닌 것은?",o:["흡수율 증가","연화 작용","공기포집","보존성 향상"],a:0,e:"유지는 밀가루 입자를 코팅하여 수분 흡수를 감소시키므로 흡수율을 증가시키지 않는다. 연화 작용, 공기 포집, 보존성 향상은 유지의 기능이다.",r:93,c:"ingredients"},
{q:"제빵용 밀가루에 함유된 손상전분 함량은 얼마 정도가 적합한가?",o:["0%","6%","10%","11%"],a:1,e:"제빵용 밀가루의 적정 손상전분 함량은 약 6%(4.5~8%) 정도이다. 손상전분은 흡수율을 높이고 이스트의 영양원이 된다.",r:95,c:"ingredients"},
{q:"코코아(cocoa)에 대한 설명 중 옳은 것은?",o:["초코렛 리쿠어(chocolate liquor)를 압착. 건조한 것이다.","코코아 버터(cocoa butter)를 만들고 남은 박(press cake)을 분쇄한 것이다.","카카오 니브스 (cacao nibs)를 건조한 것이다.","비터초코렛(bitter chocolate)을 건조, 분쇄한 것이다."],a:1,e:"코코아는 초콜릿 리쿠어에서 코코아 버터를 압착 추출하고 남은 박(press cake)을 분쇄한 것이다. 카카오 니브스를 갈면 초콜릿 리쿠어가 된다.",r:93,c:"ingredients"},
{q:"건조 글루텐에 가장 많이 들어있는 성분은?",o:["단백질","전분","지방","회분"],a:0,e:"건조 글루텐은 약 75~80%가 단백질로 구성되어 있다. 글루텐은 밀가루의 글리아딘과 글루테닌 단백질이 수화되어 형성된 것이다.",r:90,c:"ingredients"},
{q:"퐁당 크림을 부드럽게 하고 수분 보유력을 높이기 위해 일반적으로 첨가하는 것은?",o:["한천, 젤라틴","물, 레몬","소금, 크림","물엿, 전화당 시럽"],a:3,e:"퐁당 크림에 물엿이나 전화당 시럽을 첨가하면 설탕 결정의 재결정화를 방지하여 부드럽게 하고 수분 보유력을 높인다.",r:93,c:"ingredients"},
{q:"캐러멜화를 일으키는 것은?",o:["비타민","지방","단백질","당류"],a:3,e:"캐러멜화는 당류를 고온에서 가열할 때 일어나는 갈변 반응이다.",r:82,c:"nutrition"},
{q:"계란 흰자에 소금을 넣었을 때 기포성에 미치는 영향은?",o:["거품 표면의 변성을 방지한다.","거품 표면의 변성을 촉진시킨다.","거품이 모두 제거된다.","거품의 부피 및 양이 많이 증가한다."],a:1,e:"소금은 계란 흰자의 단백질 표면 변성을 촉진시켜 거품 형성을 빠르게 한다. 다만 과량 사용하면 거품 안정성이 떨어질 수 있다.",r:90,c:"ingredients"},
{q:"건조된 아몬드 100g에 탄수화물 16g, 단백질 18g, 지방54g, 무기질 3g, 수분 6g, 기타성분 등을 함유하고 있다면 이 아몬드 100g의 열량은?",o:["약 200kcal","약 364kcal","약 622kcal","약 751kcal"],a:2,e:"(탄수화물 16×4 칼로리)+(단백질 18×4 칼로리)+(지방 54×9 칼로리)",r:99,c:"nutrition"},
{q:"다음 중 2가지 식품을 섞어서 음식을 만들 때 단백질의 상호보조 효력이 가장 큰 것은?",o:["밀가루와 현미가루","쌀과 보리","시리얼과 우유","밀가루와 건포도"],a:2,e:"시리얼(곡류)은 리신이 부족하고, 우유(동물성)는 리신이 풍부하여 상호보조 효과가 가장 크다. 같은 곡류끼리는 부족한 아미노산이 비슷하여 보조 효과가 적다.",r:85,c:"ingredients"},
{q:"글리세롤 1분자에 지방산, 인산, 콜린이 결합한 지질은?",o:["레시틴","에르고스테롤","콜레스테롤","세파"],a:0,e:"레시틴(포스파티딜콜린)은 글리세롤에 지방산 2개, 인산, 콜린이 결합한 인지질이다. 유화 작용이 뛰어나 식품에서 유화제로 사용된다.",r:90,c:"nutrition"},
{q:"산과 알칼리 및 열에서 비교적 안정하고 칼슘의 흡수를 도우며 골격 발육과 관계 깊은 비타민은?",o:["비타민 A","비타민 B1","비타민 D","비타민 E"],a:2,e:"비타민 D는 산, 알칼리, 열에 비교적 안정하며 칼슘과 인의 흡수를 촉진하여 골격 발육에 중요한 역할을 한다.",r:93,c:"nutrition"},
{q:"혈당의 저하와 가장 관계가 깊은 것은?",o:["인슐린","리파아제","프로테아제","펩신"],a:0,e:"혈당유지호르몬=인슐린 체내 0.1%유지",r:99,c:"nutrition"},
{q:"식품첨가물 중 보존료의 조건이 아닌 것은?",o:["변패를 일으키는 각종 미생물의 증식을 억제할 것","무미, 무취하고 자극성이 없을 것","식품의 성분과 반응을 잘하여 성분을 변화시킬 것","장기간 효력을 나타낼 것"],a:2,e:"1. 무미,무취,무색으로 식품과 화학반응을 하지 않아야함 2. 독성이 없거나 적어야 함 3. 산,알칼리에 안전해야함 4. 식품의 변질 미생물에 대한 저지 효과가 커야함 5. 사용하기 쉬워야 함 보존료 종류: 프로피온산칼슘,프로피온산나트륨(빵,과자) 안식향산(간장, 청량음료 등) 소르빈산(어육 연제품, 고추장, 팥앙금 등)",r:99,c:"ingredients"},
{q:"냉장의 목적과 가장 관계가 먼 것은?",o:["식품의 보존기간 연장","미생물의 멸균","세균의 증식 억제","식품의 자기호흡 지연"],a:1,e:"냉장은 미생물을 '멸균'하는 것이 아니라 증식을 '억제'하는 것이다. 냉장의 목적은 보존기간 연장, 세균 증식 억제, 자기호흡 지연이다.",r:85,c:"hygiene"},
{q:"일반적으로 화농성 질환 또는 식중독의 원인이 되는 병원성 포도상구균은?",o:["백색포도상구균","적색포도상구균","황색포도상구균","표피포도상구균"],a:2,e:"황색포도상구균(Staphylococcus aureus)은 사람에게 화농성 질환과 식중독을 일으키는 대표적인 병원성 포도상구균이다.",r:93,c:"hygiene"},
{q:"대장균 O-157이 내는 독성물질은?",o:["베로톡신","테트로도톡신","삭시톡신","베네루핀"],a:0,e:"조개류-삭시톡신 모시조개.굴ㅡ베네루핀 독버섯ㅡ무스카린 복어ㅡ테트로도톡신 제빵",r:99,c:"hygiene"},
{q:"탄저, 브루셀라증과 같이 사람과 가축의 양쪽에 이환되는 전염병은?",o:["법정전염병","경구전염병","인수공통전염병","금성전염병"],a:2,e:"탄저, 브루셀라증처럼 사람과 가축 모두에 감염되는 전염병을 인수공통전염병이라 한다.",r:85,c:"hygiene"},
{q:"가생충과 숙주와의 연결이 틀린 것은?",o:["유구조충(갈고리촌충) - 돼지","아니사키스 - 해산어류","간흡충 - 소","폐디스토마 - 다슬기"],a:2,e:"간흡충의 중간숙주는 민물고기(참붕어 등)이지 소가 아니다. 유구조충-돼지, 아니사키스-해산어류, 폐디스토마-다슬기는 올바른 연결이다.",r:93,v:0,c:"manufacturing"},
{q:"팽창제에 대한 설명으로 틀린 것은?",o:["반죽 중에서 가스가 발생하여 제품에 독특한 다공성의 세포 구조를 부여한다.","식품첨가물 공전상 팽창제로 암모늄명반이 지정되어있다.","화학적 팽창제는 가열에 의해서 발생되는 유리탄산가스나 암모니아가스만으로 팽창하는 것은 아니다.","천연팽창제로는 효모가 대표적이다."],a:1,e:"팽창제로 암모늄명반은 식품첨가물로 지정되지 않았다.\n※ 반죽 중 가스 발생, 화학적 팽창제의 작동 원리, 효모가 천연팽창제라는 설명은 맞다.",r:85,c:"ingredients"},
{q:"세균성 식중독의 일반적인 특성으로 틀린 것은?",o:["1차 감염만 된다.","많은 양의 균 또는 독소에 의해 발생한다.","소화기계 전염병보다 잠복기가 짧다.","발병 후 면역이 획득된다."],a:3,e:"세균성 식중독은 발병 후에도 면역이 획득되지 않아 반복 감염이 가능하다. 1차 감염, 많은 균량 필요, 짧은 잠복기는 올바른 설명이다.",r:93,c:"hygiene"},
{q:"유지의 산패요인과 거리가 먼 것은?",o:["광선","수분","금속","질소"],a:3,e:"질소는 불활성 기체로 오히려 산패를 방지하는 데 사용된다. 광선, 수분, 금속(구리, 철)은 유지의 산패를 촉진하는 요인이다.",r:90,c:"ingredients"},
{q:"세균이 분비한 독소에 의해 감염을 일으키는 것은?",o:["감염형 세균성식중독","독소형 세균성식중독","화학성식중독","진균독식중독"],a:1,e:"독소형 세균성 식중독은 세균이 분비한 독소에 의해 발생한다. 포도상구균, 보툴리누스균이 대표적이다.",r:85,c:"hygiene"}]},
{title:"2009년 1회",desc:undefined,questions:[{q:"10Kg의 베이킹파우더에 28%의 전분이 들어 있고 중화가가 80이라면 중조의 함량은?",o:["3.2kg","4.0kg","4.8kg","7.2kg"],a:0,e:"베이킹파우더 = 전분+산+탄산수소나트륨 전분 = 10kg*28%=2.8kg 10kg = 전분2.8kg + (산+탄산수소나트륨) 7.2kg 산을 x라고 하면 x+0.8x=7.2kg 1.8x=7.2kg x(산)=4kg 탄산수소나트륨은 산의 80%이므로 4*0.8=3.2kg 제빵",r:99,c:"ingredients"},
{q:"과자반죽의 믹싱완료 정도를 파악할 때 사용되는 항목으로 적합하지 않은 것은?",o:["반죽의 비중","글루텐의 발전정도","반죽의 점도","반죽의 색"],a:1,e:"과자반죽(케이크류)은 글루텐 발전을 억제하여 만드는 것이 특징이므로, 글루텐의 발전정도는 과자반죽의 믹싱 완료 여부를 판단하는 기준으로 적합하지 않다. 비중, 점도, 색이 주요 판단 항목이다.",r:93,c:"manufacturing"},
{q:"다음 중 케이크 도넛의 튀김 온도로 가장 적합한 것은?",o:["140~160℃","180~190℃","217~227℃","230℃ 이상"],a:1,e:"케이크 도넛의 튀김 온도는 180~195˚C 가 적당하다, 튀김 기름의 깊이는 12~25cm 정도가 적당함.",r:99,c:"manufacturing"},
{q:"밀가루 100%, 계란 166%, 설탕 166%, 소금 2%인 배합율은 어떤 케이크 제조에 적당한가?",o:["파운드 케이크","옐로 레이어 케이크","스펀지 케이크","엔젤푸드 케이크"],a:2,e:"계란과 설탕이 밀가루보다 많고 유지가 없는 것이 스펀지 케이크의 전형적인 배합이다. 파운드 케이크는 유지가 많고, 엔젤푸드는 흰자만 사용한다.",r:93,c:"ingredients"},
{q:"거품형 케이크는?",o:["파운드 케이크","스펀지 케이크","데블스 푸드 케이크","초콜릿 케이크"],a:1,e:"스펀지 케이크는 계란의 기포성을 이용해 부풀리는 대표적인 거품형(foam type) 케이크이다. 파운드, 데블스 푸드, 초콜릿 케이크는 반죽형(batter type)이다.",r:93,c:"manufacturing"},
{q:"과일 파이의 충전물이 끓어 넘치는 이유가 아닌 것은?",o:["충전물의 온도가 낮다.","껍질에 구멍을 뚫지 않았다.","충전물에 설탕량이 너무 많다.","오븐 온도가 낮다."],a:0,e:"충전물의 온도가 낮으면 끓어 넘칠 이유가 없다. 껍질에 구멍을 뚫지 않거나, 설탕이 많거나, 오븐 온도가 낮아 오래 구우면 충전물이 끓어 넘칠 수 있다.",r:93,c:"manufacturing"},
{q:"도넛에 기름이 많이 흡수되는 이유에 대한 설명으로 틀린 것은?",o:["믹싱이 부족하다.","반죽에 수분이 많다.","배합에 설탕과 팽창제가 많다.","튀김온도가 높다"],a:3,e:"도넛에 기름이 많은 원인은 다양하지만 튀김 온도가 높은 것 이 아니라 낮은 경우 기름이 많아진다",r:99,c:"manufacturing"},
{q:"다음 중 버터크림 당액 제조시 설탕에 대한 물 사용량으로 알맞은 것은?",o:["25%","80%","100%","125%"],a:0,e:"버터크림 설탕 100 , 물 25~30",r:99,c:"ingredients"},
{q:"다음 제품 중 이형제로 팬에 물을 분무하여 사용하는 제품은?",o:["슈","시퐁케이크","오렌지 케이크","마블파운드케이크"],a:1,e:"시퐁케이크는 팬에 기름을 바르지 않고 물을 분무하여 반죽이 팬 벽면을 타고 올라갈 수 있게 한다. 기름을 바르면 반죽이 미끄러져 부피가 작아진다.",r:93,c:"manufacturing"},
{q:"제품의 팽창형태가 화학적 팽창에 해당하지 않는 것은?",o:["와플","팬케이크","비스킷","잉클리쉬 머핀"],a:3,e:"잉글리쉬 머핀은 이스트를 사용한 생물학적(발효) 팽창 방식으로 제조된다. 와플, 팬케이크, 비스킷은 베이킹파우더 등 화학적 팽창제를 사용하여 부풀린다.",r:90,c:"ingredients"},
{q:"제과공장 설계시 환경에 대한 조건으로 알맞지 않은 것은?",o:["바다 가까운 곳에 위치하여야 한다.","환경 및 주위가 깨끗한 곳이어야 한다.","양질의 물을 충분히 얻을 수 있어야 한다.","폐수 및 폐기물 처리에 편리한 곳이어야 한다."],a:0,e:"바다 가까운 곳은 염분과 습기로 인해 원재료와 제품의 품질에 악영향을 미칠 수 있다. 깨끗한 환경, 양질의 물, 폐수처리 편의성이 공장 입지 조건이다.",r:90,c:"manufacturing"},
{q:"열원으로 찜(수증기)을 이용했을 때의 주 열전달 방식은?",o:["대류","전도","초음파","복사"],a:0,e:"대류는 열 때문에 유체가 상하로 뒤바뀌며 움직이는 현상이다.",r:99,c:"manufacturing"},
{q:"거품형 케이크를 만들 때 녹인 버터는 언제 넣어야하는가?",o:["처음부터 다른 재료와 함께 넣는다.","밀가루 와 섞어 넣는다.","설탕과 섞어 넣는다.","반죽의 최종단계에 넣는다."],a:3,e:"거품형 케이크에서 녹인 버터는 반죽의 최종단계에 넣는다. 일찍 넣으면 기포가 파괴되어 부피가 줄어든다.",r:85,c:"ingredients"},
{q:"포장된 케이크류에서 변패의 가장 중요한 원인은?",o:["흡수","고온","저장기간","작업자"],a:0,e:"포장된 케이크류에서 변패의 가장 중요한 원인은 수분 흡수이다. 수분이 증가하면 곰팡이와 세균이 번식하기 쉬워진다.",r:90,c:"nutrition"},
{q:"다음 중 파이롤러를 사용하지 않는 제품은?",o:["데니시 페이스트리","케이크 도넛","퍼프 페이스트리","롤 케이크"],a:3,e:"롤 케이크는 반죽을 평판에 얇게 펴 구운 후 말아 성형하는 제품으로, 파이롤러로 반죽을 밀어펴는 공정이 필요하지 않다. 데니시, 퍼프 페이스트리, 케이크 도넛은 파이롤러를 사용해 반죽을 밀어편다.",r:93,c:"manufacturing"},
{q:"일반적으로 식빵에 사용되는 설탕은 스트레이트법에서 몇%정도일 때 이스트 작용을 지연시키는가?",o:["1%","2%","4%","7%"],a:3,e:"설탕은 5% 이상일때, 이스트 작용을 저해시킨다.",r:99,c:"manufacturing"},
{q:"600g짜리 빵 10개를 만들려 할 때 발효 손실 2%, 굽기 및 냉각손실이 12%이면 반죽해야 할 반죽의 총 무게는 약 얼마인가?",o:["6.17kg","6.24kg","6.96kg","7.36kg"],a:2,e:"600gx10개 = 6,000g = 6kg 6kg ÷ (1-0.12%) ÷ (1-0.02%) 6kg ÷ 0.88 ÷ 0.98 = 6.95732.... → 반올림 6.96",r:99,c:"manufacturing"},
{q:"냉동제품의 해동 및 재가열 목적으로 주로 사용하는 오븐은?",o:["적외선 오븐","릴 오븐","데크 오븐","대류식 오븐"],a:0,e:"적외선 오븐은 적외선 복사열로 식품 내부까지 빠르게 가열할 수 있어 냉동제품의 해동 및 재가열 목적으로 주로 사용된다.",r:85,c:"manufacturing"},
{q:"반죽의 온도가 25℃일 때 반죽의 흡수율이 61%인 조건에서 반죽의 온도를 30℃로 조정하면 흡수율은 얼마가 되는가?",o:["55%","58%","62%","65%"],a:1,e:"온도 5℃ 상승시, 흡수율은 3% 감소한다.",r:99,c:"nutrition"},
{q:"2차 발효시 3가지 기본적 요소가 아닌 것은?",o:["온도","pH","습도","시간"],a:1,e:"2차 발효의 3대 기본 요소는 온도, 습도, 시간이다. pH는 2차 발효실에서 직접 조절하는 요소가 아니다.",r:90,c:"manufacturing"},
{q:"건포도 식빵을 구울 때 건포도에 함유된 당의 영향을 고려하여 주의 할 점은?",o:["윗 불을 약간 약하게 한다.","굽는 시간을 늘린다.","굽는 시간을 줄인다.","오븐 온도를 높게 한다."],a:0,e:"건포도의 당분이 빨리 탈 수 있으므로 윗불을 약간 약하게 하여 윗면이 과도하게 착색되는 것을 방지한다.",r:85,c:"manufacturing"},
{q:"1차 발효실의 상태습도는 몇 %로 유지하는 것이 좋은가?",o:["55~65%","65~75%","75~85%","85~95%"],a:2,e:"1차 발효실의 적정 상대습도는 75~85%이다. 습도가 너무 낮으면 반죽 표면이 마르고, 너무 높으면 끈적거린다.",r:98,c:"manufacturing"},
{q:"노화에 대한 설명으로 틀린 것은?",o:["α화 전분이 β화 전분으로 변하는 것","빵의 속이 딱딱해지는 것","수분이 감소하는 것","빵의 내부에 곰팡이가 피는 것"],a:3,e:"곰팡이는 노화가 아니고 부패이다 제빵",r:99,c:"hygiene"},
{q:"저율배합의 특징으로 옳은 것은?",o:["저장성이 짧다.","제품이 부드럽다.","저온에서 굽기 한다.","대표적인 제품으로 브리오슈가 있다."],a:0,e:"저율배합은 설탕과 유지 함량이 적어 저장성이 짧다. 제품이 단단하고, 고온에서 짧게 구우며, 브리오슈는 고율배합 제품이다.",r:93,c:"manufacturing"},
{q:"빵제품의 제조공정에 대한 설명으로 올바르지 않은 것은?",o:["반죽은 무게 또는 부피에 의하여 분할한다.","둥글리기에서 과다한 덧가루를 사용하면 제품에 줄무늬가 생성된다.","중간발효시간은 보통 10 ~20분이며, 27 ~29℃에서 실시한다.","성형은 반죽을 일정한 형태로 만드는 1단계 공정으로 이루어져 있다."],a:3,e:"성형의 좁은 의미의 성형공정은 \"밀기→말기→봉하기\" 로 3단계이며 넓은 의미의 성형공정은 \"분할→둥글리기→중간발효→정형→패닝\" 으로 5단계임므로 1단계 공정이 틀린 것",r:99,c:"manufacturing"},
{q:"빵이 팽창하는 원인이 아닌 것은?",o:["이스트에 의한 발효 활동 생성물에 의한 팽창","효소와 설탕, 소금에 의한 팽창","탄산가스, 알코올, 수증기에 의한 팽창","글루텐의 공기 포집에 의한 팽창"],a:1,e:"효소와 설탕, 소금 자체가 직접 빵을 팽창시키지는 않는다. 이스트 발효에 의한 CO₂, 알코올, 수증기, 글루텐의 공기 포집이 빵 팽창의 원인이다.",r:93,c:"ingredients"},
{q:"산형식빵의 비용적으로 가장 적합한 것은?",o:["1.5~1.8","1.7~2.6","3.2~3.5","4.0~4.5"],a:2,e:"산형식빵의 비용적 : 3.2~3.5 cm3/g , 풀먼형식빵 비용적 : 3.3~4.0 cm3/g",r:99,c:"ingredients"},
{q:"냉동 반죽법에서 믹싱 후 1차 발효시간으로 가장 적합한 것은?",o:["0~20분","50~60분","80~90분","110 ~120분"],a:0,e:"냉동반죽법에서는 1차 발효를 0~20분으로 최소화한다. 발효가 길면 이스트가 소모되고 냉동 시 가스 보유력이 저하된다.",r:93,c:"manufacturing"},
{q:"냉각 손실에 대한 설명 중 틀린 것은?",o:["식히는 동안 수분 증발로 무게가 감소한다.","여름철보다 겨울철이 냉각 손실이 크다.","상대습도가 높으면 냉각손실이 작다.","냉각 손실은 5%정도가 적당하다."],a:3,e:"냉각손실 2%",r:99,c:"ingredients"},
{q:"기업경영의 3요소(3M)가 아닌 것은?",o:["사람(man)","자본(money)","재료(material)","방법(method)"],a:3,e:"기업경영의 3M은 사람(Man), 자본(Money), 재료(Material)이다. 방법(Method)은 3M에 포함되지 않는다.",r:85,c:"ingredients"},
{q:"설탕의 전체 고형질을 100%로 볼 때 포도당과 물엿의 고형질 함량은?",o:["포도당은 91%, 물엿은 80%","포도당은 80%, 물엿은 20%","포도당은 80%, 물엿은 50%","포도당은 80%, 물엿은 5%"],a:0,e:"설탕의 고형질을 100%로 보면, 포도당은 약 91%, 물엿은 약 80%의 고형질 함량을 가진다. 이 차이를 고려하여 대체 시 사용량을 조절해야 한다.",r:93,c:"ingredients"},
{q:"계란이 오래되면 어떠한 현상이 나타나는가?",o:["비중이 무거워진다.","점도가 감소한다.","pH가 떨어져 산패된다.","기실이 없어진다."],a:1,e:"계란이 오래되면 난백의 점도가 감소하여 묽어진다. 비중은 가벼워지고(기실이 커짐), pH는 올라가며(알칼리화), 기실이 커진다.",r:93,c:"ingredients"},
{q:"다음 중 pH가 중성인 것은?",o:["식초","수산화나트륨 용액","중조","증류수"],a:3,e:"수산화나트륨과 중조는 염기성, 식초는 산성이다. 순수한 물 즉, 증류수는 pH7로 중성이다. 제과",r:99,c:"nutrition"},
{q:"10% 이상의 단백질 함량을 가진 밀가루로 케이크를 만들었을 때 나타나는 결과가 아닌 것은?",o:["제품이 수축되면서 딱딱하다.","형태가 나쁘다.","제품의 부피가 크다.","제품이 질기며 속결이 좋지 않다."],a:2,e:"단백질 함량이 10%이상이면 강력분을 사용한것이므로 단단해져서 케이크의 크기가 커지기 어렵다",r:99,c:"ingredients"},
{q:"다음 중 코팅용 초콜릿이 갖추어야 하는 성질은?",o:["융점이 항상 낮은 것","융점이 항상 높은 것","융점이 겨울에는 높고, 여름에는 낮은 것","융점이 겨울에는 낮고, 여름에는 높은 것"],a:3,e:"*코팅용 초콜릿 - 카카오매스에서 카카오버터를 제거하고 식물성 유지와 설탕을 섞어 만든것 - 장점 : 템퍼링 작업 없이도 손쉽게 사용할 수 있음 - 겨울에는 융점이 낮은 것, 여름에는 융점이 높은 것을 사용",r:99,c:"ingredients"},
{q:"글루텐을 형성하는 단백질 중 수용성 단백질은?",o:["글리아딘","글루테닌","메소닌","글로불린"],a:3,e:"글로불린은 묽은 염류 용액에 녹는 단백질로 염용성 단백질에 해당한다. 문제에서는 '수용성 단백질'로 분류하고 있다.\n• 글리아딘: 알코올 용해성, 글루테닌: 묽은 산·알칼리 용해성\n• 글루텐을 형성하는 단백질은 글리아딘과 글루테닌이며, 글로불린은 글루텐 형성에 직접 관여하지 않는다.",r:93,c:"nutrition"},
{q:"다음 중 우유 단백질이 아닌 것은?",o:["카제인(casein)","락토알부민(lactalbumin)","락토글로불린(lactoglobulin)","락토오스(lactose)"],a:3,e:"락토오스는 이당류",r:99,c:"ingredients"},
{q:"다음 당류 중 일반적인 제빵용 이스트에 의하여 분해되지 않는 것은?",o:["설탕","맥아당","과당","유당"],a:3,e:"유당은 갈락토오스와 포도당으로 구성된 이당류로, 제빵용 이스트가 분비하는 효소로는 분해되지 않는다. 설탕, 맥아당, 과당은 이스트에 의해 발효된다.",r:90,c:"ingredients"},
{q:"50g의 밀가루에서 15g의 젖은 글루텐을 재취했다면 이 밀가루의 건조글루텐 함량은?",o:["10%","20%","30%","40%"],a:0,e:"젖은 글루텐 = (젖은글루텐 중량/밀가루중량)*100 건조 글루텐 = 젖은 글루텐 / 3 (15/50)*100=30 30/3=10%",r:99,c:"ingredients"},
{q:"강력분의 특징과 거리가 먼 것은?",o:["초자질이 많은 경질소맥으로 제분한다.","제분율을 높여 고급 밀가루를 만든다.","상대적으로 단백질 함량이 높다.","믹싱과 발효 내구성이 크다."],a:1,e:"제분율을 높이면 외피(bran)가 많이 혼입되어 품질이 떨어진다. 강력분은 제분율을 적절히 유지하여 고급 밀가루를 만든다. 초자질 경질소맥, 높은 단백질, 큰 내구성은 강력분의 특징이다.",r:93,c:"ingredients"},
{q:"기본적인 유화쇼트닝은 모노-디 글리세리드 역가를 기준으로 유지에 대하여 얼마를 첨가하는 것이 가장 적당한가?",o:["1~2%","3~4%","6~8%","10~12%"],a:2,e:"유화쇼트닝에는 모노-디글리세리드를 유지 대비 6~8% 첨가하는 것이 적당하다. 이 범위에서 반죽의 유화 안정성과 제품 품질이 최적화된다.",r:98,c:"ingredients"},
{q:"물에 대한 설명으로 틀린 것은?",o:["물은 경도에 따라 크게 연수와 경수로 나뉜다.","경수는 물 100mL 중 칼슘 , 마그네슘 등의 염이 10~20mg 정도 함유된 것이다.","연수는 물 100mL중 칼슘 , 마그네슘 등의 염이 10mg 이하 함유된 것이다.","일시적인 경수란 물을 끓이면 물속의 물기물이 불용성 탄산염으로 침전되는 것이다."],a:1,e:"경수는 물 1L(1000mL) 중 칼슘, 마그네슘 등의 염이 일정량 이상 함유된 것이다. 100mL 중 10~20mg이면 연수에 가깝다.",r:93,c:"nutrition"},
{q:"술에 대한 설명으로 틀린 것은?",o:["제과, 제빵에서 술을 사용하면 바람직하지 못한 냄새를 없앨 수 없다.","양조주란 곡물이나 과실을 원료로 하여 효모를 발효시킨 것이다.","증류주란 발효시킨 양조주를 증류한 것이다.","혼성주란 증류주를 기본으로 정제당을 넣고 과실 등의 추출물로 향미를 낸 것으로 대부분 알코올 농도가 낮다."],a:3,e:"혼성주는 대부분 알콜 농도가 높다.",r:99,c:"ingredients"},
{q:"식물성 안정제가 아닌 것은?",o:["젤라틴","한천","로커스트빈검","펜틴"],a:0,e:"젤라틴 - 동물가죽, 연골의 콜라겐등을 정제한 안정제, 동물성 한천 - 우뭇가사리 펙틴 - 과일의 껍질 사이",r:99,c:"ingredients"},
{q:"반죽의 물리적 성질을 시험하는 기기가 아닌 것은?",o:["패리노그래프(Farinograph)","수분활성도측정기(Water activity analyzer)","익스텐소그래프(Extensograph)","폴링넘버(Falling number)"],a:1,e:"수분활성도측정기는 식품의 수분활성도를 측정하는 기기로, 반죽의 물리적 성질(점탄성, 신장성 등)을 시험하는 기기가 아니다.",r:90,c:"ingredients"},
{q:"노인의 경우 필수지방산의 흡수를 위하여 다음 중 어떤 종류의 기름을 섭취하는 것이 좋은가?",o:["콩기름","닭기름","돼지기름","쇠기름"],a:0,e:"콩기름은 리놀레산 등 필수지방산이 풍부한 식물성 유지로, 동물성 지방보다 흡수가 용이하여 노인에게 적합하다.",r:90,c:"nutrition"},
{q:"1일 2000kcal를 섭취하는 성인의 경우 탄수화물의 적절한 섭취량은?",o:["1100~1400g","850~1050g","500~725g","275~350g"],a:3,e:"탄수화물 : 1g = 4Kcal 1일 섭취량 70% 2000Kcal * 0.7 = 1400 1400/4 = 350g",r:99,c:"nutrition"},
{q:"\"태양광선 비타민\"라고도 불리며 자외선에 의해 체내에서 합성되는 비타민은?",o:["비타민 A","비타민 B","비타민 C","비타민 D"],a:3,e:"비타민 D는 피부에서 자외선(UV-B)에 의해 합성되어 '태양광선 비타민'이라 불린다. 칼슘 흡수와 골격 형성에 필수적이다.",r:93,c:"nutrition"},
{q:"지질의 대사산물이 아닌 것은?",o:["물","수소","이산화탄소","에너지"],a:1,e:"지질이 체내에서 대사되면 물(H₂O), 이산화탄소(CO₂), 에너지(ATP)가 생성된다. 수소(H₂) 자체는 대사 최종 산물이 아니다.",r:90,c:"nutrition"},
{q:"각 식품별 부족한 영양소의 연결이 틀린 것은?",o:["콩류-트레오닌","곡류-리신","채소류-메티오닌","옥수수-트립토판"],a:0,e:"트레오닌-필수 아미노산의 하나. 우유나 고기 등의 동물성 단백질에 많이 함유되어 있다.",r:99,c:"nutrition"},
{q:"소독제로 가장 많이 사용되는 알코올의 농도는?",o:["30%","50%","70%","100%"],a:2,e:"70% 에탄올이 소독에 가장 효과적이다. 100%는 단백질 응고가 빨라 세균 내부로 침투하기 어렵고, 낮은 농도는 살균력이 약하다.",r:90,c:"hygiene"},
{q:"곰팡이의 대사생산물이 사람이나 동물에 어떤 질병이나 이상한 생리작용을 유발하는 것은?",o:["만성전염병","급성 전염병","화학적식중독","진균독식중독"],a:3,e:"진균독식중독(마이코톡시코시스)은 곰팡이가 생산한 독소(아플라톡신 등)에 의해 발생하는 식중독이다.",r:85,c:"hygiene"},
{q:"식품첨가물에 대한 설명 중 틀린 것은?",o:["성분규격은 위생적인 품질을 확보하기 위한 것이다.","모든 품목은 사용대상 식품의 종류 및 사용량에 제한을 받지 않는다.","조금씩 사용하더라도 장기간 섭취할 경우 인체에 유해할 수도 있으므로 사용에 유의한다.","용도에 따라 보존료. 산화방지제 등이 있다."],a:1,e:"모든 식품첨가물은 사용대상 식품의 종류 및 사용량에 제한을 받는다. 식품위생법에 따라 허가된 품목만 정해진 기준 내에서 사용해야 한다.",r:93,c:"ingredients"},
{q:"기구, 용기 또는 포장 제조에 함유될 수 있는 유해금속과 거리가 먼 것은?",o:["납","카드뮴","칼슘","비소"],a:2,e:"칼슘은 인체에 필수적인 무기질로 유해금속이 아니다. 납, 카드뮴, 비소는 기구·용기에 함유될 수 있는 대표적 유해금속이다.",r:90,c:"hygiene"},
{q:"균체의 독소 중 뉴로톡신(neurotoxin)을 생산하는 식중독 균은?",o:["포도상구균","클로스트리디움보툴리늄균","장염 비브리오균","병원성 대장균"],a:1,e:"클로스트리디움 보툴리늄균은 신경독소(뉴로톡신)를 생산하여 신경마비를 일으키는 가장 치명적인 식중독균이다.",r:77,c:"hygiene"},
{q:"식품첨가물에 관한 설명 중 틀린 것은?",o:["식품의 조리 가공에 있어 상품적, 영양적, 위생적 가치를 향상시킬 목적으로 사용한다.","식품에 의도적으로 미량 첨가되는 물질이다.","자연의 동・식물에서 추출된 천연식품첨가물은 식품의약품안전청장의 허가 없이도 사용이 가능하다.","식품에 첨가, 혼합, 침윤, 기타의 방법에 의해 사용되어진다."],a:2,e:"천연식품첨가물이라도 식품의약품안전청장의 허가를 받아야 사용할 수 있다. 모든 식품첨가물은 안전성 평가와 허가 과정을 거쳐야 한다.",r:90,c:"ingredients"},
{q:"부패를 판정하는 방법으로 사람에 의한 관능검사를 실시할 때 검사하는 항목이 아닌 것은?",o:["색","맛","냄새","균수"],a:3,e:"부패 판정 시 관능검사는 색, 맛, 냄새를 사람의 감각으로 평가한다. 균수 측정은 미생물학적 검사 방법이지 관능검사 항목이 아니다.",r:90,c:"hygiene"},
{q:"경구전염병 중 바이러스에 의해 전염되어 발병되는 것은?",o:["성홍열","장티푸스","홍역","아메바성 이질"],a:2,e:"세균성-성홍열, 장티푸스 원충성-아메바성 이질 바이러스성-홍역",r:99,c:"hygiene"},
{q:"경구전염병의 예방대책으로 잘못된 것은?",o:["환자 및 보균자의 발견과 격리","음료수의 위생 유지","식품취급자의 개인위생 관리","숙주 감수성 유지"],a:3,e:"숙주 감수성을 '유지'하는 것이 아니라 '저하'시켜야 한다. 예방접종 등으로 숙주의 면역력을 높여 감수성을 낮추는 것이 올바른 예방대책이다.",r:93,c:"hygiene"},
{q:"급성전염병을 일으키는 병원체로 포자는 내열성이 강하며 생물학전이나 생물테러에 사용될 수 있는 위험성이 높은 병원체는?",o:["브루셀라균","탄저균","결핵균","리스테리아균"],a:1,e:"탄저균(Bacillus anthracis)은 내열성 포자를 형성하며 생물테러 무기로 사용될 위험이 높은 병원체이다.",r:90,c:"hygiene"}]},
{title:"2009년 2회",desc:undefined,questions:[{q:"오븐의 생산능력은 무엇으로 계산하는가?",o:["소모되는 전력량","오븐의 높이","오븐의 단열 정도","오븐 내 매입 철판 수"],a:3,e:"오븐의 생산능력은 오븐 내 매입 철판 수(선반 수)로 계산한다. 철판이 많을수록 한 번에 구울 수 있는 양이 많다.",r:90,c:"manufacturing"},
{q:"밤과자 제조공정에 대한 설명으로 틀린 것은?",o:["반죽을 한 덩어리로 만들어 즉시 분할한다","반죽과 내용물의 되기를 동일하게 한다","성형 후 물을 뿌려 덧가루를 제거한다","껍질의 두께가 일정하도록 내용물을 싼다"],a:0,e:"밤과자 반죽은 만든 후 즉시 분할하는 것이 아니라 충분히 휴지(숙성)시킨 다음 분할해야 반죽의 탄성이 안정되어 성형이 용이해진다. 즉시 분할하면 반죽이 수축하여 성형이 어렵다.",r:93,c:"manufacturing"},
{q:"반죽형 케이크의 반죽 믹싱법에 대한 설명으로 틀린 것은?",o:["크림법은 유지, 설탕, 계란으로 크림을 만든다","블랜딩법은 유지와 밀가루를 먼저 혼합한다","단단계법은 모든 재료를 한 번에 넣고 혼합한다","설탕물법은 설탕 1을 물 2의 비율로 용해하여 액당을 만든다"],a:3,e:"설탕/물법 : 설탕 2 : 물 1 비율",r:99,c:"ingredients"},
{q:"도넛의 발한 현상을 방지하는 방법으로 틀린 것은?",o:["튀김시간을 늘인다","점착력이 낮은 기름을 사용한다","충분히 식히고 나서 설탕을 묻힌다","도넛 위에 뿌리는 설탕 사용량을 늘인다"],a:1,e:"점착력이 낮은 기름을 사용하면 도넛 표면에 기름이 잘 흡착되지 않아 설탕이 녹아내리는 발한 현상이 오히려 촉진될 수 있으므로, 발한 방지 방법으로 적절하지 않다.",r:90,c:"ingredients"},
{q:"다음 제품 중 건조방기를 목적으로 나무틀을 사용하여 굽기를 하는 제품은?",o:["슈","밀푀유","카스테라","퍼프 페이스트리"],a:2,e:"카스테라는 수분 함량이 많은 반죽 특성상 건조를 돕기 위해 나무틀을 사용하여 굽는 대표적인 제품이다. 나무틀이 수분을 흡수하여 적절한 건조 효과를 제공한다.",r:90,c:"manufacturing"},
{q:"케이크의 부피가 작아지는 원인에 해당하는 것은?",o:["강력분을 사용한 경우","오버베이킹된 경우","크림성이 좋은 유지를 사용한 경우","신선한 달걀을 사용한 경우"],a:0,e:"케이크류(거품형·반죽형)는 박력분처럼 단백질 함량이 낮은 밀가루를 사용해야 부드럽고 기공이 잘 형성되어 부피가 커집니다. 강력분은 글루텐 형성력이 강해 반죽이 질겨지고 팽창을 억제하므로 케이크 부피가 작아지는 원인이 됩니다.",r:99,c:"ingredients"},
{q:"가나슈 크림에 대한 설명으로 옳은 것은?",o:["생크림은 절대 끓여서 사용하지 않는다","초콜릿과 생크림의 배합비율은 10:1이 원칙이다","초콜릿 종류는 달라도 카카오 성분은 같다","끓인 생크림에 초콜릿을 더한 크림이다"],a:3,e:"가나슈 크림은 끓인 생크림에 초콜릿을 더하여 만든 크림이다. 생크림을 끓여서 사용하며, 초콜릿과 생크림의 비율은 1:1~2:1 정도이다.",r:93,c:"ingredients"},
{q:"퍼프페이스트리 굽기 후결점과 원인으로 틀린 것은?",o:["수축 : 밀어펴기 과다, 너무 높은 오븐 온도","수포 생성 : 단백질 함량이 높은 밀가루로 반죽을 함","충전물 흘러 나옴 : 출전물량 과다 , 봉합 부적절","작은 부피 : 수분이 없는 경화 쇼트닝을 충전용 유지로 사용"],a:1,e:"수포가 생성되는 것은 반죽 온도가 높을 때이다.",r:99,c:"manufacturing"},
{q:"비중과 관련이 없는 것은?",o:["완제품의 조직","기공의 크기","완제품의 크기","팬 용적"],a:3,e:"팬 용적은 반죽의 비중과 관련이 없다. 비중은 완제품의 조직, 기공의 크기, 완제품의 부피에 영향을 미친다.",r:90,c:"manufacturing"},
{q:"머랭을 제조할 때 주석산 크림의 사용 목적이 아닌 것은?",o:["흰자를 강하게 한다","머랭의 ph를 낮춘다","맛을 좋게한다","색을 희게 한다"],a:2,e:"주석산 크림(cream of tartar)은 흰자 거품을 안정시켜 강하게 하고, pH를 낮추며, 색을 희게 하는 역할을 한다. 맛을 좋게 하는 것은 주석산 크림의 사용 목적이 아니다.",r:90,v:0,c:"ingredients"},
{q:"다음 중 익히는 방법이 나머지 셋과 다른 것은?",o:["찐빵","엔젤푸드 케이크","스펀지 케이크","파운드 케이크"],a:0,e:"찐빵은 증기(스팀)로 익히는 방식이고, 엔젤푸드 케이크·스펀지 케이크·파운드 케이크는 모두 오븐에서 굽는 방식이다. 따라서 찐빵이 나머지 셋과 익히는 방법이 다르다.",r:70,c:"manufacturing"},
{q:"데블스푸드 케이크 제조시 중조를 8g 사용했을 경우 가스 발생량으로 비교했을 때 베이킹파우더 몇 g과 효과가 같은가?",o:["8 g","16g","24g","32g"],a:2,e:"중조(탄산수소나트륨)의 가스 발생력은 베이킹파우더의 약 3배이다.\n따라서 중조 8g = 베이킹파우더 8×3 = 24g과 같은 효과이다.",r:97,c:"ingredients"},
{q:"파운드케이크를 구운 직후 계란 노른자에 설탕을 넣어 칠할 때 설탕의 역할이 아닌 것은?",o:["광택제 효과","보존기간 개선","탈색 효과","맛의 개선"],a:2,e:"설탕과 계란노른자를 합하여 파운드케익의 표면에 발라줌으로써 맛의 보완과 광택제 효과를 크게얻을수 있으며 보존기간도 늘릴 수 있다. 하지만 탈색효과는 전혀 해당되지 않는다. 제빵",r:99,c:"ingredients"},
{q:"젤리 롤 케이크는 말 때 터지는 경우의 조치 사항이 아닌 것은?",o:["계란에 노른자를 추가시켜 사용한다","설탕의 일부를 물엿으로 대처한다","덱스트린의 점착성을 이용한다","팽창이 과도한 경우에는 팽창제 사용량을 감소시킨다"],a:0,e:"노른자 사용을 줄이고 전란 사용을 늘린다.",r:99,c:"ingredients"},
{q:"다음 중 반죽의 얼음 사용량 계산 공식으로 옳은 것은?",o:["공식1","공식2","공식3","공식4"],a:0,e:"반죽의 얼음 사용량은 공식1로 계산한다. 얼음의 융해 잠열(80kcal/kg)을 적용하여 목표 반죽 온도를 맞추기 위한 얼음량을 산출하는 방식이다.",r:95,c:"manufacturing"},
{q:"성형과정을 거치는 동안에 반죽이 거친 취급을 받아 상처받은 상태이므로 이를 회복시키기 위해 글루텐숙성과 팽창을 도모하는 과정은?",o:["1차 발효","중간 발효","펀치","2차 발효"],a:3,e:"2차 발효는 성형 후 반죽을 발효실에서 최종 팽창시키는 과정으로, 성형 중 손상된 글루텐을 회복시키고 가스 생성을 통해 충분한 부피 팽창을 도모한다.",r:90,c:"manufacturing"},
{q:"일반적으로 작은 규모의 제과점에서 사용하는 믹서는?",o:["수직형 믹서","수평형 믹서","초고속 믹서","커터 믹서"],a:0,e:"1. 수직형 믹서 주로 소규모 제과점에서 케이크 반죽 또는 빵 반죽을 만들 경우에 사용한다",r:99,c:"manufacturing"},
{q:"식빵배합률 합계가 180%, 밀가루 총 사용량이 3000g일 때 총반죽의 무게는?",o:["1620g","3780g","5400g","5800g"],a:2,e:"밀가루 100%에 대해 총배합률이 180%이므로\n총반죽 무게 = 밀가루 × (총배합률/100) = 3000 × 1.8 = 5400g",r:95,c:"manufacturing"},
{q:"빵의 굽기에 대한 설명 중 옳은 것은?",o:["고배합의 경우 낮은 온도에서 짧은 시간으로 굽기","고배합의 경우 높은 온도에서 긴 시간으로 굽기","저배합의 경우 낮은 온도에서 긴 시간으로 굽기","저배합의 경우 높은 온도에서 짧은 시간으로 굽기"],a:3,e:"저배합(설탕·유지가 적은) 제품은 높은 온도에서 짧은 시간으로 굽는다. 고배합 제품은 당분이 많아 타기 쉬우므로 낮은 온도에서 긴 시간 굽는다.",r:93,c:"manufacturing"},
{q:"반죽을 발효시키는 목적이 아닌 것은?",o:["향 생성","반죽의 숙성 작용","반죽의 팽창작용","글루텐 응고"],a:3,e:"글루텐 응고는 굽기 과정에서 열에 의해 일어나는 현상이지 발효의 목적이 아니다. 발효의 목적은 향 생성, 반죽 숙성, 반죽 팽창이다.",r:93,c:"manufacturing"},
{q:"과자빵의 껍질에 흰 반점이 생긴 경우 그 원인에 해당되지 않는 것은?",o:["반죽온도가 높았다","발효하는 동안 반죽이 식었다","숙성이 덜 된 반죽을 그대로 정형하였다","2차 발효 후 찬 공기를 오래 쐬었다"],a:0,e:"반죽온도가 높으면 발효가 촉진되어 껍질이 고르게 형성되므로 흰 반점의 원인이 되지 않는다. 반죽이 식거나, 숙성 부족, 찬 공기 노출은 흰 반점을 유발할 수 있다.",r:93,c:"manufacturing"},
{q:"생산관리의 기능과 거리가 먼 것은?",o:["품질보증기간","적시·적량기능","원가조절기능","글루텐 응고"],a:3,e:"글루텐 응고는 제빵 공정상의 물리적 변화로 생산관리의 기능이 아니다. 품질보증, 적시·적량, 원가조절이 생산관리의 기능이다.",r:93,c:"management"},
{q:"다음 중 주로 유화제로 사용되는 식품첨가물은?",o:["글리세린지방산에스테르","탄산암모늄","프로피온산칼슘","탄산나트륨"],a:0,e:"글리세린지방산에스테르는 대표적인 유화제이다.\n• 탄산암모늄: 팽창제, 프로피온산칼슘: 보존료, 탄산나트륨: 알칼리제",r:93,c:"ingredients"},
{q:"제빵 냉각법 중 적합하지 않은 것은?",o:["급속냉각","자연냉각","터널식냉각","에어콘디션식 냉각"],a:0,e:"급냉은 제과에서 많이 사용함",r:99,c:"manufacturing"},
{q:"다음 중 제품 특성상 일반적으로 노화가 가장 빠른 것은?",o:["단과자빵","카스테라","식빵","도넛"],a:2,e:"식빵은 설탕과 유지 함량이 적은 저율배합 제품으로, 단과자빵이나 카스테라보다 노화가 빠르다. 설탕과 유지는 노화를 지연시키는 역할을 한다.",r:90,c:"manufacturing"},
{q:"빵의 팬닝에 있어 팬의 온도로 가장 적합한 것은?",o:["냉장온도(0~5℃)","20~24℃","30~35℃","60℃ 이상"],a:2,e:"빵의 팬닝 시 팬 온도는 30~35℃가 적합하다. 너무 차가우면 반죽이 수축하고, 너무 뜨거우면 이형유가 분해된다.",r:93,v:0,c:"manufacturing"},
{q:"제빵 시 유지를 투입하는 반죽의 단계는?",o:["픽업단계","클린업단계","발전단계","최종단계"],a:1,e:"유지는 반죽이 수화되어 한 덩어리가 된 클린업 단계에서 투입한다. 글루텐이 어느 정도 형성된 후 유지를 넣어야 반죽에 잘 흡수된다.",r:85,c:"ingredients"},
{q:"식빵 제조시 결과 온도 33℃, 밀가루온도 23℃, 실내온도 26℃, 수돗물온도 22℃, 희망온도 27℃, 사용물량 5kg일 때 마찰계수는?",o:["19","22","24","28"],a:3,e:"마찰계수 : 결과온도*3-(밀가루온도+실내온도+수돗물온도) = 33*3-(23+26+22) = 99-71 = 28 ",r:99,c:"manufacturing"},
{q:"반죽을 팬에 넣기 전에 팬에서 제품이 잘 떨어지게 하기 위하여 이형유를 사용하는데 그 설명으로 틀린 것은?",o:["이형유는 발연점이 높은 것을 사용해야 한다","이형유는 고온이나 산패에 안정해야 한다","이형유의 사용량은 반죽 무게의 5%정도이다","이형유의 사용량이 많으면 튀김현상이 나타난다"],a:2,e:"*이형유 : - 발연점이 높아야 한다. - 0.1~0.2% 정도 사용하는 것이 좋다. - 틀을 실리콘으로 코팅하면 이형유 사용량을 줄일 수 있다.",r:99,c:"ingredients"},
{q:"다음 중 일반적인 산형 식빵의 비용적은(cc/g)은?",o:["1.0 ~ 1.3","1.4 ~ 1.7","2.3 ~ 2.7","3.2 ~ 3.4"],a:3,e:"비용적 : 반죽 1g을 발효시켜 구웠을 때 제품이 차지하는 부피를 말한다. 산형 식빵 : 3.2 ~ 3.4cm3/g 풀먼 식빵 : 3.3 ~ 4.0cm3/g",r:99,c:"ingredients"},
{q:"이스트푸드의 구성 성분이 아닌 것은?",o:["암모늄염","질산염","칼슘염","전분"],a:1,e:"질산염은 이스트푸드의 구성 성분이 아니다. 이스트푸드는 암모늄염(이스트 영양원), 칼슘염(물 경도 조절), 전분(희석제) 등으로 구성된다.",r:90,c:"ingredients"},
{q:"다음과 같은 조건에서 나타나는 현상과 그와 관련한 물질을 바르게 연결한 것은?",o:["팻브룸(fat bloom) - 카카오매스","팻브룸(fat bloom) - 글리세린","슈가브룸(sugar bloom) - 카카오버터","슈가브룸(sugar bloom) - 설탕"],a:3,e:"슈가블룸이란 습도가 높은 곳에 초콜릿을 보관시 설탕이 수분을 흡수하여 녹았다가 건조해지면 재결정이 되어 표면이 하얗게 변하는 현상이라고 외워두셔요.",r:99,c:"ingredients"},
{q:"마요네즈를 만드는데 노른자가 500g 필요하다. 껍질 포함 60g짜리 계란을 몇 개 준비해야 하는가?",o:["10개","14개","28개","56개"],a:2,e:"계란 총 무게 60g 껍질 제외 54g 흰자 36g 노른자 18g ·500/18=27.7777777··· 답=28개",r:99,c:"ingredients"},
{q:"패리노그래프의 기능 및 특징이 아닌 것은?",o:["흡수율 측정","믹싱 시간 측정","500 B.U.를 중심으로 그래프 작성","전분 호화력 측정"],a:3,e:"전분 호화력 측정은 아밀로그래프의 기능이다. 패리노그래프는 흡수율, 믹싱시간, 500 B.U. 기준 그래프 작성 등의 기능을 가진다.",r:93,v:0,c:"ingredients"},
{q:"물과 반죽의 관계에 대한 설명 중 옳은 것은?",o:["경수로 배합할 경우 발효 속도가 빠르다","연수로 배합할 경우 글루텐을 더욱 단단하게 한다","연수 배합시이스트푸드를 약간 늘이는 게 좋다","경수로 배합을 하면 글루텐이 부드럽게 되고 기계에 잘 붙는 반죽이 된다"],a:2,e:"경수는 글루텐단단하게하고 발효속도느리다 연수는 글루텐연화작용 반죽 끈적이고 가스보유력떨어짐",r:99,c:"ingredients"},
{q:"다음 중 반죽에 산화제를 사용하였을 때의 결과에 대한 설명으로 잘못된 것은?",o:["반죽강도가 증가된다","가스 포집력이 증가한다","기계성이 개선된다","믹싱시간이 짧아진다"],a:3,e:"산화제를 사용하면 반죽강도가 증가하고 글루텐이 강화되므로 믹싱시간이 길어진다(짧아지지 않는다). 가스 포집력 증가와 기계성 개선도 산화제의 효과이다.",r:93,c:"manufacturing"},
{q:"가장 광범위하게 사용되는 베이킹파우더의 주성분은?",o:["CaHpO₄","NaHCO₃","Na₂CO₃","NH₄CI"],a:1,e:"NaHCO₃(탄산수소나트륨, 중조)는 베이킹파우더의 가스 발생원으로 가장 광범위하게 사용되는 주성분이다.",r:85,v:0,c:"ingredients"},
{q:"다음 중 제빵에 맥아를 사용하는 목적이 아닌 것은?",o:["이산화탄소 생산을 증가시킨다","제품에 독특한 향미를 부여한다","노화지연 효과가 있다","구조형성에 도움을 준다"],a:3,e:"맥아는 이산화탄소 생산 증가, 독특한 향미 부여, 노화지연 효과가 있지만, 구조형성에 도움을 주지는 않는다. 구조형성은 글루텐의 역할이다.",r:93,c:"manufacturing"},
{q:"마가린에 대한 설명 중 틀린 것은?",o:["지방함량이 80% 이상이다","유지원료는 동물성과 식물성이 있다","버터 대용품으로 사용된다","순수 유지방만을 사용했다"],a:3,e:"마가린은 순수 유지방만이 아니라 식물성 유지, 동물성 유지 등 다양한 유지원료를 혼합하여 만든다. 버터와 달리 순수 유지방 제품이 아니다.",r:85,c:"ingredients"},
{q:"지방에 대한 설명 중 잘못된 것은?",o:["지방은 글리세린과 지방산으로 되어 있다","지방 중 유리지방산 함량이 많으면 발연점이 높아진다","불포화지방산은 식물성유에 많다","지방산에 이중결합의 수가 많으면 융점이 낮아진다"],a:1,e:"유리지방산 함량이 많으면 발연점이 낮아진다(높아지지 않는다). 유리지방산은 글리세롤과 분리된 상태로 낮은 온도에서 연기가 발생한다.",r:93,c:"nutrition"},
{q:"제빵용 밀가루에서 빵 발효에 많은 영향을 주는 손상전분의 적정한 함량은?",o:["0%","1~3.5%","4.5~8%","9~12.5%"],a:2,e:"제빵용 밀가루의 적정 손상전분 함량은 4.5~8%이다. 손상전분은 효소에 의해 쉽게 분해되어 이스트의 영양원이 된다.",r:93,c:"ingredients"},
{q:"제과제빵에 사용하는 분유의 기능이 아닌 것은?",o:["갈변 방지","영양소 공급","글루텐 강화","맛과 향 개선"],a:0,e:"분유는 갈변을 방지하는 것이 아니라 오히려 유당과 단백질이 마이야르 반응(갈변 반응)을 촉진한다. 분유의 주요 기능은 영양소 공급, 맛과 향 개선, 수분 보유력 향상 등이다.",r:93,c:"nutrition"},
{q:"맥아당은 이스트의 발효과정 중에 효소에 의해 어떻게 분해되는가?",o:["포도당+포도당","포도당+과당","포도당+유당","과당+과당"],a:0,e:"맥아당(maltose)은 말타아제(maltase) 효소에 의해 포도당 + 포도당으로 분해된다.",r:77,c:"ingredients"},
{q:"효소를 구성하는 주성분에 대한 설명으로 틀린 것은?",o:["탄소, 수소, 산소, 질소 등의 원소로 구성되어 있다","아미노산이 펩티드 결합을 하고 있는 구조이다","열에 안정하여 가열하여도 변성되지 않는다","섭취 시 4Kcal의 열량을 낸다"],a:2,e:"료소는 단백질로 구성되어 있기 때문에 열에 쉽게 변성한다",r:99,c:"nutrition"},
{q:"정상 조건하의 베이킹파우더 100g에서 얼마 이상의 유효이산화탄소 가스가 발생되어야 하는가?",o:["6%","12%","18%","24%"],a:1,e:"베이킹파우더는 100g당 12% 이상의 유효 이산화탄소 가스가 발생되어야 한다. 이것이 식품공전상의 기준이다.",r:95,c:"ingredients"},
{q:"콜레스테롤 흡수와 가장 관계 깊은 것은?",o:["타액","위액","담즙","장액"],a:2,e:"담즙(담즙산)은 지방을 유화시켜 소화·흡수를 돕는 역할을 하며, 콜레스테롤의 흡수와 가장 밀접한 관계가 있다.",r:90,c:"nutrition"},
{q:"다음 중 단당류가 아닌 것은?",o:["갈락토오즈","포도당","과당","맥아당"],a:3,e:"맥아당은 이당류 제빵",r:99,c:"ingredients"},
{q:"성인의 1일 단백질 섭취량이 체중 kg당 1.13g일 때 66kg의 성인이 섭취하는 단백질의 열량은?",o:["74.6kcal","298.3kcal","671.2kcal","264kcal"],a:1,e:"1.13×4단백질 ×66",r:99,c:"nutrition"},
{q:"지방의 주요 기능이 아닌 것은?",o:["비타민 A, D, E, K의 운반, 흡수작용","체온의 손실방지","티아민의 절약작용","정상적인 삼투압 조절에 관여"],a:3,e:"정상적인 삼투압 조절은 무기질(나트륨, 칼륨 등)의 기능이지 지방의 기능이 아니다. 지방은 지용성 비타민 운반, 체온 보호, 에너지 저장 등의 기능을 한다.",r:93,c:"nutrition"},
{q:"식품을 태웠을 때 재로 남는 성분은?",o:["유기질","무기질","단백질","비타민"],a:1,e:"식품을 태우면 유기물(탄수화물, 단백질, 지방, 비타민)은 연소되고 무기질(회분)만 재로 남는다.",r:82,c:"nutrition"},
{q:"식품의 부패를 판정할 때 화학적 판정 방법이 아닌 것은?",o:["TMA 측정","ATP 측정","LD50 측정","VBN 측정"],a:2,e:"LD50(반수치사량)은 독성시험 방법으로 부패 판정의 화학적 방법이 아니다. TMA(트리메틸아민), ATP, VBN(휘발성염기질소)은 부패 판정의 화학적 방법이다.",r:93,c:"hygiene"},
{q:"다음 중 제 1군 법정 전염병은?",o:["결핵","디프테리아","장티푸스","말라리아"],a:1,e:"디프테리아는 제1군 법정전염병에 해당한다. 결핵과 말라리아는 제3군, 장티푸스는 제2군에 해당한다(구 전염병예방법 기준).",r:93,v:0,c:"hygiene"},
{q:"과자류, 빵류를 제조할 때 가스를 발생시켜 연하고 맛이 좋고 소화되기 쉬운 상태로 만들 목적으로 사용하는 식품첨가물은?",o:["유화제","식품제조용제","피막제","팽창제"],a:3,e:"팽창제는 반죽 내에서 가스를 발생시켜 제품을 부풀게 하여 연하고 소화하기 쉽게 만드는 식품첨가물이다.",r:82,v:0,c:"ingredients"},
{q:"식품을 제조, 가공 또는 보존시 식품에 첨가, 혼합, 침윤 기다의 방법으로 사용되는 물질은?",o:["식품첨가물","식품","화학적 합성품","기구"],a:0,e:"식품첨가물은 식품의 제조, 가공, 보존 시 첨가, 혼합, 침윤 등의 방법으로 사용되는 물질로 식품위생법에 정의되어 있다.",r:93,c:"ingredients"},
{q:"살모넬라균으로 인한 식중독의 잠복기와 증상으로 옳은 것은?",o:["오염식품 섭취 10~24시간 후 발열이 나타나며 1주 이내 회복","오염식품 섭취 10~20시간 후 오한과 혈액이 섞인 설사","오염식품 섭취 10~30시간 후 점액성 대변을 배설","오염식품 섭취 8~20시간 후 복통이 있고 홀씨 A, F형의 독소에 의한 발병"],a:0,e:"살모넬라균 식중독은 오염식품 섭취 후 10~24시간의 잠복기를 거쳐 발열(38~40℃), 복통, 설사 등의 증상이 나타나며 보통 1주일 이내 회복된다.",r:93,c:"hygiene"},
{q:"포도상구균이 생산하는 독소는?",o:["솔라닌","테트로도톡신","엔테로톡신","뉴로톡신"],a:2,e:"솔라닌 - 감자 테트로도톡신 - 복어 엔테로톡신 - 포도상구균(열에 강해 100℃에서도 죽지 않음) 뉴로톡신 - 보툴리누스균(치사율이 가장 높음.",r:99,c:"hygiene"},
{q:"다음 중 병원체가 바이러스인 질병은?",o:["폴리오","결핵","디프테리아","성홍열"],a:0,e:"폴리오(소아마비)는 폴리오바이러스(Poliovirus, Picornavirus과)에 의한 바이러스성 질병이다. 결핵은 결핵균, 디프테리아는 코리네박테리움 디프테리아, 성홍열은 A군 연쇄상구균에 의한 세균성 질병이다.",r:60,c:"hygiene"},
{q:"쥐나 곤충류에 의해서 발생될 수 있는 식중독은?",o:["살모넬라 식중독","클로스트리디움 보톨리늄 식중독","포도상구균 식중독","장염비브리오 식중독"],a:0,e:"1. 살모넬라 식중독 (1) 감염 경로 : 쥐, 파리, 바퀴벌레 등 (2) 원인식품 : 육류, 우유, 난류, 어육 제품 (3) 잠복기 : 12~24시간 (4) 증상 : 발열, 구토, 복통, 설사 등 ",r:99,c:"hygiene"},
{q:"식자재의 교차오염을 예방하기 위한 보관방법으로 잘못된 것은?",o:["원재료와 완성품 구분하여 보관","바닥과 벽으로부터 일정거리를 띄워 보관","뚜껑이 있는 청결한 용기에 덮개를 덮어서 보관","식자재와 비식자재를 함께 식품창고에 보관"],a:3,e:"식자재와 비식자재(세제, 소독제 등)를 함께 식품창고에 보관하면 교차오염이 발생할 수 있어 반드시 분리 보관해야 한다.",r:93,c:"hygiene"},
{q:"클로스트리디움 보톨리늄 식중독과 관련 있는 것은?",o:["화농성 질환의 대표균","저온살균 처리로 예방","내열성 포자 형성","감염형 식중독"],a:2,e:"클로스트리디움 보툴리늄균은 내열성 포자를 형성하여 통조림 등 혐기적 환경에서 증식하며 신경독소를 생산한다.",r:85,c:"hygiene"}]},
{title:"2009년 4회",desc:undefined,questions:[{q:"불란서빵의 2차 발효실 습도로 가장 적합한 것은?",o:["65~70%","75~80%","80~85%","85~90%"],a:1,e:"불란서빵=바게트 하스브레드류(바게트,하드롤 등): 75~80% 일반적인 조건: 85~90% 식빵, 단과자: 85~90% 도넛류: 75%",r:99,c:"manufacturing"},
{q:"일반적으로 이스트 도넛의 가장 적당한 튀김온도는?",o:["100~115℃","150~165℃","180~195℃","230~245℃"],a:2,e:"이스트 도넛의 적정 튀김온도는 180~195℃이다. 케이크 도넛(180~190℃)과 비슷하지만, 이스트 도넛은 발효된 반죽이라 약간 높은 온도에서 튀긴다.",r:93,c:"manufacturing"},
{q:"다음 중 팬닝에 대한 설명으로 틀린 것은?",o:["반죽의 이음매가 틀의 바닥으로 놓이게 한다.","철판의 온도를 60℃로 맞춘다.","반죽은 적정 분할량을 넣는다.","비용적의 단위는 cm³/g 이다."],a:1,e:"팬닝시 철판의 온도는 32도 - 이론상.",r:99,c:"manufacturing"},
{q:"액체발효법 (액종법)에 대한 설명으로 옳은 것은?",o:["균일한 제품생산이 어렵다.","발효손실에 따른 생산손실을 줄일 수 있다.","공간확보와 설비비가 많이 든다.","한 번에 많은 양을 발효시킬 수 없다."],a:1,e:"액체발효법(액종법)은 발효손실에 따른 생산손실을 줄일 수 있으며, 균일한 제품생산이 가능하고 한 번에 많은 양을 발효시킬 수 있다.",r:93,c:"manufacturing"},
{q:"다음 중 반죽 발효에 영향을 주지 않는 재료는?",o:["쇼트닝","설탕","이스트","이스트푸드"],a:0,e:"쇼트닝은 반죽의 물성(연화, 보존성)에 영향을 주지만 발효 자체에는 직접 영향을 주지 않는다. 설탕, 이스트, 이스트푸드는 발효에 직접 영향을 미친다.",r:90,c:"ingredients"},
{q:"제빵시 성형(make-up)의 범위에 들어가지 않는 것은?",o:["둥글리기","분할","정형","2차 발효"],a:3,e:"제빵 성형 과정 : 분할-둥글리기-중간발효-정형-팬닝",r:99,c:"manufacturing"},
{q:"스펀지 도우법으로 반죽을 만들 대 스폰지 반죽온도로 적정한 것은?",o:["24℃","27℃","26℃","28℃"],a:0,e:"스펀지 도우법에서 스펀지 반죽의 적정 온도는 24℃이다. 본반죽(도우)의 목표 온도(27℃)보다 낮게 설정하여 발효를 서서히 진행시킨다.",r:92,v:0,c:"manufacturing"},
{q:"반죽의 신장성에 대한 저항을 측정하는 방법은?",o:["믹소그래프","익스텐소그래프","레오그래프","패리노그래프"],a:1,e:"익스텐소그래프(Extensograph)는 반죽의 신장성(extensibility)과 신장에 대한 저항(resistance)을 측정하는 기기이다.",r:93,c:"manufacturing"},
{q:"완제품 50g 짜리 식빵 100개를 만들려고 한다. 발효손실 2%, 굽기손실 12%, 총배합률 180%일 때 이 반죽의 분할 당시 반죽 무게는?",o:["4.68kg","5.68kg","6.68kg","7.68kg"],a:1,e:"완제품÷(1-굽기손실)=분할량 이란 공식에서 0.05kg×100÷(1-0.12)=5.68kg이다 제빵",r:99,c:"manufacturing"},
{q:"믹싱의 효과로 거리가 먼 것은?",o:["원료의 균일한 분산","반죽의 글루텐 형성","이물질 제거","반죽에 공기 혼입"],a:2,e:"이물질 제거는 믹싱이 아니라 체질이나 선별 공정의 역할이다. 믹싱의 효과는 원료의 균일한 분산, 글루텐 형성, 공기 혼입이다.",r:93,c:"manufacturing"},
{q:"제품을 생산하는데 생산 원가요소는?",o:["재료비, 노무비, 경비","재료비, 용역비, 감가상각비","판매비, 노동비, 월급","광열비, 월급, 생산비"],a:0,e:"생산 원가의 3요소는 재료비, 노무비, 경비이다. 판매비는 생산원가가 아니라 판매관리비에 해당한다.",r:85,c:"management"},
{q:"빵의 제품평가에서 브레이크와 슈레드 부족현상의 이유가 아닌 것은?",o:["발효시간이 짧거나 길었다.","오븐의 온도가 높았다.","2차 발효실의 습도가 낮았다.","오븐의 증기가 너무 많았다."],a:3,e:"오래된 밀가루 사용 효소제 많이 사용 단물사용 이스트푸드사용량부족 발효시간이 길거나 짧음 2차발효실온도 높거나 습도 낮거나 시간이 김",r:99,c:"manufacturing"},
{q:"빵의 노화를 지연시키는 경우가 아닌 것은?",o:["저장온도를 -18℃ 이하로 유지한다.","21~35℃에서 보관한다.","고율배합으로 한다.","냉장고에서 보관한다."],a:3,e:"운반,판매시 21~35도에서 보관 관리 한다",r:99,c:"manufacturing"},
{q:"냉동반죽 제품의 장점이 아닌 것은?",o:["계획생산이 가능하다.","인당 생산량이 증가한다.","이스트의 사용량이 감소된다.","반죽의 저장성이 향상된다."],a:2,e:"냉동반죽은 이스트 함량을 2배정도 늘려 사용한다.",r:99,c:"manufacturing"},
{q:"식빵의 포장에 가장 적합한 온도는?",o:["20 ~ 24℃","25 ~ 29℃","30 ~ 34℃","35 ~ 40℃"],a:3,e:"식빵의 포장에 가장 적합한 온도는 35~40℃이다. 이 온도 범위에서 포장하면 빵이 충분히 식어 수분 응결 없이 포장이 가능하며, 노화도 최소화된다.",r:93,c:"manufacturing"},
{q:"팽창제에 대한 설명 중 틀린 것은?",o:["가스를 발생시키는 물질이다.","반죽을 부풀게 한다.","제품에 부드러운 조직을 부여해 준다.","제품에 질긴 성질을 준다."],a:3,e:"팽창제는 제품에 질긴 성질이 아니라 부드러운 조직을 부여한다. 가스를 발생시켜 반죽을 부풀게 하고 연한 조직을 만든다.",r:90,c:"ingredients"},
{q:"일반적으로 유화 쇼트닝은 모노-디-글리세리드가 얼마나 함유된 것이 좋은가?",o:["1~3%","4~5%","6~9%","9~11%"],a:2,e:"유화 쇼트닝에는 모노-디-글리세리드가 6~9% 함유된 것이 적합하다. 이 범위에서 유화 안정성과 제품 품질이 최적화된다.",r:98,c:"ingredients"},
{q:"글루텐을 형성하는 단백질은?",o:["알부민, 글리아딘","알부민, 글로불린","글로테닌, 글리아딘","글루테닌, 글로불린"],a:2,e:"글루텐을 형성하는 단백질은 글루테닌과 글리아딘이다.\n• 글루테닌: 탄력성, 글리아딘: 점성·신장성 부여\n• 알부민, 글로불린은 수용성 단백질로 글루텐 형성에 관여하지 않는다.",r:93,c:"ingredients"},
{q:"밀가루와 밀의 현탁액을 일정한 온도로 균일하게 상승시킬 때 일어나는 정도의 변화를 계속적으로 자동 기록하는 장치는?",o:["아밀로그래프(Amylograph)","모세관 점도계(Capillary viscometer)","피서 점도계(Fisher viscometer)","브룩필드 점도계(Brookfield viscometer)"],a:0,e:"아밀로그래프(Amylograph)는 밀가루 현탁액의 온도를 균일하게 상승시키면서 점도 변화를 자동 기록하는 장치이다. 전분의 호화 특성과 효소 활성을 평가한다.",r:93,v:0,c:"ingredients"},
{q:"유당에 대한 설명으로 틀린 것은?",o:["우유에 함유된 당으로 입상형, 분말형, 미분말형 등이 있다.","감미도는 설탕 100에 대하여 16정도이다.","환원당으로 아미노산의 존재시 갈변반응을 일으킨다.","포도당이나 자당에 비하여 용해도가 높고 결정화가 느리다."],a:3,e:"포도당 및 설탕 등에 비해 용해도가 낮으며 결정화가 빠르다",r:99,c:"ingredients"},
{q:"다음의 당류 중에서 상대적 감미도가 두 번째로 큰 것은?",o:["과당","설탕","포도당","맥아당"],a:1,e:"감미도 순서 과>전>서>포>맥>갈>유 보기에 전화당이 없으므로, 서당(설탕,자당)이 정답",r:99,c:"ingredients"},
{q:"초콜릿의 코코아와 코코아버터 함량으로 옳은 것은?",o:["코코아 3/8, 코코아버터 5/8","코코아 2/8, 코코아버터 6/8","코코아 5/8, 코코아버터 3/8","코코아 4/8, 코코아버터 4/8"],a:2,e:"카카오 매스에서 코코아버터를 압착하면 코코아가 약 5/8, 코코아버터가 약 3/8의 비율로 분리된다. 코코아(코코아 파우더)가 더 높은 비율을 차지한다.",r:93,c:"ingredients"},
{q:"계란 흰자의 약 13%를 차지하며 철과의 결합 능력이 강해서 미생물이 이용하지 못하는 항세균 물질은?",o:["오브알부민(ovalbumin)","콘알부민(conalbumin)","오보뮤코이드(ovomucoid)","아비딘(avidin)"],a:1,e:"껍질-탄산칼슘 노른자-레시틴(인지질) 흰자-콘알부민",r:99,c:"hygiene"},
{q:"이스트에 대한 설명 중 옳지 않은 것은?",o:["제빵용 이스트는 온도 20~25℃에서 발효력이 최대가 된다.","주로 출아법에 의해 증식한다.","생이스트의 수분 함유율은 70~75%이다.","엽록소가 없는 단세포 생물이다."],a:0,e:"발육의 최적온도는 28~32°C",r:99,c:"ingredients"},
{q:"감미만을 고려할 때 설탕 100g을 포도당으로 대치한다면 약 얼마를 사용하는 것이 좋은가?",o:["75g","100g","130g","170g"],a:2,e:"포도당은 설탕에 비해 감미도가 75이기 때문에 100/75 = 1.33 배가 더 필요하다. 그러므로 133g을 사용해야 한다.",r:99,c:"ingredients"},
{q:"빵 제조시 설탕의 사용효과와 거리가 가장 먼 것은?",o:["효모의 영양원","빵의 노화지연","글루텐 강화","빵의 색택 부여"],a:2,e:"글루텐강화-소금",r:99,c:"ingredients"},
{q:"제빵에 적합한 물의 경도는?",o:["0~60ppm","60~120ppm","120~180ppm","180ppm이상"],a:2,e:"제빵에 적합한 물은 아경수(120~180ppm) 경수-180ppm이상 아연수-120~60ppm 연수-60ppm미만",r:99,c:"ingredients"},
{q:"전분의 종류에 다른 중요한 물리적 성질과 가장 거리가 먼 것은?",o:["냄새","호화온도","팽윤","반죽의 정도"],a:0,e:"냄새는 전분의 종류에 따른 중요한 물리적 성질이 아니다. 호화온도, 팽윤, 반죽의 정도(점도)가 전분의 중요한 물리적 성질이다.",r:90,c:"ingredients"},
{q:"생크림 보존 온도로 가장 적합한 것은?",o:["-18℃ 이하","-5 ~ -1℃이하","0 ~ 10℃","15 ~ 18℃"],a:2,e:"생크림 보존 온도는 냉장온도인 5℃ 전후가 좋다.",r:99,c:"hygiene"},
{q:"우유 중에 함유되어 있는 유당의 평균 함량은?",o:["0.8%","4.8%","10.8%","15.8%"],a:1,e:"우유에 함유된 유당의 평균 함량은 약 4.8%이다. 우유의 주요 성분: 수분 87%, 유당 4.8%, 지방 3.5%, 단백질 3.2%, 무기질 0.7%",r:93,c:"ingredients"},
{q:"다당류에 속하지 않는 것은?",o:["섬유소","전분","글리코겐","맥아당"],a:3,e:"맥아당은 이당류임",r:99,c:"ingredients"},
{q:"생리기능의 조절작용을 하는 영양소는?",o:["탄수화물, 지방질","탄수화물, 단백질","지방질, 단백질","무기질, 비타민"],a:3,e:"무기질과 비타민은 체내 생리기능의 조절작용을 하는 조절 영양소이다. 탄수화물과 지방은 에너지 공급, 단백질은 구성과 에너지 공급 역할을 한다.",r:93,c:"nutrition"},
{q:"다음 중 단일불포화지방산은?",o:["올레산","팔미트산","리놀렌산","아라키돈산"],a:0,e:"올레산(oleic acid)은 이중결합이 1개인 단일불포화지방산이다. 팔미트산은 포화지방산, 리놀렌산과 아라키돈산은 다가불포화지방산이다.",r:90,c:"nutrition"},
{q:"하루 2400kcal를 섭취하는 사람의 이상적인 탄수화물의 섭취량은 약 얼마인가?",o:["140 ~ 150g","200 ~ 230g","260 ~ 320g","330 ~ 420g"],a:3,e:"이상적인 탄수화물의 섭치량은 70%, 2400kcal * 0.7 = 1680kcal이며, 탄수화물 1g당 칼로리는 4kcal이므로 1680/4 = 420g임.",r:99,c:"nutrition"},
{q:"다음 중 단백질의 소화효소가 아닌 것은?",o:["리파아제(lipase)","카이모트립신(chymotrypsin)","아미노펩티다아제(amino peptidase)","펩신(pepsin)"],a:0,e:"리파아제는 지방의소화효소",r:99,c:"nutrition"},
{q:"식품첨가물 사용시 유의할 사항 중 잘못된 것은?",o:["사용 대상 식품의 종류를 잘 파악한다.","첨가물의 종류에 따라 사용량을 지킨다.","첨가물의 종류에 따라 사용 조건은 제한하지 않는다.","보존방법이 명시된 것은 보존기준을 지킨다."],a:2,e:"첨가물의 종류에 따라 사용 조건(온도, pH, 대상 식품 등)도 제한한다. '사용 조건은 제한하지 않는다'는 틀린 설명이다.",r:93,c:"ingredients"},
{q:"살균이 불충분한 육류 통조림으로 인해 식중독이 발생했을 경우, 가장 관련이 깊은 식중독균은?",o:["살모넬라균","시겔라균","황색 포도상구균","보툴리누스균"],a:3,e:"보툴리누스균의 원인은 통조림, 소시지 등 혐기상태 시 발육하며 신경마비, 시력장애 등이 발생한다.",r:99,c:"hygiene"},
{q:"인수공통전염병에 대한 설명으로 틀린 것은?",o:["인간과 척추동물 사이에 전파되는 질병이다.","인간과 척추동물이 같은 병원체에 의하여 발생되는 전염병이다.","바이러스성 질병으로 발진열, Q열 등이 있다.","세균성 질병으로 탄저, 브루셀라증, 살모넬라증 등이 있다."],a:2,e:"발진열과 Q열은 바이러스가 아니라 리케차(Rickettsia)에 의한 질병이다. 따라서 이를 바이러스성 질병으로 분류한 보기 ③의 설명은 틀렸다.",r:75,c:"hygiene"},
{q:"인수공통전염병으로만 짝지어진 것은?",o:["폴리오, 장티푸스","탄저, 리스테리아증","결핵, 유행성 간염","홍역, 브루셀라증"],a:1,e:"인수공통감염병에는 탄저병, 파상열(브루셀라증), 결핵, 야토병, 돈닥독, Q열, 리스테리아증 제빵",r:99,c:"hygiene"},
{q:"다음 중 부패세균이 아닌 것은?",o:["어위니아균(Erwinia)","슈도모나스균(Pseudomonas)","고초균(Bacillus subtilis)","티포이드균(Sallmonella typhi)"],a:3,e:"티포이드균(Salmonella typhi)은 장티푸스를 일으키는 병원균으로, 식품을 부패시키는 부패세균이 아니라 병원성 세균이다.",r:93,c:"hygiene"},
{q:"사람과 동물이 같은 병원체에 의하여 발생되는 전염병과 거리가 먼 것은?",o:["탄저병","결핵","동양모양선충","브루셀라증"],a:2,e:"동양모양선충의 매개체는 물과 채소이다.",r:99,c:"hygiene"},
{q:"부패에 영향을 미치는 요인에 대한 설명으로 맞는 것은?",o:["중온균의 발육적온은 46 ~ 60℃","효모의 생육최적 ph는 10이상","결합수의 함량이 많을수록 부패가 촉진","식품성분의 조직상태 및 식품의 저장환경"],a:3,e:"부패에 영향을 미치는 요인은 식품성분의 조직상태 및 식품의 저장환경이다. 중온균 발육적온은 25~40℃이고, 효모 최적 pH는 4~5이다.",r:93,c:"hygiene"},
{q:"빵을 제조하는 과정에서 반죽 후 분할기로부터 분할할 때나 구울 때 달라붙지 않게 할 목적으로 허용되어 있는 첨가물은?",o:["글리세린","프로필렌 글리콜","초산 비닐수지","유동 파라핀"],a:3,e:"파라핀(유동 파라핀)은 식품첨가물로 허용된 이형제로, 빵 반죽이 분할기나 팬에 달라붙지 않도록 하는 목적으로 사용이 허용되어 있다.",r:93,c:"manufacturing"},
{q:"복어의 독소 성분은?",o:["엔테로톡신(enterotoxin)","테트로도톡신(tetrodotoxin)","무스카린(muscarine)","솔라닌(solanine)"],a:1,e:"복어 : 테트로도톡신 조개 : 베네루핀 독버섯 : 무스카린 감자 : 솔라닌 면실유 : 고시폴 섭조개 : 삭시톡신",r:99,c:"hygiene"},
{q:"다음 중 독소형 세균성 식중독의 원인균은?",o:["황색 포도상구균","살모넬라균","장염비브리오균","대장균"],a:0,e:"세균성감염형식중독-살모넬라, 장염비브리오, 병원성대장균 세균성독소형식중독-보툴리누스, 포도상구균",r:99,c:"hygiene"},
{q:"쿠키에 사용하는 재료로서 퍼짐에 중요한 영향을 주는 당류는?",o:["분당","설탕","포도당","물엿"],a:1,e:"쿠키 퍼짐에 가장 큰 영향을 주는 당류는 설탕이다. 입자가 굵은 설탕은 오븐에서 천천히 녹으면서 퍼짐을 유발한다.",r:90,c:"ingredients"},
{q:"아이싱에 사용하여 수분을 흡수하므로, 아이싱이 젖거나 묻어나는 것을 방지하는 흡수제로 적당하지 않은 것은?",o:["밀 전분","옥수수전분","설탕","타피오카 전분"],a:2,e:"설탕은 오히려 흡습성이 있어 수분을 끌어당기므로 아이싱의 흡수제로 적당하지 않다. 밀 전분, 옥수수전분, 타피오카 전분은 수분 흡수제로 사용된다.",r:90,c:"ingredients"},
{q:"케이크 굽기시의 캐러멜화 반응은 어느 성분의 변화로 일어나는가?",o:["당류","단백질","지방","비타민"],a:0,e:"캐러멜화 반응은 당류가 고온(약 170℃ 이상)에서 가열될 때 갈변하는 반응이다. 단백질이 관여하는 것은 마이야르 반응이다.",r:90,c:"nutrition"},
{q:"케이크 제조시 제품의 부피가 크게 팽창했다가 가라앉는 원인이 아는 것은?",o:["물 사용량의 증가","밀가루 사용의 부족","분유 사용량의 증가","베이킹 파우더 증가"],a:2,e:"밀가루 사용이 부족하면 반죽 구조가 약해져 팽창했다가 가라앉는 원인이 될 수 있으나, 이 문제에서는 '밀가루 사용의 부족'이 가라앉는 원인이 아닌 것으로 출제되었다. 물 과다, 분유 증가, 베이킹파우더 증가가 과도한 팽창 후 주저앉는 주된 원인이다.",r:93,c:"ingredients"},
{q:"생산공장시설의 효율적 배치에 대한 설명 중 적합하지 않은 것은?",o:["작업용 바닥면적은 그 장소를 이용하는 사람들의 수에 따라 달라진다.","판매장소와 공장의 면적배분(판매 3 : 공장 1)의 비율로 구성되는 것이 바람직하다.","공장의 소요면적은 주방설비의 설치면적과 기술자의 작업을 위한 공간면적으로 이루어진다.","공장의 모든 업무가 효과적으로 진행되기 위한 기본은 주방의 위치와 규모에 대한 설계이다."],a:1,e:"판매장소와 공장의 면적배분은 2:1이 이상적이다. 제빵",r:99,c:"manufacturing"},
{q:"파운드 케이크 제조시 이중팬을 사용하는 목적이 아닌 것은?",o:["제품 바닥의 두꺼운 껍질형성을 방지하기 위하여","제품 옆면의 두꺼운 껍질형성을 방지하기 위하여","제품의 조직과 맛을 좋게 하기 위하여","오븐에서의 열전도 효율을 높이기 위하여"],a:3,e:"이중팬은 열전도를 완화하여 천천히 구워지게 하는 목적이므로 열전도 효율을 높이는 것이 아니다. 바닥과 옆면의 두꺼운 껍질 형성을 방지하고 조직과 맛을 좋게 한다.",r:92,c:"manufacturing"},
{q:"판 젤라틴을 전처리하기 위한 물의 온도로 알맞은 것은?",o:["10 ~ 20℃","30 ~ 10℃","60 ~ 70℃","80 ~ 90℃"],a:0,e:"판 젤라틴은 10~20℃의 찬물에 담가 불려서 전처리한다. 뜨거운 물에 넣으면 녹아버려 사용이 어렵다.",r:85,c:"ingredients"},
{q:"아이싱이나 토핑에 사용하는 재료의 설명으로 틀린 것은?",o:["중성쇼트닝은 첨가하는 재료에 따라 향과 맛을 살릴 수 있다.","분당은 아이싱 제조시 끓이지 않고 사용할 수 있는 장점이 있다.","생우유는 우유의 향을 살릴 수 있어 바람직하다.","안정제는 수분을 흡수하여 끈적거림을 방지한다."],a:2,e:"생우유는 수분이 많아 아이싱이 질어지고, 세균 번식의 위험이 있어 아이싱 재료로 바람직하지 않다. 탈지분유나 연유 등 가공 유제품을 사용하는 것이 좋다.",r:90,c:"ingredients"},
{q:"퍼프 페이스트리 반죽의 휴지 효과에 대한 설명으로 틀린 것은?",o:["글루텐을 재 정돈 시킨다.","밀어 펴기가 용이해 진다.","CO₂가스를 최대한 발생시킨다.","절단 시 수축을 방지한다."],a:2,e:"퍼프 페이스트리 반죽의 휴지는 글루텐 재정돈, 밀어펴기 용이, 수축 방지 효과가 있다. CO₂ 가스 발생은 이스트 발효 제품의 특성이며, 퍼프 페이스트리는 화학적 팽창을 하지 않는다.",r:85,c:"manufacturing"},
{q:"다음 제품의 반죽 중에서 비중이 가장 낮은 것은?",o:["레이어 케이크","파운드 케이크","데블스 푸드 케이크","스펀지 케이크"],a:3,e:"비중과 부피는 다름니다 문제가 팬용적을 물어본거라면 답은 스펀지케이크가 맞지만 이문제는 비중을 물어본거기때문에 파운드케이크의 비중은0.75 스펀지케이크는 0.55 레이어케이크는 0.85 비중이 가장낮은거는 스펀지케이크가 맞습니다.",r:99,c:"manufacturing"},
{q:"밀가루와 유지를 믹싱한 후 다른 건조재료와 액체재료 일부를 투입하여 믹싱하는 것으로, 유연감을 우선으로 하는 제품에 많이 사용하는 믹싱법은?",o:["크림법","블렌딩법","설탕/물법","1단계법"],a:1,e:"블렌딩법 : 유지에 밀가루를 피복한 후 체에 친 건조재료에 액체재료를 섞어 반죽하는 방법. 크림법 : 유지에 설탕을 넣어 크림화 하여 달걀을 조금씩 첨가하면서 믹싱 후 가루 재료를 섞음. 가장 많이 사용하는 방법 설탕/물법 : 설탕 2 : 물 1 의 시럽 사용, 계량이 편리하고, 대량생산에 적합. 1단계법 : 모든 재료를 한꺼번에 넣고 반죽하는 방법, 시간 절약, 노동 절약",r:99,c:"manufacturing"},
{q:"파이나 퍼프 페이스트리는 무엇에 의하여 팽창되는가?",o:["화학적인 팽창","중조에 의한 팽창","유지에 의한 팽창","이스트에 의한 팽창"],a:2,e:"파이나 퍼프 페이스트리는 유지의 물리적 성질을 이용하여 팽창시키는 제품이다",r:99,c:"ingredients"},
{q:"파이 반죽을 냉장고에 넣어 휴지시키는 이유가 아닌 것은?",o:["밀가루의 수분흡수를 함","유지를 적당하게 굳힘","퍼짐을 좋게 함","끈적거림을 방지함"],a:2,e:"냉장 휴지는 퍼짐을 좋게 하는 것이 아니라 반죽을 단단하게 하여 작업성을 좋게 한다. 수분 흡수, 유지 경화, 끈적거림 방지가 냉장 휴지의 목적이다.",r:93,c:"ingredients"},
{q:"설탕공예용 당액 제조시 설탕의 재결정을 막기 위해 첨가하는 재료는?",o:["중조","주석산","포도당","베이킹 파우더"],a:1,e:"주석산(또는 구연산)은 산성 물질로 설탕의 일부를 전화당으로 변환시켜 재결정을 방지한다.",r:82,c:"ingredients"},
{q:"화이트 레이어 케이크에서 설탕 130%, 유화쇼트닝 60%를 사용한 경우 흰자 사용량은?",o:["약 60%","약 66%","약 78%","약 86%"],a:3,e:"흰자: 쇼트닝×1.43",r:99,c:"ingredients"}]},
{title:"2009년 5회",desc:undefined,questions:[{q:"파운드케이크를 패닝할 때 밑면의 껍질 형성을 방지하기 위한 팬으로 가장 적합한 것은?",o:["일반팬","이중팬","은박팬","종이팬"],a:1,e:"이중팬은 팬 사이의 공기층이 단열 역할을 하여 밑면의 과도한 열전달을 방지한다. 밑면 껍질 형성 방지에 가장 효과적인 방법이다.",r:90,c:"manufacturing"},
{q:"반죽형 케이크의 특성에 해당되지 않는 것은?",o:["일반적으로 밀가루가 계란보다 많이 사용 된다.","많은 양의 유지를 사용한다.","화학 팽창제에 의해 부피를 형성한다.","해면같은 조직으로 입에서의 감촉이 좋다."],a:3,e:"해면 같은 조직(스펀지 구조)은 거품형 케이크의 특성이다. 반죽형 케이크는 유지가 많고 촘촘한 조직을 가지며 화학팽창제를 사용한다.",r:85,c:"ingredients"},
{q:"반죽형 쿠키의 굽기 과정에서 퍼짐성이 나쁠 때 퍼짐성을 좋게 하기 위해서 사용할 수 있는 방법은?",o:["입자가 굵은 설탕을 많이 사용한다.","반죽을 오래한다.","오븐의 온도를 높인다.","설탕의 양을 줄인다."],a:0,e:"입자가 굵은 설탕:퍼짐성 증가 입자가 고은 설탕: 퍼짐성 감소",r:99,c:"manufacturing"},
{q:"파이를 만들 때 충전물이 흘러 나왔을 경우 그 원인이 아닌 것은?",o:["충전물양이 너무 많다.","충전물에 설탕이 부족하다.","껍질에 구멍을 뚫어 놓지 않았다.","오븐 온도가 낮다."],a:1,e:"설탕은 반죽에 흐름성을 부여함으로 너무 많이 넣으면 충전물이 흘러 넘친다.",r:99,c:"manufacturing"},
{q:"먼저 밀가루와 유지를 넣고 믹싱하여 유지에 의해 밀가루가 피복되도록 한 후 나머지 재료를 투입하는 방법으로 유연감을 우선으로 하는 제품에 사용되는 반죽법은?",o:["1단계법","별립법","블렌딩법","크림법"],a:2,e:"1.1단계법 - 모든재료를 한꺼번에 넣고 믹싱하는 방법 (단단계법이라고도 함) 2.별립법 - 흰자와 노른자를 분리하여 설탕을 각각 넣어 거품을 내는 방법 4.크림법 - 유지+설탕 다음 계란 다음 밀가루 및 건조재료를 넣고 혼합하는 방법",r:99,c:"manufacturing"},
{q:"좋은 튀김기름의 조건이 아닌 것은?",o:["천연의 항산화제가 있다.","발연점이 높다.","수분이 10% 정도이다.","저장성과 안정성이 높다."],a:2,e:"수분이 없어야 한다.",r:99,c:"ingredients"},
{q:"파이를 냉장고에 휴지시키는 이유와 가장 거리가 먼 것은?",o:["전 재료의 수화 기회를 준다.","유지와 반죽의 굳은 정도를 같게 한다.","반죽을 경화 및 긴장시킨다.","끈적거림을 방지하여 작업성을 좋게 한다."],a:2,e:"냉장 휴지는 반죽을 경화·긴장시키는 것이 주목적이 아니라, 글루텐을 이완시켜 작업성을 좋게 하고 유지와 반죽의 온도를 균일하게 맞추는 것이 목적이다. 경화 및 긴장은 냉장 휴지의 효과와 가장 거리가 멀다.",r:93,c:"ingredients"},
{q:"반죽의 비중과 관련이 없는 것은?",o:["완제품의 조직","기공의 크기","완제품의 부피","팬 용적"],a:3,e:"팬용적은 비용적과 관련이 있다.",r:99,c:"manufacturing"},
{q:"제빵 공장에서 5인이 8시간 동안 옥수수식빵 500개, 바게트빵 550개를 만들었다. 개당 제품의 노무비는 얼마인가? (단, 시간당 노무비는 4000원이다.)",o:["132원","142원","152원","162원"],a:2,e:"사람 수 * 시간 * 시간당 노무비 / 제품의 수 5*8*4000/1050= 152원",r:99,c:"manufacturing"},
{q:"반죽온도가 정상보다 낮을 때 나타나는 제품의 결과로 틀린 것은?",o:["부피가 작다.","큰 기포가 형성된다.","기공이 조밀하다.","오븐에 굽는 시간이 약간 길다."],a:1,e:"반죽온도가 낮으면 발효가 느려 가스 발생이 적고 부피가 작으며 기공이 조밀하다. 큰 기포가 형성되는 것은 오히려 과발효나 높은 반죽 온도의 결과이다.",r:93,c:"manufacturing"},
{q:"컵에 반죽을 담았을 때 90g, 물을 담았을 때 110g 이었다. 이 때 컵 무게가 40g 이었다면 반죽의 비중은?",o:["0.6","0.7","0.8","0.9"],a:1,e:"비중 = 반죽무게/물무게 = (90-40)/(110-40) *컵의 무게를 빼야만 정상적인 비중을 계산할 수 있습니다. = 0.714",r:99,c:"manufacturing"},
{q:"카스타드 푸딩을 컵에 채워 몇 도의 오븐에서 중탕으로 굽는 것이 가장 적당한가?",o:["160~170℃","190~200℃","210~220℃","230~240℃"],a:0,e:"카스타드 푸딩은 160~170℃의 오븐에서 중탕으로 굽는 것이 적당하다. 너무 높은 온도에서는 기포가 생기고 조직이 거칠어진다.",r:93,c:"manufacturing"},
{q:"제과용 포장재로 적합하지 않은 것은?",o:["P.E(Polt ethylene)","O.P.P(Oriented Poly propylene)","P.P(Polt propylene)","흰색의 형광 종이"],a:3,e:"흰색의 형광 종이는 형광물질이 식품에 이행될 수 있어 제과용 포장재로 적합하지 않다. PE, OPP, PP는 식품용 포장재로 널리 사용된다.",r:93,c:"manufacturing"},
{q:"단순 아이싱(flat icing)을 만드는 데 들어가는 재료가 아닌 것은?",o:["분당","계란","물","물엿"],a:1,e:"아이싱 - 설탕이 주요 재료인 피복물, 빵과자 제품을 덮거나 피복하는 것을 말합니다. 단순 아이싱은 분당, 물, 물엿과 향으로 만듭니다. 계란이 들어가는 아이싱은 크림형태의 아이싱(마시멜로우 아이싱)을 말합니다.",r:99,c:"ingredients"},
{q:"아이싱에 이용되는 퐁당(fondant)은 설탕의 어떤 성질을 이용하는가?",o:["보습성","재결정성","용해성","전화당으로 변하는 성질"],a:1,e:"퐁당은 설탕의 재결정성을 이용하여 만든다. 설탕 시럽을 끓인 후 냉각하면서 교반하면 미세한 결정이 형성되어 부드러운 질감이 된다.",r:93,c:"ingredients"},
{q:"빵 제품의 모서리가 예리하게 된 것은 다음 중 어떤 반죽에서 오는 결과인가?",o:["발효가 지나친 반죽","과다하게 이형유를 사용한 반죽","어린 반죽","2차 발효가 지나친 반죽"],a:2,e:"빵 제품의 모서리가 예리한 것은 어린 반죽(발효 부족)의 특징이다.\n• 발효가 부족하면 가스 보유가 적어 오븐에서 팽창이 과도하게 일어나 모서리가 날카로워진다.",r:90,c:"manufacturing"},
{q:"지나친 반죽(과발효)가 제품에 미치는 영향을 잘못 설명한 것은?",o:["부피가 크다.","향이 강하다.","껍질이 두껍다.","팬 흐름이 적다."],a:3,e:"과발효된 반죽은 글루텐이 약해져 팬 흐름이 오히려 많다(적지 않다). 부피가 처음에 크다가 주저앉고, 신 향이 강하며, 껍질이 두껍다.",r:93,c:"manufacturing"},
{q:"식빵의 가장 일반적인 포장 적온은?",o:["15℃","25℃","35℃","45℃"],a:2,e:"포장온도 35~40도 높은 온도에서의 포장 시 1)썰기가 어려워 형태가 변하기 쉽다. 2)포장지에서 수분과다로 곰팡이가 발생하고 형태를 유지하기가 어렵다. 낮은 온도에서의 포장 시 1)노화가 가속된다. 2)껍질이 건조된다.",r:99,c:"manufacturing"},
{q:"제빵용 밀가루의 적정 손상 전분의 함량은?",o:["1.5~3%","4.5~8%","11.5~14%","15.5~17%"],a:1,e:"제빵용 밀가루의 적정 손상전분 함량은 4.5~8%이다. 이 범위에서 손상전분이 효소에 의해 분해되어 이스트의 영양원이 되고, 흡수율을 높여 반죽 특성과 빵 품질을 최적화한다.",r:93,c:"ingredients"},
{q:"빵을 오븐에 넣으면 빵속의 온도가 높아지면서 부피가 증가한다. 이때 일어나는 현상이 아닌 것은?",o:["가스압이 증가한다.","이산화탄소 가스의 용해도가 증가한다.","이스트의 효소활성이 60℃까지 계속된다.","79℃부터 알콜이 증발하여 특유의 향이 발생한다."],a:1,e:"이산화탄소 가스의 용해도는 온도가 높아지면 감소한다(증가하지 않는다). 온도 상승으로 CO₂ 용해도가 낮아져 가스가 방출되면서 오븐 팽창이 일어난다.",r:93,c:"manufacturing"},
{q:"발효의 목적이 아닌 것은?",o:["반죽을 숙성시킨다.","글루텐을 강화시킨다.","풍미성분을 생성시킨다.","팽창작용을 한다."],a:1,e:"- 반죽의 팽창작용 : 이스트가 활동할 수 있는 최적의 조건을 만들어 주어 가스 발생력을 극대화시킨다. 그리고 반죽의 신장성을 향상시켜 가스 보유력을 증대시킨다. - 반죽의 숙성작용 : 이스트의 효소가 작용하여 반죽을 유연하게 만든다. - 소화흡수율의 향상 - 빵의 풍미생성 : 발효에 의해 생성된 알코올류, 유기산류, 에스테르류, 알데히드류, 케톤류 등을 축적하여 독특한 맛과 향을 부여한다.",r:99,c:"manufacturing"},
{q:"내부에 팬이 부착되어 열풍을 강제 순환시키면서 굽는 타입으로 굽기의 편차가 극히 적은 오븐은?",o:["터널오븐","컨벡션오븐","밴드오븐","래크오븐"],a:1,e:"컨벡션오븐은 내부 팬이 열풍을 강제 순환시켜 균일하게 구워지며 굽기 편차가 적다.",r:85,c:"manufacturing"},
{q:"정형한 식빵 반죽을 팬에 넣을 때 이음매의 위치는 어느 쪽이 가장 좋은가?",o:["위","아래","좌측","우측"],a:1,e:"이음매를 아래로 놓아야 발효와 굽기 중에 이음매가 벌어지지 않고 매끄러운 윗면을 형성할 수 있다.",r:82,c:"manufacturing"},
{q:"식빵 반죽을 분할할 때 처음에 분할한 반죽과 나중에 분할한 반죽은 숙성도의 차이가 크므로 단시간 내에 분할해야 한다. 몇 분 이내로 완료하는 것이 가장 좋은가?",o:["2~7분","8~13분","15~20분","25~30분"],a:2,e:"식빵 반죽의 분할은 15~20분 이내에 완료하는 것이 가장 좋다. 이 시간을 초과하면 먼저 분할한 반죽과 나중에 분할한 반죽의 발효 차이가 커져 제품의 균일성이 저하된다.",r:93,c:"manufacturing"},
{q:"2차 발효시 상대습도가 부족할 때 일어나는 현상은?",o:["질긴 껍질","흰 반점","터짐","단단한 표피"],a:2,e:"2차 발효 시 상대습도가 부족하면 반죽 표면이 마르고 굳어져 오븐에서 팽창할 때 껍질이 터지는 현상이 발생한다.",r:90,c:"manufacturing"},
{q:"일반적인 스펀지 도우법으로 식빵을 만들 때 도우의 가장 적당한 온도는?",o:["17℃","27℃","37℃","47℃"],a:1,e:"스펀지 도우법에서 도우(본반죽)의 적정 온도는 27℃이다. 스펀지보다 약간 높은 온도에서 반죽한다.",r:82,c:"manufacturing"},
{q:"건포도 식빵, 옥수수식빵, 야채식빵을 만들 때 건포도, 옥수수, 야채는 믹싱의 어느 단계에 넣는 것이 좋은가?",o:["최종 단계 후","클린업 단계 후","발전 단계 후","렛 다운 단계 후"],a:0,e:"건포도, 옥수수, 야채 등 부재료는 글루텐이 완전히 발전된 최종 단계 후에 넣는다. 최종 단계에서 넣어야 반죽 구조가 손상되지 않는다.",r:90,c:"manufacturing"},
{q:"밀가루 온도 25℃, 실내온도 24℃, 수돗물 온도 20℃, 결과온도 30℃, 희망온도27℃, 마찰계수 24일 때 사용할 물 온도는?",o:["2℃","6℃","8℃","17℃"],a:2,e:"(희망온도*3)-(실내온도+밀가루온도+마찰계수) !수돗물온도,결과온도는 필요없음.무시하셔도 됨! (27*3)-(24+25+24)=8 *=곱하기",r:99,c:"manufacturing"},
{q:"노무비를 절감하는 방법으로 바람직하지 않은 것은?",o:["표준화","단순화","설비 휴무","공정시간 단축"],a:2,e:"노무비 절감은 표준화, 단순화, 공정시간 단축으로 이루어진다. 설비 휴무는 생산을 중단하는 것으로 노무비 절감과 무관하거나 오히려 비효율적이다.",r:90,c:"management"},
{q:"냉동반죽에 사용되는 재료와 제품의 특성에 대한 설명 중 틀린 것은?",o:["일반 제품보다 산화제 사용량을 증가시킨다.","저율배합인 프랑스빵이 가장 유리하다.","유화제를 사용하는 것이 좋다.","밀가루는 단백질 양과 질이 좋은 것을 사용한다."],a:1,e:"냉동반죽 초기에는 저율배합 제품인 프랑스빵에 국한되었지만, 고율배합 제품인 단과자빵 등 제품에 사용하는 것이 더 적합",r:99,c:"ingredients"},
{q:"패리노그래프와 관계가 적은 것은?",o:["흡수율 측정","믹싱시간 측정","믹싱 내구성 측정","호화특성 측정"],a:3,e:"4.호화특성-아밀로그래프",r:99,c:"ingredients"},
{q:"다음 중 점도계가 아닌 것은?",o:["비스코아밀로그래프(Viscoamylograph)","익스텐소그래프(Extensograph)","맥미카엘(MacMichael) 점도계","브룩필드(Brookfield) 점도계"],a:1,e:"익스텐소그래프(Extensograph)는 반죽의 신장성과 저항을 측정하는 기기로 점도계가 아니다.",r:85,c:"ingredients"},
{q:"단백질 분해 효소는?",o:["찌마아제","말타아제","프로테아제","인버타아제"],a:2,e:"산화효소:찌마아제 이당류 분해효소:말타아제,인버타아제,락타아제 단백질분해효소:프로테아제,펩신,레닌,트립신,에렙신,펩티다아제",r:99,c:"nutrition"},
{q:"이스트푸드의 구성성분 중 칼슘염의 주요 기능은?",o:["이스트 성장에 필요하다.","반죽에 탄성을 준다.","오븐 팽창이 커진다.","물 조절제 역할을 한다."],a:3,e:"이스트푸드의 칼슘염은 물 조절제(water conditioner) 역할을 하여 반죽에 사용하는 물의 경도를 조절한다. 적정 경도의 물은 이스트 활성과 글루텐 형성에 최적 환경을 제공한다.",r:93,c:"nutrition"},
{q:"우유 단백질의 응고에 관여하지 않는 것은?",o:["산","레닌","가열","리파아제"],a:3,e:"가수 분해에의한 변패:리파아제 지방의 구성물질인 트리글리세라이드가 물과 접촉하여 일어나는 화학적 가수 분해와 지방 분해효소인 리파이제에 의한 분해",r:99,c:"ingredients"},
{q:"커스터드 크림에서 계란의 주요 역할은?",o:["영양가","결합제","팽창제","저장성"],a:1,e:"커스터드 크림에서 계란은 결합제(응고제) 역할을 한다. 가열 시 계란 단백질이 응고되면서 크림에 농도와 형태를 부여한다.",r:90,c:"nutrition"},
{q:"제조현장에서 제빵용 이스트를 저장하는 현실적인 온도로 적당한 것은?",o:["-18℃이하","-1~5℃","20℃","35℃이상"],a:1,e:"제빵용 생이스트는 -1~5℃(냉장 온도)에서 저장하는 것이 현실적이다. 냉동하면 세포 손상이 크고, 상온에서는 빨리 활성을 잃는다.",r:93,c:"hygiene"},
{q:"다음 중 지방분해 효소는?",o:["리파아제","프로테아제","찌마아제","말타아제"],a:0,e:"리파아제(lipase)는 지방을 글리세롤과 지방산으로 분해하는 효소이다.",r:85,c:"nutrition"},
{q:"강력분의 특성으로 틀린 것은?",o:["중력분에 비해 단백질 함량이 높다.","박력분에 비해 글루텐 함량이 적다.","박력분에 비해 점탄성이 크다.","경질소맥을 원료로 한다."],a:1,e:"강력분은 박력분에 비해 글루텐 함량이 많다(적지 않다). 강력분은 단백질 함량 11~13%, 점탄성이 크며, 경질소맥으로 만든다.",r:93,c:"ingredients"},
{q:"다음 중 글레이즈(glaze) 사용시 적합한 것은?",o:["15℃","25℃","35℃","45℃"],a:3,e:"글레이즈는 45℃ 전후에서 사용하는 것이 적합하다. 이 온도에서 적절한 유동성을 가져 제품 표면에 균일하게 코팅되며, 냉각 후 광택 있는 표면을 형성한다.",r:82,c:"manufacturing"},
{q:"제빵에서 설탕의 기능으로 틀린 것은?",o:["이스트의 영양분이 됨","껍질색을 나게 함","향을 향상시킴","노화를 촉진시킴"],a:3,e:"설탕은 이스트 영양분, 껍질색(갈색반응), 향미 향상에 기여하지만 노화를 촉진시키지 않는다. 오히려 설탕은 수분 보유력을 높여 노화를 지연시킨다.",r:93,c:"ingredients"},
{q:"물의 기능이 아닌 것은?",o:["유화 작용을 한다.","반죽 농도를 조절한다.","소금 등의 재료를 분산 시킨다.","효소의 활성을 제공한다."],a:0,e:"유화 작용은 유화제(계면활성제)의 기능이다.",r:99,c:"ingredients"},
{q:"반죽 개량제에 대한 설명 중 틀린 것은?",o:["반죽개량제는 빵의 품질과 기계성을 증가시킬 목적으로 첨가한다.","반죽 개량제에는 산화제, 환원제, 반죽강화제, 노화지연제, 효소 등이 있다.","산화제는 반죽의 구조를 강화시켜 제품의 부피를 증가시킨다.","환원제는 반죽의 구조를 강화시켜 반죽시간을 증가시킨다."],a:3,e:"환원제는 반죽의 구조를 '약화'시켜 반죽시간을 '감소'시킨다. 강화가 아니라 S-S 결합을 끊어 글루텐을 이완시키는 역할이다.",r:93,c:"manufacturing"},
{q:"발연점을 고려했을 때 튀김기름으로 가장 좋은 것은?",o:["낙화생유","올리브유","라드","면실유"],a:3,e:"면실유(목화씨 기름)는 발연점이 약 230℃ 이상으로 높고 산화 안정성이 우수하여 튀김기름으로 가장 적합하다. 낙화생유(땅콩기름)보다 고온에서 안정적인 특성을 가진다.",r:93,c:"ingredients"},
{q:"다음 중 이당류(Disaccharides)에 속하는 것은?",o:["포도당(glucose)","과당(fructose)","갈락토오스(galactose)","설탕(sucrose)"],a:3,e:"설탕=포도당+과당 단당류 : 포도당, 과당, 갈락토오스 이당류 : 맥아당(엿당), 자당(설탕), 유당(젖당) 다당류 : 덱스트린, 전분",r:99,c:"ingredients"},
{q:"소화기관에 대한 설명 중 틀린 것은?",o:["위는 강알카리의 위액을 분비한다.","이자(췌장)는 당 대사호르몬의 내분비선이다.","소장은 영양분을 소화ㆍ흡수한다.","대장은 수분을 흡수하는 역할을 한다."],a:0,e:"위는 강알카리가 아니라 강산성(pH 1~2)의 위액(염산)을 분비한다.",r:82,c:"nutrition"},
{q:"아미노산과 아미노산과의 결합은?",o:["글리코사이드 결합","펩타이드 결합","α-1,4결합","에스테르 결합"],a:1,e:"아미노산 간의 결합은 펩타이드 결합(peptide bond)이다. 글리코사이드 결합은 당류, α-1,4결합은 전분, 에스테르 결합은 지방에서 볼 수 있다.",r:93,c:"nutrition"},
{q:"칼슘 흡수를 방해하는 인자는?",o:["위액","유당","비타민C","옥살산"],a:3,e:"옥살산은 칼슘과 결합하여 불용성 옥살산칼슘을 형성해 칼슘 흡수를 방해한다. 시금치, 대황 등에 많이 함유되어 있다.",r:90,c:"nutrition"},
{q:"다음 중 필수지방산이 아닌 것은?",o:["리놀렌산(linolenic acid)","리놀레산(linoleic acid)","아라키돈산(arachidonic acid)","스테아르산(stearic acid)"],a:3,e:"필수지방산은 체내에서 합성되지 않아 반드시 식이로 섭취해야 하는 지방산으로 리놀레산(ω-6), 리놀렌산(ω-3), 아라키돈산(ω-6) 등이 있다. 스테아르산은 포화지방산으로 체내에서 합성 가능하여 필수지방산이 아니다.",r:70,c:"nutrition"},
{q:"열량 영양소의 단위 g당 칼로리의 설명으로 옳은 것은?",o:["단백질은 지방보다 칼로리가 많다.","탄수화물은 지방보다 칼로리가 적다.","탄수화물은 단백질보다 칼로리가 적다.","탄수화물은 단백질보다 칼로리가 많다."],a:1,e:"탄수화물(4kcal/g)은 지방(9kcal/g)보다 칼로리가 적다. 단백질도 4kcal/g으로 지방보다 적다.",r:93,v:0,c:"nutrition"},
{q:"부패의 진행에 수반하여 생기는 부패산물이 아닌 것은?",o:["암모니아","화화수소","메르캅탄","일산화탄소"],a:3,e:"일산화탄소= 연탄의 연소가스/자동차의 배기가스/ 화재발생시 산소가 부족할때 발생",r:99,c:"hygiene"},
{q:"법정 전염병 중 전파속도가 빠르고 국민건강에 미치는 위해 정도가 커서 발생 즉시 방역대책을 수립해야 하는 전염병은?",o:["제1군 전염병","제2군 전염병","제3군 전염병","제4군 전염병"],a:0,e:"제1군 전염병은 전파속도가 빠르고 위해 정도가 커서 발생 즉시 방역대책을 수립해야 한다. 콜레라, 장티푸스, 세균성이질 등이 해당된다.",r:93,c:"hygiene"},
