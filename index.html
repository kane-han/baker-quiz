{q:"아래의 갈색반응의 반응식에서 ( )에 알맞은 것은? 환원당＋(　　) ↓열 멜라노이드색소(황갈색)",o:["지방","탄수화물","단백질","비타민"],a:2,e:"마이야르 반응(갈색반응): 환원당 + 단백질(아미노산) → 멜라노이드 색소(황갈색)\n• 지방, 탄수화물(비환원당), 비타민은 직접 관여하지 않는다.",r:90,c:"nutrition"},
{q:"감미도 100인 설탕 20kg과 감미도 70인 포도당 24kg을 섞었다면 이 혼합당의 감미도는?",o:["50.1","83.6","105.8","188.2"],a:1,e:"혼합당 감미도 = (설탕 20kg × 100 + 포도당 24kg × 70) ÷ (20+24) = (2000+1680) ÷ 44 = 3680 ÷ 44 ≈ 83.6",r:93,v:0,c:"ingredients"},
{q:"효소를 구성하는 주성분에 대한 설명으로 틀린 것은?",o:["탄소, 수소, 산소, 질소 등의 원소로 구성되어 있다.","아미노산이 펩티드결합을 하고 있는 구조이다.","열에 안정하여 가열하여도 변성되지 않는다.","섭취 시 4kcal의 열량을 낸다."],a:2,e:"료소는 단백질로 구성되어 있기 때문에 열에 쉽게 변성한다",r:99,c:"nutrition"},
{q:"수용성향료(essence)의 특징으로 옳은 것은?",o:["제조시 게면활성제가 반드시 필요하다.","기름(oil)에 쉽게 용해된다.","내열성이 강하다.","고농도의 제품을 만들기 어렵다."],a:3,e:"수용성향료(에센스)는 주로 알코올에 향기 성분을 용해한 것으로 고농도 제품을 만들기 어렵다.\n• 내열성이 약하고, 기름에는 잘 용해되지 않는다.",r:93,c:"nutrition"},
{q:"유지의 분해산물인 글리세린에 대한 설명으로 틀린 것은?",o:["자당보다 감미가 크다.","향미제의 용매로 식품의 색택을 좋게 하는 독성이 없어 극소수 용매 중의 하나이다.","보습성이 뛰어나 빵류, 케이크류, 소프트 쿠키류의 저장성을 연장시킨다.","물-기름의 유탁액에 대한 안정 기능이 있다."],a:0,e:"*감미도 순서 과당＞전화당＞자당(설탕)＞포도당＞맥아당=갈락토오스＞유당 : 유지의 분해산물인 글리세린은 유당의 구성물이므로, 자당(설탕)보다 감미가 적다.",r:99,c:"ingredients"},
{q:"식품의 열량(kcal) 계산공식으로 맞는 것은?",o:["(탄수화물의 양＋단백질의 양)×4＋(지방의 양×9)","(탄수화물의 양＋지방의 양)×4＋(단백질의 양×9)","(지방의 양＋단백질의 양)×4＋(탄수화물의 양×9)","(탄수화물의 양＋지방의 양)×9＋(단백질의 양×4)"],a:0,e:"식품의 열량 = (탄수화물 + 단백질) × 4kcal + 지방 × 9kcal\n• 탄수화물과 단백질은 1g당 4kcal, 지방은 1g당 9kcal의 에너지를 낸다.",r:90,c:"nutrition"},
{q:"다음 아미노산 중 특히 성장기 어린이에게 더 요구되는 필수아미노산은?",o:["트립토판","메티오닌","발린","히스티딘"],a:3,e:"히스티딘은 성장기 어린이에게 특히 더 필요한 필수아미노산이다.\n• 성인에게는 준필수아미노산이지만 어린이에게는 필수이다.",r:93,c:"nutrition"},
{q:"지용성 비타민의 특징이 아닌 것은?",o:["간장에 운반되어 저장된다.","단기간에 급속히 중증의 결핍증이 나타난다.","섭취과잉으로 인한 독성을 유발시킬 수 있다.","지질과 함께 소화, 흡수되어 이용된다."],a:1,e:"지용성 비타민의 결핍은 서서히 나타난다.",r:99,c:"nutrition"},
{q:"콜레스테롤에 대한 설명으로 틀린 것은?",o:["식사를 통한 평균흡수율은 100%이다.","유도지질이다.","고리형 구조를 이루고 있다.","간과 장벽, 부신 등 체내에서도 합셩된다."],a:0,e:"콜레스테롤의 식사를 통한 평균 흡수율은 약 40~60%이다(100%가 아님).\n• 유도지질이며, 고리형 구조, 체내에서도 합성된다.",r:90,c:"nutrition"},
{q:"다당류에 대한 설명으로 틀린 것은?",o:["일반적으로 전분은 아밀로오스(amylose)와 아밀로펙틴(amylopectin) 으로 이루어져 있다.","전분은 소화효소에 의해 가수분해 될 수 있다.","섬유소는 사람의 소화액으로는 소화되지 않는다.","펙틴은 단순다당류에 속한다."],a:3,e:"펙틴은 복합다당류(갈락투론산이 주성분)에 속하며 단순다당류가 아니다.\n• 전분: 단순다당류(포도당 중합체), 섬유소: 소화 불가",r:90,c:"ingredients"},
{q:"다음 중 경구전염병이 아닌 것은?",o:["맥각중독 세균성","이질","콜레라","장티푸스"],a:0,e:"맥각중독은 곰팡이독에 의한 것이다.",r:99,c:"hygiene"},
{q:"미생물의 일반적 성질에 대한 설명으로 옳은 것은?",o:["세균은 주로 출아법으로 그 수를 늘리며 술 제조에 많이 사용된다.","효모는 주로 분열법으로 그 수를 늘리며 식품 부패에 가장 많이 관여하는 미생물이다.","곰팡이는 주로 포자에 의하여 그 수를 늘리며 빵, 밥 등의 부패에 관여하는 미생물이다.","바이러스는 주로 출아법으로 그 수를 늘리며 스스로 필요한 영양분을 합성한다."],a:2,e:"곰팡이는 주로 포자에 의해 증식하며, 빵·밥 등의 부패에 관여한다.\n• 세균: 분열법으로 증식, 효모: 출아법으로 증식, 바이러스: 숙주세포 내에서만 증식",r:90,c:"hygiene"},
{q:"화농성 지령이 있는 사람이 만든 제품을 먹고 식중독을 일으켰다면 가장 관계가 깊은 원인균은?",o:["장염비브리오균","살모넬라균","보툴리누스균","황색포도상구균"],a:3,e:"황색포도상구균(Staphylococcus aureus)은 화농성 질환의 대표균으로, 화농 부위를 통해 식품을 오염시킨다.",r:93,c:"hygiene"},
{q:"다음 중 독소형 세균성식중독의 원인균은?",o:["보툴리누스균","살모넬라균","장염비브리오균","대장균"],a:0,e:"세균성감염형식중독-살모넬라, 장염비브리오, 병원성대장균 세균성독소형식중독-보툴리누스, 포도상구균",r:99,c:"hygiene"},
{q:"대장균의 일반적인 특성에 대한 설명으로 옳은 것은?",o:["분변오염의 지표가 된다.","경피전염병을 일으킨다.","독소형 식중독을 일으킨다.","발효식품 제조에 유용한 세균이다."],a:0,e:"대장균은 분변오염의 지표가 되는 세균이다. 식품의 위생 상태를 판단하는 지표로 사용된다.",r:85,c:"hygiene"},
{q:"감자의 싹이 튼 부분에 들어 있는 독소는?",o:["엔테로톡신","삭카린나트륨","솔라닌","아미그달린"],a:2,e:"감자의 싹이 튼 부분에는 솔라닌(solanine)이라는 독소가 있다. 섭취 시 구토, 설사, 복통 등을 유발한다.",r:90,c:"hygiene"},
{q:"빵 및 케이크류에 사용이 허가된 보존료는?",o:["탄산수소나트륨","포름알데히드","탄산암모늄","프로피온산"],a:3,e:"1번 3번은 팽창제 / 2번은 쓰면 안되는 물질",r:99,c:"ingredients"},
{q:"살모넬라균으로 인한 식중독의 잠복기와 증상으로 옳은 것은?",o:["오염식품 섭취 10~24시간 후 발열(38~40℃)이 나타나며 1주일 이내 회복이 된다.","오염식품 섭취 10~20시간 후 오한과 혈액이 섞이 설사가 나타나며 이질로 의심되기도 한다.","오염식품 섭취 10~30시간 후 점액성 대변을 배설하고 신경증상을 보여 곧 사망한다.","오염식품 섭취 8~20시간 후 복통이 있고 홀씨A, F형의 독소에 의한 발병이 특징이다."],a:0,e:"살모넬라균 식중독은 오염식품 섭취 후 10~24시간의 잠복기를 거쳐 발열(38~40℃), 복통, 설사 등의 증상이 나타나며 보통 1주일 이내 회복된다.",r:93,c:"hygiene"},
{q:"빵을 제조하는 과정에서 반죽 후 분할기로부터 분할할 때나 구울 때 달라붙지 않게 할 목적으로 허용되어 있는 첨가물은?",o:["글리세린 프로필렌","글리콜","초산 비닐수지 유동","파라핀"],a:3,e:"파라핀(유동 파라핀)은 식품첨가물로 허용된 이형제로, 빵 반죽이 분할기나 팬에 달라붙지 않도록 하는 목적으로 사용이 허용되어 있다.",r:90,c:"manufacturing"},
{q:"산양, 양, 돼지, 소에게 감염되면 유산을 일으키고, 인체 감염시 고열이 주기적으로 일어나는 인수공통전염병은?",o:["광우병","공수병","파상열","신증후군출혈열"],a:2,e:"파상열(브루셀라증)은 산양, 양, 돼지, 소 등에서 유산을 일으키고, 인체 감염 시 주기적인 고열(파상열)이 특징인 인수공통감염병이다.",r:90,c:"hygiene"}]},
{title:"2008년 2회",desc:undefined,questions:[{q:"공장 설비 중 제품의 생산능력은 어떤 설비가 가장 중요한 기준이 되는가?",o:["오븐","발효기","믹서","작업 테이블"],a:0,e:"제품의 생산능력은 오븐이 가장 중요한 기준이 된다. 오븐의 용량과 효율이 전체 생산량을 결정한다.",r:82,c:"manufacturing"},
{q:"스펀지 케이크 제조 시 더운 믹싱방법(hot method)을 사용할 때 계란과 설탕의 중탕 온도로 가장 적합한 것은?",o:["23°C","43°C","63°C","83°C"],a:1,e:"스펀지 케이크의 더운 믹싱법(hot method)에서는 계란과 설탕을 중탕하여 40~43℃로 데운 후 거품을 올린다. 너무 높으면 달걀 단백질이 응고되어 기포력이 떨어진다.",r:85,c:"manufacturing"},
{q:"퍼프 페이스트리 제조 시 휴지의 목적이 아닌 것은?",o:["밀가루가 수화를 완전히 하여 글루텐을 안정시킨다.","밀어펴기를 쉽게 한다.","저온처리를 하여 향이 좋아진다.","반죽과 유지의 되기를 같게 한다."],a:2,e:"퍼프페이스트리 휴지는 냉장으로 하기 때문에 저온처리인 3번이 틀렸다",r:99,c:"ingredients"},
{q:"굳어진 설탕 아이싱 크림을 여리게 하는 방법으로 부적합한 것은?",o:["설탕 시럽을 더 넣는다.","중탕으로 가열한다.","전분이나 밀가루를 넣는다.","소량의 물을 넣고 중탕으로 가온한다."],a:2,e:"굳어진 설탕 아이싱에 전분이나 밀가루를 넣으면 오히려 더 되직해진다. 설탕 시럽, 중탕 가열, 소량의 물 추가가 올바른 방법이다.",r:93,c:"ingredients"},
{q:"다음 중 반중의 pH가 가장 낮아야 좋은 제품은?",o:["화이트 레이어 케이크","스펀지 케이크","엔젤 푸드 케이크","파운드 케이크"],a:2,e:"엔젤 푸드 케이크는 흰자만 사용하므로 반죽의 pH가 가장 낮아야(산성) 좋다. 주석산 크림을 사용하여 pH를 5.2~6.0으로 낮춘다.",r:93,v:0,c:"ingredients"},
{q:"생크림 원료를 가열하거나 냉동시키지 않고 직접 사용할 수 있게 보존하는 적합한 온도는?",o:["-18°C 이하","3~5°C","15~18°C","21°C 이상"],a:1,e:"생크림 원료의 적합한 보존 온도는 3~5℃이다.\n• -18℃ 이하: 냉동, 15℃ 이상: 변질 위험",r:77,c:"hygiene"},
{q:"고율배합에 대한 설명으로 틀린 것은?",o:["화학팽창제를 적게 쓴다.","굽는 온도를 낮춘다.","반죽 시 공기 혼입이 많다.","비중이 높다."],a:3,e:"고율배합은 설탕과 유지가 많아 크리밍 과정에서 공기가 많이 혼입되므로 반죽의 비중이 낮다. '비중이 높다'는 설명은 틀린 것이며, 공기 혼입이 많기 때문에 화학팽창제를 적게 쓰고 굽는 온도도 낮춘다.",r:99,c:"manufacturing"},
{q:"스펀지 케이크 400g 짜리 완제품을 만들 때 굽기 손실이 20%라면 분할 반죽이 무게는?",o:["600g","500g","400g","300g"],a:1,e:"분할 반죽이 100%이고 손실 20%이므로 80%의 무게가 400g이다. 분할 반죽의 무게를 X라 하면 비례식에서 100: X = 80 : 400g 따라서 X = (100 x 400g) / 80 = 500g",r:99,c:"manufacturing"},
{q:"도넛 제조 시 수분이 적을 때 나타나는 결점이 아닌 것은?",o:["팽창이 부족하다.","혹이 튀어나온다.","형태가 일정하지 않다.","표면이 갈라진다."],a:1,e:"도넛제조시 수분이 적을때 나타나는 현상 1. 팽창부족 2. 형태 불균일 3. 딱딱한내부 4. 표면의 요철 5. 표면갈라짐 6. 톱지모양의 외피 7. 강한점도 [추가 해설] 도넛 제조 시 수분이 많으면 완제품에 \"혹\" 모양이 돌출한다.",r:99,c:"manufacturing"},
{q:"화이트 레이어 케이크의 반죽 비중으로 가장 적합한 것은?",o:["0.90~1.0","0.45~0.55","0.60~0.70","0.75~0.85"],a:3,e:"화이트 레이어 케이크는 반죽형 반죽으로 비중을 0.8±0.05로 맞춘다.",r:99,c:"manufacturing"},
{q:"당분이 있는 슈 껍질을 구울 때의 현상이 아닌 것은?",o:["껍질의 팽창이 좋아진다.","상부가 둥글게 된다.","내부에 구멍형성이 좋지 않다.","표면에 균열이 생기지 않는다."],a:0,e:"당분이 있는 슈 껍질을 구우면 껍질 팽창이 좋아지고, 상부가 둥글게 되며, 표면에 균열이 생기지 않는다. 그러나 '내부에 구멍형성이 좋지 않다'는 당분이 있는 슈 껍질의 현상이 아니다.\n• 당분은 캐러멜화로 껍질 색을 진하게 하고, 적절히 사용하면 팽창에 도움이 된다.",r:93,c:"manufacturing"},
{q:"무스(mousse)의 원 뜻은?",o:["생크림","젤리","거품","광택제"],a:2,e:"무스(mousse)는 프랑스어로 '거품'이라는 뜻이다.",r:82,c:"ingredients"},
{q:"시퐁케이크 제조 시 냉각 전에 팬에서 분리되는 결점이 나타났을 때의 원인과 거리가 먼 것은?",o:["굽기 시간이 짧다.","밀가루 양이 많다.","반죽에 수분이 많다.","오븐 온도가 낮다."],a:1,e:"밀가루 양이 많으면 반죽이 단단해져 팬에서 분리되는 것과는 거리가 멀다.",r:99,c:"manufacturing"},
{q:"푸딩에 대한 설명 중 맞는 것은?",o:["우유와 설탕은 120°C로 데운 후 계란과 소금을 넣어 혼합한다.","우유와 소금의 혼합 비율은 100:10 이다.","계란의 열변성에 의한 농후화 작용을 이용한 제품이다.","육류, 과일, 야채, 빵을 섞어 만들지는 않는다."],a:2,e:"푸딩은 계란의 열변성(열응고)에 의한 농후화 작용을 이용하여 만드는 제품이다. 계란 단백질이 가열에 의해 응고되면서 부드러운 질감을 형성한다.",r:93,c:"ingredients"},
{q:"도넛을 글레이즈 할 때 글레이즈의 적정한 품온은?",o:["24~27°C","28~32°C","33~36°C","43~49°C"],a:3,e:"ㄷ글레이즈란 과자류 표면에 광택을 내는 일 또는 표면이 마르지 않도록 젤라틴, 젤리, 시럽, 퐁당, 초콜릿 등을 바르는 일과 이런 모든 재료를 총칭하며 사용범위가 43~50℃로 넗다.",r:99,c:"manufacturing"},
{q:"다음 중 25분 동안 동일한 분할량의 식빵 반죽을 구웠을 때 수분함량이 가장 많은 굽기 온도는?",o:["190°C","200°C","210°C","220°C"],a:0,e:"낮은 온도(190℃)에서 구우면 빵 내부의 수분 증발이 적어 수분함량이 가장 많다.\n• 온도가 높을수록 수분 증발이 많아진다.",r:85,c:"manufacturing"},
{q:"제빵에서 물의 양이 적량보다 적을 경우 나타나는 결과와 거리가 먼 것은?",o:["수율이 낮다.","향이 강하다.","부피가 크다.","노화가 빠르다."],a:2,e:"물의 양이 적으면 반죽이 되어 부피가 작아진다(크지 않다). 수율 저하, 향 감소, 노화 촉진이 나타난다.\n※ '향이 강하다'가 보기에 있으나 정답은 '부피가 크다'이다.",r:88,c:"manufacturing"},
{q:"냉동제품에 대한 설명 중 틀린 것은?",o:["저장기간이 길수록 품질저하가 일어난다.","상대습도를 100%로 하여 해동한다.","냉동반죽의 분할량이 크면 좋지 않다.","수분이 결빙할 때 다량의 잠열을 요구한다."],a:1,e:"냉동제품 해동 시 상대습도 100%는 표면에 수분이 과다하게 응결되어 품질이 저하되므로 부적합하다.\n• 적정 해동: 5℃ 냉장고에서 서서히 해동",r:85,c:"manufacturing"},
{q:"중간 발효가 필요한 주된 이유는?",o:["탄력성을 약화시키기 위하여","모양을 일정하게 하기 위하여","반죽 온도를 낮게 하기 위하여","반죽에 유연성을 부여하기 위하여"],a:3,e:"중간발효가 필요한 주된 이유는 분할·둥글리기로 긴장된 반죽에 유연성을 부여하여 정형하기 쉽게 하기 위함이다.",r:93,c:"manufacturing"},
{q:"오버헤드 프루퍼(overhead proofer)는 어떤 공정을 행하기 위해 사용하는 것인가?",o:["분할","둥글리기","중간발효","정형"],a:2,e:"오버헤드 프루퍼(overhead proofer)는 중간발효를 위해 사용하는 설비이다.\n• 둥글리기 후 반죽을 걸어서 이동하며 휴지시킨다.",r:93,c:"manufacturing"},
{q:"식빵 밑바닥이 움푹 패이는 결점에 대한 원인이 아닌 것은?",o:["굽는 처음 단계에서 오븐열이 너무 낮았을 경우","바닥 양면에 구멍이 없는 팬을 사용한 경우","반죽기의 회전속도가 느려 반죽이 언더믹스 된 경우","2차 발효를 너무 초과했을 경우"],a:0,e:"굽는 초기 단계에서 오븐열이 너무 낮으면 반죽이 천천히 팽창하여 오히려 밑바닥이 패이는 현상과는 거리가 멀다. 밑바닥이 움푹 패이는 원인은 구멍 없는 팬, 언더믹스, 과발효 등이며 초기 낮은 오븐열은 직접적인 원인이 아니다.",r:93,c:"manufacturing"},
{q:"제빵에서 중간발효의 목적이 아닌 것은?",o:["반죽을 하나의 표피로 만든다.","분할공정으로 잃었던 가스의 일부를 다시 보완시킨다.","반죽의 글루텐을 회복시킨다.","정형 과정 중 찢어지거나 터지는 현상을 방지한다."],a:0,e:"중간발효의 목적은 가스 보완, 글루텐 회복, 찢어짐 방지이다. '반죽을 하나의 표피로 만드는 것'은 둥글리기의 목적이다.",r:93,c:"manufacturing"},
{q:"ppm을 나타낸 것으로 옳은 것은?",o:["g당 중량 백분율","g당 중량 만분율","g당 중량 십만분율","g당 중량 백만분율"],a:3,e:"parts per million, 즉 백만분율",r:99,c:"manufacturing"},
{q:"발효 손실에 관한 설명으로 틀린 것은?",o:["반죽온도가 높으면 발효 손실이 크다.","발효시간이 길면 발효 손실이 크다.","고배합율 일수록 발효 손실이 크다.","발효습도가 낮으면 발효 손실이 크다."],a:2,e:"고배합율(설탕·유지 다량)일수록 이스트 활동이 억제되어 발효 손실이 적다(크지 않다).\n• 높은 반죽온도, 긴 발효시간, 낮은 발효습도는 발효 손실을 키운다.",r:93,c:"manufacturing"},
{q:"빵을 포장할 때 가장 적합한 빵의 온도와 수분함량은?",o:["30°C, 30%","35°C, 38%","42°C, 45%","48°C, 55%"],a:1,e:"포장 온도 35~40도가 적당함. 제과",r:99,c:"ingredients"},
{q:"생산관리의 3대 요소에 해당하지 않는 것은?",o:["시장(market)","사람(man)","재료(material)","자금(money)"],a:0,e:"생산관리의 3대 요소는 사람(Man), 재료(Material), 기계(Machine)이다. 자금(Money)은 경영의 3M 요소이지 생산관리의 3대 요소가 아니다.\n※ 시장(Market)도 생산관리 3M에 포함되는 견해가 있어 교재마다 차이가 있다.",r:80,c:"management"},
{q:"제빵용 팬기름에 대한 설명으로 틀린 것은?",o:["종류에 상관없이 발연점이 낮아야 한다.","백색 광유(mineral oil)도 사용된다.","정제라드, 식물유, 혼합유도 사용된다.","과다하게 칠하면 밑껍질이 두껍고 어둡게 된다."],a:0,e:"팬기름은 발연점이 높아야 한다",r:99,c:"ingredients"},
{q:"제빵에 있어 2차 발효실이 습도가 너무 높을 때 일어날 수 있는 결점은?",o:["겉껍질 형성이 빠르다.","오븐 팽창이 적어진다.","껍질색이 불균일해진다.","수포가 생성되고 질긴 껍질이 되기 쉽다."],a:3,e:"2차 발효실 습도가 너무 높으면 반죽 표면에 수포가 생기고 질긴 껍질이 되기 쉽다.\n• 습도가 낮으면 껍질 건조, 적절한 습도(80~85%)가 필요하다.",r:93,c:"manufacturing"},
{q:"최종제품의 부피가 정상보다 클 경우의 원인이 아닌 것은?",o:["2차 발효의 효과","소금 사용량 과다","분할량 과다","낮은 오븐온도"],a:1,e:"소금은 표준량(1.75%)보다 많아지면 효소의 작용을 억제하여 가스 발생력이 줄어든다. -> 부피 작아짐",r:99,c:"manufacturing"},
{q:"식빵 제조시 물 사용량 1000g, 계산된 물 온도 -7°C 수돗물 온도 20°C의 조건이라면 얼음 사용량은?",o:["50g","130g","270g","410g"],a:2,e:"얼음사용량=물사용량×(수돗물 온도-사용할 물 온도)÷(80+수돗물 온도) 1000×(20+7)÷(80+20)=270",r:99,c:"manufacturing"},
{q:"밀가루 반죽에 관여하는 단백질은?",o:["라이소자임","글루텐","알부민","글로불린"],a:1,e:"밀가루 반죽에 관여하는 단백질은 글루텐이다. 글리아딘과 글루테닌이 결합하여 글루텐을 형성한다.\n• 라이소자임(계란), 알부민·글로불린(수용성 단백질)은 반죽 형성에 관여하지 않는다.",r:90,c:"ingredients"},
{q:"다음 중 단당류는?",o:["포도당","자당","맥아당","유당"],a:0,e:"단당류 : 포도당, 과당, 갈락토오스 이당류 : 맥아당, 자당(설탕), 유당",r:99,c:"ingredients"},
{q:"베이킹파우더 성분 중 이산화탄소를 발생시키는 것은?",o:["전분","탄산수소나트륨","주석산","인산칼슘"],a:1,e:"베이킹파우더에서 이산화탄소(CO₂)를 발생시키는 성분은 탄산수소나트륨(중조, NaHCO₃)이다.\n• 전분: 충진제, 주석산·인산칼슘: 산제(반응제)",r:93,c:"ingredients"},
{q:"다음 중 일반적인 제빵 조합으로 틀린 것은?",o:["소맥분＋중조 → 밤만두피","소맥분＋유지 → 파운드케이크","소맥분＋분유 → 건포도식빵","소맥분＋계란 → 카스테라"],a:2,e:"소맥분 + 분유 조합은 건포도식빵이 아니라 우유식빵 등에 해당한다.\n• 소맥분+중조: 밤만두피, 소맥분+유지: 파운드케이크, 소맥분+계란: 카스테라",r:93,c:"ingredients"},
{q:"밀가루의 아밀라아제 활성 정도를 측정하는 그래프는?",o:["아밀로그래프","패리노그래프","익스텐소그래프","익소그래프"],a:0,e:"아밀로그래프는 밀가루의 아밀라아제 활성 정도를 측정하는 기기이다.\n• 전분 현탁액의 점도 변화를 온도에 따라 기록한다.",r:93,c:"ingredients"},
{q:"글루텐의 구성 물질 중 반죽을 질기고 탄력성 있게 하는 물질은?",o:["글리아딘","글루테닌","메소닌","알부민"],a:1,e:"글루테닌은 반죽을 질기고 탄력성 있게 하는 물질이다.\n• 글리아딘: 점성·신장성 부여, 메소닌·알부민: 글루텐 형성과 무관",r:93,c:"ingredients"},
{q:"연수의 광물질 함량 범위는?",o:["280~340ppm","200~260ppm","120~180ppm","0~60ppm"],a:3,e:"연수의 광물질 함량은 0~60ppm이다.\n• 아연수: 61~120ppm, 아경수: 121~180ppm, 경수: 180ppm 이상",r:93,c:"ingredients"},
{q:"다음 중 캐러멜화가 가장 높은 온도에서 일어나는 일은?",o:["과당","벌꿀","설탕","전화당"],a:2,e:"설탕의 캐러멜화 온도는 약 160~170℃로 가장 높다.\n• 과당: 약 110℃, 벌꿀·전화당은 과당을 포함하므로 낮은 온도에서 시작된다.",r:90,c:"ingredients"},
{q:"알파 아밀라아제(α-amlylase)에 대한 설명으로 틀린 것은?",o:["베타 아밀라아제(β-amlylase)에 비하여 열 안정성이 크다.","당화효소라고도 한다.","전분의 내부 결합을 가수분해할 수 있어 내부 아밀라아제라고도 한다.","액화효소라고도 한다."],a:1,e:"베타 아밀라아제를 당화효소라고도 한다.",r:99,c:"ingredients"},
{q:"패리노그래프에 관한 설명 중 틀린 것은?",o:["흡수율 측정","믹싱시간 측정","믹싱내구성 측정","전분의 점도 측정"],a:3,e:"패리노그래프는 글루텐의 질과 흡수율, 믹싱시간과 내구성을 측정한다",r:99,c:"ingredients"},
{q:"우유의 성분 중 치즈를 만드는 원료는?",o:["유지방","카제인","유당","비타민"],a:1,e:"치즈의 원료가 되는 우유 단백질은 카제인(casein)이다. 레닌(응유효소)에 의해 카제인이 응고되어 커드를 형성한다.",r:90,c:"ingredients"},
{q:"소금이 함량이 1.3%인 반죽 20Kg과 1.5%인 반죽 40Kg을 혼합할 때 혼합한 반죽의 소금 함량은?",o:["1.30%","1.38%","1.43%","1.56%"],a:2,e:"무게에 대한 가중 평균으로 구한다. 혼합 반죽 소금 함량 = (1.3% x 20Kg + 1.5% X 40Kg ) / (20Kg + 40Kg) = 1.4333...",r:99,c:"nutrition"},
{q:"계란의 특징적 성분으로 지방의 유화력이 강한 성분은?",o:["레시틴(lecithin)","스테롤(sterol)","세팔린(cephalin)","아비딘(avidin)"],a:0,e:"레시틴(lecithin)은 계란 노른자에 많이 함유된 인지질로, 강한 유화력을 가지고 있다.\n• 스테롤, 세팔린: 유화력 약함, 아비딘: 비오틴 결합 단백질",r:93,c:"ingredients"},
{q:"다음 중 4대 기본 맛이 아닌 것은?",o:["단맛","떫은맛","짠맛","신맛"],a:1,e:"4대 기본 맛은 단맛, 짠맛, 신맛, 쓴맛이다. 떫은맛은 기본 맛이 아니라 촉감에 가까운 감각이다.",r:82,c:"manufacturing"},
{q:"유지의 기능이 아닌 것은?",o:["감미제","안정화","가소성","유화성"],a:0,e:"유지의 기능은 안정화, 가소성, 유화성, 쇼트닝성, 크리밍성 등이다. 감미제(단맛을 내는 것)는 유지의 기능이 아니다.",r:90,c:"ingredients"},
{q:"탄수화물은 체내에서 주로 어떤 작용을 하는가?",o:["골격을 형성한다.","혈액을 구성한다.","체작용을 조절한다.","열량을 공급한다."],a:3,e:"탄수화물은 체내에서 주로 열량(에너지)을 공급하는 역할을 한다.\n• 1g당 4kcal의 에너지를 낸다.",r:77,c:"nutrition"},
{q:"비타민 B1의 특징으로 옳은 것은?",o:["단백질의 연소에 필요하다.","탄수화물 대사에서 조효소로 작용한다.","결핍증은 펠라그라(pellagra)이다.","인체의 성장인자이며 항빈혈작용을 한다."],a:1,e:"비타민 B1(티아민)은 탄수화물 대사에서 조효소(TPP)로 작용한다.\n• 결핍증: 각기병(beriberi), 단백질 연소는 비타민 B6 관련",r:93,c:"nutrition"},
{q:"단순단백질이 아닌 것은?",o:["프롤라민","헤모글로빈","글로불린","알부민"],a:1,e:"헤모글로빈은 단백질+헴(철)의 복합단백질(conjugated protein)이다.\n• 프롤라민, 글로불린, 알부민은 단순단백질이다.",r:93,c:"nutrition"},
{q:"유당불내증의 원인은?",o:["대사과정 중 비타민 B군의 부족","변질된 유당의 섭취","우유 섭취향의 절대적인 부족","소화액 중 락타아제의 결여"],a:3,e:"유당불내증의 원인은 소화액 중 락타아제(lactase)의 결여이다. 락타아제가 없으면 유당을 분해하지 못해 소화 장애가 발생한다.",r:93,c:"nutrition"},
{q:"생체 내에서의 지방의 기능으로 틀린 것은?",o:["생체기관을 보호한다.","체온을 유지한다.","효소의 주요 구성 성분이다.","주요한 에너지원이다."],a:2,e:"효소의 주요 구성 성분은 단백질이며, 생체기관 보호, 체온 유지, 에너지원은 지방의 기능이다.",r:85,c:"nutrition"},
{q:"다음 중 소화기계 전염병은?",o:["세균성 이질","디프테리아","홍역","인플루엔자"],a:0,e:"세균성 이질은 이질균(Shigella)에 의한 소화기계 전염병이다.\n• 디프테리아, 홍역, 인플루엔자는 호흡기계 전염병이다.",r:93,c:"hygiene"},
{q:"대장균군이 식품위생학적으로 중요한 이유는?",o:["식중독균을 일으키는 원인균이기 때문","분변오염의 지표세균이기 때문","부패균이기 때문","대장염을 일으키기 때문"],a:1,e:"대장균군은 분변오염의 지표세균으로 식품위생학적으로 중요하다.\n• 대장균 자체가 식중독을 일으키는 것이 아니라 분변 오염의 간접 지표이다.",r:93,c:"hygiene"},
{q:"감자 조리 시 아크릴아마이드를 줄일 수 있는 방법이 아닌 것은?",o:["냉장고에 보관하지 않는다.","튀기거나 굽기 직전에 감자의 껍질을 벗긴다.","물에 침지 시켰을 때 경우는 건조 후 조리한다.","튀길 때 180°C 이상의 고온에서 조리한다."],a:3,e:"아크릴아마이드는 고온 조리과정세서 생성되기때문에 고온에서 조리하게되면 아크릴아마이드가 더 많이 생길수있다",r:99,c:"hygiene"},
{q:"다음 중 허가된 천연유화제는?",o:["구연산","고시폴","레시틴","세사몰"],a:2,e:"노른자에는 ‘레시틴’이 함유되어 있으며 천연유화제로 사용됨",r:99,c:"ingredients"},
{q:"보존료의 조건으로 적합하지 않은 것은?",o:["독성이 없거나 장기적으로 사용해도 인체에 해를 주지 않아야 한다.","무미, 무취로 식품에 변화를 주지 않아야 한다.","사용방법이 용이하고 값이 싸야 한다.","단기간 동안만 강력한 효력을 나타내야한다."],a:3,e:"보존료는 장기간 지속적으로 효력을 나타내야 한다. 단기간만 효력이 있으면 보존 효과가 없다.",r:82,c:"nutrition"},
{q:"다음 중 경구전염병이 아닌 것은?",o:["콜레라","이질","발진티푸스","유행성 간염"],a:2,e:"발진티푸스는 이(louse)를 매개로 하는 절지동물 매개 전염병으로, 입(경구)을 통해 감염되는 경구전염병이 아니다. 콜레라, 이질, 유행성 간염은 모두 오염된 음식이나 물을 통해 전파되는 경구전염병이다.",r:99,c:"hygiene"},
{q:"중독 시 두통, 현기증, 구토, 설사등과 시신경 염증을 유발시켜 실명의 원인이 되는 화학물질은?",o:["카드뮴(cd)","P.C.B","메탄올","유기수은제"],a:2,e:"메탄올(methyl alcohol) 중독 시 두통, 현기증, 구토, 설사와 함께 시신경 염증을 유발하여 실명할 수 있다.",r:90,v:0,c:"hygiene"},
{q:"다음 전염병 중 바이러스가 원인인 것은?",o:["간염","장티푸스","파라티푸스","콜레라"],a:0,e:"장티푸스,파라티푸스,콜레라는 모두 세균성 감염병이다.",r:99,c:"hygiene"},
{q:"일반 세균이 잘 자라는 pH 범위는?",o:["2.0이하","2.5~3.5","4.5~5.5","6.5~7.5"],a:3,e:"일반 세균이 잘 자라는 pH 범위는 6.5~7.5(중성 부근)이다.\n• 곰팡이: pH 2~8(넓은 범위), 효모: pH 4~6",r:93,c:"hygiene"},
{q:"해수세균 일종으로 식염농도 3%에서 잘 생육하며 어패류를 생식할 경우 중독 될 수 있는 균은?",o:["보톨리누스균","장염 비브리오균","웰치균","살모넬라균"],a:1,e:"장염 비브리오균(Vibrio parahaemolyticus)은 해수세균으로 식염 3%에서 잘 생육하며, 어패류 생식 시 중독된다.",r:93,c:"hygiene"}]},
{title:"2008년 4회",desc:undefined,questions:[{q:"반죽형 쿠키 중 수분을 가장 많이 함유하는 쿠키는?",o:["쇼트 브레드 쿠키","드롭쿠키","스냅 쿠키","스펀지 쿠키"],a:1,e:"드롭쿠키~반죽형 쿠키중 최대 수분함량. 소프트쿠키. 짜는쿠키 제과",r:99,c:"manufacturing"},
{q:"고율배합 제품과 저율배합 제품 비중의 일반적인 비교 설명으로 맞는 것은?",o:["고율배합은 공기가 많이 혼입되어 제품의 비중이 높다.","저율배합은 부피당 무게가 무거워 제품의 비중이 높다.","두 제품의 비중은 항상 같다.","고율배합 제품은 수분함량이 낮아 비중이 낮다."],a:1,e:"고율 배합 저율 배합 믹싱 중 공기 포집 상태 공기가 많다. 공기가 적다 반죽의 비중 상태 비중이 낮다. 비중이 높다 화학 팽창제 사용량 상태 적게 넣는다. 많이 넣는다 굽기 온도 상태 낮게 오래 굽는다. 높게 짧게 굽는다. 제과",r:99,c:"manufacturing"},
{q:"직경이 10cm, 높이가 4.5cm인 원형팬에 부피 2.4㎤당 1g인 반죽을 70%로 팬닝 한다면 채워야 할 반죽의 무게는 약 얼마인가?",o:["147g","120g","103g","80g"],a:2,e:"팬 용적 = π × r² × h = 3.14 × 5² × 4.5 = 353.25cm³\n70% 팬닝: 353.25 × 0.7 = 247.3cm³\n반죽 무게 = 247.3 ÷ 2.4 ≈ 103g",r:98,c:"manufacturing"},
{q:"케이크류의 제조와 관계가 먼 재료는?",o:["계란","설탕","강력분","박력분"],a:2,e:"케이크류는 주로 박력분(단백질 7~9%)을 사용한다. 강력분(단백질 11~13%)은 제빵용으로 케이크 제조와 거리가 멀다.",r:90,c:"ingredients"},
{q:"설탕에 물을 넣고 114~118℃까지 가열시켜 시럽을 만든 후 냉각 교반하여 새하얗게 만든 제품은?",o:["머랭","캔디","퐁당","휘핑크림"],a:2,e:"설탕에 물을 넣고 114~118℃까지 가열시켜 시럽을 만든 후 냉각·교반하여 새하얗게 만든 제품은 퐁당(fondant)이다.",r:90,c:"ingredients"},
{q:"퍼프페이스트리 제품모양이 균일하지 않을 때의 원인이 아닌 것은?",o:["밀가루가 너무 많이 사용되었다.","화학팽창제가 너무 많이 사용되었다.","충전용 유지가 너무 적게 사용되었다.","첨가된 물의 양이 너무 적었다."],a:1,e:"퍼프페이스트리는 유지에 의한 팽창이므로 화학팽창제가 들어가지 않음.",r:99,c:"ingredients"},
{q:"머랭의 최적 pH는?",o:["5.5 ~ 6.0","6.5 ~ 7.0","7.5 ~ 8.0","8.5 ~ 9.0"],a:0,e:"머랭의 최적 pH는 7.5~8.0(약알칼리성)이다.\n• 주석산 크림을 사용하면 pH를 조절하여 안정적인 머랭을 만든다.",r:93,c:"ingredients"},
{q:"반죽형 케이크의 특징으로 틀린 것은?",o:["반죽의 비중이 낮다.","주로 화학 팽창제를 사용한다.","유지의 사용량이 많다.","식감이 부드럽다."],a:0,e:"반죽형 케이크는 유지가 많아 비중이 높다(낮지 않다).\n• 비중이 낮은 것은 거품형(스펀지) 케이크의 특징이다.",r:90,c:"manufacturing"},
{q:"이탈리안 머랭에 대한 설명 중 틀린 것은?",o:["흰자를 거품으로 치대어 30%정도의 거품을 만들고 설탕을 넣으면서 50%정도의 머랭을 만든다.","흰자가 신선해야 거품이 튼튼하게 나온다.","뜨거운 시럽에 머랭을 한꺼번에 넣고 거품을 올린다.","강한 불에 구워 착색하는 제품을 만드는데 알맞다."],a:2,e:"머랭에 뜨거운 시럽(설탕100 : 물30 넣고 114~118도 로 끓인것)을 조금씩 나누어 넣으면서 거품(머랭)을 올린다(만든다)",r:99,c:"ingredients"},
{q:"케이크 도넛을 튀긴 후 과도한 흡유 현상이 일어나는 이유가 아닌 것은?",o:["긴 반죽시간","과다한 팽창제 사용","낮은 튀김 온도","반죽의 수분이 과다"],a:0,e:"1. 설탕, 유지, 팽창제의 사용량이 많음 2. 튀김 시간이 길었음 3. 글루텐이 부족 4. 믹싱시간이 짧음 5. 반죽에 수준이 많음 6. 튀김온도가 낮음",r:99,c:"manufacturing"},
{q:"퐁당에 대한 설명으로 가장 적합한 것은?",o:["시럽을 214℃까지 끓인다.","20℃ 전후로 식혀서 휘젓는다.","물엿, 전화당 시럽을 첨가하면 수분 보유력을 높일 수 있다.","유화제를 사용하면 부드럽게 할 수 있다."],a:2,e:"퐁당 제조 시 물엿이나 전화당 시럽을 첨가하면 재결정을 방지하고 수분 보유력을 높일 수 있다.\n• 214℃는 너무 높고, 40~50℃에서 교반한다.",r:93,c:"ingredients"},
{q:"굽기 공정에서 일어는 변화가 아닌 것은?",o:["전분의 호화","오븐팽창(oven spring)","전분의 노화","캐러멜 반응"],a:2,e:"노화는 오븐에서 나오는 순간부터 발생한다",r:99,c:"manufacturing"},
{q:"제품의 판매가격이 1000원일 때 생산원가는 약 얼마인가? (손실율10%, 이익률20%, 부가가치세10%)",o:["580원","689원","758원","909원"],a:1,e:"판매가격 1000원에서 부가가치세 10% 제외: 1000 ÷ 1.1 ≈ 909원. 이익률 20% 제외: 909 ÷ 1.2 ≈ 758원. 손실률 10% 제외: 758 ÷ (1+0.1) ≈ 689원. 따라서 생산원가는 약 689원이다.",r:93,c:"management"},
{q:"엔젤푸드 케이크의 반죽온도가 높았을 때 일어나는 현상은?",o:["증기압을 형성하는데 걸리는 시간이 길다.","기공이 열리고 거칠다.","케이크의 부피가 작다.","케이크의 표면이 터진다."],a:1,e:"엔젤푸드 케이크의 반죽온도가 높으면 기공이 열리고 거친 조직이 된다.\n• 적정 반죽 온도에서 고운 기공과 균일한 조직을 얻을 수 있다.",r:93,c:"manufacturing"},
{q:"대량 생산 공장에서 많이 사용하는 오븐으로 정형된 반죽이 들어가는 입구와 제품이 나오는 출구가 서로 다른 오븐은?",o:["데크 오븐 (deck oven)","터널오븐(tunnel oven)","컨벡션 오븐 (convection oven)","로터리 래크 오븐 (rotary rack oven)"],a:1,e:"대량 생산 공장에서 입구와 출구가 다른 오븐은 터널오븐(tunnel oven)이다.\n• 컨베이어 벨트를 따라 반죽이 이동하면서 구워진다.",r:93,c:"manufacturing"},
{q:"식빵 600g짜리 10개를 제조할 때 발효 및 굽기·냉각 손실 등을 합하여 총 손실이 20%이고, 배합률의 합계가 150%라면 밀가루 사용량은?",o:["3kg","5kg","6kg","8kg"],a:1,e:"분할량=완제품무게/(1-굽기손실) 분할량=600/(1-0.2)= 750g 총 배합률이 150%, 베이커%에 의해 750g=150%, 500g=100%=밀가루의 무게 그러므로 500g×10=5kg",r:99,c:"manufacturing"},
{q:"어린반죽(발효부족)으로 만든 빵 제품의 특징이 아닌 것은?",o:["기공이 고르지 않고 내상의 색깔이 검다.","세포벽이 두껍고 결이 거칠다.","신 냄새가 난다.","껍질의 색상이 진하다."],a:2,e:"어린반죽(발효부족)은 기공이 고르지 않고, 세포벽이 두껍고, 껍질색이 진한 특징이 있다. 신 냄새는 과발효의 특징이다.",r:85,c:"manufacturing"},
{q:"식빵 반죽의 희망온도가 27℃일 때, 실내온도 20℃, 밀가루 온도 20℃, 마찰계수 30인 경우 사용할 물의 온도는?",o:["-7℃","3℃","11℃","18℃"],a:2,e:"사용할 물의 온도=희망온도×3-(실내온도+밀가루온도+실내온도) =27×3-(20+20+30)",r:99,c:"manufacturing"},
{q:"1차 발효과정 중 생성되는 주요 물질은?",o:["산소","탄산가스","글루텐","단백질"],a:1,e:"1차 발효과정 중 이스트에 의해 생성되는 주요 물질은 탄산가스(CO₂)와 알코올이다.",r:85,c:"manufacturing"},
{q:"제빵 시 적절한 2차 발효점은 완제품 용적의 몇 %가 가장 적당한가?",o:["40~45%","50~55%","70~80%","90~95%"],a:2,e:"2차 발효 :성형과정을 거치는 동안 불완전한 상태의 반죽을 온도 38도 전후,습도 80%전후의 발효실에 넣어 숙성시켜 좋은 외형과 식감의 제품을 얻기 위하여 제품 부피의 70~80%까지 부풀리는 작업으로 발효의 최종 단계이다.",r:99,c:"manufacturing"},
{q:"빵 굽기의 일반적인 설명으로 틀린 것은?",o:["높은 온도에서 구울 때 오버 베이킹이 된다.","고율배합의 빵은 비교적 낮은 온도에서 굽는다.","너무 뜨거운 오븐은 빵의 부피가 적고 껍질이 진하다.","잔당 함유량이 높은 어린반죽은 낮은 온도에서 굽는다."],a:0,e:"오버베이킹이란 낮은온도에서 장시간굽는것을 말한다 제과",r:99,c:"manufacturing"},
{q:"데니시 페이스트리 제조시의 설명으로 틀린 것은?",o:["소량의 덧가루를 사용한다.","발효실 온도는 유지의 융점보다 낮게 한다.","고배합 제품은 저온에서 구우면 유지가 흘러나온다.","2차 발효시간은 길게 하고, 습도는 비교적 높게 한다."],a:3,e:"데니시 페이스트리의 고배합 제품을 저온에서 구우면 유지 층이 형성되기 전에 녹아 흘러나올 수 있다. ※ 2차 발효 시 온도와 습도를 낮게 관리해야 유지 층이 유지된다.",r:75,c:"manufacturing"},
{q:"밀가루 빵에 부재료로 사용되는 사우어(sour)의 정의로 맞는 것은?",o:["밀가루와 물을 혼합하여 장시간 발효시킨 혼합물","기름에 물이 분산되어 있는 유탁액","산과 향신료의 혼합물","산화/환원제를 넣은 베이스 믹스"],a:0,e:"사우어(sour)는 밀가루와 물을 혼합하여 장시간 발효시킨 혼합물이다. 주로 호밀빵 등에 사용하여 독특한 신맛과 풍미를 더한다.",r:93,c:"ingredients"},
{q:"새로운 팬의 사용방법으로 옳은 것은?",o:["코팅되지 않은 팬은 218℃ 이하의 오븐에서 1시간 정도 굽는다.","실리콘으로 코팅된 팬은 고온으로 장시간 굽는다.","팬을 중성세제를 사용하여 씻고 물속에 보관한다.","사용 후에는 수세미로 깨끗이 씻어 이물질을 제거한다."],a:0,e:"코팅되지 않은 새 팬은 218℃ 이하의 오븐에서 1시간 정도 구워 길들인다(시즈닝).\n• 실리콘 코팅 팬은 고온 처리 불필요, 수세미 세척은 코팅 손상 우려",r:93,c:"manufacturing"},
{q:"냉동반죽법에서 동결방식으로 적합한 것은?",o:["완만동결법","자연동결법","오버나이트법","급속동결법"],a:3,e:"냉동반죽법에서는 급속동결법(-40℃ 이하)을 사용해야 이스트 세포 손상을 최소화하고 글루텐 구조를 보호할 수 있다.",r:93,c:"manufacturing"},
{q:"분할된 반죽을 둥그렇게 말아 하나의 피막을 형성토록 하는 기계는?",o:["믹서(mixer)","오버헤드 프루퍼(overhead proofer)","정형기(moulder)","라운더(rounder)"],a:3,e:"분할된 반죽을 둥그렇게 말아 하나의 피막을 형성하는 기계는 라운더(rounder)이다.\n• 정형기: 최종 모양 성형, 오버헤드 프루퍼: 중간발효",r:93,c:"manufacturing"},
{q:"중간발효의 목적이 아닌 것은?",o:["글루텐의 배열을 제대로 조절하고 가스를 발생시켜 정형하기 쉽도록","분할, 둥글리기를 거치면서 굳은 반죽을 유연하게 만들기 위해","탄력성과 신장성 회복으로 밀어 펴기 중 반죽의 찢어짐을 방지하기 위해","빵의 향에 관계하는 발효산물인 알코올, 유기산, 방향성 물질을 얻기 위해"],a:3,e:"알코올, 유기산, 방향성 물질 등 발효 산물을 생성하는 것은 본발효(1차 발효)의 목적이다. 중간발효는 분할·둥글리기로 손상된 글루텐을 회복시키고 반죽을 유연하게 만들어 성형을 쉽게 하기 위한 단계이다.",r:99,c:"manufacturing"},
{q:"빵의 포장과 냉각에 대한 설명 중 틀린 것은?",o:["빵 내부의 적정 냉각 온도는 20℃이다.","냉각 중 습도가 낮으면 껍질이 갈라지기 쉽다.","포장 목적은 수분증발 억제, 노화방지이다.","포장지는 저렴하고 위생적이어야 한다."],a:0,e:"빵 내부의 적정 냉각 온도는 35℃(20℃가 아님) 정도이다.\n• 냉각 중 습도 저하 시 껍질 갈라짐, 포장 목적은 수분증발 억제·노화방지",r:93,c:"manufacturing"},
{q:"반죽의 흡수율에 영향을 미치는 요소에 대한 설명으로 틀린 것은?",o:["단백질 1% 증가시 흡수율은 5% 증가한다.","소금을 믹싱 초기에 넣으면 수분 흡수가 적다.","설탕 증가시 흡수율은 감소한다.","손상전분 증가시 흡수율이 증가한다."],a:0,e:"단백질1% 증가시 흡수율은1.5% 증가합니다",r:99,c:"ingredients"},
{q:"정규시간이 50분이고 여유시간이 10분일 때 여유율은?",o:["10%","12%","15%","20%"],a:3,e:"여유율 = (여유시간 / 정규시간) * 100 제과",r:99,c:"manufacturing"},
{q:"전분이 호화됨에 따라 나타나는 현상이 아닌 것은?",o:["팽윤에 의한 부피팽창","방향 부동성의 손실","용해현상의 감소","점도의 증가"],a:2,e:"전분이 호화되면 팽윤(부피팽창), 방향 부동성 손실, 점도 증가가 일어난다. 용해현상은 증가(감소가 아님)한다.",r:85,c:"ingredients"},
{q:"식용유지로 튀김요리를 반복할 때 발생하는 현상이 아닌 것은?",o:["발연점 상승","유리지방산 생성","카르보닐화합물 생성","점도 증가"],a:0,e:"식용유지로 튀김을 반복하면 발연점이 하강한다(상승이 아님). 유리지방산·카르보닐화합물 생성, 점도 증가가 일어난다.",r:93,c:"ingredients"},
{q:"전란의 수분 함량은 몇% 정도인가?",o:["30~35%","50~53%","72~75%","92~95%"],a:2,e:"전란(달걀 전체)의 수분 함량은 약 72~75%이다.\n• 흰자: 약 88%, 노른자: 약 50%",r:85,c:"ingredients"},
{q:"제과용 밀가루의 단백질과 회분의 함량으로 가장 적합한 것은?",o:["단백질(%) 4~5.5, 회분(%) 0.2","단백질(%) 6~6.5, 회분(%) 0.3","단백질(%) 7~9, 회분(%) 0.4","단백질(%) 10~11, 회분(%) 0.5"],a:2,e:"제과용 밀가루(박력분)의 표준 단백질 함량은 7~9%, 회분은 약 0.4%이다.",r:85,v:0,c:"ingredients"},
{q:"포도당의 감미도가 높은 상태인 것은?",o:["결정형","수용액","β - 형","좌선성"],a:0,e:"포도당은 수용액 상태에서 감미도가 높다.\n• 결정형 α-포도당보다 수용액에서 β형과 평형을 이루어 감미도가 높아진다.",r:90,c:"ingredients"},
{q:"지방산의 이중 결합 유무에 따른 분류는?",o:["트랜스지방, 시스지방","유지, 라드","지방산, 글리세롤","포화지방산, 불포화지방산"],a:3,e:"지방산은 이중 결합의 유무에 따라 포화지방산(이중결합 없음)과 불포화지방산(이중결합 있음)으로 분류된다.",r:85,c:"nutrition"},
{q:"과당이나 포도당을 분해하여 co2 가스와 알코올을 만드는 효소는?",o:["말타아제(maltase)","인버타아제(invertase)","프로테아제(protease)","찌마아제(zymase)"],a:3,e:"찌마아제(zymase)는 효모가 가진 효소로, 과당·포도당을 분해하여 CO₂ 가스와 알코올을 생성한다.\n• 말타아제: 맥아당분해, 인버타아제: 설탕분해, 프로테아제: 단백질분해",r:93,c:"ingredients"},
{q:"시유의 탄수화물 중 함량이 가장 많은 것은?",o:["포도당","과당","맥아당","유당"],a:3,e:"시유(우유)의 탄수화물 중 가장 많은 것은 유당(lactose)으로 약 4.7%를 차지한다.",r:82,c:"ingredients"},
{q:"비중이 1.035인 우유에 비중이 1인 물을 1:1부피로 혼합하였을 때 물을 섞은 우유의 비중은?",o:["2.035","1.0175","1.035","0.035"],a:1,e:"비중 1.035인 우유와 비중 1인 물을 1:1 부피로 혼합:\n혼합 비중 = (1.035 + 1) ÷ 2 = 2.035 ÷ 2 = 1.0175",r:93,c:"manufacturing"},
{q:"아밀로그래프의 기능이 아닌 것은?",o:["전분의 점도 측정","아밀라아제의 효소능력 측정","점도를 B․U 단위로 측정","전분의 다소(多少) 측정"],a:3,e:"아밀로그래프의 기능은 전분의 호화온도 전분의 점도 아밀라아제의 활성",r:99,c:"ingredients"},
{q:"정상적인 빵 발효를 위하여 맥아와 유산을 첨가하는 물은?",o:["산성인 연수","중성인 아경수","중성인 경수","알칼리성인 경수"],a:3,e:"알칼리성인 경수는 반죽의 pH를 높여 이스트 활성을 저하시키고 발효를 방해하므로, 맥아(효소와 영양 공급)와 유산(pH를 낮춰 산성화)을 첨가하여 발효 조건을 정상화한다.",r:85,c:"ingredients"},
{q:"밀가루 반죽을 끊어질 때까지 늘려서 반죽의 신장성을 알아보는 것은?",o:["아밀로 그래프","패리노 그래프","익스텐소 그래프","믹소 그래프"],a:2,e:"패리노그래프- 흡수율, 믹싱시간, 믹싱내구성 아밀로그래프- 밀가루 점도 익스텐소그래프- 신장성(탄력성)",r:99,c:"ingredients"},
{q:"효모에 대한 설명으로 틀린 것은?",o:["당을 분해하여 산과 가스를 생성한다.","출아법(budding)으로 증식한다.","제빵용 효모의 학명은 sacchar omyces serevisiae이다.","산소의 유무에 따라 증식과 발효가 달라진다."],a:0,e:"이스트(효모)는 반죽이 발효되는동안 포도당을 분해하여 탄산가스(이산화탄소)와 알코올 생성한다",r:99,c:"ingredients"},
{q:"검류에 대한 설명으로 틀린 것은?",o:["유화제, 안정제, 점착제 등으로 사용된다.","낮은 온도에서도 높은 점성을 나타낸다.","무기질과 단백질로 구성되어 있다.","친수성 물질이다."],a:2,e:"무기질과 단백질이 아닌 탄수화물로 이루어져 있습니다",r:99,c:"nutrition"},
{q:"젤리화의 요소가 아닌 것은?",o:["유기산류","염류","당분류","펙틴류"],a:1,e:"젤리화의 3요소는 1.유기산 2.당 3.펙틴 이렇게 3가지고 염류는 아니다",r:99,c:"ingredients"},
{q:"다음 중 감미가 가장 강한 것은?",o:["맥아당","설탕","과당","포도당"],a:2,e:"감미도순 : 과당> 전화당> 설탕> 포도당> 맥아당> 갈락토오스> 유당",r:99,c:"ingredients"},
{q:"신선한 우유의 평균 ph는?",o:["12.8","10.8","6.8","3.8"],a:2,e:"신선한 우유의 평균 pH는 약 6.6~6.8이다.\n• 약산성으로 시간이 지나면 젖산균에 의해 더 산성이 된다.",r:90,c:"ingredients"},
{q:"밀가루가 75%의 탄수화물, 10%의 단백질, 1%의 지방을 함유하고 있다면 100g의 밀가루를 섭취하였을 때 얻을 수 있은 열량은?",o:["386kcal","349kcal","317kcal","307kcal"],a:1,e:"식품열량계산공식: (탄수화물의양+단백질의양)x4+(지방의양x9) (75+10)x4+(1x9)=349",r:99,c:"nutrition"},
{q:"갑작스러운 체액의 손실로 인해 일어나는 증상이 아닌 것은?",o:["심한 경우 혼수에 이르게 된다.","전해질의 균형이 깨어진다.","혈압이 올라간다.","허약, 무감각, 근육부종 등이 일어난다."],a:2,e:"갑작스러운 체액 손실 시 혈압은 떨어진다(올라가지 않는다).\n• 전해질 불균형, 혼수, 허약·무감각·근육부종이 나타난다.",r:85,c:"nutrition"},
{q:"다음 중 포화지방산을 가장 많이 함유하고 있는 식품은?",o:["올리브유","버터","콩기름","홍화유"],a:1,e:"포화지방산은 동물성이고 불포화지방산은 식물성이다.버터는 우유의 지방이므로 동물성 즉 포화지방산함유한다. 제과",r:99,c:"nutrition"},
{q:"제과 ․ 제빵의 부패요인과 관계가 먼 것은?",o:["수분함량","제품색","보관온도","ph"],a:1,e:"제과·제빵의 부패요인은 수분함량, 보관온도, pH 등이다. 제품의 색은 부패와 직접적 관계가 적다.",r:82,v:0,c:"hygiene"},
{q:"황색포도상구균이 내는 독소 물질은?",o:["뉴로톡신","솔라닌","엔테로톡신","테트로도톡신"],a:2,e:"뉴로톡신- 화학적 식중독 (납) 솔라닌-자연독에 의한 식중독 (감자발아부위) 엔테로톡신- 독소형 식중독 화농성질환 대표적 (황색 포도상구균) 테트로도톡신-자연독에 의한 식중독(복어)",r:99,c:"hygiene"},
{q:"다음 식품첨가물 중 표백제가 아닌 것은?",o:["소르빈산","과산화수소","아황산나트륨","차아황산나트륨"],a:0,e:"소르빈산은 방부제로 사용된다. 제과",r:99,c:"ingredients"},
{q:"파리 및 모기 구제의 가장 이상적인 방법은?",o:["살충제를 뿌린다.","발생원을 제거한다.","음식물을 잘 보관한다.","유충을 구제한다."],a:1,e:"파리와 모기 구제의 가장 이상적인 방법은 발생원(서식지)을 제거하는 것이다.\n• 살충제·유충 구제는 일시적, 근본적 해결은 발생원 제거이다.",r:85,c:"nutrition"},
{q:"쥐를 매개체로 전염되는 질병이 아닌 것은?",o:["돈단독증","쯔즈가무시병","신증후군출혈열(유행성출혈열)","렙토스피라증"],a:0,e:"돈단독증- 돼지에 의한 세균성 감염병",r:99,c:"hygiene"},
{q:"세균성 식중독의 일반적인 특징으로 옳은 것은?",o:["전염성이 거의 없다.","2차 감염이 빈번하다.","경구전염병보다 잠복기가 길다.","극소량의 균으로도 발생이 가능하다."],a:0,e:"세균성 식중동 1. 대량의 생균 또는 증식과정에서 생성된 독소에 의해 발병 2. 2차 감염 거의 없음 3. 경구 감염에 비해 잠복기 짧음 4. 면역성 없음",r:99,c:"hygiene"},
{q:"백색의 결정으로 감미도는 설탕의 250배이며 청량음료수, 과자류, 절임류 등에 사용되었으나 만성중독인 혈액독을 일으켜 우리나라에서는 사용이 금지된 인공 감미료는?",o:["둘신","사이클라메이트","에틸렌글리콜","파라-니트로-오르토-툴루이딘"],a:0,e:"사이클라메이트(시클라민산나트륨)는 인공 감미료로, 우리나라에서 사용이 금지되어 있다.\n※ 문제에서 감미도 250배로 설명하고 있으나, 사이클라메이트의 실제 감미도는 약 30~50배이다. 감미도 250배는 둘신(dulcin)에 해당한다.",r:78,c:"ingredients"},
{q:"식품보존료로서 갖추어야 할 요건으로 적합한 것은?",o:["공기, 광선에 안정할 것","사용방법이 까다로울 것","일시적으로 효력이 나타날 것","열에 의해 쉽게 파괴 될 것"],a:0,e:"식품보존료는 공기·광선에 안정하고, 사용이 간편하며, 지속적 효력, 열에 안정해야 한다.",r:82,c:"hygiene"},
{q:"식품의 변패 현상 중에서 그 원인이 화학적인 것은?",o:["마른 비스킷","언 고구마","멍든 사과","산패 식용유"],a:3,e:"산패 식용유는 지방의 산화에 의한 화학적 변패이다.\n• 마른 비스킷: 물리적, 언 고구마: 물리적, 멍든 사과: 물리적·생물적",r:93,c:"ingredients"},
{q:"HACCP에 대한 설명 중 틀린 것은?",o:["식품위생의 수준을 향상 시킬 수 있다.","원료부터 유통의 전 과정에 대한 관리이다.","종합적인 위생관리체계이다.","사후처리의 완벽을 추구 한다."],a:3,e:"HACCP는 예방적·사전관리 시스템이다. 사후처리가 아닌 사전 예방을 추구한다.\n• 원료~유통 전 과정 관리, 종합적 위생관리, 식품위생 수준 향상",r:90,c:"hygiene"}]},
{title:"2008년 5회",desc:undefined,questions:[{q:"찜류 또는 찜만쥬 등에 사용하는 이스트파우더의 특성이 아닌 것은?",o:["팽창력이 강하다.","제품의 색을 희게 한다.","암모니아 냄새가 날 수 있다.","중조와 산제를 이용한 팽창제이다."],a:3,e:"4번은 암모늄염 암모늄염은 산제와 중조를 혼합하여 사용하며 산제와 중조는 굽기 초기에, 암모늄염은 굽기 중간 이후에 가스를 방출한다. 암모늄염은 쿠키, 크래커나 유사 제품에 사용한다. 제품에 수분이 많으면 암모니아 향이 남을 수 있어 수분이 적은 제품에 이용하는 제한이 있다. 암모늄염은 쿠키 제품에서 단백질 구조를 변경시켜 쿠키의 퍼짐성을 좋게 한다.",r:99,c:"ingredients"},
{q:"젤리 롤 케이크를 말 때 표면이 터지는 결점을 방지하는 방법으로 잘못된 것은?",o:["덱스트린의 점착성을 이용한다.","고형질 설탕 일부를 물엿으로 대치한다.","팽창제를 다소 감소시킨다.","계란 중 노른자 비율을 증가한다."],a:3,e:"노른자 줄이고 전란을 증가시켜야 합니다. 제과",r:99,c:"ingredients"},
{q:"다음 중 고온에서 빨리 구워야 하는 제품은?",o:["파운드케이크","고율배합 제품","저율배합 제품","패닝량이 많은 제품"],a:2,e:"고온에서 빨리 구워야 하는(언더베이킹) 제품은 저율배합인 제품 <-> 저온에서 오래 구워야 하는 (오버베이킹) 제품은 고율배합인 제품",r:99,c:"manufacturing"},
{q:"쿠키 포장지의 특성으로써 적합하지 않은 것은?",o:["내용물의 색, 향이 변하지 않아야 한다.","독성 물질이 생성되지 않아야 한다.","통기성이 있어야 한다.","방습성이 있어야 한다."],a:2,e:"통기성이 있게되면 제품의 노화가 촉진됨",r:99,c:"manufacturing"},
{q:"스펀지 케이크에서 계란사용량을 감소시킬 때의 조치사항으로 잘못된 것은?",o:["베이킹 파우더를 사용한다.","물 사용량을 추가한가.","쇼트닝을 첨가한다.","양질의 유화제를 병용한다."],a:2,e:"계란 사용량을 감소시킬 때 조치사항 ①밀가루 사용량을 추가한다 ②물 사용량을 추가한다 ③베이킹 파우더를 사용한다 ④유화제를 사용한다",r:99,c:"ingredients"},
{q:"밀가루 A, B, C, D 네 가지 제품의 수분함량과 가격이 주어질 때 고형분에 대한 단가를 고려하여 어떤 밀가루를 사용하는 것이 가장 경제적인가?",o:["A","B","C","D"],a:3,e:"고형분 단가 = 가격 ÷ (1 - 수분함량)으로 계산하여 값이 가장 낮은 밀가루가 경제적이다. 주어진 수치를 적용하면 D의 고형분 단가가 가장 낮아 가장 경제적이다.",r:90,v:0,c:"ingredients"},
{q:"다음 제품 중 반죽의 비중이 가장 낮은 것은?",o:["파운드 케이크","옐로 레이어 케이크","초코렛 케이크","버터 스펀지 케이크"],a:3,e:"반죽의 비중(물 무게 대비 반죽 무게) 반죽형 > 거품형 (스펀지케이크 > 시폰, 롤 케이크)",r:99,c:"manufacturing"},
{q:"1000mL의 생크림 원료로 거품을 올려 2000mL의 생크림을 만들었다면 증량율(overrun)은 얼마인가?",o:["50%","100%","150%","200%"],a:1,e:"증량률= (휘핑 후 체적-휘핑 전 체적)/취핑 전 체적*100% = (2000-1000)/1000*100%=100%",r:99,c:"ingredients"},
{q:"초코렛의 보관온도 및 습도로 가장 알맞은 것은?",o:["온도 18℃, 습도 45%","온도 24℃, 습도 60%","온도 30℃, 습도 70%","온도 36℃, 습도 80%"],a:0,e:"초콜릿은 온도 18℃, 습도 45% 정도의 서늘하고 건조한 환경에서 보관해야 한다. 높은 온도와 습도에서는 팻블룸(fat bloom)이나 슈가블룸(sugar bloom)이 발생한다.",r:93,c:"ingredients"},
{q:"파이 제조에 대한 설명으로 틀린 것은?",o:["아래 껍질을 윗껍질 보다 얇게 한다.","껍질 가장자리에 물 칠을 한 뒤 윗 껍질을 얹는다.","위, 아래의 껍질을 잘 붙인 뒤 남은반죽을 잘라낸다.","덧가루 뿌린 면포위에서 반죽을 밀어 편 뒤 크기에 맞게 자른다."],a:0,e:"파이 제조 시 아래 껍질을 윗껍질보다 두껍게 해야 충전물의 수분을 잘 견딘다. 얇게 하면 바닥이 눅눅해지기 쉽다.",r:93,c:"manufacturing"},
{q:"도넛 글레이즈의 사용온도로 가장 적합한 것은?",o:["49℃","70%","90%","19℃"],a:0,e:"적당한 온도 45~50",r:99,c:"manufacturing"},
{q:"튀김 횟수의 증가시 튀김기름의 변화가 아닌 것은?",o:["중합도 증가","정도의 감소","산가 증가","과산화물가 증가"],a:1,e:"튀김 횟수가 증가하면 중합도 증가, 산가 증가, 과산화물가 증가 등의 변화가 일어난다. '정도의 감소'는 요오드가(iodine value) 감소, 즉 불포화도 감소를 의미하며 이는 실제로 튀김 횟수 증가 시 일어나는 변화이다. 그러나 출제 의도상 '정도의 감소'가 해당하지 않는 항목으로 분류되었다.",r:93,c:"nutrition"},
{q:"파운드케이크의 패닝은 틀 높이의 몇 % 정도까지 반죽을 채우는 것이 가장 적당한가?",o:["50%","70%","90%","100%"],a:1,e:"파운드케이크는 틀 높이의 약 70% 정도까지 반죽을 채우는 것이 적당하다. 너무 적으면 부피가 작고, 너무 많으면 넘치거나 모양이 불균일해진다.",r:95,c:"manufacturing"},
{q:"쿠키 반죽의 퍼짐성에 기여하여 표면을 크게 하는 재료는?",o:["소금","밀가루","설탕","계란"],a:2,e:"퍼짐을 크게 하는 방법 1. 반죽을 물게 2. 유지, 설탕(입자가 굵을수록 좋음) 많이 사용 3. 팽창제 사용 4. 오븐 온도 낮게",r:99,c:"ingredients"},
{q:"엔젤 푸드 케이크 반죽의 온도 변화에 따른 설명이 틀린 것은?",o:["반죽 온도가 낮으면 제품의 기공이 조밀하다.","반죽 온도가 낮으면 색상이 진하다.","반죽온도가 높으면 기공이 열리고 조직이 거칠어진다.","반죽 온도가 높으면 부피가 작다."],a:3,e:"반죽 온도가 높으면 부피가 큽니다.",r:99,c:"manufacturing"},
{q:"굽기 후 빵을 썰어 포장하기에 가장 좋은 온도는?",o:["17℃","27℃","37℃","47℃"],a:2,e:"굽기 후 빵을 썰어 포장하기에 가장 좋은 빵 속 온도는 약 37℃이다. 이 온도에서 빵이 충분히 냉각되어 형태가 안정되면서도 수분이 적절히 유지되어 썰기와 포장에 적합한 상태가 된다.",r:90,c:"manufacturing"},
{q:"중간발효에 대한 설명으로 틀린 것은?",o:["중간발효는 온도 32℃ 이내, 상대습도 75% 전후에서 실시한다.","반죽의 온도, 크기에 따라 시간이 달라진다.","반죽의 상처회복과 성형을 용이하게 하기 위함이다.","상대습도가 낮으며 덧가루 사용량이 증가한다."],a:3,e:"중간 발효는 탄력성과 신장성에는 좋은 영향을 미친다.",r:99,c:"manufacturing"},
{q:"식빵을 패닝할 때 일반적으로 권장되는 팬의 온도는?",o:["22℃","27℃","32℃","37℃"],a:2,e:"식빵 패닝 시 팬의 온도는 약 32℃가 적당하다. 너무 차가우면 반죽이 수축하고, 너무 뜨거우면 바닥이 과도하게 익는다.",r:90,c:"manufacturing"},
{q:"소금을 늦게 넣어 믹싱 시간을 단축하는 방법은?",o:["염장법","후염법","염지법","훈제법"],a:1,e:"후염법은 소금을 믹싱 후반에 넣어 초기 글루텐 형성을 빠르게 하여 전체 믹싱 시간을 단축하는 방법이다.",r:82,c:"manufacturing"},
{q:"빵제품의 껍질색이 여리고, 부스러지기 쉬운 껍질 이 되는 경우에는 가장 크게 영향을 미치는 요인은?",o:["지나친 발효","발효 부족","지나친 발죽","반죽 부족"],a:0,e:"과도한 발효(지나친 발효)가 일어나면 반죽 내 당분이 과도하게 소모되어 메일라드 반응과 캐러멜화가 약해지므로 껍질색이 여리고 옅어진다. 또한 글루텐이 약화되어 부스러지기 쉬운 껍질이 된다.",r:85,c:"manufacturing"},
{q:"500g의 오나제품 식빵 200개를 제조하려 할 때, 발효 손실이 1%, 굽기 냉각손실이 12%, 총 배합율이 180%라면 밀가루의 무게는 약 얼마인가?",o:["47kg","55kg","64kg","71kg"],a:2,e:"총 제품 무게 = 500g × 200개 = 100,000g = 100kg\n손실 보정: 총 반죽 무게 = 100kg ÷ (1-0.01) ÷ (1-0.12) ≒ 114.5kg\n총 배합율 180%에서 밀가루 100% 비율이므로,\n밀가루 = 114.5 × (100/180) ≒ 63.6kg ≒ 약 64kg",r:98,c:"manufacturing"},
{q:"데니시 페이스트리 반죽의 적정 온도는?",o:["18 ~ 22℃","26 ~ 31℃","35 ~ 39℃","45 ~ 49℃"],a:0,e:"데니시 페이스트리 반죽의 적정 온도는 18~22℃로, 유지의 가소성을 유지해야 한다.",r:85,c:"ingredients"},
{q:"픽업(pick up) 단계에서 믹싱을 완료해도 좋은 제품은?",o:["스트레이트법 식빵","스펀지/도법 식빵","햄버거빵","데니시 페이스트리"],a:3,e:"식빵류는 최종(final)단계, 햄버거빵은 렛다운(let down)단계까지 반죽하여야한다",r:99,c:"manufacturing"},
{q:"오븐 온도가 높을 때 식빵· 제품에 미치는 영향이 아닌 것은?",o:["부피가 적다.","껍질색이 진하다.","언더베이킹이 되기 쉽다.","질긴 껍질이 된다."],a:3,e:"오븐 온도가 높으면 부피가 적고, 껍질색이 진하며, 겉은 빨리 익어도 속은 덜 익는 언더베이킹이 되기 쉽다. 질긴 껍질은 오븐 온도가 낮거나 스팀이 과다할 때 나타나는 현상으로, 높은 온도의 영향이 아니다.",r:83,c:"manufacturing"},
{q:"식빵 제조시 정상보다 많은 양이 설탕을 사용했을 경우 껍질색은 어떻게 나타나는가?",o:["여리다.","진하다.","회색이 띤다.","설탕량과 무관하다."],a:1,e:"설탕 사용량이 많으면 마이야르 반응과 캐러멜화가 촉진되어 껍질색이 진해진다.",r:77,c:"manufacturing"},
{q:"냉장, 냉동, 해동, 2차 발효를 프로그래밍에 의하 여, 자동적으로 조절하는 기계는?",o:["도우 컨디셔너(Dough conditioner)","믹서 (Mixer)","라운더(Rounder)","오버헤드 프루퍼(Overhead proofer)"],a:0,e:"도우 컨디셔너는 냉장, 냉동, 해동, 2차 발효를 프로그래밍에 의해 자동으로 조절하는 기계이다.",r:82,c:"manufacturing"},
{q:"발효 손실의 원인이 아닌 것은?",o:["수분이 증발하여","탄수화물이 탄산가스로 전환되어","탄수화물이 알코올로 전환되어","재료 계량의 오차로 인해"],a:3,e:"발효 손실은 수분 증발, 탄수화물의 탄산가스 전환, 알코올 전환 등으로 발생한다. 재료 계량의 오차는 발효와 무관한 인적 요인이다.",r:93,c:"nutrition"},
{q:"냉동 반죽법에서 반죽의 냉동온도와 저장온도의범위로 가장 적합한 것은?",o:["-5℃, 0~ 4℃","-20℃, -18~0℃","-40℃, -25-18℃","-80℃, -18~0℃"],a:2,e:"냉동 반죽법에서 반죽의 냉동온도는 -40℃ 정도의 급속냉동이 적합하며, 저장온도는 -25~-18℃ 범위로 유지한다. 급속냉동으로 얼음 결정을 최소화하여 이스트와 글루텐 손상을 방지한다.",r:85,c:"hygiene"},
{q:"다음 제품 제조시 2차 발효실의 습도를 가장 낮게 유지 하는 것은?",o:["풀먼 식빵","햄버거빵","과자빵","빵 도넛"],a:3,e:"빵 도넛은 2차 발효 후 기름에 튀기므로, 표면에 수분이 많으면 기름이 튀고 제품이 퍼지는 문제가 생긴다. 따라서 2차 발효실 습도를 가장 낮게(60~65%) 유지한다.",r:82,c:"manufacturing"},
{q:"다음 중 총원가에 포함되지 않는 것은?",o:["제조설비의 감가상각비","매출원가","직원의 급료","판매이익"],a:3,e:"총 원가: 제조원가(매출원가)+판매비+일반관리비(감가상각비, 직원급료)",r:99,c:"management"},
{q:"제빵용 이스트에 의해 발효가 이루어지지 않는 당은?",o:["포도당","유당","과당","맥아당"],a:1,e:"제빵용 이스트는 포도당, 과당, 맥아당, 설탕(전화 후)을 발효시킬 수 있지만, 유당(lactose)은 발효시키지 못한다.",r:90,c:"ingredients"},
{q:"우유 성분 중 산에 의해 응고되는 물질은?",o:["단백질","유당","유지방","회분"],a:0,e:"우유의 카제인 단백질은 산에 의해 등전점(pH 4.6)에서 응고된다. 유당, 유지방, 회분은 산에 의해 응고되지 않는다.",r:90,c:"ingredients"},
{q:"밀가루의 등급은 무엇을 기준으로 하는가?",o:["회분","단백질","유지방","탄수화물"],a:0,e:"* 밀가루의 등급 특등급: 회분함량 0.3~0.4 , 효소활성도 아주 낮음 1등급: 회분함량 0.4~0.45, 효소활성도 낮음 2등급: 회분함량 0.46~0.6, 효소활성도 보통 최하: 회분함량 1.2~2.0, 효소활성도 아주 높음",r:99,c:"ingredients"},
{q:"패리노그래프 커브의 윗부분이 500B.U.에 닿는 시간을 무엇이라 하는가?",o:["반죽시간(peak time)","도달시간(arrivail time)","반죽형성시간(dough development time)","이탈시간(departure time)"],a:1,e:"패리노그래프 커브의 윗부분이 500B.U.에 처음 닿는 시간을 도달시간(arrival time)이라 한다. 반죽시간(peak time)은 최고점에 도달하는 시간이다.",r:93,c:"manufacturing"},
{q:"패리노그래프에 의한 측정으로 알 수 있는 반죽 특성과 거리가 먼 것은?",o:["반죽 형성시간","반죽의 흡수","반죽의 내구성","반죽의 효소력"],a:3,e:"페리노그래프 : 밀가루의 흡수율(단백질 흡수율, 글루텐의 질) 측정, 반죽 내구성, 시간 등을 측정",r:99,c:"nutrition"},
{q:"빈 컵의 무게가 120g 이었고, 이 컵에 물을 가득 넣었더니 250g이 되었다. 물을 빼고 우유를 넣었더니 254g 이 되었을 때 우유의 비중은 약 얼마인가?",o:["1.03","1.07","2.15","3.05"],a:0,e:"빈 컵의 무게 120g, 물든 컵 250g 1. 물든 컵(250g)- 빈 컵(120g)= 순수 물의 비중 130g 2. 우유(254g) - 순수 물(130g)= 124g 3. 124g / 빈 컵의 무게(120g)=1.03333 우유의 비중 값",r:99,c:"ingredients"},
{q:"다음 중 아미노산을 구성하는 주된 원소가 아닌 것은?",o:["탄소(C)","수소(H)","질소(N)","규소(Si)"],a:3,e:"아미노산을 구성하는 주된 원소는 탄소(C), 수소(H), 산소(O), 질소(N)이다. 규소(Si)는 아미노산 구성 원소가 아니다.",r:90,c:"nutrition"},
{q:"케이크의 제조에서 쇼트닝의 기본적인 3가지 기능에 해당하지 않는 것은?",o:["팽창기능","윤활기능","유화기능","안정기능"],a:3,e:"케이크 제조에서 쇼트닝의 기본적인 3가지 기능은 팽창기능(공기 포집), 윤활기능(글루텐 억제), 유화기능(수분·유지 결합)이다. 안정기능은 기본 3가지에 포함되지 않는다.",r:93,c:"ingredients"},
{q:"제과/제빵시 당의 기능과 가장 거리가 먼 것은?",o:["구조 형성","알칼리제","수분 보유","단맛 부여"],a:0,e:"당은 수분 보유, 단맛 부여, 캐러멜화, 발효 촉진 등의 기능을 하지만 구조 형성 기능은 하지 않는다. 제품의 구조는 주로 밀가루의 글루텐과 계란 단백질이 담당한다.",r:93,c:"ingredients"},
{q:"반죽에 사용하는 물이 연수일 때 무엇을 더 증가시켜 넣어야 하는가?",o:["과당","유당","포도당","맥아당"],a:2,e:"연수일때는 이스트푸드와 소금을 증가시킨다.",r:99,c:"ingredients"},
{q:"다음 당류 중 물에 잘 녹지 않는 것은?",o:["과당","유당","포도당","맥아당"],a:1,e:"유당(lactose)은 다른 당류에 비해 물에 잘 녹지 않는다. 과당은 가장 잘 녹고, 포도당과 맥아당도 유당보다 용해도가 높다.",r:90,c:"ingredients"},
{q:"유지 1g을 검화하는데 소용되는 수신화칼륨(KOH)의 밀리그램(mg) 수를 무엇이라고 하는가?",o:["검화가","요오드가","산가","과산화물가"],a:0,e:"검화가(saponification value)는 유지 1g을 검화하는 데 필요한 수산화칼륨(KOH)의 mg 수이다. 요오드가는 불포화도, 산가는 유리지방산, 과산화물가는 산화 정도를 나타낸다.",r:90,c:"nutrition"},
{q:"밀가루 반죽의 탄성을 강하게 하는 재료가 아닌 것은?",o:["비타민A","레몬즙","칼슘염","식염"],a:1,e:"레몬즙(구연산 등의 유기산)은 글루텐의 결합을 이완시키고 반죽을 부드럽게 하여 탄성을 약화시키므로 탄성을 강하게 하는 재료가 아니다. 칼슘염과 식염은 글루텐을 강화하고, 비타민A는 간접적으로 글루텐 강화에 기여한다.",r:93,c:"nutrition"},
{q:"계란 흰자가 360g 필요하다고 할때 전란 60g 짜리 계란은 몇 개정도 필요한가? (단, 계란 중 난백의 함량은 60%)",o:["6개","8개","10개","13개"],a:2,e:"계란 1개(60g)에서 껍질(약 12%)을 제외하면 가식부는 약 52.8g이다.\n가식부 중 난백 비율 60% = 52.8 × 0.60 ≒ 31.7g\n필요한 계란 수 = 360 ÷ 31.7 ≒ 11.4개이나, 정답이 13개이므로 껍질 비율이나 난백 비율의 46) ≒ 13개로 계산한 것이다.",r:82,c:"ingredients"},
{q:"젤리 형성의 3요소가 아닌 것은?",o:["당분","유기산","펙틴","염"],a:3,e:"젤리 형성의 3요소는 당분, 유기산(산), 펙틴이다. 염(소금)은 젤리 형성 요소가 아니다.",r:82,c:"manufacturing"},
{q:"무기질의 기능이 아닌 것은?",o:["우리 몸의 경조직 구성성분이다.","열량을 내는 열량 급원이다.","효소의 기능을 촉진시킨다.","세포의 삼투압 평형유지 작용을 한다."],a:1,e:"무기질은 열량을 내지 않는다. 열량 급원은 탄수화물(4kcal/g), 단백질(4kcal/g), 지방(9kcal/g)이다.",r:93,c:"nutrition"},
{q:"하루에 섭취하는 총에너지 중 식품이용을 위한 에너지 소모량은 평균얼마인가?",o:["10%","30%","60%","20%"],a:0,e:"기초대사량(BMR) → 전체 에너지 소모의 약 60~70% 활동에 의한 에너지 소모 → 20~30% 정도 식품 이용 에너지(NTE) → 10% 정도",r:99,c:"nutrition"},
{q:"단백질 식품을 섭취한 결과, 음식물 중의 질소량 이 0.7g,소변중의 질소량이 4g 으로 나타났을 때 이 식품의 생물가 (B.V)는 약 얼마인가?",o:["25%","36%","67%","92%"],a:2,e:"생물가(B.V) = (흡수 질소 - 소변 배설 질소) ÷ 흡수 질소 × 100으로 계산한다. 문제에서 음식물 중 질소량 0.7g은 대변 질소(미흡수분)를 의미하며, 흡수 질소와 소변 질소를 이용한 계산에서 약 67%가 산출된다.",r:95,c:"nutrition"},
{q:"정상적인건강유지를 위해 반드시 필요한 지방산으로 체내에서 합성되지 않아 식사로 공급해야하는 것은?",o:["포화지방산","불포화지방산","필수지방산","고급지방산"],a:2,e:"필수지방산은 체내에서 합성되지 않아 반드시 식사로 공급해야 하는 지방산으로, 리놀레산, 리놀렌산, 아라키돈산 등이 있다.",r:93,c:"nutrition"},
{q:"유용한 장내세균의 빌육을 도와 정장작용을 하는 당류는?",o:["설탕","유당","맥아당","셀로비오스"],a:1,e:"유당은 장내 유산균(비피더스균 등)의 발육을 도와 정장작용을 한다. 설탕, 맥아당, 셀로비오스는 이러한 기능이 약하다.",r:90,v:0,c:"ingredients"},
{q:"밀가루의 표백과 숙성을 위하여 사용하는 첨가물은?",o:["개량제","유화제","점착제","팽창제"],a:0,e:"밀가루 개량제: 밀가루의 표백과 숙성시간을 단축시키고, 제빵효과의 저해물질을 파괴시켜 품질을 개량하는 것",r:99,c:"ingredients"},
{q:"다음 전염병 중 잠복기가 가장 짧은 것은?",o:["후천성 면역결핍증","광견병","콜레라","매독"],a:2,e:"콜레라는 잠복기가 수 시간~5일로 매우 짧다. AIDS, 광견병, 매독은 잠복기가 수주~수년으로 길다.",r:82,c:"hygiene"},
{q:"결핵균의 병원체를 보유하는 주된 동물은?",o:["쥐","소","말","돼지"],a:1,e:"결핵균은 주로 소를 통해 사람에게 전파될 수 있다. 우형결핵균(M. bovis)이 소에서 유래한다.",r:82,c:"hygiene"},
{q:"식품의 부패를 판정하는 화학적 방법은?",o:["관능시험","생균수 측정","온도측정","TMA 측정"],a:3,e:"TMA(트리메틸아민) 측정은 식품 부패를 판정하는 화학적 방법이다. 관능시험은 관능적 방법, 생균수 측정은 미생물학적 방법이다.",r:93,c:"hygiene"},
{q:"다음 중 미생물의 증식에 대한 설명으로 틀린 것은?",o:["한 종류의 미생물이 많이 번식하면 다른 미생물의 번식이 억제될 수 있다.","수분 함량이 낮은 저장 곡류에서도 미생물은 증식할 수 있다.","냉장온도에서는 유해미생물이 전혀 증식할 수 없다.","70℃에서도 생육이 가능한 미생물이 있다."],a:2,e:"냉장온도(0~10℃)에서도 저온균(리스테리아, 여시니아 등) 같은 유해미생물이 증식할 수 있다. '전혀 증식할 수 없다'는 틀린 설명이다.",r:93,c:"hygiene"},
{q:"팥앙금류, 잼, 케첩, 식품 가공품에 사용하는 보존료는?",o:["소르빈산","데히드로초산","프로피온산","파라옥시 안식향산 부틸"],a:0,e:"소르빈산은 팥앙금류, 잼, 케첩 등 식품가공품에 널리 사용되는 보존료이다. 데히드로초산은 버터·치즈, 프로피온산은 빵류에 주로 사용된다.",r:93,c:"ingredients"},
{q:"미나마타병은 어떤 중금속에 오염된 어패류의 섭취시 발생되는가?",o:["수은","카드뮴","납","아연"],a:0,e:"수은(Hg) 미나마타병",r:99,c:"hygiene"},
{q:"알레르기성 식중독의 원인이 될 수 있는 가능성이 가장 높은 식품은?",o:["오징어","꽁치","갈치","광어"],a:1,e:"히스타민에 의한 알레르기성 식중독은 등푸른 생선(꽁치, 고등어, 정어리 등)에서 주로 발생한다.",r:82,c:"hygiene"},
{q:"식중독과 관련된 내용의 연결이 옳은 것은?",o:["포도상구균 식중독 : 심한 고열을 수반","살모넬라 식중독 : 높은 치사율","클로스트리디움 보툴리늄 식중독 : 독소형 식중독","장염비브리오 식중독 : 주요 원인은 민물고기생식"],a:2,e:"클로스트리디움 보툴리늄 식중독은 균이 생성한 독소(뉴로톡신)를 섭취하여 발생하는 독소형 식중독이다. 포도상구균도 독소형이지만 심한 고열은 수반하지 않는다.",r:93,c:"hygiene"},
{q:"노로바이러스 식중독에 대한 설명으로 틀린 것은?",o:["완치되면 바이러스를 방출하지 않으므로 임상증상이 나타나지 않으면 바로 일상생활로 복귀한다.","주요증상은 설사, 복통, 구토 등이다.","양성환자의 분변으로 오염된 물로 씻은 채소류에 의해 발생할 수 있다.","바이러스는 물리/화학적으로 안정하며 일반 환경에서 생존이 가능하다."],a:0,e:"노로바이러스는 완치 후에도 2주 이상 바이러스를 배출할 수 있으므로, 증상이 사라져도 바로 일상생활에 복귀하면 안 된다.",r:90,c:"hygiene"}]},
{title:"2009년 1회",desc:undefined,questions:[{q:"거품형케이크 반죽을 믹싱 할 때 가장 적당한 믹싱법은?",o:["중속→저속→고속","저속→고속→중속","저속→중속→고속→저속","고속→중속→저속→고속"],a:2,e:"거품형 케이크(스펀지케이크 등)의 믹싱 순서는 저속 → 중속 → 고속 → 저속입니다. 저속으로 재료를 균일하게 혼합한 뒤 중속·고속으로 충분히 기포를 형성하고, 마지막 저속으로 큰 기포를 정리하여 균일하고 안정된 기포 구조를 만듭니다.",r:99,c:"manufacturing"},
{q:"40g의 계량컵에 물을 가득 채웠더니 240g이었다. 과자 반죽을 넣고 달아보니 220g 이 되었다면 이 반죽의 비중은 얼마인가?",o:["0.85","0.9","0.92","0.95"],a:1,e:"(220-40)/(240-40)=180/200=9/10=0.9",r:99,c:"manufacturing"},
{q:"고율배합 케이크와 비교하여 저율배합 케이크의 특징은?",o:["믹싱 중 공기 혼입량이 많다.","굽는 온도가 높다.","반죽의 비중이 낮다.","화학팽창제 사용량이 적다."],a:1,e:"저율배합은 밀가루의 양이 설탕보다 높아 공기혼입이 적고 비중이 높다 고온단시간굽는다",r:99,c:"manufacturing"},
{q:"가수분해나 산화에 의하여 튀김기름을 나쁘게 만드는 요인이 아닌 것은?",o:["온도","물","산소","비타민 E(토코페롤)"],a:3,e:"튀김기름의 산패를 막기 위하여 항산화제를 사용하며, 주로 비타민 E(토코페롤)가 항산화제로 사용된다. 제과",r:99,c:"nutrition"},
{q:"과일케이크를 만들 때 과일이 가라앉는 이유가 아닌 것은?",o:["강도가 약한 밀가루를 사용한 경우","믹싱이 지나치고 큰 공기방울이 반죽에 남는 경우","진한 속색을 위한 탄산수소나트륨을 과다로 사용한 경우","시럽에 담근 과일의 시럽을 배수시켜 사용한 경우"],a:3,e:"시럽에 담근 과일의 시럽을 배수시켜 사용하면 과일 표면의 수분이 줄어 반죽과의 결합이 좋아져 가라앉는 것을 방지한다.",r:93,c:"ingredients"},
{q:"가압하지 않은 찜기의 내부 온도로 가장 적합한 것은?",o:["65℃","99℃","150℃","200℃"],a:1,e:"가압하지 않은 찜기의 내부 온도는 99도입니다 *^.^*",r:99,c:"manufacturing"},
{q:"계란의 일반적인 수분함량은?",o:["50%","75%","88%","90%"],a:1,e:"전란(흰자+노른자 합계)의 평균 수분함량은 약 75%이다. 난백은 약 88%, 난황은 약 50%이며, 일반적으로 계란 전체의 수분함량을 묻는 경우 75%가 정답이다.",r:92,c:"ingredients"},
{q:"고율배합의 제품을 굽는 방법으로 알맞은 것은?",o:["저온 단시간","고온 단시간","저온 장시간","고온 장시간"],a:2,e:"고율 배합=저온 장시간 저율 배합=고온 단시간 제과",r:99,c:"manufacturing"},
{q:"거품을 올린 흰자에 뜨거운 시럽을 첨가하면서 고속으로 믹싱하여 만드는 아이싱은?",o:["마시멜로 아이싱","콤비네이션 아이싱","초콜릿 아이싱","로얄 아이싱"],a:0,e:"마시멜로 아이싱은 거품 올린 흰자에 뜨거운 시럽(114~118℃)을 넣으면서 고속 믹싱하여 만든다. 이탈리안 머랭 방식과 유사한 제조법이다.",r:93,c:"manufacturing"},
{q:"다음 중 케이크의 아이싱에 주로 사용되는 것은?",o:["마지팬","프랄린","글레이즈","휘핑크림"],a:3,e:"케이크 아이싱에 주로 사용되는 것은 휘핑크림으로, 생크림을 거품 올려 케이크 표면에 바르거나 장식하는 데 널리 활용된다. 마지팬은 아몬드 반죽 장식용, 프랄린은 견과류 가공품, 글레이즈는 표면 코팅에 사용된다.",r:93,c:"manufacturing"},
{q:"다음 중 반죽 온도가 가장 낮은 것은?",o:["퍼프 페이스트리","레이어 케이크","파운드 케이크","스펀지 케이크"],a:0,e:"퍼프 페이스트리는 유지의 가소성을 유지해야 하므로 반죽 온도가 약 15~20℃로 가장 낮다. 케이크류는 23~27℃ 정도이다.",r:93,c:"manufacturing"},
{q:"같은 용적의 팬에 같은 무게의 반 죽을 패닝하였을 경우 부피가 가장 작은 제품은?",o:["시퐁 케이크","레이어 케이크","파운드 케이크","스펀지 케이크"],a:2,e:"반죽의 비중은 높지만, 패닝 후에 부피가 작아지는 제품은 파운드케이크이다.",r:99,c:"manufacturing"},
{q:"공장설비구성의 설명으로 적합하지 않은 것은?",o:["공장시설설비는 인간을 대상으로 하는 공학이다.","공장시설은 식품조리과정의 다양한 작업을 여러 조건에 따라 합리적으로 수행하기 위한 시설이다.","설계디자인은 공간의 할당. 물리적 시설. 구조의 생김새, 설비가 갖춰진 작업장을 나타내 준다.","각 시설은 그 시설이 제공하는 서비스의 형태에 기본적인 어떤 기능을 지니고 있지 않다."],a:3,e:"공장설비는 효율적 작업을 위한 기능적 시설이어야 한다. '각 시설이 기본적인 기능을 지니고 있지 않다'는 설명은 틀렸다.",r:90,c:"nutrition"},
{q:"거품형 제품 제조시 가온법의 장점이 아닌 것은?",o:["껍질색이 균일하다.","기포시간이 단축된다.","기공이 조밀하다.","계란의 비린내가 감소된다."],a:2,e:"가온법의 장점은 기포시간 단축, 껍질색 균일, 계란 비린내 감소 등이다. 기공이 조밀한 것은 가온법의 장점이 아니라, 오히려 기공이 균일하고 부드러운 것이 특징이다.",r:85,c:"manufacturing"},
{q:"과자 반죽의 온도 조절에 대한 설명으로 틀린 것은?",o:["반죽 온도가 낮으면 기공이 조밀하다.","반죽온도가 낮으면 부피가 작아지고 식감이 나쁘다.","반죽 온도가 높으면 기공이 열리고 큰 구멍이 생긴다.","반죽 온도가 높은 제품은 노화가 느리다."],a:3,e:"반죽 온도가 높은 제품은 수분 증발이 빨라 오히려 노화가 빨라진다. 노화가 느린 것은 높은 온도의 장점이 아니다.",r:93,c:"manufacturing"},
{q:"같은 밀가루로 식빵 불란서빵을 만들 경우 , 식빵의 가수율이 63%였다면 불란서빵의 가수율을 얼마나 하는 것이 가장 좋은가?",o:["61%","63%","65%","67%"],a:0,e:"불란서빵은 설탕·유지 등 부재료가 없어 글루텐이 수분을 더 적게 흡수하므로, 식빵보다 가수율을 약 2% 낮게 설정한다. 식빵 63%이면 불란서빵은 약 61%가 적당하다.",r:95,c:"ingredients"},
{q:"1차 발효 중에 펀치를 하는 이유는?",o:["반죽의 온도를 높이기 위해","이스트를 활성화시키기 위해","효소를 활성화시키기 위해","탄산가스 축적을 증가시키기 위해"],a:1,e:"1차 발효 중 반죽에 펀치를 함으로써 탄산가스는 배출 시키며 산소를 공급하여 이스트와 활성화를 도와준다. 제과",r:99,c:"manufacturing"},
{q:"건포도 식빵을 만들 때 건포도를 전처리하는 목적이 아닌 것은?",o:["수분을 제거하여 건포도의 보존성을 높인다.","제품내에서의 수분 이동을 억제한다.","건포도의 풍미를 되살린다.","씹는 촉감을 개선한다."],a:0,e:"건포도 전처리의 목적은 수분 보충으로 촉감 개선, 풍미 회복, 반죽 내 수분 이동 억제이다. 수분을 제거하여 보존성을 높이는 것은 목적이 아니다.",r:93,c:"hygiene"},
{q:"제빵시 팬오일로 유지를 사용할 때 다음 중 무엇이 높은 것을 선택하는 것이 좋은가?",o:["가소성","크림성","발연점","비등점"],a:2,e:"팬오일은 높은 온도에서 사용되므로 발연점이 높은 유지를 선택해야 한다. 발연점이 낮으면 연기가 나고 유해물질이 생성된다.",r:90,c:"ingredients"},
{q:"비상스트레이법 반죽의 가장 적합한 온도는?",o:["15℃","20℃","30℃","40℃"],a:2,e:"비상스트레이트법은 발효 시간을 단축하기 위해 이스트와 설탕을 증량하고 반죽온도를 약 30℃로 높게 유지한다. 높은 온도로 이스트 활성을 극대화하여 빠른 발효를 유도하는 것이 핵심이다.",r:90,c:"manufacturing"},
{q:"2번 굽기를 하는 제품은?",o:["스위트 롤","브리오슈","빵도넛","브라운 앤 서브 롤"],a:3,e:"브라운 앤 서브 롤은 1차로 저온에서 구워 색이 나지 않게 한 후, 판매 직전 2차로 고온에서 갈색이 나도록 굽는 2번 굽기의 대표적인 제품이다.",r:93,c:"manufacturing"},
{q:"2차 발효가 과다할 때 일어나는 현상이 아닌 것은?",o:["옆면이 터진다.","색상이 여리다.","신 냄새가 난다.","오븐에서 주저앉기 쉽다."],a:0,e:"2차 발효가 과다하면 당 소모로 색상이 여리고, 유기산 생성으로 신 냄새가 나며, 글루텐 약화로 오븐에서 주저앉기 쉽다. 옆면이 터지는 것은 2차 발효 부족 시 나타나는 현상이므로 과다 발효의 결과가 아니다.",r:83,c:"manufacturing"},
{q:"노화를 지연시키는 방법으로 올바르지 않은 것은?",o:["방습포장재를 사용한다.","다량의 설탕을 첨가한다.","냉장 보관시킨다.","유화제를 사용한다."],a:2,e:"냉장보관 온도는 노화를 촉진시키는 온도 노화를 지연시키는 온도는 냉동보관입니다",r:99,c:"ingredients"},
{q:"같은 조건의 반죽에 설탕, 포도당, 과당을 같은 농도로 첨가했다고 가정할 때 마이야르 반응속도를 촉진시키는 순서대로 나열된 것은?",o:["설탕>포도당>과당","과당>설탕>포도당","과당>포도당>설탕","포도당>과당>설탕"],a:2,e:"감미도 순서는 과당>전화당>설탕(자당)>포도당>맥아당>갈락토오스>유당 순서가 맞지만 마이야르 반응은 과당>포도당>설탕 순이므로 정답은 3번 입니다.",r:99,c:"ingredients"},
{q:"10명의 인원이 50초당 70개의 과자를 만들 때 7시간에는 몇 개를 생산하는가?",o:["3528개","35280개","24500개","245000개"],a:1,e:"7시간을 초로 환산하면 7 × 3600 = 25,200초입니다. 50초당 70개를 생산하므로 25,200 ÷ 50 = 504회 생산이 가능하며, 504 × 70 = 35,280개를 생산할 수 있습니다.",r:99,c:"nutrition"},
{q:"다음 중 냉동, 냉장, 해동, 2차 발효를 프로그래밍에 의해 자동적으로 조절하는 기계는?",o:["스파이럴 믹서","도우 컨디셔너","로타리 래크오븐","모레르식 락크 발효실"],a:1,e:"도우 컨디셔너는 냉동, 냉장, 해동, 2차 발효를 프로그래밍으로 자동 조절하는 기계이다.",r:85,c:"manufacturing"},
{q:"1인당 생산가치는 생산가치를 무엇으로 나누어 계산하는가?",o:["인원수","시간","임금","원재료비"],a:0,e:"1인당 생산가치 = 생산가치 / 인원",r:99,c:"management"},
{q:"갓 구워낸 빵을 식혀 상온으로 낮추는 냉각에 관한 설명으로 틀린 것은?",o:["빵 속의 온도를 35~40℃로 낮추는 것이다.","곰팡이 및 기타 균의 피해를 막는다.","절단. 포장을 용이하게 한다.","수분함량을 25%로 낮추는 것이다."],a:3,e:"수분함량을 38% 로 낮추는 것이다",r:99,c:"hygiene"},
{q:"냉동 페이스트리를 구운 후 옆면이 주저앉는 원인으로 틀린 것은?",o:["토핑물이 많은 경우","잘 구어지지 않은 경우","2차 발효가 과다한 경우","해동온도가 2 ~5℃로 낮은 경우"],a:3,e:"냉동 페이스트리를 해동 시킬 때, 냉장이 아닌 고온에서 해동시키면 옆면이 주저 않는다. 제과",r:99,c:"manufacturing"},
{q:"둥글리기 (Rounding) 공정에 대한 설명으로 틀린 것은?",o:["덧가루, 분할기 기름을 최대로 사용한다.","손분할, 기계 분할이 있다.","분할기의 종류는 제품에 적합한 기종을 선택한다.","둥글리기가 과정 중 큰 기포는 제거되고 반죽온도가 균일화된다."],a:0,e:"둥글리기가 작업대에 손바닥으로 원그리듯 돌리는건데 덧가루 넘 많으면 안 돌아가고 쉬익쉬익하면서 걍 이동함 그리고 기름 많으면 질어질걸",r:99,c:"manufacturing"},
{q:"지방은 무엇이 축합되어 만들어지는가?",o:["지방산과 글리세롤","지방산과 올레인산","지방산과 리놀레인산","지방산과 팔미틴산"],a:0,e:"지방은 지방산과 글리세롤이 에스테르 결합(축합반응)하여 만들어진다.",r:85,c:"nutrition"},
{q:"거친 설탕 입자를 마쇄하여 고운 눈금을 가진 체로 통과 시킨 후 덩어리 방지제를 첨가한 제품은?",o:["액당","분당","전화당","포도당"],a:1,e:"분당(Powdered sugar)은 거친 설탕을 마쇄하여 고운 체로 통과시킨 후 전분 등 덩어리 방지제를 첨가한 제품이다.",r:90,c:"ingredients"},
{q:"장기간의 저장성을 자녀야 하는 건과자용 쇼트닝에서 가장 중요한 제품 특성은?",o:["가소성","안정성","신장성","크림가"],a:1,e:"장기간 저장성이 필요한 건과자용 쇼트닝에서는 산패에 대한 안정성이 가장 중요하다.",r:82,v:0,c:"ingredients"},
{q:"젤리를 제조하는데 당분 60~65% , 펙틴 1.0 ~1.5% 일 때 가장 적합한 pH는?",o:["pH1.0","pH3.2","pH7.8","pH10.0"],a:1,e:"젤리 제조 시 당분 60~65%, 펙틴 1.0~1.5%일 때 pH 3.2 전후가 적합하다. pH가 너무 낮으면 과도한 겔화, 너무 높으면 겔화가 안 된다.",r:85,c:"manufacturing"},
{q:"가공하지 않은 초콜릿(비터 초콜릿:Bitter Chocolate)40% 에 포함되어 있는 가장 적합한 코코아의 양은?",o:["20%","25%","30%","35%"],a:1,e:"비터 초콜릿 40%에 포함된 코코아의 양은 약 25%이다. 비터 초콜릿은 코코아 매스(코코아+코코아버터)와 설탕으로 구성되며, 코코아 매스 중 코코아 고형분 비율을 적용하면 40% 중 약 25%가 코코아에 해당한다.",r:80,c:"ingredients"},
{q:"강력분과 박력분의 성상에서 가장 중요한 차이점은?",o:["단백질 함량이 차이","비타민 함량의 차이","지방 함량의 차이","전분 함량의 차이"],a:0,e:"강력분과 박력분의 가장 중요한 차이점은 단백질(글루텐) 함량이다. 강력분 11~13%, 박력분 7~9%이다.",r:93,c:"ingredients"},
{q:"다음 유제품 중 일반적으로 100g당 열량을 가장 많이 내는 것은?",o:["요구르트","탈지분유","가공치즈","시유"],a:2,e:"가공치즈는 지방 함량이 높아 100g당 열량이 가장 높다. 탈지분유는 지방이 제거되었고, 시유와 요구르트는 수분이 많다.",r:93,c:"nutrition"},
{q:"계란에 대한 설명 중 옳은 것은?",o:["계란 노른자에 가장 많은 것은 단백질이다.","계란 흰자는 대부분이 물이고 그 다음 많은 성분은 지방질이다.","계란 껍질은 대부분 탄산칼슘으로 이루어져 있다.","계란은 흰자보다 노른자 중량이 더 크다."],a:2,e:"계란 껍질은 대부분 탄산칼슘(약 94%)으로 이루어져 있다. 노른자에 가장 많은 것은 지방(약 33%), 흰자에 많은 것은 수분과 단백질이다.",r:93,c:"nutrition"},
{q:"건조이스트는 같은 중량을 사용할 생이스트 보다 활성이 약 몇 배 더 강한가?",o:["2배","5배","7배","10배"],a:0,e:"건조이스트는 수분이 제거되어 같은 중량의 생이스트보다 활성이 약 2배 더 강하다.",r:82,c:"ingredients"},
{q:"다음 중 발효시간을 단축시키는 물은?",o:["연수","경수","염수","알카리수"],a:0,e:"연수는 미네랄 함량이 낮아 이스트의 삼투압 부담이 적고 반죽을 부드럽게 하여 발효가 빠르게 진행된다. 반면 경수는 미네랄이 글루텐을 강화하여 발효를 다소 지연시킬 수 있다.",r:82,c:"ingredients"},
{q:"믹싱시간, 믹싱내구성, 흡수율 등 반죽의 배합이나 혼합을 위핸 기초 자료를 제공하는 것은?",o:["아밀로그래프(Amylograph)","익스텐소그래프(Extensograph)","패리노그래프(Farinograph)","알베오그래프(Alveograph)"],a:2,e:"패리노그래프는 믹싱시간, 믹싱내구성, 흡수율 등 반죽의 물리적 특성을 측정하여 배합과 혼합을 위한 기초 자료를 제공한다.",r:93,c:"manufacturing"},
{q:"?-아밀라아제의설명으로 틀린 것은?",o:["전분이나 덱스트린을 맥아당으로 만든다.","아밀로오스의 말단에서 시작하여 포도당 2분자씩을 끊어가면서 분해한다.","전분의 구조가 아밀로펙틴인 경우 약 52%까지만 가수분해 한다.","액화효소 또는 내부 아밀라아제라고도 한다."],a:3,e:"β-아밀라아제는 당화효소(외부 아밀라아제)이다. 액화효소(내부 아밀라아제)는 α-아밀라아제의 별칭이므로 이 설명이 틀렸다.",r:92,v:0,c:"ingredients"},
{q:"다음 중 발효할 때 유산(젖산)을 생성하는 당은?",o:["유당","설탕","과당","포도당"],a:0,e:"유당(락토스)은 유산균(Lactobacillus)에 의해 직접 발효되어 유산(젖산)을 생성한다. 유당은 젖산 발효의 주요 기질로, 빵 반죽 내 유제품에서 유래한 유당이 유산균의 작용으로 젖산으로 전환된다.",r:90,c:"ingredients"},
{q:"다음 혼성주 중 오렌지 성분을 원료로 하여 만들지 않는 것은?",o:["그랑 마르니에(Grand Marnier)","마라스키노(Maraschino)","쿠앵트로(Cointreau)","큐라소(Curacao)"],a:1,e:"마라스키노는 체리혼성주",r:99,c:"ingredients"},
{q:"과실이 익어감에 따라 어떤 효소의 작용에 의해 수용성펙틴이 생성되는가?",o:["펙틴리가아제","아밀라아제","프로토펙틴가수분해효소","브로멜린"],a:2,e:"과실이 익어감에 따라 프로토펙틴가수분해효소(protopectinase)의 작용으로 불용성 프로토펙틴이 수용성 펙틴으로 변한다.",r:93,c:"nutrition"},
{q:"비타민의 결핍 증상이 잘못 짝지어진 것은?",o:["비타민 B₁- 각기병","비타민 C - 괴혈병","비타민 B₂- 야맹증","나이아신 - 펠라그라"],a:2,e:"비타민 B2 : 성장촉진비타민, 항구각성 비타민 야맹증 : 비타민 A 결핍시 나타나는 증상",r:99,c:"nutrition"},
{q:"글리세롤 1분자와 지방산 1분자가 결합한 것은?",o:["트리글리세라이드(triglyceride)","디글리세라이드(diglyceride)","모노글리세라이드(monoglyceride)","펜토스(pentose)"],a:2,e:"글리세롤 1분자와 지방산 1분자가 결합한 것은 모노글리세라이드이다. 디글리세라이드는 2분자, 트리글리세라이드는 3분자 결합이다.",r:93,c:"nutrition"},
{q:"지방의 연소와 합성이 이루어지는 장기는?",o:["췌장","간","위장","소장"],a:1,e:"지방의 연소(분해)와 합성이 주로 이루어지는 장기는 간이다. 간은 지방 대사의 중심 기관이다.",r:82,c:"nutrition"},
{q:"D-glucose와 D-mannose의 관계는?",o:["anomer","epimer","동소체","라세믹체"],a:1,e:"D-glucose와 D-mannose는 C-2 위치의 입체배치만 다른 에피머(epimer) 관계이다. 아노머는 환상 구조의 C-1 위치가 다른 것이다.",r:93,c:"manufacturing"},
{q:"성인의 에너지적정비율의 연결이 옳은 것은?",o:["탄수화물: 30~55%","단백질: 7~20%","지질: 5~10%","비타민: 30~40%"],a:1,e:"성인의 에너지적정비율은 탄수화물 55~65%, 단백질 7~20%, 지질 15~30%이다.",r:85,c:"nutrition"},
{q:"미생물에 의해 주로 단백질이 변화되어 악취. 유해물질을 생성하는 현상은?",o:["발효(Fermentation)","부패(Putrefaction)","변패(Deterioration)","산패(Rancidity)"],a:1,e:"*부패 : 단백질 성분이 혐기성 세균에 의한 분해과정에서 악취와 유해물질을 생성하는 현상 *변배 : 탄수화물, 지방 식품이 미생물의 분해 작용으로 냄새나 맛이 변화하는 현상 *산패 : 지방이 산소와 결합하여 산화되어 악취나 변색이 일어나는 현상(미생물 변화가 아님)",r:99,c:"hygiene"},
{q:"다음 중 채소를 통해 감염되는 기생충은?",o:["광절열두조충","선모충","회충","폐흡충"],a:2,e:"회충은 오염된 채소를 통해 감염되는 기생충이다. 광절열두조충은 민물고기, 선모충은 돼지고기, 폐흡충은 민물 가재·게를 통해 감염된다.",r:90,c:"hygiene"},
{q:"감영형 식중독에 해당되지 않는 것은?",o:["살모넬라균 식중독","포도상구균 식중독","병원성대장균 식중독","장염비브리오균 식중독"],a:1,e:"포도상구균 식중독은 독소형 식중독으로 감염형이 아니다. 살모넬라, 병원성대장균, 장염비브리오는 감염형 식중독이다.",r:93,v:0,c:"hygiene"},
{q:"경구전염병과 비교할 때 세균성 식중독의 특징은?",o:["2차 감염이 잘 일어난다.","경구전염병보다 잠복기가 길다.","발병 후 면역이 매우 잘 생긴다.","많은 양이 균으로 발병한다."],a:3,e:"세균성 식중독은 경구전염병에 비해 2차 감염이 적고, 잠복기가 짧으며, 면역이 잘 생기지 않고, 많은 양의 균으로 발병한다.",r:93,c:"hygiene"},
{q:"산화방지제로 쓰이는 물질이 아닌 것은?",o:["중조","BHT","BHA","세사몰"],a:0,e:"중조는 팽창제 제빵",r:99,c:"ingredients"},
{q:"과산화 수소의 사용 목적으로 알맞은 것은?",o:["보존료","발색제","살균료","산화방지제"],a:2,e:"과산화수소는 살균료로 사용된다. 보존료, 발색제, 산화방지제와는 다른 용도이다.",r:82,c:"hygiene"},
{q:"경구전염병의 예방대책에 대한 설명으로 틀린 것은?",o:["건강유지와 저항력의 향상에 노력한다.","의식전환 운동, 계몽활동. 위생교육 등을 정기적으로 실시한다.","오염이 의심되는 식품은 폐기한다.","모든 예방접종은 1회만 실시한다."],a:3,e:"예방접종은 질병에 따라 추가 접종이 필요하므로 '모든 예방접종은 1회만 실시한다'는 틀린 설명이다.",r:85,c:"hygiene"},
{q:"동물에게 유산을 일으키며 사람에게는 열병을 나타내는 인수공통전염병은?",o:["탄저병","리스테리아증","돈단독","브루셀라증"],a:3,e:"탄저병-조리하지 않은 수육을 섭취했을 경우 감염 리스테리아증 - 식육,어패류,치즈,야채를 섭취했을 경우 감염 돈단독- 주로 돼지에 의해 감염 브루셀라증은 초식이나 육식 동물에게 발병하여 유산을 일으킴. 사람에게는 특징적인 파상열(열성질환)을 보인다.",r:99,c:"hygiene"},
{q:"단백질을 많이 함유한 식품의 주된 변질현상은?",o:["부패","발효","산패","갈변"],a:0,e:"단백질이 많은 식품은 미생물에 의해 부패되기 쉽다. 발효는 탄수화물, 산패는 지방의 변질이다.",r:82,c:"nutrition"},
{q:"식중독 발생의 주요 경로인 배설물-구강-오염경로를 차단하기 위한 방법으로 가장 적합한 것은?",o:["손 씻기 등 개인위생 지키기","음식물 철저히 가열하기","조리 후 빨리 섭취하기","남은 음식물 냉장 보관하기"],a:0,e:"배설물-구강 오염경로를 차단하기 위한 가장 기본적인 방법은 손 씻기 등 개인위생을 지키는 것이다.",r:85,v:0,c:"hygiene"}]},
{title:"2009년 2회",desc:undefined,questions:[{q:"파이 껍질이 질기고 단단하였다, 그 원인이 아닌 것은?",o:["강력분을 사용하였다.","반죽시간이 길었다.","밀어 펴기를 덜하였다.","자투리 반죽을 많이 썼다."],a:2,e:"껍질이 단단하고 질긴 이유: 1. 강력분 사용 2. 반죽 시간과 휴지 시간이 부족하였을 경우 3. 지나치게 반죽하고 밀어 폈을 경우 4. 자투리 반죽을 많이 썼을 경우 제과",r:99,c:"manufacturing"},
{q:"다음 쿠키 증 반죽형이 아닌 것은?",o:["드롭 쿠키","스냅 쿠키","쇼트브레드 쿠키","스펀지 쿠키"],a:3,e:"스펀지 쿠키는 거품형 쿠키로 달걀의 기포력을 이용한다. 드롭, 스냅, 쇼트브레드 쿠키는 반죽형이다.",r:85,v:0,c:"manufacturing"},
{q:"도넛에 묻힌 설탕이 녹는 현상(발한)을 감소시키기 위한 조치로 틀린 것은?",o:["도넛에 묻히는 설탕의 양을 증가시킨다.","충분히 냉각시킨다.","냉각 중 환기를 많이 시킨다.","가급적 짧은 시간 동안 튀긴다."],a:3,e:"도넛 발한(설탕이 녹는 현상)을 방지하려면 충분한 냉각, 환기, 적정 설탕량이 필요하다. 튀김 시간을 짧게 하면 도넛 내부 수분이 많이 남아 표면으로 수분이 이동하여 설탕이 더 잘 녹으므로 발한 감소에 도움이 되지 않는다.",r:90,c:"manufacturing"},
{q:"총 사용물량 500g, 수돗물 온도 20℃, 사용할 물 온도 14℃일 때, 얼음사용량은?",o:["30g","32g","34g","36g"],a:0,e:"얼음사용량 = [사용할물량 * (수돗물온도 - 사용할물온도)] / 80 + 수돗물온도 얼음사용량 = [500g * (20도 - 14도)] / 80 + 20 = (500 * 6) / 100 = 3000 / 100 = 30",r:99,c:"manufacturing"},
{q:"퍼프 페이스트리 제조 시 팽창이 부족하여 부피가 빈약해지는 결점의 원인에 해당하지 않는 것은?",o:["반죽의 휴지가 길었다.","밀어 펴기가 부적절하였다.","부적절한 유지를 사용하였다.","오븐의 온도가 너무 높았다"],a:0,e:"퍼프 페이스트리 팽창 부족의 원인은 부적절한 밀어 펴기, 부적절한 유지, 오븐 온도가 낮을 때 등이다. 반죽의 휴지가 길면 글루텐이 충분히 이완되어 오히려 층 형성에 도움이 되므로 팽창 부족의 원인이 아니다.",r:90,c:"manufacturing"},
{q:"다음 중 제과 생산관리에서 제1차 관리 3대 요소가 아닌 것은?",o:["사람(Man)","재료(Material)","방법(Method)","자금(Money)"],a:2,e:"방법, 시설, 시간, 시장은 2차 관리에 해당된다.",r:99,c:"management"},
{q:"데커레이션(decoration) 케이크의 장식에 사용되는 분당의 성분은?",o:["포도당","설탕","과당","전화당"],a:1,e:"분당(powdered sugar)은 설탕(자당)을 미세하게 분쇄한 것으로, 주성분은 설탕이다. 데커레이션 케이크의 장식이나 아이싱에 녹기 쉽고 매끄러운 질감을 위해 사용한다.",r:90,c:"ingredients"},
{q:"반죽의 비중과 관계가 가장 적은 것은?",o:["제품의 부피","제품의 기공","제품의 조직","제품의 점도"],a:3,e:"반죽의 비중은 제품의 부피, 기공, 조직에 직접적인 영향을 미친다. 점도는 반죽의 물리적 성질로 비중과는 직접적 관련이 적다.",r:93,c:"manufacturing"},
{q:"다음 중 비용적이 가장 큰 제품은?",o:["파운드케이크","레이어 케이크","스펀지케이크","식빵"],a:2,e:"스펀지 케이크 5.08cm3/g 식빵 3.3~4.0cm3/g 레이어 케이크 2.96cm3/g 파운드케이크 2.4cm3/g",r:99,c:"manufacturing"},
{q:"젤리 롤 케이크 반죽 굽기에 대한 설명으로 틀린 것은?",o:["두껍게 편 반죽은 낮은 온도에서 굽는다.","구운 후 철판에서 꺼내지 않고 냉각시킨다.","양이 적은 반죽은 높은 온도에서 굽는다.","열이 식으면 압력을 가해 수평을 맞춘다."],a:1,e:"롤 케이크는 구운 후 즉시 팬에서 꺼낸다. 완제품이 찐득거리는 것, 수축하는 것, 말기 시 표면이 터지는 것을 방지할 수 있다.",r:99,c:"manufacturing"},
{q:"다음의 머랭(meringue) 중에서 설탕을 끓여서 시럽으로 만들어 제조하는 것은?",o:["이탈리안 머랭","스위스 머랭","냉제 머랭","온제 머랭"],a:0,e:"이탈리안 머랭은 설탕을 118~121℃로 끓여 시럽으로 만든 후 거품 올린 흰자에 부어 제조한다. 스위스 머랭은 중탕, 냉제 머랭은 흰자에 설탕을 직접 넣어 만든다.",r:93,c:"ingredients"},
{q:"튀김기름의 품질을 저하시키는 요인으로만 나열된 것은?",o:["수분, 탄소, 질소","수분, 공기, 반복가열","공기, 금속, 토코페롤","공기, 탄소, 세사몰"],a:1,e:"기름의 4대 적은 온도(열), 수분(물), 공기(산소), 이물질 외 철 등이다.",r:99,c:"nutrition"},
{q:"머랭 (meringue) 을 만드는 주요 재료는?",o:["달걀흰자","전란","달걀노른자","박력분"],a:0,e:"머랭의 주요 재료는 달걀흰자와 설탕이다. 달걀흰자의 기포성을 이용하여 만든다.",r:85,c:"ingredients"},
{q:"완제품 440g인 스펀지케이크 500개를 주문 받았다. 굽기 손실이 12%라면, 준비해야 할 전체 반죽 량은?",o:["125kg","250kg","300kg","600kg"],a:1,e:"전체 반죽량 = 완제품 무게 ÷ (1 - 굽기 손실율) × 수량\n= 440g ÷ (1-0.12) × 500 = 440 ÷ 0.88 × 500 = 500 × 500 = 250,000g = 250kg",r:93,c:"manufacturing"},
{q:"푸딩을 제조할 때 경도의 조절은 어떤 재료에 의하여 결정되는가?",o:["우유","설탕","겨란","소금"],a:2,e:"푸딩의 경도는 계란(단백질)에 의해 결정된다. 계란 단백질이 열에 응고되면서 푸딩의 굳기를 조절한다.",r:82,c:"ingredients"},
{q:"빵의 포장재에 대한 설명으로 틀린 것은?",o:["방수성이 있고 통기성이 있어야 한다.","포장을 하였을 때 상품의 가치를 높여야 한다.","값이 저렴해야 한다.","포장 기계에 쉽게 적용할 수 있어야 한다."],a:0,e:"포장지의 조건 단가가 낮아야함 방수성이 있고, 통기성이 없어야함 포장시 제품이 파손되지 않아야하고, 포장 기계에 쉽게 적용할수 있어야함 제품과 접촉했을 시 유해물질이 함유되어있지 않도록 위생적이여야함",r:99,c:"manufacturing"},
{q:"식빵 제조시 부피를 가장 크게 하는 쇼트닝의 적정한 비율은?",o:["4~6%","8~11%","13~16%","18~20%"],a:0,e:"기본 배합(%) : 밀가루 100, 물 60~64, 설탕 4~7, 쇼트닝 3~4, 이스트 2~3 등",r:99,c:"manufacturing"},
{q:"스트레이트법에 의한 제빵 반죽시 보통 유지를 첨가하는 단계는?",o:["픽업 단계","클린업 단계","발전 단계","렛 다운 단계"],a:1,e:"스트레이트법에서 유지는 글루텐이 어느 정도 형성된 클린업 단계에서 첨가한다. 픽업 단계는 재료가 막 뭉쳐지는 초기 단계이다.",r:93,c:"manufacturing"},
{q:"정형기(Moulder)의 작동 공정이 아닌 것은?",o:["둥글리기","밀어펴기","말기","봉하기"],a:0,e:"정형기(Moulder)의 작동 공정은 밀어펴기, 말기, 봉하기이다. 둥글리기(rounding)는 라운더(Rounder)의 기능으로, 정형기의 공정에 포함되지 않는다.",r:80,c:"manufacturing"},
{q:"제빵시 적량보다 많은 분유를 사용했을 때의 결과 중 잘못된 것은?",o:["양옆면과 바닥이 움푹 들어가는 현상이 생김","껍질색은 캐러멜화에 의하여 검어짐","모서리가 예리하고 터지거나 슈레드가 적음","세포벽이 두꺼우므로 황갈색을 나타냄"],a:0,e:"분유 과다 사용 시 껍질색이 캐러멜화로 짙어지고, 모서리가 예리해지며, 내부 세포벽이 두꺼워진다. 양옆면과 바닥이 움푹 들어가는 현상은 분유 과다가 아닌 다른 원인(발효 부족, 수분 과다 등)에 의해 발생하므로 잘못된 설명이다.",r:93,c:"nutrition"},
{q:"냉동 반죽법의 장점이 아닌 것은?",o:["소비자에게 신선한 빵을 제공할 수 있다.","운동, 배달이 용이하다.","가스 발생력이 향상된다.","다품종 소량생산이 가능하다."],a:2,e:"냉동반죽의 장점은? 1.계획생산이 가능하다. 2.생산성향상,재고관리용이 3.인건비절감,다품종소량생산가능 4.가맹점의 시설투자비 감소",r:99,c:"manufacturing"},
{q:"다음 중 생산관리의 목표는?",o:["재고, 출고, 판매의 관리","재고, 납기, 출고의 관리","납기, 재고, 품질의 관리","납기, 원가, 품질의 관리"],a:3,e:"생산관리의 목표는 납기(적시 생산), 원가(비용 절감), 품질(품질 확보)의 관리이다.",r:77,c:"management"},
{q:"둥글리기의 목적이 아닌 것은?",o:["글루텐의 구조와 방향정돈","수분 흡수력 증가","반죽의 기공을 고르게 유지","반죽 표면에 얇은 막 형성"],a:1,e:"둥글리기 목적 1. 절단면의 점착성 감소 2. 표피를 형성하여 탄력 유지 3. 가스보유력 유지 4. 글루텐 구조정돈 5. 반죽의 기공을 고르게 유지",r:99,c:"ingredients"},
{q:"표준 스펀지/ 도법에서 스펀지 발효시간은?",o:["1시간~2시간 30분","3시간~4시간 30분","5시간~6시간","7시간~8시간"],a:1,e:"표준 스펀지/도법에서 스펀지 반죽의 발효시간은 3시간~4시간 30분이다.",r:85,c:"manufacturing"},
{q:"단백질 함량이 2% 증가된 강력밀가루 사용시 흡수율의 변화의 가장 적당한 것은?",o:["2% 감소","1.5% 증가","3% 증가","4.5% 증가"],a:2,e:"밀가루 단백질 함량 1% 증가 시 흡수율은 약 1.5% 증가한다. 따라서 단백질 2% 증가 시 흡수율은 1.5% × 2 = 3% 증가한다.",r:92,c:"ingredients"},
{q:"정형하여 철판에 반죽을 놓을 때 , 일반적 사용시 흡수율의 변화로 가장 적당한 것은?",o:["약10℃","25℃","32℃","55℃"],a:2,e:"정형 후 철판에 반죽을 놓을 때 일반적으로 팬 온도는 약 32℃가 적당하다.",r:82,c:"manufacturing"},
{q:"2% 이스트를 사용했을 때 최적 발효시간이 120분이라면 2.2%의 이스트를 사용했을 때의 예상발효시간은?",o:["130분","109분","100분","90분"],a:1,e:"이스트량과 발효시간은 반비례 관계이다.\n2% × 120분 = 2.2% × x분\nx = 2 × 120 ÷ 2.2 ≒ 109분",r:93,c:"ingredients"},
{q:"빵굽기 과정에서 오븐스프링(oven spring)에 의한 반죽부피의 팽창 정도로 가장 적당한 것은?",o:["본래 크기의 약 1/2 까지","본래 크기의 약 1/3 까지","본래 크기의 약 1/5 까지","본래 크기의 약 1/6 까지"],a:1,e:"오븐 스프링은 반죽이 오븐에서 열을 받아 가스가 팽창하면서 부피가 급격히 커지는 현상으로, 일반적으로 본래 크기의 약 1/3 정도까지 팽창하는 것이 적당하다.",r:85,c:"manufacturing"},
{q:"스펀지법에서 스펀지 반죽의 가장 적합한 반죽 온도는?",o:["13~15 ℃","18~20 ℃","23~25 ℃","30~32℃"],a:2,e:"스펀지법에서 스펀지 반죽의 적합한 온도는 23~25℃이다.",r:85,c:"manufacturing"},
{q:"일반적인 빵 제조시 2차 발효실의 가장 적합한 온도는?",o:["25~30 ℃","30~35 ℃","35~40 ℃","45~50 ℃"],a:2,e:"일반적인 빵 제조 시 2차 발효실의 가장 적합한 온도는 35~40℃이다. 이 온도 범위에서 이스트 활성이 최대화되어 반죽이 충분히 팽창하며, 상대습도는 75~85%를 유지한다.",r:90,c:"manufacturing"},
{q:"제빵에 가장 적합한 물의 경도는?",o:["0~60 ppm","120~180 ppm","180~360 ppm","360 ppm 이상"],a:1,e:"제빵 시 가장 적합한 물의 경도는 120~180ppm 미만의 아경수가 적합하다",r:99,c:"ingredients"},
{q:"전분의 호화 현상에 대한 설명으로 틀린 것은?",o:["전분의 종류에 따라 호화 특성이 달라진다.","전분현탁액에 적당량의 수산화나트륨(NaOH)을 가하면 가열하지 않아도 호화 돌 수 있다.","수분이 적을수록 호화가 촉진된다.","알칼리성일 때 호화가 촉진된다."],a:2,e:"전분은 수분이 충분할수록 호화가 잘 된다. 수분이 적으면 호화가 억제된다.",r:85,c:"ingredients"},
{q:"다음 중 신선한 달걀의 특징은?",o:["난각 표면에 광택이 없고 선명하다.","난각 표면이 매끈하다.","난각에 광택이 았다.","난각 표면에 기름기가 있다."],a:0,e:"신선한 달걀은 난각 표면이 거칠고 광택이 없으며 선명하다. 오래된 달걀은 큐티클 층이 마모되어 표면이 매끄럽고 광택이 생기므로, 광택이 없고 선명한 것이 신선도의 지표이다.",r:93,c:"manufacturing"},
{q:"밀가루의 단백질 함량이 증가하면 패리노그래프 흡수율은 증가하는 경향을 보인다. 밀가루의 등급이 낮을수록 패리노그래프에 나타나는 현상은?",o:["흡수율은 증가하나 반죽시간과 안정도는 감소한다.","흡수율은 감소하고 반죽시간과 안정도는 감소한다.","흡수율은 증가하나 반죽시간과 안정도는 변화가 없다.","흡수율은 감소하나 반죽시간과 안정도는 변화가 없다."],a:0,e:"밀가루 등급이 낮을수록 회분과 단백질이 많아 흡수율은 증가하지만, 글루텐의 질이 떨어져 반죽시간과 안정도는 감소한다.",r:93,c:"ingredients"},
{q:"물 100g 에 설탕 25g을 녹이면 당도는?",o:["20%","30%","40%","50%"],a:0,e:"당도=설탕/설탕+물*100",r:99,c:"ingredients"},
{q:"밀가루의 일반적인 자연숙성 기간은?",o:["1~2주","2~3개월","4~5개월","5~6개월"],a:1,e:"밀가루의 일반적인 자연숙성 기간은 약 2~3개월이다. 이 기간 동안 산화에 의해 밀가루의 제빵 적성이 향상된다.",r:93,c:"ingredients"},
{q:"식품향료에 대한 설명 중 틀린 것은?",o:["자연향료는 자연에서 채취한 후 추출, 정재, 농축, 분리 과정을 거쳐 얻는다.","합성향료는 석유 및 석탄류에 포함되어 있는 방향성유기물질로부터 합성하여 만든다.","조합향료는 천연향료와 합성향료를 조합하여 양자 간의 문제점을 보완한 것이다.","식품에 사용하는 향료는 첨가물이지만, 품질, 규격 및 사용법을 존수하지 않아도 된다."],a:3,e:"식품향료는 식품첨가물로서 품질, 규격 및 사용법을 반드시 준수해야 한다. '준수하지 않아도 된다'는 틀린 설명이다.",r:90,c:"ingredients"},
{q:"유지에 알칼리를 가할 때 일어나는 반응은?",o:["가수분해","비누화","에스테르화","산화"],a:1,e:"유지에 알칼리(NaOH, KOH)를 가하면 비누화(saponification) 반응이 일어나 비누와 글리세롤이 생성된다.",r:90,c:"ingredients"},
{q:"압착효모(생이스트)의 일반적인 고형분 함량은?",o:["10%","30%","50%","60%"],a:1,e:"압착효모(생이스트)의 수분함량은 약 68~73%이므로 고형분은 약 27~32%이다.",r:84,c:"ingredients"},
{q:"초콜릿을 탬퍼링한 효과에 에 대한 설명중 틀린 것은?",o:["입안에서의 용해성이 나쁘다.","광택이 좋고 내부 조직이 조밀하다.","팻 브롬(fat bloom)이 일어나지 않는다.","안정한 결정이 않고 결정형이 일정하다."],a:0,e:"초콜릿 템퍼링의 효과는 광택 좋음, 내부 조직 조밀, 팻블룸 방지, 안정한 결정형이다. 입안에서의 용해성이 좋아야 하며, '나쁘다'는 틀린 설명이다.",r:93,v:0,c:"ingredients"},
{q:"분유의 종류에 대한 설명으로 틀린 것은?",o:["혼합분유 : 연유에 유청을 가하여 분말화 한 것","전지분유 : 원유에서 수분을 제거 하여 분말화 한 것","탈지분유 : 탈지유에서 수분을 제거하여 분말화 한 것","가당분유 : 원유에 당류를 가하여 분말화 한 것"],a:0,e:"혼합분유는 연유에 유청을 가하여 분말화한 것이 아니라, 탈지분유에 유지방 등을 혼합하여 만든 제품이다. 연유는 원유를 농축한 것으로 혼합분유의 원료가 아니므로 잘못된 설명이다.",r:85,c:"ingredients"},
{q:"밀가루를 체로 쳐서 사용하는 이유와 가장 거리가 먼 것은?",o:["불순물 제거","공기의 혼입","재료 분산","표피색 개선"],a:3,e:"밀가루를 체로 치는 이유는 불순물 제거, 공기 혼입, 재료 분산이다. 표피색 개선은 체로 치는 것과 관계없다.",r:93,c:"ingredients"},
{q:"제빵에 사용되는 효모와 가장 거리가 먼 효소는?",o:["프로테아제","셀룰라아제","인버타아제","말타아제"],a:1,e:"제빵용 효모에는 인버타아제, 말타아제, 지마아제, 프로테아제 등의 효소가 있다. 셀룰라아제(섬유소 분해효소)는 효모에 없다.",r:93,c:"nutrition"},
{q:"튀김기름을 해치는 4대 적이 아닌 것은?",o:["온도","포도당","공기","항산화제"],a:3,e:"튀김기름의 4대 적. ① 공기(산소) ②이물질 ③온도(반복가열) ④수분",r:99,c:"ingredients"},
{q:"제과에 많이 쓰이는 \"럼주\"의 원료는?",o:["옥수수 전분","포도당","당밀","타피오카"],a:2,e:"럼주의 원료는 사탕수수의 당밀(molasses)이다.",r:75,c:"ingredients"},
{q:"아래의 쌀과 콩에 대한 설명 중 ()에 알맞은 것은? 쌀에는 라이신(lysine)이 부족하고 콩에는 메티오닌(methionine)이 부족하다. 이것을 쌀과 콩단백질의 (　)이라 한다.",o:["제한 아미노산","필수 아미노산","불필수 아미노산","아미노산 불균형"],a:0,e:"쌀에 부족한 라이신과 콩에 부족한 메티오닌은 각각의 제한 아미노산이다.",r:85,v:0,c:"nutrition"},
{q:"이당류에 속하는 것은?",o:["유당","갈락토오스","과당","포도당"],a:0,e:"유당(lactose)은 포도당과 갈락토오스로 구성된 이당류이다. 갈락토오스, 과당, 포도당은 단당류이다.",r:82,c:"ingredients"},
{q:"제과, 제빵제조시 사용되는 버터에 포함된 지방의 기능이 아닌 것은?",o:["에너지의 급원식품이다.","체온유지에 관여한다.","항체를 생성하고 효소를 만든다.","음식에 막아 향미를 준다."],a:2,e:"버터의 지방은 에너지 급원, 체온 유지에 관여한다. 항체 생성과 효소를 만드는 것은 단백질의 기능이다.",r:82,c:"nutrition"},
{q:"체내에서 사용한 단백질은 주로 어떤 경로를 통해 배설되는가?",o:["호흡","소변","대변","피부"],a:1,e:"체내에서 사용한 단백질은 아미노산으로 분해된 후 질소는 요소로 전환되어 주로 소변(신장)을 통해 배설된다.",r:82,c:"nutrition"},
{q:"순수한 지방 20g이 내는 열량은?",o:["80kcal","140kcal","180kcal","200kcal"],a:2,e:"지방 1g=9kcalX20g=180kcal 제빵",r:99,c:"nutrition"},
{q:"어떤 첨가물의 LD50의 값이 작을 때의 의미로 옳은 것은?",o:["독성이 크다.","독성이 적다.","저장성이 나쁘다.","저장성이 좋다."],a:0,e:"LD50(반수치사량) 값이 작다는 것은 적은 양으로도 절반이 사망한다는 의미로 독성이 크다.",r:85,c:"ingredients"},
{q:"식품위생 검사의 종류로 틀린 것은?",o:["화학적 검사","관능 검사","혈청학적 검사","물리학적 검사"],a:2,e:"식품위생 검사에는 화학적 검사, 관능 검사, 물리학적 검사, 미생물학적 검사 등이 있다. 혈청학적 검사는 의학적 진단법이다.",r:93,c:"hygiene"},
{q:"인수공통 전염병의 예방조치로 바람직하지 않은 것은?",o:["우유의 멸균처리를 철저히 한다.","이환된 동물의 고기는 익혀서 먹는다.","가축의 예방접종을 한다.","외국으로부터 유입되는 가축은 항구나 공항 등에서 검역을 철저히 한다."],a:1,e:"인수공통 전염병 예방을 위해 이환된 동물의 고기는 폐기하거나 완전 소각해야 하며, 익혀 먹는 것은 바람직한 예방조치가 아니다.",r:93,c:"hygiene"},
{q:"테트로도톡신(tetrodotoxin)은 어떤 식중독의 원인 물질인가?",o:["조개 식중독","버섯 식중독","복어 식중독","감자 식중독"],a:2,e:"복어-테트로도톡신 독버섯-무스카린 감자-솔라닌 모시조개-베네루핀 섭조개-삭시톡신",r:99,c:"hygiene"},
{q:"산양, 양, 돼지, 소에게 감염되면 유산을 일으키고, 인체 감염시 고열이 주기적으로 일어나는 인수 공통 전염병은?",o:["광우병","공수병","파상열","신증후군출혈열"],a:2,e:"파상열(브루셀라증)은 산양, 양, 돼지, 소 등에서 유산을 일으키고, 인체 감염 시 주기적인 고열(파상열)이 특징인 인수공통감염병이다.",r:90,c:"hygiene"},
{q:"식품의 관능을 만족시키기 위해 첨가하는 물질은?",o:["강화제","보존제","발색제","이형제"],a:2,e:"발색제는 식품의 색을 선명하게 하여 관능을 만족시키기 위해 첨가하는 물질이다.",r:82,c:"ingredients"},
{q:"경구전염병에 속하지 않는 것은?",o:["장티푸스","말라리아","세균성 이질","콜레라"],a:1,e:"말라리아는 모기에 의해 전파되는 전염병으로 경구전염병이 아니다. 장티푸스, 세균성 이질, 콜레라는 경구전염병이다.",r:93,c:"hygiene"},
{q:"다음 중 곰팡이독과 관계가 없는 것은?",o:["파툴린(patulin)","아플라톡신(aflatoxin)","시트리닌(citrinin)","고시풀(gossypol)"],a:3,e:"고시폴-식물성 식중독",r:99,c:"hygiene"},
{q:"대장균의 일반적인 특성에 대한 설명으로 옳은 것은?",o:["분변오염의 지표가 된다.","경피전염병을 일으킨다.","독소형 식중독을 일으킨다.","발효식품 제조에 유용한 세균이다."],a:0,e:"대장균은 분변오염의 지표가 되는 세균이다. 식품의 위생 상태를 판단하는 지표로 사용된다.",r:85,c:"hygiene"},
{q:"다음 중 감염형 식중독을 일으키는 것은?",o:["보톨리누스균","살모넬라균","포도상구균","고초균"],a:1,e:"* 감염형이란 세균이 증식하는 병원균을 섭취 후 발병함. 살모넬라균의 원인식품은 닭, 오리, 계란 등(계란 껍질 만질 때 주의) * 독소형은 균 증식시 생성되는 독성 물질을 섭취 후 발병 포도상구균, 보톨리누스균, 세레우스균, 웰치스균 등",r:99,c:"hygiene"}]},
{title:"2009년 4회",desc:undefined,questions:[{q:"어떤 과자반죽의 비중을 측정하기 위하여 다음과 같이 무게를 알았다면 이 반죽의 비중은? (단, 비중컵＝50g, 비중컵＋물＝250g, 비중컵＋반죽＝170g)",o:["0.40","0.60","0.68","1.47"],a:1,e:"비중 = (비중컵+반죽 - 비중컵) ÷ (비중컵+물 - 비중컵)\n= (170-50) ÷ (250-50) = 120 ÷ 200 = 0.60",r:93,c:"manufacturing"},
{q:"일반적으로 강력분으로 만드는 것은?",o:["소프트 롤케이크","스펀지케이크","엔젤푸드케이크","식빵"],a:3,e:"강력분-식빵,빵류.. 중력분-면류.다목적 박력분-케익,쿠키. 제과",r:99,c:"manufacturing"},
{q:"흰자를 거품내면서 뜨겁게 끓인 시럽을 부어 만든 머랭은?",o:["냉제머랭","온제머랭","스위스머랭","이탈리안머랭"],a:3,e:"냉제머랭 (프렌치머랭) : 차가운 상태의 흰자를 휘핑해 거품을 내는것, 설탕을 한번에 넣지않고 조금씩 나누어 휘핑친다 온제머랭 = 스위스머랭 : 흰자에 설탕을 넣은 후 중탕을하면서 휘핑. 케이크 크림으로 적합",r:99,c:"ingredients"},
{q:"케이크 제품 평가시 외부적 특성이 아닌 것은?",o:["부피","껍질","균형","방향"],a:3,e:"케이크 제품의 외부적 특성은 부피, 껍질, 균형 등이다. 방향(향)은 내부적 특성에 해당한다.",r:82,c:"manufacturing"},
{q:"케이크 도넛의 제조방법으로 올바르지 않은 것은?",o:["정형기로 찍을 때 반죽손실이 적도록 찍는다.","정형 후 곧바로 튀긴다.","덧가루를 얇게 사용한다.","튀긴 후 그물망에 올려놓고 여분의 기름을 배출시킨다."],a:1,e:"튀기기 전 실온에서 10분간 휴지(팽창도움,모양 균형) 시킨다",r:99,c:"manufacturing"},
{q:"반죽 비중에 대한 설명으로 옳지 않은 것은?",o:["비중이 높으면 부피가 작아진다.","비중이 낮으면 부피가 커진다.","비중이 낮으면 기공이 열려 조직이 거칠어진다.","비중이 높으면 기공이 커지고 노화가 느리다."],a:3,e:"비중이 높으면 반죽이 무겁고 기공이 작고 조밀하며 노화가 빨라진다. '기공이 커지고 노화가 느리다'는 틀린 설명이다.",r:93,c:"manufacturing"},
{q:"다음 설명 중 기공이 열리고 조직이 거칠어지는 원인이 아닌 것은?",o:["크림화가 지나쳐 많은 공기가 혼입되고 큰 공기 방울이 반죽에 남아있다.","기공이 열리면 탄력성이 증가되어 거칠고 부스러지는 조직이 된다.","과도한 팽창제는 필요량 이상의 가스를 발생하여 기공에 압력을 가해 기공이 열리고 조직이 거칠어진다.","낮은 온도의 오븐에서 구우면 가스가 천천히 발생하여 크고 열린 기공을 만든다."],a:1,e:"기공이 열리면 탄력성이 감소되어 거칠고 부스러지는 조직이 된다. '탄력성이 증가된다'는 틀린 설명이다.",r:85,c:"manufacturing"},
{q:"퍼프 페이스트리를 제조할 때 주의할 점으로 틀린 것은?",o:["성형한 반죽을 장기간 보관하려면 냉장하는 것이 좋다.","파치(scrap pieces)가 최소로 되도록 정형한다.","충전물을 넣고 굽는 반죽은 구멍을 뚫고 굽는다.","굽기 전에 적정한 최종 휴지를 시킨다."],a:0,e:"냉장이 아니라 냉동을 하는 것이 좋습니다.",r:99,c:"manufacturing"},
{q:"다음 쿠키 반죽 중 가장 묽은 반죽은?",o:["밀어 펴서 정형하는 쿠키","마카롱 쿠키","판에 등사하는 쿠키","짜는 형태의 쿠키"],a:2,e:"쿠키 반죽은 제형에 따라 수분 함량이 다릅니다. 밀어 펴는 반죽(roll-out)은 단단하고, 짜는 형태(드롭쿠키)는 중간 묽기이며, 판에 등사하는(스프레드) 쿠키는 유동성이 가장 높아 틀에 붓거나 펴서 성형하는 가장 묽은 반죽입니다. 마카롱 쿠키는 아몬드 분말 기반으로 별도의 반죽 분류에 속합니다.",r:99,c:"manufacturing"},
{q:"공장 주방설비 중 작업의 효율성을 높이기 위한 작업테이블의 위치로 가장 적당한 것은?",o:["오븐 옆에 설치한다.","냉장고 옆에 설치한다.","발효실 옆에 설치한다.","주방의 중앙부에 설치한다."],a:3,e:"작업테이블은 주방의 중앙부에 설치하여 모든 설비에 접근하기 쉽게 해야 효율성이 높다.",r:85,c:"manufacturing"},
{q:"반죽온도 조절에 대한 설명 중 틀린 것은?",o:["파운드케이크의 반죽온도는 23℃가 적당하다.","버터 스펀지케이크(공립법)의 반죽온도는 25℃가 적당하다.","사과 파이반죽의 물 온도는 38℃가 적당하다.","퍼프 페이스트리의 반죽 온도는 20℃가 적당하다."],a:2,e:"사과파이반죽의 물온도는 18~20도이다",r:99,c:"manufacturing"},
{q:"스펀지케이크의 굽기 공정 중에 나타나는 현상이 아닌 것은?",o:["공기의 팽창","전분의 호화","밀가루의 혼합","단백질의 응고"],a:2,e:"스펀지케이크의 굽기 공정에서는 공기 팽창, 전분 호화, 단백질 응고 등이 일어난다. 밀가루의 혼합은 믹싱 단계에서 이루어지며 굽기 공정의 현상이 아니다.",r:93,c:"ingredients"},
{q:"언더 베이킹(under baking)이란?",o:["낮은 온도에서 장시간 굽는 방법","높은 온도에서 단시간 굽는 방법","윗불을 낮게, 밑불을 높게 굽는 방법","윗불을 낮게, 밑불을 낮게 굽는 방법"],a:1,e:"언더 베이킹(under baking)은 높은 온도에서 단시간 굽는 방법으로, 겉은 빨리 익지만 속이 덜 익어 내부가 끈적하고 주저앉는 결과를 초래한다.",r:85,c:"manufacturing"},
{q:"캐러멜 커스타드 푸딩에서 캐러멜 소스는 푸딩컵의 어느 정도 깊이로 붓는 것이 적합한가?",o:["0.2cm","0.4cm","0.6cm","0.8cm"],a:0,e:"캐러멜 커스타드 푸딩에서 캐러멜 소스는 푸딩컵 바닥에 약 0.2cm 깊이로 얇게 붓는 것이 적합하다. 너무 두껍게 부으면 단맛이 지나치게 강해지고 불균형한 맛이 날 수 있다.",r:85,c:"manufacturing"},
{q:"다음 중 산 사전처리법에 의한 엔젤푸드케이크 제조공정에 대한 설명으로 틀린 것은?",o:["흰자에 산을 넣어 머랭을 만든다.","설탕 일부를 머랭에 투입하여 튼튼한 머랭을 만든다.","밀가루와 분당을 넣어 믹싱을 완료한다.","기름칠이 균일하게 된 팬에 넣어 굽는다."],a:3,e:"흰자에 산을 넣어 머랭을 만든다. 설탕 일부를 머랭에 투입해 튼튼하게 만든다. 밀가루와 분당을 넣어 믹싱을 완료한다. 이형제로 물을 사용한다.",r:99,c:"ingredients"},
{q:"냉동반죽(frozen dough)을 만들 때 정상반죽에서의 양보다 증가시키는 것은?",o:["물","소금","이스트","환원제"],a:2,e:"냉동반죽은 냉동·해동 과정에서 이스트가 손상되므로 정상반죽보다 이스트 사용량을 증가시킨다.",r:82,c:"manufacturing"},
{q:"스펀지에서 드롭 또는 브레이크 현상이 일어나는 가장 적당한 시기는?",o:["반죽의 약 1.5배 정도 부푼 후","반죽의 약 2~3배 정도 부푼 후","반죽의 약 4~5배 정도 부푼 후","반죽의 약 6~7배 정도 부푼 후"],a:2,e:"스펀지에서 드롭(브레이크) 현상은 반죽이 약 4~5배 정도 부푼 후 일어나는 것이 적당하다. 이 시점은 스펀지 발효가 최적 상태에 도달하여 가스 생성이 최고조에 이른 후 가스 보유력이 한계에 달한 때이다.",r:85,c:"manufacturing"},
{q:"이형유에 관한 설명 중 틀린 것은?",o:["틀을 실리콘으로 코팅하면 이형유 사용을 줄일 수 있다.","이형유는 발연점이 높은 기름을 사용한다.","이형유 사용량은 반죽무게에 대하여 0.1~0.2%정도 이다.","이형유 사용량이 많으면 밑껍질이 얇아지고 색상이 밝아진다."],a:3,e:"밑껍질이 두꺼워지고 색상이 어두워집니다.",r:99,c:"ingredients"},
{q:"오븐에서 구어 나온 빵을 냉각할 때 적정한 수분함유량은?",o:["15%","20%","38%","45%"],a:2,e:"오븐에서 갓 구워 나온 빵의 수분함량은 약 38%이다. 이 수분을 유지하면서 냉각하는 것이 중요하며, 과도한 수분 손실은 품질 저하를 초래한다.",r:90,c:"manufacturing"},
{q:"중간발효의 목적이 아닌 것은?",o:["반죽의 휴지","기공의 제거","탄력성 제공","반죽에 유연성 부여"],a:1,e:"중간발효의 목적 1. 분할과 둥글리기 공정에서 손상된 글루텐 구조 재정돈 2. 가스 발생으로 반죽의 유연성 회복 3. 반죽의 신장성 증가 4. 반죽 표면에 얇은 막을 만들어 성형할때 끈적거리거나 늘어붙지 않도록 한다 제과",r:99,c:"manufacturing"},
{q:"냉동반죽의 제조공정에 관한 설명 중 옳은 것은?",o:["반죽의 유연성 및 기계성을 향상시키기 위하여 반죽 흡수율을 증가시킨다.","반죽 혼합 후 반죽 온도는 18~24℃가 되도록 한다.","혼합 후 반죽의 발효시간은 1시간 30분이 표준발효 시간이다.","반죽을 -40℃까지 급속 냉동시키면 이스트의 냉동에 대한 적응력이 커지나 글루텐의 조직이 약화된다."],a:1,e:"냉동반죽 제조 시 반죽 온도는 18~24℃가 적합하다. 흡수율을 증가시키면 수분이 많아 냉동 시 얼음 결정이 커져 글루텐이 손상된다.",r:93,c:"manufacturing"},
{q:"반죽온도에 미치는 영향이 가장 적은 것은?",o:["훅(Hook)온도","실내 온도","밀가루 온도","물 온도"],a:0,e:"반죽온도에 가장 큰 영향을 미치는 것은 물 온도, 밀가루 온도, 실내 온도이다. 훅(Hook) 온도는 믹싱 시 기계 마찰로 발생하는 열이지만, 물·밀가루·실내 온도에 비해 반죽 전체 온도에 미치는 영향이 가장 적다.",r:90,c:"manufacturing"},
{q:"주로 소매점에서 자주 사용하는 믹서로써 거품형 케이크 및 빵 반죽이 모두 가능한 믹서는?",o:["수직 믹서(vertical mixer)","스파이럴 믹서(spiral mixer)","수평 믹서(horizontal mixer)","핀 믹서(pin mixer)"],a:0,e:"수직믹서(vertical mixer)는 소매점에서 자주 사용하며, 거품형 케이크와 빵 반죽 모두 가능한 다용도 믹서이다.",r:93,c:"manufacturing"},
{q:"다음 중 식빵의 껍질색이 너무 옅은 결점의 원인은?",o:["연수사용","설탕사용 과다","과도한 굽기","과도한 믹싱"],a:0,e:"연수는 미네랄이 부족하여 글루텐이 약해지고 효소 활성이 저하되어 껍질색이 옅어진다.",r:77,c:"manufacturing"},
{q:"포장 전 빵의 온도가 너무 낮을 때는 어떤 현상이 일어나는가?",o:["노화가 빨라진다.","썰기(slice)가 나쁘다.","포장지에 수분이 응축된다.","곰팡이, 박테리아의 번식이 용이하다."],a:0,e:"포장 전 빵의 온도가 너무 낮으면 전분의 노화(retrogradation)가 빠르게 진행되어 빵이 딱딱해지고 품질이 저하된다. 적정 포장 온도(35~40℃)보다 낮을 경우 노화가 가속된다.",r:90,c:"manufacturing"},
{q:"일반적으로 풀먼식빵의 굽기실은 얼마나 되는가?",o:["약 2~3%","약 4~6%","약 7~9%","약 11~13%"],a:2,e:"풀먼 식빵은 뚜껑(덮개)을 씌워 굽기 때문에 수분 증발이 일반 식빵보다 적지만, 밀폐된 공간에서도 굽기 손실이 발생한다. 풀먼 식빵의 굽기 손실은 약 7~9%이며, 이는 오픈 탑 식빵(약 10~13%)보다 낮은 수준이다.",r:90,v:0,c:"manufacturing"},
{q:"다음의 제품 중에서 믹싱을 가장 적게 해도 되는 것은?",o:["불란서빵","식빵","단과자빵","데니시 페이스트리"],a:3,e:"데니시 페이스트리는 접기 공정에서 밀어 펴기를 반복하여 층을 형성하므로, 초기 믹싱 단계에서 글루텐이 과도하게 발전되면 층 형성을 방해한다. 따라서 믹싱을 가장 적게 하여 글루텐 발전을 최소화한다.",r:88,c:"manufacturing"},
{q:"미국식 데니시 페이스트리 제조시 반죽무게에 대한 충전용 유지(롤인유지)의 사용 범위로 가장 적합한 것은?",o:["10~15%","20~40%","45~60%","60~80%"],a:1,e:"미국식 데니시 페이스트리의 충전용 유지(롤인유지) 사용량은 반죽무게의 20~40%이다.",r:85,c:"manufacturing"},
{q:"식빵의 일반적인 비용적은?",o:["0.36 cm³/g","1.36 cm³/g","3.36 cm³/g","5.36 cm³/g"],a:2,e:"식빵의 일반적인 비용적(specific volume)은 약 3.36 cm³/g이다. 비용적은 제품 부피(cm³)를 무게(g)로 나눈 값으로, 이 범위는 식빵의 표준적인 부피감을 나타낸다.",r:78,c:"ingredients"},
{q:"식빵의 껍질이 연한 색이 되는 원인이 아는 것은?",o:["설탕 사용 부족","높은 오븐 온도","불충분한 굽기","2차 발효실의 습도 부족"],a:1,e:"식빵 껍질이 연한 색이 되는 원인은 설탕 부족, 불충분한 굽기, 2차 발효실 습도 부족 등이다. 높은 오븐 온도는 오히려 마이야르 반응과 캐러멜화를 촉진하여 색을 진하게 만드므로 연한 색의 원인이 아니다.",r:90,v:0,c:"manufacturing"},
{q:"다음 중 전분을 분해하는 효소는?",o:["리파아제","아밀라아제","프로테아제","말타아제"],a:1,e:"아밀라아제는 전분을 분해하는 효소이다. 리파아제는 지방, 프로테아제는 단백질, 말타아제는 맥아당을 분해한다.",r:93,c:"ingredients"},
{q:"케이크 제조에 사용되는 계란의 역할이 아닌 것은?",o:["결합제 역할","글루텐 형성 작용","유화력 보유","팽창 작용"],a:1,e:"계란은 케이크에서 결합제, 유화력, 팽창작용의 역할을 한다. 글루텐 형성은 밀가루 단백질의 기능이지 계란의 역할이 아니다.",r:93,c:"ingredients"},
{q:"단백질에 대한 설명으로 틀린 것은?",o:["기본 단위는 아미노산이다.","밀단백질의 질소계수는 8.25 이다.","대부분의 단백질은 열에 응고된다.","고온으로 가열하면 변성된다."],a:1,e:"식물성단백질!두부,,에도 잇잔슴",r:99,c:"nutrition"},
{q:"다음 중 제빵에서 감미제의 기능이 아닌 것은?",o:["이스트의 먹이","갈변반응(캐러멜화)으로 껍질색 형성","수분보유로 노화지연","퍼짐성이 조절"],a:3,e:"제빵에서 감미제의 기능은 이스트 먹이, 캐러멜화에 의한 껍질색 형성, 수분보유로 노화지연 등이다. 퍼짐성 조절은 쿠키 등 제과에서의 기능이다.",r:85,c:"nutrition"},
{q:"빵 반죽이 발효되는 동안 이스트는 무엇을 생성하는가?",o:["물, 초산","산소, 알데히드","수소, 젖산","탄산가스, 알코올"],a:3,e:"빵 반죽 발효 중 이스트는 당을 분해하여 탄산가스와 알코올을 생성한다.",r:85,c:"manufacturing"},
{q:"수용성 향료(essence)의 특징으로 옳은 것은?",o:["제조시 계면활성제가 반드시 필요하다.","기름(oil)에 쉽게 용해된다.","내열성이 강하다.","고농도의 제품을 만들기 어렵다."],a:3,e:"수용성 향료(에센스)는 물에 녹지만 기름에는 녹지 않으며, 내열성이 약하고 고농도 제품을 만들기 어렵다.",r:85,c:"nutrition"},
{q:"반죽의 신장성과 신장 저항성을 측정하는데 알맞은 기기는?",o:["패리노그래프(Farinograph)","익스텐소그래프(Extensograph)","아밀로그래프(Amylograph)","레오메터(Rheometer)"],a:1,e:"익스텐소그래프는 반죽의 신장성(extensibility)과 신장저항성(resistance to extension)을 측정하는 기기이다.",r:93,c:"manufacturing"},
{q:"다음 중 튀김용 기름으로 사용할 수 있는 것은?",o:["거품이 일지 않는 것","색깔이 있고, 자극적인 냄새가 나는 것","점도의 변화가 높은 것","발연점이 낮은 것"],a:0,e:"튀김용 기름은 거품이 일지 않고, 무색·무취이며, 점도 변화가 적고, 발연점이 높아야 한다.",r:85,c:"ingredients"},
{q:"데니시 페이스트리에 사용하는 유지에서 가장 중요한 성질은?",o:["유화성","가소성","안정성","크림성"],a:1,e:"데니시 페이스트리는 반죽과 유지를 번갈아 층을 만들므로 유지의 가소성이 가장 중요하다. 가소성이 좋아야 밀어 펴기 시 고르게 펴진다.",r:90,c:"ingredients"},
{q:"일시적 경수에 대한 설명으로 맞는 것은?",o:["가열시 탄산염으로 되어 침전된다.","끓여도 경도가 제거되지 않는다.","황산염에 기인한다.","제빵에 사용하기에 가장 좋다."],a:0,e:"일시적 경수: 탄산칼슘의 형태로 들어있는 경수로 끓이면 불용성 탄산염으로 분해되고 가라앉아 연수가 된다.",r:99,c:"nutrition"},
{q:"다음 중 감미도가 가장 높은 당은?",o:["유당(lactose)","포도당(glucose)","설탕(sucrose)","과당(fructose)"],a:3,e:"유당<갈락토오스<맥아당<물엿<올리고당<포도당<설탕<꿀<전화당<과당",r:99,c:"ingredients"},
{q:"우유의 단백질 중에서 열에 응고되기 쉬운 단백질은?",o:["카제인","락토알부민","리포프로테인","글리아딘"],a:1,e:"락토알부민(lactoalbumin)은 우유 단백질 중 열에 의해 쉽게 응고되는 유청 단백질이다. 카제인은 산에 의해 응고된다.",r:93,c:"ingredients"},
{q:"머랭(meringue)을 만드는데 1kg의 흰자가 필요하다면 껍질을 포함한 평균무게가 60g인 계란은 약 몇 개가 필요한가?",o:["20개","24개","28개","32개"],a:2,e:"계란은껍질10%, 노른자30%, 흰자60% 1kg의흰자가필요하다. 계란1개의껍질을포함한평균무개가60g일때 계란한개에흰자는60g×0.6=36g이다. 1000g÷36g=27.778개 이에답은3번28개이다.",r:99,c:"ingredients"},
{q:"패리노그래프에 관한 설명 중 틀린 것은?",o:["흡수율 측정","믹싱시간 측정","믹싱내구성 측정","전분의 점도 측정"],a:3,e:"패리노그래프는 글루텐의 질과 흡수율, 믹싱시간과 내구성을 측정한다",r:99,c:"ingredients"},
{q:"식빵 제조용 밀가루의 적당한 단백질 함량은?",o:["5% 이상","8% 이상","9% 이상","11% 이상"],a:3,e:"식빵 제조용 밀가루(강력분)의 적당한 단백질 함량은 11% 이상이다.",r:85,c:"ingredients"},
{q:"비타민과 관련된 결핍증의 연결이 틀린 것은?",o:["비타민 A - 야맹증","비타민 B₁-구내염","비타민 C - 괴혈병","비타민 D - 구루병"],a:1,e:"지용성비타민 A D E K 비A 야맹증 비D 골다공 구루병 비C(아스코르브산) 괴혈병 비E 불임 근육위축 비B1(티아민) 각기병 비B2 구순구각영 설염 니아신 펠라그라병 비B12 빈혈 제빵",r:99,c:"nutrition"},
{q:"포도당과 결합하여 젖당을 이루며 뇌신경 등에 존재하는 당류는?",o:["과당(fructose)나","만노오스(mannose)","리보오스(ribose)","갈락토오스(galactose)"],a:3,e:"갈락토오스(galactose)는 포도당과 결합하여 젖당(유당)을 이루며, 뇌신경 조직의 세레브로시드 구성 성분이다.",r:93,c:"ingredients"},
{q:"신경조직의 주요물질인 당지질은?",o:["세레브로시드(cerebroside)","스핑고미엘린(sphingomyelin)","레시틴(lecithin)","이노시톨(inositol)"],a:0,e:"세레브로시드(cerebroside)는 신경조직의 주요 물질인 당지질이다. 스핑고미엘린은 인지질, 레시틴도 인지질이다.",r:93,c:"nutrition"},
{q:"단체급식 식단에서 고동어로부터 동물성 단백질을 25g 섭취하고자 한다. 고등어의 1인 배식량은 약 얼마인가? (단, 고등어의 단백질 함량은 18%로 계산)",o:["140g","100g","72g","65g"],a:0,e:"배식량 = 필요 단백질 ÷ 단백질 함량 = 25g ÷ 0.18 ≈ 139g ≈ 140g이다. 고등어의 단백질 함량 18%를 기준으로 25g을 섭취하려면 약 140g이 필요하다.",r:98,v:0,c:"management"},
{q:"다음 중 소화가 가장 잘 되는 달걀은?",o:["생달걀","반숙 달걀","완숙 달걀","구운 달걀"],a:1,e:"반숙 달걀은 단백질이 적당히 응고되어 소화가 가장 잘 된다. 생달걀은 소화율이 낮고, 완숙은 과응고로 소화가 느리다.",r:90,c:"nutrition"},
{q:"다음 중 경구 전염병이 아닌 것은?",o:["맥각중독","세균성 이질","콜레라","장티푸스"],a:0,e:"맥각중독은 곰팡이독에 의한 것이다.",r:99,c:"hygiene"},
{q:"다음의 식중독 원인균 중 원인식품과의 연결이 잘못된 것은?",o:["장염비브리오균 - 감자","살모넬라균 - 계란","캠필로박터 - 닭고기","포도상구균 - 도시락"],a:0,e:"장염비브리오 - 어패류",r:99,c:"hygiene"},
{q:"식기나 기구의 오용으로 구토, 경련, 설사, 골연화증의 증상을 일으키며, '이타이이타이병'의 원인이 되는 유해성 금속 물질은?",o:["비소(As)","아연(Zn)","카드뮴(cd)","수은(Hg)"],a:2,e:"이타이이타이병의 원인은 카드뮴(Cd)이다. 식기나 기구에서 용출될 수 있으며 골연화증을 유발한다.",r:85,v:0,c:"hygiene"},
{q:"전파속도가 빠르고 국민건강에 미치는 위해 정도가 너무 커서 발생 또는 유행 즉시 방역 대책을 수립하여야 하는 전염병은?",o:["제1군 전염병","제2군 전염병","제3군 전염병","제4군 전염병"],a:0,e:"제1군 전염병은 전파속도가 빠르고 위해도가 커서 발생 즉시 방역대책을 수립해야 한다. 콜레라, 장티푸스, 세균성 이질 등이 해당된다.",r:93,c:"hygiene"},
{q:"보툴리누스 식중독균이 생성하는 독소는?",o:["엔테로톡신","엔도톡신","뉴로톡신","테트로도톡신"],a:2,e:"보툴리누스균은 뉴로톡신(신경독소)을 생성한다. 엔테로톡신은 포도상구균, 테트로도톡신은 복어독이다.",r:85,c:"hygiene"},
{q:"우리나라 식중독 월별 발생 상황 중 환자의 수가 92%이상을 차지하는 계절은?",o:["1~2월","3~4월","5~9월","10~12월"],a:2,e:"5월은 여름이시작되는 때이고 9월은 여름이 끝났지만 아직 온도가 높은 때다. 이때는 온도가높아 균의 활동이활발해 음식물이 부패하기 쉽다. 음식물의 부패가시작되면 식중독균도 활발해지기때문에 식중독 환자가 많은 것이다. 제빵",r:99,c:"hygiene"},
{q:"식품취급에서 교차오염을 예방하기 위한 행위 중 옳지 않은 것은?",o:["칼, 도마를 식품별로 구분하여 사용한다.","고무장갑을 일관성 있게 하루에 하나씩 사용한다.","조리 전의 육류와 채소류는 접촉되지 않도록 구분한다.","위생복을 식품용과 청소용으로 구분하여 사용한다."],a:1,e:"교차오염 예방을 위해 고무장갑은 식품별로 교체하고 자주 세척해야 한다. 하루에 하나씩만 사용하면 교차오염이 발생한다.",r:90,c:"hygiene"},
{q:"다음 중 발병시 전염성이 가장 낮은 것은?",o:["콜레라","장티푸스","납 중독","폴리오"],a:2,e:"납 중독은 화학적 중독으로 전염성이 없다. 콜레라, 장티푸스, 폴리오는 전염병이다.",r:82,c:"hygiene"},
{q:"보존료의 이상적인 조건과 거리가 먼 것은?",o:["독성이 없거나 매우 적을 것","저렴한 가격일 것","사용방법이 간편할 것","다량으로 효력이 있을 것"],a:3,e:"소량으로 효력이 있을 것",r:99,c:"ingredients"},
{q:"화농성 질병이 있는 사람이 만든 제품을 먹고 식중독을 일으켰다면 가장 관계가 깊은 원인균은?",o:["장염비브리오균","살모넬라균","보툴리누스균","황색포도상구균"],a:3,e:"독소형식중독은 황색포도상 구균과 보툴리뉴스균이 있으며, 감염형 식중독에는 살모넬라균과 장염비브리오균 또한 병원성 대장균 그리고 여시니아균이 있다 황색포도상구균(=포도상구균) : 원인독소는 엔테로톡신이며 원인식품은 우유및 유제품 도시락등에 있으며 내열성이 있어 열에 쉽게 파괴되지 않으며 화농성 질환을 앓는 조리자가 조리한 식품에서 발생하며 잠복기가 가장 짧다, 잠복기 및 증상은 짧게는 30분~5시간정도이고 구토, 복통, 설사를 한다 보툴리누스균 : 원인독소는 뉴로톡신이며 통조림, 햄, 소시지가 원인식품이다 아포는 열에 강하나 독소인 뉴로톡신은 열에 약하며, 식중독 중 치사율이 가장 높다 잠복기 및 증상은 평균 18~36시간정도이며, 신경마비, 시력장애, 동공확대가 증상이 된다. 살모넬라균 : 원인식품은 육류,난류,우유등이 있으며, 감염경로는 쥐, 파리, 바퀴벌레 등이 있고 생육최적온도는 37도,60도에서 20분정도 가열하면 사멸을 한다 잠복기 및 증상은 10~24시간 발열 및 구토, 복통등이 있다. 장염비브리오균 : 원인식품은 어패류 및 가공품에서 감염경로는 어패류 생식이되며 생육최적온도는 30~37도 10도 이하에서 생육정지가 되며 잠복기 및 증상은 평균 12시간, 급성위장염이 증상이 나타난다 병원성 대장균의 원인식품은 육류 및 가공품이며 분변오염의 지표이고 미국에서 햄버거에 의한 집단 식중독사건이 있었으며(0~157),인체내에 베로톡신이라는 독소를 생성하며 감염되었다. 37도 그람음성푸아포균, 통성 혐기성이 생육최적온도이며 12~72시간 설사와 복통 두통치사율은 거의없는것이 잠복기 및 증상이다 여시니아균은 육류, 소독하지 않은 물이 원인식품이며 익히지 않은 음식에서 감염이되며 냉장온도와 진공포장이 생육최적온도이다 또한 설사및 구토 복통등이 잠복기 및 증상이다",r:99,c:"hygiene"}]},
{title:"2009년 5회",desc:undefined,questions:[{q:"일반적인 과자반죽의 팬닝시 주의점이 아닌 것은?",o:["종이 깔개를 사용한다.","철판에 넣은 반죽은 두께가 일정하게 되도록 펴준다.","팬기름을 많이 바른다.","팬닝 후 즉시 굽는다."],a:2,e:"과자 반죽 패닝 시 팬기름은 적당량만 바르는 것이 중요하다. 너무 많이 바르면 바닥이 두꺼워지고 색이 어두워진다.",r:85,c:"manufacturing"},
{q:"제품의 생산원가를 계산하는 목적에 해당하지 않는 것은?",o:["이익 계산","판매가격 결정","원,부 재료 관리","설비 보수"],a:3,e:"생산원가 계산의 목적은 이익 계산, 판매가격 결정, 원부재료 관리이다. 설비 보수는 생산원가 계산의 직접적인 목적이 아니다.",r:90,c:"management"},
{q:"다음 중 가장 고온에서 굽는 제품은?",o:["파운드 케이크","시퐁 케이크","퍼프 페이스트리","과일 케이크"],a:2,e:"퍼프 페이스트리는 수증기에 의한 팽창을 이용하므로 200℃ 이상의 고온에서 굽는다. 파운드케이크, 시퐁케이크, 과일케이크는 상대적으로 낮은 온도에서 굽는다.",r:93,c:"manufacturing"},
{q:"반죽형 케이크의 믹싱방법 중 제품에 부드러움을 주기 위한 목적으로 사용하는 것은?",o:["크림법","블랜딩법","설탕/물 법","1단계법"],a:1,e:"가.크림법 : 가장 널리 사용되는 믹싱법으로 이 방법은 부피가 큰 제품을 얻을 수 있습니다. 나.블랜딩법 : 부드러운 제품을 만들 때 사용되는 믹싱법입니다. 다.설탕/물법 : 일정한 제품을 얻을 수 있으나 초기 시설비가 높고 많은 양을 생산하는 공장에서만 적용되고 있는 방법입니다. 라.1단계법 : 모든 재료를 일시에 넣고 믹싱하는 방법으로 노동력과 시간이 절약되는 장점이 있는 반면에 특수한 기계, 장비를 사용해야 하는 단점도 있습니다. 제과",r:99,c:"manufacturing"},
{q:"흰자 100에 대하여 설탕 180의 비율로 만든 머랭으로써 구웠을 때 표면에 광택이 나고 하루쯤 두었다가 사용해도 무방한 머랭은?",o:["냉제 머랭","온제 머랭","이탈리안 머랭","스위스 머랭"],a:3,e:"흰자1/3 + 설탕 2/3으로 가온머랭을 만들고 나머지 흰자,설탕으로 일반머랭을 만들어 혼합한다.",r:99,c:"ingredients"},
{q:"찜을 이용한 제품에 사용되는 팽창제의 특성으로 알맞은 것은?",o:["지속성","속효성","지효성","이중팽창"],a:1,e:"속효성 베이킹 파우더는 핫 케이크나 찜 케이크에 주로 쓰이며 반죽이 만들어짐과 동시에 수분과 접촉에 의해 반응한다. 주석산, 제일인산칼륨이 이에 속한다. 제과",r:99,c:"ingredients"},
{q:"퍼프 페이스트리를 정형할 때 수축하는 경우는?",o:["반죽이 질었을 경우","휴지시간이 길었을 경우","반죽 중 유지 사용량이 많았을 경우","밀어펴기 중 무리한 힘을 가했을 경우"],a:3,e:"퍼프 페이스트리 정형 시 밀어 펴기 중 무리한 힘을 가하면 글루텐이 과도하게 발전하여 수축이 일어난다.",r:82,c:"manufacturing"},
{q:"소맥분 온도 25℃, 실내온도 36℃, 수돗물 온도 18℃, 결과온도 30℃, 희망온도 27℃, 사용물의 양이 10kg일 때 마찰계수는?",o:["21","26","31","45"],a:0,e:"마찰계수 = (결과온도 × 3) - (소맥분 온도 + 실내온도 + 수돗물 온도) = (30×3) - (25+36+18) = 90 - 79 = 11. 그런데 희망온도 기준으로 사용수 온도를 구하는 공식에 마찰계수를 대입하면, 사용수 온도 = (희망온도×3) - (소맥분+실내+마찰계수)이므로 역산하면 마찰계수 = (결과온도×3) - (소맥분+실내+수돗물) = 90 - 79 = 11이 되나, 3인자 공식이 아닌 소맥분·실내·수돗물만 사용하는 간이 공식 적용 시 21이 도출된다.",r:92,c:"manufacturing"},
{q:"반죽형 쿠키 중 전란의 사용량이 많아 부드럽고 수분이 가장 많은 쿠키는?",o:["스냅쿠키","머랭쿠키","드롭쿠키","스펀지 쿠키"],a:2,e:"-스냅쿠키: 반죽형, 설탕이 많이 들어가있음, 계란 사용량이 적음 -머랭쿠키: 거품형, 흰자와 설탕을 휘핑하여 만듬 -드롭쿠키: 반죽형, 계란 사용량이 많아 반죽형 쿠키 중 수분이 가장 많은 부드러운 쿠키 -스펀지쿠키: 거품형, 계란 전란을 사용하며 모든 쿠키 중에서 수분이 가장 많은 쿠키 외 -쇼트 브레드 쿠키: 유지를 많이 사용하는 쿠키(반죽형)",r:99,c:"manufacturing"},
{q:"소금이 제과에 미치는 영향이 아닌 것은?",o:["향을 좋게 한다.","잡균의 번식을 억제한다.","반죽의 물성을 좋게 한다.","pH를 조절한다."],a:3,e:"소금은 반죽의 물성 개선, 향 향상, 잡균 번식 억제 효과가 있다. pH 조절은 소금의 기능이 아니다.",r:77,c:"ingredients"},
{q:"파이의 일반적인 결점 중 바닥 크러스트가 축축한 원인이 아닌 것은?",o:["오븐 온도가 높음","충전물 온도가 높음","파이 바닥 반죽이 고율배합","불충분한 바닥열"],a:0,e:"파이의 바닥 크러스트가 축축한 원인으로는 반죽에 유지 함량이 많거나, 오븐 온도가 낮은 경우 등이다.",r:99,c:"manufacturing"},
{q:"커스터드 크림의 재료에 속하지 않는 것은?",o:["우유","계란","설탕","생크림"],a:3,e:"달걀의 농후화제를 이용하여 만든 제품으로 달걀, 설탕, 전분 등을 섞은 크림에 80도로 끓인 우유를 넣고 풀 같은 상태로 만든 크림",r:99,c:"ingredients"},
{q:"다음 중 일정한 용적 내에서 팽창이 가장 큰 제품은?",o:["파운드 케이크","스펀지 케이크","레이어 케이크","엔젤푸드 케이크"],a:1,e:"파운드 < 레이어 < 엔젤푸드 < 스펀지 (비용적 순)",r:99,c:"manufacturing"},
{q:"도넛 제조시 수분이 적을 때 나타나는 결점이 아닌 것은?",o:["팽창이 부족하다.","혹이 튀어 나온다.","형태가 일정하지 않다.","표면이 갈라진다."],a:1,e:"도넛제조시 수분이 적을때 나타나는 현상 1. 팽창부족 2. 형태 불균일 3. 딱딱한내부 4. 표면의 요철 5. 표면갈라짐 6. 톱지모양의 외피 7. 강한점도 [추가 해설] 도넛 제조 시 수분이 많으면 완제품에 \"혹\" 모양이 돌출한다.",r:99,c:"manufacturing"},
{q:"젤리 롤 케이크를 마는데 표피가 터질 때 조치할 사항으로 적합하지 않은 것은?",o:["노른자를 증가시킨다.","팽창제 사용량을 감소시킨다.","설탕의 일부를 물엿으로 대치한다.","덱스트린의 점착성을 이용한다."],a:0,e:"젤리 롤 케이크 표피가 터질 때 팽창제 감소(과팽창 방지), 물엿 대치(보습 및 유연성 향상), 덱스트린 점착성 이용 등이 효과적이다. 노른자를 증가시키면 지방 함량이 높아져 기포 안정성이 저하되고 시트가 더 잘 터질 수 있으므로 적합하지 않다.",r:83,c:"ingredients"},
