<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>제빵/제과기능사 모의고사</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#4A6CF7;--correct:#22C55E;--wrong:#EF4444;--bg:#F8FAFC;--card:#fff;--text:#1E293B;--sub:#64748B;--border:#E2E8F0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent}
.container{max-width:480px;margin:0 auto;padding:16px}
h1{font-size:20px;text-align:center;padding:20px 0;font-weight:700}
.home-card{background:var(--card);border-radius:16px;padding:24px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);cursor:pointer;transition:transform .15s;border:2px solid transparent}
.home-card:active{transform:scale(.97)}
.home-card .emoji{font-size:40px;margin-bottom:12px}
.home-card .title{font-size:18px;font-weight:700;margin-bottom:4px}
.home-card .desc{font-size:14px;color:var(--sub)}
.progress-bar{background:var(--border);border-radius:8px;height:6px;margin-bottom:16px;overflow:hidden}
.progress-fill{background:var(--primary);height:100%;border-radius:8px;transition:width .3s}
.progress-text{font-size:13px;color:var(--sub);text-align:center;margin-bottom:12px}
.q-card{background:var(--card);border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.q-num{font-size:13px;color:var(--primary);font-weight:700;margin-bottom:8px}
.q-text{font-size:15px;line-height:1.6;margin-bottom:16px;word-break:keep-all}
.option{display:flex;align-items:flex-start;padding:12px 14px;border:2px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer;transition:all .15s;font-size:14px;line-height:1.5;gap:10px}
.option:active{transform:scale(.98)}
.option.selected{border-color:var(--primary);background:#EEF2FF}
.option.correct{border-color:var(--correct);background:#F0FDF4}
.option.wrong{border-color:var(--wrong);background:#FEF2F2}
.option .circle{min-width:24px;height:24px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--sub);flex-shrink:0}
.option.selected .circle{border-color:var(--primary);background:var(--primary);color:#fff}
.option.correct .circle{border-color:var(--correct);background:var(--correct);color:#fff}
.option.wrong .circle{border-color:var(--wrong);background:var(--wrong);color:#fff}
.option-text{flex:1}
.btn{display:block;width:100%;padding:16px;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;transition:all .15s;text-align:center}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff}
.btn-outline{background:transparent;color:var(--primary);border:2px solid var(--primary);margin-top:10px}
.btn-group{position:fixed;bottom:0;left:0;right:0;background:var(--bg);padding:12px 16px;border-top:1px solid var(--border)}
.btn-group .container{padding:0;max-width:480px;margin:0 auto}
.btn-row{display:flex;gap:10px}
.btn-row .btn{flex:1}
.result-card{background:var(--card);border-radius:16px;padding:28px;text-align:center;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.score-circle{width:140px;height:140px;border-radius:50%;margin:0 auto 16px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:40px;font-weight:800}
.score-circle.pass{background:#DCFCE7;color:var(--correct)}
.score-circle.fail{background:#FEE2E2;color:var(--wrong)}
.score-circle small{font-size:14px;font-weight:500;margin-top:2px}
.score-label{font-size:15px;color:var(--sub);margin-top:8px}
.stat-row{display:flex;justify-content:space-around;margin-top:20px}
.stat-item{text-align:center}
.stat-num{font-size:22px;font-weight:700}
.stat-label{font-size:12px;color:var(--sub);margin-top:2px}
.review-toggle{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px}
.review-dot{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;cursor:pointer}
.review-dot.c{background:var(--correct)}
.review-dot.w{background:var(--wrong)}
.review-dot.s{background:var(--sub)}
.explain{background:#F1F5F9;border-radius:10px;padding:14px;margin-top:12px;font-size:13px;line-height:1.7;color:#475569}
.explain strong{color:var(--text)}
.ai-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;margin-top:8px}
.ai-badge.high{background:#DCFCE7;color:#166534}
.ai-badge.mid{background:#FEF9C3;color:#854D0E}
.ai-badge.low{background:#FEE2E2;color:#991B1B}
.ai-badge.unverified{background:#FECACA;color:#991B1B;border:1px dashed #F87171}
.top-nav{display:flex;align-items:center;padding:12px 0}
.back-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:8px;margin-left:-8px;color:var(--text)}
.scroll-pad{padding-bottom:90px}
.tab-bar{display:flex;background:var(--card);border-radius:12px;padding:4px;margin-bottom:16px;box-shadow:0 1px 2px rgba(0,0,0,.06)}
.tab{flex:1;padding:10px;text-align:center;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;color:var(--sub);transition:all .2s}
.tab.active{background:var(--primary);color:#fff}
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>
const EXAMS = {bread:[{title:"모의고사 1회",desc:"60문제 · 해설 포함",questions:[{q:"경구감염병의 예방대책으로 잘못된 것은?",o:["숙주 감수성 유지","식품취급자의 개인위생 관리","음용수의 위생 유지","환자 및 보균자의 발견과 격리"],a:0,e:"감수성은 숙주에 침입한 병원체에 대항하지 못하는 상태로 면역의 반대 의미이다. 감수성이 높을수록 감염이 잘 된다. 예방대책은 감수성을 '낮추는 것'이지 '유지'하는 것이 아니다.",r:93,v:0,c:"hygiene"},
{q:"발효가 지나친 반죽으로 빵을 구웠을 때의 제품 특성이 아닌 것은?",o:["제품의 조직이 고르다.","부피가 작다.","시큼한 냄새가 있다.","빵 껍질 색이 밝다."],a:3,e:"발효가 지나친 반죽으로 빵을 구웠을 때 기공이 거칠다 제과",r:99,c:"manufacturing"},
{q:"빵을 구울 때 오븐 스프링(oven spring)이 일어나는 현상과 가장 적은 것은?",o:["캐리멜화가 일어나 껍질의 신장성을 증가시킨다.","탄산가스의 용해도가 감소한다.","알코올의 휘발로 증기압이 생긴다.","가스압이 증가한다."],a:0,e:"캐러멜화는 굽기 과정에서 표피 부분이 150~200°C 정도의 고온에서 갈색 물질을 생성하여 껍질 색을 진하게 만드는 반응으로 껍질의 신장성과는 관련이 없다. 오븐 스프링은 가스압과 수증기압의 증가, 알코올과 탄산가스의 증발로 인하여 일어난다.",r:90,v:0,c:"manufacturing"},
{q:"스펀지 도우법에 대한 설명으로 틀린 것은?",o:["스펀지 발효가 지나치면 제품의 기공이 두껍다.","밀가루에는 아밀라아제가 충분히 함유되어야 한다.","스펀지는 발효되는 동안 스펀지 브레이크 현상을 보인다.","스펀지 발효가 부족하면 빵 속의 색깔이 어둡게 된다."],a:3,e:"스펀지 도우법에서 스펀지 반죽에는 이스트의 먹이가 되는 설탕을 넣지 않기 때문에 아밀라아제가 풍부한 밀가루를 사용하며, 스펀지 발효가 부족해도 잔당이 많이 남지 않기 때문에 빵 속 색깔이 어둡지 않게 된다.\n※ 스펀지 브레이크: 발효 동안 시간이 경과함에 따라 스펀지 부피가 계속 증가하여 최대에 이르렀다가 줄어드는 지점",r:88,c:"ingredients"},
{q:"다음 식품첨가물 중 표백제가 아닌 것은?",o:["소브산","메타중아황산나트륨","아황산나트륨","차아황산나트륨"],a:0,e:"소르빈산은 방부제로 사용된다. 제과",r:99,c:"ingredients"},
{q:"냉동 반죽 제조 시 사용하는 재료에 대한 설명이 틀린 것은?",o:["가수율을 다소 줄여 냉동 중 얼음 결정에 의해 효모가 사멸되는 것을 방지한다.","단백질 함량이 높은 밀가루를 사용하면 해동, 발효 후 구울 때 부피가 큰 제품이 된다.","냉동 중 생성되는 글루타치온의 양을 줄이기 위해 효모 사용량을 줄인다.","반죽 산화제로 비타민 C 사용량을 늘린다."],a:2,e:"반죽을 냉동할 때 이스트가 동해를 입어 사멸할 때 글루타치온이 생성되어 반죽구조를 손상시킨다. 따라서 냉동 반죽 제조 시에 물의 사용량을 줄이고 효모의 사용량은 2배 늘린다.",r:92,v:0,c:"ingredients"},
{q:"완제품이 500g 짜리인 식빵 4개를 만들려고 한다. 여기에 필요한 총 반죽량은 약 얼마인가?\n(단, 발효 손실 2%, 굽기 손실 12%이며, 결과값은 소수 첫째 자리에서 반올림한다.)",o:["2319g","2423g","1725g","2500g"],a:0,e:"완제품 중량 = 500×4 = 2000g\n굽기 손실 반영한 반죽무게 = 2000/(1-0.12) = 2273g\n발효 손실 반영한 반죽무게 = 2273/(1-0.02) = 2319g",r:98,c:"manufacturing"},
{q:"액체발효법에서 사용하는 소포제(anti forming agent)로 적합하지 않은 것은?",o:["탄소수가 적은 지방산","분유","쇼트닝","실리콘 화합물"],a:1,e:"소포제는 발효 중 발생하는 거품을 억제하기 위해 사용되며, 일반적으로 탄소수가 적은 지방산, 쇼트닝, 실리콘 화합물 등이 효과적으로 사용된다. 분유는 소포제로 적합하지 않다.",r:90,v:0,c:"ingredients"},
{q:"손에 화농성 염증이 있는 종사자가 만든 식품을 먹고 감염될 수 있는 식중독은?",o:["살모넬라 식중독","장염비브리오 식중독","보툴리누스 식중독","황색포도상구균 식중독"],a:3,e:"포도상구균은 화농성 질환의 대표적인 식품균으로 특히 황색포도상구균이 사람에게 병원성을 나타낸다. 화농성 질병이 있는 사람은 식품 취급을 하지 않아야 한다.",r:93,v:0,c:"hygiene"},
{q:"빵 반죽 혼합 시 최종온도에 중요한 영향을 주는 요소와 거리가 먼 것은?",o:["이스트 온도","마찰계수","물 온도","밀가루 온도"],a:0,e:"빵 반죽 온도를 구할 때 밀가루, 물, 마찰계수가 중요한 인자이다. 이스트 온도는 사용량이 적어 최종 온도에 큰 영향을 미치지 않는다.",r:93,v:0,c:"manufacturing"},
{q:"다음 중 메일라드 반응(Maillard reaction)에 영향을 주는 요인으로 가장 영향력이 적은 것은?",o:["온도","수분","당의 종류","염류의 농도"],a:3,e:"메일라드 반응은 환원당과 단백질을 고온으로 가열하면 갈색의 중합체인 멜라노이딘을 생성하는 반응으로 온도가 높을수록, 수분의 양이 적을수록(수분활성도 0.6~0.8), 이당류보다 단당류(감미도가 높을수록 빠름)에서 빠르게 일어난다. 염류의 농도는 영향력이 가장 적다.",r:93,v:0,c:"manufacturing"},
{q:"성형한 식빵 반죽을 팬에 넣을 때 이음매의 위치는 어느 쪽이 가장 좋은가?",o:["위","아래","우측","좌측"],a:1,e:"성형한 식빵 반죽을 팬에 넣을 때 이음매는 아래쪽에 놓는다. 이음매가 위에 있으면 발효·굽기 중 벌어질 수 있다.",r:90,c:"manufacturing"},
{q:"탈지분유가 전지분유에 비해서 다른 점은?",o:["단백질이 풍부하다.","유당을 많이 함유한다.","지방질이 적다.","무기질이 적다."],a:2,e:"탈지분유는 지방을 거의 제거한 탈지유의 수분을 제거하여 분말화시킨 것이다. 따라서 전지분유에 비해 지방질이 적다.",r:95,v:0,c:"ingredients"},
{q:"자연독식중독과 그 독성물질이 잘못 연결된 것은?",o:["테트로도톡신 – 복어중독","무스카린 – 버섯중독","베네루핀 – 모시조개중독","솔라닌 – 맥각중독"],a:3,e:"솔라닌은 감자의 싹과 녹색부위에 존재하는 감자독이다. 맥각중독을 일으키는 성분은 에르고타민, 에르고톡신이다.",r:93,v:0,c:"hygiene"},
{q:"HACCP의 7원칙에 해당하지 않는 것은?",o:["한계기준 설정","문서화 및 기록유지방법 설정","HACCP 팀 구성","위해요소분석"],a:2,e:"HACCP은 준비 단계의 5절차와 적용단계의 7단계가 있으며, HACCP 팀 구성은 준비 단계 5절차 중에서 첫 번째이다. 7원칙에는 해당하지 않는다.",r:93,v:0,c:"hygiene"},
{q:"빵굽기 과정에서 오븐 스프링(Oven spring)에 의한 반죽 부피의 팽창 정도로 가장 적당한 것은?",o:["본래 크기의 약 1/3 까지","본래 크기의 약 1/5 까지","본래 크기의 약 1/2 까지","본래 크기의 약 1/6 까지"],a:1,e:"오븐 스프링은 반죽이 오븐에서 열을 받아 가스가 팽창하면서 부피가 급격히 커지는 현상으로, 일반적으로 본래 크기의 약 1/5 정도까지 팽창하는 것이 적당하다.",r:93,c:"manufacturing"},
{q:"달걀의 특징적 성분으로 지방의 유화력이 강한 성분은?",o:["스테롤(sterol)","세팔린(cephalin)","아비딘(avidin)","레시틴(lecithin)"],a:3,e:"달걀 노른자에 함유된 레시틴(lecithin)은 인지질의 일종으로 친수성과 친유성을 동시에 가지고 있어 유화력이 강하다. 마요네즈, 아이스크림 등의 유화에 이용된다.",r:99,c:"ingredients"},
{q:"하루에 섭취하는 총에너지 중 식품 이용을 위한 에너지 소모량은 평균 얼마인가?",o:["30%","60%","10%","20%"],a:2,e:"하루에 섭취하는 총에너지 중 식품 이용을 위한 에너지 소모량(식품의 특이동적작용, TEF)은 평균 약 10%이다. 기초대사량은 60~70%, 활동에 의한 소모는 20~30% 정도이다.",r:99,c:"hygiene"},
{q:"단맛의 강도 순서로 옳은 것은?",o:["과당 > 설탕 > 포도당 > 맥아당","맥아당 > 과당 > 설탕 > 포도당","설탕 > 과당 > 포도당 > 맥아당","포도당 > 설탕 > 과당 > 맥아당"],a:0,e:"상대적 감미도 : 과당 - 175, 설탕(자당, 기준) - 100, 포도당 - 75 , 맥아당(엿당) - 32",r:99,c:"ingredients"},
{q:"제과·제빵공장에서 생산관리 시 매일 점검할 사항이 아닌 것은?",o:["출근율","원재료율","제품당 평균 단가","설비 가동율"],a:2,e:"제품 당 평균 단가는 주기적으로 산출하지만 매일 점검할 사항은 아니다. 설비 가동률, 원재료율, 출근율은 매일 점검해야 하는 생산관리 항목이다.",r:85,v:0,c:"management"},
{q:"향신료에 대한 설명으로 틀린 것은?",o:["스파이스는 주로 열대지방에서 생산되는 향신료로 뿌리 열매, 꽃, 나무껍질 등 다양한 부위가 이용된다.","박하는 뿌리에 함유된 약 1%의 박하유에 박하 향 물질이 이용된다.","허브는 주로 온대지방의 향신료로 식물의 잎이나 줄기가 주로 이용된다.","향신료는 고대 이집트, 중동 등에서 방부제, 의약품의 목적으로 사용되던 것이 식품에 이용된 것이다."],a:1,e:"박하는 잎에 함유된 박하유(페퍼민트 오일) 성분에서 특유의 향이 나오며, 뿌리가 아니라 잎이 주요 이용 부위이다.",r:90,v:0,c:"ingredients"},
{q:"중간발효에 대한 설명으로 옳은 것은?",o:["중간발효 중 습도가 높으면 껍질이 형성되어 빵 속에 단단한 소용돌이가 생성된다.","상대습도 85% 전후로 시행한다.","중간발효가 잘되면 글루텐이 잘 발달한다.","중간발효 온도는 27~29°C가 적당하다."],a:3,e:"중간발효의 온도는 27~29°C가 적당하다.\n① 상대습도가 낮으면 표면이 건조하여 껍질이 형성될 수 있다.\n② 상대습도 70~75% 정도로 조절한다.\n③ 중간발효는 손상된 글루텐의 구조를 재정비하기 위하여 한다.",r:93,c:"manufacturing"},
{q:"식품에 미생물이 작용하여 부패시키는 과정에서 주로 식품의 표면에서 번식하는 것은?",o:["호기성 세균","혐기성 세균","통성혐기성 세균","미호기성 세균"],a:0,e:"호기성 세균은 산소가 있는 환경에서 생존하고 번식하는 세균으로 식품 표면에서 쉽게 증식한다.\n② 혐기성 세균: 산소가 없는 환경에서 번식하며, 주로 식품 내부나 밀폐된 환경에서 활동\n③ 통성혐기성 세균: 산소 유무에 상관없이 번식\n④ 미호기성 세균: 산소가 매우 적은 환경에서 자라는 세균",r:93,c:"hygiene"},
{q:"500g의 식빵을 2개 만들려고 한다. 총 배합률은 180%이고, 발효 손실은 1%, 굽기 손실은 12%라고 가정할 때 사용할 밀가루 무게는 약 얼마인가?\n(단, 계산의 답은 소수점 첫째 자리에서 반올림한다.)",o:["568g","284g","638g","319g"],a:2,e:"완제품의 무게: 500g×2 = 1000g\n발효손실 감안한 무게: 1000/(1-0.01) = 1010g\n굽기손실 감안한 무게: 1010/(1-0.12) = 1148g\n밀가루의 무게 = 밀가루 비율(%) × 총 반죽 무게 / 총 배합률(%)\n= 100% × 1148g / 180% = 638g",r:98,c:"manufacturing"},
{q:"1차 발효 종말점을 판단하는 방법으로 틀린 것은?",o:["반죽 온도나 pH가 변한 것을 측정하여 판정한다.","반죽 표면을 손가락으로 찔러보아 판정한다.","소모된 발효 가능한 당의 양을 측정하여 판정한다.","발효 시간, 부피 팽창, 망상구조 등으로 판정한다."],a:2,e:"발효 완료 시점을 당의 양을 측정하여 판단하지 않는다. 1차 발효 상태의 확인은 ①, ②, ④의 방법으로 확인한다.",r:90,v:0,c:"manufacturing"},
{q:"밀가루 2000g, 총 배합률이 180%일 때 총 반죽 무게는?",o:["1800g","3600g","2000g","5400g"],a:1,e:"밀가루 무게 = 밀가루 비율 × 총 반죽무게 / 총 배합률\n2000g = 100% × x / 180%\nx = 2000 × 180 / 100 = 3600g",r:93,c:"manufacturing"},
{q:"유용한 장내세균의 발육을 촉진하여 정장 작용을 하는 당은?",o:["포도당","유당","설탕","맥아당"],a:1,e:"유당(lactose)은 장내 유익균(비피더스균 등)의 성장을 촉진하여 정장 작용을 한다.",r:82,v:0,c:"hygiene"},
{q:"일반적인 스펀지도법으로 식빵을 만들 때 본반죽(dough)의 가장 적당한 온도는?",o:["27°C 정도","34°C 정도","24°C 정도","30°C 정도"],a:0,e:"스펀지도법에서 본반죽의 적정 온도는 27°C 정도이다.",r:85,v:0,c:"manufacturing"},
{q:"제빵에서의 수분 분포에 관한 설명으로 틀린 것은?",o:["발효를 거치는 동안 전분의 가수분해에 의해서 반죽 내 수분량이 변화한다.","물이 반죽에 균일하게 분산되는 시간은 보통 10분 정도이다.","소금은 글루텐을 단단하게 하여 글루텐 흡수량을 감소시킨다.","1차 발효와 2차 발효를 거치는 동안 생성된 수분은 대부분 전분에 의해 흡수된다."],a:1,e:"1차·2차 발효를 거치는 동안 반죽 내부의 발효 활동으로 수분이 재분배되지만, 반죽이 건조해지지는 않는다. 발효 중 CO₂와 알코올이 생성되면서 오히려 수분 함량은 비교적 일정하게 유지된다.",r:87,c:"ingredients"},
{q:"다음 중 인수공통감염병은?",o:["장티푸스","콜레라","세균성 이질","탄저"],a:3,e:"탄저는 동물과 사람 모두에게 감염될 수 있는 인수공통감염병이다. 장티푸스, 콜레라, 세균성 이질은 사람 간 전파되는 감염병이다.",r:90,v:0,c:"hygiene"},
{q:"파리가 전파하는 질병이 아닌 것은?",o:["발진티푸스","파라티푸스","회충","결핵"],a:3,e:"결핵은 공기 매개 감염(비말핵 감염)으로 파리가 전파하지 않는다.",r:82,v:0,c:"hygiene"},
{q:"효소를 구성하는 주요 구성 물질은?",o:["지질","탄수화물","비타민","단백질"],a:3,e:"효소(enzyme)는 주로 단백질로 구성된 생체촉매이다. 일부 효소는 비타민에서 유래한 조효소가 필요하지만, 효소의 주체는 단백질(아포효소)이다.",r:65,c:"nutrition"},
{q:"소독제와 그 소독 효과의 관계가 옳은 것은?",o:["크레졸 – DNA 파괴","염소 – 단백질 변성","과산화수소 – 단백질 응고","역성비누 – 세포벽 손상"],a:1,e:"염소는 미생물의 단백질을 변성시켜 소독 효과를 나타낸다.",r:85,v:0,c:"hygiene"},
{q:"강력분과 박력분의 성상에서 가장 중요한 차이점은?",o:["전분 함량의 차이","비타민 함량의 차이","지방 함량의 차이","단백질 함량의 차이"],a:3,e:"강력분과 박력분의 가장 중요한 차이점은 단백질(글루텐) 함량이다. 강력분은 11~13%, 박력분은 7~9%로, 글루텐 형성 능력에 큰 차이가 있다.",r:65,c:"ingredients"},
{q:"외부가치 7100만원, 생산가치 3000만원, 인건비 1400만원인 경우 노동 분배율은 약 얼마인가?",o:["237%","20%","47%","42%"],a:2,e:"노동분배율 인건비/생산가치x100",r:99,c:"management"},
{q:"빵 재반죽의 발효에 필수적인 재료가 아닌 것은?",o:["분유","밀가루","이스트","물"],a:0,e:"빵 재반죽의 발효에 필수적인 재료는 밀가루, 이스트, 물이다. 분유는 필수 재료가 아니다.",r:82,v:0,c:"ingredients"},
{q:"미생물이 탄수화물을 분해하였을 때 생성될 수 있는 물질은?",o:["암모니아","메르캅탄","젖산","아민류"],a:2,e:"탄수화물 분해(발효) 시 젖산, 알코올, 초산 등이 생성된다. 암모니아, 메르캅탄, 아민류는 단백질 분해 산물이다.",r:90,v:0,c:"hygiene"},
{q:"다음 중 빵의 노화가 가장 빨리 진행되는 온도는?",o:["0°C","-18°C","20°C","35°C"],a:0,e:"빵의 노화(staling)는 0~5°C에서 가장 빠르게 진행된다. -18°C 이하에서는 노화가 억제되고, 높은 온도에서는 상대적으로 느리다.",r:90,v:0,c:"manufacturing"},
{q:"팥 앙금빵을 제조 시 주의 사항으로 틀린 것은?",o:["발효가 완료되면 달걀물을 칠해준다.","팥앙금은 미리 치대어 놓는다.","분할 무게 45g에 앙금은 30g 정도가 좋다.","앙금이 반죽 밑으로 내려가게 한다."],a:3,e:"앙금이 반죽 밑으로 내려가면 굽는 과정에서 바닥이 타거나 모양이 변형될 수 있다. 앙금은 반죽 중앙에 위치해야 한다.",r:93,v:0,c:"manufacturing"},
{q:"부종이 심한 사람에게 특히 제한해야 하는 무기질은?",o:["Fe","P","Ca","Na"],a:3,e:"나트륨(Na)은 체내 수분 보유를 촉진하므로 부종이 심한 사람에게 제한해야 한다.",r:82,v:0,c:"nutrition"},
{q:"제빵 시 혼합 시간에 관한 설명 중 틀린 것은?",o:["저울배합은 고울배합에 비해 혼합시간이 길다.","단백질 함량이 높은 밀가루는 혼합시간이 길다.","온도가 높으면 혼합시간이 짧아진다.","소금 사용량이 많으면 혼합시간이 길어진다."],a:0,e:"저울배합(lean formula)은 유지/설탕이 적어 글루텐 발달이 빠르므로 혼합시간이 짧다. 고울배합(rich formula)은 유지/설탕이 많아 글루텐 발달을 방해하므로 혼합시간이 길다.",r:93,v:0,c:"ingredients"},
{q:"적혈구의 혈색소 감소, 체중감소 및 신장장해, 칼슘대사 이상과 호흡장해를 유발하는 유해성 금속물질은?",o:["아연(Zn)","납(Pb)","주석(Sn)","구리(Cu)"],a:1,e:"납(Pb)은 적혈구 혈색소 감소, 체중감소, 신장장해, 칼슘대사 이상 등을 유발하는 유해성 금속물질이다.",r:82,v:0,c:"nutrition"},
{q:"탄소 수가 아래와 같을 때, 일반적으로 포화지방산의 융점이 가장 높아 상온에서 가장 딱딱한 유지가 되는 것은?\n(ⓐ 6개, ⓑ 10개, ⓒ 14개, ⓓ 18개)",o:["ⓑ","ⓒ","ⓐ","ⓓ"],a:3,e:"포화지방산의 탄소 수가 많을수록(사슬이 길수록) 융점이 높아 상온에서 더 딱딱한 유지가 된다. 따라서 탄소 수 18개(ⓓ)가 가장 딱딱하다.",r:92,c:"ingredients"},
{q:"다음 중 식품위생법에서 정하는 식품접객업에 속하지 않는 것은?",o:["제과점","휴게음식점","식품소분업","유흥주점"],a:0,e:"제과점은 식품위생법상 식품접객업이 아니라 즉석판매제조·가공업에 해당한다. 휴게음식점, 유흥주점 등은 식품접객업에 속한다.",r:93,c:"hygiene"},
{q:"충전물 제조에 필요한 안정제에 대한 설명으로 틀린 것은?",o:["겔화제라고도 한다.","과일 필링에 농후제로 로커스트 빈 검을 주로 사용한다.","증점제라고도 한다.","과일 필링에 전분은 증점제로 쓰지 않는다."],a:3,e:"과일 필링(Fruit Filling)에는 전분, 로커스트 빈 검, 젤라틴 등을 증점제로 사용하여 필링의 점도를 조절하고 안정성을 유지한다. 전분도 증점제로 사용된다.",r:90,v:0,c:"ingredients"},
{q:"굽기 과정 중 일어나는 현상에 대한 설명 중 틀린 것은?",o:["단백질 변성과 효소의 불활성화","효소의 활성과 향의 발달","오븐 팽창과 전분 호화 발생","캐러멜화와 갈변 반응의 억제"],a:3,e:"굽기 과정에서는 오븐 팽창, 전분 호화, 단백질 변성, 캐러멜화 갈변이 모두 발생한다. 갈변 반응이 억제되는 것이 아니라 촉진된다.",r:85,c:"nutrition"},
{q:"초콜릿 제조 공정 중 1차 가공과 2차 가공에 해당하는 작업의 연결이 옳은 것은?",o:["1차 가공 : 분쇄, 2차 가공 : 볶기","1차 가공 : 정제, 2차 가공 : 정형","1차 가공 : 정제, 2차 가공 : 템퍼링","1차 가공 : 껍질 제거, 2차 가공 : 콘칭"],a:2,e:"초콜릿 제조 공정에서 1차 가공에서는 카카오 빈을 정제하여 카카오 매스를 만들고, 2차 가공에서는 이 카카오 매스를 템퍼링하여 초콜릿의 질감을 개선하고 광택을 부여한다.",r:93,v:0,c:"manufacturing"},
{q:"퐁당(Fondant) 제조 시 아이싱의 끈적거림 방지법으로 잘못된 것은?",o:["아이싱에 최소의 액체를 사용한다.","80°C로 가온한 아이싱 크림을 사용한다.","굳은 퐁당(Fondant)을 여리게 할 때 설탕 시럽을 첨가한다.","전분이나 밀가루와 같은 흡수제를 사용한다."],a:1,e:"아이싱의 끈적거림을 방지하는 방법으로 ①과 ④의 방법과 40°C 정도의 가온한 아이싱 크림을 사용한다. 80°C는 너무 높은 온도이다.\n③ 굳은 퐁당을 여리게 할 때 소량의 물을 넣고 가온하거나 설탕 시럽을 첨가한다.",r:93,c:"ingredients"},
{q:"다음 중 교차오염의 원인과 거리가 먼 것은?",o:["설치류와 해충","종사자(작업자)의 손","휘파와 고무주걱","식품첨가물"],a:3,e:"식품첨가물은 교차오염과 가장 거리가 멀다.\n※ 교차오염은 오염된 물질이 다른 식품, 조리도구, 기구, 표면 등을 통해 전파되는 현상이다.",r:88,c:"hygiene"},
{q:"제빵에서 유지의 기능이 아닌 것은?",o:["연화 작용","공기 포집","저장성 향상","흡수율 증가"],a:3,e:"제빵에서 유지의 기능은 쇼트닝성, 가소성, 크림성, 유화성, 안정성, 저장성, 식감 등이며, 흡수율은 유지의 기능이 아니다.",r:93,v:0,c:"ingredients"},
{q:"물과 기름처럼 서로 혼합이 잘 되지 않는 두 종류의 액체를 혼합, 분산시켜주는 첨가물은?",o:["팽창제","유화제","피막제","소포제"],a:1,e:"물과 기름처럼 서로 혼합되지 않는 두 종류의 액체를 혼합시켜 주는 첨가물은 유화제이다.",r:82,v:0,c:"ingredients"},
{q:"작업장 내 설비기기에 대한 관리로 틀린 것은?",o:["세척, 소독 시설은 용도별로 구별하여 사용한다.","냉장고 내부에 온도표시 판넬을 설치하여 안전한 유지관리가 되도록 한다.","작업장 내에는 기구 등을 세척하거나 소독할 수 있는 시설이나 장비를 갖추고 있어야 한다.","이물질, 찌든 때 등은 설비기기 사용 후 제거되어야 한다."],a:1,e:"작업장에서 냉장고의 온도표시 판넬을 내부에 설치하면 확인이 어렵고, 온도측정 장비가 습기나 내부 상태에 따라 손상될 가능성이 높기 때문에 외부에 설치하는 것이 효율적이다.",r:90,v:0,c:"hygiene"},
{q:"제빵용 믹서의 종류에 속하지 않는 것은?",o:["수직 믹서","원형 믹서","수평 믹서","스파이럴 믹서"],a:1,e:"제과 및 제빵용 믹서로 수평믹서, 수직믹서, 스파이럴믹서, 연속식 믹서 등이 사용된다. 원형 믹서는 제과제빵에서 분류되는 믹서의 종류가 아니다.",r:90,v:0,c:"manufacturing"},
{q:"이스트 푸드를 구성하는 각 성분의 역할로 틀린 것은?",o:["아스코르브산 – 반죽의 되기 증가","제1인산칼슘 – 반죽의 pH 조절","황산칼슘 – 물의 경도 조절","황산암모늄 – 이스트의 발효 촉진"],a:0,e:"아스코르브산(비타민 C)은 반죽조절제(산화제)로 사용되어 글루텐 구조를 강화하고, 반죽의 탄력을 높이는 역할을 한다. 하지만 반죽의 되기를 조절하지는 않는다.",r:93,v:0,c:"manufacturing"},
{q:"팬기름의 사용에 대한 설명으로 거리가 먼 것은?",o:["발연점이 높아야 한다.","산패에 강해야 한다.","반죽 무게의 3~4%를 사용한다.","기름이 과다하면 바닥 껍질이 두껍고 색이 어둡다."],a:2,e:"팬기름은 반죽무게의 0.1%로 사용",r:99,c:"ingredients"},
{q:"제빵 시 굽기 및 냉각 손실이 12%이고, 완제품이 500g이라면 분할량은 약 얼마인가?",o:["585g","575g","568g","580g"],a:2,e:"냉각 손실을 감안한 분할량: 500g/(1-0.12) = 568g",r:90,v:0,c:"manufacturing"},
{q:"식빵의 냉각 방법 중 자연 냉각 시 일반적으로 소요되는 시간은?",o:["3시간","30분","6시간","1시간"],a:0,e:"자연 냉각은 바람이 없는 실내의 실온에서 3~4시간 정도 냉각시키는 방법이다.",r:82,v:0,c:"manufacturing"},
{q:"다음 중 효소에 대한 설명으로 틀린 것은?",o:["효소는 특정 기질에 선택적으로 작용하는 기질 특이성이 있다.","효소반응은 온도, pH, 기질 농도 등에 영향을 받는다.","β-아밀라아제를 액화효소, α-아밀라아제를 당화효소라고 한다.","생체 내의 화학반응을 촉진하는 생체촉매이다."],a:2,e:"B-아밀라아제(베타아밀라아제)는 당화효소, a-아밀라아제(알파아밀라아제)는 액화효소라 한다.",r:99,c:"nutrition"},
{q:"스펀지도법에서 스펀지의 밀가루 비율을 증가시킴으로서 얻을 수 있는 효과가 아닌 것은?",o:["풍미의 증가","기계설비 감소","도(dough) 발효시간 단축","도(dough) 반죽시간 단축"],a:1,e:"스펀지 도우법에서 스펀지의 밀가루 사용량이 늘어나면 ① 풍미 증가, ③ 발효시간 단축, ④ 반죽시간 단축의 효과가 있다. 기계설비가 감소하지는 않는다.",r:93,v:0,c:"manufacturing"},
{q:"표준 스트레이트법에서 반죽의 온도로 적합한 것은?",o:["22 ~ 24°C","29 ~ 30°C","18 ~ 20°C","26 ~ 27°C"],a:3,e:"표준 스트레이트법에서 적정 반죽 온도는 26~27°C이다.",r:85,v:0,c:"manufacturing"}]},
{title:"2011년 5회",desc:undefined,questions:[{q:"공립법으로 제조한 케이크의 최종제품이 열린 기공과 거친 조직감을 갖게 되는 원인은?",o:["적정 온도보다 높은 온도에서 굽기","오버 믹싱된 낮은 비중의 반죽으로 제조","달걀 이외의 액체 재료 함량이 높은 배합","품질이 낮은(오래된) 달걀을 배합에 사용"],a:1,e:"오버 믹싱이 되면 공기가 더 많이 포집되고 비중이 낮으면 공기가 많기 때문에 기공이 거칠어집니다. 따라서 2번이 맞는 것 같습니다.",r:99,c:"manufacturing"},
{q:"제빵 시 완성된 빵의 부피가 비정상적으로 크다면 그 원인으로 가장 적합한 것은?",o:["소금을 많이 사용하였다.","알칼리성 물을 사용하였다.","오븐온도가 낮았다.","믹싱이 고율배합이다."],a:2,e:"오븐온도가 낮으면 2차발효가 지나치게되는 것과 같은 현상이 일어난다. 제빵",r:99,c:"manufacturing"},
{q:"옐로에이어 케이크의 적당한 굽기 온도는?",o:["140℃","150℃","160℃","180℃"],a:3,e:"옐로레이어 케이크의 적정 굽기 온도는 180℃이다. 이 온도에서 적절한 착색과 수분 증발이 이루어져 이상적인 결과를 얻을 수 있다.",r:93,v:0,c:"manufacturing"},
{q:"공립법, 더운 방법으로 제조하는 스펀지케이크의 배합 방법 중 틀린 것은?",o:["버터는 배합 전 중탕으로 녹인다.","밀가루, 베이킹파우더는 체질하여 준비한다.","달걀은 흰자와 노른자로 분리한다.","거품 올리기의 마지막은 중속으로 믹싱한다."],a:2,e:"공립법은 전란을 이용해 믹싱하는 방법.",r:99,c:"manufacturing"},
{q:"무스크림을 만들 때 가장 많이 이용되는 머랭의 종류는?",o:["이탈리안 머랭","스위스 머랭","온제 머랭","냉제 머랭"],a:0,e:"이탈리안머랭은 114도에서116도의시럽을넣어만드는것이기때문에 굽지않는 무스크림을소독할수있어서이탈리안머랭을사용한다",r:99,c:"ingredients"},
{q:"향신료(spice& herb)에 대한 설명으로 틀린 것은?",o:["향신료는 주로 전분질 식품의 맛을 내는데 사용된다.","향신료는 고대 이집트, 중동 등에서 방부제, 의약품의 목적으로 사용되던 것이 식품으로 이용된 것이다.","스파이스는 주로 열대지방에서 생산되는 향신료로 뿌리, 열매, 꽃, 나무껍질 등 다양한 부위가 이용된다.","허브는 주로 온대지방의 향신료로 식물의 잎이나 줄기가 주로 이용된다."],a:0,e:"향신료는 전분질 식품뿐 아니라 육류, 유제품, 제과제빵 등 다양한 식품의 풍미를 높이는 데 사용된다. '주로 전분질 식품'이라는 한정은 틀렸다.",r:93,v:0,c:"ingredients"},
{q:"다크 초콜릿을 템퍼링(Tempering)할 때 맨 처음 녹이는 공정의 온도 범위로 가장 적합한 것은?",o:["10 ~ 20℃","20 ~ 30℃","30 ~ 40℃","20 ~ 50℃"],a:3,e:"1차 43-50 2차 27-29 제빵",r:99,c:"manufacturing"},
{q:"제조 공정 시 표면 건조를 하지 않는 제품은?",o:["슈","마카롱","밤과자","핑거쿠키"],a:0,e:"슈는 굽기 직전 스프레이로 물을 분무해서 잘 터지도록 굽는 제품입니다.",r:99,c:"manufacturing"},
{q:"제과·제빵공장에서 생산관리 시 매일 점검할 사항이 아닌 것은?",o:["제품 당 평균 단가","설비 가동률","원재료율","출근율"],a:0,e:"제품 당 평균 단가는 주기적으로 산출하지만 매일 점검할 사항은 아니다. 설비 가동률, 원재료율, 출근율은 매일 점검해야 하는 생산관리 항목이다.",r:90,v:0,c:"management"},
{q:"블랜딩법으로 제조할 경우 해당하는 사항은?",o:["달걀과 설탕을 넣고 거품 올리기 전 온도를 43℃로 중탕한다.","21℃ 정도의 품온을 갖는 유지를 사용하여 배합을 한다.","젖은상태(wet peak) 머랭을 사용하여 밀가루와 혼합한다.","반죽기의 반죽속도는 고속-중속-고속의 순서로 진행한다."],a:1,e:"블렌딩법은 21℃정도의 품온을 갖는 유지에 체친 밀가루를 넣고 피복시킨후 건조재료와 액체재료를 넣는 방법이다. 제빵",r:99,c:"ingredients"},
{q:"다음 중 제품의 비중이 틀린 것은?",o:["레이어 케이크 : 0.75 ~ 0.85","파운드 케이크 : 0.8 ~ 0.9","젤리롤 케이크 : 0.7 ~ 0.8","시퐁 케이크 : 0.45 ~ 0.5"],a:2,e:"젤리롤 케이크 비중 : 0.45 ~ 0.55",r:99,c:"manufacturing"},
{q:"튀김용 기름의 온도로 가장 적합한 것은?",o:["140 ~ 150℃","160 ~ 170℃","180 ~ 190℃","200 ~ 210℃"],a:2,e:"튀김온도-180c (온도가 낮거나, 튀김시간이 길면 기름을 많이 흡수한다)",r:99,c:"manufacturing"},
{q:"일반적인 케이크 반죽의 팬닝 시 주의점이 아닌 것은?",o:["종이 깔개를 사용한다.","철판에 넣은 반죽은 두께가 일정하게 되도록 펴준다.","팬기름을 많이 바른다.","팬닝 후 즉시 굽는다."],a:2,e:"팬기름을 많이 바르면 오븐에 넣었을때 굽혀지지않고 튀겨진다",r:99,c:"manufacturing"},
{q:"반죽형 쿠키의 굽기 과정에서 퍼짐성이 나쁠 때 퍼짐성을 좋게 하기 위해서 사용할 수 있는 방법은?",o:["입자가 굵은 설탕을 많이 사용한다.","반죽을 오래한다.","오븐의 온도를 높인다.","설탕의 양을 줄인다."],a:0,e:"입자가 굵은 설탕:퍼짐성 증가 입자가 고은 설탕: 퍼짐성 감소",r:99,c:"manufacturing"},
{q:"여름철(실온 30℃)에 사과파이껍질을 제조할 때 적당한 물의 온도는?",o:["4℃","19℃","28℃","35℃"],a:0,e:"사과파이껍질은 20℃가 적당하므로 실내온도를 감안하면 물온도는 4℃가 적당하다.",r:99,c:"manufacturing"},
{q:"다음과 같은 조건상 스펀지반죽법(Sponge and dough method)에서 사용할 물의 온도는?\n- 원하는 반죽 온도 : 26℃\n- 마찰계수 : 20\n- 실내 온도 : 26℃\n- 스펀지 반죽 온도 : 28℃\n- 밀가루 온도 : 21℃",o:["19℃","9℃","-21℃","35℃"],a:1,e:"물 온도 = (희망온도 × 4) - (실내온도 + 밀가루온도 + 스펀지온도 + 마찰계수)\n= (26 × 4) - (26 + 21 + 28 + 20) = 104 - 95 = 9℃",r:90,c:"manufacturing"},
{q:"다음 중 빵 포장재의 특성으로 적합하지 않은 성질은?",o:["위생성","보호성","작업성","단열성"],a:3,e:"빵, 과자는 뜨거우면 먹기 어려워서 식혀서 팔기 때문에 포장재는 단열성이 필요없음 제빵",r:99,c:"hygiene"},
{q:"빵의 부피가 너무 작은 경우 어떻게 조치하면 좋은가?",o:["발효시간을 증가시킨다.","1차 발효를 감소시킨다.","분할무게를 감소시킨다.","팬 기름칠을 넉넉하게 증가시킨다."],a:0,e:"발효시간을 늘려 부피를키운다.",r:99,c:"manufacturing"},
{q:"굽기 손실에 영향을 주는 요인으로 관계가 가장 적은 것은?",o:["믹싱시간","배합율","제품의 크기와 모양","굽기온도"],a:0,e:"굽기 손실에 영향을 주는 요인 : 배합률 , 굽는 온도 , 굽는시간 , 제품의 크기와 형태(모양) 등 다양함 . 제빵",r:99,c:"manufacturing"},
{q:"산형식빵의 비용적으로 가장 적합한 것은?",o:["1.5 ~ 1.8","1.7 ~ 2.6","3.2 ~ 3.5","4.0 ~ 4.5"],a:2,e:"산형식빵의 비용적 : 3.2~3.5 cm3/g , 풀먼형식빵 비용적 : 3.3~4.0 cm3/g",r:99,c:"ingredients"},
{q:"굽기의 실패 원인 중 빵의 부피가 작고 껍질색이 짙으며, 껍질이 부스러지고 옆면이 약해지기 쉬운 결과가 생기는 원인은?",o:["높은 오븐열","불충분한 오븐열","너무 많은 증기","불충분한 열의 분배"],a:0,e:"오븐열이 높을 경우 빵의 부피가 작고 껍질색이 짙으며 껍질이 부스러지고 옆면이 약해지기 쉽다.",r:99,c:"manufacturing"},
{q:"냉동과 해동에 대한 설명 중 틀린 것은?",o:["전분은 -7 ~ 10℃ 범위에서 노화가 빠르게 진행된다.","노화대(stale zone)를 빠르게 통과하면 노화속도가 지연된다.","식품을 완만히 냉동하면 작은 얼음결정이 형성된다.","전분이 해동될 때는 동결 때보다 노화의 영향이 적다."],a:2,e:"식품을 빨리 냉동하면 작은 얼음결정이 형성됩니다.",r:99,c:"ingredients"},
{q:"식빵에서 설탕을 정량보다 많이 사용하였을 때 나타나는 현상은?",o:["껍질이 엷고 부드러워진다.","발효가 느리고 팬의 흐름성이 많다.","껍질색이 연하며 둥근 모서리를 보인다.","향미가 적으며 속 색이 회색 또는 황갈색을 보인다."],a:1,e:"설탕이 정량보다 많을 경우 부피가 작고 껍질색이 어두운 적갈색이다 발효가 느리고 팬의 흐름성이 많다 윗면이 완만하다 모서리가 각이지고 찢어짐이 적다 껍질이 두껍고 질기다",r:99,c:"manufacturing"},
{q:"단위당 판매가격이 70원, 단위당 변동비가 50원, 고정비가 5000원이라고 하면 손익분기점은 얼마인가?",o:["150원","200원","250원","300원"],a:2,e:"손익분기점 = 고정비 / (가격-변동비) = 5000 / (70-50) = 5000 / 20 = 250 제빵",r:99,c:"management"},
{q:"밀가루 반죽의 물성측정 실험기기가 아닌 것은?",o:["믹소그래프","아밀로그래프","패리노그래프","가스크로마토그래프"],a:3,e:"(믹소,패리노,익스텐소,아밀로,레-오)그래프,믹서트론 제빵",r:99,c:"ingredients"},
{q:"다음 중 연속식 제빵법의 특징이 아닌 것은?",o:["발효손실 감소","설비감소, 설비공간, 설비면적 감소","노동력 감소","일시적 기계구입 비용의 경감"],a:3,e:"연속식 제빵법의 특징 장점 : 설비 감소, 공장 면적 감소, 노동력 감소. 발효 손실 감소 단점 : 일시적이 설비 투자 비용 큼, 발효향 감소",r:99,c:"manufacturing"},
{q:"밀가루 50g에서 젖은 글루텐을 15g 얻었다. 이 밀가루의 조단백질 함량은?",o:["6%","12%","18%","24%"],a:1,e:"{(젖은 글루텐)/(밀가루총량)}*100=30% 건조 글루텐=조단백질=(젖은 글루텐)/3=30/3=10 그러므로 가장 가까운 12%가 정답",r:99,c:"ingredients"},
{q:"중간 발효에 대한 설명으로 틀린 것은?",o:["글루텐 구조를 재정돈한다.","가스발생으로 반죽의 유연성을 회복한다.","오버 헤드 프루프(over head proot)라고 한다.","탄력성과 신장성에는 나쁜 영향을 미친다."],a:3,e:"중간 발효는 탄력성과 신장성에는 좋은 영향을 미친다.",r:99,c:"manufacturing"},
{q:"다음 중 빵 반죽의 발효에 속하는 것은?",o:["낙산발효","부패발효","알코올발효","초산발효"],a:2,e:"빵은 이스트를 사용해 발효를 합니다. 그리고... 이스트는 알코올 발효를 합니다.",r:99,c:"manufacturing"},
{q:"2차 발효의 적정 온도와 습도는?",o:["온도 27 ~ 29℃, 습도 90 ~ 100%","온도 38 ~ 40℃, 습도 90 ~ 100%","온도 38 ~ 40℃, 습도 80 ~ 90%","온도 27 ~ 29℃, 습도 80 ~ 90%"],a:2,e:"2차 발효(최종발효)의 적정 조건은 온도 38~40℃, 습도 80~90%이다. 습도가 90% 이상이 되면 제품 표면에 수분이 맺혀 껍질이 질겨질 수 있다.",r:93,v:0,c:"manufacturing"},
{q:"다음과 같은 조건에서 나타나는 현상과 그와 관련한 물질을 바르게 연결한 것은?\n초콜릿의 보관 방법이 적절치 않아 공기 중의 수분이 표면에 부착한 뒤 그 수분이 증발해 버려 어떤 물질이 결정 형태로 남아 흰색이 나타났다.",o:["팻브룸(fat bloom) - 카카오매스","팻브룸(fat bloom) - 글리세린","슈가브룸(sugar bloom) - 카카오버터","슈가브룸(sugar bloom) - 설탕"],a:3,e:"슈가브룸은 초콜릿 표면에 수분이 응축되어 설탕이 녹았다가 재결정화되면서 하얗게 나타나는 현상이다. 팻브룸은 카카오버터와 관련된다.",r:90,c:"ingredients"},
{q:"베이킹파우더의 산-반응물질(acid-reacting material)이 아닌 것은?",o:["주석산과 주석산염","인산과 인산염","알루미늄 물질","중탄산과 중탄산염"],a:3,e:"알루미늄 물질 , 주석산과 주석산염 인산과 인산염은 산성 이며 중탄산과 중단산염은 염기성 입니다.",r:99,c:"ingredients"},
{q:"우유 중 제품의 껍질색을 개선시켜 주는 성분은?",o:["유당","칼슘","유지방","광물질"],a:0,e:"유당 - 잔류당으로 남아서 껍질색을 진하게 한다",r:99,c:"ingredients"},
{q:"전분에 글루코아밀라아제(glucoamylase)가 작용하면 어떻게 변화하는가?",o:["포도당으로 가수분해 된다.","맥아당으로 가수분해 된다.","과당으로 가수분해 된다.","덱스트린으로 가수분해 된다."],a:0,e:"글루코gloco = 포도당",r:99,c:"ingredients"},
{q:"물의 기능이 아닌 것은?",o:["유화 작용을 한다.","반죽 농도를 조절한다.","소금 등의 재료를 분산시킨다.","효소의 활성을 제공한다."],a:0,e:"유화 작용은 유화제(계면활성제)의 기능이다.",r:99,c:"ingredients"},
{q:"소다 1.5%를 사용하는 배합 비율에서 팽창제를 베이킹 파우더로 대체하고자 할 때 사용량은?",o:["4%","4.5%","5%","5.5%"],a:1,e:"베이킹소다 = 베이킹파우더 / 3 1.5% = x / 3 x = 4.5%",r:99,c:"ingredients"},
{q:"잎을 건조시켜 만든 향신료는?",o:["계피","넛메그","메이스","오레가노"],a:3,e:"오레가노는 꿀풀과에 속하는 다년생 식물이며, 잎과 꽃의 끝부분을 말린 것으로 피자에 많이 사용된다. 계피는 녹나무과 상록수 껍질을 벗겨 만든 향신료이다.",r:99,c:"ingredients"},
{q:"마가린의 산화방지제로 주로 많이 이용되는 것은?",o:["BHA","PG","EP","EDGA"],a:0,e:"산화방지제 -> BHT,BHA,프로필갈레이드,에르소르브산",r:99,c:"ingredients"},
{q:"밀 단백질 1% 증가에 대한 흡수율 증가는?",o:["0 ~ 1%","1 ~ 2%","3 ~ 4%","5 ~ 6%"],a:1,e:"밀 단백질 1% 증가에 흡수율은 1.5% 증가한다",r:99,c:"nutrition"},
{q:"껍질을 포함하여 60g인 달걀 1개의 가식부분은 몇 g 정도인가?",o:["35g","42g","49g","54g"],a:3,e:"달걀은 껍질10%, 노른자30%, 흰자 60% 가식부분은 껍질을 포함하여 60g이므로 껍질을 제외한 10%제외하고 60g×0.9 (90%)을 계산하면 달걀1개의 가식부분은 54g이 된다.",r:99,c:"nutrition"},
{q:"아밀로오스는 요오드용액에 의해 무슨 색으로 변하는가?",o:["적자색","청색","황색","갈색"],a:1,e:"아밀로오스는 청색이고 아밀로펙틴이 적자색이다",r:99,c:"nutrition"},
{q:"다음의 크림 중 단백질 함량이 가장 많은 것은?",o:["식용크림","저지방포말크림","고지방포말크림","포말크림"],a:3,e:"포말크림은 다른 크림에 비해 지방 함량이 낮고 상대적으로 단백질 함량이 가장 높다. 고지방 크림일수록 지방 비율이 높아져 단백질 비율은 낮아진다.",r:93,c:"nutrition"},
{q:"젤리화의 요소가 아닌 것은?",o:["유기산류","염류","당분류","펙틴류"],a:1,e:"젤리화의 3요소는 1.유기산 2.당 3.펙틴 이렇게 3가지고 염류는 아니다",r:99,c:"ingredients"},
{q:"버터 초콜릿(bitter chocolate)원액 속에 포함된 코코아 버터의 함량은?",o:["3/8","4/8","5/8","7/8"],a:0,e:"비터 초콜릿(카카오매스) 원액에서 코코아 버터의 함량은 약 3/8(37.5%) 수준이다. 나머지는 코코아 고형분(카카오 고형물)이 차지한다.",r:90,v:0,c:"ingredients"},
{q:"빵 발효에 관련되는 효소로서 포도당을 분해하는 효소는?",o:["아밀라아제","말타아제","찌마아제","리파아제"],a:2,e:"아밀라아제는 전분 분해효소이고, 말타아제는 맥아당의 분해효소이며, 리파아제와 스테압신은 지방의 분해효소이다.",r:99,c:"ingredients"},
{q:"1일 2000kcal를 섭취하는 성인의 경우 탄수화물의 적절한 섭취량은?",o:["1100 ~1400g","850 ~ 1050g","500 ~ 125g","275 ~ 350g"],a:3,e:"탄수화물 : 1g = 4Kcal 1일 섭취량 70% 2000Kcal * 0.7 = 1400 1400/4 = 350g",r:99,c:"nutrition"},
{q:"지질대사에 관계하는 비타민이 아닌 것은?",o:["pantothenic acid","niacin","vitamin B₂","folic acid"],a:3,e:"pantithenic acid : 판토텐산. 비타민 B복합체 중 하나. niacin : 니아신. 비타민 B3 vitamin B2 : 리보플라빈 folic acid : 엽산 제빵",r:99,c:"nutrition"},
{q:"글리세롤 1분자에 지방산, 인산, 클린이 결합한 지질은?",o:["레시틴","에르고스테롤","콜레스테롤","세파"],a:0,e:"지방산과 알코올 이외에 다른 분자가 함유된 지방은 복합지방임. 위에서 복합지방은 레시틴이며 콜레스테롤 에르고스테롤은 유도지방임",r:99,c:"nutrition"},
{q:"나이아신(niacin)의 결핍증은?",o:["야맹증","신장병","펠라그라","괴혈병"],a:2,e:"< 문제설명 > - 비타민 결핍증 - 1. 비타민 A 레티놀 : 야맹증 2. 신장에 생기는 병 : 신장병 3. 비타민 B3 나이아신 : 펠라그라 , 피부병 4. 비타민 C 아스코르브산 : 괴혈병 , 저항력 감소",r:99,c:"nutrition"},
{q:"티아민(Thiamin)의 생리작용과 관계가 없는 것은?",o:["각기병","구순구각염","에너지 대사","TPP로 전환"],a:1,e:"구순구각염 - 비타민 b2 결핍",r:99,c:"nutrition"},
{q:"식품조리 및 취급과정 중 교차오염이 발생하는 경우와 거리가 먼 것은?",o:["씻지 않은 손으로 샌드위치 만들기","생고기를 자른 가위로 냉면 면발 자르기","생선 다듬던 도마로 샐러드용 채소 썰기","반죽에 생고구마 조각을 얹어 쿠키 굽기"],a:3,e:"생고구마를 얹지만 굽기과정을 거치기때문에 교차오염에 포함이 되지 않는다.",r:99,c:"hygiene"},
{q:"식품첨가물의 안전성 시험과 가장 거리가 먼 것은?",o:["아급성 독성 시험법","만성 독성 시험법","맹독성 시험법","급성 독성 시험법"],a:2,e:"식품첨가물의 안전성 시험에는 급성 독성, 아급성 독성, 만성 독성 시험이 포함된다. 맹독성 시험법은 식품첨가물의 안전성 시험 항목이 아니다.",r:93,c:"ingredients"},
{q:"사람에게 영향을 미치는 결핵균의 병원체를 보유하고 있는 동물은?",o:["쥐","소","말","돼지"],a:1,e:"결핵균을 보유하고 있는 동물은 소이다",r:99,c:"hygiene"},
{q:"병원성 대장균 식중독의 가장 적합한 예방책은?",o:["곡류의 수분을 10% 이하로 조정한다.","어류의 내장을 제거하고 충분히 세척한다.","어패류는 민물로 깨끗이 씻는다.","건강보균자나 환자의 분변 오염을 방지한다."],a:3,e:"병원성 대장균은 사람의 분변을 통해 전파되므로, 건강보균자나 환자의 분변 오염을 방지하는 것이 가장 적합한 예방책이다.",r:93,c:"hygiene"},
{q:"장염 비브리오균에 감염되었을 때 나타나는 주요 증상은?",o:["급성위장염 질환","피부농포","신경마비 증상","간경변 증상"],a:0,e:"장염 비브리오균 어패류, 해조류 를 생식 했을 경우에 감염될 수 있다. 구토, 설사, 발열, 복통 등 주요 증상이 나타난다.",r:99,c:"hygiene"},
{q:"환경 중의 가스를 조절함으로써 채소와 과일의 변질을 억제하는 방법은?",o:["변형공기포장","무균포장","상업적 살균","통조림"],a:0,e:"변형공기포장(MAP, Modified Atmosphere Packaging)은 산소·이산화탄소·질소 등의 가스 조성을 조절하여 채소·과일의 호흡과 미생물 번식을 억제하는 방법이다.",r:93,c:"hygiene"},
{q:"식품첨가물의 종류와 그 용도의 연결이 틀린 것은?",o:["발색제 - 인공적 착색으로 관능성 향상","산화방지제 - 유지식품의 변질 방지","표백제 - 색소물질 및 발색성 물질 분해","소포제 - 거품 소멸 및 억제"],a:0,e:"착색제 : 인공적 착색으로 관능성 향상",r:99,c:"ingredients"},
{q:"쥐나 곤충류에 의해서 발생될 수 있는 식중독은?",o:["살모넬라 식중독","클로스트리디움 볼툴리늄 식중독","포도상구균 식중독","장염 비브리오 식중독"],a:0,e:"1. 살모넬라 식중독 (1) 감염 경로 : 쥐, 파리, 바퀴벌레 등 (2) 원인식품 : 육류, 우유, 난류, 어육 제품 (3) 잠복기 : 12~24시간 (4) 증상 : 발열, 구토, 복통, 설사 등 ",r:99,c:"hygiene"},
{q:"제과에 많이 사용되는 우유의 위생과 관련된 설명 중 옳은 것은?",o:["우유는 자기살균작용이 있어 열처리된 우유는 위생상 크게 문제되지 않는다.","사료나 환경으로부터 우유를 통해 유해성 화학물질이 전달될 수 있다.","우유의 살균 방법은 병원균 중 가장 저항성이 큰 포도상구균을 기준으로 마련되었다.","저온살균을 하면 우유 1mL당 약 10²마리의 세균이 살아 남는다."],a:1,e:"사료나 환경 중의 유해성 화학물질(항생제, 농약, 중금속 등)이 우유를 통해 전달될 수 있으므로 위생 관리가 중요하다. 우유 살균은 결핵균을 기준으로 하며, 자기살균작용은 일시적이다.",r:93,c:"hygiene"},
{q:"살모넬라(salmonella)균 식중독에 대한 설명으로 옳은 것은?",o:["극소량의 균량(菌量) 섭취로 발병한다.","살모넬라균 독소의 섭취로 인해 발병한다.","10만 이상의 살모넬라균을 다량으로 섭취시 발병한다.","해수세균에 해당한다."],a:2,e:"살모넬라균은 세균성 식중독이다. 세균성 식중독은 세균수가 다량일 때 발생한다.",r:99,c:"hygiene"}]},
{title:"2007년 2회",desc:undefined,questions:[{q:"데블스 푸드 케이크를 만들려고 할 때 반죽의 비중을 측정하기 위하여 필요한 무게가 아닌 것은?",o:["비중컵의 무게","코코아를 담은 비중컵의 무게","물을 담은 비중컵의 무게","반죽을 담은 비중컵의 무게"],a:1,e:"비중 측정에 필요한 무게는 비중컵의 무게, 물을 담은 비중컵의 무게, 반죽을 담은 비중컵의 무게이다. 코코아를 담은 비중컵의 무게는 필요하지 않다.",r:93,c:"manufacturing"},
{q:"케이크 팬용적 410cm3에 100g의 스펀지 케이크 반죽을 넣어 좋은 결과를 얻었다면 팬용적 1230cm3에 넣어야할 스펀지 케이크의 반죽무게는?",o:["123g","200g","300g","410g"],a:2,e:"팬용적과 반죽량은 비례한다.\n1230/410 × 100 = 300g",r:85,c:"manufacturing"},
{q:"젤리를 만드는데 사용되는 재료가 아닌 것은?",o:["젤라틴","한천","레시틴","알긴산"],a:2,e:"레시틴은 계란 노른자에 있는 것으로 천연유화제",r:99,c:"ingredients"},
{q:"계란이 기포성과 포집성이 가장 좋은 온도는?",o:["0℃","5℃","30℃","50℃"],a:2,e:"계란의 기포성과 포집성은 약 30℃에서 가장 좋다. 이 온도에서 표면장력이 적절히 낮아져 거품 형성이 용이하며, 너무 높으면 단백질이 변성되어 기포력이 떨어진다.",r:90,c:"ingredients"},
{q:"충전을 또는 젤리가 롤 케이크에 축축하게 스며드는 것을 막기 위해 조치해야 할 사항으로 틀린 것은?",o:["굽기 조정","물 사용량 감소","반죽시간 증가","물엿 사용"],a:3,e:"물엿은 흡습성이 강해 오히려 시트에 수분을 끌어당겨 충전물이 스며드는 현상을 악화시킬 수 있으므로 적절한 조치가 아니다. 굽기 조정(충분히 구워 수분 줄이기), 물 사용량 감소, 반죽시간 증가(글루텐 강화로 차단막 형성)는 스며듦 방지에 효과적인 조치이다.",r:85,v:0,c:"manufacturing"},
{q:"다음 쿠키 중에서 상대적으로 수분이 적어서 밀어펴는 형태로 만드는 제품은?",o:["드롭 쿠키","스냅 쿠키","스펀지 쿠키","머랭 쿠키"],a:1,e:"* 반죽형반죽쿠키 : 1. 드롭쿠키 - 짤주머니 사용, 2. 스냅쿠키 - 성형기 사용 * 거품형반죽쿠키 : 3. 스펀지쿠키, 4. 머랭쿠키 - 짤주머니 사용 1. 드롭쿠키 : 계란사용량이 많아 반죽형쿠키중에서만 수분이 가장 많음, 짤주머니 사용 2. 스냅쿠키 : 계란사용량이 적어 밀어펴서 성형기로 찍어 제조.",r:99,c:"ingredients"},
{q:"스펀지 케이크의 부피가 작아진 경우 그 원인에 해당하지 않는 것은?",o:["낮은 온도의 오븐에 넣고 구운 경우","계란을 기포할 때 기구에 기름기가 많은 경우","급속한 냉각으로 수축이 일어난 경우","최종 믹싱 속도가 너무 빠른 경우"],a:0,e:"낮은 온도에서 스펀지 케이크를 구우면 오히려 더 오래 굽게 되어 부피에 큰 영향이 없거나 오히려 부풀 수 있다. 기구의 기름기, 급속 냉각에 의한 수축, 과도한 믹싱 속도는 부피를 직접적으로 감소시키는 원인이다.",r:93,c:"manufacturing"},
{q:"다음 제품 중 굽기 전 침지 또는 분무하여 굽는 제품은?",o:["슈","오믈렛","핑거쿠키","다쿠와즈"],a:0,e:"슈(choux)는 굽기 전 오븐에 넣기 전에 물을 분무하거나 표면에 물을 발라 굽는 제품으로, 수증기가 팽창을 도와 속이 빈 독특한 구조를 만든다.",r:85,c:"manufacturing"},
{q:"가압하지 않은 찜기의 내부 온도로 가장 적합한 것은?",o:["65℃","99℃","150℃","200℃"],a:1,e:"가압하지 않은 찜기의 내부 온도는 99도입니다 *^.^*",r:99,c:"manufacturing"},
{q:"케이크 도넛의 제조방법으로 올바르지 않은 것은?",o:["정형기로 찍을 때 반죽손실이 적도록 찍는다","정형 후 곧바로 튀긴다","덧가루를 얇게 사용한다","튀긴 후 그물망에 올려놓고 여분의 기름을 배출시킨다"],a:1,e:"튀기기 전 실온에서 10분간 휴지(팽창도움,모양 균형) 시킨다",r:99,c:"manufacturing"},
{q:"튀김시 과도한 흡유현상이 나타나지 않는 경우는?",o:["반죽 수분이 과다할 때","믹싱 시간이 짧을 때","글루텐이 부족할 때","튀김기름 온도가 높을 때"],a:3,e:"튀김온도가 높으면 표면이 빨리 익어 기름 흡수가 줄어든다. 반죽 수분 과다, 믹싱 시간 부족, 글루텐 부족은 모두 흡유 증가 원인이다.",r:93,c:"manufacturing"},
{q:"주방의 설계와 시공 시 조치사항으로 잘못된 것은?",o:["환기장치는 대형의 1개보다 소형의 여러 개가 효과적이다","주방 내의 천정은 낮을수록 좋다","작업의 도언을 고려하여 설계·시공한다","냉장고와 발열기구는 가능한 멀리 배치한다"],a:1,e:"주방의 천정은 환기와 열기 배출을 위해 적당히 높아야 한다. '낮을수록 좋다'는 잘못된 설명이다. 환기장치는 소형 여러 개가 효과적이고, 냉장고와 발열기구는 가능한 멀리 배치해야 한다.",r:93,c:"hygiene"},
{q:"스펀지 케이크에서 계란사용량을 15% 감소시킬 때 고형분과 수분량을 고려한 밀가루와 물의 사용량은?",o:["밀가루 3.75% 증가, 물 11.25% 감소","밀가루 3.75% 감소, 물 11.25% 증가","밀가루 3.75% 감소, 물 11.25% 감소","밀가루 3.75% 증가, 물 11.25% 증가"],a:3,e:"계란 15% 감소 시: 계란의 고형분(25%) = 15×0.25 = 3.75%만큼 밀가루 증가\n계란의 수분(75%) = 15×0.75 = 11.25%만큼 물 증가가 아니라 감소(계란이 줄었으므로 밀가루 증가, 물은 감소하지 않음). 정답에 따르면 밀가루 3.75% 증가, 물 11.25% 감소이다.",r:93,c:"ingredients"},
{q:"이탈리안 머랭에 대한 설명 중 틀린 것은?",o:["흰자를 거품으로 치대어 30% 정도의 거품을 만들고 설탕을 넣으면서 50% 정도의 머랭을 만든다","흰자가 신선해야 거품이 튼튼하게 나온다","뜨거운 시럽에 머랭을 한꺼번에 넣고 거품을 알맞다","강한 불에 구워 착색하는 제품을 만드는데 알맞다"],a:2,e:"머랭에 뜨거운 시럽(설탕100 : 물30 넣고 114~118도 로 끓인것)을 조금씩 나누어 넣으면서 거품(머랭)을 올린다(만든다)",r:99,c:"ingredients"},
{q:"퐁당에 대한 내용 중 맞는 것은?",o:["시럽을 214℃까지 끓인다","20℃ 전후로 식혀서 휘젓는다","물엿, 전화당 시럽을 첨가하면 수분 보유력을 높일 수 있다","유화제를 사용하면 부드럽게 할 수 있다"],a:2,e:"퐁당은 설탕 시럽을 114~118℃로 가열 후 38~40℃로 냉각하여 교반한다. 물엿이나 전화당을 첨가하면 재결정을 방지하고 수분 보유력을 높여 퐁당의 품질이 향상된다.",r:93,c:"ingredients"},
{q:"반죽의 믹싱 단계 중 탄력성과 신장성이 상실되고 반죽에 생기가 없어지면서 글루텐 조직이 흩어지는 것은?",o:["믹업 단계","브레이크다운 단계","렛다운 단계","클린업 단계"],a:1,e:"믹싱 단계에서 브레이크다운(Break Down) 단계는 렛다운(Let Down) 단계 이후 글루텐이 완전히 파괴되어 탄력성과 신장성을 모두 상실하고, 반죽이 처지며 끈적거리는 최종 단계입니다. 글루텐 조직이 흩어지고 반죽에 생기가 없어지는 현상은 이 브레이크다운 단계의 특징입니다.",r:99,c:"manufacturing"},
{q:"스펀지의 밀가루 사용량을 증가시킬 때 나타나는 현상이 아닌 것은?",o:["2차 믹싱의 반죽시간 단축","반죽의 신장성 저하","도우 발효시간 단축","스펀지 발효시간 증가"],a:1,e:"스펀지법에서 밀가루 사용량을 증가시키면 2차 믹싱 시간이 단축되고, 스펀지 발효시간이 증가하며, 도우 발효시간은 단축된다. 반죽의 신장성은 밀가루 증가로 오히려 향상되므로 '신장성 저하'는 나타나는 현상이 아니다.",r:93,c:"manufacturing"},
{q:"굽기 및 냉각손실이 12%이고 완제품이 500g일 때 분할량은 약 얼마인가?",o:["568g","575g","580g","585g"],a:0,e:"500÷(1-12/100)",r:99,c:"manufacturing"},
{q:"다음 제품 재조시 2차 발효실의 습도를 가장 낮게 유지하는 것은?",o:["풀먼 식빵","햄버거빵","과자빵","빵 도넛"],a:3,e:"튀김 시 모양을 유지시키고 기름 흡수를 적게하기 위해 2차발효 시 저온저습을 유지한다.",r:99,c:"manufacturing"},
{q:"빵 도넛 튀김온도의 범위로 가장 적합한 것은?",o:["150~160℃","180~190℃","200~210℃","220~230℃"],a:1,e:"빵 도넛의 적정 튀김온도는 180~190℃이다. 이스트로 발효시킨 반죽이므로 이 온도 범위에서 튀겨야 겉은 바삭하고 속은 충분히 익는다.",r:95,c:"manufacturing"},
{q:"건포도 식빵에 관한 설명으로 틀린 것은?",o:["반죽이 충분하게 형성된 후 건포도를 투입한다","밀어펴기(가스빼기)를 완전히 한다","2차 발효 시간이 길다","팬닝량은 일반 식빵에 비해 10~20% 정도 증가시킨다"],a:1,e:"건포도 식빵은 밀어펴기(가스빼기)를 가볍게 해야 한다. 완전히 하면 건포도가 손상되고 반죽 구조가 파괴된다.",r:93,c:"manufacturing"},
{q:"다음 중 빵 제품의 노화(staling)현상이 가장 일어나지 않는 온도는?",o:["0℃~4℃","7℃~10℃","-20℃~-18℃","18℃~20℃"],a:2,e:"빵의 노화는 0~10℃에서 가장 빠르고, -20~-18℃의 냉동 온도에서는 노화가 거의 일어나지 않는다.",r:77,c:"manufacturing"},
{q:"스트레이트법으로 식빵을 만들 때 밀가루 온도 22℃, 실내온도 26℃, 수돗물 온도 17℃, 결과온도 30℃, 희망온도 27℃라면 계산된 물 온도는?",o:["2℃","4℃","6℃","8℃"],a:3,e:"* 스트레이트법 마찰계수 (결과온도x3)-(밀가루온도+실내온도+수돗물 온도) = (30x3)-(22+26+17)=25 * 스트레이트법 사용물 온도 (희망온도x3)-(밀가루온도+실내온도+마찰계수) = (27x3)-(22+26+25)=8 * 계산된 물 온도는 8˚C 제빵",r:99,c:"manufacturing"},
{q:"오버나이트 스펀지법(overnight sponge method)에 대한 설명으로 틀린 것은?",o:["발효 손실이 적다","12~24시간 발효시킨다","적은 양의 이스트로 매우 천천히 발효시킨다","강한 신장성과 풍부한 발효향을 지니고 있다"],a:0,e:"오버나이트 스펀지법은 12~24시간 장시간 발효시키므로 발효 손실이 많다. 적은 양의 이스트로 천천히 발효시켜 강한 신장성과 풍부한 발효향을 얻는다.",r:93,c:"manufacturing"},
{q:"빵제품의 제조공정에 대한 설명으로 올바르지 않은 것은?",o:["반죽은 무게 또는 부피에 의하여 분할한다","둥글리기에서 과다한 덧가루를 사용하면 제품에 줄무늬가 생성된다","중간발효시간은 보통 10~20분이며 27~29℃에서 실시한다","성형은 반죽을 일정한 형태로 만드는 1단계 공정으로 이루어져있다"],a:3,e:"성형의 좁은 의미의 성형공정은 \"밀기→말기→봉하기\" 로 3단계이며 넓은 의미의 성형공정은 \"분할→둥글리기→중간발효→정형→패닝\" 으로 5단계임므로 1단계 공정이 틀린 것",r:99,c:"manufacturing"},
{q:"새로운 팬의 처리방법 중 틀린 것은?",o:["깨끗한 물에 2시간 정도 담근 후 꺼내어 그늘에서 말린다","강판은 250~300℃의 고온으로 50분 정도 굽는다","굽기 후 기름칠을 하여 보관한다","실리콘이 코팅된 팬은 가볍게 가열한다"],a:0,e:"새 팬을 물에 담갔다가 그늘에서 말리는 방법은 올바른 처리법이 아니다. 새 팬은 고온에서 가열하여 불순물을 제거한 후 기름칠을 하여 보관하는 것이 올바른 방법이다.",r:82,c:"manufacturing"},
{q:"외부가치 7100만원, 생산가치 3000만원, 인건비 1400만원인 경우 노동분배율은 약 얼마인가?",o:["20%","42%","47%","23%"],a:2,e:"노동분배율 인건비/생산가치x100",r:99,c:"management"},
{q:"다음 설명 중 틀린 것은?",o:["높은 온도에서 포장하면 썰기가 어렵다","높은 온도에서 포장하면 곰팡이 발생 가능성이 높다","낮은 온도에서 포장하면 노화가 지연된다","낮은 온도에서 포장된 빵은 껍질이 건조하다"],a:2,e:"빵은 낮은 온도(실온 이하)에서 포장하면 오히려 노화가 촉진된다. 노화는 냉장 온도(0~5℃)에서 가장 빠르게 진행되므로 '낮은 온도에서 포장하면 노화가 지연된다'는 틀린 설명이다.",r:75,c:"hygiene"},
{q:"정형기(Moulder)의 작동 공정이 아닌 것은?",o:["둥글리기","밀어펴기","말기","봉하기"],a:0,e:"정형기(Moulder)의 작동 공정은 밀어펴기, 말기, 봉하기이다. 둥글리기(rounding)는 라운더(Rounder)의 기능으로, 정형기의 공정에 포함되지 않는다.",r:80,c:"manufacturing"},
{q:"냉동반죽의 해동방법에 해당되지 않는 것은?",o:["실온해동","온수해동","리타더(retard)해동","도우 컨디셔너(dough conditioner)"],a:1,e:"온수해동은 냉동반죽의 해동 방법으로 사용하지 않는다. 온수에 반죽을 담그면 외부만 급격히 해동되어 발효가 불균일하게 진행되고 반죽 품질이 저하된다. 올바른 해동 방법은 실온해동, 리타더 해동, 도우 컨디셔너 사용이다.",r:90,c:"manufacturing"},
{q:"글리세린에 대한 설명으로 틀린 것은?",o:["지방산을 가수분해하여 만든다","흡습성이 강하다","무색투명하며 약간 점조한 액체이다","자당의 1/3 정도의 감미가 있다"],a:0,e:"글리세린은 유지(지방)를 가수분해하면 지방산과 함께 얻어지는 트리올 구조의 화합물로, '지방산을 가수분해하여 만든다'는 설명은 주어와 목적어가 뒤바뀐 틀린 내용입니다. 나머지 보기인 강한 흡습성, 무색투명한 점조성 액체, 자당의 약 1/3 수준의 감미는 모두 글리세린의 올바른 특성입니다.",r:99,c:"ingredients"},
{q:"함께 사용한 재료들에 향미를 제공하고 껍질색 형성을 빠르게 하여 색상을 진하게 하는 것은?",o:["지방","소금","우유","유화제"],a:1,e:"소금은 빵의 풍미를 향상시키고 마이야르 반응을 촉진하여 껍질색 형성을 빠르게 해 색상을 진하게 만드는 역할을 한다.",r:82,c:"ingredients"},
{q:"분유의 종류에 대한 설명으로 틀린 것은?",o:["혼합분유: 연유에 유청을 가하여 분말화 한 것","전지분유: 원유에서 수분을 제거하여 분말화 한 것","탈지분유: 탈지유에서 수분을 제거하여 분말화 한 것","가당분유: 원유에 당류를 가하여 분말화 한 것"],a:0,e:"혼합분유는 연유에 유청을 가하여 분말화한 것이 아니라, 탈지분유에 유지방 등을 혼합하여 만든 제품이다. 연유는 원유를 농축한 것으로 혼합분유의 원료가 아니므로 잘못된 설명이다.",r:85,c:"ingredients"},
{q:"분당이 저장 중 덩어리가 되는 것을 방지하기 위하여 옥수수 전분을 몇 %정도 혼합하는가?",o:["3%","7%","12%","15%"],a:0,e:"분당(슈가파우더)에는 흡습에 의한 덩어리 형성을 방지하기 위해 옥수수 전분을 약 3% 혼합한다.",r:87,c:"ingredients"},
{q:"계란 흰자가 360g 필요하다고 할 때 전란 60g짜리 계란이 몇 개 정도 필요한가?",o:["6","8","10","13"],a:2,e:"전란 60g에서 껍질(약 10%)을 제외한 가식부는 약 54g이며, 흰자는 가식부의 약 60%인 약 36g이다. 필요 개수 = 360g ÷ 36g = 10개이다.",r:90,c:"ingredients"},
{q:"다음 중 중화가를 구하는 식은?",o:["(이미지)","(이미지)","(이미지)","(이미지)"],a:0,e:"중화가 = 중조(베이킹소다)의 양 / 산성제의 양이다. 중화가는 산성제 1에 대해 필요한 중조의 양을 나타내는 값으로, 산성제의 종류에 따라 달라진다.",r:85,c:"manufacturing"},
{q:"젤리(jelly)에 대한 설명 중 틀린 것은?",o:["한천젤리는 한천, 설탕, 물엿, 과즙을 동시에 가열한다","펙틴젤리 제조에 가장 중요한 것은 산의 함량과 당도이다","구연산과 향료는 불을 끈 후 첨가한다","한천과 젤라틴을 섞어 쓰는 젤리도 있다"],a:0,e:"한천가루는 같이 가열시 풀어지지 않고 덩어리가 지게되므로 반드시 한천을 먼저 풀어주고 가열해야한다",r:99,c:"ingredients"},
{q:"퐁당 크림을 부드럽게 하고 수분 보유력을 높이기 위해 일반적으로 첨가하는 것은?",o:["한천, 젤라틴","물, 레몬","소금, 크림","물엿, 전화당 시럽"],a:3,e:"퐁당 크림에 물엿이나 전화당 시럽을 첨가하면 설탕 결정의 재결정화를 방지하여 부드럽게 하고 수분 보유력을 높인다.",r:93,c:"ingredients"},
{q:"아밀로펙틴의 특성이 아닌 것은?",o:["요오드 테스트를 하면 자주빛 붉은색을 띤다","노화되는 속도가 빠르다","곁사슬 구조이다","대부분의 천연전분은 아밀로펙틴 구성비가 높다"],a:1,e:"아밀로펙틴은 곁사슬(가지) 구조이며 요오드 반응 시 자주빛 붉은색을 띤다. 천연전분의 약 70~80%를 차지한다. 아밀로펙틴은 노화 속도가 느린 것이 특성이므로, '노화 속도가 빠르다'는 틀린 설명이다.",r:95,c:"ingredients"},
{q:"pH가 5인 물을 증류수로 100배 희석했을 때 pH는?",o:["3","5","7","9"],a:2,e:"pH 5인 산성 용액을 100배 희석하면 H⁺ 농도가 100분의 1로 줄어들어 pH가 2 증가하므로 pH 7에 가까워진다. 단, 완충 효과와 증류수의 중화 작용으로 최종 pH는 약 7(중성)이 된다.",r:65,c:"nutrition"},
{q:"제분 직후의 미숙성 밀가루는 노란색을 띠는데 그 원인 색소는?",o:["플라본","퀴논","클로로필","크산토필"],a:3,e:"제분 직후 밀가루의 노란색은 크산토필(xanthophyll) 색소 때문이다. 숙성 과정에서 산화되어 자연적으로 백색으로 변한다.",r:93,c:"ingredients"},
{q:"이스트푸드의 구성 물질 중 생지의 pH를 효모의 발육에 가장 알맞은 미산성의 상태로 조절하는 것은?",o:["황산암모늠","브롬산칼륨","요오드화칼륨","인산칼슘"],a:3,e:"인산칼슘은 이스트푸드 구성 물질 중 반죽의 pH를 효모 발육에 적합한 미산성(pH 4~6)으로 조절하는 역할을 한다.",r:93,c:"nutrition"},
{q:"제빵에 있어 일반적으로 껍질을 부드럽게 하는 재료는?",o:["소금","밀가루","마가린","이스트푸드"],a:2,e:"마가린은 반죽의 탄성을 약화시킴 제과",r:99,c:"ingredients"},
{q:"단백질에 대한 설명으로 틀린 것은?",o:["기본단위는 아미노산이다","밀단백질의 질소계수는 8.25이다","대부분의 단백질은 열에 응고된다","고온으로 가열하면 변성된다"],a:1,e:"식물성단백질!두부,,에도 잇잔슴",r:99,c:"nutrition"},
{q:"제빵용 물에 대한 설명으로 틀린 것은?",o:["제빵에는 아경수가 가장 적합하다","알칼리 물은 이스트 발효에 의해 생성되는 정상적인 산도를 중화시킨다","경수를 사용할 때는 이스트 사용량을 증가시킨다","경수를 사용할 때는 이스트푸드를 증가시킨다"],a:3,e:"경수 사용시 물증가,이스트증가, 소금감소, 맥아당첨가",r:99,c:"ingredients"},
{q:"다음 중 불완전 단백질 식품은?",o:["옥수수","달걀","우유","육류"],a:0,e:"옥수수는 제한 아미노산(라이신, 트립토판)이 부족한 불완전 단백질 식품이다. 달걀, 우유, 육류는 완전 단백질 식품이다.",r:90,c:"nutrition"},
{q:"무기질의 기능이 아닌 것은?",o:["우리 몸의 경조직 구성성분이다","열량을 내는 열량 급원이다","효소의 기능을 촉진시킨다","세포의 삼투압 평형유지 작용을 한다"],a:1,e:"무기질은 열량을 내지 않는다. 열량 급원은 탄수화물(4kcal/g), 단백질(4kcal/g), 지방(9kcal/g)이다.",r:93,c:"nutrition"},
{q:"밀가루가 75%의 탄수화물, 10%의 단백질, 1%의 지방을 함유하고 있다면 100g의 밀가루를 섭취했을 때 얻을 수 있는 열량은?",o:["386 kcal","349 kcal","317 kcal","307 kcal"],a:1,e:"Atwater 계수로 계산하면 (탄수화물 75g × 4) + (단백질 10g × 4) + (지방 1g × 9) = 300 + 40 + 9 = 349kcal이다.",r:93,v:0,c:"nutrition"},
{q:"지방의 기능이 아닌 것은?",o:["지용성 비타민의 흡수를 돕는다","외부의 충격으로부터 장기를 보호한다","높은 열량을 제공한다","변의 크기를 증대시켜 장관 내 체류시간을 단축시킨다"],a:3,e:"지방의 주요 기능은 지용성 비타민 흡수, 장기 보호, 높은 열량 제공이다. 변의 크기 증대 및 장관 체류시간 단축은 식이섬유의 기능이다.",r:85,c:"nutrition"},
{q:"다음 중 이당류만 묶인 것은?",o:["맥아당, 유당, 설탕","포도당, 과당, 맥아당","설탕, 갈락토오스, 유당","유당, 포도당, 설탕"],a:0,e:"단당류 포도당 갈락토오스 과당이고 이당류는 설탕 맥아당 유당이다.",r:99,c:"ingredients"},
{q:"계란의 난황계수를 측정한 결과가 다음과 같을 때 가장 신선하지 않은 것은?",o:["0.1","0.2","0.3","0.4"],a:0,e:"0.3 이하는 신선하지 않음",r:99,c:"ingredients"},
{q:"다음 중 음식물을 매개로 전파되지 않는 것은?",o:["이질","장티푸스","콜레라","광견병"],a:3,e:"광견병은 동물",r:99,c:"hygiene"},
{q:"다음 중 밀가루 개량제가 아닌 것은?",o:["과산화벤조일","과황산암모늠","염화칼슘","브롬산칼륨"],a:2,e:"염화칼슘은 밀가루 개량제가 아니라 두부 응고제나 이스트푸드의 성분이다. 과산화벤조일(표백제), 과황산암모늄(산화제), 이산화염소(표백·살균)는 밀가루 개량제이다.",r:93,c:"ingredients"},
{q:"식중독을 일으키는 세균 중 평균적으로 잠복기가 가장 짧은 것은?",o:["웰치균","보툴리누스균","살모넬라균","포도상구균"],a:3,e:"포도상구균 식중독은 잠복기가 평균 1~6시간으로 가장 짧다. 살모넬라균은 12~36시간, 보툴리누스균은 12~72시간이다.",r:93,c:"hygiene"},
{q:"화학물질에 의한 식중독의 원인이 아닌 것은?",o:["불량 첨가물","농약","엔테로톡신","메탄올"],a:2,e:"엔테로톡신은 포도상구균 입니다^_^",r:99,c:"hygiene"},
{q:"빵의 제조과정에서 빵반죽을 분할기에서 분할할 때 달라붙지 않게 하는 첨가물은?",o:["호료(thickening agent)","피막제(coating agent)","용제(solvents)","이형제(release agent)"],a:3,e:"이형제(release agent)는 빵반죽이 팬이나 분할기에 달라붙지 않게 하는 첨가물이다. 유동파라핀 등이 대표적이다.",r:93,c:"ingredients"},
{q:"다음 중 곰팡이독과 관계가 없는 것은?",o:["파툴린(patulin)","아플라톡신(aflatoxin)","시트리닌(citrinin)","고시폴(gossypol)"],a:3,e:"고시폴-식물성 식중독",r:99,c:"hygiene"},
{q:"알레르기(allergy)성 식중독의 원인이 될 수 있는 기능성이 가장 높은 식품은?",o:["오징어","꽁치","갈치","광어"],a:1,e:"꽁치 등 붉은살 생선에는 히스티딘이 많아 세균에 의해 히스타민으로 변환되면 알레르기성 식중독을 일으킬 수 있다.",r:90,c:"hygiene"},
{q:"식품의 처리, 가공, 저장 과정에서의 오염에 대한 설명으로 바르지 못한 것은?",o:["농산물의 재배, 축산물의 성장과정 중에서 1차 오염이 있을 수 있다","수확, 채취 어획, 도살 등의 처리과정에서 2차 오염이 있을 수 있다","양질의 원료와 용수로 1차 오염을 방지할 수 있다","종업원의 철저한 위생 관리만으로도 2차 오염을 방지할 수 있다"],a:3,e:"식품의 2차 오염 방지는 종업원의 위생 관리뿐 아니라 시설·설비 관리, 제조공정 관리 등 종합적인 관리가 필요하다.",r:90,c:"hygiene"},
{q:"다음 전염병과 관계있는 내용으로 연결되지 않은 것은?",o:["콜레라 - 외래 전염병","파상열 - 바이러스성 인수공통전염병","장티푸스 - 고열 수반","세균성 이질 - 점맥성 혈변"],a:1,e:"파상열은 세균성 인수공통전염병이다.",r:99,c:"hygiene"}]},
{title:"2007년 4회",desc:undefined,questions:[{q:"다음 제품 중 반죽 희망 온도가 가장 낮은 것은?",o:["슈","퍼프 페이스트리","카스텔라(카스테라)","파운드케이크"],a:1,e:"과자중엔 슈가 제일 낮음 (40도) 퍼프 페이스트리 20도",r:99,c:"manufacturing"},
{q:"도넛의 흡유량이 높았을 때 그 원인은?",o:["고율배합 제품이다.","튀김시간이 짧다.","튀김온도가 높다.","휴지시간이 짧다."],a:0,e:"도넛 수분 과다 : 팽창과다, 흡유 과다, 형태불균형, 혹돌출, 외부링모양 과대 도넛 수분 부족 : 팽창부족, 형태불균형, 갈라짐, 점도가 큼, 외피에 톱늬모양 발생",r:99,c:"manufacturing"},
{q:"퍼프 페이스트리를 정형할 때 수축하는 경우는?",o:["반죽이 질었을 경우","휴지시간이 길었을 경우","반죽 중 유지 사용량이 많았을 경우","밀어펴기 중 무리한 힘을 가했을 경우"],a:3,e:"퍼프 페이스트리 정형 시 밀어 펴기 중 무리한 힘을 가하면 글루텐이 과도하게 발전하여 수축이 일어난다.",r:82,c:"manufacturing"},
{q:"원형팬의 용적 2.4㎤ 당 1g의 반죽을 넣으려 한다.k 안치수로 팬의 직경이 10cm 높이가 4cm라면 약 얼마의 반죽을 분할해 넣는가?",o:["100g","130g","170g","200g"],a:1,e:"원형팬 용적 = π×r²×h = 3.14×5²×4 = 314cm³. 2.4cm³당 1g이므로 반죽량 = 314/2.4 ≈ 131g, 약 130g이다.",r:98,v:0,c:"manufacturing"},
{q:"비스킷을 제조할 때 유지보다 설탕을 많이 사용하면 어떤 결과가 일어나는가?",o:["제품의 촉감이 단단해 진다.","제품이 부드러워진다.","제품의 퍼짐이 작아진다.","제품의 색깔이 엷어진다."],a:0,e:"비스킷 제조 시 유지보다 설탕을 많이 사용하면 설탕이 수분을 흡수하고 결정화되면서 제품의 촉감이 단단해진다.",r:93,c:"ingredients"},
{q:"과자 제품의 평가 시 내부적 평가 요인이 아닌 것은?",o:["맛","속색","기공","부피"],a:3,e:"과자 제품의 내부적 평가 요인은 맛, 속색, 기공 등이다. 부피는 외부적 평가 요인이다.",r:82,c:"nutrition"},
{q:"꽃을 짜거나 조형물을 만들 머랭을 제조하려 할 때 흰자에 대한 설탕의 사용 비율로 가장 알맞은 것은?",o:["50%","100%","200%","400%"],a:2,e:"꽃짜기용 머랭은 흰자 대비 설탕 200%(2배)를 사용하여 단단하고 안정적인 머랭을 만든다.",r:85,c:"ingredients"},
{q:"젤리 롤 케이크 반죽 굽기에 대한 설명으로 틀린 것은?",o:["두껍게 편 반죽은 낮은 온도에서 굽는다.","구운 후 철판에서 꺼내지 않고 냉각시킨다.","양은 적은 반죽은 높은 온도에서 굽는다.","열이 식으면 압력을 가해 수평을 맞춘다."],a:1,e:"롤 케이크는 구운 후 즉시 팬에서 꺼낸다. 완제품이 찐득거리는 것, 수축하는 것, 말기 시 표면이 터지는 것을 방지할 수 있다.",r:99,c:"manufacturing"},
{q:"슈 재료의 계량시 같이 계량하여서는 안될 재료로 짝지어진 것은?",o:["버터＋물","물＋소금","버터＋소금","밀가루＋베이킹파우더"],a:3,e:"슈 제조 시 밀가루와 베이킹파우더는 함께 계량하면 안 된다. 슈 반죽은 화학적 팽창제 없이 수증기로 부풀리는 제품으로, 베이킹파우더를 사용하지 않으므로 밀가루와 베이킹파우더를 함께 계량하는 것은 잘못된 방법이다.",r:87,c:"ingredients"},
{q:"케이크 반죽의 비중이 정상보다 높을 때의 현상은? (단, 분할 무게는 같다.)",o:["부피가 커진다.","내부에 큰 기포가 생긴다.","부피에 비해 가벼운 제품이 된다.","기공이 조밀해진다."],a:3,e:"케이크 반죽의 비중이 높으면 공기 함유량이 적어 기공이 조밀해지고 부피가 작아지며 제품이 단단해진다.",r:85,c:"manufacturing"},
{q:"먼저 밀가루와 유지를 넣고 믹싱하여 유지에 의해 밀가루가 피복되도록 한 후 나머지 재료를 투입하는 방법으로 유연감을 우선으로 하는 제품에 사용되는 반죽법은?",o:["1단계법","별립법","블렌딩법","크림법"],a:2,e:"1.1단계법 - 모든재료를 한꺼번에 넣고 믹싱하는 방법 (단단계법이라고도 함) 2.별립법 - 흰자와 노른자를 분리하여 설탕을 각각 넣어 거품을 내는 방법 4.크림법 - 유지+설탕 다음 계란 다음 밀가루 및 건조재료를 넣고 혼합하는 방법",r:99,c:"manufacturing"},
{q:"초콜릿 제품을 생산하는데 필요한 기구는?",o:["디핑 포크(dipping forks)","파리샨 나이프(parisienne knife)","파이 롤러(pie roller)","워터 스프레이(water spray)"],a:0,e:"디핑 포크(dipping forks)는 초콜릿 코팅 작업에 사용하는 전문 기구이다.",r:85,c:"ingredients"},
{q:"포장시 일반적인 빵, 과자 제품의 냉각온도로 가장 적합한 것은?",o:["22℃","30℃","37℃","47℃"],a:2,e:"빵·과자 제품의 포장 시 냉각온도는 일반적으로 약 35~38℃(빵 중심부 온도)가 적합하다. 너무 낮으면 노화가 촉진되고 너무 높으면 곰팡이 발생 위험이 있어, 37℃ 내외가 가장 적합하다.",r:80,c:"manufacturing"},
{q:"다음 중 익히는 방법이 다른 것은?",o:["찐빵","엔젤푸드 케이크","스펀지 케이크","파운드 케이크"],a:0,e:"찐빵은 증기(찜)로 익히는 반면, 엔젤푸드 케이크, 스펀지 케이크, 파운드 케이크는 오븐에서 굽는다.",r:82,c:"manufacturing"},
{q:"퐁당아이싱이 끈적거리거나 포장지에 붙는 경향을 감소시키는 방법으로 옳지 않은 것은?",o:["아이싱을 다소 덥게(40℃)하여 사용한다.","아이싱에 최대의 액체를 사용한다.","굳은 것은 설탕시럽을 첨가하거나 데워서 사용한다.","젤라틴, 한천 등과 같은 안정제를 적절하게 사용한다."],a:1,e:"아이싱에 최소의 액체를 사용한다",r:99,c:"ingredients"},
{q:"일반적인 스펀지법에 의한 식빵 제조에 있어 스펀지 배합 후의 반죽온도로 가장 적합한 것은?",o:["18℃","24℃","30℃","35℃"],a:1,e:"스펀지법에 의한 식빵 제조 시 스펀지 배합 후 반죽온도는 약 24℃가 적합하다.",r:82,c:"manufacturing"},
{q:"일반적으로 2차 발효시 완제품 용적의 몇 %까지 팽창시키는가?",o:["30~40%","50~60%","70~80%","90~100%"],a:2,e:"2차 발효 시 일반적으로 완제품 용적의 70~80%까지 팽창시킨다. 오븐 스프링으로 나머지 20~30%가 팽창된다.",r:98,c:"manufacturing"},
{q:"빵의 생산 시 고려해야 할 원가요소와 가장 거리가 먼 것은?",o:["재료비","노무비","경비","학술비"],a:3,e:"원가의 3요소:재료비,노무비(인건비),경비 4번 학술비는 원가의3요소에 해당되지 않음.",r:99,c:"management"},
{q:"정형한 식빵 반죽을 팬에 넣을 때 이음매의 위치는?",o:["위","아래","좌측","우측"],a:1,e:"정형한 식빵 반죽은 이음매를 아래로 하여 팬에 넣는다. 이음매가 위로 오면 구울 때 벌어질 수 있다.",r:82,c:"manufacturing"},
{q:"빵의 노화를 지연시키는 방법 중 잘못된 것은?",o:["-18℃에서 밀봉 보관한다.","2~10℃에서 보관한다.","당류를 첨가한다.","방습 포장지로 포장한다."],a:1,e:"0~10도에서 노화가 가장빠르게 일어난다",r:99,c:"manufacturing"},
{q:"액체 발효법에서 가장 정확한 발효점 측정법은?",o:["부피의 증가도 측정","거품의 상태 측정","산도 측정","액의 색 변화 측정"],a:2,e:"액체 발효법에서는 산도(pH) 측정이 가장 정확한 발효점 측정법이다. 발효가 진행될수록 유기산이 생성되어 산도가 변한다.",r:90,c:"manufacturing"},
{q:"빵을 구울 때 글루텐이 응고되기 시작하는 온도는?",o:["37℃","54℃","74℃","97℃"],a:2,e:"빵을 구울 때 글루텐(단백질)은 약 74℃에서 응고가 완성되기 시작한다. 이 온도에서 단백질 변성이 일어나 빵의 구조가 고정된다.",r:82,c:"ingredients"},
{q:"스트레이트법에서 반죽시간에 영향을 주는 요인과 거리가 먼 것은?",o:["밀가루 종류","이스트 양","물의 양","쇼트닝 양"],a:1,e:"이스트 양은 발효 속도에 영향을 주지만 반죽 믹싱 시간에는 거의 영향을 주지 않는다. 반죽시간에 영향을 주는 요인은 밀가루 종류(강력분/박력분), 물의 양, 쇼트닝 양 등이다.",r:93,c:"ingredients"},
{q:"주로 소매점에서 자주 사용하는 믹서로써 거품형 케이크 및 빵 반죽이 모두 가능한 믹서는?",o:["수직 믹서 (vertical mixer)","스파이럴 믹서 (spiral mixer)","수평 믹서 (horizontal mixer)","핀 믹서 (pin mixer)"],a:0,e:"수직믹서(vertical mixer)는 소매점에서 자주 사용하며, 거품형 케이크와 빵 반죽 모두 가능한 다용도 믹서이다.",r:93,c:"manufacturing"},
{q:"500g의 완제품 식빵 200개를 제조하려 할 때 발효 손실이 1%, 굽기 냉각손실이 12%, 총 배햡율이 180%라면 밀가루의 무게는?",o:["47kg","55kg","64kg","71kg"],a:2,e:"총 반죽량 = 500×200 / (1-0.01) / (1-0.12) = 100000 / 0.99 / 0.88 ≈ 115,884g\n밀가루 = 115,884 / 1.80 ≈ 64,380g ≈ 64kg",r:93,c:"manufacturing"},
{q:"식빵의 굽기 후 포장온도로 가장 적합한 것은?",o:["25~30℃","35~40℃","42~47℃","50~55℃"],a:1,e:"국가기술자격 시험의 표준 이론상 식빵의 포장 온도는 35~40℃(평균 38℃)로 정의됩니다.",r:99,c:"manufacturing"},
{q:"냉동반죽 제품의 장점이 아닌 것은?",o:["계획생산이 가능하다.","인당 생산량이 증가한다.","이스트의 사용량이 감소한다.","반죽의 저장성이 향상된다."],a:2,e:"냉동반죽은 이스트 함량을 2배정도 늘려 사용한다.",r:99,c:"manufacturing"},
{q:"둥글리기 하는 동안 반죽의 끈적거림을 없애는 방법으로 잘못된 것은?",o:["반죽의 최적 발효상태를 유지한다.","덧가루를 사용한다.","반죽에 유화제를 사용한다.","반죽에 피라핀 용약을 10% 첨가한다."],a:3,e:"둥글리기 시 끈적거림 방지를 위해 적정량의 밀가루(뿌림가루)를 사용하거나 식용유를 소량 도포한다. 파라핀 용액을 반죽에 첨가하는 것은 식품 안전상 부적절한 방법이다.",r:90,c:"manufacturing"},
{q:"다음 중 빵의 노화속도가 가장 빠른 온도는?",o:["-1~·18℃","0~10℃","20~30℃","35~45℃"],a:1,e:"냉장보관 온도가 노화가 가장 빠름",r:99,c:"manufacturing"},
{q:"오븐에서 빵이 갑자기 팽창하는 현상인 오븐 스프링이 발생하는 이유와 거리가 먼 것은?",o:["가스압의 증가","알코올의 증발","탄산가스의 증발","단백질의 변성"],a:3,e:"오븐 스프링은 가스압 증가, 알코올 증발, 탄산가스 팽창 등으로 발생한다. 단백질 변성은 오븐 스프링이 아니라 빵의 구조 형성에 관여하며, 오히려 팽창을 멈추게 하는 요인이다.",r:85,c:"manufacturing"},
{q:"맥아당을 2분자의 포도당으로 분해하는 효소는?",o:["알파 아밀라이제","베타 아밀라아제","디아스타아제","말타아제"],a:3,e:"말타아제(maltase)는 맥아당(maltose)을 2분자의 포도당으로 분해하는 효소이다.",r:85,c:"ingredients"},
{q:"전분에 물을 가하고 가열하면 팽윤되고 전분 입자의 미세구조가 파괴되는데 이 현상을 무엇이라 하는가?",o:["노화","호정화","호화","당화"],a:2,e:"전분에 물을 가하고 가열하면 전분 입자가 팽윤되고 미세구조가 파괴되는 현상을 호화(gelatinization)라 한다.",r:90,c:"ingredients"},
{q:"믹싱시간, 믹싱내구성, 흡수율 등 반죽의 배합이나 혼합을 위한 기초 자료를 제공하는 것은?",o:["아밀로그래프","익스텐소그래프","패리노그래프","알베오그래프"],a:2,e:"패리노그래프는 믹싱시간, 믹싱내구성, 흡수율 등 반죽의 물리적 특성을 측정하여 배합과 혼합을 위한 기초 자료를 제공한다.",r:93,c:"manufacturing"},
{q:"케이크 제조에 사용되는 계란의 역할이 아닌 것은?",o:["결합제 역할","글루텐 형성 작용","유화력 보유","팽창 작용"],a:1,e:"계란은 케이크에서 결합제, 유화력, 팽창작용의 역할을 한다. 글루텐 형성은 밀가루 단백질의 기능이지 계란의 역할이 아니다.",r:93,c:"ingredients"},
{q:"비터 초콜릿(Bitter chocolate) 32% 중에는 코코아가 약 얼마 정도 함유되어 있는가?",o:["8%","12%","20%","24%"],a:2,e:"초콜릿 구성성분 코코아 : 5/8(62.5%) 카카오버터 : 3/8(37.5%) 32*0.625=20",r:99,c:"ingredients"},
{q:"다음 중 감미도가 가장 높은 당은?",o:["유당","포도당","설탕","과당"],a:3,e:"유당<갈락토오스<맥아당<물엿<올리고당<포도당<설탕<꿀<전화당<과당",r:99,c:"ingredients"},
{q:"일시적 경수에 대하여 바르게 설명한 것은?",o:["탄산염에 기인한다.","황산염에 기인한다.","끓여도 제거되지 않는다.","연수로 변화시킬 수 없다."],a:0,e:"일시적 경수 : 탄산칼슘의 형태로 들어있는 경수로, 끓이면 불용성탄산염으로 분해되고 가라앉아 연수가됨. 영구적 경수 : 황산칼슘, 황산마그네슘이 들어있는 경수로, 끓여도 불변함.",r:99,c:"ingredients"},
{q:"우유 단백질 중 함량이 가장 많은 것은?",o:["락토알부민","락토글로불린","글루테닌","카제인"],a:3,e:"우유 단백질 중 카제인이 약 80%로 가장 많다. 락토알부민과 락토글로불린은 유청 단백질이며 소량이다. 글루테닌은 밀 단백질이다.",r:90,c:"ingredients"},
{q:"산화제를 사용하면 -SH 기가 S-S결합으로 바뀌게 되는데 다음 중 이 반응과 관계가 깊은 것은?",o:["밀가루의 단백질","밀가루의 전분","고구마의 수분","감자의 지방"],a:0,e:"산화제는 밀가루 단백질의 -SH기를 S-S 결합으로 산화시켜 글루텐 구조를 강화한다.",r:85,c:"ingredients"},
{q:"가소성이 크다는 것의 의미는?",o:["저온에서 너무 단단하지 않으면서도 고온에서 너무 무르지 않다.","저온에서는 너무 무르지 않으면서도 고온에서 너무 단단하지 않다.","저온에서는 무르고 고온에서는 단단하다.","저온에서는 단단하고 고온에서는 무르다."],a:0,e:"가소성이 크다는 것은 넓은 온도 범위에서 작업성이 좋다는 의미로, 저온에서 너무 단단하지 않으면서도 고온에서 너무 무르지 않은 상태이다.",r:93,c:"ingredients"},
{q:"글루텐의 탄력성을 부여하는 것은?",o:["글루테닌","글리아딘","글로불린","알부민"],a:0,e:"글리아딘 : 반죽이 신장성을 갖게 하고 빵의 부피와 관련 클루테닌 : 반죽이 탄력성을 갖게하고 빵의 반죽형성 시간과 관련 글리아딘과 글루테닌이 물과 만나 믹싱에 의해 결합하여 글루텐을 만든다",r:99,c:"ingredients"},
{q:"동물의 가죽이나 뼈 등에서 추출하며 안정제로 사용되는 것은?",o:["젤라틴","한천","펙틴","카라기난"],a:0,e:"젤라틴은 동물의 가죽·뼈·힘줄에서 추출한 단백질로, 안정제·겔화제로 사용된다. 한천은 해조류, 펙틴은 과일, 카라기난은 홍조류에서 추출한다.",r:90,c:"ingredients"},
{q:"술에 대한 설명으로 틀린 것은?",o:["제과, 제빵에서 술을 사용하는 이유 중의 하나는 바람직하지 못한 냄새를 없애주는 것이다.","양조주란 곡물이나 과실을 원료로 하여 효모로 발효시킨 것이다.","증류주란 발효시킨 양조주를 증류한 것이다.","혼성주란 증류주를 기본으로 하여 정제당을 넣고 과실등의 추출물로 향미를 낸 것으로 대부분 알코올 농도가 낮다."],a:3,e:"혼성주는 대부분 알콜 농도가 높다.",r:99,c:"ingredients"},
{q:"이스트에 거의 들어있지 않은 효소로 디아스타아제라고도 불리는 것은?",o:["인버타아제","아밀라아제","프로테아제","말타아제"],a:1,e:"디아스타제 : 보리를 발아시켜 맥아를 만들어 물로 침출한 다음, 알코올을 첨가 하여 디아스타아제를 침전시키고, 그 녹말의 소화력을 200배로 조절한 것으로 주로 α와 β-아밀라아제로 되어 있으며, 녹말을 가수분해 하여 말토오스와 소량의 덱스트린을 생성한다. 녹말질의 소화제이며 소화불량·식욕부진·위장장애에 쓰인다.",r:99,c:"nutrition"},
{q:"반죽의 pH가 가장 낮아야 좋은 제품은",o:["레이어 케이크","스펀지 케이크","파운드 케이크","과일 케이크"],a:3,e:"과일 케이크는 과일의 산성 성분과 잘 어울리도록 반죽의 pH가 낮은(산성) 상태에서 품질이 좋다. 산성 환경은 과일의 색과 풍미를 유지하는 데도 도움이 된다.",r:93,c:"manufacturing"},
{q:"지방 1g이 생산하는 에너지의 양은?",o:["4kcal","9kcal","14kcal","12Kcal"],a:1,e:"지방 1g은 9kcal의 에너지를 생산한다. 탄수화물과 단백질은 각 4kcal/g이다.",r:85,c:"nutrition"},
{q:"뼈를 구성하는 무기질 중 그 비율이 가장 중요한 것은?",o:["P : Cu","Fe : Mg","Ca : P","K : Mg"],a:2,e:"칼슘(ca) 2:인(p) 1 비율",r:99,c:"nutrition"},
{q:"체내에서 사용한 단백질은 주로 어떤 경로를 통해 배설되는가?",o:["호흡","소변","대변","피부"],a:1,e:"체내에서 사용한 단백질은 아미노산으로 분해된 후 질소는 요소로 전환되어 주로 소변(신장)을 통해 배설된다.",r:82,c:"nutrition"},
{q:"펩티드(peptide) 사슬이 이중 나선구조를 이루고 있는 것은?",o:["비타민 A의 구조","글리세롤과 지방산의 에스테르 결합구조","아밀로펙틴의 가지구조","단백질의 2차 구조"],a:3,e:"단백질의 2차 구조에서 알파-헬릭스(α-helix)는 펩티드 사슬이 나선구조를 이루고 있다.",r:85,c:"nutrition"},
{q:"1일 2000kcal를 섭취하는 성인의 경우 탄수화물의 적절한 섭취량은?",o:["1100~1400g","850~1050g","500~735g","275~350g"],a:3,e:"탄수화물 : 1g = 4Kcal 1일 섭취량 70% 2000Kcal * 0.7 = 1400 1400/4 = 350g",r:99,c:"nutrition"},
{q:"독소형 식중독에 해당하는 것은?",o:["포도상구균","장염 비브리오균","병원성 대장균","살모넬라균"],a:0,e:"살모넬라균과 장염비브리오균과 병원성 대장균은 감염형 식중독이다. 제빵",r:99,c:"hygiene"},
{q:"경구전염병의 예방대책에 대한 설명으로 틀린 것은?",o:["건강유지와 저항력의 향상에 노력한다.","의식전환운동, 계몽활동, 위생교육 등을 정기적으로 실시한다.","오염이 의심되는 식품은 폐끼한다.","모든 예방접종은 1회만 실시한다."],a:3,e:"예방접종은 질병에 따라 추가 접종이 필요하므로 '모든 예방접종은 1회만 실시한다'는 틀린 설명이다.",r:85,c:"hygiene"},
{q:"식품첨가물 중 보존료의 구비조건과 거리가 먼 것은?",o:["사용법이 간단해야 한다.","미생물의 발육저지력이 약해야 한다.","오염이 의심되는 식품은 폐기한다.","모든 예방접종은 1회만 실시한다."],a:1,e:"보존료의 구비조건은 사용법이 간단하고, 미생물 발육저지력이 강해야 하며, 식품 성분에 영향이 없어야 한다. 발육저지력이 약하면 보존료로서 의미가 없다.",r:93,c:"ingredients"},
{q:"세균성 식중독 중 일반적으로 잠복기가 가장 짧은 것은?",o:["사모넬라 식중독","포도상구균 식중독","장염 비브리오 식중독","클로스트리디움 보툴리늄 식중독"],a:1,e:"포도상구균 식중독은 잠복기가 평균 1~6시간으로 세균성 식중독 중 가장 짧다.",r:85,c:"hygiene"},
{q:"소독력이 강한 양이온계면활성제로서 종업원의 손을 소독할 때나 용기 및 기구의 소독제로 알맞은 것은?",o:["석탄산","과산화수소","역성비누","크레졸"],a:2,e:"역성비누(양이온계면활성제)는 소독력이 강하여 손, 용기, 기구 소독에 적합하다.",r:85,c:"hygiene"},
{q:"원인균은 바실러스안트라시스이며 수육을 조리하지 않고 섭취할 때 발생하는 전염병은?",o:["야토병","탄저","브루셀라병","돈단독"],a:1,e:"바실러스 안트라시스(탄저균)는 탄저의 원인균으로, 조리하지 않은 수육 섭취 시 감염될 수 있다.",r:82,c:"hygiene"},
{q:"식품첨가물의 규격과 사용기준을 정하는 자는?",o:["식품의약품안전청장","국립보건원장","시, 도 보건연구소장","시, 군 보건소장"],a:0,e:"식품첨가물의 규격과 사용기준은 식품의약품안전청장(현 식품의약품안전처장)이 정한다.",r:85,c:"ingredients"},
{q:"살균이 불충분한 육류 통조림으로 인해 식중독이 발생했을 경우 가장 관련이 깊은 식중독균은?",o:["사모넬라균","시젤라균","황색포도상구균","보툴리누스균"],a:3,e:"보툴리누스균의 원인은 통조림, 소시지 등 혐기상태 시 발육하며 신경마비, 시력장애 등이 발생한다.",r:99,c:"hygiene"},
{q:"인수공통전염병의 예방조치로 바람직하지 않은 것은?",o:["우유의 멸균처리를 철저히 한다.","이환된 동물의 고기는 익혀서 먹는다.","가축의 예방접종을 한다.","외국으로부터 유입되는 가축은 항구나 공항 등에서 검역을 철저히 한다."],a:1,e:"인수공통전염병 예방을 위해 우유 멸균, 이환 동물 고기 익혀 먹기, 가축 예방접종이 필요하다. '외국으로부터 유입되는 가축의 검역을 철저히 한다'는 바람직한 조치에 해당하므로 '바람직하지 않은 것'이 된다.\n※ 출제 의도는 검역이 예방이 아닌 방역 조치라는 관점이다.",r:70,c:"hygiene"},
{q:"장염 비브리오균에 의한 식중독이 가장 일어나기 쉬운 식품은?",o:["식육류","우유제품","야채류","어패류"],a:3,e:"장염 비브리오균은 해수에 서식하여 어패류를 통해 식중독을 일으킨다.",r:82,c:"hygiene"}]},
{title:"2007년 5회",desc:undefined,questions:[{q:"쿠키의 퍼짐이 나빠지는 원인이 아닌 것은?",o:["높은 오븐 온도","과도한 믹싱","입자가 고운 설탕 사용","알칼리성 반죽"],a:3,e:"알칼리성 반죽은 쿠키의 퍼짐성을 오히려 증가시킨다. 높은 오븐 온도, 과도한 믹싱, 입자가 고운 설탕은 퍼짐을 나쁘게 하는 원인이므로 알칼리성 반죽은 퍼짐이 나빠지는 원인이 아니다.",r:93,c:"manufacturing"},
{q:"생산 공장시설의 효율적 배치에 대한 설명 주 적합하지 않은 것은?",o:["작업용 바닥면적은 그 장소를 이용하는 사람들의 수에 따라 달라진다.","판매장소와 공장의 면적배분(판매3:공장1)의 비율로 구성되는 것이 바람직하다.","공장의 소요면적은 주방설비의 설치면적과 기술자의 작업을 위한 공간면적으로 이루어진다.","공장의 모든 업무가 효과적으로 진행되기 위한 기본은 주방의 위치와 규모에 대한 설계이다."],a:1,e:"판매장소와 공장의 면적배분은 일반적으로 공장3:판매1 비율이 바람직하다. 판매3:공장1은 적합하지 않다.",r:85,v:0,c:"manufacturing"},
{q:"반죽의 비중에 대한 설명이 틀린 것은?",o:["비중이 낮을수록 공기 함유량이 많아서 제품이 가볍고 조직이 거칠다.","비중이 높을수록 공기 함유량이 적어서 제품의 기공이 조밀하다.","비중이 같아도 제품의 식감은 다를 수 있다.","비중은 같은 부피의 반죽무게를 같은 부피의 계란무게로 나눈 것이다."],a:3,e:"비중은 같은 부피의 반죽무게를 같은 부피의 물 무게로 나눈 것이다. 계란무게가 아니다.",r:85,c:"manufacturing"},
{q:"케이크 도넛에 가장 알맞은 튀김 온도는?",o:["150℃","180℃","210℃","230℃"],a:1,e:"케이크 도넛의 적정 튀김온도는 약 180℃(175~185℃)이다.",r:85,c:"manufacturing"},
{q:"반죽무게를 구하는 식은?",o:["틀부피×비용적","틀부피＋비용적","틀부피÷비용적","틀부피－비용적"],a:2,e:"비용적(specific volume)은 단위 무게당 부피(mL/g)이다. 따라서 반죽무게 = 틀부피 ÷ 비용적이 올바른 공식이다.",r:87,c:"ingredients"},
{q:"흰자를 거품내면서 뜨겁게 끓인 시럽을 부어 만든 머랭은?",o:["냉제 머랭","온제 머랭","스위스 머랭","이탈리안 머랭"],a:3,e:"냉제머랭 (프렌치머랭) : 차가운 상태의 흰자를 휘핑해 거품을 내는것, 설탕을 한번에 넣지않고 조금씩 나누어 휘핑친다 온제머랭 = 스위스머랭 : 흰자에 설탕을 넣은 후 중탕을하면서 휘핑. 케이크 크림으로 적합",r:99,c:"ingredients"},
{q:"반죽형 케이크 반죽을 부피 위주로 만들 때 사용할 믹싱 방법은?",o:["1단계법","설탕/물법","블렌딩벙","크림법"],a:3,e:"크림법은 유지와 설탕을 먼저 크림 상태로 만든 후 다른 재료를 순서대로 넣는 방법으로, 공기를 충분히 포집하여 부피가 크고 가벼운 제품을 만드는 데 적합하다.",r:85,c:"manufacturing"},
{q:"다음 제품 중 반죽의 pH가 가장 낮을 때 좋은 제품이 나오는 것은?",o:["엔젤 푸드 케이크","데블스 푸드 케이크","초콜릿 케이크","옐로 레이어 케이크"],a:0,e:"데블스 푸드 케이크는 코코아의 색상이 pH에 따라 변화하는 특성이 있어 pH 조절이 중요한 제품이다. ※ 엔젤 푸드 케이크는 크림 오브 타르타(산성)를 사용하여 낮은 pH에서 제조한다.",r:70,c:"ingredients"},
{q:"언더 베이킹(under baking)에 대한 설명으로 틀린 것은?",o:["낮은 온도에서 굽는 것이다.","중앙부분이 익지 않는 경우가 많다.","윗면이 갈라지기 쉽다.","속이 거칠어지기 쉽다."],a:0,e:"언더베이킹은 고온으로 짧게 굽는것이다",r:99,c:"manufacturing"},
{q:"제과 제품을 평가하는데 있어 외부 특성에 해당하지 않는 것은?",o:["부피","껍질색","기공","균형"],a:2,e:"기공은 내부 특성 입니다",r:99,c:"manufacturing"},
{q:"모카 아이싱(Mocha lcing)의 특징을 결정하는 재료는?",o:["커피","코코아","초콜릿","분당"],a:0,e:"모카 아이싱의 특징은 커피를 사용하여 커피 풍미를 내는 것이다.",r:82,c:"ingredients"},
{q:"스펀지케이크 제조 시 덥게 하는 방법으로 사용할 때 계란과 설탕은 몇 도로 가온하여 믹싱하는 것이 가장 적당한가?",o:["30℃","43℃","55℃","70℃"],a:1,e:"스펀지케이크의 덥게 하는 방법(warm method)에서 계란과 설탕은 약 43℃(40~45℃)로 가온하여 믹싱한다.",r:90,c:"manufacturing"},
{q:"다음 중 반죽의 얼음사용량 계산공식으로 옳은 것은?",o:["얼음={물사용량×(수돗물온도－사용수온도)}/80＋수돗물온도","얼음={물사용량×(수돗물온도＋사용수온도)}/80＋수돗물온도","얼음={물사용량×(수돗물온도×사용수온도)}/80＋수돗물온도","얼음={물사용량×(계산된물온도－수돗물온도)}/80＋수돗물온도"],a:0,e:"반죽의 얼음 사용량은 공식1로 계산한다. 얼음의 융해 잠열(80kcal/kg)을 적용하여 목표 반죽 온도를 맞추기 위한 얼음량을 산출하는 방식이다.",r:77,c:"manufacturing"},
{q:"설탕공예용 당액 제조 시 고농도화된 당의 결정을 막아주는 재료는?",o:["중조","물엿","포도당","베이킹파우더"],a:1,e:"1. 중조(탄산수소나트륨) :빵, 과자 제조시 맛을 좋고 연하게 하여 소화가 잘되게 2. 타타르산 4. 화학적 팽창제",r:99,c:"ingredients"},
{q:"다음 중 달걀노른자를 사용하지 않는 케이크는?",o:["파운드 케이크","엔젤 푸드 케이크","소프트 롤케이크","옐로 레이어 케이크"],a:1,e:"엔젤 푸드 케이크는 하얀색이 특징입니다. 따라서 노란색인 노른자는 사용하지 않죠",r:99,c:"manufacturing"},
{q:"다음 중 스펀지 발효를 마친 반죽의 적정 pH는?",o:["pH 2.8","pH 4.8","pH 6.8","pH 8.8"],a:1,e:"스펀지 발효를 마친 반죽의 적정 pH는 약 4.8이다. 발효 중 유기산이 생성되어 pH가 낮아진다.",r:85,c:"manufacturing"},
{q:"오븐에서의 부피 팽창 시 나타나는 현상이 아닌 것은?",o:["탄산가스가 발생한다.","발효에서 생긴 가스가 팽창한다.","약 80℃에서 알코올이 증발한다.","약 90℃까지 이스트의 활동이 활발하다."],a:3,e:"오븐에서 부피 팽창 시 탄산가스 발생, 가스 팽창, 약 80℃에서 알코올 증발 등이 일어난다. 이스트는 약 60℃에서 사멸하므로 90℃까지 활동이 활발하다는 설명은 틀리다.",r:93,c:"manufacturing"},
{q:"스트레이트법에서 1차 발효 시 발효 상태를 파악하기 위해 손가락으로 눌렀을 때 가장 발효상태가 좋은 것은?",o:["누른 자국이 점점 커진다.","반죽 부분이 퍼진다.","누른 부분이 살짝 오므라든다.","누른 부분이 옆으로 퍼져 함몰한다."],a:2,e:"1차 발효 상태 확인 시 손가락으로 누른 부분이 살짝 오므라드는 것이 적정 발효 상태이다. 점점 커지면 과발효, 바로 돌아오면 발효 부족이다.",r:93,c:"manufacturing"},
{q:"원가에 대한 설명 중 틀린 것은?",o:["기초원가는 직접 노무비, 직접 재료비를 말한다.","직접원가는 기초원가에 직접 경비를 더한 것이다.","제조원가는 간접비를 포함한 것으로 보통 제품의 원가라고 한다.","총원가는 제조원가에서 판매비용을 뺀 것이다."],a:3,e:"총원가 = 제조원가-판매비+일반관리비",r:99,c:"management"},
{q:"팬 오일의 구비조건이 아닌 것은?",o:["높은 발연점","무색, 무미, 무취","가소성","항산화성"],a:2,e:"팬 오일의 구비조건 1. 산패에 강할것 2. 반죽 무게의 0.1~0.2%를 사용할것 3. 발연점이 210도 이상될것 4. 무색 무취 무미일것",r:99,c:"ingredients"},
{q:"냉동반죽의 특성에 대한 설명 중 틀린 것은?",o:["냉동반죽에는 이스트 사용량을 늘인다.","냉동반죽에는 당, 유지 등을 첨가하는 것이 좋다.","냉동 중 수분의 손실을 고려하여 될 수 있는 대로 진반죽이 좋다.","냉동반죽은 분할량을 적게 하는 것이 좋다."],a:2,e:"냉동반죽은 수분 손실을 최소화하기 위해 오히려 되직한(단단한) 반죽이 유리하다. 진 반죽은 냉동·해동 과정에서 수분 이동이 심해져 글루텐 구조와 제품 품질이 저하된다.",r:95,c:"manufacturing"},
{q:"식빵의 일반적인 비용적은?",o:["0.36㎤/g","1.36㎤/g","3.36㎤/g","5.36㎤/g"],a:2,e:"식빵의 일반적인 비용적(specific volume)은 약 3.36 cm³/g이다. 비용적은 제품 부피(cm³)를 무게(g)로 나눈 값으로, 이 범위는 식빵의 표준적인 부피감을 나타낸다.",r:70,c:"ingredients"},
{q:"스펀지/도법으로 제빵시 본반죽 만들 때의 온도로 가장 적합한 것은?",o:["22℃","27℃","33℃","40℃"],a:1,e:"스펀지/도법에서 본반죽(도우) 온도는 약 27℃가 표준이다. 스펀지 온도(23~25℃)보다 약간 높게 설정하여 적절한 발효 속도를 확보한다.",r:90,c:"manufacturing"},
{q:"단백질 분해효소인 프로테아제(protease)를 햄버거빵에 첨가하는 이유로 가장 알맞은 것은?",o:["저장성 증가를 위하여","팬 흐름성을 좋게 하기 위하여","껍질색 개선을 위하셔","발효 내구력을 증가시키기 위하여"],a:1,e:"프로테아제는 단백질(글루텐)을 분해하여 반죽의 신전성을 높이고 팬 흐름성(pan flow)을 좋게 한다. 햄버거빵처럼 팬에서 얇고 넓게 퍼져야 하는 제품에 사용된다.",r:95,c:"nutrition"},
{q:"반죽 믹싱의 목적에 적합하지 않는 것은?",o:["반죽의 신전성과 탄력성 부여","물의 흡수력 증감 조절","재료의 혼합","글루텐 형성으로 빵의 내상 개선"],a:1,e:"반죽 믹싱의 목적은 재료 혼합, 글루텐 형성, 신전성과 탄력성 부여 등이다. 물의 흡수력 증감 조절은 믹싱의 직접적 목적이 아니다.",r:93,c:"manufacturing"},
{q:"일반적인 바게트(baguette)의 분할 무게로 가장 적합한 것은?",o:["50g","200g","350g","600g"],a:2,e:"바게트의 일반적인 분할 무게는 약 350g이다.",r:78,c:"manufacturing"},
{q:"어떤 제품을 다음과 같은 조건으로 구웠을 때 제품에 남는 수분이 가장 많은 것은?",o:["165℃ 45분간","190℃에서 35분간","205℃에서 40분간","220℃에서 20분간"],a:3,e:"220℃에서 20분간 구우면 높은 온도로 인해 겉이 빠르게 크러스트를 형성하여 내부 수분이 빠져나가지 못하므로 제품에 남는 수분이 가장 많다.",r:93,c:"ingredients"},
{q:"식빵의 냉각법 중 자연 냉각시 일반적으로 소요되는 시간은?",o:["30분","1시간","3시간","6 시간"],a:2,e:"식빵의 자연 냉각 시 일반적으로 약 2~3시간이 소요된다.",r:82,c:"manufacturing"},
{q:"다음 중 제2차 발효실의 온도와 습도로 적합한 것은?",o:["온도 27~29℃, 습도 90~100%","온도 38~40℃, 습도 90~100%","온도 38~40℃, 습도 80~90%","온도 27~29℃, 습도 80~90%"],a:2,e:"2차발효: 성형과정을 거치는 동안 불완전한 상태의 반죽을 온도 38도 전후, 습도 85% 전후의 발효실에 넣어 숙성시켜 좋은 외형과 식감의 제품을 얻기 위하여 제품 부피의 70~80%까지 부풀리는 작업.",r:99,c:"manufacturing"},
{q:"다음 중 제품 특성상 일반적으로 노화가 가장 빠른 것은?",o:["단과자빵","카스테라","식빵","도넛"],a:2,e:"식빵은 설탕과 유지 함량이 적은 저율배합 제품으로, 단과자빵이나 카스테라보다 노화가 빠르다. 설탕과 유지는 노화를 지연시키는 역할을 한다.",r:90,c:"manufacturing"},
{q:"제과에 많이 쓰이는 럼주는 무엇을 원료로 하여 만드는 술인가?",o:["옥수수 전분","포도당","당밀","타피오카"],a:2,e:"럼주는 사탕수수의 당밀(molasses)을 원료로 발효·증류하여 만든다.",r:82,v:0,c:"ingredients"},
{q:"다음 중 단순단백질이 아닌 것은?",o:["알부민","글루코프로테인","글로불린","히스톤"],a:1,e:"단순단백질의 종류 : 알부민, 글로불린, 글루텔린, 프롤라민, 알부미노이드, 히스톤 이 있다. 그러므로 2번 글루코프로테인은 x",r:99,c:"nutrition"},
{q:"압착 이스트의 고형분의 함량으로 가장 적합한 것은?",o:["10%","30%","50%","70%"],a:1,e:"압착 이스트(생이스트)의 수분 함량은 약 68~73%이며, 고형분은 약 27~32%이다. 따라서 고형분 함량은 약 30%가 가장 적합하다.",r:92,c:"ingredients"},
{q:"수중 유적형(o/w)식품이 아닌 것은?",o:["우유","마가린","마요네즈","아이스크림"],a:1,e:"수중 유적형(o/w)은 물 속에 기름방울이 분산된 형태로 우유, 마요네즈, 아이스크림이 해당한다. 마가린은 유중 수적형(w/o)으로 기름 속에 물방울이 분산된 형태이다.",r:90,c:"ingredients"},
{q:"빵 제조시 연수를 사용할 경우 적절한 조치는?",o:["끓여서 여과","약산 처리","이스트푸드량 증가","소금량 감소"],a:2,e:"연수는 미네랄이 적어 글루텐을 약화시킨다. 이스트푸드에는 칼슘염 등이 포함되어 반죽을 강화하므로, 연수 사용 시 이스트푸드량을 증가시켜 보완한다.",r:93,c:"ingredients"},
{q:"밀가루 반죽의 점탄성을 측정하는 기구는?",o:["페네트로미터","유니버셜미터","오스왈드비스코미터","패리노그래프"],a:3,e:"패리노그래프는 밀가루 반죽의 점탄성을 측정하는 대표적인 기구이다.",r:85,c:"ingredients"},
{q:"단맛의 강도 순서로 옳은 것은?",o:["과당 > 설탕 > 포도당 > 맥아당","맥아당 > 과당 > 설탕 > 포도당","설탕 > 과당 > 포도당 > 맥아당","포도당 > 설탕 > 과당 > 맥아당"],a:0,e:"상대적 감미도 : 과당 - 175, 설탕(자당, 기준) - 100, 포도당 - 75 , 맥아당(엿당) - 32",r:99,c:"ingredients"},
{q:"이자액에서 분비되는 단백질 분해효소는?",o:["프로테아제","펩신","트립신","레닌"],a:2,e:"이자액(췌액)에서 분비되는 대표적인 단백질 분해효소는 트립신(trypsin)이다. 펩신은 위액, 레닌은 송아지 위에서 분비되며, 프로테아제는 단백질 분해효소의 총칭이다.",r:90,c:"nutrition"},
{q:"휘핑크림과 아이스크림믹스의 유화안정을 위한 안정제와 거리가 먼 것은?",o:["가티검(ghatti gum)","구아검(guar gum)","로카스트빈 검(locust bean gum)","잔탄검(xanthan gum)"],a:0,e:"가티검(ghatti gum)은 유화안정용 안정제보다는 접착제나 증점제로 사용된다. 구아검, 로카스트빈 검, 잔탄검은 유화안정을 위한 대표적 안정제이다.",r:93,c:"ingredients"},
{q:"맥아당은 이스트의 발효과정 중에 효소에 의해 어떻게 분해되는가?",o:["포도당＋포도당","포도당＋과당","포도당＋유당","과당＋과당"],a:0,e:"맥아당(maltose)은 말타아제(maltase) 효소에 의해 포도당 + 포도당으로 분해된다.",r:77,c:"ingredients"},
{q:"호밀빵 제조시 호밀을 사용하는 이유 및 기능과 거리가 먼 것은?",o:["독특한 맛 부여","조직의 특성 부여","색상 향상","구조력 향상"],a:3,e:"호밀은 글루텐 형성 능력이 약하여 구조력(빵의 뼈대)을 향상시키지 못한다. 독특한 맛, 조직 특성, 진한 색상을 부여하는 것이 호밀의 기능이다.",r:93,c:"manufacturing"},
{q:"우유 중에 가장 많이 함유된 단백질은?",o:["카제인","락토알부민","락토글로불린","혈청 알부민"],a:0,e:"우유 단백질의 약 80%는 카제인(casein)이며, 나머지는 락토알부민, 락토글로불린 등의 유청단백질이다. 카제인은 산이나 레닌에 의해 응고되는 특성이 있다.",r:90,c:"ingredients"},
{q:"젤리를 제조하는데 당분 60~65%, 펙틴 1.0~1.5%일 때 가장 적합한 것은?",o:["pH1.0","pH3.2","pH7.8","pH10.0"],a:1,e:"젤리 제조 시 펙틴 1.0~1.5%, 당분 60~65% 조건에서 pH 3.0~3.5가 적합하다. pH 3.2가 가장 적합하다.",r:85,c:"manufacturing"},
{q:"빵에 쓰이는 유지의 지방산에 대한 설명 중 맞는 것은?",o:["일반적으로 자연계에서 얻어지는 지방산은 탄소수가 홀수이며 직쇄상이다.","일반적으로 자연계에서 얻어지는 지방산은 탄소수가 짝수이며 직쇄상이다.","일반적으로 자연계에서 얻어지는 지방산은 탄소수가 홀수이며 환상이다.","일반적으로 자연계에서 얻어지는 지방산은 탄소수가 짝수이며 환상이다."],a:1,e:"자연계의 지방산은 일반적으로 탄소수가 짝수이며 직쇄상(곧은 사슬)이다.",r:85,c:"ingredients"},
{q:"어떤 케이크를 생산하는데 전란이 1000g 필요하다. 껍질 포함 60g짜리 달걀은 몇 개가 있어야 하는가?",o:["17개","19개","21개","23개"],a:1,e:"1000÷(60×0.9)",r:99,c:"manufacturing"},
{q:"적혈구, 뇌세포, 신경세포의 주요 에너지원으로 혈당을 형성하는 당은?",o:["과당","설탕","유당","포도당"],a:3,e:"적혈구, 뇌세포, 신경세포의 주요 에너지원은 포도당(glucose)이다. 혈당도 포도당으로 구성된다.",r:82,c:"ingredients"},
{q:"다음 중 수소를 첨가하여 얻는 유지류는?",o:["쇼트닝","버터","라드","양기름"],a:0,e:"쇼트닝 : 라드의 대용품으로 동식물성 유지에 수소를 첨가하여 경화유로 제조하며 수분 함량이 0%로 무색,무취,무미이다",r:99,c:"ingredients"},
{q:"하루 2400kcal를 섭취하는 사람의 이상적인 탄수화물의 섭취량은 약 얼마인가?",o:["140~150g","200~230g","260~320g","330~420g"],a:3,e:"이상적인 탄수화물의 섭치량은 70%, 2400kcal * 0.7 = 1680kcal이며, 탄수화물 1g당 칼로리는 4kcal이므로 1680/4 = 420g임.",r:99,c:"nutrition"},
{q:"칼슘의 흡수를 도와 골격 형성에 관계하는 비타민은?",o:["비타민 A","비티만 B6","비타민 D","비타민 K"],a:2,e:"비타민 D는 칼슘의 장내 흡수를 촉진하고 뼈의 석회화를 도와 골격 형성에 중요한 역할을 한다.",r:85,c:"nutrition"},
{q:"단백질을 구성하는 기본 단위는?",o:["아미노산","지방산","글리세린","포도당"],a:0,e:"단백질의 기본 구성 단위는 아미노산이다. 아미노산이 펩티드 결합으로 연결되어 단백질을 형성한다.",r:85,c:"nutrition"},
{q:"경구전염병의 예방대책으로 잘못된 것은?",o:["환자 및 보균자의 발견과 격리","음료수의 위생 유지","식품취급자의 개인위생 관리","숙주 감수성 유지"],a:3,e:"숙주 감수성을 '유지'하는 것이 아니라 '저하'시켜야 한다. 예방접종 등으로 숙주의 면역력을 높여 감수성을 낮추는 것이 올바른 예방대책이다.",r:93,c:"hygiene"},
{q:"세균의 형태학적 분류 명칭과 관계가 먼 것은?",o:["사상균","나선균","간균","구균"],a:0,e:"세균의 형태학적 분류에는 구균(coccus), 간균(bacillus), 나선균(spirillum)이 있다. 사상균(곰팡이)은 진균류로 세균이 아니다.",r:90,c:"hygiene"},
{q:"노로바이러스 식중독의 일반증상으로 틀린 것은?",o:["잠복기 : 24~28시간","지속시간 : 7일 이상 지속","주요증상 : 설사, 탈수, 복통, 구토 등","발병률 : 40~70% 발병"],a:1,e:"빨리 회복이 가능하여 2~3일 지속된다",r:99,c:"hygiene"},
{q:"아래에서 설명하는 식중독 원인균은? (미호기성, 30~46℃, 식육/우유, 소아 설사)",o:["캠필로박터 제주니","바실러스 세레우스","장염비브리오","병원성 대장균"],a:0,e:"캠필로박터 제주니는 미호기성균으로 30~46℃에서 증식하며, 식육류와 우유를 통해 감염되고 특히 소아에게 설사를 유발한다.",r:93,v:0,c:"hygiene"},
{q:"다음 중 제1군 법정 전염병은?",o:["결핵","디프테리아","장티푸스","말라리아"],a:2,e:"제1군 법정전염병에는 콜레라, 장티푸스, 파라티푸스, 세균성이질, 장출혈성대장균감염증, A형간염이 포함된다. 디프테리아는 제2군, 결핵과 말라리아는 제3군이다. 정답은 장티푸스(인덱스 2)이다.",r:93,v:0,c:"hygiene"},
{q:"경구전염병 중 바이러스에 의해 전염되어 발병되는 것은?",o:["성홍열","장티푸스","홍역","아메바성 이질"],a:2,e:"세균성-성홍열, 장티푸스 원충성-아메바성 이질 바이러스성-홍역",r:99,c:"hygiene"},
{q:"산화방지제로 쓰이는 물질이 아닌 것은?",o:["중조","BHT","BHA","세사몰"],a:0,e:"중조는 팽창제 제빵",r:99,c:"ingredients"},
{q:"식품의 미생물에 의한 부패를 방지할 목적으로 사용되는 식품첨가물은?",o:["산화방지제","팽창제","보존료","착향료"],a:2,e:"보존료는 식품의 미생물에 의한 부패를 방지하여 보존성을 높이는 식품첨가물이다.",r:82,c:"ingredients"},
{q:"트랜스지방에 대한 설명으로 틀린 것은?",o:["부분경화유 생산 시 많게는 40% 정도가 생산된다.","섭취 시 인체 내 고밀도지단백질(HDL)이 많아진다.","엑스트라 버진 올리브유나 참기름과 같이 압착하는 유지에는 트랜스지방이 없다.","버터는 천연적으로 트랜스지방이 5% 정도 들어있다."],a:1,e:"트랜스지방 섭취 시 인체 내 고밀도지단백질(HDL, 좋은 콜레스테롤)이 감소하고 저밀도지단백질(LDL, 나쁜 콜레스테롤)이 증가한다.",r:93,c:"nutrition"},
{q:"화학적 식중독에 대한 설명으로 잘못된 것은?",o:["유해색소의 경우 급성독성은 문제되나 소량을 연속적으로 섭취할 경우 만성독성의 문제는 없다.","인공감미료 중 싸이클라메이트는 발암성이 문제되어 사용이 금지되어 있다.","유해성 보존료인 포르말린은 식품에 첨가할 수 없으며 플라스틱 용기로부터 식품 중에 용출되는 것도 규제하고 있다.","유해성 표백제인 롱갈릿을 사용시 포르말린이 오래도록 식품에 잔류할 가능성이 있으므로 위험하다."],a:0,e:"유해색소는 급성독성뿐 아니라 소량을 장기간 섭취할 경우 만성독성도 문제가 된다. 만성독성의 문제가 없다는 설명은 틀렸다.",r:90,c:"hygiene"}]},
{title:"2008년 1회",desc:undefined,questions:[{q:"일반적인 제과작업장의 시설 설명으로 잘못된 것은?",o:["조명은 50룩스(lux) 이하가 좋다.","방충, 방서용 금속망은 30매쉬(mesh)가 적당하다.","벽면은 매끄럽고 청소하기 편리하여야 한다.","창의 면적은 바닥 면적을 기준하여 30% 정도가 좋다."],a:0,e:"500Lux",r:99,c:"hygiene"},
{q:"슈 제조시 반죽표면을 분무 또는 침지시키는 이유가 아닌 것은?",o:["껍질을 얇게 한다.","팽창을 크게 한다.","기형을 방지 한다.","제품의 구조를 강하게 한다."],a:3,e:"슈는 주저앉는순간 망하는 제품이기 때문에 구조의 강화가 중요한점을 포인트로 삼으면 좋을 것 같아요",r:99,c:"manufacturing"},
{q:"케이크에서 설탕의 역할과 거리가 먼 것은?",o:["감미를 준다.","껍질색을 진하게 한다.","수분 보유력이 있어 노화가 지연된다.","제품의 형태를 유지시킨다."],a:3,e:"설탕은 제품의 형태를 유지시키는 역할이 아니다. 형태 유지는 밀가루(글루텐)와 계란(단백질 응고)의 역할이다. 설탕은 감미, 껍질색, 노화 지연에 기여한다.",r:93,c:"ingredients"},
{q:"밀가루:계란:설탕:소금 = 100:166:166:2를 기본 배합으로 하여 적정 범위 내에서 각 재료를 가감하여 만드는 제품은?",o:["파운드케이크","엔젤푸드케이크","스펀지케이크","머랭쿠키"],a:2,e:"밀가루:계란:설탕:소금 = 100:166:166:2는 스펀지케이크의 기본 배합이다.",r:85,c:"ingredients"},
{q:"비중컵의 무게 40g, 물을 담은 비중컵의 무게 240g, 반죽을 담은 비중컵의 무게 180g일 때 반죽의 비용은?",o:["0.2","0.4","0.6","0.7"],a:3,e:"180-40/240-40=0.7 제빵",r:99,c:"manufacturing"},
{q:"엔젤푸드케이크 제조시 팬에 사용하는 이형제로 가장 적합한 것은?",o:["쇼트닝","밀가루","라드","물"],a:3,e:"엔젤 푸드 케이크와 시퐁케이크는 이형제로 물을 주로 사용하고 있다.",r:99,c:"ingredients"},
{q:"카스테라의 굽기 온도로 가장 적합한 것은?",o:["140~150℃","180~190℃","220~240℃","250~270℃"],a:1,e:"카스테라의 굽기 온도는 약 180~190℃가 적합하다. 상화(윗불)는 약간 낮게, 하화(아랫불)는 약간 높게 설정한다.",r:93,c:"manufacturing"},
{q:"케이크도넛 제품에서 반죽 온도의 영향으로 나타나는 현상이 아닌 것은?",o:["팽창과잉이 일어난다.","모양이 일정하지 않다.","흡유량이 많다.","표면이 꺼칠하다."],a:1,e:"·케이크 도넛 반죽온도가 높은 경우 현상 -과도한 팽창 -\"혹\"모양 돌출 -흡유 과다 -표면의 요철 -표면이 갈라짐 -강한 점도 ·케이크 도넛 반죽온도가 낮은 경우 현상 -팽창 부족 -\"혹\"모양 돌출 -흡유 과다 -표면의 요철 -외부\"링\"과대 -표면 갈라짐 -딱딱한 내부 -톱니모양의 외피 -강한 점도",r:99,c:"manufacturing"},
{q:"커스터드푸딩을 컵에 채워 몇 ℃의 오븐에서 중탕으로 굽는 것이 가장 적당한가?",o:["160~170℃","190~200℃","210~220℃","230~240℃"],a:0,e:"커스터드 푸딩은 160~170℃의 오븐에서 중탕으로 굽는 것이 적당하다. 너무 높은 온도에서는 기포가 생긴다.",r:93,c:"manufacturing"},
{q:"설탕 공예용 당맥 제조시 설탕의 재결정을 막기 위해 첨가하는 재료는?",o:["중조","주석산","포도당","베이킹파우더"],a:1,e:"주석산(타르타르산)은 설탕 용액에 첨가하면 설탕 분자의 결정화를 방해하여 재결정 형성을 억제한다. 설탕 공예용 당액에 주석산을 소량 첨가하면 광택 있고 부드러운 당액을 유지할 수 있다.",r:82,c:"ingredients"},
{q:"다음 제품 중 일반적으로 유지를 사용하지 않는 제품은?",o:["마블케이크","파운드케이크","코코아케이크","엔젤푸드케이크"],a:3,e:"엔젤푸드케이크는 달걀 흰자, 설탕, 밀가루로 만들며 유지를 일반적으로 사용하지 않는다.",r:85,c:"ingredients"},
{q:"흰자 100에 대하여 설탕 180의 비율로 만든 머랭으로서 구웠을 때 표면에 광택이 나고 하루쯤 두었다가 사용해도 무방한 머랭은?",o:["냉제 머랭(cold meringue)","온제 머랭(hot meringue)","이탈리안 머랭(italian meringue)","스위스 머랭(swiss meringue)"],a:3,e:"스위스 머랭은 흰자 100에 대해 설탕 180의 비율로 흰자와 설탕을 중탕으로 가온하면서 휘핑하여 만들며, 구웠을 때 표면에 광택이 나고 안정성이 높아 하루 뒤 사용도 가능하다.",r:90,c:"ingredients"},
{q:"튀김기름의 품질을 저하시키는 요인으로만 나열된 것은?",o:["수분, 탄소, 질소","수분, 공기, 반복 가열","공기, 금속, 토코페롤","공기, 탄소, 사사몰"],a:1,e:"기름의 4대 적은 온도(열), 수분(물), 공기(산소), 이물질 외 철 등이다.",r:99,c:"nutrition"},
{q:"머랭(meringue)을 만드는 주요 재료는?",o:["달걀 흰자","전란","달걀 노른자","박력분"],a:0,e:"머랭의 주요 재료는 달걀 흰자와 설탕이다.",r:75,c:"ingredients"},
{q:"다음 중 쿠키의 퍼짐이 작아지는 원인이 아닌 것은?",o:["반죽에 아주 미세한 입자의 설탕을 사용한다.","믹싱을 많이 하여 글루텐이 많아졌다.","오븐 온도를 낮게 하여 굽는다.","반죽의 유지 함량이 적고 산성이다."],a:2,e:"쿠키 퍼짐이 작아지는 원인은 미세 설탕 사용, 과도한 믹싱, 유지 부족 등이다. 오븐 온도를 낮게 하면 오히려 퍼짐이 좋아진다.",r:93,c:"manufacturing"},
{q:"데니시페이스트리에서 롤인 유지함량이 및 접수 횟수에 대한 내용 중 틀린 것은?",o:["롤인 유지함량이 증가할수록 제품 부피는 증가한다.","롤인 유지함량이 적어지면 같은 접기 횟수에서 제품의 부피가 감소한다.","같은 롤인 유지함량에서는 접기 횟수가 증가할수록 부피는 증가하다 최고점을 지나면 감소한다.","롤인 유지함량이 많은 것이 롤인 유지함량이 적은 것보다 접기 횟수가 증가함에 따라 부피가 증가하다가 최고점을 지나면 감소하는 현상이 현저하다."],a:3,e:"실제로는 롤인 유지함량이 많을수록 접기 횟수 증가에 따른 부피 변화(증가 후 감소) 현상이 더 완만하게 나타난다. 따라서 유지함량이 많은 쪽의 변화가 '현저하다'는 설명이 틀렸다.",r:95,v:0,c:"manufacturing"},
{q:"빵 반죽의 흡수에 대한 설명으로 잘못된 것은?",o:["반죽 온도가 높아지면 흡수율이 감소된다.","연수는 경수보다 흡수율이 증가한다.","설탕 사용량이 많아지면 흡수율이 감소된다.","손상전분이 적량 이상이면 흡수율이 증가한다."],a:1,e:"경수는 미네랄 성분이 글루텐을 강화하여 흡수율이 높아지는 반면, 연수는 미네랄이 적어 반죽이 연해지고 흡수율이 오히려 감소한다. 따라서 '연수가 경수보다 흡수율이 증가한다'는 설명이 잘못되었다.",r:93,c:"ingredients"},
{q:"빵류의 2차 발효실 상대습도가 표준습도보다 낮을 때 나타나는 현상이 아닌 것은?",o:["반죽에 껍질 형성이 빠르게 일어난다.","오븐에 넣었을 때 팽창이 저해된다.","껍질색이 불균일하게 되기 쉽다.","수포가 생기거나 질긴 껍질이 되기 쉽다."],a:3,e:"2차 발효실 습도가 낮으면 반죽 표면이 건조해져 껍질이 빨리 형성되고, 오븐 스프링이 저해되며, 껍질색이 불균일해진다. 수포(blister)가 생기는 것은 습도가 높을 때의 현상이므로 '수포가 생기거나 질긴 껍질이 되기 쉽다'는 습도가 낮을 때의 현상이 아니다.",r:90,c:"manufacturing"},
{q:"다음 중 빵의 노화가 가장 빨리 발생하는 온도는?",o:["-18℃","0℃","20℃","35℃"],a:1,e:"빵의 노화(전분의 β화)는 0~5℃ 냉장온도에서 가장 빠르게 진행된다. 냉동(-18℃)에서는 노화가 억제되고, 고온에서는 노화 속도가 느리다.",r:90,c:"manufacturing"},
{q:"스펀지/도법에서 스펀지의 표준온도로 가장 적합한 것은?",o:["18~20℃","23~25℃","27~29℃","30~32℃"],a:1,e:"스펀지/도우법에서 스펀지의 표준온도는 23~25℃이다.",r:85,c:"manufacturing"},
{q:"냉동반죽법의 단점이 아닌 것은?",o:["휴일작업에 미리 대처할 수 없다.","이스트가 죽어 가스 발생력이 떨어진다.","가스 보유력이 떨어진다.","반죽이 퍼지기 쉽다."],a:0,e:"냉동반죽법의 장점은 미리 반죽을 만들어 냉동 보관했다가 필요할 때 해동하여 사용할 수 있어 휴일작업에 미리 대처할 수 있다는 것이다. 따라서 '대처할 수 없다'는 냉동반죽법의 단점이 아니다.",r:95,c:"manufacturing"},
{q:"오븐 온도가 낮을 때 제품에 미치는 영향은?",o:["2차 발효가 지나친 것과 같은 현상이 나타난다.","껍질이 급격히 형성된다.","제품의 옆면이 터지는 현상이다.","제품의 부피가 작아진다."],a:0,e:"오븐 온도가 낮으면 2차 발효가 지나친 것과 같은 현상(과발효 유사)이 나타난다. 이스트가 오래 활동하여 가스가 과다 생성되기 때문이다.",r:93,c:"manufacturing"},
{q:"페이스트리 성형 자동밀대(파이롤러)에 대한 설명 중 맞는 것은?",o:["기계를 사용하므로 밀어 펴기의 반죽과 유지와의 경도는 가급적 다른 것이 좋다.","기계에 반죽이 달라붙는 것을 막기 위해 덧가루를 많이 사용한다.","기계를 사용하여 반죽과 유지는 따로 따로 밀어서 편뒤 감싸서 밀어 펴기를 한다.","냉동휴지 후 밀어 펴면 유지가 굳어 갈라지므로 냉장휴지를 하는 것이 좋다."],a:3,e:"냉동휴지 후 밀어 펴면 유지가 굳어 갈라지므로 냉장휴지(0~5℃)를 하는 것이 좋다.",r:85,c:"manufacturing"},
{q:"팬닝시 주의할 사항으로 적합하지 않은 것은?",o:["팬닝전 온도를 적정하고 고르게 한다.","틀이나 철판의 온도를 25℃로 맞춘다.","반죽의 이음매가 틀의 바닥에 늘이도록 팬닝한다.","반죽의 무게와 상태를 정하여 비용적에 맞추어 적당한 반죽량을 넣는다."],a:1,e:"틀이나 철판 온도를 32도로 맞춘다",r:99,c:"manufacturing"},
{q:"생산액이 2000000원, 외부가치가 1000000원, 생산가치가 500000원, 인건비가 800000원일 때 생산가치율은?",o:["20%","25%","35%","40%"],a:1,e:"500000÷2000000×100 제빵",r:99,c:"management"},
{q:"발효에 미치는 영향이 가장 적은 것은?",o:["이스트양","온도","소금","유지"],a:3,e:"발효에 영향을 미치는 주요 요소는 이스트양, 온도, 소금 등이다. 유지는 반죽의 신전성과 볼륨에 영향을 주지만, 발효 자체에 미치는 영향은 가장 적다.",r:90,c:"ingredients"},
{q:"반죽법에 대한 설명 중 틀린 것은?",o:["스펀지법은 반죽을 2번에 나누어 믹싱하는 방법으로 중종법이라고 한다.","직접법은 스트레이트법이라고 하며, 전재료를 한번에 넣고 반죽하는 방법이다.","비상반죽법은 제조시간을 단출할 목적으로 사용하는 반죽법이다.","재반죽법은 직접법의 변형으로 스트레이트법 장점을 이용한 방법이다."],a:3,e:"재반죽법(re-mixing method)은 스펀지법의 변형으로, 스펀지를 만든 후 본반죽 시 재차 믹싱하는 방법이다. 직접법의 변형이라는 설명은 틀리다. 비상반죽법은 제조시간 단축 목적으로 사용한다.",r:90,c:"manufacturing"},
{q:"냉동 반죽법의 냉동과 해동 방법으로 옳은 것은?",o:["급속냉동, 급속해동","급속냉동, 완만해동","완만냉동, 급속해동","완만냉동, 완만해동"],a:1,e:"냉동반죽은 급속냉동, 완만해동이 올바른 방법이다. 급속냉동으로 빙결정을 작게 하여 글루텐 손상을 최소화하고, 완만해동으로 결로와 이스트 손상을 방지한다.",r:93,c:"manufacturing"},
{q:"포장 전 빵의 온도가 너무 낮을 때는 어떤 현상이 일어나는가?",o:["노화가 빨라진다.","썰기(slice)가 나쁘다.","포장지에 수분이 응축된다.","곰팡이, 박테리아의 번식이 용이하다."],a:0,e:"포장 전 빵의 온도가 너무 낮으면 전분의 노화(retrogradation)가 빠르게 진행되어 빵이 딱딱해지고 품질이 저하된다. 적정 포장 온도(35~40℃)보다 낮을 경우 노화가 가속된다.",r:90,c:"manufacturing"},
{q:"빵의 부피가 가장 크게 되는 경우는?",o:["숙성이 안된 밀가루를 사용할 때","물을 적게 사용할 때","반죽이 지나치게 믹싱 되었을 때","발효가 더 되었을 때"],a:3,e:"빵의 부피가 가장 큰 경우는 발효가 적정히 잘 된 경우이다. 발효가 더(과발효) 되면 글루텐이 약해져 처음엔 크지만 주저앉는다. 정답은 발효가 더 되었을 때이다.",r:93,c:"manufacturing"},
{q:"생란의 수분함량이 72%이고, 분말계란의 수분함량이 4%라면, 생란 200kg으로 만들어지는 분말계란 중량은?",o:["52.8kg","54.3kg","56.8kg","58.3kg"],a:3,e:"달걀의 수분비율 전란:노른자:흰자=75%:50%:88% 달걀의 고형분은 25%이고, 분말계란의 수분함량은 4%이니 200*0.29=58kg",r:99,c:"ingredients"},
{q:"단백질을 분해하는 효소는?",o:["아밀라아제(amylase)","리파아제(lipase)","프로테아제(protease)","찌마아제(zymase)"],a:2,e:"아밀라아제 - 탄수화물, 전분 리파아제 - 지방 프로테아제 - 단백질 찌마아제 - 단당류",r:99,c:"nutrition"},
{q:"우유에 함유된 질소화합물 중 가장 많은 양을 차지하는 것은?",o:["시스테인","글리아딘","카제인","락토알부민"],a:2,e:"우유에 함유된 질소화합물 중 카제인이 약 80%로 가장 많다.",r:82,c:"ingredients"},
{q:"지방은 지방산과 무엇이 결합하여 이루어지는가?",o:["아미노산","나트륨","글리세롤","리보오스"],a:2,e:"지방은 지방산과 글리세롤(글리세린)이 에스테르 결합으로 이루어진다.",r:85,c:"nutrition"},
{q:"강력분의 특성으로 틀린 것은?",o:["중력분에 비해 단백질 함량이 많다.","박력분에 비해 글루텐 함량이 적다.","박력분에 비해 점탄성이 크다.","겨질 소맥을 원료로 한다."],a:1,e:"강력분은 박력분에 비해 글루텐 함량이 많다(적지 않다). 강력분은 단백질 함량 11~13%, 점탄성이 크며, 경질소맥으로 만든다.",r:93,c:"ingredients"},
{q:"생이스트(fresh yeast)에 대한 설명으로 틀린 것은?",o:["중량의 65~70%가 수분이다.","20℃ 정도의 상온에서 보관해야 한다.","자기소화를 일으키기 쉽다.","곰팡이 등의 배지 역할을 할 수 있다."],a:1,e:"생이스트(압착 이스트)는 0~5℃에서 냉장 보관해야 한다. 20℃ 상온 보관은 자기소화와 변질의 원인이 된다.",r:93,c:"ingredients"},
{q:"다음 중 찬물에 잘 녹는 것은?",o:["한천(agar)","씨엠시(CMC)","젤라틴(gelatin)","일반 펙틴(pectin)"],a:1,e:"CMC(카르복시메틸셀룰로스)는 찬물에 잘 녹는 수용성 식품첨가물이다. 한천과 젤라틴은 뜨거운 물에 녹고, 일반 펙틴은 설탕과 함께 가열해야 녹는다.",r:93,c:"ingredients"},
{q:"다음과 같은 조건에서 나타나는 현상과 밑줄 친 물질을 바르게 연결한 것은? 초콜릿의 보관방법이 적절치 않아 공기 중의 수분이 표면에 부착한 뒤 그 수분이 증발해 버려 어떤 물질이 결정형태로 남아 흰색이 나타났다.",o:["펫브룸(fat bloom)-카카오메스","펫브룸(fat bloom)-글리세린","슈가브룸(sugar bloom)-카카오버터","슈가브룸(sugar bloom)-설탕"],a:3,e:"슈가브룸은 초콜릿 표면에 수분이 부착된 후 증발하면서 설탕이 결정 형태로 남아 흰색이 나타나는 현상이다.",r:82,v:0,c:"ingredients"},
{q:"패리노그래프(Farinograph)의 기능 및 특징이 아닌 것은?",o:["흡수율 측정","믹싱 시간 측정","500 B.U.를 중심으로 그래프 작성","전분 호화력 측정"],a:3,e:"호화력측정은 아밀로그래프임 제빵",r:99,c:"ingredients"},
{q:"일반적으로 양질의 빵속을 만들기 위한 아밀로그래피의 범위는?",o:["0~150 B.U.","200~300 B.U.","400~600 B.U.","800~1000 B.U."],a:2,e:"양질의 빵속을 만들기 위한 아밀로그래프 값은 400~600 B.U.가 적합하다. 이 범위는 적절한 전분 호화도와 효소 활성을 의미하며, 빵속의 조직감이 우수하게 된다.",r:93,c:"manufacturing"},
{q:"다음 중 유지의 경화 공정과 관계가 없는 물질은?",o:["불포화지방산","수소","클레스테롤","촉매제"],a:2,e:"유지의 경화(수소 첨가)에는 불포화지방산, 수소, 촉매제(니켈)가 필요하다. 콜레스테롤은 경화 공정과 관계없다.",r:85,c:"nutrition"},
{q:"다음 중 전분당이 아닌 것은?",o:["물엿","설탕","포도당","이성화당"],a:1,e:"전분당은 전분을 가수분해하여 만든 당류로 물엿, 포도당, 이성화당이 포함된다. 설탕(자당)은 사탕수수나 사탕무에서 추출하므로 전분당이 아니다.",r:90,c:"ingredients"},
{q:"영구적 경수(센물)를 사용할 때의 조치로 잘못된 것은?",o:["소금 증가","효소 강화","이스트 증가","광물질 감소"],a:0,e:"경수사용시 소금 광물질 이스트푸드의 사용을 감소시켜야함",r:99,c:"ingredients"},
{q:"다음 중 글레이즈(glaze) 사용시 가장 적합한 온도는?",o:["15℃","25℃","35℃","45℃"],a:3,e:"글레이즈는 약 45℃에서 사용하는 것이 가장 적합하다. 이 온도에서 점도가 적절히 낮아져 제품 표면에 얇고 균일하게 코팅되며 광택이 잘 난다.",r:90,c:"manufacturing"},
{q:"다음 중 이당류가 아닌 것은?",o:["포도당","맥아당","설탕","유당"],a:0,e:"포도당은 단당류 제빵",r:99,c:"ingredients"},
{q:"비타민과 생체에서의 주요 기능이 잘못 연결된 것은?",o:["비타민 B1-당질대사의 보조 효소","나이아신-항 펠라그리(Pellagra)인자","비타민K-항 혈액응고 인자","비타민A-항 빈혈인자"],a:3,e:"비타민A는 빈혈이 아닌 야맹증과 눈 건강에 관여하는 인자이다.",r:99,c:"nutrition"},
{q:"유당불내증이 있을 경우 소장 내에서 분해가 되어 생성되지 못하는 단당류는?",o:["설탕(sucrose)","맥아당(maltose)","과당(fructose)","갈락토오스(galactose)"],a:3,e:"유당불내증은 유당분해효소(락타아제) 부족으로 유당이 분해되지 못하는 것이다. 유당은 포도당과 갈락토오스로 분해되므로, 갈락토오스가 생성되지 못한다.",r:93,c:"ingredients"},
{q:"한 개의 무게가 50g인 과자가 있다. 이 과자 100g 중에 탄수화물 70g, 단백질 5g, 지방 15g, 무기질 4g, 물 6g이 들어 있다면 이 과자 10개를 먹을 때 얼마의 열량을 낼 수 있는가?",o:["1230 kcal","2175 kcal","2750 kcal","1800 kcal"],a:1,e:"탄수화물 35(g)×4(kcal)×10(개) 단백질 2.5(g)×4(kcal)×10(개) 지방 7.5(g)×9(kcal)×10(개)",r:99,c:"nutrition"},
{q:"다음 중 효소와 활성물질이 잘못 짝지어진 것은?",o:["펩신-염산","트립신-트립신활성효소","트립시노겐-지방산","키모트립신-트립신"],a:2,e:"단백질은 위와 소장에서 두번 소화되는데 1.위에서는 펩신이 펩톤(펩티다아제+위액인 염산)으로 답백질을 소화시키고 2.아직 소화안된 단백질은 소장에서 트립신이라는 물질을 분비하여 소화시킨다.",r:99,c:"nutrition"},
{q:"다음 중 인체 내에서 합성할 수 없으므로 식품으로 섭취해야 하는 지방산이 아닌 것은?",o:["리놀레산(linoleic acid)","리놀렌산(linolenic acid)","올레산(oleic acid)","아라키돈산(arachidonic acid)"],a:2,e:"올레산(oleic acid)은 체내에서 합성 가능한 불포화지방산이다. 리놀레산, 리놀렌산, 아라키돈산은 필수지방산이다.",r:93,c:"nutrition"},
{q:"다음에서 설명하는 균은? - 식품 중에 증식하여 엔테로톡신(enterotoxin) 생선 - 잠복기는 평균 3시간, 감염원은 화농소 - 주요증상은 구토, 복통, 설사",o:["살모넬라균","포도상구균","클로로스트리디움 보툴리늄","장염 비브리오균"],a:1,e:"포도상구균은 엔테로톡신을 생성하며, 잠복기 평균 3시간, 화농소가 감염원이고, 구토·복통·설사가 주요 증상이다.",r:93,v:0,c:"hygiene"},
{q:"밀가루 등으로 오인되어 식중독이 유발된 사례가 있으며 습진성 피부질환 등의 증상을 보이는 것은?",o:["수은","비소","납","아연"],a:1,e:"비소(As)는 밀가루 등 흰색 분말과 유사하여 오인 사고가 발생할 수 있으며, 습진성 피부질환 등을 유발한다.",r:90,c:"hygiene"},
{q:"다음 중 곰팡이 독이 아닌 것은?",o:["아플라톡신","시트라닌","삭시톡신","파툴린"],a:2,e:"삭시톡신ㅡ조개류 식중독 제빵",r:99,c:"hygiene"},
{q:"단백질 식품이 미생물의 분해 작용에 의하여 형태, 색택, 경도, 맛 등의 본래의 성질을 잃고 악취를 발생하거나 유해물질을 생성하여 먹을 수 없게 되는 현상은?",o:["변패","산패","부패","발효"],a:2,e:"단백질 식품이 미생물에 의해 형태, 색택, 맛을 잃고 악취와 유해물질을 생성하는 현상은 부패이다. 변패는 지방 식품, 산패는 유지의 변질이다.",r:90,c:"ingredients"},
{q:"저장미에 발생한 곰팡이가 원인이 되는 황변미 현상을 방지하기 위한 수분 함량은?",o:["13 이하","14~15%","15~17%","17% 이상"],a:0,e:"황변미 방지를 위한 쌀의 수분 함량은 13% 이하이다. 수분이 13% 이상이면 곰팡이가 발생하기 쉽다.",r:82,c:"hygiene"},
{q:"미생물에 의한 부패나 변질을 방지하고 화학적인 변화를 억제하며 보존성을 높이고 영양가 및 신선도를 유지하는 목적으로 첨가하는 것은?",o:["감미료","보존료","산미료","조미료"],a:1,e:"보존료는 미생물에 의한 부패·변질을 방지하고 보존성을 높이며 신선도를 유지하는 식품첨가물이다.",r:82,c:"nutrition"},
{q:"인수공통전염병 중 오염된 우유나 유제품을 통해 사람에게 감염되는 것은?",o:["탄저","결핵","야토병","구제역"],a:1,e:"인수공통전염병 중 오염된 우유나 유제품을 통해 사람에게 감염되는 것은 결핵 결핵은 병에 걸린 소의 젖의 유제품에 의해 사람에게 경구감염됨",r:99,c:"hygiene"},
{q:"다음 중 일반적으로 잠복기가 가장 긴 것은?",o:["유행성 간염","디프테리아","페스트","세균성 이질"],a:0,e:"유행성 간염(A형 간염)은 잠복기가 15~45일로 다른 전염병에 비해 가장 길다.",r:85,c:"hygiene"},
{q:"다음 중 감염형 식중독을 일으키는 것은?",o:["보툴리누스균","살모넬라균","포도상구균","고초균"],a:1,e:"* 감염형이란 세균이 증식하는 병원균을 섭취 후 발병함. 살모넬라균의 원인식품은 닭, 오리, 계란 등(계란 껍질 만질 때 주의) * 독소형은 균 증식시 생성되는 독성 물질을 섭취 후 발병 포도상구균, 보톨리누스균, 세레우스균, 웰치스균 등",r:99,c:"hygiene"},
{q:"빵 및 케이크류에 사용이 허가된 보존료는?",o:["탄산수소나트륨","포름알데히드","탄산암모늄","프로피온산"],a:3,e:"1번 3번은 팽창제 / 2번은 쓰면 안되는 물질",r:99,c:"ingredients"}]},
{title:"2008년 2회",desc:undefined,questions:[{q:"아이싱에 사용되는 재료 중 다른 세 가지와 조성이 다른 것은?",o:["이탈리안 머랭","퐁당","버터크림","스위스 머랭"],a:2,e:"버터크림은 지방(버터)을 주원료로 하는 아이싱이고, 이탈리안 머랭, 퐁당, 스위스 머랭은 모두 설탕과 달걀흰자(또는 설탕 시럽)를 기본으로 하는 점에서 서로 유사한 조성을 갖는다.",r:90,c:"ingredients"},
{q:"커스터드 크림의 재료에 속하지 않는 것은?",o:["우유","계란","설탕","생크림"],a:3,e:"달걀의 농후화제를 이용하여 만든 제품으로 달걀, 설탕, 전분 등을 섞은 크림에 80도로 끓인 우유를 넣고 풀 같은 상태로 만든 크림",r:99,c:"ingredients"},
{q:"밤과자를 성형한 후 물을 뿌려주는 이유가 아닌 것은?",o:["덧가루의 제거","굽기 후 철판에서 분리용이","껍질색의 균일화","껍질의 터짐 방지"],a:1,e:"밤과자 성형 후 물을 뿌리는 주된 이유는 덧가루를 제거하고, 껍질색을 균일하게 하며, 표면 건조를 방지하여 껍질 터짐을 막기 위한 것이다. 굽기 후 철판에서의 분리는 물 뿌림의 목적과 관련이 없다.",r:85,c:"manufacturing"},
{q:"케이크를 부풀게 하는 증기압의 주재료는?",o:["계란","쇼트닝","밀가루","베이킹 파우더"],a:0,e:"케이크를 부풀게 하는 증기압의 주재료는 계란이다. 계란의 수분이 열에 의해 증기로 변하며 팽창력을 제공한다.",r:90,c:"ingredients"},
{q:"쇼트 브레드 쿠키 제조 시 휴지를 시킬 때 성형을 용이하게 하기 위한 조치는?",o:["반죽을 뜨겁게 한다.","반죽을 차게 한다.","휴지 전 단계에서 오랫동안 믹싱 한다.","휴지 전 단계에서 짧게 믹싱 한다."],a:1,e:"쇼트 브레드 쿠키는 유지 함량이 높아 반죽이 부드럽다. 휴지 시 반죽을 차게 하면 유지가 굳어져 성형이 용이해진다. 뜨거운 반죽은 유지가 녹아 끈적거린다.",r:93,c:"manufacturing"},
{q:"실내 온도 20℃ 밀가루 온도 20℃, 설탕 온도 20℃, 쇼트닝 온도 22℃, 계란 온도 20℃, 물 온도 18℃의 조건에서 반죽의 결과온도가 24℃가 나왔다면 마찰계수는?",o:["18","20","22","24"],a:3,e:"(결과온도24×6)-(실내온도20+설탕20+계란20+밀가루20+쇼트닝22+물18)",r:99,c:"manufacturing"},
{q:"주방설계에 있어 주의할 점이 아닌 것은?",o:["가스를 사용하는 장소에는 환기시설을 갖춘다.","주방 내의 여유 공간을 확보한다.","종업원의 출입구와 손님용 출입구는 별도로 하여 재료의 반입은 종업원 출입구로 한다.","주방의 환기는 소형의 것을 여러 개 설치하는 것보다 대형의 환기장치 1개를 설치하는 것이 좋다."],a:3,e:"대형 1개보다 소형 여러개가 좋다",r:99,c:"management"},
{q:"스펀지 케이크에 사용되는 필수 재료가 아닌 것은?",o:["계란","박력","설탕","베이킹 파우더"],a:3,e:"스펀지 케이크의 사용되는 필수재료는 밀가루, 설탕, 달걀, 소금이며 고율배합이다.",r:99,c:"ingredients"},
{q:"케이크 도넛에 대두분을 사용하는 목적이 아닌 것은?",o:["흡유율 증가","껍질 구조 강화","껍질색 개선","식감의 개선"],a:0,e:"케이크 도넛에 대두분을 사용하면 껍질 구조 강화, 껍질색 개선, 식감 개선 효과가 있다. 흡유율은 감소시키는 것이 목적이지 증가시키는 것이 아니다.",r:93,c:"manufacturing"},
{q:"같은 크기의 팬에 각 제품의 비용적에 맞는 반죽을 패닝 하였을 경우 반죽량이 가장 무거운 반죽은?",o:["파운드 케이크","레이어 케이크","스펀지케이크","소프트 롤 케이크"],a:0,e:"같은 크기 팬에서 비용적이 가장 낮은(밀도가 높은) 제품의 반죽량이 가장 무겁다. 파운드 케이크는 비용적이 가장 낮아(약 1.75cm³/g) 반죽량이 가장 무겁다.",r:93,c:"manufacturing"},
