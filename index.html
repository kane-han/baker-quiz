{q:"성형에서 반죽의 중간발효 후 밀어펴기 하는 과정의 주된 효과는?",o:["글루텐 구조의 재 정돈","가스를 고르게 분산","부피의 증가","단백질의 변성"],a:1,e:"밀어펴기의 주된 효과는 반죽 내 가스를 고르게 분산시켜 균일한 기공 구조를 형성하는 것이다. 이 과정에서 큰 기포가 제거되고 가스가 균일하게 퍼져 성형 후 최종 제품의 기공이 고르게 된다.",r:85,c:"manufacturing"},
{q:"냉동생지법에 적합한 반죽의 온도는?",o:["18~22","26~30","32~36","38~42"],a:0,e:"냉동생지법에 적합한 반죽 온도는 18~22℃이다. 낮은 온도에서 이스트의 조기 활성을 억제하고 글루텐 구조를 보호한다.",r:93,c:"manufacturing"},
{q:"오랜 시간 발효 과정을 거치지 않고 배합 후 정형하여 2차 발효를 하는 제빵법은?",o:["재반죽법","스트레이트법","노타임법","스펀지법"],a:2,e:"노타임법은 발효 과정 없이 배합 후 바로 정형하여 2차 발효를 하는 제빵법이다. 산화제와 환원제를 사용하여 시간을 단축한다.",r:93,c:"manufacturing"},
{q:"오버헤드프루퍼는 어떤 공정을 해하기 위해 사용하는 것인가?",o:["분할","둥글리기","중간발효","정형"],a:2,e:"오버헤드 프루퍼는 분할·둥글리기 후 중간발효를 위해 사용하는 기계이다.",r:85,c:"manufacturing"},
{q:"다음 중 빵의 노화속도가 가장 빠른 온도는?",o:["-18~-1℃","0~10℃","20~30℃","35~45℃"],a:1,e:"냉장보관 온도가 노화가 가장 빠름",r:99,c:"manufacturing"},
{q:"총원가는 어떻게 구성되는가?",o:["제조원가＋판매비＋일반관리비","직접재료비＋직접노무비＋판매비","제조원가＋이익","직접원가＋일반관리비"],a:0,e:"총원가는 제조 원가, 판매비, 일반 관리비로 구성되어 있다.",r:99,c:"management"},
{q:"같은 크기의 틀에 넣어 같은 체적의 제품을 얻으려고 할 때 반죽의 분할량이 가장 적은 제품은?",o:["밀가루 식빵","호밀 식빵","옥수수 식빵","건포도 식빵"],a:0,e:"같은 체적의 제품을 얻을 때 비용적(부피/무게)이 큰 제품일수록 분할량이 적다. 밀가루 식빵은 글루텐 형성이 좋아 팽창력이 크므로 비용적이 가장 높고, 분할량이 가장 적다.",r:93,c:"manufacturing"},
{q:"식빵 제조에 있어서 소맥분의 4%에 해당하는 탈지분유를 사용할 때 제품에 나타는 영향으로 틀린 것은?",o:["빵 표피색이 연해진다.","영양 가치를 높인다.","맛이 좋아진다.","제품 내상이 좋아진다."],a:0,e:"탈지분유 4%를 사용하면 유당의 캐러멜화로 빵 표피색이 진해진다. '연해진다'는 틀린 설명이다.",r:85,v:0,c:"nutrition"},
{q:"굽기 손실이 가장 큰 제품은?",o:["식빵","바게트","단팥빵","버터롤"],a:1,e:"바게트는 저율배합(설탕·유지가 적음)에 길고 가는 형태로 표면적이 넓어 굽기 손실이 가장 크다.",r:82,c:"manufacturing"},
{q:"다음은 식빵 배합표이다. ( )안에 적합한 것은? 강력분 100% 1500g / 설탕 ( ① )% 75g / 이스트 3% ( ② )g / 소금 2% 30g / 버터 5% 75g / 이스트푸드 ( ③ )% 1.5g / 탈지분유 2% 30g / 물 70% 1,050cc",o:["5, 45, 0.01","5, 45, 0.1","0.5, 4.5, 0.01","50, 450, 1"],a:1,e:"밀가루 1500g = 100% 기준으로: 설탕 75g ÷ 1500g × 100 = 5%, 이스트 3% = 1500 × 0.03 = 45g, 이스트푸드 1.5g ÷ 1500g × 100 = 0.1%. 따라서 정답은 5, 45, 0.1이다.",r:80,c:"ingredients"},
{q:"빵 제품의 평가항목 설명으로 틀린 것은?",o:["외관 평가는 부피, 겉껍질 색상이다.","내관 평가는 기공, 속색, 조직이다.","종류 평가는 크기, 무게, 가격이다.","빵의 식감 특성은 냄새, 맛, 입안에서의 감촉이다."],a:2,e:"빵 제품 평가는 외관(부피, 껍질색), 내관(기공, 속색, 조직), 식감(냄새, 맛, 감촉)이다. 크기·무게·가격은 종류 평가가 아니다.",r:90,c:"manufacturing"},
{q:"발효에 직접적으로 영향을 주는 요소와 가장 거리가 먼 것은?",o:["반죽 온도","계란의 신선도","이스트의 양","반죽의 pH"],a:1,e:"발효에 직접적으로 영향을 주는 요소는 반죽 온도, 이스트 양, pH 등이다. 계란의 신선도는 발효와 직접적 관련이 없다.",r:93,c:"manufacturing"},
{q:"스트레이트법으로 일반 식빵을 만들 때 믹싱 후 반죽의 온도로 가장 이상적인 것은?",o:["20℃","27℃","34℃","41℃"],a:1,e:"스트레이트법으로 일반 식빵 제조 시 믹싱 후 반죽 온도는 약 27℃가 이상적이다.",r:82,c:"manufacturing"},
{q:"다음 중 포장 전 빵의 온도가 너무 낮을 때는 어떤 현상이 일어나는가?",o:["노화가 빨라진다.","썰기가 나쁘다.","포장지에 수분이 응축된다.","곰팡이, 박테리아의 번식이 용이하다."],a:0,e:"포장 전 빵의 온도가 너무 낮으면 전분의 노화(retrogradation)가 빠르게 진행되어 빵이 딱딱해지고 식감이 저하된다. 빵은 0~10℃ 범위에서 노화가 가장 빠르게 일어난다.",r:85,c:"manufacturing"},
{q:"다음 중 가스 발생량이 많아져 발효가 빨라지는 경우가 아닌 것은?",o:["이스트를 많이 사용할 때","소금을 많이 사용할 때","반죽에 약산을 소량 첨가할 때","발효실 온도를 약간 높일 때"],a:1,e:"빵 반죽 할때 소금하고 이스트가 닿으면 이스트가 활동(=발효)하는데 방해된다.",r:99,c:"manufacturing"},
{q:"케이크, 쿠키, 파이, 페이스트리용 밀가루의 제과 적성 및 점성을 측정하는 기구는?",o:["아밀로그래프","패리노그래프","애그트론","맥미카엘 점도계"],a:3,e:"맥미카엘 점도계(MacMichael Viscosimeter)는 케이크·쿠키·파이·페이스트리용 밀가루의 제과 적성 및 점성을 측정하는 기구이다. 아밀로그래프는 전분 점도, 패리노그래프는 반죽 물성, 애그트론은 색도를 측정한다.",r:93,c:"ingredients"},
{q:"다음 중 전분당이 아닌 것인?",o:["물엿","설탕","포도당","이성화당"],a:1,e:"설탕(자당)은 사탕수수·사탕무에서 추출한 것으로 전분당이 아니다. 물엿, 포도당, 이성화당은 전분을 분해하여 만든 전분당이다.",r:90,c:"ingredients"},
{q:"다음 중 향신료를 사용하는 목적이 아닌 것은?",o:["냄새 제거","맛과 향 부여","영양분 공급","식욕 증진"],a:2,e:"향신료의 사용목적 1. 풍미향상 및 보존성 향상 2. 맛과 향 부여 3. 냄새 제가 4. 식욕 부여 제과",r:99,c:"nutrition"},
{q:"젤리화의 요소가 아닌 것은?",o:["유기산류","염류","당분류","펙틴류"],a:1,e:"젤리화의 3요소는 1.유기산 2.당 3.펙틴 이렇게 3가지고 염류는 아니다",r:99,c:"ingredients"},
{q:"모노 디 글리세리드는 어느 반응에서 생성되는가?",o:["비타민의 산화","전분의 노화","지방의 가수분해","단백질의 변성"],a:2,e:"모노·디글리세리드는 지방의 가수분해에서 생성된다. 트리글리세리드가 가수분해되면 지방산과 글리세롤, 그리고 중간산물인 모노·디글리세리드가 생성된다.",r:93,c:"nutrition"},
{q:"맥아당을 분해하는 효소는?",o:["말타아제","락타아제","리파아제","프로테아제"],a:0,e:"말타아제는 맥아당(말토오스)을 포도당 2분자로 분해하는 효소이다.",r:85,c:"ingredients"},
{q:"믹서내에서 일어나는 물리적 성질을 파동 곡선기록기로 기록하여 밀가루의 흡수율, 믹싱시간, 믹싱 내구성 등을 측정하는 기계는?",o:["패리노그래프","익스텐소그래프","아밀로그래프","분광분석기"],a:0,e:"반죽의 물리적 시험기계 : 패리노, 익스텐소, 아밀로, 믹소, 레오, 믹서트론 1. 패리노 : 흡수율, 믹싱내구성, 믹싱시간 2. 익스텐소 : 반죽의 신장성, 밀가루의 내구성, 상대적인 발효시간 3. 아밀로 : 점도의 변화, 전분의 질 - 믹소 : 반죽의 형성 및 글루텐의 발달정도 - 레오 : 반죽의 기계적 발달 - 믹서트론 : 사람과 기계의 잘못 확인, 밀가루에 대한 정확한 흡수와 혼합시간 측정",r:99,c:"manufacturing"},
{q:"빵제품이 단단하게 굳는 현상을 지연시키기 위하여 유지에 첨가하는 유화제가 아닌 것은?",o:["모노디글리세리드","레시틴","유리지방산","에스에스엘(SSL)"],a:2,e:"유화제는 노화를 지연시키는 역할을 한다. 유리지방산은 유화제가 아니라 유지의 산패 산물이다.",r:85,c:"ingredients"},
{q:"케이크 반죽을 하기 위해 계란 노른자 500g이 필요하다. 몇 개의 계란이 준비되어야 하는가? (단, 계란 1개의 중량 52g, 껍질12%, 노른자33%, 흰자 55%)",o:["26개","30개","34개","38개"],a:1,e:"필요한 계란노른자 ÷ (계란 1개의 무게 ☓ 노른자의 비율) = 500÷ (52 ☓ 0.33) = 500÷ 17.16 = 29.137 정답 30개",r:99,c:"ingredients"},
{q:"효모에 대한 설명으로 틀린 것은?",o:["당을 분해하여 산과 가스를 생성한다.","출아법으로 증식한다.","제빵용 효모의 학명은 saccharomyces s(c)erevisiae이다.","산소의 유무에 따라 증식과 발효가 달라진다."],a:0,e:"이스트(효모)는 반죽이 발효되는동안 포도당을 분해하여 탄산가스(이산화탄소)와 알코올 생성한다",r:99,c:"ingredients"},
{q:"피자 제조시 많이 사용하는 향신료는?",o:["넛메그","오레가노","박하","계피"],a:1,e:"피자에 많이 사용하는 향신료는 오레가노이다. 넛메그는 베이커리, 박하는 음료, 계피는 제과에 주로 사용된다.",r:93,c:"ingredients"},
{q:"우유의 성분 중 제품의 껍질색을 개선시켜 주는 것은?",o:["수분","유지방","유당","칼슘"],a:2,e:"우유의 유당(lactose)은 마이야르 반응에 참여하여 제품의 껍질색을 개선시킨다.",r:82,c:"ingredients"},
{q:"다음 중 식물계에는 존재하지 않는 당은?",o:["과당","유당","설탕","맥아당"],a:1,e:"유당은 동물성 당",r:99,c:"ingredients"},
{q:"제빵에서 사용하는 물로 가장 적합한 것은?",o:["연수","아연수","아경수","경수"],a:2,e:"제빵에서 가장 적합한 물은 아경수(경도 121~180ppm)이다. 아경수는 적당한 미네랄을 함유하여 글루텐을 적절히 강화하고 이스트 활성을 도와 발효와 반죽 품질을 최적화한다.",r:80,c:"ingredients"},
{q:"글루텐을 형성하는 밀가루의 주요 단백질로 그 함량이 가장 많은 것은?",o:["글루테닌","글리아딘","글로불린","메소닌"],a:1,e:"글루텐닌: 탄력성을 갖게 하는 단백질로 20%차지 글리아딘: 신장성(점성)을 갖게 하는 단백질로 36%를 차지",r:99,c:"ingredients"},
{q:"하루 섭취한 2700kcal 중 지방은 20%, 탄수화물은 65%, 단백질은 15% 비율 이었다. 지방, 탄수화물, 단백질은 각각 약 몇 g을 섭취하였는가?",o:["지방 135g 탄수화물 438.8g 단백질 45g","지방 540g 탄수화물 1755.2g 단백질 405.2g","지방 60g 탄수화물 438.8g 단백질 101.3g","지방 135g 탄수화물 195g 단백질 101.3g"],a:2,e:"하루에 섭취한 총 칼로리에서 각 영양소별 kcal를 구한후 1g당 발산하는 kcal량으로 나누어 주면 된다. 지방은 1g당 9kcal, 탄수화물과,단백질은 4kcal 이다",r:99,c:"nutrition"},
{q:"설탕의 구성 성분은?",o:["포도당과 과당","포도당과 갈락토오스","포도당 2분자","포도당과 맥아당"],a:0,e:"+ 추가정보 설탕 = 자당 = 서당",r:99,c:"ingredients"},
{q:"리놀레산 결핍 시 발생할 수 있는 장애가 아닌 것은?",o:["성장지연","시각 기능 장애","생식장애","호흡장애"],a:3,e:"리놀레산 결핍 시 성장지연, 시각 기능 장애, 생식장애가 발생할 수 있다. 호흡장애는 리놀레산 결핍과 직접적인 관련이 없다.",r:93,c:"nutrition"},
{q:"다음 중 비타민 K와 관계가 있는 것은?",o:["근육 긴장","혈액 응고","자극 전달","노화 방지"],a:1,e:"비타민 K는 혈액 응고에 필수적인 비타민이다. 비타민 K가 부족하면 혈액 응고 시간이 길어진다.",r:82,c:"nutrition"},
{q:"아미노산의 성질에 대한 설명 중 맞는 것은?",o:["모든 아미노산은 선광성을 갖는다.","아미노산은 융점이 낮아서 액상이 많다.","아미노산은 종류에 따라 등전점이 다르다.","천연단백질을 구성하는 아미노산은 주로 D형이다."],a:2,e:"아미노산은 종류에 따라 등전점(isoelectric point)이 다르다. 글리신은 선광성이 없고, 천연 아미노산은 L형이 대부분이다.",r:93,c:"nutrition"},
{q:"식품첨가물의 구비조건이 아닌 것은?",o:["인체에 유해한 영향을 미치지 않을 것","식품의 영양가를 유지할 것","식품에 나쁜 이화학적 변화를 주지 않을 것","소량으로는 충분한 효과가 나타나지 않을 것"],a:3,e:"식품첨가물은 소량으로도 충분한 효과가 나타나야 한다. '소량으로는 효과가 나타나지 않을 것'은 구비조건이 아니다.",r:93,c:"nutrition"},
{q:"다음 중 인수공통전염병은?",o:["탄저병","콜레라","세균성이질","장티푸스"],a:0,e:"인수공통감염병에는 탄저병, 파상열, 결핵, 야토병, 돈닥독, Q열, 리스테리아증 이 있다. 제빵",r:99,c:"hygiene"},
{q:"주로 단백질 식품이 혐기성균의 작용에 의해 본래의 성질을 잃고 악취를 내거나 유해물질을 생성하여 먹을 수 없게 되는 현상은?",o:["발효","부패","갈변","산패"],a:1,e:"부패(putrefaction)는 주로 단백질 식품이 혐기성균의 작용에 의해 악취와 유해물질을 생성하는 현상이다.",r:90,c:"hygiene"},
{q:"아플라톡신은 다음 중 어디에 속하는가?",o:["감자독","효모독","세균독","곰팡이독"],a:3,e:"아플라톡신은 아스페르길루스 플라부스(Aspergillus flavus) 등의 곰팡이가 생성하는 곰팡이독(mycotoxin)이다.",r:93,c:"hygiene"},
{q:"경구전염병과 거리가 먼 것은?",o:["유행성간염","콜레라","세균성이질","일본뇌염"],a:3,e:"일본뇌염은 모기에 의해 전파되는 전염병으로 경구전염병이 아니다. 유행성간염, 콜레라, 세균성이질은 경구전염병이다.",r:93,c:"hygiene"},
{q:"미생물의 중식에 의해서 일어나는 식품의 부패나 변패를 방지하기 위하여 사용되는 식품첨가물은?",o:["보존료","착색료","산화방지제","표백제"],a:0,e:"보존료는 미생물의 증식을 억제하여 식품의 부패·변패를 방지하는 식품첨가물이다.",r:82,v:0,c:"ingredients"},
{q:"위생동물의 일반적인 특성이 아닌 것은?",o:["식성 범위가 넓다.","음식물과 농작물에 피해를 준다.","병원미생물을 식품에 감염시키는 것도 있다.","발육기간이 길다."],a:3,e:"위생동물: 파리, 벌, 바퀴벌레, 쥐 등의 위생상 위해를 주는 동물",r:99,c:"hygiene"},
{q:"정제가 불충분한 기름 중에 남아 식중독을 일으키는 고시폴은 어느 기름에서 유래하는가?",o:["피마자유","콩기름","면실유","미강유"],a:2,e:"고시폴(gossypol)은 면실(목화씨)에 함유된 독성물질로, 정제가 불충분한 면실유에 남아 식중독을 일으킬 수 있다.",r:90,c:"hygiene"},
{q:"포도상구균에 의한 식중독 예방책으로 부적합한 것은?",o:["조리장을 깨끗이 한다.","섭취 전에 60℃ 정도로 가열한다.","멸균된 기구를 사용한다.","화농성 질환자의 조리업무를 금지한다."],a:1,e:"포도상구균은 열에 강한 세균이라 가열해도 잘 파괴되지 않습니다.",r:99,c:"hygiene"},
{q:"식품위생법 상의 식품위생의 대상이 아닌 것은?",o:["식품","식품첨가물","조리방법","기구와 용기, 포장"],a:2,e:"식품위생법상 식품위생의 대상은 식품, 식품첨가물, 기구와 용기·포장이다. 조리방법은 직접적인 대상이 아니다.",r:93,c:"hygiene"}]},
{title:"2010년 1회",desc:undefined,questions:[{q:"아이스크림 제조에서 오버런(over-run)이란?",o:["교반에 의해 크림이 체적이 몇 % 증가하는가를 나타내는 수치","생크림 안에 들어 있는 유지방이 응집에서 완전히 액체로부터 분리된 것","살균 등의 가열조작에 의해 불안정하게 된 유지의 결정을 적온으로 해서 안정화시킨 숙성 조작","생유 안에 들어있는 큰 지방구를 미세하게 해서 안정화하는 공정"],a:0,e:"오버런(over-run)은 교반에 의해 크림의 체적이 원래보다 몇 % 증가하는가를 나타내는 수치이다. 공기 포집 정도를 나타낸다.",r:93,c:"ingredients"},
{q:"반죽의 비중에 대한 설명으로 맞는 것은?",o:["같은 무게의 반죽을 구울 때 비중이 높을수록 부피가 증가한다.","비중이 너무 낮으면 조직이 거칠고 큰 기포를 형성한다.","비중의 측정은 비중컵의 중량을 반죽의 중량으로 나눈 갑으로 한다.","비중이 높으면 기공이 열리고 가벼운 반죽이 얻어진다."],a:1,e:"비중이 높을수록 기공이 조밀하며 부피가 적고, 비줄이 낮을수록 열린기공을 가지며, 거칠고, 부피가 크다 제과",r:99,c:"manufacturing"},
{q:"스펀지케이크 제조시 더운 믹싱방법을 사용할 때 계란과 설탕의 중탕 온도로 가장 적합한 것은?",o:["23℃","43℃","63℃","83℃"],a:1,e:"40 ~ 45℃가 적당합니다.",r:99,c:"manufacturing"},
{q:"도넛 설탕 아이싱을 사용할 때의 온도로 적합한 것은?",o:["20℃ 전후","25℃ 전후","40℃ 전후","60℃ 전후"],a:2,e:"도넛 글레이즈를 49℃전후로 데워 사용 설탕은 점착력이 큰 온도인 40℃ 전후에 뿌린다",r:99,c:"manufacturing"},
{q:"비스킷을 제조할 때 유지할 때 유지보다 설탕을 많이 사용하면 어떤 결과가 나타나는가?",o:["제품의 촉감이 단단해진다.","제품이 부드러워진다.","제품의 퍼짐에 작아진다.","제품의 색깔이 엷어진다."],a:0,e:"비스킷에서 유지보다 설탕을 많이 사용하면 유지의 쇼트닝 효과가 상대적으로 줄어들어 글루텐 결합이 더 강해지므로 제품의 촉감이 단단해진다.",r:85,c:"ingredients"},
{q:"퍼프페이스트리의 휴지가 종료되었을 때 손으로 살짝 누르게 되면 다음 중 어떤 현상이 나타나는가?",o:["누른 자국이 남아있다.","누른 자국이 원상태로 올라온다.","누른 자국이 유동성 있게 움직인다.","내부의 유지가 흘러나온다."],a:0,e:"퍼프 페이스트리 휴지가 종료되면 글루텐이 완전히 이완되어 손으로 살짝 눌렀을 때 자국이 그대로 남아있다. 이는 반죽이 충분히 이완된 상태로 다음 밀어 펴기 단계를 진행하기 좋은 상태임을 나타낸다.",r:85,c:"ingredients"},
{q:"일반적인 제과작업장의 시설 설명으로 잘못된 것은?",o:["조명은 50 lx 이하가 좋다.","방충?방서용 금속망은 30메쉬(mesh)가 적당하다.","벽면은 매끄럽고 청소하기 편리하여야 한다.","창의 면적은 바닥면적을 기준하여 30% 정도가 좋다."],a:0,e:"500Lux",r:99,c:"hygiene"},
{q:"포장된 제과제품의 품질 변화 현상이 아닌 것은?",o:["전분의 호화","향의 변화","촉감의 변화","수분의 이동"],a:0,e:"전분의 호화 : 전분에 물과 열을 가열하면 수분을 흡수하면서 팽윤되며 점성이 커져 부풀어 반투명의 풀 상태로 되는 현상",r:99,c:"ingredients"},
{q:"스펀지케이크에 사용되는 필수재료가 아닌 것은?",o:["계란","박력분","설탕","베이킹파우더"],a:3,e:"스펀지 케이크의 사용되는 필수재료는 밀가루, 설탕, 달걀, 소금이며 고율배합이다.",r:99,c:"ingredients"},
{q:"반죽무게를 이용하여 반죽의 비중 측정시 필요한 것은?",o:["밀가루 무게","물 무게","용기 무게","설탕 무게"],a:1,e:"반죽의 비중측정법 : 같은부피의 반죽무게÷갈은부피의 물무게(컵무게를 소거할 수 있는 저울사용시) (반죽무게-컵무게)÷(물무게-컵무게) (컵무게를 같이 재야하는 저울사용시) 제과",r:99,c:"ingredients"},
{q:"다음 제품 중 거품형 케이크는?",o:["스펀지케이크","파운드케이크","데블스푸드케이크","화이트레이어케이크"],a:0,e:"스펀지케이크는 계란의 기포력으로 팽창하는 거품형 케이크이다. 파운드, 데블스푸드, 화이트레이어는 반죽형 케이크이다.",r:93,c:"manufacturing"},
{q:"파운드케이크 반죽을 가로 5㎝, 세로 12㎝, 높이 5㎝의 소형 파운드 팬에 100개 패닝하려고 한다. 총 반죽의 무게로 알맞은 것은? (단, 파운드케이크의 비용적은 2.40 ㎤/g이다)",o:["11㎏","11.5㎏","12㎏","12.5㎏"],a:3,e:"비용적 = 부피 ÷ 무게이므로, 무게 = 부피 ÷ 비용적\n팬 용적 = 5 × 12 × 5 = 300cm³\n1개당 반죽 무게 = 300 ÷ 2.40 = 125g\n100개 총 무게 = 125 × 100 = 12,500g = 12.5kg",r:87,c:"manufacturing"},
{q:"슈(choux)의 제조 공정상 구울 때 주의할 사항 중 잘못된 것은?",o:["220℃ 정도의 오븐에서 바삭한 상태로 굽는다.","너무 빠른 껍질 형성을 막기 위해 처음에 윗불을 약하게 한다.","굽는 중간에 오븐 문을 자주 여닫아 수증기를 제거한다.","너무 빨리 오븐에서 꺼내면 찌그러지거나 주저앉기 쉽다."],a:2,e:"슈는 굽는 중간에 오븐 문을 열면 수증기가 빠져나가 찌그러진다. 오븐 문은 마지막까지 열지 않아야 한다.",r:82,c:"manufacturing"},
{q:"파운드케이크의 표피를 터지지 않게 하려고 할 때 오븐의 조작 중 가장 좋은 방법은?",o:["뚜껑은 처음부터 덮어 굽는다.","10분간 굽기를 한 후 뚜껑을 덮는다.","20분간 굽기를 한 후 뚜껑을 덮는다.","뚜껑을 덮지 않고 굽는다."],a:0,e:"파운드케이크 표피가 터지지 않게 하려면 초기부터 뚜껑을 덮어 굽습니다. 뚜껑을 덮으면 증기가 갇혀 표면이 빠르게 건조·경화되지 않아 반죽이 서서히 팽창해도 표피가 갈라지지 않습니다. 일정 시간 후 뚜껑을 제거하여 색을 내는 방법과 구분해야 합니다.",r:99,c:"manufacturing"},
{q:"도넛의 튀김 온도로 가장 적당한 것은?",o:["140 ~ 156℃","160 ~ 176℃","180 ~ 196℃","220 ~ 236℃"],a:2,e:"도넛의 적당한 튀김 온도는 180~196℃이다. 이 온도에서 겉은 황금빛으로 바삭하게 익고 속도 균일하게 익으며, 지방 흡수가 적당하게 유지된다.",r:93,c:"manufacturing"},
{q:"제품이 오븐에 갑자기 팽창하는 오븐 스프링의 요인이 아닌 것은?",o:["탄산가스","알코올","가스압","단백질"],a:3,e:"탄산가스 : 이스트가 발효하며 생성한 가스가 열에 의해 팽창함. 알코올 : 발효 중 생긴 알코올이 가열되며 기화 → 부피 팽창 도움. 가스압 : 오븐에서 열을 받으면 내부 가스의 압력이 증가하여 팽창.",r:99,c:"manufacturing"},
{q:"오븐에서 나온 빵을 냉각하여 포장하는 온도로 가장 적합한 것은?",o:["0 ~ 5℃","15 ~ 20℃","35 ~ 40℃","55 ~ 60℃"],a:2,e:"포장온도는 38도가 가장 적합하다",r:99,c:"manufacturing"},
{q:"다음 발효과정 중 손실에 관계되는 사항과 가장 거리가 먼 것은?",o:["반죽온도","기압","발효온도","소금"],a:1,e:"발효 손실(가스 손실, 수분 손실)에 영향을 주는 요인은 반죽온도, 발효온도, 소금 함량 등이다. 기압은 발효 손실과 직접적인 관련이 가장 적다.",r:90,c:"manufacturing"},
{q:"어린반죽으로 만든 제품의 특징과 거리가 먼 것은?",o:["내상의 색상이 검다.","쉰 냄새가 난다.","부피가 작다.","껍질의 색상이 진하다."],a:1,e:"발효가 많이될 경우 이스트에서 쉰 냄새가 나기 때문에 발효가 덜 된 어린 반죽은 쉰 냄새가 날 수 없다.",r:99,c:"manufacturing"},
{q:"제빵에서 탈지분유를 1% 증가시킬 때 추가되는 물의 양으로 가장 적합한 것은?",o:["1%","5.2%","10%","15.5%"],a:0,e:"탈지분유를 1% 증가시킬 때 추가되는 물의 양은 1%이다. 탈지분유 자체에 수분이 거의 없으므로 동일한 비율의 물을 보충한다.",r:93,c:"ingredients"},
{q:"불란서빵 제조시 굽기를 실시할 때 스팀을 너무 많이 주입했을 때의 대표적인 현상은?",o:["질긴 껍질","두꺼운 표피","표피에 광택부족","밑면이 터짐"],a:0,e:"불란서빵 굽기 시 스팀을 과다하게 주입하면 표피가 지나치게 수분을 흡수하여 질기고 단단한 껍질이 형성된다. 적정 스팀은 껍질을 바삭하게 만드는 데 도움을 준다.",r:93,c:"manufacturing"},
{q:"빵의 품질평가에 있어서 외부평가 기준이 아닌 것은?",o:["굽기의 균일함","조직의 평가","터짐과 광택부족","껍질의 성질"],a:1,e:"조직의 평가는 내부 평가 제과",r:99,c:"manufacturing"},
{q:"팬기름의 사용에 대한 설명으로 거리가 먼 것은?",o:["발연점이 높아야 한다.","산패에 강해야 한다.","반죽무게의 3~4%를 사용한다.","기름이 과다하면 바닥 껍질이 두껍고 색이 어둡다."],a:2,e:"팬기름은 반죽무게의 0.1%로 사용",r:99,c:"ingredients"},
{q:"식빵 제조시 수돗물 온도 10℃, 실내온도 28℃, 밀가루 온도 30℃, 마찰계수 23일 때 반죽온도를 27℃로 하려면 몇 ℃의 물을 사용해야 하는가?",o:["0℃","5℃","12℃","17℃"],a:0,e:"계산된 물 온도 = (희망반죽온도*3) - ( 밀가루 +실내온도+마찰계수) = ( 27도*3 ) - ( 30도 + 28도 + 23 ) = 0도",r:99,c:"manufacturing"},
{q:"식빵 제조 시 1차 발효실의 적합한 온도는?",o:["24℃","27℃","34℃","37℃"],a:1,e:"1차 발효의 온도는 27도, 습도는 75~80% , (2차 발효의 온도는 35~45도, 습도는 75~90%이며, 2차발효시 프랑스빵류는 조금 낮아 32도, 75~80% 이다) [해설 작성자: 꽁야] 제과",r:99,c:"manufacturing"},
{q:"냉동반죽법에서 동결방식으로 적합한 것은?",o:["완만동결법","지연동결법","오버나이트법","급속동결법"],a:3,e:"냉동반죽법에서는 급속동결법(-40℃ 이하)을 사용해야 이스트 세포 손상을 최소화하고 글루텐 구조를 보호할 수 있다.",r:93,c:"manufacturing"},
{q:"산화제와 환원제를 함께 사용하여 믹싱시간과 발효시간을 감소시키는 제빵법은?",o:["스트레이트법","노타임법","비상스펀지법","비상스트레이트법"],a:1,e:"노타임법은 산화제와 환원제를 함께 사용하여 믹싱시간과 발효시간을 모두 감소시키는 제빵법이다.",r:85,c:"manufacturing"},
{q:"식빵 반죽 표피에 수포가 생긴 이유로 적합한 것은?",o:["2차 발효실 상대습도가 높았다.","2차 발효실 상대습도가 낮았다.","1차 발효실 상대습도가 높았다.","1차 발효실 상대습도가 낮았다."],a:0,e:"2차 발효실 상대습도가 너무 높으면 반죽 표면에 물방울이 맺혀 수포가 생긴다.",r:85,c:"manufacturing"},
{q:"제빵 제조공정의 4대 중요 관리항목에 속하지 않는 것은?",o:["시간관리","온도관리","공정관리","영양관리"],a:3,e:"제빵 제조공정의 4대 관리항목은 시간관리, 온도관리, 공정관리, 위생관리이다. 영양관리는 포함되지 않는다.",r:85,c:"manufacturing"},
{q:"대량생산 공장에서 많이 사용되는 오븐으로 반죽이 들어가는 입구와 제품이 나오는 출구가 서로 다른 오븐은?",o:["데크 오븐","터널 오븐","로터리 래크 오븐","컨벡션 오븐"],a:1,e:"터널 오븐은 입구와 출구가 서로 달라 연속 생산이 가능하여 대량생산 공장에서 많이 사용된다.",r:82,c:"manufacturing"},
{q:"모노글리세리드(monoglyceride)와 디글리세리드(diglyceride)는 제과에 있어 주로 어떤 역할을 하는가?",o:["유화제","항산화제","감미제","필수영양제"],a:0,e:"모노글리세리드와 디글리세리드는 친수성·친유성을 모두 가져 유화제로 작용한다.",r:82,c:"ingredients"},
{q:"글루테닌과 글라아딘이 혼합된 단백질은?",o:["알부민","글루텐","글로부린","프로테오스"],a:1,e:"글루테닌과 글리아딘이 물과 결합하여 혼합되면 글루텐이 형성된다.",r:82,c:"ingredients"},
{q:"캐러멜화를 일으키는 것은?",o:["비타민","지방","단백질","당류"],a:3,e:"캐러멜화는 당류를 고온에서 가열할 때 일어나는 갈변 반응이다.",r:82,c:"nutrition"},
{q:"다음 중 이당류가 아닌 것은?",o:["포도당","맥아당","설탕","유당"],a:0,e:"포도당은 단당류 제빵",r:99,c:"ingredients"},
{q:"제과, 제빵에서 계란의 역할로만 묶인 것은?",o:["영양가치 증가, 유화역할, pH강화","영양가치 증가, 유화역할, 조직강화","영양가치 증가, 조직강화, 방부효과","유화역할, 조직강화, 발효시간 단축"],a:1,e:"제과·제빵에서 계란의 역할은 영양가치 증가, 유화역할, 조직강화이다. pH 강화, 방부효과, 발효시간 단축은 계란의 주요 기능이 아니다.",r:93,c:"nutrition"},
{q:"다음 중 유지의 경화 공정과 관계가 없는 물질은?",o:["불포화지방산","수소","콜레스테롤","촉매제"],a:2,e:"유지의 경화(수소 첨가)에는 불포화지방산, 수소, 촉매제(니켈)가 필요하다. 콜레스테롤은 경화 공정과 관계없다.",r:93,c:"nutrition"},
{q:"젤라틴(gelatin)에 대한 설명 중 틀린 것은?",o:["동물성 단백질이다.","응고제로 주로 이용된다.","물과 섞으면 용해된다.","콜로이드 용액의 젤 형성과정은 비가역적인 과정이다."],a:3,e:"젤라틴은 동물의 껍질이나 연골을 사용하며, 끓는 물에서 용해되고, 산에 약하고, 무스, 바바루아, 젤리 등에 쓰인다",r:99,c:"ingredients"},
{q:"제빵용 물로 가장 적합한 것은?",o:["연수(1~60ppm)","아연수(61~120ppm)","아경수(121~180ppm)","경수(180ppm)"],a:2,e:"제빵용으로 가장 적합한 물은 아경수(121~180ppm)이다. 아경수는 글루텐을 적당히 강화하고 이스트의 활성을 도와 발효와 빵 품질에 가장 유리하다.",r:75,c:"ingredients"},
{q:"퐁당 크림을 부드럽게 하고 수분보유력을 높이기 위해 일반적으로 첨가하는 것은?",o:["한천, 젤라틴","물, 레몬","소금, 크림","물엿, 전화당 시럽"],a:3,e:"퐁당 크림에 물엿이나 전화당 시럽을 첨가하면 수분보유력이 높아지고 부드러워진다.",r:85,c:"ingredients"},
{q:"바닐라 에센스가 우유에 미치는 영향은?",o:["생취를 감취시킨다.","마일드한 감을 감소시킨다.","단백질의 영양가를 증가시키는 강화제 역할을 한다.","색감을 좋게 하는 착색료 역할을 한다."],a:0,e:"바닐라 에센스는 우유의 생취(비린내)를 감추는 착향료 역할을 한다.",r:77,c:"nutrition"},
{q:"베이킹파우더 사용량이 과다할 때의 현상이 아닌 것은?",o:["기공과 조직이 조밀하다.","주저앉는다.","같은 조건일 때 건조가 빠르다.","속결이 거칠다."],a:0,e:"베이킹파우더가 과다하면 가스가 과잉 발생하여 주저앉고, 건조가 빠르며, 속결이 거칠어진다. 기공과 조직이 조밀해지는 것은 적량 사용 시의 현상이다.",r:93,c:"ingredients"},
{q:"[H3O⁺]의 농도가 다음과 같을 때 가장 강산인 것은?",o:["10⁻² ㏖/ℓ","10⁻³ ㏖/ℓ","10⁻⁴ ㏖/ℓ","10⁻⁵ ㏖/ℓ"],a:0,e:"[H3O⁺] 농도가 높을수록(10의 지수가 작을수록) 강산이다. 10⁻²이 가장 높은 농도이므로 가장 강산(pH 2)이다.",r:95,v:0,c:"nutrition"},
{q:"밀가루의 점도변화를 측정함으로써 알파-아밀라아제 효과를 판정할 수 있는 기기는?",o:["아밀로그래프(Amylograph)","믹소그래프(Mixograph)","알베오그래프(Alveograph)","믹서트론(Mixertron)"],a:0,e:"아밀로그래프는 밀가루 전분의 점도 변화를 측정하여 α-아밀라아제의 효과를 판정하는 기기이다.",r:85,c:"ingredients"},
{q:"효모의 대표적인 증식방법은?",o:["분열법","출아법","유포자형성","무성포자형성"],a:1,e:"효모의 대표적인 증식방법은 출아법(budding)이다. 분열법은 세균의 증식방법이다.",r:82,c:"ingredients"},
{q:"과자와 빵에 우유가 미치는 영향이 아닌 것은?",o:["영양을 강화시킨다.","보수력이 없어서 노화를 촉진시킨다.","겉껍질 색깔을 강하게 한다.","이스트에 의해 생성된 향을 착향시킨다."],a:1,e:"우유는 제품에 수분을 잡아두는 수분보유력이 노화를 지연하고 신선도를 연장시킨다",r:99,c:"ingredients"},
{q:"체내에서 물의 역할을 설명한 것으로 틀린 것은?",o:["물은 영양소와 대사산물을 운반한다.","땀이나 소변으로 배설되며 체온 조절을 한다.","영양소 흡수로 세포막에 농도차가 생기면 물이 바로 이동한다.","변으로 배설될 때는 물의 영향을 받지 않는다."],a:3,e:"물은 영양소 운반, 체온 조절, 삼투압 조절 등의 역할을 한다. 변으로 배설될 때도 물의 영향을 받는다(수분 함량에 따라 변비/설사).",r:93,c:"nutrition"},
{q:"카제인이 많이 들어있는 식품은?",o:["빵","우유","밀가루","콩"],a:1,e:"카세인은 우유의 주된 단백질이며 약 80%를 차지한다. 제과",r:99,c:"ingredients"},
{q:"다음의 단팥빵 영양가 표를 참고하여 단팥빵 200g의 열량을 구하면 얼마인가?",o:["190 kcal","300 kcal","380 kcal","460 kcal"],a:2,e:"(탄수화물의 무게+단백질의 무게)☓4 + (지방의 무게☓9)〕☓2 = 〔(20+5)☓4 + (10☓9)〕☓2 = (100 + 90 ) ☓ 2 = 380 (kcal) ※ 200g ÷ 100g = 2 이므로 190kcal ☓ 2 = 380kcal 입니다",r:99,c:"nutrition"},
{q:"무기질의 기능이 아닌 것은?",o:["우리 몸의 경조직 구성성분이다.","열량을 내는 열량 급원이다.","효소의 기능을 촉진 시킨다.","세포의 삼투압 평형유지 작용을 한다."],a:1,e:"무기질은 열량을 내지 않는다. 열량 급원은 탄수화물(4kcal/g), 단백질(4kcal/g), 지방(9kcal/g)이다.",r:93,c:"nutrition"},
{q:"혈당의 저하와 가장 관계가 깊은 것은?",o:["인슐린","리파아제","프로테아제","펩신"],a:0,e:"혈당유지호르몬=인슐린 체내 0.1%유지",r:99,c:"nutrition"},
{q:"다음 법정전염병 중 제2군 전염병은?",o:["파라티푸스","풍진","발진티푸스","한센병"],a:1,e:"풍진은 제2군 전염병(예방접종 대상)이다. 파라티푸스는 1군, 발진티푸스는 3군이다.",r:82,v:0,c:"hygiene"},
{q:"다음 중 식품접객업에 해당되지 않은 것은?",o:["식품냉동 냉장업","유흥주점영업","위탁급식영업","일반음식점영업"],a:0,e:"식품냉동냉장업은 식품제조가공업에 해당하며 식품접객업이 아니다. 유흥주점, 위탁급식, 일반음식점은 식품접객업이다.",r:93,c:"hygiene"},
{q:"다음 중 세균성 식중독 예방을 위한 일반적인 원칙이 아닌 것은?",o:["먹기 전에 가열처리 할 것","가급적 조리 직후에 먹을 것","설사환자나 화농성 질환이 있는 사람은 식품을 취급하지 않도록 할 것","실온에서 잘 보관하여 둘 것"],a:3,e:"식중독 예방을 위해 식품은 냉장 또는 냉동 보관해야 하며, 실온 보관은 세균 증식을 촉진한다.",r:77,c:"hygiene"},
{q:"식중독의 예방 원칙으로 올바른 것은?",o:["장기간 냉장보관","주방의 바닥 및 벽면의 충분한 수분유지","잔여 음식의 폐기","날음식, 특히 어패류는 생식 할 것"],a:2,e:"식중독 예방의 기본 원칙은 잔여 음식의 폐기이다. 장기간 보관, 생식, 바닥 수분유지는 부적절하다.",r:85,c:"ingredients"},
{q:"다음 중 허가된 천연유화제는?",o:["구연산","고시폴","레시틴","세사몰"],a:2,e:"노른자에는 ‘레시틴’이 함유되어 있으며 천연유화제로 사용됨",r:99,c:"ingredients"},
{q:"다음 중 아플라톡신을 생산하는 미생물은?",o:["효모","세균","바이러스","곰팡이"],a:3,e:"아플라톡신은 곰팡이(Aspergillus flavus)가 생산하는 발암성 독소이다.",r:82,c:"hygiene"},
{q:"소독력이 강한 양이온계면활성제로서 종업원의 손을 소독할 때나 용기 및 기구의 소독제로 알맞은 것은?",o:["석탄산","과산화수소","역성비누","크레졸"],a:2,e:"역성비누(양이온계면활성제)는 소독력이 강하여 손, 용기, 기구 소독에 적합하다.",r:85,c:"hygiene"},
{q:"어패류의 생식과 가장 관계가 깊은 식중독 세균은?",o:["프로테우스균","장염 비브리오균","살모넬라균","바실러스균"],a:1,e:"장염 비브리오균은 해수에 서식하며 어패류 생식과 가장 관계가 깊은 식중독 세균이다.",r:85,c:"hygiene"},
{q:"알레르기성 식중독의 원인이 될 수 있는 가능성이 가장 높은 식품은?",o:["오징어","꽁치","갈치","광어"],a:1,e:"히스타민에 의한 알레르기성 식중독은 등푸른 생선(꽁치, 고등어, 정어리 등)에서 주로 발생한다.",r:82,c:"hygiene"},
{q:"밀가루의 표백과 숙성에 사용되는 첨가물의 종류?",o:["개량제","발색제","피막제","소포제"],a:0,e:"밀가루의 표백과 숙성을 위해 사용하는 첨가물은 개량제이다.",r:82,c:"ingredients"}]},
{title:"2010년 2회",desc:undefined,questions:[{q:"초콜릿 케이크에서 우유 사용량을 구하는 공식은?",o:["설탕－30－(코코아×1.5)－전란","설탕－30－(코코아×1.5)－전란","설탕＋30＋(코코아×1.5)－전란","설탕－30＋(코코아×1.5)＋전란"],a:2,e:"초콜릿 케이크의 우유 사용량 공식은 설탕＋30＋(코코아×1.5)－전란이다. 코코아가 수분을 흡수하므로 코코아 양의 1.5배를 더하고, 전란이 제공하는 수분만큼을 빼서 우유량을 산출한다.",r:90,c:"ingredients"},
{q:"파운드 케이크를 구울 때 윗면이 자연적으로 터지는 경우가 아닌 것은?",o:["반죽 내의 수분이 불충분한 경우","반죽 내에 녹지 않은 설탕입자가 많은 경우","팬에 분할한 후 오븐에 넣을 때까지 장시간 방치하여 껍질이 마른 경우","오븐 온도가 낮아 껍질이 서서히 마를 경우"],a:3,e:"오븐 온도가 낮으면 껍질이 천천히 형성되어 내부 팽창과 함께 자연스럽게 벌어지지 않고 균열이 발생하지 않는다. 수분 부족, 녹지 않은 설탕 입자, 오래 방치로 인한 껍질 건조는 모두 표면이 빨리 굳어 내부 팽창 압력에 의해 윗면이 터지는 원인이 된다.",r:99,c:"manufacturing"},
{q:"커스터드 푸딩은 틀에 몇 % 정도 채우는가?",o:["55%","75%","95%","115%"],a:2,e:"커스터드 푸딩은 틀에 약 95% 정도 채운다. 커스터드는 굽는 동안 팽창이 거의 없으므로 틀을 거의 가득 채워도 넘치지 않는다.",r:87,c:"manufacturing"},
{q:"반죽의 비중이 제품에 미치는 영향 중 관계가 가장 적은 것은?",o:["제품의 부피","제품의 조직","제품의 점도","제품의 기공"],a:2,e:"반죽의 비중은 제품의 부피, 조직, 기공에 영향을 미친다. 점도는 비중과 관계가 가장 적다.",r:85,c:"manufacturing"},
{q:"빵의 포장 재료가 갖추어야 할 조건이 아닌 것은?",o:["방수성일 것","위생적일 것","상품가치를 높일 수 있을 것","통기성일 것"],a:3,e:"빵의 포장재는 방수성, 위생성이 필요하고 상품가치를 높여야 한다. 통기성이 있으면 수분이 빠져나가 노화가 촉진된다.",r:85,c:"hygiene"},
{q:"일반적으로 슈 반죽에 사용되지 않는 재료는?",o:["밀가루","계란","버터","이스트"],a:3,e:"이스트는 효모라고도 하는데 제빵에서의 팽창제라고 보시면되요",r:99,c:"ingredients"},
{q:"반죽의 희망온도가 27˚C이고, 물 사용량은 10kg, 밀가루의 온도가 20˚C, 실내온도가 26˚C, 수돗물 온도가 18˚C, 결과온도가 30˚C일 때 얼음의 양은 약 얼마인가?",o:["0.4kg","0.6kg","0.81kg","0.92kg"],a:3,e:"마찰계수: (30×3)-(20+26+18)=26 사용할 물온도 : (27×3)-(20+26+26)=9 얼음사용량 : 10×(18-9) ㅡㅡㅡㅡㅡ = 0.918 (80+18)",r:99,c:"manufacturing"},
{q:"슈 제조시 반죽표면을 분무 또는 침지시키는 이유가 아닌 것은?",o:["껍질을 얇게 한다.","팽창을 크게 한다.","기형을 방지한다.","제품의 구조를 강하게 한다."],a:3,e:"슈는 주저앉는순간 망하는 제품이기 때문에 구조의 강화가 중요한점을 포인트로 삼으면 좋을 것 같아요",r:99,c:"manufacturing"},
{q:"퍼프 페이스트리의 팽창은 주로 무엇에 기인하는가?",o:["공기 팽창","화학 팽창","증기압 팽창","이스트 팽창"],a:2,e:"퍼프 페이스트리의 팽창은 주로 반죽 층 사이의 수분이 증기로 변하면서 발생하는 증기압 팽창이다.",r:85,c:"ingredients"},
{q:"제과/제빵공장에서 생산관리시 매일 점검할 사항이 아닌 것은?",o:["제품당 평균 단가","설비 가동률","원재료율","출근율"],a:0,e:"제품당 평균 단가는 원가 분석 등 정기적 경영 관리 지표로 매일 점검하는 항목이 아니다. 설비 가동률, 원재료율, 출근율은 생산 현장에서 매일 확인이 필요한 사항이다.",r:90,c:"management"},
{q:"일반적은 도넛의 가장 적당한 튀김온도 범위는?",o:["170 ∼ 176˚C","180 ∼ 195˚C","200 ∼ 210˚C","220 ∼ 230˚C"],a:1,e:"도넛의 적당한 튀김 온도는 180~195℃이다.",r:78,c:"manufacturing"},
{q:"도넛의 설탕이 수분을 흡수하여 녹는 현상을 방지하기 위한 방법으로 잘못된 것은?",o:["도넛에 묻는 설탕의 양을 증가시킨다.","튀김시간을 증가시킨다.","포장용 도넛의 수분은 38% 전후로 한다.","냉각 중 환기를 더 많이 시키면서 충분히 냉각한다."],a:2,e:"21~25% 제과",r:99,c:"manufacturing"},
{q:"케이크 반죽에 있어 고율배합 반죽의 특성을 잘못 설명한 것은?",o:["화학팽창제의 사용은 적다.","구울 때 굽는 온도를 낮춘다.","반죽하는 동안 공기와의 혼합은 양호하다.","비중이 높다."],a:3,e:"고배율은 설탕사용량이 많기때문에 공기가 혼합이 많다 팽창데를 적게 사용 비중은 낮다 낮은온도에서 굽는딘 제과",r:99,c:"manufacturing"},
{q:"다음 제품 제조시 2차 발효실의 습도를 가장 낮게 유지 하는 것은?",o:["풀먼 식빵","햄버거빵","과자빵","빵 도넛"],a:3,e:"빵 도넛은 2차 발효 후 기름에 튀기므로, 표면에 수분이 많으면 기름이 튀고 제품이 퍼지는 문제가 생긴다. 따라서 2차 발효실 습도를 가장 낮게(60~65%) 유지한다.",r:82,c:"manufacturing"},
{q:"데니시 페이스트리 반죽의 적정 온도는?",o:["18∼ 22˚C","26 ∼ 31˚C","35 ∼ 39˚C","45 ∼ 49˚C"],a:0,e:"데니시 페이스트리 반죽의 적정 온도는 18~22℃로, 유지의 가소성을 유지해야 한다.",r:77,c:"ingredients"},
{q:"도넛을 글레이즈할 때 글레이즈의 적정한 품온은?",o:["24 ∼ 27˚C","28 ∼ 32˚C","33 ∼ 36˚C","43 ∼ 49˚C"],a:3,e:"ㄷ글레이즈란 과자류 표면에 광택을 내는 일 또는 표면이 마르지 않도록 젤라틴, 젤리, 시럽, 퐁당, 초콜릿 등을 바르는 일과 이런 모든 재료를 총칭하며 사용범위가 43~50℃로 넗다.",r:99,c:"manufacturing"},
{q:"분할을 할 때 반죽의 손상을 죽일 수 있는 방법이 아닌 것은?",o:["스트레이트법보다 스펀지법으로 반죽한다.","반죽온도를 높인다.","단백질 양이 많은 질 좋은 밀가루로 만든다.","가수량이 최적인 상태의 반죽을 만든다."],a:1,e:"분할 시 반죽 손상을 줄이려면 스펀지법 사용, 질 좋은 밀가루, 최적 가수 상태가 필요하다. 반죽온도를 높이면 반죽이 더 약해져 손상이 커진다.",r:93,c:"manufacturing"},
{q:"식빵의 옆면이 쑥 들어간 원인으로 옳은 것은?",o:["믹서의 속도가 너무 높았다.","팬 용적에 비해 반죽양이 너무 많았다.","믹싱시간이 너무 길었다.","2차 발효가 부족했다."],a:1,e:"팬 용적에 비해 반죽량이 너무 많으면 굽는 도중 팽창 압력을 옆면이 견디지 못해 구조가 무너지면서 쑥 들어가는 현상이 발생한다.",r:93,c:"manufacturing"},
{q:"빵 발효에서 다른 조건이 같을 때 발효 손실에 대한 설명으로 틀린 것은?",o:["반죽 온도가 낮을수록 발효손실이 크다.","발효 시간이 길수록 발효손실이 크다.","소금, 설탕 사용량이 많을수록 발효손실이 적다.","발효실 온도가 높을수록 발효손실이 크다."],a:0,e:"반죽 온도가 높을수록, 발효시간이 길수록, 소금과 설탕이 적을수록, 발효실의 온도가 높을수록, 발효실의 습도가 낮을수록 => 발효손실이 크다.",r:99,c:"manufacturing"},
{q:"다음 중 거품형 쿠키로 전란을 사용하는 제품은?",o:["스펀지 쿠키","머랭 쿠키","스냅 쿠키","드롭 쿠키"],a:0,e:"스펀지 쿠키는 전란을 사용하는 거품형 쿠키이다. 머랭 쿠키는 흰자만 사용하고, 스냅·드롭은 반죽형이다.",r:85,c:"manufacturing"},
{q:"다음 중 제품의 가치에 속하지 않는 것은?",o:["교환가치","귀중가치","사용가치","재고가치"],a:3,e:"제품의 가치는 교환가치, 사용가치, 귀중가치(희소성·감성 가치) 등으로 분류한다. 재고가치는 일반적인 제품 가치 분류에 포함되지 않는다.",r:85,c:"manufacturing"},
{q:"다음 중 어린반죽에 대한 설명으로 잘못된 것은?",o:["속색이 무겁고 어둡다.","향이 강하다.","부피가 작다.","모서리가 예리하다."],a:1,e:"어린반죽(발효 부족)은 속색이 무겁고 어둡고, 부피가 작으며, 모서리가 예리하다. 향은 약하지 강하지 않다.",r:85,v:0,c:"manufacturing"},
{q:"단과자빵 제조에서 일반적인 이스트의 사용량은?",o:["0.1 ∼ 1%","3 ∼ 7%","8 ∼ 10%","12 ∼ 14%"],a:1,e:"단과자빵은 설탕·유지 함량이 높아 삼투압에 의해 이스트 활성이 저하되므로, 일반 식빵(2~3%)보다 많은 3~7%의 이스트를 사용한다.",r:90,c:"ingredients"},
{q:"일반적인 빵반죽(믹싱)의 최적 반죽 단계는?",o:["픽업 단계","클린업 단계","발전 단계","최종 단계"],a:3,e:"반죽의 발전단계에 최종 단계는 글루텐 발전이 절정에 달하며, 겉모양은 부드럽고 신장성과 탄력성의 합계가 최대인 상태이기때문이다 참고로 신장성은 늘어나는 성질이고 탄력성은 탄력이 있는성질 즉 눌렀을때 스펀지처럼 다시 자국안남고 원상복구되는성질이다 제과",r:99,c:"manufacturing"},
{q:"냉동반죽의 특성에 대한 설명 중 틀린 것은?",o:["냉동반죽에는 이스트 사용량을 늘인다.","냉동반죽에는 당, 유지 등을 첨가하는 것이 좋다.","냉동 중 수분의 손실을 고려하여 될 수 있는 대로 진 반죽이 좋다.","냉동반죽은 분할량을 적게 하는 것이 좋다."],a:2,e:"냉동반죽은 수분 손실을 최소화하기 위해 오히려 되직한(단단한) 반죽이 유리하다. 진 반죽은 냉동·해동 과정에서 수분 이동이 심해져 글루텐 구조와 제품 품질이 저하된다.",r:95,c:"manufacturing"},
{q:"제빵시 팬기름의 조건으로 적합하지 않은 것은?",o:["발연점이 낮을 것","무취일 것","무색일 것","산패가 잘 안될 것"],a:0,e:"발연점이 높아야 합니다.",r:99,c:"ingredients"},
{q:"빵을 포장할 때 가장 적합한 빵의 온도와 수분함량은?",o:["30˚C, 30%","35˚C, 38%","42˚C, 45%","48˚C, 55%"],a:1,e:"포장 온도 35~40도가 적당함. 제과",r:99,c:"ingredients"},
{q:"믹서(Mixer)의 구성에 해당되지 않는 것은?",o:["믹서볼(Mixer Bowl)","휘퍼(Whipper)","비터(Beater)","배터(Batter)"],a:3,e:"배터(Batter)는 반죽이란 뜻이다.",r:99,c:"manufacturing"},
{q:"굽기 과정 중 일어나는 현상에 대한 설명 중 틀린 것은?",o:["오븐 팽창과 전분호화 발생","단백질 변성과 효소의 불활성화","빵 세포 구조 형성과 향의 발달","캐러멜화 갈변 반응의 억제"],a:3,e:"굽기 과정에서는 오븐 팽창, 전분 호화, 단백질 변성, 캐러멜화 갈변이 모두 발생한다. 갈변 반응이 억제되는 것이 아니라 촉진된다.",r:93,c:"nutrition"},
{q:"최종제품의 부피가 정상보다 클 경우의 원인이 아닌 것은?",o:["2차 발효의 초과","소금 사용량 과다","분할량 과다","낮은 오븐온도"],a:1,e:"소금은 표준량(1.75%)보다 많아지면 효소의 작용을 억제하여 가스 발생력이 줄어든다. -> 부피 작아짐",r:99,c:"manufacturing"},
{q:"실내온도 25˚C, 밀가루온도 25˚C, 설탕온도 20˚C, 유지온도 22˚C, 계란온도 20˚C, 마찰계수가 12일 때 희망온도를 22˚C로 맞추려 한다. 사용할 물의 온도는?",o:["7","8","9","15"],a:1,e:"사용할 물의 온도 = (희망온도 * 6) - (실내온도 + 밀가루온도 + 설탕온도 + 유지온도 + 계란온도 + 마찰계수) 사용할 물의 온도 = (22*6) - (25+25+20+22+20+12) = 132 - 124 = 8 사용할 물의 온도 = 8도",r:99,c:"ingredients"},
{q:"달걀의 가식부에서 전란의 고형질은 얼마인가?",o:["12% 정도","25% 정도","50% 정도","75% 정도"],a:1,e:"전란은 껍질제외 수분 75% 고형분 25%로 이루어져있다",r:99,c:"nutrition"},
{q:"호밀에 관한 설명으로 틀린 것은?",o:["호밀 단백질은 밀가루 단백질에 비하여 글루텐을 형성하는 능력이 떨어진다.","밀가루에 비하여 펜토산 함량이 낮아 반죽이 끈적거린다.","제분율에 따라 백색, 중간색, 흑색 호밀가루로 분류한다.","호밀분에 지방함량이 높으면 저장성이 나쁘다."],a:1,e:"호밀가루는 펜토산함량이 높아 반죽이 끈적거린다",r:99,c:"ingredients"},
{q:"물 중의 기름을 분산시키고 또 분산된 입자가 응집하지 않도록 안정화 시키는 작용을 하는 것은?",o:["팽창제","유화제","강화제","개량제"],a:1,e:"1. 팽창제 : 빵, 과자 등을 부풀려 모양을 갖추기 위해 2. 유화제 : 서로 혼합이 잘 되지 않는 두 종류의 액체 또는 고체를 액체에 분산시키기 위해 (=계면활성제) 3. 강화제 : 비타민류, 무기염류, 아미노산류 등 식품의 영양을 강화하기 위해 4. 개량제 : 품질 개량하기 위해",r:99,c:"ingredients"},
{q:"분당(Powdered sugar)의 고형화를 방지하기 위하여 첨가하는 물질은?",o:["검류","전분","비타민 C","분유"],a:1,e:"분당의 고형화(덩어리짐)를 방지하기 위해 약 3%의 전분(옥수수전분)을 첨가한다.",r:82,c:"ingredients"},
{q:"간이시험법으로 밀가루의 색상을 알아보는 시험법은?",o:["페카시험","킬달법","침강시험","압력계시험"],a:0,e:"페카시험(Pekar test)은 밀가루의 색상을 간이적으로 알아보는 시험법이다.",r:85,c:"ingredients"},
{q:"다음 중 일반적인 제품의 비용적이 틀린 것은?",o:["파운드 케이크 : 2.40cm³/g","엔젤 푸드 케이크 : 4.71cm³/g","레이어 케이크 : 5.05cm³/g","스펀지 케이크 : 5.08cm³/g"],a:2,e:"다. 레이어 케이크 : 2.96cm³/g 제과",r:99,c:"ingredients"},
{q:"지방의 산패를 촉진하는 인자와 거리가 먼 것은?",o:["질소","산소","동","자외선"],a:0,e:"질소는 불활성 기체로 지방의 산패를 촉진하지 않는다. 산소, 동(구리), 자외선은 산패를 촉진한다.",r:82,c:"nutrition"},
{q:"단순 단백질인 알부민에 대한 설명으로 옳은 것은?",o:["물이나 묽은 염류용액에 녹고 열에 의해 응고된다.","물에는 불용성이나 묽은 염류용액에 가용성이고 열에 의해 응고된다.","중성 용매에는 불용성이나 묽은 산, 염기에는 가용성이다.","곡식의 낱알에만 존재하며 밀의 글루테닌이 대표적이다."],a:0,e:"알부민은 물이나 묽은 염류용액에 녹고 열에 의해 응고되는 단순 단백질이다. 계란 흰자의 오브알부민이 대표적이다.",r:93,c:"nutrition"},
{q:"제빵 시 소금 사용량이 적량보다 많을 때 나타나는 현상이 아닌 것은?",o:["부피가 작다.","과발효가 일어난다.","껍질색이 검다.","발효 손실이 적다."],a:1,e:"소금 사용량이 적량보다 많을 때, 부피가 작고 껍질색이 검은암적색, 속색상은 진한암적생이다. 예리한 모서리로 약간터지고 윗면이 편편하다. 껍질이 거칠고 두껍다.향이 없고 짠맛. 발효가 느리고 팬의 흐름성이 많다. * 발효손실에 영향을 미치는 요소 : 소금과 설탕이 많을수록 발효 손실이 작다.",r:99,c:"manufacturing"},
{q:"이스트에 질소 등의 영양을 공급하는 제빵용 이스트푸드의 성분은?",o:["칼슘염","암모늄염","브롬염","요오드염"],a:1,e:"암모늄염(황산암모늄, 인산암모늄 등)은 이스트에 질소를 공급하는 이스트푸드의 성분이다.",r:85,c:"nutrition"},
{q:"탈지분유 구성 중 50% 정도를 차지하는 것은?",o:["수분","지방","유당","회분"],a:2,e:"탈지분유의 약 50%는 유당(lactose)으로 구성되어 있다.",r:82,c:"ingredients"},
{q:"건조 글루텐(Dry gluten) 중에 가장 많은 성분은?",o:["단백질","전분","지방","회분"],a:0,e:"건조 글루텐 중 가장 많은 성분은 단백질(약 75~80%)이다.",r:82,c:"ingredients"},
{q:"제빵 제조시 물의 기능이 아닌 것은?",o:["글루텐 형성을 돕는다.","반죽온도를 조절한다.","이스트 먹이 역할을 한다.","효소활성화에 도움을 준다."],a:2,e:"물은 글루텐 형성, 반죽온도 조절, 효소 활성화 등의 기능을 한다. 이스트의 먹이는 당류(설탕, 포도당 등)이며, 물은 이스트의 영양원이 아니다.",r:93,c:"ingredients"},
{q:"이스트에 함유되어 있지 않은 효소는?",o:["인버타아제","말타아제","지마아제","아밀라아제"],a:3,e:"이스트에 함유되어 있는 효소 : 프로테아제, 리파아제, 인버타아제, 말타아제, 지마아제 4. 아밀라아제 : 가수분해효소. 전분,글리코겐 분해",r:99,c:"nutrition"},
{q:"다음 중 맥아당이 가장 많이 함유되어 있는 식품은?",o:["우유","꿀","설탕","식혜"],a:3,e:"식혜는 엿기름(맥아)으로 만들어 맥아당이 가장 많이 함유되어 있다.",r:82,c:"ingredients"},
{q:"비타민 B₁의 특징으로 옳은 것은?",o:["단백질의 연소에 필요하다.","탄수화물 대사에서 조효소로 작용한다.","결핍증은 펠라그라(Pellagra) 이다.","인체의 성장인자이며 항빈혈작용을 한다."],a:1,e:"비타민 B₁(티아민)은 탄수화물 대사에서 조효소로 작용한다. 결핍 시 각기병이 발생한다.",r:85,v:0,c:"nutrition"},
{q:"난백이 교반에 의해 머랭으로 변하는 현상을 무엇이라고 하는가?",o:["단백질 변성","단백질 평형","단백질 강화","단백질 변패"],a:0,e:"난백이 교반에 의해 머랭으로 변하는 것은 기계적 작용에 의한 단백질 변성이다.",r:85,c:"ingredients"},
{q:"췌장에서 생성되는 지방 분해효소는?",o:["트립신","아밀라아제","펩신","리파아제"],a:3,e:"췌장에서 생성되는 지방분해효소는 스테압신(=리파아제)이며 에스테르 결합을 가수분해하여 지방산+글리세린으로 전환시킨다 제과",r:99,c:"nutrition"},
{q:"20대 한 남성의 하루 열량 섭취량을 2500kcal로 했을 때 가장 이상적인 1일 지방 섭취량은?",o:["약 10~40g","약 40~70g","약 70~100g","약 100~130g"],a:1,e:"1일 지방 섭취 권장비율은 약 20~30%이다.\n2500kcal × 0.25 ÷ 9kcal/g ≒ 69g, 2500 × 0.30 ÷ 9 ≒ 83g\n따라서 약 70~100g 범위가 이상적인 지방 섭취량에 해당한다.",r:95,c:"nutrition"},
{q:"다음 중 냉장온도에서도 증식이 가능하여 육류, 가금류 외에도 열처리 하지 않은 우유나 아이스크림, 채소 등을 통해서도 식중독을 일으키며 태아나 임신부에 치명적인 식중독 세균은?",o:["캠필로박터균(Campylobacter jejuni)","바실러스균(Bacilluscereus)","리스테리아균(Listeria monocytogenes)","비브리오 패혈증균(Vibrio vulnificus)"],a:2,e:"리스테리아균은 냉장온도(4℃)에서도 증식 가능하며 태아와 임신부에 치명적인 식중독 세균이다.",r:82,c:"hygiene"},
{q:"장염 비브리오균에 의한 식중독이 가장 일어나기 쉬운 식품은?",o:["식육류","우유제품","야채류","어패류"],a:3,e:"장염 비브리오균은 해수에 서식하여 어패류를 통해 식중독을 일으킨다.",r:82,c:"hygiene"},
{q:"식품시설에서 교차오염을 예방하기 위하여 바람직한 것은?",o:["작업장은 최소한의 면적을 확보함","냉수 전용 수세 설비를 갖춤","작업 흐름을 일정한 방향으로 배치함","불결 작업과 청결 작업이 교차하도록 함"],a:2,e:"교차오염 예방을 위해 작업 흐름을 원료입고→전처리→조리→배식 순으로 일정한 방향으로 배치해야 한다.",r:85,c:"hygiene"},
{q:"식품의 부패방지와 관계가 있는 처리로만 나열된 것은?",o:["방사선 조사, 조미료 첨가, 농축","실온 보관, 설탕 첨가, 훈연","수분 첨가, 식염 첨가, 외관 검사","냉동법, 보존료 첨가, 자외선 살균"],a:3,e:"식품 부패 방지와 관련된 처리는 냉동법, 보존료 첨가, 자외선 살균이다.",r:85,c:"hygiene"},
{q:"탄저, 브루셀라증과 같이 사람과 가축의 양쪽에 이환되는 전염병은?",o:["법정전염병","경구전염병","인수공통전염병","급성전염병"],a:2,e:"탄저, 브루셀라증처럼 사람과 가축 모두에 감염되는 전염병을 인수공통전염병이라 한다.",r:85,c:"hygiene"},
{q:"세균이 분비한 독소에 의해 감염을 일으키는 것은?",o:["감염형 세균성 식중독","독소형 세균성 식중독","화학성 식중독","진균독 식중독"],a:1,e:"독소형 세균성 식중독은 세균이 분비한 독소에 의해 발생한다. 포도상구균, 보툴리누스균이 대표적이다.",r:85,c:"hygiene"},
{q:"다음 중 아미노산이 분해되어 암모니아가 생성되는 반응은?",o:["탈아미노 반응","혐기성 반응","아민형성 반응","탈탄산 반응"],a:0,e:"탈아미노 반응은 아미노산에서 아미노기(-NH₂)가 제거되어 암모니아가 생성되는 반응이다.",r:85,c:"nutrition"},
{q:"경구전염병에 대한 설명 중 잘못된 것은?",o:["2차 감염이 일어난다.","미량의 균량으로도 감염을 일으킨다.","장티푸스는 세균에 의하여 발생한다.","이질, 콜레라는 바이러스에 의하여 발생한다."],a:3,e:"이질, 콜레라는 환자나 보균자에 의한 접촉, 혹은 간접적인 대변→경구 전파이다. 매우 적은 양인 103개 이하에서도 감염을 일으킨다. 배변 후 손톱 밑이나 손을 깨끗이 씻지 않기 때문이다. 화장실의 손잡이나 타월을 통하여서도 발생한다. 물을 통한 감염은 가끔 대규모 집단발생을 일으키며 음식물 오염에 의한 감염도 일어난다.",r:99,c:"hygiene"},
{q:"과자, 비스킷, 카스텔라 등을 부풀게 하기 위한 팽창제로 사용되는 식품첨가물이 아닌 것은?",o:["탄산수소나트륨","탄산암모늄","중조","안식향산"],a:3,e:"보존료와 팽창제의 차이점은 보존료는 식품의 변질을 방지하기 위해 첨가하는것이고, 팽창제는 식품을 제조하는데 필요한 첨가물이며, 안식향산이란 식품 보존료이다 제과",r:99,c:"ingredients"},
{q:"보툴리누스 식중독에서 나타날 수 있는 주요 증상 및 증후가 아닌 것은?",o:["구토 및 설사","호흡곤란","출혈","사망"],a:2,e:"보툴리누스균 증상은 구토및설사,호흡곤란,사망,시력저하,동공확대,신경마비가 일어난다",r:99,c:"hygiene"}]},
{title:"2010년 4회",desc:undefined,questions:[{q:"다음 설명 중 맛과 향이 떨어지는 원인이 아닌 것은?",o:["설탕을 넣지 않는 제품은 맛과 향이 제대로 나지 않는다.","저장 중 산패된 유지, 오래된 계란으로 인한 냄새를 흡수한 재료는 품질이 떨어진다.","탈향의 원인이 되는 불결한 팬의 사용과 탄화된 물질이 제품에 붙으면 맛과 외양을 악화시킨다.","굽기 상태가 부적절하면 생재료 맛이나 탄 맛이 남는다."],a:0,e:"설탕을 넣지 않으면 맛과 향이 부족한 것은 사실이지만, 이는 맛과 향이 '떨어지는 원인'이 아니라 재료 특성에 해당한다. 나머지 보기들은 모두 품질 저하의 직접적 원인이다.",r:90,c:"ingredients"},
{q:"반죽형으로 제조되는 케이크 제품은?",o:["파운드 케이크","시퐁케이크","레몬 시크론 케이크","스파이스 케이크"],a:0,e:"*반죽형 : 레이어 케이크류, 파운드 케이크류, 머핀 케이크, 과일 케이크, 마들렌, 바움쿠엔 등 *거품형 : 스펀지 케이크, 롤 케이크, 카스테라, 오믈렛, 엔젤 푸드 케이크 등",r:99,c:"manufacturing"},
{q:"핑거 쿠키 성형시 가장 적정한 길이(cm)는?",o:["3","5","9","12"],a:1,e:"핑거 쿠키(레이디 핑거) 성형 시 가장 적정한 길이는 약 5cm이다. 이 크기가 굽기 균형과 식감 면에서 표준적으로 권장된다.",r:82,c:"manufacturing"},
{q:"다음 유지 중 성질이 다른 것은?",o:["버터","마가린","샐러드유","쇼트닝"],a:2,e:"버터, 마가린, 쇼트닝, 라드는 고체 상탱의 지방으로 소트닝성, 가소성, 크리밍성과 같은 특징을 갖는다. 샐러드유는 샐러드 드레싱을 만드는 데 쓰이는 식물성 기름으로 정제과정을 거친 식용유이다. 제과",r:99,c:"ingredients"},
{q:"비중이 높은 제품의 특징이 아닌 것은?",o:["기공이 조밀하다.","부피가 작다.","껍질색이 진하다.","제품이 단단하다."],a:2,e:"비중이 높은 경우: 기공이 작고 조밀하여 무겁고 부피가 작음 비중이 낮은 경우: 기공이 열려 조직이 거칠고 제품의 부피가 큼",r:99,c:"manufacturing"},
{q:"거품을 올린 흰자에 뜨거운 시럽을 첨가하면서 고속으로 믹싱 하여 만드는 아이싱은?",o:["마시멜로 아이싱","콤비네이션 아이싱","초콜릿 아이싱","로얄 아이싱"],a:0,e:"마시멜로 아이싱은 거품 올린 흰자에 뜨거운 시럽(114~118℃)을 넣으면서 고속 믹싱하여 만든다. 이탈리안 머랭 방식과 유사한 제조법이다.",r:93,c:"manufacturing"},
{q:"퐁당 아이싱이 끈적거리거나 포장지에 붙는 경향을 감소시키는 방법으로 옳지 않은 것은?",o:["아이싱을 다소 덥게(40℃)하여 사용한다.","아이싱에 최대의 액체를 사용한다.","굳은 것은 설탕시럽을 첨가하거나 데워서 사용한다.","젤라틴, 한천 등과 같은 안정제를 적절하게 사용한다."],a:1,e:"아이싱에 최소의 액체를 사용한다",r:99,c:"ingredients"},
{q:"쿠키에 팽창제를 사용하는 주된 목적은?",o:["제품의 부피를 감소시키기 위해","딱딱한 제품을 만들기 위해","퍼짐과 크기를 조절을 위해","설탕입자의 조절을 위해"],a:2,e:"쿠키에 팽창제를 사용하는 주된 목적은 퍼짐(spread)과 크기를 조절하기 위해서이다. 팽창제가 가스를 발생시켜 반죽의 팽창과 퍼짐 정도를 제어한다.",r:90,c:"ingredients"},
{q:"케이크 팬용적 410cm³에 100g 의 스펀지케이크 반죽을 넣어 좋은 결과를 얻었다면, 팬용적 1230 cm³에 넣어야 할 스펀지케이크의 반죽무게(g)는?",o:["123","200","300","410"],a:2,e:"팬용적과 반죽량은 비례한다.\n1230 ÷ 410 = 3\n100g × 3 = 300g",r:82,c:"manufacturing"},
{q:"도넛의 튀김온도로 가장 적당한 온도 범위는?",o:["105℃ 내외","145℃ 내외","185℃ 내외","250℃ 내외"],a:2,e:"도넛 튀김의 적정 온도는 185℃(365°F) 내외이다. 너무 낮으면 기름 흡수가 많고, 너무 높으면 겉은 타고 속은 익지 않는다.",r:93,c:"manufacturing"},
{q:"일반적인 과자반죽의 결과 온도로 가장 알맞은 것은?",o:["10 ~ 13℃","22~ 24 ℃","26 ~ 28℃","32 ~ 34 ℃"],a:1,e:"과자반죽 결과온도는 22~24°C",r:99,c:"manufacturing"},
{q:"베이킹파우더를 많이 사용한 제품의 결과와 거리가 먼 것은?",o:["밀도가 크고 부피가 작다.","속결이 거칠다.","오븐스프링이 커서 찌그러들기 쉽다.","속 색이 어둡다."],a:0,e:"베이킹파우더를 많이 사용하면 밀도는 낮아지고 부피는 커진다.",r:99,c:"manufacturing"},
{q:"푸딩에 대한 설명 중 맞는 것은?",o:["우유와 설탕은 120℃ 로 데운 후 계란과 소금을 넣어 혼합한다.","우유와 소금의 혼합 비율은 100:10이다.","계란의 열변성에 의한 농후화 작용을 이용한 제품이다.","육류, 과일, 야채, 빵을 섞어 만들지는 않는다."],a:2,e:"푸딩은 계란의 열변성(열응고)에 의한 농후화 작용을 이용하여 만드는 제품이다. 계란 단백질이 가열에 의해 응고되면서 부드러운 질감을 형성한다.",r:93,c:"ingredients"},
{q:"주방 설계에 있어 주의할 점이 아닌 것은?",o:["가스를 사용하는 장소에는 환기시설을 갖춘다.","주방 내의 여유 공간을 확보한다.","종업원의 출입구와 손님용 출입구는 별도로하여 재료의 반입은 종업원 출입구로 한다.","주방의 환기는 소형의 것을 여러 개 설치하는 것보다 대형의 환기장치 1개를 설치하는 것이 좋다."],a:3,e:"대형 1개보다 소형 여러개가 좋다",r:99,c:"management"},
{q:"과일 케이크를 구울 때 증기를 분사하는 목적과 거리가 먼 것은?",o:["향의 손실을 막는다.","껍질을 두껍게 만든다.","표피의 캐러멜화 반응을 연장한다.","수분의 손실을 막는다."],a:1,e:"<물분사> 굽기 중에 껍질이 너무 빨리 형성되는 것을 막기 위해 물을 분사한다",r:99,c:"nutrition"},
{q:"발효 손실의 원인이 아닌 것은?",o:["수분이 증발하여","탄수화물이 탄산가스로 전환되어","탄수화물이 알코올로 전환되어","재료 계량의 오차로 인해"],a:3,e:"발효 손실은 수분 증발, 탄수화물의 탄산가스 전환, 알코올 전환 등으로 발생한다. 재료 계량의 오차는 발효와 무관한 인적 요인이다.",r:93,c:"nutrition"},
{q:"오븐스프링(oven spring)이 일어나는 원인이 아닌 것은?",o:["가스압","용해 탄산가스","전분호화","알코올 기화"],a:2,e:"오븐스프링: 반죽온도가 49도에 도달하면 처음 크기의 약 1/3정도 팽창하고 60도가 되면 오븐스프링은 멈추고 전분이 호화되고 이스트가 사멸",r:99,c:"manufacturing"},
{q:"원가관리 개념에서 식품을 저장하고자 할 때 저장온도로 부적합한 것은?",o:["상온식품은 15~20℃에서 저장한다.","보냉식품은 10~15℃에서 저장한다.","냉장식품은 5℃ 전후에서 저장한다.","냉동식품은 -40℃이하로 저장한다."],a:3,e:"냉동식품의 적정 저장온도는 -18℃ 이하이다. -40℃ 이하는 급속냉동 온도로, 저장온도로는 과도하며 에너지 낭비이다.",r:85,c:"hygiene"},
{q:"다음 중 파이롤러를 사용하기에 부적합한 제품은?",o:["스위트롤","데니시 페이스트리","크로와상","브리오슈"],a:3,e:"브리오슈는 버터와 달걀이 많이 들어가는 부드러운 빵으로, 파이롤러가 아닌 손 성형이 적합하다. 나머지는 밀어 펴는 공정이 필요한 제품이다.",r:93,c:"manufacturing"},
{q:"냉동반죽의 사용 재료에 대한 설명 중 틀린 것은?",o:["유화제는 냉동반죽의 가스 보유력을 높이는 역할을 한다.","물은 일반 제품보다 3~5% 줄인다.","일반 제품보다 산화제 사용량을 증가시킨다.","밀가루는 중력분을 10% 정도 혼합한다."],a:3,e:"냉동반죽을 할 때는 반죽의 가스 보유력을 증가시키기 위해 단백질 함량이 11.7~13.5%로 비교적 높은 밀가루를 사용한다. 제과",r:99,c:"ingredients"},
{q:"팬닝시 주의할 사항으로 적합하지 않은 것은?",o:["팬에 적정량의 팬 오일을 바른다.","틀이나 철판의 온도를 25℃로 맞춘다.","반죽의 이음매가 틀의 바닥에 놓이도록 팬닝한다.","반죽의 무게와 상태를 정하여 비용적에 맞추어 적당한 반죽량을 넣는다."],a:1,e:"틀이나 철판 온도를 32도로 맞춘다",r:99,c:"manufacturing"},
{q:"제빵과정에서 2차 발효가 덜 된 경우에 나타나는 현상은?",o:["기공이 거칠다.","부피가 작아진다.","브레이크와 슈레이드가 부족하다.","빵 속 색깔이 회색같이 어둡다."],a:1,e:"2차 발효가 부족하면 가스 생성이 불충분하여 부피가 작아진다. 기공이 거친 것은 오히려 과발효의 특징이다.",r:85,c:"manufacturing"},
{q:"여름철에 빵의 부패 원인균의 곰팡이 및 세균을 방지하기 위한 방법으로 부적당한 것은?",o:["작업자 및 기계, 기구를 청결히 하고 공장내부의 공기를 순환시킨다.","이스트 첨가량을 늘리고 발효온도를 약간 낮게 유지하면서 충분히 굽는다.","초산, 젖산 및 사워 등을 첨가하여 반죽은 ph를 낮게 유지한다.","보존료인 소르빈산을 반죽에 첨가한다."],a:3,e:"보존료인 소르빈산은 치즈, 식육가공품, 어육가공품 등 그 사용식품과 사용량이 제한되어 있는 것으로 반죽에 첨가할 수 없다. 참고로 식품첨가물공전상 제과.제빵에 사용할 수 있는 보존료는 프로피온산, 프로피온산나트륨, 프로피온산칼슘(빵 및 케이크류), 이초산나트륨(빵류)이 있다. 제과",r:99,c:"hygiene"},
{q:"다음 중 소프트 롤에 속하지 않는 것은?",o:["디너 롤","프렌치 롤","브리오슈","치즈 롤"],a:1,e:"프런치 롤은 직접 구워 딱딱한 껍질의 빵을 의미한다.딱딱하고 매끈한 겉모양과 섬세하고 윤이 난는 껍질, 기공이 많은 내부조직이 특징이다. 제과",r:99,c:"manufacturing"},
{q:"스펀지 반죽법에서 스펀지 반죽의 재료가 아닌 것은?",o:["설탕","물","이스트","밀가루"],a:0,e:"스펀지 반죽의 사용재료는 밀가루, 물, 이스트, 이스트푸드이며, 밀가루의 사용범위는 55~100%이다. 제과",r:99,c:"ingredients"},
{q:"500g 의 식빵을 2개 만들려고 한다. 총 배합율은 180%이고 발효 손실은 1% , 굽기손실은 12%라고 가정할 때 사용할 밀가루 무게는 약 얼마인가?",o:["319g","638g","568g","284g"],a:1,e:"완제품 무게 = 500g × 2 = 1000g. 굽기 손실 역산: 1000 ÷ (1-0.12) ≈ 1136.4g. 발효 손실 역산: 1136.4 ÷ (1-0.01) ≈ 1147.9g. 총 배합률 180%에서 밀가루 비율은 100/180이므로, 밀가루 = 1147.9 × (100/180) ≈ 637.7g ≈ 638g이다.",r:98,c:"manufacturing"},
{q:"빵의 노화를 지연시키는 방법 중 잘못된 것은?",o:["-18℃에서 밀봉 보관한다.","2~ 10℃에서 보관한다.","당류를 첨가한다.","방습 포장지로 포장한다."],a:1,e:"0~10도에서 노화가 가장빠르게 일어난다",r:99,c:"manufacturing"},
{q:"빵제품의 제조공정에 대한 설명으로 올바르지 않은 것은?",o:["반죽은 무게 또는 부피에 의하여 분할한다.","둥글리기에서 과다한 덧가루를 사용하면 제품에 줄무늬가 생성된다.","중간발효시간은 보통 10~20분이며, 27~29℃에서 실시한다.","성형은 반죽을 일정한 형태로 만드는 1단계공정으로 이루어져 있다."],a:3,e:"성형의 좁은 의미의 성형공정은 \"밀기→말기→봉하기\" 로 3단계이며 넓은 의미의 성형공정은 \"분할→둥글리기→중간발효→정형→패닝\" 으로 5단계임므로 1단계 공정이 틀린 것",r:99,c:"manufacturing"},
{q:"식빵반죽을 혼합할 때 반죽의 온도 조절에 가장 크게 영향을 미치는 원료는?",o:["밀가루","설탕","물","이스트"],a:2,e:"반죽온도란 반죽이 완성된 직후에 나타나는 온도를 말하며, 온도조절이 가장 쉬운 물을 사용하여 반죽온도를 조절한다. 제과",r:99,c:"ingredients"},
{q:"빵을 구워낸 직후의 수분함량과 냉각 후 포장 직전의 수분함량으로 가장 적합한 것은?",o:["35%,27%","45%,38%","60%,52%","68%,60%"],a:1,e:"갓 구워낸 빵 수분함량:껍질 12%/ 빵속 45% 냉각 후 빵 수분함량: 껍질 27%/ 빵속 38%",r:99,c:"manufacturing"},
{q:"다음 중 제빵용 효모에 함유되어 있지 않은 효소는?",o:["프로테아제","말타아제","사카리아제","인버타아제"],a:2,e:"제빵용 효모에는 말타아제(맥아당 분해), 인버타아제(자당 분해), 찌마아제(단당류 발효) 등이 함유되어 있다. 사카리아제는 효모 내에 독립적으로 존재하지 않으며, 이 명칭의 효소는 효모에 함유되어 있지 않다.",r:93,c:"nutrition"},
{q:"우유에 함유되어 있는 당으로 제빵용 효모에 의하여 발효되지 않는 것은?",o:["포도당","유당","설탕","과당"],a:1,e:"제빵용 효모에는 유당을 분해하는 효소인 락토아제가 없다.",r:99,c:"ingredients"},
{q:"다음 중 ph가 중성인 것은?",o:["식초","수산화나트륨용액","중조","증류수"],a:3,e:"수산화나트륨과 중조는 염기성, 식초는 산성이다. 순수한 물 즉, 증류수는 pH7로 중성이다. 제과",r:99,c:"nutrition"},
{q:"검류에 대한 설명으로 틀린 것은?",o:["유화제, 안정제, 점착제 등으로 사용된다.","낮은 온도에서도 높은 점성을 나타낸다.","무기질과 단백질로 구성되어 있다.","친수성 물질이다."],a:2,e:"무기질과 단백질이 아닌 탄수화물로 이루어져 있습니다",r:99,c:"nutrition"},
{q:"계란 중에서 껍질을 제외한 고형질은 약 몇 %인가?",o:["15%","25%","35%","45%"],a:1,e:"수분 75% 고형질 25%",r:99,c:"ingredients"},
{q:"패리노그래프에 대한 설명으로 틀린 것은?",o:["혼합하는 동안 일어나는 반죽의 물리적 성질을 파동곡선 기록기로 기록하여 해석한다.","흡수율, 믹싱 내구성, 믹싱 시간 등을 판단할 수 있다.","곡선이 500 B.U 에 도달하는 시간 등으로 밀가루의 특성을 알 수 있다.","반죽의 신장도를 cm 단위로 측정한다."],a:3,e:"BU (Brabender Units) 단위",r:99,c:"manufacturing"},
{q:"식용유지의 산화방지제로 항산화제를 사용하고 있는데 항산화제는 직접 산화를 방지하는 물질과 항산화 작용을 보조하는 물질 또는 앞의 두 작용을 가진 물질로 구분하는 데 항산화 작용을 보조하는 물질은?",o:["비타민 C","BHA","비타민 A","BHT"],a:0,e:"비타민 C는 수용성으로 항산화 작용을 보조한다. 제과",r:99,c:"nutrition"},
{q:"밀알에서 내배유가 차지하는 구성비와 가장 근접한 것은?",o:["14%","36%","65%","83%"],a:3,e:"밀알에서 내배유는 약 83~85%를 차지한다. 껍질(밀기울)은 약 14%, 배아는 약 2~3%이다.",r:82,v:0,c:"manufacturing"},
{q:"유지의 산화방지에 주로 사용되는 방법은?",o:["수분첨가","비타민 E 첨가","단백질 제거","가열 후 냉각"],a:1,e:"비타민 E(토코페롤)는 천연 항산화제로 유지의 산화를 방지한다. 수분 첨가, 단백질 제거, 가열 후 냉각은 산화방지 효과가 없다.",r:93,c:"nutrition"},
{q:"비터 초콜릿(Bitter chocolate) 32% 중에는 코코아가 약 얼마 정도 함유 되어 있는가?",o:["8%","16%","20%","24%"],a:2,e:"초콜릿 구성성분 코코아 : 5/8(62.5%) 카카오버터 : 3/8(37.5%) 32*0.625=20",r:99,c:"ingredients"},
{q:"다음에서 이스트의 영양원이 되는 물질은?",o:["인산칼슘","소금","황산암모늄","브롬산칼슘"],a:2,e:"염화암모늄, 황산암모늄, 인산암모늄 등의 질소공급원이다.",r:99,c:"nutrition"},
{q:"다음 중 동물성 단백질은?",o:["덱스트린","아밀로오스","글루텐","젤라틴"],a:3,e:"젤라틴은 동물의 가죽, 뼈, 힘줄 등에서 추출한 동물성 단백질이다. 덱스트린은 전분 분해물, 아밀로오스는 전분 성분, 글루텐은 식물성 단백질이다.",r:90,c:"ingredients"},
{q:"제빵에서의 수분 분포에 관한 설명으로 틀린 것은?",o:["물이 반죽에 균일하게 분산되는 시간은 보통 10 분 정도이다.","1차 발효와 2차 발효를 거치는 동안 반죽은 다소 건조하게 된다.","발효를 거치는 동안 전분의 가수분해에 의해서 반죽 내 수분량이 변화한다.","소금은 글루텐을 단단하게 하여 글루텐 흡수량의 약 8%를 감소시킨다."],a:1,e:"1차·2차 발효를 거치는 동안 반죽 내부의 발효 활동으로 수분이 재분배되지만, 반죽이 건조해지지는 않는다. 발효 중 CO₂와 알코올이 생성되면서 오히려 수분 함량은 비교적 일정하게 유지된다.",r:95,c:"ingredients"},
{q:"다음 중 감미도가 가장 높은 것은?",o:["포도당","유당","과당","맥아당"],a:2,e:"과당>설탕>포도당>맥아당>유당",r:99,c:"ingredients"},
{q:"다음 중 패리노그래프로 알 수 없는 것은?",o:["반죽의 흡수율","반죽의 점탄성","반죽의 안정도","반죽의 신장저항력"],a:3,e:"4- 익스텐소 그래프 . 반죽의 신장성 및 신앚에 대한 저항을 측정",r:99,c:"ingredients"},
{q:"지방의 기능이 아닌 것은?",o:["지용성 비타민의 흡수를 돕는다.","외부의 충격으로부터 장기를 보호한다.","높은 열량을 제공한다.","변의 크기를 증대시켜 장관 내 체류시간을 단축시킨다."],a:3,e:"지방의 주요 기능은 지용성 비타민 흡수, 장기 보호, 높은 열량 제공이다. 변의 크기 증대 및 장관 체류시간 단축은 식이섬유의 기능이다.",r:85,c:"nutrition"},
{q:"밀가루가 75% 의 탄수화물, 10% 의 단백질, 1% 의 지방을 함유하고 있다면 100g 의 밀가루를 섭취하였을 때 얻을 수 있는 열량(kcal)은?",o:["386","349","317","307"],a:1,e:"탄수화물의 양 = 100(밀가루) × 75%(=0.75) = 75g 단백질의 양 = 100 × 10%(=0.1) = 10g 지방의 양 = 100 × 1%(=0.01) = 1g 총 열량 = (100 × (0.75+0.1) × 4) + (100 × 0.01 × 9) = 349 제과",r:99,c:"nutrition"},
{q:"올리고당류의 특징으로 가장 거리가 먼 것은?",o:["청량감이 있다.","감미도가 설탕의 20~30% 낮춘다.","설탕에 비해 항충치성이 있다.","장내 비피더스균의 증식을 억제한다."],a:3,e:"장내 비피더스균의 증식을 활성화한다.",r:99,c:"ingredients"},
{q:"당질의 대사과정에 필요한 비타민으로서 쌀을 주식으로 하는 우리나라 사람에게 더욱 중요한 것은?",o:["비타민 A","비타민 B1","비타민 B12","비타민 D"],a:1,e:"탄수화물 대사에서 조효소이다",r:99,c:"nutrition"},
{q:"필수 아미노산이 아닌 것은?",o:["라이신","메티오닌","페닐알라닌","아라키돈산"],a:3,e:"α-아미노산. 알라닌은 일반적으로 피루브산의 환원적 아미노화 반응에 의해 생성된다. 아미노 전이 반응은 가역적이며, 피루브산이 널리 분포하므로, 알라닌은 쉽게 형성되며, 따라서 해당작용이나, 당합성작용, 그리고 시트르산 회로와 같은 대사과정에 밀접하게 관여되어있으며, 따라서 비필수 아미노산이다.",r:99,c:"nutrition"},
{q:"대장균에 대한 설명으로 틀린 것은?",o:["유당을 분해한다.","그램(gram)양성이다.","호기성 또는 통성 혐기성이다.","무아포 간균이다."],a:1,e:"대장균은 그램(gram)음성균으로서 아포를 형섣하지 않으며 호기성 또는 통성 혐기성인 간균을 총칭한다. 제과",r:99,c:"hygiene"},
{q:"화학적 식중독에 대한 설명으로 잘못된 것은?",o:["유해색소의 경우 급성독성은 문제되나 소량을 연속적으로 섭취할 경우 만성독성의 문제는 없다.","인공감미료 중 싸이클라메이트는 발암성이 문제되어 사용이 금지되어 있다.","유해성 보존료인 포르말린은 식품에 첨가할 수 없으며 플라스틱 용기로부터 식품 중에 용출되는 것도 규제하고 있다.","유해성 표백제인 롱가릿 사용시 포르말린이 오래도록 식품에 잔류할 가능성이 있으므로 위험하다."],a:0,e:"유해색소는 급성독성뿐 아니라 소량을 장기간 섭취할 경우 만성독성도 문제가 된다. 만성독성의 문제가 없다는 설명은 틀렸다.",r:90,c:"hygiene"},
{q:"빵이나 케이크에 허용되어 있는 보존료는?",o:["프로피온산나트륨","안식향산","데히드로초산","소르비톨"],a:0,e:"보존료: 빵류 - 프로피온산칼슘 과자류 - 프로피온산나트륨 제과",r:99,c:"nutrition"},
{q:"식품의 부패 요인과 가장 거리가 먼 것은?",o:["수분","온도","가열","ph"],a:2,e:"가열은 미생물을 사멸시켜 오히려 부패를 방지하는 방법이다. 수분, 온도, pH는 부패에 직접 영향을 미치는 요인이다.",r:90,c:"hygiene"},
{q:"제품의 유통기간 연장을 위해서 포장에 이용되는 불활성 가스는?",o:["산소","질소","수소","염소"],a:1,e:"질소(N₂)는 화학적으로 안정한 불활성 가스로, 식품 포장에 사용하여 산화를 방지하고 유통기간을 연장한다.",r:82,c:"manufacturing"},
{q:"세균성식중독과 비교하여 경구전염병의 특징이 아닌 것은?",o:["적은 양의 균으로도 질병을 일으킬 수 있다.","2차 감염이 된다.","잠복기가 비교적 짧다.","감염 후 면역형성이 잘된다."],a:2,e:"세균성식중동은 잠복기가 짧고 면역이 안되며 2차감염이 없고 다량의 균으로 발생한다. 사전예방이 가능하다 겸구전염병은 잠복기가 길고 면역이 되며 2차감염이 있고 미량의 균으로도 발생한다. 제과",r:99,c:"hygiene"},
{q:"살모넬라균으로 인한 식중독의 잠복기와 증상으로 옳은 것은?",o:["오염식품 섭취 10~24 시간 후 발열(38~40℃)이 나타나며 1주일 이내 회복이 된다.","오염식품 섭취 10~20 시간 후 오한과 혈액이 섞인 설사가 나타나며 이질로 의심되기도 한다.","오염식품 섭취 10~30 시간 후 점액성 대변을 배설하고 신경증상을 보여 곧 사망한다.","오염식품 섭취 8~20시간 후 복통이 있고 홀씨 A ,F형의 독소에 의한 발병이 특징이다"],a:0,e:"살모넬라균 식중독은 오염식품 섭취 후 10~24시간의 잠복기를 거쳐 발열(38~40℃), 복통, 설사 등의 증상이 나타나며 보통 1주일 이내 회복된다.",r:93,c:"hygiene"},
{q:"장염 비브리오(Vibrio)균에 의한 식중독 유형은?",o:["독소형 식중독","감염형 식중독","곰팡이독 식중독","화학물질 식중독"],a:1,e:"장염 비브리오균은 세균이 직접 장관에 감염되어 발병하는 감염형 식중독을 일으킨다. 독소형과 달리 균 자체의 감염이 원인이다.",r:93,c:"hygiene"},
{q:"인수공통전염병 중 오염된 우유나 유제품을 통해 사람에게 감염되는 것은?",o:["탄저","결핵","야토병","구제역"],a:1,e:"인수공통전염병 중 오염된 우유나 유제품을 통해 사람에게 감염되는 것은 결핵 결핵은 병에 걸린 소의 젖의 유제품에 의해 사람에게 경구감염됨",r:99,c:"hygiene"},
{q:"다음 중 HACCP 적용의 7가지 원칙에 해당하지 않는 것은?",o:["위해요소분석","HACCP 팀 구성","한계기준설정","기록유지 및 문서관리"],a:1,e:"HACCP은 준비단계의 5절차와 적용단계의 7단계가 있으며 HACCP 팀 구성은 준비단계의 5절차 중에서 첫번째이다. 제과",r:99,c:"hygiene"}]},
{title:"2010년 5회",desc:undefined,questions:[{q:"젤리 롤 케이크는 어떤 배합을 기본으로 하여 만드는 제품인가?",o:["스펀지 케이크 배합","파운드 케이크 배합","하드롤 배합","슈크림 배합"],a:0,e:"스펀지 케이크 배합에 수분을 높혀 말은 제품이 젤리 롤 케이크 제과",r:99,c:"manufacturing"},
{q:"다음 중 호화(Gelatinization)에 대한 설명 중 맞는 것은?",o:["호화는 주로 단백질과 관련된 현상이다.","호화되면 소화되기 쉽고 맛이 좋아진다.","호화는 냉장온도에서 잘 일어난다.","유화제를 사용하면 호화를 지연시킬 수 있다."],a:1,e:"호화(Gelatinization)는 전분에 물과 열을 가하면 전분 입자가 팽윤되어 점성이 증가하는 현상이다. 호화되면 소화가 쉽고 맛이 좋아진다.",r:93,c:"ingredients"},
{q:"도넛을 튀길 때의 설명으로 틀린 것은?",o:["튀김기름의 깊이는 12cm 정도가 알맞다.","자주 뒤집어 타지 않도록 한다.","튀김온도는 185℃ 정도로 맞춘다.","튀김기름에 스테아린을 소량 첨가한다."],a:1,e:"도넛을 여러번 뒤집게 되면 기름을 많이 먹고 그 만큼 좋지는 않기 때문에 적당히 익었을 때 한 번만 뒤집고 다른 면이 익으면 그걸 건져내야 한다. 제과",r:99,c:"manufacturing"},
{q:"다음 중 버터크림 당액 제조 시 설탕에 대한 물 사용량으로 알맞은 것은?",o:["25%","80%","100%","125%"],a:0,e:"버터크림 설탕 100 , 물 25~30",r:99,c:"ingredients"},
{q:"다음 중 비교적 스크래핑을 가장 많이 해야 하는 제법은?",o:["공립법","별립법","설탕/물법","크림법"],a:3,e:"반죽형 반죽의 크림법의 장점은 부피가 큰 제품을 만들기엔 적당하지만 단점은 스크래핑(바닥주변을 긁어주는 동작)을 자주 해줘야해요 참고로 믹싱볼에 믹싱하다보면 주변에 묻어나기 마련이죠 머랭만들때도 같은현상이 일어나는데 머랭은 거품형반죽 반죽법인데다가 스크래핑하면 할수록 거품이 죽어가 제품이 안나옵니다",r:99,c:"manufacturing"},
{q:"굳어진 설탕 아이싱 크림을 여리게 하는 방법으로 부적합한 것은?",o:["설탕 시럽을 더 넣는다.","중탕으로 가열한다.","전분이나 밀가루를 넣는다.","소량의 물을 넣고 중탕으로 가온한다."],a:2,e:"굳어진 설탕 아이싱에 전분이나 밀가루를 넣으면 오히려 더 되직해진다. 설탕 시럽, 중탕 가열, 소량의 물 추가가 올바른 방법이다.",r:93,c:"ingredients"},
{q:"찜류 또는 찜만쥬 등에 사용하는 팽창제의 특성이 아닌 것은?",o:["팽창력이 강하다.","제품의 색을 희게 한다.","암모니아 냄새가 날 수 있다.","중조와 산제를 이용한 팽창제이다."],a:3,e:"찜류, 찜만쥬 등에 사용하는 팽창제(이스트 파우더) 이스트 파우더는 염화암모늄, 탄산수소나트륨, 전분, 주석산칼륨등이 혼합되어 만들어짐.",r:99,c:"ingredients"},
{q:"반죽형 쿠키 중 수분을 가장 많이 함유하는 쿠키는?",o:["쇼트 브래드 쿠키","드롭쿠키","스냅 쿠키","스펀지 쿠키"],a:1,e:"드롭쿠키~반죽형 쿠키중 최대 수분함량. 소프트쿠키. 짜는쿠키 제과",r:99,c:"manufacturing"},
{q:"퍼프 페이스트리(Puff pastry)의 접기 공정에 관한 설명으로 옳은 것은?",o:["접는 모서리는 직각이 되어야 한다.","접기 수와 밀어 펴놓은 결의 수는 동일하다.","접히는 부위가 동일하게 포개어지지 않아도 된다.","구워낸 제품이 한쪽으로 터지는 경우 접기와는 무관하다."],a:0,e:"퍼프 페이스트리 접기 공정에서 접는 모서리는 반드시 직각이 되어야 한다. 모서리가 직각이 되어야 균일한 층이 형성되고 구웠을 때 고르게 부풀어 오른다.",r:93,c:"manufacturing"},
{q:"언더 베이킹(Under baking)에 대한 설명으로 틀린 것은?",o:["높은 온도에서 짧은 시간 굽는 것이다.","중앙부분이 익지 않는 경우가 많다","제품이 건조되어 바삭바삭하다.","수분이 빠지지 않아 껍질이 쭈글쭈글하다."],a:2,e:"언더 베이킹은 덜 구워진 상태이므로 수분이 충분히 증발하지 못해 제품이 촉촉하거나 끈적한 상태가 된다. '건조되어 바삭바삭하다'는 충분히 구워진 경우에 해당하므로 언더 베이킹의 설명으로 틀린 것이다.",r:99,c:"hygiene"},
{q:"다음 중 포장 시에 일반적인 빵, 과자 제품의 냉각 온도로 가장 적합한 것은?",o:["22℃","32℃","38℃","47℃"],a:2,e:"빵·과자 제품은 포장 시 약 38℃까지 냉각하는 것이 적합하다. 이 온도에서 제품 내부 수분이 안정되고, 포장 후 응결로 인한 곰팡이 발생을 최소화할 수 있다.",r:90,c:"manufacturing"},
{q:"반죽의 비중과 관계가 가장 적은 것은?",o:["제품의 부피","제품의 기공","제품의 조직","제품의 점도"],a:3,e:"반죽의 비중은 제품의 부피, 기공, 조직에 직접적인 영향을 미친다. 점도는 반죽의 물리적 성질로 비중과는 직접적 관련이 적다.",r:93,c:"manufacturing"},
{q:"반죽형 케이크의 결점과 원인의 연결이 잘못된 것은?",o:["고율배합 케이크의 부피가 작음 - 설탕과 액체재료의 사용량이 적었다.","굽는 동안 부풀어 올랐다가 가라앉음 - 설탕과 팽창제 사용량이 많았다.","케이크 껍질에 반점이 생김 - 입자가 굵고 크기가 서로 다른 설탕을 사용했다.","케이크가 단단하고 질김 - 고율배합 케이크에 맞지 않는 밀가루를 사용했다."],a:0,e:"고율배합 케이크 부피가 큼 제과",r:99,c:"manufacturing"},
{q:"용적 2050㎤인 팬에 스펀지 케이크 반죽을 400g으로 분할할 때 좋은 제품이 되었다면 용적 2870㎤인 팬에 적당한 분할 무게는?",o:["440g","480g","560g","600g"],a:2,e:"용적 비례로 계산한다.\n2870 ÷ 2050 = 1.4\n400g × 1.4 = 560g",r:85,c:"manufacturing"},
{q:"고율배합에 대한 설명으로 틀린 것은?",o:["화학팽창제를 적게 쓴다.","굽는 온도를 낮춘다.","반죽 시 공기 혼입이 많다.","비중이 높다."],a:3,e:"고율배합은 설탕과 액체가 많이 들어가기 때문에 공기가 많이 들어간다. 이렇게 들어간 공기가 오븐에서 팽창하기 때문에 화학 팽창제를 많이 사용할 필요가 없다.",r:99,c:"manufacturing"},
{q:"패닝방법 중 풀만 브래드와 같이 뚜껑을 덮어 굽는 제품에 반죽을 길게 늘려 U자, N자, M자형으로 넣는 방법은?",o:["직접 패닝","트위스트 패닝","스파이럴 패닝","교차 패닝"],a:3,e:"풀만 브래드처럼 뚜껑을 덮어 굽는 제품은 반죽을 U자, N자, M자형으로 넣는 교차 패닝 방법을 사용한다.",r:82,v:0,c:"manufacturing"},
{q:"제빵 생산 시 물 온도를 구할 때 필요한 인자와 가장 거리가 먼 것은?",o:["쇼트닝 온도","실내 온도","마찰 계수","밀가루 온도"],a:0,e:"제빵 스트레이법에서 사용할 물온도를 구하는 공식 밀가루 온도, 마찰계수, 실내온도 (그외 나머지 쇼트닝 온도 등)",r:99,c:"ingredients"},
{q:"냉동반죽법의 재료 준비에 대한 사항 중 틀린 것은?",o:["저장온도는 -5℃가 적합하다.","노화방지제를 소량 사용한다.","반죽은 조금 되게 한다.","크로와상 등의 제품에 이용된다."],a:0,e:"냉동 저장온도는 -20도 이하 (-18 ~ -25도) 제과",r:99,c:"manufacturing"},
{q:"연속식 제빵법을 사용하는 장점과 가장 거리가 먼 것은?",o:["인력의 감소","발효향의 증가","공장 면적과 믹서 등 설비의 감소","발효 손실의 감소"],a:1,e:"연속식 제빵법의 장점 ①발효 손실 감소 ②설비 감소,설비공간,설비면적 감소 ③노동력을 1/3 감소",r:99,c:"manufacturing"},
{q:"주로 소매점에서 자주 사용하는 믹서로써 거품형 케이크 및 빵 반죽이 모두 가능한 믹서는?",o:["수직믹서(vertical mixer)","스파이럴 믹서 (spiral mixer)","수평 믹서 (horizontal mixer)","핀 믹서 (pin mixer)"],a:0,e:"수직믹서(vertical mixer)는 소매점에서 자주 사용하며, 거품형 케이크와 빵 반죽 모두 가능한 다용도 믹서이다.",r:93,c:"manufacturing"},
{q:"표준 식빵의 재료 사용 범위로 부적합한 것은?",o:["설탕 0~8%","생이스트 1.5~5%","소금 5~10%","유지 0~5%"],a:2,e:"소금은 일반적으로 2%정도 사용하게되며, 그 이상 사용하면 삼투압현상으로 인해 이스트의 활동을 방해한다. 제과",r:99,c:"ingredients"},
{q:"1인당 생산가치는 생산가치를 무엇으로 나누어 계산하는가?",o:["인원수","시간","임금","원 재료비"],a:0,e:"1인당 생산가치 = 생산가치 / 인원",r:99,c:"management"},
{q:"포장에 대한 설명 중 틀린 것은?",o:["포장은 제품의 노화를 지연시킨다.","뜨거울 때 포장하여 냉각손실을 줄인다.","미생물에 오염되지 않은 환경에서 포장한다.","온도, 충격 등에 대한 품질변화에 주의한다."],a:1,e:"뜨거울 때 포장하면 수증기가 포장 내부에 응결되어 곰팡이 발생의 원인이 된다. 반드시 35~40℃로 냉각 후 포장해야 한다.",r:90,c:"manufacturing"},
{q:"굽기 손실이 가장 큰 제품은?",o:["식빵","바게트","단팥빵","버터롤"],a:1,e:"바게트는 저율배합(설탕·유지가 적음)에 길고 가는 형태로 표면적이 넓어 굽기 손실이 가장 크다.",r:82,c:"manufacturing"},
{q:"다음 중 빵의 노화속도가 가장 빠른 온도는?",o:["-18 ~ -1℃","0 ~ 10℃","20 ~30℃","35 ~ 45℃"],a:1,e:"냉장보관 온도가 노화가 가장 빠름",r:99,c:"manufacturing"},
{q:"이스트 푸드에 대한 설명으로 틀린 것은?",o:["발효를 조절한다.","밀가루 중량대비 1~5%를 사용한다.","이스트의 영양을 보급한다.","반죽 조절제로 사용한다."],a:1,e:"이스트 푸드의 사용량은 밀가루 중량대비 0.1~0.2%를 사용한다. 제과",r:99,c:"ingredients"},
{q:"다음의 빵 제품 중 일반적으로 반죽의 되기가 가장 된 것은?",o:["피자도우","잉글리쉬 머핀","단과자빵","팥앙금빵"],a:0,e:"피자도우는 수분 함량이 적어 반죽이 가장 되직하다(단단하다). 잉글리쉬 머핀이나 단과자빵은 상대적으로 수분이 많다.",r:93,c:"manufacturing"},
{q:"이스트 2%를 사용하여 4시간 발효시킨 경우 양질의 빵을 만들었다면 발효시간을 3시간으로 단축하자면 얼마 정도의 이스트를 사용해야 하는가?",o:["약1.5%","약2.0%","약2.7%","약3.0%"],a:2,e:"2%*4시간/3시간=2.7% 제과",r:99,c:"ingredients"},
{q:"2차 발효의 상대습도를 가장 낮게 하는 제품은?",o:["옥수수 식빵","데니시 페이스트리","우유 식빵","팥앙금빵"],a:1,e:"데니시 페이스트리는 75~80 제과",r:99,c:"manufacturing"},
{q:"데니시 페이스트리에서 롤인 유지함량 및 접기 횟수에 대한 내용 중 틀린 것은?",o:["롤인 유지함량이 증가할수록 제품 부피는 증가한다.","롤인 유지함량이 적어지면 같은 접기 횟수에서 제품의 부피가 감소한다.","같은 롤인 유지함량에서는 접기 횟수가 증가할수록 부피는 증가하다 최고점을 지나면 감소한다.","롤인 유지함량이 많은 것이 롤인 유지함량이 적은 것보다 접기 횟수가 증가함에 따라 부피가 증가하다가 최고점을 지나면 감소하는 현상이 현저하다."],a:3,e:"롤인 유지함량이 많을수록 층 간 분리가 쉬워 접기 횟수 증가에 따른 부피 변화가 오히려 완만해진다. 유지가 적은 경우에 접기 횟수 변화에 따른 부피 증감 현상이 더 현저하게 나타나므로 이 설명은 틀렸다.",r:90,c:"manufacturing"},
{q:"버터크림을 만들 때 흡수율이 가장 높은 유지는?",o:["라드","경화 라드","경화 식물성 쇼트닝","유화 쇼트닝"],a:3,e:"쇼트닝은 자기 무게의 100~400%를 흡수하여, 유화쇼트닝은 800%까지 흡수한다. 제과",r:99,c:"ingredients"},
{q:"제빵에서 밀가루, 이스트, 물과 함께 기본적인 필수재료는?",o:["분유","유지","소금","설탕"],a:2,e:"제빵의 4대 기본 필수재료는 밀가루, 이스트, 물, 소금이다. 소금은 발효 조절, 글루텐 강화, 풍미 부여 등 필수적인 역할을 한다.",r:90,c:"ingredients"},
{q:"향신료(spices)를 사용하는 목적 중 틀린 것은?",o:["향기를 부여하여 식욕을 증진시킨다.","육류나 생선의 냄새를 완화시킨다.","매운 맛과 향기로 혀, 코, 위장을 자극하여 식욕을 억제시킨다.","제품에 식욕을 불러일으키는 색을 부여한다."],a:2,e:"향신료는 식욕을 증진하게 하는 역할을 한다.",r:99,c:"ingredients"},
{q:"우유 단백질 중 함량이 가장 많은 것은?",o:["락토알부민","락토글로불린","글루테닌","카제인"],a:3,e:"우유 단백질 중 카제인이 약 80%로 가장 많다. 락토알부민과 락토글로불린은 유청 단백질이며 소량이다. 글루테닌은 밀 단백질이다.",r:90,c:"ingredients"},
{q:"알파 아밀라아제(a-amylase)에 대한 설명으로 틀린 것은?",o:["베타 아밀라이제(b-amylase)에 비하여 열 안정성이 크다.","당화효소라고도 한다.","전분의 내부 결함을 가수분해할 수 있어 내부 아밀라아제라고도 한다.","액화효소라고도 한다."],a:1,e:"2. 당화요소 : 베타 아밀라아제",r:99,c:"ingredients"},
{q:"다음 중 아밀로펙틴의 함량이 가장 많은 것은?",o:["옥수수 전분","찹쌀 전분","멥쌀 전분","감자 전분"],a:1,e:"아밀로펙틴 (% 생략) 밀 72 옥수수72 ~ 19 감자 77 ~ 79 - 쌀 70 ~80 - 찹쌀 100 찰옥수수 100",r:99,c:"ingredients"},
{q:"빵을 만들 때 설탕의 기능이 아닌 것은?",o:["이스트의 영양원","빵 껍질의 색","풍미 제공","기포성 부여"],a:3,e:"제빵에서의 설탕의 기능은: 1. 단맛을 낸다 2. 이스트의 먹이를 제공한다 3. 빵의 껍질 색을 개선한다 4. 수분 보유력을 가지고 있어 노화를 지연시키며, 보존 시간을 늘려준다 제과",r:99,c:"ingredients"},
{q:"밀가루 반죽을 끊어질 때까지 늘려서 반죽의 신장성을 알아보는 것은?",o:["아밀로그래프","패리노그래프","익스텐소그래프","믹소그래프"],a:2,e:"패리노그래프- 흡수율, 믹싱시간, 믹싱내구성 아밀로그래프- 밀가루 점도 익스텐소그래프- 신장성(탄력성)",r:99,c:"ingredients"},
{q:"어떤 케이크를 생산하는데 전란이 1000g필요하다. 껍질 포함 60g짜리 달걀은 몇 개 있어야 하는가?",o:["17개","19개","21개","23개"],a:1,e:"전란에서 껍질은 10%차지. 즉 껍질을 뺀 달걀의 무게는 54g 1000/54=18.???? → 19개",r:99,c:"manufacturing"},
{q:"기름 및 지방에 대한 설명 중 옳은 것은?",o:["모노글리세라이드는 글리세롤의 -OH 3개중 하나에만 지방산이 결합된 것이다.","기름의 가수분해는 온도와 별 상관이 없다.","기름의 비누화는 가성소다에 의해 낮은 온도에서 진행 속도가 빠르다","기름의 산패는 기름 자체의 이중결합과 무관하다"],a:0,e:"모노글리세라이드는 글리세롤의 -OH기 3개 중 1개에만 지방산이 결합된 것이다. 기름의 가수분해는 온도에 영향을 받으며, 산패는 이중결합과 관련이 있다.",r:93,c:"ingredients"},
{q:"다음 중 과당을 분해하여 CO₂가스와 알코올을 만드는 효소는?",o:["리파아제(Lipase)","프로테아제(protease)","찌마아제(zymase)","말타아제(maltase)"],a:2,e:"찌마아제(zymase)는 이스트 내의 효소로, 포도당이나 과당을 분해하여 CO₂와 알코올을 생성한다.",r:85,v:0,c:"ingredients"},
{q:"자유수를 올바르게 설명한 것은?",o:["당류와 같은 용질에 작용하지 않는다.","0℃ 이하에서도 얼지 않는다.","정상적인 물보다 그 밀도가 크다.","염류, 당류 등을 녹이고 용매로서 작용한다."],a:3,e:"자유수는 염류·당류 등을 녹이고 용매로서 작용한다. 결합수는 용질과 강하게 결합하여 얼지 않고 용매로 작용하지 못한다.",r:93,c:"ingredients"},
{q:"초콜릿을 템퍼링한 효과에 대한 설명 중 틀린 것은?",o:["입안에서의 용해성이 나쁘다.","광택이 좋고 내부 조직이 조밀하다.","팻브룸(fat bloom)이 일어나지 않는다.","안정한 결정이 많고 결정형이 일정하다."],a:0,e:"템퍼링한 초콜릿은 입안에서의 용해성이 '좋다'. 안정한 결정(V형)이 형성되어 광택이 좋고, 팻브룸이 방지되며, 용해성이 뛰어나다.",r:93,c:"ingredients"},
{q:"글루텐의 탄력성을 부여하는 것은?",o:["글루테닌","글리아딘","글로불린","알부민"],a:0,e:"글리아딘 : 반죽이 신장성을 갖게 하고 빵의 부피와 관련 클루테닌 : 반죽이 탄력성을 갖게하고 빵의 반죽형성 시간과 관련 글리아딘과 글루테닌이 물과 만나 믹싱에 의해 결합하여 글루텐을 만든다",r:99,c:"ingredients"},
{q:"다음 중 밀가루에 대한 설명으로 틀린 것은?",o:["밀가루는 회분 함량에 따라 강력분, 중력분, 박력분으로 구분한다.","전체 밀알에 대해 껍질은 13~14%, 배아는 2~3%, 내배유는 83~85%정도 차지한다.","제분 직후의 밀가루는 제빵 적성이 좋지 않다.","숙성한 밀가루는 글루텐의 질이 개선되고 흡수성을 좋게 한다."],a:0,e:"밀가루는 단백질 함량에 따라 강력분,중력분,박력분으로 구분하고 회분 함량에 따라 1등급 ,2등급 3등급 등으로 분류 한다",r:99,c:"ingredients"},
{q:"지방의 연소와 합성이 이루어지는 장기는?",o:["췌장","간","위장","소장"],a:1,e:"지방의 연소(분해)와 합성이 주로 이루어지는 장기는 간이다. 간은 지방 대사의 중심 기관이다.",r:82,c:"nutrition"},
{q:"어떤 분유 100g의 질소함량이 4g이라면 분유 100g은 약 몇 g의 단백질을 함유하고 있는가? (단, 단백질 중 질소함량은 16%)",o:["5g","15g","25g","35g"],a:2,e:"16% = 0.16 x * 0.16 = 4g x = 25",r:99,c:"ingredients"},
{q:"다음 중 심혈관계 질환의 위험인자로 가장 거리가 먼 것은?",o:["고혈압과 중성지질 증가","골다공증과 빈혈","운동부족과 고지혈증","당뇨병과 지단백 증가"],a:1,e:"심혈관계질환은 심장과 주요동맥에 이상질환을 말하는데 골다공증은 뼈에 칼슘이나 비타민D가 부족하면 생기는 질병이고 빈혈은 적혈구가 부족하여 생기는 질환이다 제과",r:99,c:"nutrition"},
{q:"인체의 수분 소요량에 영향을 주는 요인과 가장 거리가 먼 것은?",o:["기온","신장의 기능","활동력","염분의 섭취량"],a:1,e:"인체 수분 소요량에 영향을 주는 요인은 기온, 활동력, 염분 섭취량 등이다. 신장의 기능은 수분 배설을 조절하지만, 수분 소요량(필요량)을 결정하는 요인과는 가장 거리가 멀다.",r:93,c:"nutrition"},
{q:"다음 중 이당류로만 묶인 것은?",o:["맥아당, 유당, 설탕","포도당, 과당, 맥아당","설탕, 갈락토오스, 유당","유당, 포도당, 설탕"],a:0,e:"단당류 : 포도당, 과당, 갈락토오스 이당류 : 자당(설탕), 맥아당(엿당), 유당(젖당) 다당류 : 덱스트린, 전분",r:99,c:"ingredients"},
{q:"감자의 싹이 튼 부분에 들어 있는 독소는?",o:["엔테로톡신","삭카린 나트륨","솔라닌","아미그달린"],a:2,e:"감자의 싹이 튼 부분에는 솔라닌(solanine)이라는 독소가 있다. 섭취 시 구토, 설사, 복통 등을 유발한다.",r:90,c:"hygiene"},
{q:"조리빵류의 부재료로 활용되는 육가공품의 부패로 인해 암모니아와 염기성 물질이 형성될 때 pH변화는?",o:["변화가 없다.","산성이 된다.","중성이 된다.","알칼리성이 된다."],a:3,e:"염기성이란 알칼리성과 같은 말이다. 제과",r:99,c:"hygiene"},
{q:"음식물을 섭취하고 약 2시간 후에 심한 설사 및 구토를 하게 되었다. 다음 중 그 원인으로 가장 유력한 독소는?",o:["테트로도톡신","엔테로톡신","아플라톡신","에르고톡신"],a:1,e:"음식물 섭취하고 2시간후에 심한 설사 및 구토는 포도상구균의 증상이며 포도상구균의 생성독소는 엔테로톡신이다 제과",r:99,c:"hygiene"},
{q:"인체 유래 병원체에 의한 전염병의 발생과 전파를 예방하기 위한 올바른 개인위생관리로 가장 적합한 것은?",o:["식품 작업 중 화장실 사용 시 위생복을 착용한다.","설사증이 있을 때에는 약을 복용한 후 식품을 취급한다.","식품 취급 시 장신구는 순금제품을 착용한다.","정기적으로 건강검진을 받는다."],a:3,e:"인체 유래 병원체 감염 예방을 위해 정기적으로 건강검진을 받는 것이 가장 적합한 개인위생관리이다. 설사 시 식품 취급 금지, 장신구 착용 금지가 원칙이다.",r:93,c:"hygiene"},
{q:"경구전염병의 예방대책 중 전염경로에 대한 대책으로 올바르지 않은 것은?",o:["우물이나 상수도의 관리에 주의한다.","하수도 시설을 완비하고, 수세식 화장실을 설치한다.","식기, 용기, 행주 등은 철저히 소독한다.","환기를 자주 시켜 실내공기의 청결을 유지한다."],a:3,e:"경구전염병의 전염경로 대책은 수도·하수도 관리, 식기 소독 등이다. 환기를 통한 실내공기 청결은 비말감염(호흡기) 대책이지 경구전염병 대책이 아니다.",r:90,c:"hygiene"},
{q:"다음 중 세균과 관계없는 식중독은?",o:["장염비브리오(vibrio)식중독","웰치(welchii)식중독","진균독(mycotoxin)식중독","살모넬라(salmonella)식중독"],a:2,e:"진균독 = 곰팡이 독",r:99,c:"hygiene"},
{q:"유지산패도를 측정하는 방법이 아닌 것은?",o:["과산화물가(peroxide value, POV)","휘발성염기질소(volatile basic nitrogen value, VBN)","카르보닐가(carbonyl value, CV)","관능검사"],a:1,e:"휘발성 염기질소는 보통 단백질이 미생물 등의 작용으로 분해되어 생긴다. 제과",r:99,c:"ingredients"},
{q:"빵의 제조과정에서 빵 반죽을 분할기에서 분할할 때나 구울 때 달라붙지 않게 하고, 모양을 그대로 유지하기 위하여 사용되는 첨가물을 이형제라고 한다. 다음 중 이형제는?",o:["유동파라핀","명반","탄산수소나트륨","염화암모늄"],a:0,e:"명반, 탄산수소나트륨, 염화나트륨은 팽창제에 속한다.",r:99,c:"ingredients"},
{q:"식품첨가물공정상 표준온도는?",o:["20℃","25℃","30℃","35℃"],a:0,e:"식품첨가물공전상 표준온도는 20℃이다. 이는 일반적인 실험 및 측정의 기준 온도로 지정되어 있다.",r:75,c:"ingredients"},
{q:"부패에 영향을 미치는 요인에 대한 설명으로 맞는 것은?",o:["중온균의 발육적온은 46 ~ 60℃","효모의 생육최적 pH는 10 이상","결합수의 함량이 많을수록 부패가 촉진","식품성분의 조직상태 및 식품의 저장환경"],a:3,e:"부패에 영향을 미치는 요인은 식품성분의 조직상태 및 식품의 저장환경이다. 중온균 발육적온은 25~40℃이고, 효모 최적 pH는 4~5이다.",r:93,c:"hygiene"}]},
{title:"2011년 1회",desc:undefined,questions:[{q:"파운드케이크를 구울 때 윗면이 자연적으로 터지는 경우가 아닌 것은?",o:["굽기 시작 전에 증기를 분무할 때","설탕 입자가 용해되지 않고 남아 있을 때","반죽 내 수분이 불충분할 때","오븐 온도가 높아 껍질 형성이 너무 빠를 때"],a:0,e:"수분이 부족할 때 껍질 형성이 너무 빨라 터집니다. 설탕이 녹지 않고 있으면 수분이 부족해지고 오븐 온도가 높으면 수분손실이 커집니다. 굽기 전에 증기를 분무하면 수분이 충분하니 터지지 않습니다. 제과",r:99,c:"manufacturing"},
{q:"도넛 글레이즈의 사용온도로 가장 적합한 것은?",o:["49℃","39℃","29℃","19℃"],a:0,e:"적당한 온도 45~50",r:99,c:"manufacturing"},
{q:"제빵 공장에서 5인이 8시간 동안 옥수수 식빵 500개, 바게트 빵 550개를 만들었다. 개당 제품의 노무비는 얼마인가? (단, 시간당 노무비는 4000원이다.)",o:["132원","142원","152원","162원"],a:2,e:"사람 수 * 시간 * 시간당 노무비 / 제품의 수 5*8*4000/1050= 152원",r:99,c:"manufacturing"},
{q:"엔젤 푸드 케이크 제조 시 팬에 사용하는 이형제로 가장 적절한 것은?",o:["쇼트닝","밀가루","라드","물"],a:3,e:"엔젤 푸드 케이크와 시퐁케이크는 이형제로 물을 주로 사용하고 있다.",r:99,c:"ingredients"},
{q:"케이크의 부피가 작아지는 원인에 해당하는 것은?",o:["강력분을 사용한 경우","액체 재료가 적은 경우","크림성이 좋은 유지를 사용한 경우","달걀 양이 많은 반죽의 경우"],a:0,e:"케이크류는 박력분처럼 단백질 함량이 낮은 밀가루가 적합합니다. 강력분은 글루텐 형성이 강해 반죽이 조밀하고 질겨지며, 팽창가스를 제대로 가두지 못해 케이크 부피가 작아지는 원인이 됩니다.",r:99,c:"ingredients"},
{q:"쇼트브레드 쿠키의 성형 시 주의할 점이 아닌 것은?",o:["글루텐 형성방지를 위해 가볍게 뭉쳐서 밀어 편다.","반죽의 휴지를 위해 성형 전에 냉동고에 동결시킨다.","반죽을 일정한 두께로 밀어 펴서 원형 또는 주름커터로 찍어낸다.","달걀노른자를 바르고 조금 지난 뒤 포크로 무늬를 그려 낸다."],a:1,e:"냉동이 아니라 냉장이다",r:99,c:"manufacturing"},
{q:"반죽형 케이크를 구웠더니 너무 가볍고 부서지는 현상이 나타났다. 그 원인이 아닌 것은?",o:["반죽에 밀가루 양이 많았다.","반죽의 크림화가 지나쳤다.","팽창제 사용량이 많았다.","쇼트닝 사용량이 많았다."],a:0,e:"반죽형 케이크를 구웠더니 너무 가볍고 부서지는 현상: 크림화, 유지의 기능",r:99,c:"ingredients"},
{q:"생크림에 대한 설명으로 옳지 않는 것은?",o:["생크림은 우유로 제조한다.","유사 생크림은 팜, 코코넛유 등, 식물성 기름을 사용하여 만든다.","생크림은 냉장온도에서 보관하여야 한다.","생크림의 유지 함량은 82% 정도이다."],a:3,e:"유지함량은 35~40",r:99,c:"ingredients"},
{q:"찜을 이용한 제품에 사용되는 팽창제의 특성은?",o:["지속성","속효성","지효성","이중팽창"],a:1,e:"속효성 : 가스발생 속도가 빠른 성질 속효성 팽차제는 산작용제로 주석산을 함유한 것으로 실온에서 반응을 시작해 100'c에서 가스를 발생하는 것으로 핫케익, 찜케이크와 같은 반죽의 형성 단계에서 팽화하기 시작하여 가열 시간이 짧고 가열 온도가 낮은 제품으로 사용한다.",r:99,c:"ingredients"},
{q:"커스터드 크림의 재료에 속하지 않은 것은?",o:["우유","달걀","설탕","생크림"],a:3,e:"커스터드 크림은 우유, 노른자, 설탕, 옥수수전분, 가염버터, 바닐라향, 브랜디 또는 럼주가 들어간다.",r:99,c:"ingredients"},
{q:"도넛 튀김기에 붓는 기름의 평균 깊이로 가장 적당한 것은?",o:["5 ~ 8 cm","9 ~ 12 cm","12 ~ 15 cm","16 ~ 19 cm"],a:2,e:"튀김 기에 붓는 적정 기름의 깊이: 12~15cm 튀김 기름의 양이 적으며 도넛을 뒤집기 어렵고, 과열되기 쉽다.",r:99,c:"manufacturing"},
{q:"다음 쿠키 중에서 상대적으로 수분이 적어서 밀어 펴는 형태로 만드는 제품은?",o:["드롭 쿠키","스냅 쿠키","스펀지 쿠키","머랭 쿠키"],a:1,e:"* 반죽형반죽쿠키 : 1. 드롭쿠키 - 짤주머니 사용, 2. 스냅쿠키 - 성형기 사용 * 거품형반죽쿠키 : 3. 스펀지쿠키, 4. 머랭쿠키 - 짤주머니 사용 1. 드롭쿠키 : 계란사용량이 많아 반죽형쿠키중에서만 수분이 가장 많음, 짤주머니 사용 2. 스냅쿠키 : 계란사용량이 적어 밀어펴서 성형기로 찍어 제조.",r:99,c:"manufacturing"},
{q:"다음 중 반죽의 얼음사용량 계산공식으로 옳은 것은?",o:["공식1","공식2","공식3","공식4"],a:0,e:"반죽의 얼음 사용량은 공식1로 계산한다. 얼음의 융해 잠열(80kcal/kg)을 적용하여 목표 반죽 온도를 맞추기 위한 얼음량을 산출하는 방식이다.",r:82,c:"manufacturing"},
{q:"비중 컵의 물을 담은 무게가 300g이고 반죽을 담은 무게가 260g일 대 비중은? (단, 비중 컵의 무게는 50g이다)",o:["0.64","0.74","0.84","1.04"],a:2,e:"비중 = (반죽 무게) ÷ (물 무게)\n반죽 무게 = 260 - 50 = 210g\n물 무게 = 300 - 50 = 250g\n비중 = 210 ÷ 250 = 0.84",r:93,c:"manufacturing"},
{q:"블렌딩법에 대한 설명으로 옳은 것은?",o:["건조 재료와 계란, 물을 가볍게 믹싱 하다가 유지를 넣어 반죽하는 방법이다","설탕입자가 고와 스크래핑이 필요 없고 대규모 생산 회사에서 이용하는 방법이다","부피를 우선으로 하는 제품에 이용하는 방법이다.","유지와 밀가루를 먼저 믹싱 하는 방법이며, 제품의 유연성이 좋다."],a:3,e:"블렌딩법 : 유지+가루 / 유연감 크림법 : 유지+설탕 / 부피감 설탕물법 : 설탕과 물 2:1비율, 균일한 색상, 대량생산에 이용 1단계법 : 단단계법이라고도 함, 모든재료를 한번에 넣어 제조",r:99,c:"manufacturing"},
{q:"일반적으로 작은 규모의 제과점에서 사용하는 믹서는?",o:["수직형 믹서","수평형 믹서","초고속 믹서","커터 믹서"],a:0,e:"1. 수직형 믹서 주로 소규모 제과점에서 케이크 반죽 또는 빵 반죽을 만들 경우에 사용한다",r:99,c:"manufacturing"},
{q:"갓 구워낸 빵을 식혀 상온으로 낮추는 냉각에 관한 설명으로 틀린 것은?",o:["빵 속의 온도를 35 ~ 40℃로 낮추는 것이다","곰팡이 및 기타 균의 피해를 막는다.","절단, 포장을 용이하게 한다.","수분함량을 25%로 낮추는 것이다."],a:3,e:"수분함량을 38% 로 낮추는 것이다",r:99,c:"hygiene"},
{q:"식빵 제조 시 과도한 부피의 제품이 되는 원인은?",o:["소금량의 부족","오븐 온도가 높음","배합수의 부족","미숙성 소맥분"],a:0,e:"빵속에 소금을 많이 첨가하면 삼투압 작용에 위해 부피가 작아지는 현상이 일어나며, 소금량이 부족하면 부피가 커지는 원인이 된다.",r:99,c:"manufacturing"},
{q:"원가의 구성에서 직접원가에 해당되지 않는 것은?",o:["직접재료비","직접노무비","직접경비","직접판매비"],a:3,e:"원가는 직접비( 재료비, 노무비, 경비)에 제조간접비를 가산한 제조원가,그리고 그것에 판매, 일반관리비를 가산한 총원가로 구성된다",r:99,c:"management"},
{q:"냉동빵에서 반죽의 온도를 낮추는 가장 주된 이유는?",o:["수분 사용량이 많아서","밀가루의 단백질 함량이 낮아서","이스트 활동을 억제하기 위해서","이스트 사용량이 감소해서"],a:2,e:"3. 냉동빵은 제조시 반죽의 온도를 낮추어 이스트의 활동을 억제시켜둔 후 반죽이 필요할 때 사용한다.",r:99,c:"ingredients"},
{q:"성형 후 공정으로 가스팽창을 최대로 만드는 단계로 가장 적합한 것은?",o:["1차 발효","중간 발효","펀치","2차 발효"],a:3,e:"성형 후 2차 발효는 가스팽창을 최대로 만드는 단계이다. 반죽이 최종 부피의 80~90%까지 팽창하도록 한다.",r:90,c:"manufacturing"},
{q:"스펀지 발효에서 생기는 결함을 없애기 위하여 만들어진 제조법으로 ADMI법이라고 불리는 제빵법은?",o:["액종법(liquid ferments)","비상 반죽법(emergency dough method)","노타임 반죽법(no timedough method)","스펀지/도법(sponge/dough method)"],a:0,e:"액종법의 종류는 완충재로 탈지분유를 사용하는(ADMI 미국분유협회가 개발한 액종법)과 완충제로 탄산칼슘을 배합해서 넣는 부루액종법이 있다.",r:99,c:"manufacturing"},
{q:"500g짜리 완제품 식빵 500개를 주문 받았다. 총 배합률은 190%이고, 발효 손실은 2%, 굽기 손실은 10%일 때 20kg 짜리 밀가루는 몇 포대 필요한가?",o:["6포대","7포대","8포대","9포대"],a:2,e:"손실율을 제외한 반죽에 필요한 밀가루양 500g x 500 개 : 190% = X g :100% X= 131578 g 손실율을 포함한 반죽의 밀가루양 전체손실율= 발효손실+굽기손실 = 12% 131.578kg : (1-0.12) = x kg : 1.00 x=131.578/0.88=148.952kg 따라서, 필요한 20kg 밀가루 포대는 8포대",r:99,c:"manufacturing"},
{q:"빵의 관능적 평가법에서 외부적 특성을 평가하는 항목으로 틀린 것은?",o:["대칭성","껍질색상","껍질특성","맛"],a:3,e:"외부평가 : 부피,껍질색,외형의균형,굽기의 균일함,껍집의성질,터짐과 찢어짐 내부평가 : 기공,조직,속색깔,맛,입안의 감촉,풍미 제과",r:99,c:"manufacturing"},
{q:"제빵용 팬기름에 대한 설명으로 틀린 것은?",o:["종류에 상관없이 발연점이 낮아야 한다.","무색, 무미, 무취이어야 한다.","정제 라드. 식물유, 혼합유도 사용된다.","과다하게 칠하면 밑 껍질이 두껍고 어둡게 된다."],a:0,e:"팬기름은 발연점이 높아야 한다",r:99,c:"ingredients"},
{q:"다음 중 정상적인 스펀지 반죽을 발효시키는 동안 스펀지 내부의 온도 상승은 어느 정도가 가장 바람직한가?",o:["1 ~ 2℃","4 ~ 6℃","8 ~ 10℃","12 ~ 14℃"],a:1,e:"스펀지 반죽 발효 중 내부 온도 상승은 약 4~6℃가 가장 바람직하다. 이 범위에서 효모가 안정적으로 활동하며, 과열 없이 정상적인 발효가 진행된다.",r:93,c:"manufacturing"},
{q:"불란서 빵 제조 시 스팀 주입이 많을 경우 생기는 현상은?",o:["껍질이 바삭바삭하다.","껍질이 벌어진다.","질긴 껍질이 된다.","균열이 생긴다."],a:2,e:"불란서 빵(바게트) 제조 시 스팀이 과다하면 껍질 표면의 수분이 많아져 질긴 껍질이 된다. 적정 스팀은 바삭한 껍질을 만든다.",r:93,c:"manufacturing"},
{q:"제빵용 밀가루의 적정 손상전분의 함량은?",o:["1.5 ~3%","4.5 ~ 8%","11.5 ~ 14%","15.5 ~ 17%"],a:1,e:"제빵용 밀가루의 적정 손상전분 함량은 4.5~8%이다. 이 범위에서 손상전분이 효소에 의해 분해되어 이스트의 영양원이 되고, 흡수율을 높여 반죽 특성과 빵 품질을 최적화한다.",r:93,c:"ingredients"},
{q:"스펀지법(sponge &dough method)에서 가장 적합한 스펀지 반죽의 온도는?",o:["10 ~ 20℃","22 ~ 26℃","34 ~ 38℃","42 ~ 46℃"],a:1,e:"스펀지법(sponge & dough method)에서 스펀지 반죽의 적합한 온도는 22~26℃이다. 이 온도에서 이스트가 적절히 활성화되어 발효가 이루어진다. 34~38℃는 발효실 온도이며, 스펀지 반죽 온도로는 너무 높다.",r:83,v:0,c:"manufacturing"},
{q:"빵반죽의 손분할이나 기계분할은 가능한 몇 분 이내로 완료하는 것이 좋은가?",o:["15 ~ 20분","25 ~ 30분","35 ~ 40분","45 ~ 50분"],a:0,e:"빵반죽의 분할은 가능한 15~20분 이내에 완료하는 것이 좋다. 시간이 길어지면 먼저 분할한 반죽과 나중에 분할한 반죽의 발효 상태 차이가 커져 제품 균일성이 떨어진다.",r:93,c:"manufacturing"},
{q:"튀김기름에 스테아린(stearin)을 첨가하는 유에 대한 설명으로 틀린 것은?",o:["기름의 침출을 막아 도넛 설탕이 젖는 것을 방지한다.","유지의 융점을 높인다.","도넛에 설탕이 붙는 점착성을 높인다.","경화제(hardener)로 튀김기름의 3 ~ 6%를 사용한다."],a:2,e:"스테아린은 튀김기름에 첨가하여 유지의 융점을 높이고, 기름 침출을 막아 도넛 표면의 설탕이 녹는 것을 방지한다. 그러나 '설탕이 붙는 점착성을 높인다'는 것은 스테아린의 기능이 아니므로 틀린 설명이다.",r:93,v:0,c:"ingredients"},
{q:"밀가루 25kg에서 젖은 글루텐 6g을 얻었다면 이 밀가루는 다음 어디에 속하는가?",o:["박력분","중력분","강력분","제빵용 밀가루"],a:0,e:"밀가루 25kg에서 젖은 글루텐 6g이면 글루텐 함량이 매우 낮아 박력분에 해당한다. 강력분은 젖은 글루텐이 35% 이상이다.",r:90,v:0,c:"ingredients"},
{q:"아이싱 크림에 많이 쓰이는 퐁당(fondant)을 만들 때 끓이는 온도로 가장 적합한 것은?",o:["78 ~ 80℃","98 ~ 100℃","114 ~ 116℃","130 ~ 132℃"],a:2,e:"*퐁당* 설탕시럽(114~118도)을 재결정화 40도 전후 식혀서 사용",r:99,c:"ingredients"},
{q:"제빵에서 설탕의 역할이 아닌 것은?",o:["이스트의 영양분이 됨","껍질색을 나게 함","향을 향상시킴","노화를 촉진시킴"],a:3,e:"설탕 첨가시 노화가 지연됩니다.",r:99,c:"ingredients"},
{q:"메이스(mace)와 같은 나무에서 생산되는 것으로 단맛의 향기가 있는 향신료는?",o:["넛메그","시나몬","클로브","오레가노"],a:0,e:"넛메그(nutmeg)와 메이스(mace)는 같은 나무(육두구)에서 생산된다. 넛메그는 종자, 메이스는 종자를 감싸는 가종피이다.",r:90,c:"ingredients"},
{q:"패리노그래프에 관한 설명 중 틀린 것은?",o:["흡수율 측정","믹싱시간 측정","믹싱내구성 측정","전분의 점도 측정"],a:3,e:"패리노그래프는 글루텐의 질과 흡수율, 믹싱시간과 내구성을 측정한다",r:99,c:"ingredients"},
{q:"유지를 고온으로 계속 가열하였을 때 다른 중 점차 낮아지는 것은?",o:["산가","점도","과산화물가","발연점"],a:3,e:"유지를 고온으로 계속 가열하면 발연점이 점차 낮아진다. 산가와 점도는 증가하고, 과산화물가는 초기에 증가했다가 분해되므로 변동이 있다.",r:90,v:0,c:"ingredients"},
{q:"제빵에 적정한 물의 경도는 120 ~ 180 ppm인데, 이는 다음 중 어느 분류에 속하는가?",o:["연수","아경수","일시적 경수","영구적 경수"],a:1,e:"연수:60미만 아연수:60이상-120미만 아경수:120이상-180미만 경수:180이상",r:99,c:"ingredients"},
{q:"달걀에 대한 설명 중 옳은 것은?",o:["노른자에 가장 많은 것은 단백질이다.","흰자는 대부분이 물이고 그 다음 많은 성분은 지방질이다.","껍질은 대부분 탄산칼슘으로 이루어져 있다.","흰자보다 노른자 중량이 더 크다."],a:2,e:"흰자 : 수분88%, 고형물(단백질) 12% 노른자 : 수분50%, 고형물(지방) 50% 구성 : 껍데기 10%, 흰자 60%, 노른자 30%",r:99,c:"nutrition"},
{q:"제빵에서 소금의 역할이 아닌 것은?",o:["글루텐을 강화시킨다.","유해균의 번식을 억제시킨다.","빵의 내상을 희게 한다.","맛을 조절한다."],a:2,e:"제빵에서의 소금의 역할에는 1.빵에 맛을 준다 2. 이스트의 발효를 억제해 발효속도를 늦춘다 3.글루텐을 강화시켜 반죽을 견고하게 한다 4. 당분해를 억제시켜 껍질색을 조절한다 5.삼투압에 의해 세균등의 잡균번식을 억제시킨다.",r:99,c:"ingredients"},
{q:"화학적 팽창에 대한 설명으로 잘못된 것은?",o:["효모보다 가스 생산이 느리다","가스를 생산하는 것은 탄산수소나트륨이다.","중량제로 전분이나 밀가루를 사용한다.","산의 종류에 따라 작용 속도가 달라진다."],a:0,e:"화학적 팽창은 효모보다 가스 생산이 '빠르다'. 화학팽창제는 열이나 수분에 즉시 반응하여 CO₂를 발생시키므로 효모 발효보다 빠르다.",r:93,c:"ingredients"},
{q:"아밀로그래프(Amylograph)에서 50℃에서의 점도(minimum viscosity)와 최종점도((final viscosity) 차이를 표시하는 것으로 노화도를 나타내는 것은?",o:["브레이크 다운(break down)","세트 백(Setback)","최소 점도(minimum viscosity)","최대 점도(maximum viscosity)"],a:1,e:"세트 백(Setback)은 아밀로그래프에서 50℃ 점도와 최종 점도의 차이를 나타내며, 노화도(전분의 재결정화 경향)를 표시한다.",r:93,c:"ingredients"},
{q:"지방의 산화를 가속시키는 요소가 아닌 것은?",o:["공기와의 접촉이 많다.","토코페롤을 첨가한다.","높은 온도로 여러 번 사용한다.","자외선에 노출시킨다."],a:1,e:"토코페롤은 항산화제이다",r:99,c:"nutrition"},
{q:"자당(sucrcse) 10%를 이성화해서 10.52%의 전화당(invert sugar)을 얻었다. 포도당(glucose)과 과당(fructose)의 비율은?",o:["포도당 7.0%과당 3.52%","포도당 5.26%과당 5.26%","포도당 3.52%과당 7.0%","포도당 2.63%과당 7.89%"],a:1,e:"포도당과 과당의 비율은 1:1이다.",r:99,c:"ingredients"},
{q:"빵에서 탈지분유의 역할이 아닌 것은?",o:["흡수율 감소","조직 개선","완충제 역활","껍질색 개선"],a:0,e:"탈지분유량을 1%증가할 경우 수분흡수율은 1.5~2% 증가한다.",r:99,c:"ingredients"},
{q:"식품의 열량(kcal) 계산공식으로 맞는 것은? (단, 각 영양소 양의 기준은 g 단위로 한다.)",o:["(탄수화물의 양＋단백질의 양)×4＋(지방의 양×9)","(탄수화물의 양＋지방의 양)×4＋(단백질의 양×9)","(지방의 양＋단백질의 양)×4＋(탄수화물의 양×9)","(탄수화물의 양＋지방의 양)×9＋(단백질의 양×4)"],a:0,e:"열량 = (탄수화물g + 단백질g) × 4 + 지방g × 9\n이 공식이 올바른 열량 계산법이다. 탄수화물과 단백질은 g당 4kcal, 지방은 g당 9kcal이다.",r:90,c:"nutrition"},
{q:"포화지방산과 불포화지방산에 대한 설명 중 옳은 것은?",o:["포화지방산은 이중결합을 함유하고 있다.","포화지방산은 할로겐이나 수소첨가에 따라 불포화될 수 있다.","코코넛 기름에는 불포화지방산이 더 높은 비율로 들어 있다.","식물성 유지에는 불포화지방산이 더 높은 비율로 들어 있다."],a:3,e:"- 포화지방산은 단일결합을 함유하고 있다 - 불포화지방산은 니겔을 촉매로 수소를 첨가시켜 지방의 불포화도를 감소시킨다. - 코코넛 기름에는 포화지방산 91.2%가 들어있고, 불포화지방산은 8.8%가 있다.",r:99,c:"nutrition"},
{q:"유용한 장내 세균의 발육을 왕성하게 하여 자에 좋은 영양을 미치는 이당류는?",o:["설탕(sucrose)","유당(lactose)","맥아당(maltose)","포도당(glucose)"],a:1,e:"유당(lactose)은 장내 유익균인 비피더스균의 발육을 촉진하여 장 건강에 좋은 영향을 미치는 이당류이다.",r:93,v:0,c:"ingredients"},
{q:"괴혈병을 예방하기 위해 어떤 영양소가 많은 식품을 섭위해야 하는가?",o:["비타민 A","비타민 C","비타민 D","비타민 B1"],a:1,e:"비타민A-야맹증 비타민D-골다공증 비타민B1-각기병",r:99,c:"nutrition"},
{q:"필수아미노산이 아닌 것은?",o:["트레오닌","이소루신","발린","알라닌"],a:3,e:"α-아미노산. 알라닌은 일반적으로 피루브산의 환원적 아미노화 반응에 의해 생성된다. 아미노 전이 반응은 가역적이며, 피루브산이 널리 분포하므로, 알라닌은 쉽게 형성되며, 따라서 해당작용이나, 당합성작용, 그리고 시트르산 회로와 같은 대사과정에 밀접하게 관여되어있으며, 따라서 비필수 아미노산이다.",r:99,c:"nutrition"},
{q:"다음 중 병원체가 바이러스(Virus)인 질병인?",o:["유행성 간염","결핵","발진티푸스","말라리아"],a:0,e:"바이러스 감염병: 유행성 간염, 소아마비, 감염성 설사증, 인플루엔자, 홍역, 일본뇌염 등 세균성 감염병: 결핵, 장티푸스, 파라티푸스, 세균성 이질, 콜레라, 디프테리아 등 리케치아성 감염병: 발진티푸스, 쯔쯔가무시병, Q열 등",r:99,c:"hygiene"},
{q:"살모넬라(Salmonella)균의 특징이 아닌 것은?",o:["그람(Gram)음성 간균이다.","발육 최적 pH는 7 ~ 8 온도는 37℃ 이다.","60℃에서 20분 정도의 가열로 사멸한다.","독소에 의한 식중독을 일으킨다."],a:3,e:"살모넬라 균은 세군성 식중독에서 감염형 식중독이다.",r:99,c:"hygiene"},
{q:"다음 중 부패로 볼 수 없는 것은?",o:["육류의 변질","달걀의 변질","어패류의 변질","열에 의한 식용유의 변질"],a:3,e:"지방의 산패로 볼 수 있다.",r:99,c:"hygiene"},
{q:"균체의 독소 중 뉴로톡신(neuroxin)을 생산하는 식중독균은?",o:["포도상구균","클로스트리디움 보툴리늄균","장염 비브리오균","병원성 대장균"],a:1,e:"클로스트리디움 보툴리늄균은 뉴로톡신(신경독소)을 생산하여 신경마비를 일으킨다. 치사율이 높은 독소형 식중독의 원인균이다.",r:93,c:"hygiene"},
{q:"인수공통 감염병으로만 짝지어진 것은?",o:["폴리오, 장티푸스","탄저, 리스테리아증","결핵, 유행성 간염","홍역, 브루셀라증"],a:1,e:"인수공통전염은 탄저, 브루셀라, 결핵, 리스테리아증 등이 있음 경구전염(바이러스) 폴리오, 유행성간염, 천열, 전염성 설사증 경구전염(세균) 장티푸스, 콜레라, 파라티푸스, 세균성이질, 디푸테리아",r:99,c:"hygiene"},
{q:"식품에 식염을 첨가함으로써 미생물 증식을 억제하는 효과와 관계가 없는 것은?",o:["탈수작용에 의한 식품 내 수분감소","산소의 용해도 감소","삼투압 증가","펩티드 결합의 분해"],a:3,e:"단백질-------->펩티드결합(=펩타이드결합):아미노산+아미노산 단백질의 분해효소인 프로테아제가 펩티드 결합을 분해한다.",r:99,c:"ingredients"},
{q:"빵의 제조과정에서 빵반죽을 분할기에서 분할할 때 달라붙지 않게 하는 첨가물은?",o:["호료(thickening agent)","피막제(coating agent)","용제(solvents)","이형제(release agent)"],a:3,e:"이형제(release agent)는 빵반죽이 팬이나 분할기에 달라붙지 않게 하는 첨가물이다. 유동파라핀 등이 대표적이다.",r:93,c:"ingredients"},
{q:"화학적 식중독을 유발하는 원인이 아닌 것은?",o:["복어독","불량한 포장용기","유해한 식품첨가물","농약에 오염된 식품"],a:0,e:"복어독은 동물성 식중독에 해당됩니다.",r:99,c:"hygiene"},
{q:"다음 중 음식물을 매개로 전파되지 않는 것은?",o:["이질","장티푸스","콜레라","광견병"],a:3,e:"광견병은 동물",r:99,c:"hygiene"},
{q:"우리나라에서 지정된 식품첨가물 중 버터류에 사용할 수 없는 것은?",o:["터셔리부틸히드로퀴논(tbhq)","식용색소 황색4호","부틸히드록시아니솔(BHA)","디부틸히드록시틀루엔(BHT)"],a:1,e:"식용색소 황색4호(타르색소)는 버터류에 사용이 금지되어 있다. BHA, BHT, TBHQ는 유지의 산화방지제로 사용 가능하다.",r:93,c:"ingredients"}]},
{title:"2011년 2회",desc:undefined,questions:[{q:"다음 제품 중 비중이 가장 낮은 것은?",o:["젤리 롤 케이크","버터 스펀지 케이크","파운드 케이크","옐로 레이어 케이크"],a:0,e:"계란의 거품성을이용한 팽창으로, 크기대비 중량이 적다.(비중이 낮다) 때문에 다소 기공이큼직하고 가벼운식감을 느낄수있음!",r:99,c:"manufacturing"},
{q:"퍼프페이스트리 굽기 후 결점과 원인으로 틀린 것은?",o:["수축: 밀어펴기 과다, 너무 높은 오븐온도","수포 생성: 단백질 함량이 높은 밀가루로 반죽","충전물 흘러 나옴: 충전물량 과다, 봉합 부적절","작은 부피: 수분이 없는 경화 쇼트닝을 충전용 유지로 사용"],a:1,e:"수포가 생성되는 것은 반죽 온도가 높을 때이다.",r:99,c:"manufacturing"},
{q:"흰자를 이용한 머랭 제조시 좋은 머랭을 얻기 위한 방법이 아닌 것은?",o:["사용 용기 내에 유지가 없어야 한다.","머랭의 온도를 따뜻하게 한다.","노른자를 첨가한다.","주석산 크림을 넣는다."],a:2,e:"머랭 만들때 믹싱볼에 노른자,이물질,물기가 있으면 머랭이 올라오지 않는다 제과",r:99,c:"ingredients"},
{q:"공장 설비시 배수관의 최소 내경으로 알맞은 것은?",o:["5cm","7cm","10cm","15cm"],a:2,e:"제조 공장 배수관의 내경은 최소 10cm로 함",r:99,c:"manufacturing"},
{q:"설탕 공예용 당액 제조시 고농도화된 당의 결정을 막아주는 재료는?",o:["중조","주석산","포도당","베이킹파우더"],a:1,e:"1. 중조(탄산수소나트륨) :빵, 과자 제조시 맛을 좋고 연하게 하여 소화가 잘되게 2. 타타르산 4. 화학적 팽창제",r:99,c:"ingredients"},
{q:"실내온도 25℃, 밀가루 온도 25℃, 설탕온도 25℃, 유지온도 20℃, 달걀온도 20℃, 수돗물온도 23℃, 마찰계수 21, 반죽 희망온도가 22℃라면 사용할 물의 온도는?",o:["-4℃","-1℃","0℃","8℃"],a:0,e:"제과에서 사용할 물 온도는 '반죽 희망온도 × 재료 수 - (실내온도 + 밀가루온도 + 설탕온도 + 유지온도 + 달걀온도 + 수돗물온도 + 마찰계수)'로 계산합니다. 재료 수는 7이므로 22 × 7 = 154이고, 나머지 합은 25 + 25 + 25 + 20 + 20 + 23 + 21 = 159입니다. 154 - 159 = -5가 되나, 실제 정답으로 채택된 -4℃는 수돗물 온도를 제외하고 6개 재료로 계산하는 방식(22 × 6 = 132, 합계 = 25 + 25 + 25 + 20 + 20 + 21 = 136, 132 - 136 = -4)에 의한 것입니다.",r:99,c:"manufacturing"},
{q:"스펀지 케이크 400ｇ짜리 완제품을 만들 때 굽기 손실이 20%라면 분할 반죽의 무게는?",o:["600ｇ","500ｇ","400ｇ","300ｇ"],a:1,e:"500g 의 20%는 100이기때문에 500-100 = 400g",r:99,c:"manufacturing"},
{q:"소프트 롤을 말 때 겉면이 터지는 경우 조치사항이 아닌 것은?",o:["팽창이 과도한 경우 팽창제 사용량을 감소시킨다.","설탕의 일부를 물엿으로 대치한다.","저온 처리하여 말기를 한다.","덱스트린의 점착성을 이용한다."],a:2,e:"수분이 부족해 겉면이 갈라지는데 저온에서 장시간 굽게되면 수분이 증발하여 수분이 부족해 겉면이 잘 갈라짐",r:99,c:"ingredients"},
{q:"다음 제품 중 냉과류에 속하는 제품은?",o:["무스케이크","젤리 롤 케이크","소프트 롤 케이크","양갱"],a:0,e:"냉과류 : 무스, 푸딩, 바바로와, 젤리, 블라망제 1. 무스케이크 - 냉과자류 2. 젤리롤케이크 - 양과자류(롤케이크) 3. 소프트롤케이크 - 양과자류(롤케이크) 4. 양갱 - 생과자류(화과자)",r:99,c:"ingredients"},
{q:"도넛을 튀길 때 사용하는 기름에 대한 설명으로 틀린 것은?",o:["기름이 적으면 뒤집기가 쉽다.","발연점이 높은 기름이 좋다.","기름이 너무 많으면 온도를 올리는 시간이 길어진다.","튀김 기름의 평균 깊이는 12~15cm 정도가 좋다."],a:0,e:"기름이 적으면 바닥면에 가까워 한쪽면만 먼저 많이 익음, 뒤집을때 걸리적거림",r:99,c:"ingredients"},
{q:"케이크 도넛의 껍질색을 진하게 내려고 할 때 설탕의 일부를 무엇으로 대치하여 사용하는가?",o:["물엿","포도당","유당","맥아당"],a:1,e:"포도당은 단당류로 캐러멜화 반응 온도를 낮추며 메일라드반응을 일으켜 껍질색을 진하게 낸다",r:99,c:"ingredients"},
{q:"퍼프 페이스트리 제조 시 다른 조건이 같을 때 충전용 유지에 대한 설명으로 틀린 것은?",o:["충전용 유지가 많을수록 결이 분명해진다.","충전용 유지가 많을수록 밀어 펴기가 쉬워진다.","충전용 유지가 많을수록 부피가 커진다.","충전용 유지는 가소성 범위가 넓은 파이용이 적당하다."],a:1,e:"충전용 유지가 많을수록 부드러워져 밀어펴기가 어려워짐",r:99,c:"manufacturing"},
{q:"시퐁 케이크 제조시 냉각 전에 팬에서 분리되는 결점이 나타났을 때의 원인과 거리가 먼 것은?",o:["굽기 시간이 짧다.","밀가루 양이 많다.","반죽에 수분이 많다.","오븐 온도가 낮다"],a:1,e:"밀가루 양이 많으면 반죽이 단단해져 팬에서 분리되는 것과는 거리가 멀다.",r:99,c:"manufacturing"},
{q:"아이싱에 사용하는 안정제 중 적정한 농도의 설탕과 산이 있어야 쉽게 굳는 것은?",o:["한천","펙틴","젤라틴","로커스트 빈 검"],a:1,e:"펙틴은 식물체의 세포간질을 구성하는 주요 성분으로 당과 산의 존재하에서 겔을 형성하는 능력이 있다 펙틴은 겔 형성제로 사용되며 혼합주스에서 안정제로도 사용된다 제과",r:99,c:"ingredients"},
{q:"튀김에 기름을 반복 사용할 경우 일어나는 주요한 변화 중 틀린 것은?",o:["중합의 증가","변색의 증가","점도의 증가","발연점의 상승"],a:3,e:"기름을 반복사용시 발연점은 떨어진다.",r:99,c:"ingredients"},
{q:"빵 90ｇ짜리520개를 만들기 위해 필요한 밀가루 양은? (제품 배합율 180%, 발효 및 굽기 손실은 무시)",o:["10kg","18kg","26kg","31kg"],a:2,e:"180 : 100 = 90x520 : x 180X=4680000 X는 26000 26kg 제과",r:99,c:"manufacturing"},
{q:"노무비를 절감하는 방법으로 바람직하지 않은 것은?",o:["표준화","단순화","설비 휴무","공정시간 단축"],a:2,e:"노무비 절감은 표준화, 단순화, 공정시간 단축으로 이루어진다. 설비 휴무는 생산을 중단하는 것으로 노무비 절감과 무관하거나 오히려 비효율적이다.",r:90,c:"management"},
{q:"발효가 지나친 반죽으로 빵을 구웠을 때의 제품 특성이 아닌 것은?",o:["빵 껍질색이 밝다.","신 냄새가 있다.","체적이 적다.","제품의 조직이 고르다."],a:3,e:"발효가 지나친 반죽으로 빵을 구웠을 때 기공이 거칠다 제과",r:99,c:"manufacturing"},
{q:"다음 중 굽기 과정에서 일어나는 변화로 틀린 것은?",o:["글루텐이 응고된다.","반죽의 온도가 90℃일 때 효소의 활성이 증가한다.","오븐 팽창이 일어난다.","향이 생성된다."],a:1,e:"이스트는 효모이고, 문제에서 묻는 것은 효소입니다. 효모는 미생물이고, 효소는 체내 확학물질입니다. 효소의 경우 단백질로 이루어져 60도 이상이되면 비활성화 됩니다. 효소는 미생물이 아니므로 사멸되지 않습니다. 단지 활성을 잃을 뿐 효소랑 효모랑 헷갈리지 마세요...",r:99,c:"manufacturing"},
{q:"제빵의 일반적인 스펀지 반죽방법에서 가장 적당한 스펀지 온도는?",o:["12~15도","18~20도","23~25도","29~32도"],a:2,e:"스펀지 반죽법에서 스펀지의 적정 온도는 23~25℃이다.",r:77,c:"nutrition"},
{q:"비용적의 단위로 옳은 것은?",o:["㎤/g","㎠/g","㎤/㎖","㎠/㎖"],a:0,e:"비용적(specific volume)은 부피/무게이므로 단위는 ㎤/g이다.",r:84,c:"ingredients"},
{q:"연속식 제빵법에 관한 설명으로 틀린 것은?",o:["액체 발효법을 이용하여 연속적으로 제품을 생산한다.","발효 손실 감소, 인력 감소 등의 이점이 있다.","3~4기압의 디벨로퍼로 반죽을 제조하기 때문에 많은 양의 산화제가 필요하다.","자동화 시설을 갖추기 위해 설비공간의 면적이 많이 소요된다."],a:3,e:"연속식 제빵법은 설비 감소,설비공간과 설비면적이 감소하는 장점이있다",r:99,c:"manufacturing"},
{q:"다음 제빵 공정 중 시간보다 상태로 판단하는 것이 좋은 공정은?",o:["포장","분할","2차 발효","성형"],a:2,e:"발효시 여러 변수가 작용하기 때문에 시간보다 상태로 판단하는 것이 좋다.",r:99,c:"manufacturing"},
{q:"중간 발효에 대한 설명으로 틀린 것은?",o:["중간발효는 온도 32℃ 이내, 상대습도 75% 전후에서 실시한다.","반죽의 온도, 크기에 따라 시간이 달라진다.","반죽의 상처회복과 성형을 용이하게 하기 위함이다.","상대습도가 낮으면 덧가루 사용량이 증가한다."],a:3,e:"중간 발효는 탄력성과 신장성에는 좋은 영향을 미친다.",r:99,c:"manufacturing"},
{q:"제빵공정 중 패닝 시 틀(팬)의 온도로 가장 적합한 것은?",o:["20℃","32℃","55℃","70℃"],a:1,e:"팬온도는 실내온도",r:99,c:"manufacturing"},
{q:"이스트 2%를 사용했을 때 150분 발효시켜 좋은 결과를 얻었다면, 100분 발효시켜 같은 결과를 얻기 위해 얼마의 이스트를 사용하면 좋을까?",o:["1%","2%","3%","4%"],a:2,e:"발효 시간 조절을 위한 이스트의 변경량 변경할 이스트량 = 정상 이스트의 양*정상발효시간/변경하고자 하는 발효시간 x=2*150/100, x=300/100, x=3% 제과",r:99,c:"ingredients"},
{q:"다음 중 반죽 10kg을 혼합할 때 가장 적합한 믹서의 용량은?",o:["8kg","10kg","15kg","30kg"],a:2,e:"믹서의 용량은 반죽통 용량의 50~60%가 적당하다. 따라서 10kg 반죽에 알맞은 믹서의 용량은 10kg의 50~60%인 15,16kg 정도가 적당하다",r:99,c:"manufacturing"},
{q:"제빵 냉각법 중 적합하지 않은 것은?",o:["급속냉각","자연냉각","터널식 냉각","에어콘디션식 냉각"],a:0,e:"급냉은 제과에서 많이 사용함",r:99,c:"manufacturing"},
{q:"냉동반죽에 사용되는 재료와 제품의 특성에 대한 설명 중 틀린 것은?",o:["일반 제품보다 산화제 사용량을 증가시킨다.","저율배합인 프랑스빵이 가장 유리하다.","유화제를 사용하는 것이 좋다.","밀가루는 단백질의 함량과 질이 좋은 것을 사용한다."],a:1,e:"냉동반죽 초기에는 저율배합 제품인 프랑스빵에 국한되었지만, 고율배합 제품인 단과자빵 등 제품에 사용하는 것이 더 적합",r:99,c:"ingredients"},
{q:"오버베이킹에 대한 설명으로 옳은 것은?",o:["높은 온도의 오븐에서 굽는다.","짧은 시간 굽는다.","제품의 수분 함량이 많다","노화가 빠르다"],a:3,e:"오버베이킹(과다 굽기)은 수분이 과도하게 증발하여 제품이 건조하고 노화가 빠르다.",r:85,c:"manufacturing"},
{q:"술에 대한 설명으로 틀린 것은?",o:["달걀 비린내, 생크림의 비린 맛 등을 완화시켜 풍미를 좋게 한다.","양조주란 곡물이나 과실을 원료로 하여 효모로 발효시킨 것이다","증류주란 발효시킨 양조주를 증류한 것이다.","혼성주란 증류주를 기본으로 하여 정제당을 넣고 과실 등의 추출물로 향미를 낸 것으로 대부분 알코올 농도가 낮다"],a:3,e:"혼성주는 대부분 알콜 농도가 높다.",r:99,c:"ingredients"},
{q:"맥아에 함유되어 있는 아밀라아제를 이용하여 전분을 당화시켜 엿을 만든다. 이 때 엿에 주로 함유되어 있는 당류는?",o:["포도당","유당","과당","맥아당"],a:3,e:"맥아당은 맥아의 아밀라아제에 의해 전분이 당화된 것이다. 엿의 주성분은 맥아당(maltose)이다.",r:82,c:"ingredients"},
{q:"식염이 반죽의 물성 및 발효에 미치는 영향에 대한 설명으로 틀린 것은?",o:["흡수율이 감소한다.","반죽시간이 길어진다.","껍질 색상을 더 진하게 한다.","프로테아제의 활성을 증가시킨다."],a:3,e:"이스트 푸드는 프로테아제의 활성을 증가시켜 반죽의 신장성을 강화한다.",r:99,c:"manufacturing"},
{q:"다음 중 코팅용 초콜릿이 갖추어야 하는 성질은?",o:["융점이 항상 낮은 것","융점이 항상 높은 것","융점이 겨울에는 높고, 여름에는 낮은 것","융점이 겨울에는 낮고, 여름에는 높은 것"],a:3,e:"*코팅용 초콜릿 - 카카오매스에서 카카오버터를 제거하고 식물성 유지와 설탕을 섞어 만든것 - 장점 : 템퍼링 작업 없이도 손쉽게 사용할 수 있음 - 겨울에는 융점이 낮은 것, 여름에는 융점이 높은 것을 사용",r:99,c:"ingredients"},
{q:"어떤 밀가루에서 젖은 글루텐을 채취하여 보니 밀가루 100g에서 36g이 되었다. 이 때 단백질 함량은?",o:["9%","12%","15%","18%"],a:1,e:"젖은 글루텐(%)=(젖은 글루텐 반죽의 중량/밀가루 중량) * 100 건조 글루텐(%)=젖은 글루텐(%)/3 건조 글루텐=36/3=12",r:99,c:"ingredients"},
{q:"다음 중 효소에 대한 설명으로 틀린 것은?",o:["생체내의 화학반응을 촉진시키는 생체 촉매이다.","효소반응은 온도, ph, 기질농도 등에 영향을 받는다.","B-아밀라아제를 액화효소, a-아밀라아제를 당화효소라 한다.","효소는 특정기질에 선택적으로 작용하는 기질 특이성이 있다."],a:2,e:"B-아밀라아제(베타아밀라아제)는 당화효소, a-아밀라아제(알파아밀라아제)는 액화효소라 한다.",r:99,c:"nutrition"},
{q:"동물의 가죽이나 뼈 등에서 추출하며 안정제로 사용되는 것은?",o:["젤라틴","한천","펙틴","카라기난"],a:0,e:"젤라틴은 동물의 가죽·뼈·힘줄에서 추출한 단백질로, 안정제·겔화제로 사용된다. 한천은 해조류, 펙틴은 과일, 카라기난은 홍조류에서 추출한다.",r:90,c:"ingredients"},
{q:"제빵에 가장 적합한 물은?",o:["경수","연수","아경수","알칼리수"],a:2,e:"제빵에 가장 적합한 물은 아경수(경도 50~100ppm)이다. 아경수는 글루텐을 적당히 강화하고 이스트 활성을 높여 발효와 반죽 품질에 가장 유리한 조건을 제공한다.",r:72,c:"ingredients"},
{q:"생이스트의 구성 비율이 올바른 것은?",o:["수분8%, 고형분92%정도","수분 92%, 고형분 8%정도","수분 70%, 고형분 30%정도","수분 30%, 고형분 70%정도"],a:2,e:"생이스트(압착효모) 수분: 70% 고형분: 30% 물온도: 20-30도 용해시간: 믹싱5분전 보관: 냉장보관 드라이이스트(활성건조효모) 수분: 10% 고형분: 90% 물온도: 40-41도 용해시간: 믹싱20분전 보관: 실온보관 사용비율 : 생이스트:드라이이스트=2:1",r:99,c:"ingredients"},
{q:"커스터드 크림에서 계란은 주로 어떤 역할을 하는가?",o:["쇼트닝 작용","결합제","팽창제","저장성"],a:1,e:"계란 노른자의 레시틴은 유화제 역할을 한다.",r:99,c:"ingredients"},
{q:"다음 중 유지의 산패와 거리가 먼 것은?",o:["온도","수분","공기","비타민E"],a:3,e:"비타민 E는 항산화제 이다.",r:99,c:"nutrition"},
{q:"버터를 쇼트닝으로 대치하려 할 때 고려해야 할 재료와 거리가 먼 것은?",o:["유지 고형질","수분","소금","유당"],a:3,e:"추가적으로 버터는 우유의 지방을 추출해서 만든거고 마가린은 식물성지방인데 쇼트닝은 동물성지방입니다 옛날에 1910년대에 미국은 돼지기름대신 쓰려고 쇼트닝개발했다고합니다",r:99,c:"ingredients"},
{q:"믹서 내에서 일어나는 물리적 성질을 파동 곡선 기록기로 기록하여 밀가루의 흡수율, 믹싱 시간, 믹싱 내구성 등을 측정하는 기계는?",o:["패리노 그래프","익스텐소그래프","아밀로그래프","분광분석기"],a:0,e:"반죽의 물리적 시험기계 : 패리노, 익스텐소, 아밀로, 믹소, 레오, 믹서트론 1. 패리노 : 흡수율, 믹싱내구성, 믹싱시간 2. 익스텐소 : 반죽의 신장성, 밀가루의 내구성, 상대적인 발효시간 3. 아밀로 : 점도의 변화, 전분의 질 - 믹소 : 반죽의 형성 및 글루텐의 발달정도 - 레오 : 반죽의 기계적 발달 - 믹서트론 : 사람과 기계의 잘못 확인, 밀가루에 대한 정확한 흡수와 혼합시간 측정",r:99,c:"manufacturing"},
{q:"휘핑용 생크림에 대한 설명 중 틀린 것은?",o:["유지방 40% 이상의 진한 생크림을 쓰는 것이 좋음","기포성을 이용하여 제조함","유지방이 기포 형성의 주체임","거품의 품질 유지를 위해 높은 온도에서 보관함"],a:3,e:"휘핑용 생크림은 낮은 온도(5~7℃)에서 보관해야 거품이 잘 유지된다. 높은 온도에서 보관하면 유지방이 녹아 거품 형성이 불가능하다.",r:90,c:"ingredients"},
{q:"단당류 2~10개로 구성된 당으로, 장내의 비피더스균 증식을 활발하게 하는 당은?",o:["올리고당","고과당","물엿","이성화당"],a:0,e:"올리고당은 단당류 2~10개로 구성되며 장내 비피더스균 증식을 활발하게 한다. 프리바이오틱스로서 장 건강에 유익하다.",r:93,c:"ingredients"},
{q:"식빵에 당질50%, 지방 5%, 단백질 9%, 수분24%, 회분 2%가 들어있다면 식빵을 100g 섭취하였을 때 열량은?",o:["281kcal","301kcal","326kcal","506kcal"],a:0,e:"당질은 탄수화물을 말하는것이므로 탄수화물은 4kcal의 열량을 내고 지방은 9kcal, 단백질은 4kcal의 열량을 내므로 50*4+5*9+9*4=281칼로리가 나온다.. 제과",r:99,c:"nutrition"},
{q:"단백질의 가장 주요한 기능은?",o:["체온유지","유화작용","체조직 구성","체액의 압력조절"],a:2,e:"머리카락과 손,발톱..",r:99,c:"ingredients"},
{q:"수분의 필요량을 증가시키는 요인이 아닌 것은?",o:["장기간의 구토, 설사, 발열","지방이 많은 음식을 먹은 경우","수술, 출혈, 화상","알코올 또는 카페인의 섭취"],a:1,e:"수분 필요량을 증가시키는 요인은 구토·설사·발열, 수술·출혈·화상, 알코올·카페인 섭취 등이다. 지방이 많은 음식은 수분 필요량과 직접 관련이 적다.",r:93,c:"nutrition"},
{q:"불포화지방산에 대한 설명 중 틀린 것은?",o:["불포화지방산은 산패되기 쉽다.","고도 불포화지방산은 성인병을 예방한다.","이중결합 2개 이상의 불포화지방산은 모두 필수 지방산이다.","불포화지방산이 많이 함유된 유지는 실온에서 액상이다."],a:2,e:"이중결합 2개 이상의 불포화지방산은 대부분 불필수 지방산이다.",r:99,c:"nutrition"},
{q:"글리코겐이 주로 합성되는 곳은?",o:["간, 신장","소화관, 근육","간, 혈액","간, 근육"],a:3,e:"간과 근육에서 포도당을 글리코겐인 다당류의 형태로 저장함. 다이어트할 때 갑자기 폭식하면 글리코겐 저장 때문에 몸무게 엄청늘어남 ㅡㅡ",r:99,c:"nutrition"},
{q:"식품위생법에서 식품 등의 공전은 누가 작성, 보급 하는가?",o:["보건복지부장관","식품의약품안전청장","국립보건원장","시, 도지사"],a:1,e:"식품위생법에서 식품 등의 공전은 식품의약품안전청장(현 식약처장)이 작성·보급한다.",r:85,c:"hygiene"},
{q:"변질되기 쉬운 식품을 생산지로부터 소비자에게 전달하기까지 저온으로 보존하는 시스템은?",o:["냉장유통체계","냉동유통체계","저온유통체계","상온유통체계"],a:2,e:"저온유통체계(Cold Chain System)는 생산지에서 소비자까지 저온을 유지하는 시스템이다. 냉장·냉동을 포괄하는 개념이다.",r:93,c:"hygiene"},
{q:"식중독 발생 현황에서 발생 빈도가 높은 우리나라 3대 식중독 원인 세균이 아닌 것은?",o:["살모넬라균","포도상구균","장염 비브리오균","바실러스 세레우스"],a:3,e:"우리나라 3대 식중독 원인균은 살모넬라균, 포도상구균, 장염 비브리오균이다. 바실러스 세레우스는 이에 해당하지 않는다.",r:93,c:"hygiene"},
{q:"어육이나 식육의 초기부패를 확인하는 화학적 검사방법으로 적합하지 않은 것은?",o:["휘발성 염기질소량의 측정","ph의 측정","트리메틸아민 양의 측정","탄력성의 측정"],a:3,e:"탄력성 측정은 물리적 검사방법이다. 제과",r:99,c:"hygiene"},
{q:"아래에서 설명하는 식중독 원인균은? - 미호기성 세균이다. - 발육온도는 약 30~46℃ 정도이다. - 원인식품은 오염된 식육 및 식육가공품, 우유 등이다. - 소아에서는 이질과 같은 설사 증세를 보인다.",o:["캄필로박터 제주니","바실러스 세레우스","장염비브리오","병원성 대장균"],a:0,e:"캄필로박터 제주니는 미호기성 세균으로 30~46℃에서 발육하며, 오염된 식육·우유가 원인이다. 소아에서 이질 유사 증세를 보인다.",r:93,v:0,c:"hygiene"},
{q:"산화방지제와 거리가 먼 것은?",o:["부틸히드록시아니솔(BHA)","디부틸히드록시톨루엔(BHT)","몰식자산프로필 (propyl gallate)","비타민A"],a:3,e:"산화 방지제(항산화제) : BTA, BHT, 비타민 E (토코페롤), 프로필갈레이트(=몰식자산프로필) 이므로 비타민 A 와는 관련 없음",r:99,c:"nutrition"},
{q:"식품첨가물에 의한 식중독으로 규정되지 않는 것은?",o:["허용되지 않은 첨가물의 사용","불순한 첨가물의 사용","허용된 첨가물의 과다 사용","독성물질을 식품에 고의로 첨가"],a:3,e:"독성물질을 식품에 고의로 첨가하는 것은 식품첨가물 사용 위반이 아니라 범죄행위에 해당한다. 식품첨가물에 의한 식중독은 허용외 사용, 불순물, 과다 사용이다.",r:93,c:"ingredients"},
{q:"황색포도상구균 식중독의 특징으로 틀린 것은?",o:["잠복기가 다른 식중독균보다 짧으며 회복이 빠르다","치사율이 다른 식중독균보다 낮다","그람 양성균으로 장내독소를(enterotoxin) 생산한다.","발열이 24~48시간 정도 지속된다."],a:3,e:"포도상구균의 잠복기는 짧게는 30분, 길게는 5시간, 평균 3시간 정도이다.",r:99,c:"hygiene"},
{q:"병원체가 음식물, 손, 식기, 완구, 곤충 등을 통하여 입으로 침입하여 감염을 일으키는 것 중 바이러스에 의한 것은?",o:["이질","폴리오","장티푸스","콜레라"],a:1,e:"이질, 장티푸스, 콜레라 : 세균성 (바이러스)에 의한 것이므로 아닌거 하나찍으면 댐",r:99,c:"hygiene"},
{q:"오염된 우유를 먹었을 때 발생할 수 있는 인수공통감염병이 아닌 것은?",o:["파상열","결핵","Q-열","야토병"],a:3,e:"야토병 : 감염된 산토끼나 동물에 기생하는 진드기, 벼룩, 이 등에 의해 사람에게 감염",r:99,c:"hygiene"}]},
