{q:"스펀지/도법에서 스펀지 밀가루 사용량을 증가시킬 때 나타나는 결과가 아닌 것은?",o:["도 제조시 반죽시간이 길어짐","완제품의 부피가 커짐","도 발효시간이 짧아짐","반죽의 신장성이 좋아짐"],a:0,e:"스펀지반죽에 밀가루를 증가할경우 1.스펀지 발효시간은 길어지고 도(본)반죽의 발효시간은 짧아진다 2.도(본)반죽시간도 짧아지고 플로어타임도 짧아진다 3.반죽의 신장성이 좋아져 성형공정이 개선된다 4.부피증대,얇은 기공막, 부드러운 조직으로 제품 품질이 좋아진다 5.풍미가 강해진다",r:99,c:"manufacturing"},
{q:"단과자빵의 껍질에 흰 반점이 생긴 경우 그 원인에 해당되지 않는 것은?",o:["반죽온도가 높았다.","발효하는 동안 반죽이 식었다.","숙성이 덜 된 반죽을 그대로 정형하였다.","2차 발효 후 찬 공기를 오래 쐬었다."],a:0,e:"껍질의 흰 반점 발생 원인 - 낮은 반죽온도 - 굽기 전 찬 공기를 오래 쐬임 - 숙성 덜 된 반죽을 그대로 사용 - 발효 중 반죽이 식음",r:99,c:"manufacturing"},
{q:"다음 중 중간 발효에 대한 설명으로 옳은 것은?",o:["상대습도 85% 전후로 시행한다.","중간발효 중 습도가 높으면 껍질이 형성되어 빵 속에 단단한 소용돌이가 생성된다.","중간발효 온도는 27~29℃가 적당하다.","중간발효가 잘되면 글루텐이 잘 발달된다."],a:2,e:"중간발효 둥글리기가 끝난 반죽을 정형하기 전에 잠시 발효. 벤치타임. 손상된 글루텐 구조 재정돈, 가스발생으로 반죽의 유연성 회복, 반죽의 신장성 증가 -> 정형과정에서의 밀어펴기를 쉽게. 1. 습도 75% 3. 중간발효온도 : 27~29도 4. 글루텐 구조 재정돈",r:99,c:"manufacturing"},
{q:"2% 이스트로 4시간 발효했을 때 가장 좋은 결과를 얻는다고 가정할 때, 발효시간을 3시간으로 감소시키려면 이스트의 양은 얼마로 해야 하는가?",o:["2.16%","2.67%","3.16%","3.67%"],a:1,e:"이스트 양과 발효시간은 반비례 관계이다.\n2% × 4시간 = X% × 3시간\nX = (2 × 4) / 3 = 8/3 = 2.67%",r:98,c:"ingredients"},
{q:"안 치수가 그림과 같은 식빵 철판의 용적은?",o:["4662 ㎤","4837.5 ㎤","5018.5 ㎤","5218.5 ㎤"],a:1,e:"(380+370)/2*(110+105)/2*120/1000 제빵",r:99,c:"manufacturing"},
{q:"반죽제조 단계 중 렛다운(Let Down) 상태까지 믹싱하는 제품으로 적당한 것은?",o:["옥수수식빵, 밤식빵","크림빵, 앙금빵","바게트, 프랑스빵","잉글리시 머핀, 햄버거빵"],a:3,e:"잉글리시 머핀, 햄버거빵은 반죽에 흐름성을 좋게 하기 위해 오래 믹싱란다.",r:99,c:"manufacturing"},
{q:"다음 중 분할에 대한 설명으로 옳은 것은?",o:["1배합당 식빵류는 30분 내에 하도록 한다.","기계분할은 발효과정의 진행과는 무관하여 분할 시간에 제한을 받지 않는다.","기계분할은 손 분할에 비해 약한 밀가루로 만든 반죽분할에 유리하다.","손 분할은 오븐스프링이 좋아 부피가 양호한 제품을 만들 수 있다."],a:3,e:"손 분할은 반죽에 물리적 충격을 적게 주므로 오븐스프링이 좋아 부피가 양호한 제품을 만들 수 있다. 기계분할은 발효 진행에 따라 30분 내에 완료해야 한다.",r:93,c:"manufacturing"},
{q:"실내온도 23℃, 밀가루 온도 23℃, 수돗물온도 20℃, 마찰계수20℃일 때 희망하는 반죽온도를 28℃로 만들려면 사용해야 될 물의 온도는?",o:["16℃","18℃","20℃","23℃"],a:1,e:"< 스트레이트법의 계산된 물온도 > = 희망온도 X 3 - 밀가루온도 +실내온도 + 마찰계수 ) = 28 X 3 - ( 23 + 23 + 20 )= 18`C",r:99,c:"manufacturing"},
{q:"유지의 기능 중 크림성의 기능은?",o:["제품을 부드럽게 한다.","산패를 방지한다.","밀어 펴지는 성질을 부여한다.","공기를 포집하여 부피를 좋게 한다."],a:3,e:"유지의 물리적 특성인 크림성은 버터크림, 파운드케이크 제조시 필요한 기능이다",r:99,c:"ingredients"},
{q:"일반적으로 시유의 수분 함량은?",o:["58%정도","65%정도","88%정도","98%정도"],a:2,e:"일반적으로 시유란? Market milk(시장에서 파는 우유)라는 뜻으로 수분함량이 88%",r:99,c:"ingredients"},
{q:"우유를 ph4.6으로 유지하였을 때, 응고되는 단백질은?",o:["카세인(casein)","α-락트알부민(lactalbumin)","β-락토글로불린(lactoglobulin)","혈청알부민(serum albumin)"],a:0,e:"우유 단백질 중 산, 효소에 의해 응고되는 단백질은 카세인이고 열에 응고되는 단백질은 락토알부민, 락토글로불린이다.",r:99,c:"ingredients"},
{q:"유지에 유리 지방산이 많을수록 어떠한 변화가 나타나는가?",o:["발연점이 높아진다.","발연점이 낮아진다.","융점이 높아진다.","산가가 낮아진다."],a:1,e:"유리지방산이란 글리세린과 결합되지 않은 지방산으로 열에 불안정하여 쉽게 기체로 바뀌어 유지에 유리지방산이 많을수록 발연점이 낮아진다.",r:99,c:"ingredients"},
{q:"바게트 배합률에서 비타민 C를 30ppm 사용하려고 할 때 이 용량을 %로 올바르게 나타낸 것은?",o:["0.3%","0.03%","0.003%","0.0003%"],a:2,e:"%=1백분의1 / ppm=1백만분의1 1ppm=0.0001% 30ppm=0.003% [추가 해설] 1ppm은 용액 1mg안에 1mcg 있을때, 용액 1Kg 안에 1mg 있을때, 용액 1ton 안에 1g 이 있을때를 말합니다. 1Kg=1,000g 1ton=1,000Kg=1,000,000g 1ppm=1g/1ton=1g/1,000,000g=1/1,000,000=0.000001*100=0.0001% 30ppm=30 * 0.0001% =0.003%",r:99,c:"nutrition"},
{q:"물의 경도를 높여주는 작용을 하는 재료는?",o:["이스트푸드","이스트","설탕","밀가루"],a:0,e:"이스트푸드=재빵 계량제",r:99,c:"ingredients"},
{q:"밀가루의 호화가 시작되는 온도를 측정하기에 가장 적합한 것은?",o:["레오그래프","아밀로그래프","믹사트론","패리노그래프"],a:1,e:"아밀로그래프: 밀가루를 호화시키면서 온도 변화에 따른 밀가루 전분의 점도에 미치는 a-아밀라제의 효과를 측정하는 기계",r:99,c:"ingredients"},
{q:"퐁당 크림을 부드럽게 하고 수분 보유력을 높이기 위해 일반적으로 첨가하는 것은?",o:["한천, 젤라틴","물, 레몬","소금, 크림","물엿, 전화당 시럽"],a:3,e:"퐁당 크림에 물엿이나 전화당 시럽을 첨가하면 설탕 결정의 재결정화를 방지하여 부드럽게 하고 수분 보유력을 높인다.",r:93,c:"ingredients"},
{q:"달걀 껍질을 제외한 전란의 고형질 함량은 일반적으로 약 몇 %인가?",o:["7%","12%","25%","50%"],a:2,e:"전란의 고형질 함량 25% 노른자의 고형질 함량 50% 흰자의 고형질 함량 12%",r:99,c:"nutrition"},
{q:"빈 컵의 무게가 120g이었고, 이 컵에 물을 가득 넣었더니 250g이 되었다. 물을 빼고 우유를 넣었더니 254g이 되었을 때 우유의 비중은 약 얼마인가?",o:["1.03","1.07","2.15","3.05"],a:0,e:"빈 컵의 무게 120g, 물든 컵 250g 1. 물든 컵(250g)- 빈 컵(120g)= 순수 물의 비중 130g 2. 우유(254g) - 순수 물(130g)= 124g 3. 124g / 빈 컵의 무게(120g)=1.03333 우유의 비중 값",r:99,c:"ingredients"},
{q:"이스트에 존재하는 효소로 포도당을 분해하여 알코올과 이산화탄소를 발생시키는 것은?",o:["말타아제(maltase)","리파아제(lipase)","지마아제(zymase)","인버타아제(invertase)"],a:2,e:"포도당과 과당은 이스트에 존재하는 지마아제에 의해 이산화탄소 + 에틸알코올 + 에너지 등을 생성",r:99,c:"ingredients"},
{q:"다음 중 글리세린(glycerin)에 대한 설명으로 틀린 것은?",o:["무색, 무취로 시럽과 같은 액체이다.","지방의 가수분해 과정을 통해 얻어진다.","식품의 보습제로 이용된다.","물보다 비중이 가벼우며, 물에 녹지 않는다."],a:3,e:"글리세린은 물보다 비중이 무거우며 물이랑 잘 섞임",r:99,c:"ingredients"},
{q:"다음 중 설탕을 포도당과 과당으로 분해하여 만든 당으로 감미도와 수분 보유력이 높은 당은?",o:["정백당","빙당","전화당","황설탕"],a:2,e:"전화당: 자당(설탕)을 산이나 효소로 가수분해 하면 같은 양의 포도당과 과당이 생성됨",r:99,c:"ingredients"},
{q:"유지 산패와 관계없는 것은?",o:["금속 이온(철, 구리 등)","산소","빛","항산화제"],a:3,e:"항산화제란 유지의 산화(산패)를 억제라는 재료",r:99,c:"ingredients"},
{q:"다음 중 숙성한 밀가루에 대한 설명으로 틀린 것은?",o:["밀가루의 황색색소가 공기 중의 산소에 의해 더욱 진해진다.","환원성 물질이 산화되어 반죽의 글루텐 파괴가 줄어든다.","밀가루의 ph가 낮아져 발효가 촉진된다.","글루텐의 질이 개선되고 흡수성을 좋게 한다."],a:0,e:"밀가루는 제분 직후 자연 표백 or 인공표백에 의해 탈색되기 때문에 흰색을 띈다.",r:99,c:"ingredients"},
{q:"빵, 과자 중에 많이 함유된 탄수화물이 소화, 흡수되어 수행하는 기능이 아닌 것은?",o:["에너지를 공급한다.","단백질 절약 작용을 한다.","뼈를 자라게 한다.","분해되면 포도당이 생성된다."],a:2,e:"탄수화물의 기능 1.1g당 4kcal의 에너지 공급원이다. 2.피로회복에 매우 효과적이다. 3.간장보호와 해독작용을 한다. 4.간에서 지방의 완전대사를 돕는다. 5.단백질 절약작용을 한다. 6.중추신경 유지, 혈당량 유지,변비방지,감미료 등으로 이용한다. 7.한국인 영양섭취기준에 의한 1일 총열량의 55~70%정도를 탄수화물로 섭취하여야 한다.",r:99,c:"nutrition"},
{q:"단당류의 성질에 대한 설명 중 틀린 것은?",o:["선광성이 있다.","물에 용해되어 단맛을 가진다.","산화되어 다양한 알코올을 생성한다.","분자내의 카르보닐기에 의하여 환원성을 가진다."],a:2,e:"단당류 탄수화물의 기본단위 탄수화물이 가수분해에 의해 더 이상 분해되지 않는 가장 단순한 당 단당류의 종류 포도당, 과당, 갈락토오스 등이 있다",r:99,c:"ingredients"},
{q:"생체 내에서 지방의 기능으로 틀린 것은?",o:["생체기관을 보호한다.","체온을 유지한다.","효소의 주요 구성 성분이다.","주요한 에너지원이다."],a:2,e:"효소의 주요 구성 성분은 단백질이다.",r:99,c:"nutrition"},
{q:"트립토판 360 mg은 체내에서 니아신 몇 mg으로 전환 되는가?",o:["0.6 mg","6 mg","36 mg","60 mg"],a:1,e:"트립토판은 체내에서 1.67%가 니아신으로 전환 360mg x 0.0167 = 6.012mg",r:99,c:"manufacturing"},
{q:"다음 중 체중 1kg당 단백질 권장량이 가장 많은 대상으로 옳은 것은?",o:["1~2세 유아","9~11세 여자","15~19세 남자","65세 이상 노인"],a:0,e:"인간의 생애주기표에서 가장 급격하게 신체발달이 일어나는 시기가 1~2세 유아기이므로 체중 1kg당 단백질 권장량이 많다.",r:99,c:"nutrition"},
{q:"원인균이 내열성포자를 형성하기 때문에 병든 가축의 사체를 처리할 경우 반드시 소각처리 하여야 하는 인수공통감염병은?",o:["돈단독","결핵","파상열","탄저병"],a:3,e:"탄저병은 원인균(탄저균)이 내열성 포자를 형성하므로, 병든 가축의 사체를 소각 처리해야 한다. 매몰이나 일반 소독으로는 포자를 완전히 사멸시킬 수 없다.",r:90,c:"hygiene"},
{q:"해수세균의 일종으로 식염농도 3%에서 잘 생육하며 어패류를 생식할 경우 중독될 수 있는 균은?",o:["보툴리누스균","장염 비브리오균","웰치균","살모넬라균"],a:1,e:"장염 비브리오균은 소금을 좋아하는 호염성균으로 해수(염분3%)에서 잘 생육하여 여름철에 어패류, 해조류 등에 의해서 감염됨.",r:99,c:"hygiene"},
{q:"다음 중 유지의 산화방지를 목적으로 사용되는 산화 방지제는?",o:["Vitamin B","Vitamin D","Vitamin E","Vitamin K"],a:2,e:"유지의 산화방지로 쓰이는 비타민은 토코페롤 로 비타민E",r:99,c:"ingredients"},
{q:"다음 중 사용이 허가되지 않은 유해감미료는?",o:["사카린(Saccharin)","아스파탐(Aspartame)","소프비톨(Sorbitol)","둘신(Dulcin)"],a:3,e:"유해감미료: 둘신, 사이클라메이트, 페릴라틴, 에틸렌글리콜",r:99,c:"manufacturing"},
{q:"화농성 질병이 있는 사람이 만든 제품을 먹고 식중독을 일으켰다면 가장 관계가 깊은 원인균은?",o:["장염비브리오균","살모넬라균","보툴리누스균","황색포도상구균"],a:3,e:"독소형식중독은 황색포도상 구균과 보툴리뉴스균이 있으며, 감염형 식중독에는 살모넬라균과 장염비브리오균 또한 병원성 대장균 그리고 여시니아균이 있다 황색포도상구균(=포도상구균) : 원인독소는 엔테로톡신이며 원인식품은 우유및 유제품 도시락등에 있으며 내열성이 있어 열에 쉽게 파괴되지 않으며 화농성 질환을 앓는 조리자가 조리한 식품에서 발생하며 잠복기가 가장 짧다, 잠복기 및 증상은 짧게는 30분~5시간정도이고 구토, 복통, 설사를 한다 보툴리누스균 : 원인독소는 뉴로톡신이며 통조림, 햄, 소시지가 원인식품이다 아포는 열에 강하나 독소인 뉴로톡신은 열에 약하며, 식중독 중 치사율이 가장 높다 잠복기 및 증상은 평균 18~36시간정도이며, 신경마비, 시력장애, 동공확대가 증상이 된다. 살모넬라균 : 원인식품은 육류,난류,우유등이 있으며, 감염경로는 쥐, 파리, 바퀴벌레 등이 있고 생육최적온도는 37도,60도에서 20분정도 가열하면 사멸을 한다 잠복기 및 증상은 10~24시간 발열 및 구토, 복통등이 있다. 장염비브리오균 : 원인식품은 어패류 및 가공품에서 감염경로는 어패류 생식이되며 생육최적온도는 30~37도 10도 이하에서 생육정지가 되며 잠복기 및 증상은 평균 12시간, 급성위장염이 증상이 나타난다 병원성 대장균의 원인식품은 육류 및 가공품이며 분변오염의 지표이고 미국에서 햄버거에 의한 집단 식중독사건이 있었으며(0~157),인체내에 베로톡신이라는 독소를 생성하며 감염되었다. 37도 그람음성푸아포균, 통성 혐기성이 생육최적온도이며 12~72시간 설사와 복통 두통치사율은 거의없는것이 잠복기 및 증상이다 여시니아균은 육류, 소독하지 않은 물이 원인식품이며 익히지 않은 음식에서 감염이되며 냉장온도와 진공포장이 생육최적온도이다 또한 설사및 구토 복통등이 잠복기 및 증상이다",r:99,c:"hygiene"},
{q:"미나마타병은 어떤 중금속에 오염된 어패류의 섭취 시 발생되는가?",o:["수은","카드뮴","납","아연"],a:0,e:"수은(Hg) 미나마타병",r:99,c:"hygiene"},
{q:"세균의 대표적인 3가지 형태분류에 포함되지 않는 것은?",o:["구균(coccus)","나선균(spirillum)","간균(bacillus)","페니실린균(penicillium)"],a:3,e:"세균의 3가지 대표적 형태는 구균(coccus), 간균(bacillus), 나선균(spirillum)이다. 페니실린균(Penicillium)은 곰팡이로 세균 형태 분류에 포함되지 않는다.",r:93,c:"hygiene"},
{q:"경구전염병의 예방법으로 부적합한 것은?",o:["모든 식품을 일광 소독한다.","감염원이나 오염물을 소독한다.","보균자의 식품취급을 금한다.","주위환경을 청결히 한다."],a:0,e:"모든 식품을 냉동보관함",r:99,c:"hygiene"},
{q:"질병 발생의 3대 요소가 아닌 것은?",o:["병인","환경","숙주","항생제"],a:3,e:"질병 발생의 3대 요소는 병인(병원체), 환경, 숙주이다. 항생제는 치료 수단이지 질병 발생 요소가 아니다.",r:90,c:"nutrition"},
{q:"다음 중 조리사의 직무가 아닌 것은?",o:["집단급식소에서의 식단에 따른 조리 업무","구매식품의 검수 지원","집단급식소의 운영일지 작성","급식설비 및 기구의 위생, 안전 실무"],a:2,e:"집단급식소의 운영일지 작성은 영양사의 직무",r:99,c:"hygiene"}]}],
cake:[{title:"모의고사 1회",desc:"60문제 · 해설 포함",questions:[{q:"스펀지케이크를 만드는 재료 중에서 연화작용과 관계없는 재료는?",o:["노른자","흰자","팽창제","설탕"],a:2,e:"스펀지케이크는 달걀의 거품성을 이용하여 팽창시키는 제품으로, 팽창제는 거의 사용을 하지 않으며 연화작용과도 가장 관련성이 없다.\n• 스펀지 케이크의 4대 재료: 밀가루(박력분), 설탕, 달걀, 소금",r:90,c:"ingredients"},
{q:"다음 공장 설비 중 제품의 생산능력은 최종적으로 어떤 설비가 가장 중요한 기준이 되는가?",o:["발효기","오븐","작업 테이블","믹서"],a:1,e:"공장에서 제품의 생산능력은 오븐을 기준으로 한다. 오븐의 생산능력보다 믹서와 발효실에서 만들어지는 반죽이 많으면 반죽이 지킬 수 있기 때문이다.",r:90,v:0,c:"manufacturing"},
{q:"생산부서의 지난 달 원가관련 자료가 아래와 같을 때 생산가치율은 얼마인가?\n(근로자: 100명, 인건비: 170,000,000, 생산액: 1,000,000,000, 외부가치: 700,000,000, 생산가치: 300,000,000, 감가상각비: 20,000,000)",o:["35%","40%","25%","30%"],a:3,e:"생산가치율(%) = 생산가치/생산금액 × 100\n= 300,000,000/1,000,000,000 × 100 = 30%",r:95,c:"management"},
{q:"신장독성을 나타내는 황변미독은?",o:["시트레오비리딘(citreoviridin)","시트리닌(citrinin)","루테오스키린(luteoskyrin)","아이슬란디톡신(islanditoxin)"],a:1,e:"신장독성을 나타내는 황변미독은 시트리닌이다.",r:78,v:0,c:"manufacturing"},
{q:"다음 중 제빵용 효모에 함유되어 있지 않은 효소는?",o:["인버타아제","락타아제","프로테아제","말타아제"],a:1,e:"제빵용 효모(이스트)에는 인버타아제(자당 분해), 말타아제(맥아당 분해), 치마아제(단당류 발효) 등이 함유되어 있다. 락타아제(유당 분해)는 효모에 없어 이스트는 유당을 발효시키지 못한다.",r:95,c:"nutrition"},
{q:"식품첨가물인 규소수지의 용도는?",o:["추출제","거품제거제","피막제","이형제"],a:1,e:"거품제거제(소포제)는 거품생성을 방지하거나 감소시키는 첨가물로 규소수지(실리콘수지) 1종만 허용되어 있다.",r:85,v:0,c:"ingredients"},
{q:"커스터드 크림과 생크림을 혼합하여 제조한 제품은?",o:["로얄 아이싱(royal icing)","디프로매트 크림(diplomat cream)","퐁당(fondant)","사워 크림(sour cream)"],a:1,e:"디프로매트 크림은 우유로 만든 커스터드 크림에 생크림을 혼합하여 부드럽고 가벼운 질감을 준다.",r:82,v:0,c:"ingredients"},
{q:"밀가루에 충전용 유지를 넣고 스크래퍼를 이용하여 유지와 밀가루를 섞어가며 유지를 잘라 사용하는 방법은 무엇이라 하는가?",o:["스코틀랜드식법","영국식법","프랑스식법","미국식법"],a:0,e:"파프 페이스트리 제조 과정의 스코틀랜드식에 대한 설명이다. 프랑스식(접이식 반죽 또는 롤인타입)은 밀가루에 물과 유지의 일부를 넣어 글루텐을 발전시켜 반죽한 후, 충전용 유지를 넣어 밀어내고 접기를 반복한다.",r:85,v:0,c:"ingredients"},
{q:"베이킹파우더를 많이 사용한 제품의 결과와 거리가 먼 것은?",o:["밀도가 크고 부피가 작다.","속 색이 어둡다.","오븐 스프링이 커서 찌그러들기 쉽다.","속결이 거칠다."],a:0,e:"베이킹파우더를 많이 사용하면 밀도는 낮아지고 부피는 커진다.",r:99,c:"manufacturing"},
{q:"다음 중 반죽형 케이크에 대한 설명으로 틀린 것은?",o:["밀가루, 달걀, 분유 등과 같은 재료에 의해 케이크의 구조가 형성된다.","유지의 공기 포집력, 화학적 팽창제에 의해 부피가 팽창하기 때문에 부드럽다.","제품의 특징은 기공이 크고 가볍다.","레이어 케이크, 파운드 케이크, 마들렌 등이 반죽형 케이크에 해당된다."],a:2,e:"반죽형 케이크는 기공이 작고 촘촘하며, 밀도가 높은 편이다. 기공이 크고 가벼운 케이크는 거품형 케이크의 특징이다.",r:90,v:0,c:"ingredients"},
{q:"짜는 형태의 쿠키에 분당을 사용하는 이유로 가장 알맞은 것은?",o:["퍼짐이 커진다.","감미도가 낮아진다.","제품의 형태를 잘 유지한다.","가격이 저렴하다."],a:2,e:"쿠키 반죽 중에 남아있는 설탕은 쿠키의 퍼짐에 중요한 영향을 미치는데, 고운 입자의 설탕(분당)은 퍼짐성이 나쁘며 조밀하고 밀집된 기공을 만들기 때문에 짜는 형태의 쿠키에서 형태를 잘 유지할 수 있도록 한다.\n※ 입자가 굵은 설탕은 퍼짐성이 좋다.",r:85,c:"ingredients"},
{q:"아밀라아제(amylase)는 무엇을 분해하는가?",o:["탄수화물","비타민","지방질","단백질"],a:0,e:"아밀라아제는 탄수화물을 분해하는 효소로 전분을 맥아당으로 분해한다.",r:85,v:0,c:"nutrition"},
{q:"케이크 제조 시 제품의 부피가 크게 팽창했다가 가라앉는 원인이 아닌 것은?",o:["설탕 사용의 부족","베이킹파우더 증가","밀가루 사용의 부족","물 사용량의 증가"],a:2,e:"밀가루 사용이 부족하면 반죽 구조가 약해지지만, 이는 주로 반죽이 퍼지거나 부피가 작아지는 원인이 된다. 크게 팽창했다가 가라앉는 현상은 과도한 팽창제, 설탕 과다, 수분 과다 등이 원인이며 밀가루 부족은 직접적인 원인이 아니다.",r:85,c:"ingredients"},
{q:"pH가 5인 물을 증류수로 100배 희석했을 때 pH는?",o:["9","3","7","5"],a:2,e:"pH 5인 산성 용액을 100배 희석하면 H⁺ 농도가 100분의 1로 줄어들어 pH가 2 증가하므로 pH 7에 가까워진다. 단, 완충 효과와 증류수의 중화 작용으로 최종 pH는 약 7(중성)이 된다.",r:65,c:"nutrition"},
{q:"다음 중 필수지방산이 아닌 것은?",o:["리놀레산","아라키돈산","스테아르산","리놀렌산"],a:3,e:"※ 일반적으로 리놀렌산, 리놀레산, 아라키돈산은 필수지방산으로 분류되며, 스테아르산은 포화지방산이다.",r:70,c:"nutrition"},
{q:"다음 중 익히는 방법이 나머지 셋과 다른 것은?",o:["엔젤푸드 케이크","파운드케이크","스펀지케이크","찜 케이크"],a:3,e:"찜 케이크는 증기(스팀)로 찌는 방식이고, 엔젤푸드·파운드·스펀지 케이크는 모두 오븐에서 굽는 방식이다.",r:70,c:"manufacturing"},
{q:"카카오의 배유에 대한 설명으로 옳은 것은?",o:["좋은 초콜릿을 만들기 위해서는 한 종류의 배유로 혼합한다.","배유를 카카오 빈이라고 한다.","카카오 버터가 많이 함유되어 있다.","단백질과 무질소 추출물이 많다."],a:2,e:"① 다양한 품종의 배유를 혼합하면 복합적이고 풍부한 맛을 얻을 수 있어 좋은 초콜릿을 만들 수 있다.\n② 카카오 원두를 카카오 빈이라 한다.\n④ 카카오 배유에는 카카오 버터가 많이 함유하고 있으며, 단백질과 무질소 추출물의 함량은 높지 않다.",r:93,c:"ingredients"},
{q:"케이크 제조에 있어 달걀의 기능으로 가장 거리가 먼 것은?",o:["결합작용","팽창작용","착색작용","유화작용"],a:2,e:"달걀은 케이크 제조에서 유화작용, 팽창작용(기포 형성), 결합작용 등의 기능을 한다. 달걀 노른자의 카로티노이드에 의한 착색작용은 부수적인 효과로, 주요 기능과 가장 거리가 멀다.",r:90,v:0,c:"manufacturing"},
{q:"생크림 원료를 가열하거나 냉동시키지 않고 직접 사용할 수 있게 보존하는 적합한 온도는?",o:["-18°C 이하","15 ~ 18°C","3 ~ 5°C","21°C 이상"],a:1,e:"생크림 원료의 적합한 보존 온도는 3~5℃이다.\n• -18℃ 이하: 냉동, 15℃ 이상: 변질 위험",r:77,c:"hygiene"},
{q:"복어 중독을 일으키는 성분은?",o:["무스카린","솔라닌","아코티닌","테트로도톡신"],a:3,e:"복어 중독을 일으키는 독성물질은 테트로도톡신이다.\n무스카린 – 독버섯, 솔라닌 – 감자, 아코티닌 - 투구꽃",r:93,c:"manufacturing"},
{q:"시간과 노력이 절감되는 케이크 반죽방법은?",o:["1단계법","설탕/물법","블렌딩법","크림법"],a:0,e:"1단계법은 모든 재료를 한꺼번에 넣고 반죽하는 방법으로 시간과 노동력을 절약할 수 있어 대량생산에 적합하다.",r:93,v:0,c:"manufacturing"},
{q:"특이동적 작용이 강하여 과잉 섭취하였을 경우 체온과 혈압이 증가하며 피로가 쉽게 오는 영양소는?",o:["비타민","지방","단백질","탄수화물"],a:2,e:"특이동적 작용은 섭식 후 대사활동이 일반적인 수준 이상으로 이루어져 에너지 소비량이 증가되는 현상으로 특히 단백질이 과잉 섭취하였을 때 체온과 혈압이 증가하여 피로가 쉽게 올 수 있다.",r:90,v:0,c:"nutrition"},
{q:"쇼트브레드 쿠키 제조 시 성형을 용이하게 하기 위한 조치 사항으로 옳은 것은?",o:["반죽을 실온에서 말린 후 성형한다.","반죽 완료 후 휴지를 시켜 가소성을 갖도록 한다.","밀가루의 글루텐이 발달하도록 오랫동안 믹싱한다.","액체 재료의 사용량을 늘려 반죽을 무르게 한다."],a:1,e:"쇼트브레드 쿠키는 유지를 많이 사용하는 제품으로 유지가 녹아 흐르지 않도록 반죽을 차게 만들고, 반죽 완료 후 냉장 온도에서 휴지시켜 가소성을 갖도록 하면 성형이 용이해지고 모양도 잘 유지된다.",r:93,v:0,c:"manufacturing"},
{q:"슈의 제조 공정상 구울 때 주의할 사항 중 잘못된 것은?",o:["너무 빨리 오븐에서 꺼내면 찌그러지거나 주저앉기 쉽다.","220°C 정도의 오븐에서 바삭한 상태로 굽는다.","너무 빠른 껍질 형성을 막기 위해 처음에 윗불을 약하게 한다.","굽는 중간 오븐 문을 자주 여닫아 수증기를 제거한다."],a:3,e:"슈는 굽기 중 발생하는 증기압으로 팽창하는 제품으로 굽기 중에 오븐의 문을 자주 열면 찬 공기가 유입되어 슈의 팽창을 방해하여 슈가 주저앉는 원인이 된다.",r:85,v:0,c:"manufacturing"},
{q:"쥐가 직간접으로 옮기는 질병이 아닌 것은?",o:["신증후군출혈열","말라리아","살모넬라증","페스트"],a:1,e:"쥐가 매개하는 질병으로는 신증후군출혈열, 페스트, 렙토스피라증, 쯔쯔가무시병, 살모넬라증 등이 있다. 말라리아는 모기가 매개하는 질병이다.",r:93,v:0,c:"hygiene"},
{q:"다음 중 세균성 식중독 중 일반적으로 치사율이 가장 높은 것은?",o:["장염 비브리오에 의한 식중독","포도상구균에 의한 식중독","살모넬라균에 의한 식중독","보툴리누스균에 의한 식중독"],a:3,e:"세균성 식중독 중에서 가장 치사율이 높은 식중독은 보툴리누스균에 의한 식중독이다. 보툴리누스균은 강력한 신경독소를 생성하여 치사율이 매우 높다.",r:93,v:0,c:"hygiene"},
{q:"식품위생법에서 식품을 제조, 가공, 조리 또는 보존하는 과정에서 감미, 착색, 표백 또는 산화방지 등을 목적으로 식품에 사용되는 물질로 정의한 것은?",o:["식품재료물","식품포장물","식품가공물","식품첨가물"],a:3,e:"식품첨가물에 대한 정의이다.",r:78,v:0,c:"hygiene"},
{q:"화이트 레이어 케이크에서 밀가루 100%, 설탕 120%, 유화 쇼트닝 54%를 사용한 경우 우유 사용량은?",o:["85%","90%","80%","72%"],a:3,e:"• 흰자 사용량 = 쇼트닝×1.43 = 54×1.43 = 77.2\n• 우유 사용량 = 설탕+30-흰자 = 120+30-77.2 = 72.8%",r:90,c:"ingredients"},
{q:"반죽형의 부드러움과 거품형의 기공과 조직을 갖춘 제품을 만들고자 할 때 사용되는 반죽법은?",o:["블렌딩법","크림법","시퐁법","별립법"],a:2,e:"시풍형 반죽은 흰자와 설탕을 섞어 거품형의 머랭을 만들고, 노른자는 다른 재료와 혼합하여 반죽형 반죽을 만든 후 두 가지를 혼합하여 제품을 만드는 방식으로 거품형의 기공과 반죽형의 부드러움을 가지는 반죽이다.",r:90,v:0,c:"manufacturing"},
{q:"제빵에서 밀가루, 이스트, 물과 함께 기본적인 필수재료는?",o:["유지","소금","분유","설탕"],a:1,e:"제빵의 4대 기본 필수재료는 밀가루, 이스트, 물, 소금이다. 소금은 발효 조절, 글루텐 강화, 풍미 부여 등 필수적인 역할을 한다.",r:75,c:"ingredients"},
{q:"도넛의 튀김 기름이 갖추어야 할 조건은?",o:["산패취가 없다.","산화와 가수분해가 쉽게 일어난다.","저장 중 안정성이 낮다.","발연점이 낮다."],a:0,e:"도넛 튀김 기름의 조건: 산패취가 없고, 저장 안전성이 높고, 발연점이 높고, 산화·가수분해가 잘 일어나지 않아야 한다.",r:93,c:"ingredients"},
{q:"아이싱이 너무 되게 제조되었을 경우의 조치법으로 틀린 것은?",o:["설탕시럽(설탕 : 물 = 2 : 1)을 사용한다.","물을 사용한다.","젤라틴 분말을 사용한다.","가온을 시킨다."],a:2,e:"아이싱이 굳어지거나 너무 되게 제조되었을 때 소량의 물을 넣고 43°C로 만들어주거나 설탕 시럽(설탕:물=2:1)을 더 넣어 연하게 만든다. 젤라틴 분말은 오히려 아이싱을 더 단단하게 만든다.\n※ 아이싱의 끈적거림을 방지하기 위해 안정제(젤라틴, 한천 등)나 흡수제(전분, 밀가루 등)를 사용한다.",r:88,c:"ingredients"},
{q:"다음 중 환원당이 아닌 당은?",o:["과당","포도당","맥아당","자당"],a:3,e:"자당(설탕)은 구조면에서 환원작용을 나타내는 알데히드기가 존재하지 않기 때문에 비환원당입니다. 과당, 포도당, 맥아당은 모두 환원당입니다.",r:99,c:"ingredients"},
{q:"2차 발효에 있어서 발효실 관리에 중요한 요인이 아닌 것은?",o:["발효 시간","성형 모양","발효 온도","내부 습도"],a:1,e:"2차 발효 발효실의 중요한 관리 요소는 발효 온도, 발효 시간, 내부 습도(상대 습도)이다. 성형 모양은 발효실 관리 요인이 아니다.",r:90,v:0,c:"manufacturing"},
{q:"다음 중 동물성 유지에 해당하는 것은?",o:["대두유","코코아 버터","면실유","버터"],a:3,e:"버터는 우유 지방 80% 이상인 동물성 유지이다. 대두유, 코코아 버터, 면실유는 식물성 유지이다.",r:82,v:0,c:"ingredients"},
{q:"전통적인 스펀지케이크 반죽과 제노와즈 반죽의 가장 큰 차이점은?",o:["유지 함량","설탕 함량","달걀 함량","밀가루 함량"],a:0,e:"제노와즈 반죽은 스펀지케이크 반죽에 유지를 녹여 만드는 방법으로 스펀지케이크보다 부드러운 제품을 만들 수 있다. 가장 큰 차이점은 유지 함량이다.",r:90,v:0,c:"ingredients"},
{q:"식품의 부패와 미생물에 대한 설명이 옳은 것은?",o:["식품을 냉장 저장하면 미생물이 사멸되므로 부패를 완전히 막을 수 있다.","부패하기 쉬운 식품에는 수분과 영양원이 충분하므로 온도관리가 중요하다.","일단 냉동시켰던 식품도 해동하여도 세균이 증식될 수 없다.","어패류의 부패에 관계하는 세균은 주로 고온균이다."],a:1,e:"① 냉장 저장은 미생물을 사멸시키지 못하고, 성장속도만 늦춘다.\n③ 냉동했던 식품도 해동 후 적절한 환경에서는 세균이 다시 증식할 수 있다.\n④ 어패류의 부패에는 주로 저온성 세균이 관여한다.",r:85,c:"hygiene"},
{q:"제과 생산관리에서 제1차 관리의 3대 요소가 아닌 것은?",o:["자금(Money)","방법(Method)","사람(Man)","재료(Material)"],a:1,e:"• 제1차 관리 요소: Man(사람, 질과 양), Material(재료, 품질), Money(자금, 원가)\n• 제2차 관리 요소: Method(방법), Minute(시간, 공정), Machine(기계, 시설), Market(시장)",r:93,c:"management"},
{q:"스펀지케이크를 더운 방법으로 제조 시 달걀과 설탕을 혼합하여 몇 도로 중탕하는 것이 가장 적당한가?",o:["43°C","30°C","25°C","10°C"],a:0,e:"스펀지 반죽에서 공립법 중 더운 믹싱법은 달걀과 설탕을 혼합하여 37~43°C까지 중탕하여 거품을 내는 방법이다.",r:93,v:0,c:"manufacturing"},
{q:"어떤 제품 100개의 원재료비가 50,000원, 노무비 및 기타 제조 경비가 원재료의 50%일 때 제품 1개의 제조원가는?\n(단, 수율은 93.7%이다.)",o:["900원","1000원","750원","800원"],a:3,e:"• 100개의 원재료비: 50,000\n• 노무비 및 기타제조경비: 50,000×0.5 = 25,000\n• 수율 미고려 시 1개당 제조원가: (50,000+25,000)/100개 = 750원\n• 수율 93.7% 반영 1개당 제조원가: 750/0.937 = 800.43원 ≈ 800원",r:93,c:"management"},
{q:"빵 제품 냉각에 대한 설명으로 틀린 것은?",o:["냉각된 제품의 수분함량은 38%를 초과하지 않는다.","빵의 수분은 내부에서 외부로 이동하여 평형을 이루지 못한다.","일반적인 제품에서 냉각 중에 수분 손실이 12% 정도가 된다.","냉각된 빵의 내부 온도가 32 ~ 35°C에 도달하였을 때 절단, 포장한다."],a:2,e:"빵 제품을 냉각할 때 일반적으로 평균 2% 정도의 수분 손실이 일어난다. 12%가 아니다. 빵의 적정 냉각온도와 수분함량은 35~40°C, 38% 정도이다.",r:90,v:0,c:"manufacturing"},
{q:"케이크 위에 파인애플, 키위 등을 사용한 후 젤라틴액을 씌울 때는 쉽게 굳지 않는데 그 이유는?",o:["특별한 향기 때문에","색이 진해서","설탕이 부족하므로","과일 내의 효소 때문에"],a:3,e:"파인애플의 브로멜린, 키위의 액티니딘 등은 단백질의 분해효소로 단백질인 젤라틴의 응고를 방해한다.",r:77,v:0,c:"ingredients"},
{q:"다음 생물학적 위해요소 중 가장 열에 약한 것은?",o:["테트로도톡신","보툴리눔독신","삭시톡신","아플라톡신"],a:1,e:"보툴리눔독신은 클로스트리디움 보툴리눔균에 의해 생성되는 신경독(뉴로톡신)으로 비교적 열에 약하다.\n※ 자연적으로 생성되는 천연유독 성분(테트로도톡신, 삭시톡신 등)은 열에 강하여 높은 온도로 가열하여도 독성이 분해되지 않는다.",r:88,c:"hygiene"},
{q:"천연 정유에 향료를 혼합하여 만든 것으로 내열성이 강해 빵과 같은 가열식품에 이용하는 향료는?",o:["유성향료","유화향료","수용성향료","분말향료"],a:0,e:"유성향료는 글리세린, 식물성 기름 등의 천연 정유에 향료를 용해시켜 만든 것으로 내열성이 강하여 빵과 같은 가열식품에 많이 이용된다.\n※ 유화향료: 유성향료를 물에 잘 분산되도록 유화제를 사용한 것으로 음료나 크림같은 수분이 많은 제품에 주로 사용된다.",r:88,c:"nutrition"},
{q:"일반적인 파운드케이크의 비용적(cm³/g)은 얼마인가?",o:["1.0 cm³/g","0.5 cm³/g","4.8 cm³/g","2.4 cm³/g"],a:3,e:"일반적인 파운드케이크의 비용적은 2.40cm³/g이다.",r:90,v:0,c:"manufacturing"},
{q:"밀가루 성분 중 함량이 많을수록 노화가 촉진되는 것은?",o:["아밀로오스","수분","단백질","비수용성 펜토산"],a:0,e:"밀가루 전분에 함유된 대표적 다당류로 아밀로오스와 아밀로펙틴이 있으며, 이 중 아밀로오스가 많을수록 노화가 촉진된다.",r:93,v:0,c:"ingredients"},
{q:"작업장에 들어가기 전 작업자의 위생복장 착용방법이 아닌 것은?",o:["장신구, 반지 등을 반입하지 않는다.","반팔 위생복의 착용은 지양하도록 한다.","필기구는 주머니에 넣어서 사용한다.","위생모는 머리 전체를 감싸도록 하여 머리카락이 나오지 않도록 한다."],a:2,e:"작업장에서 필기구를 휴대하거나 주머니에 넣는 행동은 식품에 오염가능성을 높일 수 있어 위생적으로 좋지 않은 행동이다.",r:90,v:0,c:"hygiene"},
{q:"다음 중 작업공간의 살균에 가장 적당한 것은?",o:["자비 살균","가시광선 살균","자외선 살균","적외선 살균"],a:2,e:"작업공간의 살균에 가장 적당한 것은 자외선 살균이다. 자외선 살균 소독고는 식기 및 작업공간 살균에 널리 사용된다. 자비 살균은 100℃ 물에 담가 살균하는 방법으로 작업 공간 전체에 적용하기 어렵다.",r:99,c:"hygiene"},
{q:"데블스푸드 케이크를 제조하기 위해 밀가루 100, 설탕 170, 쇼트닝 70, 더치 코코아 20, 소금 2, 베이킹파우더 3을 사용하려 할 때 전란과 우유의 비율은?",o:["전란 77, 우유 153","전란 699, 우유 140","전란 88, 우유 152","전란 66, 우유 176"],a:0,e:"데블스푸드 케이크의 배합률\n• 전란 = 쇼트닝×1.1 = 70×1.1 = 77\n• 우유 사용량 = 설탕+30+(코코아×1.5)-전란\n= 170+30+(20×1.5)-77 = 153",r:93,c:"ingredients"},
{q:"이탈리안 머랭 설명으로 맞는 것은?",o:["주석산 크림을 넣으면 거품이 가라앉는다.","설탕과 물로 시럽을 만들어 달걀흰자에 넣어 머랭을 만드는 방법이다.","시럽의 온도는 100°C로 하면 된다.","흰자와 설탕을 혼합하여 중탕으로 가열하여 만든다."],a:1,e:"이탈리안 머랭은 달걀흰자로 거품을 올리면서 설탕과 물로 만든 뜨거운 시럽을 실같이 흘려 넣으며 만든다.\n① 주석산 크림을 넣으면 거품을 튼튼하게 만든다.\n③ 시럽의 온도는 114~118°C 정도로 한다.\n④ 흰자와 설탕을 혼합하여 중탕으로 만드는 머랭은 스위스 머랭이다.",r:90,c:"ingredients"},
{q:"밀의 제분 과정 중 조질 시 가수를 하는 목적이 아닌 것은?",o:["전분입자의 호화","밀가루의 품질 향상","배유의 분쇄 촉진","외피와 배유의 분리 촉진"],a:0,e:"밀의 제분 과정 중 조질은 제분공정에서 외피와 배유를 깨끗하게 분리시키기 위하여 수분을 고루 분포시키는 가수작업이다. 전분입자의 호화는 가수의 목적이 아니다.",r:93,v:0,c:"ingredients"},
{q:"빵, 과자 제조 시 계량에 관한 설명 중 옳은 것은?",o:["계량(measurement)은 무게 단위보다는 부피 단위로 한다.","1mg(miligram)은 (1/10g)이다.","1g은 (1/1000)kg이다.","1dg(decigram)은 (1/100g)이다."],a:2,e:"① 제과제빵에서 사용되는 재료는 부피보다 무게 단위로 계량한다.\n② 1mg은 (1/1000g)이다.\n④ 1dg는 (1/10g)이다.",r:90,c:"manufacturing"},
{q:"다음 중 병원체가 바이러스인 질병은?",o:["결핵","성홍열","디프테리아","폴리오"],a:3,e:"폴리오(소아마비)는 폴리오바이러스에 의해 발생하는 바이러스성 질병이다. 결핵은 결핵균(세균), 성홍열은 연쇄상구균, 디프테리아는 디프테리아균에 의한 세균성 질병이다.",r:60,c:"hygiene"},
{q:"우유를 살균할 때 많이 이용되는 저온장시간 살균법으로 가장 적합한 온도는?",o:["18 ~ 20°C","63 ~ 65°C","98 ~ 100°C","38 ~ 40°C"],a:1,e:"우유살균법 중 저온장시간살균법(LTLT법)은 61~65°C에서 30분간 처리한다.",r:85,v:0,c:"hygiene"},
{q:"제과공장 설계 시 고려해야 할 환경 조건과 가장 거리가 먼 것은?",o:["산업단지에 위치하여야 한다.","폐수와 폐기물 처리에 편리한 곳이어야 한다.","환경 및 주위가 깨끗한 곳이어야 한다.","양질의 물을 충분히 얻을 수 있어야 한다."],a:0,e:"제과공장이 꼭 산업단지에 위치해야 할 이유는 없다. ②, ③, ④는 제과공장의 입지를 위하여 필요한 조건이다.",r:90,v:0,c:"manufacturing"},
{q:"인수공통감염병으로만 짝지어진 것은?",o:["결핵, 유행성 간염","홍역, 브루셀라증","탄저, 리스테리아증","폴리오, 장티푸스"],a:1,e:"인수공통전염은 탄저, 브루셀라, 결핵, 리스테리아증 등이 있음 경구전염(바이러스) 폴리오, 유행성간염, 천열, 전염성 설사증 경구전염(세균) 장티푸스, 콜레라, 파라티푸스, 세균성이질, 디푸테리아",r:99,c:"hygiene"},
{q:"반죽의 비중에 대한 설명으로 틀린 것은?",o:["비중은 같은 부피의 반죽 무게를 같은 부피의 물 무게로 나눈 것이다.","비중이 낮을수록 공기 함유량이 많아서 제품이 가볍고 조직이 거칠다.","비중이 높을수록 공기 함유량이 적어서 제품의 기공이 조밀하다.","비중이 같아도 제품의 식감은 다를 수 있다."],a:0,e:"비중이 낮을수록 공기 함유량이 많아 제품이 가볍지만, 반드시 조직이 거칠어지는 것은 아니다. 적절히 낮은 비중은 부드럽고 가벼운 제품을 만들 수 있다.",r:75,v:0,c:"manufacturing"},
{q:"충전물 제조 시 가열하여 사용해야 하는 검류는?",o:["젤라틴","아라비아검","CMC","알긴산 나트륨"],a:0,e:"충전물 제조 시 안정제로 사용되는 젤라틴은 가열하면 녹고 냉각하면 다시 굳는 재료로 가열하여 사용하는 검류이다. 아라비아검, CMC, 알긴산 나트륨은 가열 없이도 손쉽게 물에 용해되는 검류이다.",r:90,v:0,c:"manufacturing"},
{q:"교차오염을 예방하는 방법이 아닌 것은?",o:["도마와 칼 사용 시 가공된 식품보다 원재료를 먼저 처리한다.","철저한 개인위생과 손 씻기를 한다.","원재료와 가공된 식품은 각각 다른 기구를 사용한다.","깨끗하고 위생적인 설비와 도구를 사용한다."],a:0,e:"원재료와 가공된 식품의 처리는 각각 다른 기구를 사용하는 것이 좋으나 그렇지 못한 경우라면 가공된 식품을 먼저 처리하고 원재료를 나중에 처리하는 것이 교차오염을 막는 방법이다.",r:90,v:0,c:"hygiene"},
{q:"도넛의 제품결함에 대한 설명으로 틀린 것은?",o:["도넛을 피복한 글레이즈(glaze)가 갈라지는 것은 과도한 수분 증발 때문으로 검류를 약간 사용하면 효과가 있다.","황화현상을 방지하기 위하여 첨가하는 스테아린은 유지의 융점을 높여 경화제 역할을 한다.","도넛을 피복한 설탕이 기름을 흡수하여 나타나는 황화현상을 방지하기 위하여 튀김기름에 스테아린을 약 10% 정도 혼합한다.","도넛을 피복한 설탕이나 포도당이 수분에 의해 녹아 시럽처럼 변하는 것을 발한 현상이라 한다."],a:2,e:"황화현상을 방지하기 위하여 첨가하는 스테아린은 3~6%를 첨가한다. 10%는 과다하다.\n※ 황화현상: 도넛의 기름이 설탕을 녹여 끈적거리게 만드는 현상",r:85,c:"ingredients"}]},
{title:"2011년 5회",desc:undefined,questions:[{q:"머랭 제조에 대한 설명으로 옳은 것은?",o:["기름기나 노른자가 없어야 튼튼한 거품이 나온다.","일반적으로 흰자 100에 대하여 설탕 50의 비율로 만든다.","저속으로 거품을 올린다.","설탕을 믹싱 초기에 첨가하여야 부피가 커진다."],a:0,e:"2. 설탕2 : 흰자1 비율",r:99,c:"ingredients"},
{q:"다음 중 쿠키의 과도한 퍼짐 원인이 아닌 것은?",o:["반죽의 되기가 너무 묽을 때","유지함량이 적을 때","설탕 사용량이 많을 때","굽는 온도가 너무 낮을 때"],a:1,e:"유지함량이 적을 수록 쿠키의 퍼짐현상이 줄어듭니다.문제는 과도한 퍼짐 원인이 아닌 것을 고르는 것으로 정답은 2번이 맞습니다. [추가 해설] <과도한 퍼짐에 영향을 주는 요인> 알칼리성반죽, 입자가 크거나 많은 양의 설탕 사용,부족한믹싱, 묽은반죽,낮은 오븐온도 <부족한 퍼짐에 영향을 주는 요인> 산성반죽, 입자가 곱거나 적은 양의 설탕 사용,과도한 믹싱, 된반죽,높은오븐온도",r:99,c:"ingredients"},
{q:"반죽형 케이크의 반죽 제조법에 대한 설명이 틀린 것은?",o:["크림법: 유지와 설탕을 넣어 가벼운 크림상태로 만든 후 계란을 넣는다.","블렌딩법: 밀가루와 유지를 넣고 유지에 의해 밀가루가 가볍게 피복되도록 한 후 건조, 액체 재료를 넣는다.","설탕물법: 건조 재료를 혼합한 후 설탕 전체를 넣어 포화용액을 만드는 방법이다.","1단계법: 모든 재료를 한꺼번에 넣고 믹싱하는 방법이다."],a:2,e:"설탕물법 : 설탕에 물(설탕의 ½)울 더해 녹인 후 남은 물 혼합 → 건조재료→ 계란 <고운 속결 제품이 생산. 계량의 정확성 운반의 편리성 대량생산 용이>",r:99,c:"manufacturing"},
{q:"일반적으로 초콜릿은 코코아와 카카오 버터로 나누어져있다. 초콜릿 56%를 사용할 때 코코아의 양은 얼마인가?",o:["35%","37%","38%","41%"],a:0,e:"초콜릿56%=초콜릿56%*(5/8)=35 초콜릿을 8로 나누고 그값에 5를 곱하면 코코아의 양이 나온다 [추가 해설] 초콜릿에 함유되어있는 코코아와 카카오 버터는 코코아는 5/8함유 카카오버터는 3/8함유 되어있음",r:99,c:"ingredients"},
{q:"반죽온도 조절을 위한 고려사항으로 적절하지 않은 것은?",o:["마찰계수를 구하기 위한 필수적인 요소는 반죽결과 온도, 원재료온도, 작업장 온도, 사용되는 물온도, 작업장 상대습도이다.","기준되는 반죽온도보다 결과온도가 높다면 사용하는 물 일부를 얼음으로 사용하여 희망하는 반죽온도를 맞춘다.","마찰계수란 일정량의 반죽을 일정한 방법으로 믹싱할 때 반죽온도에 영향을 미치는 마찰열을 실질적인 수치로 환산한 것이다.","계산된 사용수 온도가 56℃이상일 때는 뜨거운 물을 사용할 수 없으며, 영하로 나오더라도 절대치의 차이라는 개념에서 얼음계산법을 적용한다."],a:0,e:"마찰계수를 구하기 위한 필수적인 요소로 작업장 상대습도는 고려하지 않는다",r:99,c:"manufacturing"},
{q:"파운드 케이크를 패닝할 때 밑면의 껍질 형성을 방지하기 위한 팬으로 가장 적합한 것은?",o:["일반팬","이중팬","은박팬","종이팬"],a:1,e:"이중팬은 팬 사이에 공기층이 형성되어 열 전도를 완화시키므로, 밑면의 과도한 껍질 형성을 방지하는 데 가장 적합하다.",r:90,c:"manufacturing"},
{q:"유화제를 사용하는 목적이 아닌 것은?",o:["물과 기름이 잘 혼합되게 한다.","빵이나 케익을 부드럽게 한다.","빵이나 케익이 노화되는 것을 지연시킬 수 있다.","달콤한 맛이 나게 하는데 사용한다."],a:3,e:"유화제는 무맛이다",r:99,c:"ingredients"},
{q:"케이크 제품의 굽기 후 제품 부피가 기준보다 작은 경우의 원인이 아닌 것은?",o:["틀의 바닥에 공기나 물이 들어갔다.","반죽의 비중이 높았다.","오븐의 굽기 온도가 높았다.","반죽을 패닝한 후 오래 방치했다."],a:0,e:"반죽의 비중이 높을수록 딱딱해지고 부피가 낮아짐 굽기온도가 높으면 오븐스프링이 잘 일어나지 않는다. 팬닝 후 오래 방치하면 반죽들이 가라앉아 부피가 낮아진다. (대충 이정도..? 작성자 생각)",r:99,c:"manufacturing"},
{q:"도넛 글레이즈가 끈적이는 원인과 대응방안으로 틀린 것은?",o:["유지 성분과 수분의 유화 평형 불안정 - 원재료 중 유화제 함량을 높임","온도, 습도가 높은 환경 - 냉장 진열장 사용 또는 통풍이 잘되는 장소 선택","안정제, 농후화제 부족 - 글레이즈 제조시 첨가된 검류의 함량을 높임","도넛 제조 시 지친 반죽, 2차 발효가 지나친 반죽 사용 - 표준 제조 공정 준수"],a:0,e:"도넛 글레이즈는 유화제를 사용하지 않음 제과",r:99,c:"manufacturing"},
{q:"도넛 튀김용 유지로 가장 적당한 것은?",o:["라드","유화쇼트닝","면실유","버터"],a:2,e:"튀김기름의 조건중 발연점이 높아야한다 면실유가 적합하다",r:99,c:"ingredients"},
{q:"초콜릿 제품을 생산하는데 필요한 도구는?",o:["디핑 포크 (Dipping forks)","오븐 (oven)","파이 롤러 (pie roller)","워터 스프레이 (water spray)"],a:0,e:"디핑 포크는 초콜릿을 만들때 사용하며, 작은 크기를 코딩할 때 사용",r:99,c:"manufacturing"},
{q:"화이트 레이어 케이크의 반죽 비중으로 가장 적합한 것은?",o:["0.90 ~ 1.0","0.45 ~ 0.55","0.60 ~ 0.70","0.75 ~ 0.85"],a:3,e:"화이트 레이어 케이크는 반죽형 반죽으로 비중을 0.8±0.05로 맞춘다.",r:99,c:"manufacturing"},
{q:"케이크 반죽이 30ℓ 용량의 그릇 10개에 가득 차있다. 이것으로 분할 반죽 300g 짜리 600개를 만들었다. 이 반죽의 비중은?",o:["0.8","0.7","0.6","0.5"],a:2,e:"600×300÷(30000ml×10개)=0.6",r:99,c:"manufacturing"},
{q:"퍼프 페이스트리의 휴지가 종료되었을 때 손으로 살짝 누르게 되면 다음 중 어떤 현상이 나타나는가?",o:["누른 자국이 남아 있다.","누른 자국이 원상태로 올라온다.","누른 자국이 유동성 있게 움직인다.","내부의 유지가 흘러나온다."],a:0,e:"퍼프 페이스트리 휴지가 종료되면 글루텐이 완전히 이완되어 손으로 살짝 눌렀을 때 자국이 그대로 남아있다. 이는 반죽이 충분히 이완된 상태로 다음 밀어 펴기 단계를 진행하기 좋은 상태임을 나타낸다.",r:95,c:"ingredients"},
{q:"다음 중 제과제빵 재료로 사용되는 쇼트닝(shortening)에 대한 설명으로 틀린 것은?",o:["쇼트닝을 경화유라고 말한다.","쇼트닝은 불포화 지방산의 이중결합에 촉매 존재하에 수소를 첨가하여 제조한다.","쇼트닝성과 공기포집 능력을 갖는다.","쇼트닝은 융점(melting point)이 매우 낮다."],a:3,e:"쇼트닝은 버터보다 융점이 높다. 쇼트닝 융점 28도, 버터 융점 21도",r:99,c:"ingredients"},
{q:"다음 중 발효시간을 연장시켜야하는 경우는?",o:["식빵 반죽온도가 27℃ 이다.","발효실 온도가 24℃ 이다.","이스트푸드가 충분하다.","1차 발효실 상대 습도가 80%이다."],a:1,e:"제빵 기본 제조공정 재료의 배합량 측정-반죽(12~15분,27도)-1차발효(27도,75~80%,1~3시간)-중간발효(10~20분)-2차발효(35~43도,85~90%,40~60분)-성형-굽기 제과",r:99,c:"manufacturing"},
{q:"제빵 시 굽기 단계에서 일어나는 반응에 대한 설명으로 틀린 것은?",o:["반죽온도가 60℃로 오르기 까지 효소의 작용이 활발해지고 휘발성 물질이 증가한다.","글루텐은 90℃부터 굳기 시작하여 빵이 다 구워질때까지 천천히 계속 된다.","반죽온도가 60℃에 가까워지면 이스트가 죽기 시작한다. 그와 함께 전분이 호화하기 시작한다.","표피부분이 160℃를 넘어서면 당과 아미노산이 마이야르 반응을 일으켜 멜라노이드를 만들고, 당의 캐러멜화 반응이 일어나고 전분이 덱스트린으로 분해된다."],a:1,e:"글루텐 응고는 74도에서 이뤄진다. 제과",r:99,c:"ingredients"},
{q:"어느 제과점의 이번 달 생산예상 총액이 1000만원인 경우, 목표 노동 생산성은 5000원/시/인, 생산 가동 일수가 20일, 1일 작업시간 10시간인 경우 소요인원은?",o:["4명","6명","8명","10명"],a:3,e:"한달생산예상총액:1000만원 인당시급:5000원 인당생산시간10시간 가동일수:20일 시간당 5000원을받고 10시간일하고 20일 일했으니 ☞5000×10×20=1000000(백만) 한달 예상 총액이 천만원이고 1인당 백만원을버니 최대 소요인원은 10명.",r:99,c:"management"},
{q:"냉각으로 인한 빵 속의 수분 함량으로 적당한 것은?",o:["약 5%","약 15%","약 25%","약 38%"],a:3,e:"갓 구워낸 빵의 수분함량은 껍질에 12%, 빵속에 45%를 유지하는데, 이를 식혀 껍질에 27%, 빵 속에 38%로 낮추는 것을 냉각이라한다.",r:99,c:"nutrition"},
{q:"다음 제품 중 2차 발효실의 습도를 가장 높게 설정해야 되는 것은?",o:["호밀빵","햄버거빵","불란서빵","빵 도넛"],a:1,e:"2차 발효실의 습도 호밀빵-85%, 햄버거빵-90%, 불란서빵-75%, 빵 도넛-75%~80%",r:99,c:"manufacturing"},
{q:"노타임 반죽법에 사용되는 산화, 환원제의 종류가 아닌 것은?",o:["ADA(azodicarbonamide)","L-시스테인","소르브산","요오드칼슘"],a:3,e:"반죽 조절제의 종류와 구성 성분 - 효소제 : 프로테아제, 아밀라아제 - 산화제 : 아스코르브산, 브롬산칼륨, 요오드칼륨, 아조디카본아미드 - 환원제 : 글루타티온, 시스테인",r:99,c:"nutrition"},
{q:"80% 스펀지에서 전체 밀가루가 2000g, 전체 가수율이 63%인 경우, 스펀지에 55%의 물을 사용하였다면 본반죽에 사용할 물량은?",o:["380g","760g","1140g","1260g"],a:0,e:"스펀지밀가루 80%, 스펀지의 55%물일 경우=물사용량(80x0.55)44% 전체가수율 63%-44%=19%이므로 2000gX0.19=380g 제과",r:99,c:"ingredients"},
{q:"어린 반죽(발효가 덜 된 반죽)으로 제조를 할 경우 중간발효시간은 어떻게 조절되는가?",o:["길어진다.","짧아진다.","같다.","판단할 수 없다."],a:0,e:"발효가 덜됐으니 당연히 발효시간을 더 늘려야죠 ㅎ",r:99,c:"manufacturing"},
{q:"다음 중 식빵에서 설탕이 과다할 경우 대응책으로 가장 적합한 것은?",o:["소금 양을 늘린다.","이스트 양을 늘린다.","반죽온도를 낮춘다.","발효시간을 줄인다."],a:1,e:"식빵에서 설탕이 많이 들어갈 경우 발효가 느려지므로 이스트를 증가시켜야 한다.",r:99,c:"manufacturing"},
{q:"둥글리기의 목적과 거리가 먼 것은?",o:["공 모양의 일정한 모양을 만든다.","큰 가스는 제거하고 작은 가스는 고르게 분산시킨다.","흐트러진 글루텐을 재정렬한다.","방향성 물질을 생성하여 맛과 향을 좋게 한다."],a:3,e:"1.둥글리기 목적 -글루텐의 구조와 방향 정돈 -반죽의 기공을 고르게 유지 -반죽 표면에 얇은 막 형성",r:99,c:"manufacturing"},
{q:"냉동반죽의 해동을 높은 온도에서 빨리 할 경우 반죽의 표면에서 물이 나오는 드립(drip)현상이 발생하는데 그 원인이 아닌 것은?",o:["얼음결정이 반죽의 세포를 파괴 손상","반죽내 수분의 빙결분리","단백질의 변성","급속냉동"],a:3,e:"냉동반죽은 냉동시 수분이 얼면서 팽창하여 이스트를 사멸 시키거나 글루텐을 파괴 하는 것을 막기 위하여 급속 냉동을 한다.",r:99,c:"manufacturing"},
{q:"제빵 생산의 원가를 계산하는 목적으로만 연결된 것은?",o:["순이익과 총매출의 계산","이익계산, 가격결정, 원가관리","노무비, 재료비, 경비산출","생산량관리, 재고관리, 판매관리"],a:1,e:"원가 계산의 목적은 이익 계산(수익성 파악), 가격 결정(적정 판매가 산출), 원가 관리(비용 절감 및 통제)의 세 가지입니다. 노무비·재료비·경비 산출은 원가의 구성 요소이며, 생산량·재고·판매 관리는 원가 계산의 목적이 아닌 경영 관리 영역입니다.",r:99,c:"management"},
{q:"다음 중 빵의 냉각방법으로 가장 적합한 것은?",o:["바람이 없는 실내에서 냉각","강한 송풍을 이용한 급냉","냉동실에서 냉각","수분분사 방식"],a:0,e:"빵의 냉각방법 1. 자연냉각 : 오븐에서 나온 갓구운빵을 그냥 상온에서 두고 식히는 방법 2. 냉각촉진방법 : 빵의 하부에서 상부로 신선한 공기가 이동하면서 냉각시키는 방법 3. 공기조절방법 : 상대습도 85%. 22℃ 온도로 조절된 공기중어서 낵각시키는 방법 1번에 해당한다",r:99,c:"hygiene"},
{q:"식빵 제조 시 수돗물 온도 20℃, 사용할 물 온도 10℃, 사용물 양 4kg 일 때 사용할 얼음 양은?",o:["100g","200g","300g","400g"],a:3,e:"얼음사용량=사용물 양*(수돗물 온도-사용물 온도)/(80+수돗물 온도) =4000*(20-10)/(80+20)=400",r:99,c:"manufacturing"},
{q:"건포도식빵 제조 시 2차 발효에 대한 설명으로 틀린 것은?",o:["최적의 품질을 위해 2차 발효를 짧게 한다.","식감이 가볍고 잘 끊어지는 제품을 만들 때는 2차 발효를 약간 길게 한다.","밀가루의 단백질의 질이 좋은 것일수록 오븐 스프링이 크다.","100% 중종법보다 70% 중종법이 오븐스프링이 좋다."],a:0,e:"건포도식빵은 건포도가 이스트 활성을 억제하고 반죽의 팽창력을 저하시키므로, 최적의 품질을 얻으려면 2차 발효를 일반 식빵보다 약간 길게 하여 충분한 발효 팽창을 유도해야 합니다. 따라서 '2차 발효를 짧게 한다'는 설명이 틀린 내용입니다.",r:99,c:"manufacturing"},
{q:"밀가루 중에 손상전분이 제빵 시에 미치는 영향으로 옳은 것은?",o:["반죽 시 흡수가 늦고 흡수량이 많다.","반죽 시 흡수가 빠르고 흡수량이 적다.","발효가 빠르게 진행된다.","제빵과 아무 관계가 없다."],a:2,e:"손상전분은 제빵 시 발효가 빠르게 진행되게 하고, 반죽 시 흡수가 빠르며 흡수량이 많다.",r:99,c:"ingredients"},
{q:"다음 중 밀가루에 함유되어 있지 않은 색소는?",o:["카로틴","멜라닌","크산토필","플라본"],a:1,e:"밀가루에 함유된 대부분의 색소는 크산토필이며, 약간의 카로틴과 플라본 등이 있다",r:99,c:"ingredients"},
{q:"일반적으로 신선한 우유의 pH는?",o:["4.0 ~ 4.5","3.0 ~ 4.0","5.5 ~ 6.0","6.5 ~ 6.7"],a:3,e:"우유의 pH는 6.6 이다.",r:99,c:"ingredients"},
{q:"글리세린(glycerin, glycerol)에 대한 설명으로 틀린 것은?",o:["무색, 무취한 액체이다.","3개의 수산기(-OH)를 가지고 있다.","색과 향의 보존을 도와준다.","탄수화물의 가수분해로 얻는다."],a:3,e:"글리세린=3개의 수산기(-OH)를 가지며 지방을 가수분해해서 얻는다. 1. 보습성을 가지며 무색, 무취, 감미를 가진 시럽으로 물보다 비중이 크다.(화장품 로션에도 쓰임) 2. 용매 작용(향미제-케이크의 색과 향을 보존한다.) 3. 물*기름 유착액에 대한 안정성을 부여(유화제 역할)한다 [추가 해설] 탄수화물의 가수분해로 얻는 것은 포도당이다.",r:99,c:"ingredients"},
{q:"제빵에 있어 일반적으로 껍질을 부드럽게 하는 재료는?",o:["소금","밀가루","마가린","이스트푸드"],a:2,e:"마가린은 반죽의 탄성을 약화시킴 제과",r:99,c:"ingredients"},
{q:"전분을 효소나 산에 의해 가수분해시켜 얻은 포도당액을 효소나 알칼리 처리로 포도당과 과당으로 만들어 놓은 당의 명칭은?",o:["전화당","맥아당","이성화당","전분당"],a:2,e:"전화당 : 설탕이 묽은 산이나 인버타아제로 가수분해되어 나온 과당:포도당=1:1인 혼합물. 맥아당 : 엿당이라고도 하며, 말타아제로 분해되어 포도당과 포도당으로 분해됨 이성화당 : 전분을 효소나 산에 의해 가수분해시켜 얻은 포도당액을 효소나 알칼리처리로 포도당과 과당으로 만든것, 청정음료",r:99,c:"ingredients"},
{q:"빵 반죽의 이스트 발효 시 주로 생성되는 물질은?",o:["물＋이산화탄소","알코올＋이산화탄소","알코올＋물","알코올＋글루텐"],a:1,e:"발효 진행과정 (1) 밀가루 전분 - 덱스트린 - 맥아당 - 포도당 - CO2(이산화탄소) + 알코올 + 열 + 산 분해 효소 : α 아밀라제 - β 아밀라제 - 말타제 - 찌마제 발효 진행과정 (2) 설탕 - 과당/포도당 - CO2(이산화탄소) + 알코올 *설탕이 들어가는 반죽은 진행과정 1과 2가 같이 일어난다.",r:99,c:"ingredients"},
{q:"직접반죽법에 의한 발효 시 가장 먼저 발효되는 당은?",o:["맥아당 (maltose)","포도당 (glucose)","과당 (fructose)","갈락토오스(galactose)"],a:1,e:"직접반죽법에서 이스트는 포도당(glucose)을 가장 먼저 발효시킨다. 발효 순서: 포도당 → 과당 → 자당 → 맥아당이다.",r:93,c:"ingredients"},
{q:"제빵 시 경수를 사용할 때 조치사항이 아닌 것은?",o:["이스트 사용량 증가","맥아 첨가","이스트푸드양 감소","급수량 감소"],a:3,e:"경수(180ppm이상) : 아경수(120-180ppm) : 아연수(60-120ppm) : 연수(60ppm이하) 제과제빵에 적합한 물 : 아경수 경수: 센물이라고 하며, 반죽하였을때 단단하고 발효가 느리다. 경수사용시 물양증가,이스트사용량 증가,소금 감소(경화작용),맥아첨가 연수: 단물이라고 하며, 반죽하였을때 반죽이 질고 발효가 과다하다. 연수사용시 물양감소,이스트감소,소금 적절히 사용, 이스트푸드 첨가(산화제역할)",r:99,c:"ingredients"},
{q:"달걀의 특징적 성분으로 지방의 유화력이 강한 성분은?",o:["레시틴(lecithin)","스테롤(sterol)","세팔린(cephalin)","아비딘(avidin)"],a:0,e:"달걀 노른자를 뜻하는 그리스어 lekithos에서 따온 레시틴은 1850년대에 달걀 노른자에서 처음 분리 되었습니다. 달걀은 껍질(10%)흰자(60%)노른자(30%)로 구성되어있는데 노른자의 인지질의 70%인 레시틴이 유화성분이 들어있습니다. (마요네즈,프렌치 드레싱,아이스크림등",r:99,c:"ingredients"},
{q:"다음 당류 중 감미도가 가장 낮은 것은?",o:["유당","전화당","맥아당","포도당"],a:0,e:"저는 과당(175)>전화당(130)>자당(100)>포도당(75)>맥아당=갈라토오스(32)>유당(16)",r:99,c:"ingredients"},
{q:"다음 중 밀가루 제품의 품질에 가장 크게 영향을 주는 것은?",o:["글루텐의 함유량","빛깔, 맛, 향기","비타민 함유량","원산지"],a:0,e:"글루텐의 함유량에 따라 강력분(1등급),중력분(2),박력분(3)으로 나뉜다. 제과",r:99,c:"ingredients"},
{q:"유화제에 대한 설명으로 틀린 것은?",o:["계면활성제라고도 한다.","친유성기와 친수성기를 각 50%씩 갖고 있어 물과 기름의 분리를 막아준다.","레시틴, 모노글리세라이드, 난황 등이 유화제로 쓰인다.","빵에서는 글루텐과 전분사이로 이동하는 자유수의 분포를 조절하여 노화를 방지한다."],a:1,e:"친유성기와 친수성기가 1:1로 되어있어 유지에도 녹고 물에도 분산됨",r:99,c:"ingredients"},
{q:"비터 초콜릿 (Bitter Chocolate) 32% 중에서 코코아가 약 얼마 정도 함유되어 있는가?",o:["8%","16%","20%","24%"],a:2,e:"비터초콜릿 구성 성뷴 중 함량은 5/8이므로 32% * 5/8 = 20%",r:99,c:"ingredients"},
{q:"검류에 대한 설명으로 틀린 것은?",o:["유화제, 안정제, 점착제 등으로 사용된다.","낮은 온도에서도 높은 점성을 나타낸다.","무기질과 단백질로 구성되어 있다.","친수성 물질이다."],a:2,e:"무기질과 단백질이 아닌 탄수화물로 이루어져 있습니다",r:99,c:"nutrition"},
{q:"아미노산의 성질에 대한 설명 중 옳은 것은?",o:["모든 아미노산은 선광성을 갖는다.","아미노산은 융점이 낮아서 액상이 많다.","아미노산은 종류에 따라 등전점이 다르다.","천연단백질을 구성하는 아미노산은 주로 D형이다."],a:2,e:"정답 : 3번 ... 해설 등전점이란 : (+),(-) 전하량이 같아져서 단백질이 중성이 되는 PH 시기를 말한다. 등전점에서는 용해도가 낮아져 결정을 석출한다. 아미노산은 단백질을 구성하며 단백질의 특성을 부여한다. 제과",r:99,c:"nutrition"},
{q:"무기질에 대한 설명으로 틀린 것은?",o:["나트륨은 결핍증이 없으며 소금, 육류 등에 많다.","마그네슘 결핍증은 근육약화, 경련 등이며 생선, 견과류 등에 많다.","철은 결핍 시 빈혈증상이 있으며 시금치, 두류 등에 많다.","요오드 결핍 시에는 갑상선종이 생기며 유제품, 해조류 등에 많다."],a:0,e:"마그네슘이 결핍시 혈압&수족냉증이 생깁니다 마그네슘은 다시마,견과류,바나나,콩류,아보카도,우유입니다",r:99,c:"nutrition"},
{q:"단백질의 소화, 흡수에 대한 설명으로 틀린 것은?",o:["단백질은 위에서 소화되기 시작한다.","펩신은 육류 속 단백질일부를 폴리펩티드로 만든다.","십이지장에서 췌장에서 분비된 트립신에 의해 더 작게 분해된다.","소장에서 단백질이 완전히 분해되지는 않는다."],a:3,e:"소장에서 단백질이 완전히 흡수됩니다",r:99,c:"nutrition"},
{q:"우유 1컵 (200mL)에 지방이 6g이라면 지방으로부터 얻을 수 있는 열량은?",o:["6kcal","24kcal","54kcal","120kcal"],a:2,e:"지방 1g당 9kcal를 냅니다.지방 6g이므로 6×9=54(kcal)입니다.",r:99,c:"nutrition"},
{q:"혈당의 저하와 가장 관계가 깊은 것은?",o:["인슐린","리파아제","프로테아제","펩신"],a:0,e:"혈당유지호르몬=인슐린 체내 0.1%유지",r:99,c:"nutrition"},
{q:"식자재의 교차오염을 예방하기 위한 보관방법으로 잘못된 것은?",o:["원재료와 완성품을 구분하여 보관","바닥과 벽으로부터 일정거리를 띄워 보관","뚜껑이 있는 청결한 용기에 덮개를 덮어서 보관","식자재와 비식자재를 함께 식품 창고에 보관"],a:3,e:"식자재와 비식자재(세제, 소독제 등)를 함께 식품창고에 보관하면 교차오염이 발생할 수 있어 반드시 분리 보관해야 한다.",r:93,c:"hygiene"},
{q:"경구감염병과 거리가 먼 것은?",o:["유행성 간염","콜레라","세균성이질","일본뇌염"],a:3,e:"일본뇌염은 경피감염병. 제과",r:99,c:"hygiene"},
{q:"마시는 물 또는 식품을 매개로 발생하고 집단 발생의 우려가 커서 발생 또는 유행 즉시 방역대책을 수립하여야 하는 감염병은?",o:["제1군 감염병","제2군 감염병","제3군 감염병","제4군 감염병"],a:0,e:"제1군 감염병은 물·식품 매개로 집단 발생 우려가 커서 즉시 방역대책을 수립해야 하는 감염병이다. 콜레라, 장티푸스, 세균성이질 등이 해당한다.",r:93,c:"hygiene"},
{q:"세균이 분비한 독소에 의해 감염을 일으키는 것은?",o:["감염형 세균성 식중독","독소형 세균성 식중독","화학성 식중독","진균독 식중독"],a:1,e:"독소형 세균성 식중독은 세균이 분비한 독소에 의해 발생한다. 포도상구균, 보툴리누스균이 대표적이다.",r:85,c:"hygiene"},
{q:"식품첨가물의 사용에 대한 설명 중 틀린 것은?",o:["식품첨가물 공전에서 식품첨가물의 규격 및 사용기준을 제한하고 있다.","식품첨가물은 안전성이 입증된 것으로 최대사용량의 원칙을 적용한다.","GRAS란 역사적으로 인체에 해가 없는 것이 인정된 화합물을 의미한다.","ADI란 일일섭취허용량을 의미한다."],a:1,e:"식품첨가물은 최소사용량의 원칙으로 한다.",r:99,c:"nutrition"},
{q:"위해요소중점관리기준(HACCP)을 식품별로 정하여 고시하는 자는?",o:["보건복지부장관","식품의약품안전청장","시장, 군수, 또는 구청장","환경부장관"],a:1,e:"HACCP을 식품별로 정하여 고시하는 자는 식품의약품안전청장(현 식품의약품안전처장)이다.",r:85,c:"hygiene"},
{q:"경구감염병에 관한 설명 중 틀린 것은?",o:["미량의 균으로 감염이 가능하다.","식품은 증식매체이다.","감염환이 성립된다.","잠복기가 길다."],a:1,e:"식중독과 경구감염병을 비교해서 암기하면 도움이 됨 식중독은 잠복기가 짧고, 면역이 안되며 2차감염이 없고 다량의 균으로 발생하며 식품을 통해 감염됨 반대로 경구감영병은 잠복기가 길며 면역이 되고 2차감염이 있으며 미량의 균으로 발생한다.",r:99,c:"hygiene"},
{q:"주기적으로 열이 반복되어 나타나므로 파상열이라고 불리는 인수공통감염병은?",o:["Q열","결핵","브루셀라병","돈단독"],a:2,e:"브루셀라증이란 산양, 양, 돼지, 소에게 감염되면 유산을 일으키는데 인체에 감염 시 고열(38~40℃)이 2~3주 주기적으로 나타나 파상열이라고도 불린다. 제과",r:99,c:"hygiene"},
{q:"메틸알코올의 중독 증상과 거리가 먼 것은?",o:["두통","구토","실명","환각"],a:3,e:"메탄올은 포름 알데히드 및 ​​아세트산의 제조와 화학 합성, 부동액 및 용매로 사용되는 무색의 인화성 액체이다. 메탄올을 섭취할 경우 두통과 구토를하며 심하면. 실명의 원인이 될 수 있다. [출처 MeSH]",r:99,c:"manufacturing"},
{q:"보툴리누스 식중독에서 나타날 수 있는 주요 증상 및 증후가 아닌 것은?",o:["구토 및 설사","호흡곤란","출혈","사망"],a:2,e:"보툴리누스균 증상은 구토및설사,호흡곤란,사망,시력저하,동공확대,신경마비가 일어난다",r:99,c:"hygiene"}]},
{title:"2007년 2회",desc:undefined,questions:[{q:"다음 중 화학적 팽창 제품이 아닌 것은?",o:["과일케이크","팬케이크","파운드케이크","시퐁케이크"],a:3,e:"시퐁케이크는 베이킹파우더를 사용하지 않는다.",r:99,c:"manufacturing"},
{q:"도넛을 튀길 때 사용하는 기름에 대한 설명으로 틀린 것은?",o:["기름이 적으면 뒤집기가 쉽다.","발연점이 높은 기름이 좋다.","기름이 너무 많으면 온도를 올리는 시간이 길어진다.","튀김 기름의 평균 깊이는 12~15cm 정도가 좋다."],a:0,e:"기름이 적으면 바닥면에 가까워 한쪽면만 먼저 많이 익음, 뒤집을때 걸리적거림",r:99,c:"ingredients"},
{q:"파운드케이크를 구울 때 윗면이 자연적으로 터지는 경우가 아닌 것은?",o:["굽기 시작 전에 증기를 분무할 때","설탕 입자가 용해되지 않고 남아 있을 때","반죽내 수분이 불충분할 때","오븐 온도가 높아 껍질 형성이 너무 빠를 때"],a:0,e:"수분이 부족할 때 껍질 형성이 너무 빨라 터집니다. 설탕이 녹지 않고 있으면 수분이 부족해지고 오븐 온도가 높으면 수분손실이 커집니다. 굽기 전에 증기를 분무하면 수분이 충분하니 터지지 않습니다. 제과",r:99,c:"manufacturing"},
{q:"데블스푸드 케이크에서 전체 액체량을 구하는 식은?",o:["설탕＋30＋(코코아×1.5)","설탕－30－(코코아×1.5)","설탕＋30－(코코아×1.5)","설탕－30＋(코코아×1.5)"],a:0,e:"전체 액체량은 우유와 계란의 합으로 이루어진다. 우유+계란=설탕+30+(코코아×1.5)",r:99,c:"ingredients"},
{q:"푸딩 제조공정에 관한 설명으로 틀린 것은?",o:["모둔 재료를 섞어서 체에 거른다.","푸딩컵에 반죽을 부어 중탕으로 굽는다.","우유와 설탕을 섞어 설탕이 캐러멜화될 때까지 끊인다.","다른 그릇에 계란, 소금 및 나머지 설탕을 넣고 혼합한 후 우유를 섞는다."],a:2,e:"우유와 설탕을 섞어 끓기 직전인 80~90°C까지 데운다.",r:99,c:"ingredients"},
{q:"물엿을 계량할 때 바람직하지 않은 방법은?",o:["설탕 계량 후 그 위에 계량한다.","스테인리스 그릇 혹은 플라스틱 그릇을 사용하는 것이 좋다.","살짝 데워서 계량하면 수월할 수 있다.","일반 갱지를 잘 잘라서 그 위에 계량하는 것이 좋다."],a:3,e:"갱지 위에 계랑을 하면 물엿이 달라 붙어 재료 손실량이 많아진다.",r:99,c:"ingredients"},
{q:"머랭 제조에 대한 설명으로 옳은 것은?",o:["기름기나 노른자가 없어야 튼튼한 거품이 나온다.","일반적으로 흰자 100에 대하여 설탕 50의 비율로 만든다.","고속으로 거품을 올린다.","설탕을 믹싱 초기에 첨가하여야 부피가 커진다."],a:0,e:"2. 설탕2 : 흰자1 비율",r:99,c:"ingredients"},
{q:"옐로 레이어 케이크의 비중이 낮을 경우에 나타나는 현상은?",o:["부피가 작아진다.","상품적 가치가 높다.","조직이 무겁게 된다.","구조력이 약화되어 중앙 부분이 함몰한다."],a:3,e:"옐로 레이어 케이크의 비중이 낮으면 공기가 과다 혼입되어 구조력이 약화되고, 굽는 동안 중앙 부분이 함몰된다.",r:93,c:"manufacturing"},
{q:"다음 중 쿠키의 퍼짐성이 작은 이유가 아닌 것은?",o:["믹싱이 지나침","높은 온도의 오븐","너무 진 반죽","너무 고운 입자의 설탕 사용"],a:2,e:"반죽이 너무 질면 흐름성이 커져 제품이 퍼지게 된다.",r:99,c:"manufacturing"},
{q:"다음 중 비용적이 가장 큰 제품은?",o:["파운드 케이크","레이어 케이크","스펀지 케이크","식빵"],a:2,e:"스펀지 케이크 5.08cm3/g 식빵 3.3~4.0cm3/g 레이어 케이크 2.96cm3/g 파운드케이크 2.4cm3/g",r:99,c:"manufacturing"},
{q:"포장된 제과 제품의 품질 변화 현상이 아닌 것은?",o:["전분의 호화","향의 변화","촉감의 변화","수분의 이동"],a:0,e:"전분의 호화 : 전분에 물과 열을 가열하면 수분을 흡수하면서 팽윤되며 점성이 커져 부풀어 반투명의 풀 상태로 되는 현상",r:99,c:"ingredients"},
{q:"스펀지케이크를 부풀리는 주요 방법은?",o:["계란의 기포성에 의한 법","이스트에 의한 법 넣어 휴지시킨 후 사용한다.","화학팽창제에 의한 법","수증기 팽창에 의한 법"],a:0,e:"물리적팽창방법으로 계란의 기포성을 이용한다",r:99,c:"ingredients"},
{q:"파이를 만들 때 충전물이 흘러 나왔을 경우 그 원인이 아닌 것은?",o:["충전물 양이 너무 많다.","충전물에 설탕이 부족하다.","껍질에 구멍을 뚫어 놓지 않았다.","오븐 온도가 낮다."],a:1,e:"설탕은 반죽에 흐름성을 부여함으로 너무 많이 넣으면 충전물이 흘러 넘친다.",r:99,c:"manufacturing"},
{q:"다음 중 버터크림 당액 제조시 설탕에 대한 물 사용량으로 가장 알맞은 것은?",o:["25%","80%","100%","125%"],a:0,e:"당액이란 설탕시럽을 의미하며, 설탕의 25~30% 정도의 물을 넣고 114~118°c로 끓인다 제과",r:99,c:"ingredients"},
{q:"롤 케이크를 말 때 표면이 터질 경우의 조치사항으로 바람직하지 않은 것은?",o:["팽창제 사용량을 감소시킨다.","노른자 사용량을 높인다.","덱스트린을 사용하여 점착성을 높인다.","설탕의 일부를 물엿으로 대체한다."],a:1,e:"롤케이크를 부드럽게 말릴 수 있도록 하는것은 흰자이다. 제과",r:99,c:"ingredients"},
{q:"소규모 제과점용으로 가장 많이 사용되며 반죽을 넣는 입구와 제품을 꺼내는 출구가 같은 오븐은?",o:["컨벡션오븐","터널오븐","릴오븐","데크오븐"],a:3,e:"오븐 넣는 입구와 나오는 출구가 다른 것은 터널 오븐입니다.",r:99,c:"manufacturing"},
{q:"2차 발효에 대한 설명으로 틀린 것은?",o:["이산화탄소를 생성시켜 최대한의 부피를 얻고 글루텐을 신장시키는 과정이다.","2차 발효실의 온도는 반죽의 온도보다 같거나 높아야 한다.","2차 발효실의 습도는 평균 75~90% 정도이다.","2차 발효실의 습도가 높을 경우 겉껍질이 형성되고 터짐 현상이 발생한다."],a:3,e:"겉껍질이 형성되고 터짐현상이 발생하는 원인은 2차 발효실의 습도가 낮은 경우이다. 제과",r:99,c:"manufacturing"},
{q:"다음 중 표준 스트레이트법에서 믹싱 후 반죽온도로 가장 적합한 것은?",o:["21˚C","27˚C","33˚C","39℃"],a:1,e:"표준 스트레이트법의 적정 반죽 온도는 27℃이다.\n• 스펀지·도법의 스펀지 반죽 온도(24℃)보다 높다.",r:77,c:"manufacturing"},
{q:"우유 2000g을 사용하는 식빵 반죽에 전지분유를 사용할 때 분유와 물의 사용량은?",o:["분유 100g, 물 1900g","분유 200g, 물 1800g","분유 400g, 물 1600g","분유 600g, 물 1400g"],a:1,e:"우유 2000g을 전지분유로 대체 시: 분유 = 우유 × 10% = 200g, 물 = 우유 - 분유 = 1800g\n※ 전지분유의 환원 비율은 1:9 (분유 1에 물 9)이다.",r:88,c:"ingredients"},
{q:"냉동 페이스트리를 구운 후 옆면이 주저앉는 원인으로 틀린 것은?",o:["토핑물이 많은 경우","잘 구워지지 않은 경우","2차 발효가 과다한 경우","해동온도가 2~5℃로 낮은 경우"],a:3,e:"냉동 페이스트리를 해동 시킬 때, 냉장이 아닌 고온에서 해동시키면 옆면이 주저 않는다. 제과",r:99,c:"manufacturing"},
{q:"일반 제빵 제품의 성형과정 중 작업실의 온도 및 습도로 가장 바람직한 것은?",o:["온도 25~28℃, 습도 70~75%","온도 10~18℃, 습도 65~70%","온도 25~28℃, 습도 90~95%","온도 10~18℃, 습도 80~85%"],a:0,e:"일반 제빵 제품의 성형 작업실은 온도 25~28℃, 습도 70~75%가 적합하다.\n• 너무 낮은 온도·습도는 반죽 건조, 너무 높으면 발효 과다의 원인이 된다.",r:93,c:"manufacturing"},
{q:"제품을 포장하는 목적이 아닌 것은?",o:["미생물에 의한 오염방지","빵의 노화 지연","수분 증발 촉진","상품 가치 향상"],a:2,e:"포장의 목적은 미생물 오염 방지, 노화 지연, 상품 가치 향상, 수분 증발 방지이다. 수분 증발 촉진은 포장의 목적이 아니다.",r:90,c:"manufacturing"},
{q:"노타임법에 의한 빵 제조에 관한 설명으로 잘못된 것은?",o:["믹싱시간을 20~25% 길게 한다.","산화제와 환원제를 사용한다.","물의 양을 1%정도 줄인다.","설탕의 사용량을 다소 감소시킨다."],a:0,e:"L-시스테인, 프로테아제 등을 사용하여 밀단백질의 S-S결합을 절단하여 반죽발전을 단축시켜 믹싱시간을 25% 줄인다 제과",r:99,c:"manufacturing"},
{q:"일반적인 1차 발효실의 가장 이상적인 습도는?",o:["45~50%","55~60%","65~70%","75~80%"],a:3,e:"1차 발효실의 이상적 습도는 65~70%이다.\n• 2차 발효실(85%)보다 낮게 유지한다.",r:85,c:"manufacturing"},
{q:"빵 제품의 노화(Staling)에 관한 설명으로 틀린 것은?",o:["제품이 오븐에서 나온 후부터 서서히 진행된다.","소화흡수에 영향을 준다.","내부 조직이 단단해진다.","지연시키기 위하여 냉장고에 보관하는 것이 좋다."],a:3,e:"빵의 노화를 지연시키려면 냉장(0~5℃)이 아닌 냉동(-18℃ 이하)에 보관해야 한다. 냉장 온도 범위에서는 전분의 노화가 가장 빠르게 진행된다.",r:85,c:"nutrition"},
{q:"다음 중 총원가에 포함되지 않는 것은?",o:["제조설비의 감가상각비","매출원가","직원의 급료","판매이익"],a:3,e:"총 원가: 제조원가(매출원가)+판매비+일반관리비(감가상각비, 직원급료)",r:99,c:"management"},
{q:"팬에 바르는 기름은 다음 중 무엇이 높은 것을 선택해야 하는가?",o:["산가","크림성","가소","발연점"],a:3,e:"팬에 바르는 기름은 발연점이 높은 것을 선택해야 한다. 발연점이 낮으면 굽기 과정에서 연기가 나고 유해물질이 생성된다.",r:90,c:"ingredients"},
{q:"식빵의 밑이 움푹 패이는 원인이 아닌 것은?",o:["2차 발효실의 습도가 높을 때","팬의 바닥에 수분이 있을 때","오븐 바닥열이 약할 때","팬에 기름칠을 하지 않을 때"],a:2,e:"오븐 바닥열이 강할 때 식빵 밑바닥이 움푹 패이는 결점이 생긴다.",r:99,c:"manufacturing"},
{q:"반죽할 때 반죽의 온도가 높아지는 주된 이유는?",o:["마찰열이 발생하므로","이스트가 번식하므로","원료가 용해되므로","글루텐이 발달되므로"],a:0,e:"반죽 온도가 높아지는 주된 이유는 믹싱 중 마찰열이 발생하기 때문이다.\n• 이스트 번식, 원료 용해, 글루텐 발달도 영향을 주지만 마찰열이 가장 크다.",r:93,c:"ingredients"},
{q:"같은 조건의 반죽에 설탕, 포도당, 과당을 같은 농도로 첨가했다고 가정할 때 마이야르 방응속도를 촉진시키는 순서대로 나열된 것은?",o:["설탕-포도당-과당","과당-설탕-포도당","과당-포도당-설탕","포도당-과당-설탕"],a:2,e:"마이야르 반응 속도는 단당류가 이당류보다 빠르며, 과당 > 포도당 > 설탕 순이다. 과당은 환원당 중 반응성이 가장 높다.",r:85,v:0,c:"ingredients"},
{q:"이스트에 질소 등의 영양을 공급하는 제빵용 이스트푸드의 성분은?",o:["칼슘염","암모늄염","브롬염","요오드염"],a:1,e:"암모늄염(황산암모늄, 인산암모늄 등)은 이스트에 질소를 공급하는 이스트푸드의 성분이다.",r:85,c:"nutrition"},
{q:"제빵에서 설탕의 기능으로 틀린 것은?",o:["이스트의 영양분이 됨","껍질색을 나게 함","향을 향상시킴","노화를 촉진시킴"],a:3,e:"설탕은 이스트 영양분, 껍질색(갈색반응), 향미 향상에 기여하지만 노화를 촉진시키지 않는다. 오히려 설탕은 수분 보유력을 높여 노화를 지연시킨다.",r:93,c:"ingredients"},
{q:"계면활성제의 친수성-친유성 균형(HLB)이 다음과 같을 때 친수성인 것은?",o:["5","7","9","11"],a:3,e:"HLB값이 클수록 친수성, 낮을 수록 친유성이다.",r:99,c:"nutrition"},
{q:"다음 탄수화물 중 요오드 용액에 의하여 청색반응을 보이면 B-아밀라아제에 의해 맥아당으로 바뀌는 것은?",o:["아밀로오스","아밀로펙틴","포도당","유당"],a:0,e:"아밀로오스는 요오드 용액에 청색반응을 보이며, β-아밀라아제에 의해 맥아당(말토오스)으로 분해된다.\n• 아밀로펙틴은 적자색 반응을 보인다.",r:93,c:"ingredients"},
{q:"제빵에서 밀가루, 이스트, 물과 함께 기본적인 필수재료는?",o:["분유","유지","소금","설탕"],a:2,e:"제빵의 4대 기본 필수재료는 밀가루, 이스트, 물, 소금이다. 소금은 발효 조절, 글루텐 강화, 풍미 부여 등 필수적인 역할을 한다.",r:90,c:"ingredients"},
{q:"안정제를 사용하는 목적으로 적합하지 않은 것은?",o:["아이싱의 끈적거림 방지","크림 토핑의 거품 안정","머랭의 수분 배출 촉진","포장성 개선"],a:2,e:"안정제의 목적은 거품 안정, 끈적거림 방지, 포장성 개선 등이다. 머랭의 수분 배출 촉진은 안정제의 목적이 아니라, 오히려 수분 보유를 돕는다.",r:93,c:"ingredients"},
{q:"젖은 글루텐 중의 단백질 함량이 12%일 때 건조 글루텐의 단백질 함량은?",o:["12%","24%","36%","48%"],a:2,e:"젖은 글루텐의 수분 함량은 약 75%이므로 고형분은 25%이다.\n젖은 글루텐 단백질 12% → 건조 시 수분 제거(75%) → 건조 글루텐의 단백질 = 12% ÷ 0.25 = 48%",r:92,c:"ingredients"},
{q:"다음 중 물의 경도를 잘못 나타낸 것은?",o:["10ppm - 연수","70ppm - 아연수","100ppm - 아연수","190ppm - 아경수"],a:3,e:"아경수 120-180 ppm",r:99,c:"ingredients"},
{q:"다음 효소 중 과당을 분해하여 CO2와 알코올을 만드는 효소는?",o:["리파아제(lipase)","프로테아제(protease)","찌마아제(zymase)","말타아제(maltase)"],a:2,e:"찌마아제(zymase)는 효모가 가지고 있는 효소로, 과당·포도당을 분해하여 CO₂와 알코올을 생성한다.\n• 리파아제: 지방분해, 프로테아제: 단백질분해, 말타아제: 맥아당분해",r:93,c:"ingredients"},
{q:"밀가루 반죽을 끊어질 때까지 늘려서 반죽의 신장성을 알아보는 기계는?",o:["아밀로그래프","패리노그래프","익스텐소그래프","믹소그래프"],a:2,e:"패리노그래프- 흡수율, 믹싱시간, 믹싱내구성 아밀로그래프- 밀가루 점도 익스텐소그래프- 신장성(탄력성)",r:99,c:"ingredients"},
{q:"글루텐을 형성하는 단백질 중 수용성 단백질은?",o:["글리아딘","글루테닌","메소닌","글로불린"],a:3,e:"글로불린은 묽은 염류 용액에 녹는 단백질로 염용성 단백질에 해당한다. 문제에서는 '수용성 단백질'로 분류하고 있다.\n• 글리아딘: 알코올 용해성, 글루테닌: 묽은 산·알칼리 용해성\n• 글루텐을 형성하는 단백질은 글리아딘과 글루테닌이며, 글로불린은 글루텐 형성에 직접 관여하지 않는다.",r:93,c:"nutrition"},
{q:"유지의 산패 정도를 나타내는 값이 아닌 것은?",o:["산가","요오드가","아세틸가","과산화물가"],a:1,e:"요오드가(IV)는 유지의 불포화도(이중결합 수)를 측정하는 값으로, 산패 정도와는 관계없다. 산가(AV), 과산화물가(POV), 카보닐가(CV) 등이 산패 정도를 나타내는 지표이며, 아세틸가는 유지 중 수산기(-OH)의 양을 나타낸다.",r:75,c:"ingredients"},
{q:"우유 성분으로 제품의 껍질색을 빨리 일어나게 하는 것은?",o:["젖산","카제인","무기질","유당"],a:3,e:"유당(lactose)은 환원당으로 마이야르 반응에 참여하여 제품의 껍질색을 빨리 일어나게 한다.\n• 젖산, 카제인, 무기질은 껍질색에 직접적 영향이 적다.",r:90,c:"nutrition"},
{q:"수소이온농도(pH)가 5인 경우의 액성은?",o:["산성","중성","알칼리성","무성"],a:0,e:"기준: 0산성 7중성 14알칼리성",r:99,c:"nutrition"},
{q:"다음 중 신선한 계란의 특징은?",o:["8% 식염수에 뜬다.","흔들었을 때 소리가 난다.","난황계수가 0.1 이하이다.","껍질에 광택이 없고 거칠다."],a:3,e:"신선한 계란은 껍질이 거칠고 광택이 나지 않는다. 6-10% 소금물에 넣었을때 가로로 가라 앉으며, 흔들어 보았을 때 소리가 나지 않는다. 난황계수는 0.361~0.442 이다. 제과",r:99,c:"ingredients"},
{q:"췌장에서 생성되는 지방 분해효소는?",o:["트립신","아밀라아제","펩신","리파아제"],a:3,e:"췌장에서 생성되는 지방분해효소는 스테압신(=리파아제)이며 에스테르 결합을 가수분해하여 지방산+글리세린으로 전환시킨다 제과",r:99,c:"nutrition"},
{q:"비타민의 일반적인 결핍증이 잘못 연결된 것은?",o:["비타민 B12-부종","비타민 D-구루병","나이아신-펠라그라","리보플라빈-구내염"],a:0,e:"비타민 B12 의 결핍증은 빈혈임",r:99,c:"nutrition"},
{q:"유당분해효소결핍증(유당불내증)의 일반적인 증세가 아닌 것은?",o:["복부경련","설사","발진","메스꺼움"],a:2,e:"유당불내증의 증상은 복부경련, 설사, 메스꺼움, 복부팽만 등이다. 발진은 알레르기 반응의 증상으로 유당불내증과 관계가 적다.",r:90,c:"ingredients"},
{q:"아미노산과 아미노산간의 결합은?",o:["글리코사이드 결합","펩타이드 결합","a-1,4 결합","에스테르 결합"],a:1,e:"아미노산 간의 결합은 펩타이드(peptide) 결합이다. 한 아미노산의 카르복실기(-COOH)와 다른 아미노산의 아미노기(-NH₂)가 탈수축합 반응하여 형성된다.",r:93,c:"nutrition"},
{q:"건조된 아모든 100g 탄수화물 16g, 단백질 18g, 지방 54g, 무기질 3g, 수분 6g, 기타성분 등을 함유하고 있다면 이 건조된 아모든 100g의 열량은?",o:["약 200kcal","약 364kcal","약 622kcal","약 751kcal"],a:2,e:"열량 = (탄수화물 16g + 단백질 18g) × 4kcal + 지방 54g × 9kcal = 136 + 486 = 622kcal\n• 수분, 무기질은 열량을 내지 않는다.",r:93,c:"nutrition"},
{q:"정제가 불충분한 기름 중에 남아 식중독을 일으키는 고시폴(gossypol)은 어느 기름에서 유래하는가?",o:["피마자유","콩기름","면실유","미강유"],a:2,e:"고시폴(gossypol)은 면실(목화씨)에 함유된 독성물질로, 정제가 불충분한 면실유에 남아 식중독을 일으킬 수 있다.",r:90,c:"hygiene"},
{q:"클로스트리디움 보툴리늄 식중독과 관련 있는 것은?",o:["화농성 질환의 대표균","저온살균 처리로 예방","내열성 포자 형성","감염형 식중독"],a:2,e:"클로스트리디움 보툴리늄(Clostridium botulinum)은 내열성 포자를 형성하는 혐기성 세균이다. 독소형 식중독을 일으키며, 통조림 등 혐기 환경에서 증식한다.",r:93,c:"hygiene"},
{q:"장염 비브리오균에 감염되었을 때 나타나는 주요 증상은?",o:["급성위장염 질환","피부농포","신경마비 증상","간경변 증상"],a:0,e:"장염 비브리오균 어패류, 해조류 를 생식 했을 경우에 감염될 수 있다. 구토, 설사, 발열, 복통 등 주요 증상이 나타난다.",r:99,c:"hygiene"},
{q:"세균성식중독과 비교하여 경구전염병의 특징이 아닌 것은?",o:["적은 양의 균으로도 질병을 일으킬 수 있다.","2차 감염이 된다.","잠복기가 비교적 짧다.","감염 후 면역형성이 잘 된다."],a:2,e:"세균성식중동은 잠복기가 짧고 면역이 안되며 2차감염이 없고 다량의 균으로 발생한다. 사전예방이 가능하다 겸구전염병은 잠복기가 길고 면역이 되며 2차감염이 있고 미량의 균으로도 발생한다. 제과",r:99,c:"hygiene"},
{q:"다음 중 세균에 의한 경구전염병은?",o:["콜레라","유행성 간염","폴리오","살모넬라증"],a:0,e:"콜레라 1종 법정 감염병",r:99,c:"hygiene"},
{q:"식품첨가물의 사용 조건으로 바람직하지 않은 것은?",o:["식품의 영양가를 유지할 것","다량으로 충분한 효과를 낼 것","이미, 이취 등의 영향이 없을 것","인체에 유해한 영향을 끼치지 않을 것"],a:1,e:"식품첨가물은 소량으로 충분한 효과를 내야 바람직하다. 다량으로 효과를 내야 하는 것은 바람직하지 않은 조건이다.",r:93,c:"nutrition"},
{q:"다음 중 우리나라에서 허용되어 있지 않는 감미료는?",o:["시클라민산나트륨","사카린나트륨","아세설팜 K","스테비아 추출물"],a:0,e:"시클라민산나트륨(시클라메이트)은 발암 우려로 우리나라에서 사용이 금지된 인공 감미료이다.\n• 사카린나트륨, 아세설팜K, 스테비아 추출물은 허용되어 있다.",r:93,c:"nutrition"},
{q:"미생물에 의해 주로 단백질이 변화되어 악취, 유해물질을 생성하는 현상은?",o:["발효(Fermentation)","부패(Puterifaction)","변패(Deterioration)","산패(Rancidity)"],a:1,e:"*부패 : 단백질 성분이 혐기성 세균에 의한 분해과정에서 악취와 유해물질을 생성하는 현상 *변배 : 탄수화물, 지방 식품이 미생물의 분해 작용으로 냄새나 맛이 변화하는 현상 *산패 : 지방이 산소와 결합하여 산화되어 악취나 변색이 일어나는 현상(미생물 변화가 아님)",r:99,c:"hygiene"},
{q:"식중독에 관한 설명 중 잘못된 것은?",o:["세균성 식중독에는 감염형과 독소형이 있다.","자연독 식중독에는 동물성과 식물성이 있다.","곰팡이독 식중독은 맥각, 황변미 독소 등에 의하여 발생한다.","식이성 알레르기는 식이로 들어온 특정 탄수화물 성분에 면역계가 반응하지 못하여 생긴다."],a:3,e:"식이성 알레르기는 특정 단백질 성분에 면역계가 과민반응하는 것이지 탄수화물에 대한 것이 아니다.",r:85,c:"hygiene"},
{q:"다음 중 저온 장시간 살균법으로 가장 일반적인 조건은?",o:["72~75℃ 15초간 가열","60~65℃ 30분간 가열","130~150℃ 1초 이하 가열","95~120℃ 30~60분간 가열"],a:1,e:"저온 장시간 살균법(LTLT): 60~65℃에서 30분간 가열한다.\n• 72~75℃ 15초: 고온 단시간(HTST), 130~150℃ 1초 이하: 초고온(UHT)",r:93,c:"hygiene"}]},
{title:"2007년 4회",desc:undefined,questions:[{q:"쿠키 포장지의 특성으로써 적합하지 않은 것은?",o:["내용물의 색, 향이 변하지 않아야 한다.","독성 물질이 생성되지 않아야 한다.","통기성이 있어야 한다.","방습성이 있어야 한다."],a:2,e:"통기성이 있게되면 제품의 노화가 촉진됨",r:99,c:"manufacturing"},
{q:"비중이 0.75인 과자 반죽 1ℓ의 무게는?",o:["75g","750g","375g","1750g"],a:1,e:"비중 0.75인 반죽 1L의 무게 = 비중 × 물 1L 무게 = 0.75 × 1000g = 750g",r:85,c:"manufacturing"},
{q:"다음 중 크림법을 사용하여 만들 수 있는 제품은?",o:["슈","마블파운드케이크","버터스펀지케이크","엔젤푸드케이크"],a:1,e:"크림법은 유지와 설탕을 크림화하여 공기를 혼입시키는 방법이다. 버터스펀지케이크는 버터를 사용하면서 크림법으로 제조할 수 있다.\n• 슈는 호화법(끓인 물+밀가루), 마블파운드케이크도 크림법이지만 이미 파운드케이크 제품이다. 엔젤푸드케이크는 머랭법(흰자 거품)으로 만든다.",r:93,c:"manufacturing"},
{q:"파운드케이크를 구운 직후 계란 노른자에 설탕을 넣어 칠할 때 설탕의 역할이 아닌 것은?",o:["광택제 효과","보존기간 개선","탈색 효과","맛의 개선"],a:2,e:"설탕과 계란노른자를 합하여 파운드케익의 표면에 발라줌으로써 맛의 보완과 광택제 효과를 크게얻을수 있으며 보존기간도 늘릴 수 있다. 하지만 탈색효과는 전혀 해당되지 않는다. 제빵",r:99,c:"ingredients"},
{q:"일반적으로 반죽 1g당 팬용적을 기준으로 할 때 팽창이 가장 큰 케이크는?",o:["파운드케이크","스펀지케이크","레이어케이크","엔젤푸드케이크"],a:1,e:"스펀지케이크는 전란을 기포시켜 만든 반죽으로 반죽 1g당 팬용적이 가장 크다. 달걀의 거품으로 공기를 많이 함유하여 오븐에서 크게 팽창하며, 파운드케이크보다 훨씬 큰 팽창률을 보인다.",r:85,c:"manufacturing"},
{q:"롤 케이크를 말 때 표면이 터지는 결점에 대한 조치사항으로 틀린 것은?",o:["설탕의 일부를 물엿으로 대치하여 사용한다.","배합에 덱스트린을 사용하여 점착성을 증가시킨다.","팽창제나 믹싱을 줄여 과도한 팽창을 방지한다.","낮은 온도의 오븐에서 서서히 굽는다."],a:3,e:"롤 케이크 표면이 터지는 결점에 대한 조치로 팽창제 감소, 물엿 대체, 덱스트린 사용은 효과적이다. '팽창제나 믹싱을 줄여 과도한 팽창을 방지한다'도 올바른 조치이나, 출제 기준에서는 이것이 틀린 조치로 분류되어 있다.\n※ 낮은 온도에서 서서히 굽는 것은 수분 유지에 도움이 된다.",r:78,c:"ingredients"},
{q:"찜을 이용한 제품에 사용되는 팽창제의 특성으로 알맞은 것은?",o:["지속성","속효성","지효성","이중팽창"],a:1,e:"속효성 베이킹 파우더는 핫 케이크나 찜 케이크에 주로 쓰이며 반죽이 만들어짐과 동시에 수분과 접촉에 의해 반응한다. 주석산, 제일인산칼륨이 이에 속한다. 제과",r:99,c:"ingredients"},
{q:"오븐의 생산능력은 무엇으로 계산하는가?",o:["소모되는 전력량","오븐의 높이","오븐의 단열 정도","오븐 내 매입 철판 수"],a:3,e:"오븐의 생산능력은 오븐 내 매입 철판 수(선반 수)로 계산한다. 철판이 많을수록 한 번에 구울 수 있는 양이 많다.",r:90,c:"manufacturing"},
{q:"완제품 500g짜리 파운드케이크 1000개를 주문 받았다. 믹싱손실이 1.5%, 굽기손실이 19%, 총 배합율이 400%인 경우 20Kg짜리 밀가루는 몇 포대를 준비해야 하는가?",o:["7","8","9","10"],a:1,e:"완제품 중량= 500g x 1000개= 500kg 또는 500,000g 총 반죽량= 완제품 중량/{(1-믹싱 손실) x (1-굽기손실)} = 500 kg/{(1-0.015)x(1-0.19)} = 626.68 kg 밀가루 중량= 밀가루비율/ 총배합률 x 총반죽량 = 100%/ 400% x 628.68kg = 156.67kg 밀가루포대= 밀가루 중량/포대중량 = 156.67kg /20kg = 7.83 ->8포대",r:99,c:"manufacturing"},
{q:"퍼프페이스트리를 정형하는 방법으로 바람직하지 않은 것은?",o:["정형 후 제품의 표면을 건조시킨다.","유지를 배합한 반죽을 30분 이상 냉장고에서 휴지시킨다.","전체적으로 균일한 두께로 밀어 편다.","굽기 전에 30 ~ 60분 동안 휴지 시킨다."],a:0,e:"퍼프페이스트리 정형 후 표면을 건조시키면 결이 벌어지고 팽창이 불균일해진다. 표면은 촉촉하게 유지해야 한다.",r:90,c:"manufacturing"},
{q:"생크림 기포시 품온으로 가장 알맞은 것은?",o:["-10 ~ -1 ℃","1 ~ 10℃","15 ~ 25 ℃","27 ~ 37 ℃"],a:1,e:"이유는 너무 차가우면 기포가 잘 생기지 않고, 너무 따뜻하면 금방 녹아서 거품이 불안정해짐 원문: 생크림 기포시 품온 → 1~10℃ (냉장 상태)",r:99,c:"ingredients"},
{q:"화이트 레이어 케이크를 만들 때 밀가루를 기준으로 가장 적합한 설탕의 양은?",o:["60 ~ 80%","80 ~ 100%","110 ~ 160%","180 ~ 230%"],a:2,e:"화이트 레이어 케이크의 설탕 사용량은 밀가루 대비 110~160%이다.\n• 고율배합 케이크로 설탕이 밀가루보다 많다.",r:93,c:"ingredients"},
{q:"과일 파운드케이크에 대한 설명 중 잘못된 것은?",o:["첨가하는 과일양은 일반적으로 전체 반죽의 25~50% 정도이다.","시럽에 담긴 과일은 사용시 시럽도 충분히 넣는다.","과일을 반죽에 투입하기 전에 밀가루에 묻혀 밑바닥으로 가라앉는 것을 방지한다.","견과류와 과실류는 믹싱 최종단계에 투입하여 가볍게 섞어 준다."],a:1,e:"과일케이크는 과일을 첨가한 케이크로 과일은 충분한 배수를 하여 사용해야함. 제과",r:99,c:"manufacturing"},
{q:"도넛의 튀김 기름이 갖추어야 할 조건은?",o:["산패취가 없다.","저장 중 안전성이 낮다.","발연점이 낮다","산화와 가수분해가 쉽게 일어난다."],a:0,e:"도넛 튀김 기름의 조건: 산패취가 없고, 저장 안전성이 높고, 발연점이 높고, 산화·가수분해가 잘 일어나지 않아야 한다.",r:93,c:"ingredients"},
{q:"반죽에 레몬즙이나 식초를 첨가하여 굽기를 하였을 때 나타나는 현상은?",o:["조직이 치밀하다","껍질색이 진하다.","향이 짙어진다.","부피가 증가한다."],a:0,e:"레몬즙이나 식초(산성 물질)를 반죽에 첨가하면 산이 글루텐을 수축시키고 단백질 응고를 촉진하여 기공이 미세해지고 조직이 치밀해진다.",r:93,c:"manufacturing"},
{q:"빵 발효에 영향을 주는 요소에 대한 설명으로 틀린 것은?",o:["적정한 범위 내에서 이스트의 양을 증가시키면 발효 시간이 짧아진다.","pH4.7 근처일 때 발효가 활발해진다.","적정한 범위 내에서 온도가 상승하면 발효시간은 짧아진다.","삼투압이 높아지면 발효시간은 짧아진다."],a:3,e:"삼투압이 높아지면(설탕·소금 과다 시) 이스트의 수분이 빠져나가 발효가 억제되므로 발효시간은 길어진다. pH4.7 근처, 적정 온도 범위 내 온도 상승, 이스트 양 증가는 발효를 촉진시킨다.",r:99,c:"ingredients"},
{q:"식빵 굽기 시의 빵 내부의 최고온도에 대한 설명으로 맞는 것은?",o:["100℃를 넘지 않는다.","150℃를 약간 넘는다.","200℃ 정도가 된다.","210℃ 가 넘는다."],a:0,e:"빵 내부에는 수분이 존재하므로 최고온도는 약 98~100℃를 넘지 않는다.",r:85,c:"manufacturing"},
{q:"연속식 제빵 시스템의 장점이 아닌 것은?",o:["일반 성형 기구가 필요 없다.","고품질의 제품을 수동 연속식으로 생산한다.","적은 인력을 필요로 한다.","필요한 공장 면적이 작다."],a:1,e:"연속식 제빵 시스템은 자동화된 고속 연속 생산 시스템이므로 수동이 아닌 자동 연속식으로 생산한다.",r:87,c:"manufacturing"},
{q:"스펀지/도법으로 빵을 만들 때 스펀지의 반죽 온도로 가장 알맞은 것은?",o:["18℃","24℃","30℃","35℃"],a:1,e:"스펀지 도우법의 스펀지 반죽 적정 온도는 23~26℃(일반적으로 24℃)이다.",r:82,c:"manufacturing"},
{q:"냉동반죽의 장점이 아닌 것은?",o:["노동력 절약","작업 효율의 극대화","설비와 공간의 절약","이스트푸드의 절감"],a:3,e:"냉동 반죽을 하게 되면 이스트 푸드량은 증가한다. 제과",r:99,c:"manufacturing"},
{q:"액체발효법에서 액종 발효 시 완충제 역할을 하는 것은?",o:["탈지분유","설탕","이스트","소금"],a:0,e:"액체발효법에서 탈지분유는 완충제 역할을 하여 액종의 pH 변화를 완화시킨다.",r:85,c:"ingredients"},
{q:"제빵 배합 표는 밀가루 총량을 100%로 하여 기타 재료를 나누어 표시하는데 이것을 무엇이라 하는가?",o:["베이커스 퍼센트","표준 퍼센트","4등분 분할법","스트레이트 배합법"],a:0,e:"베이커스 퍼센트(Baker's percent)는 밀가루 총량을 100%로 하여 다른 재료의 비율을 표시하는 방법이다.",r:93,c:"ingredients"},
{q:"산형식빵 비용적으로 가장 적합한 것은?",o:["1.5 ~ 1.8","1.7 ~ 2.6","3.2 ~ 3.5","4.0 ~ 4.5"],a:2,e:"산형식빵의 적정 비용적은 1.7~2.6이다.\n• 비용적 = 부피(mL) ÷ 무게(g)",r:85,c:"ingredients"},
{q:"제빵 배합율 작성시 베이커스 퍼센트(Baker's %)에서 기준으로 되는 재료는?",o:["설탕","물","밀가루","유지"],a:2,e:"베이커스 퍼센트에서 기준이 되는 재료는 밀가루이다. 밀가루를 100%로 놓고 나머지 재료의 비율을 계산한다.",r:90,c:"ingredients"},
{q:"식빵 제조 시 과도한 부피의 제품이 되는 원인은?",o:["소금량의 부족","오븐 온도가 높음","배합수의 부족","미숙성 소맥분"],a:0,e:"빵속에 소금을 많이 첨가하면 삼투압 작용에 위해 부피가 작아지는 현상이 일어나며, 소금량이 부족하면 부피가 커지는 원인이 된다.",r:99,c:"manufacturing"},
{q:"빵을 구워낸 직후의 수분함량과 냉각 후 포장 직전의 수분 함량으로 가장 적합한 것은?",o:["35%, 27%","45%, 38%","60%, 52%","68%, 60%"],a:1,e:"갓 구워낸 빵 수분함량:껍질 12%/ 빵속 45% 냉각 후 빵 수분함량: 껍질 27%/ 빵속 38%",r:99,c:"manufacturing"},
{q:"식빵제조 시 부피를 가장 크게 하는 쇼트닝의 적정한 %는?",o:["4 ~ 6%","8 ~ 11%","13 ~ 16%","18 ~ 20%"],a:0,e:"부피 최대 → 쇼트닝 4~6% 8~11% → 부피 조금 줄고, 13~20% → 반죽 무르고 부피 작아짐",r:99,c:"manufacturing"},
{q:"다음 중 주로 유화제로 사용되는 식품첨가물은?",o:["글리세린지방산에스테르","탄산암모늄","프로피온산칼슘","탄산나트륨"],a:0,e:"글리세린지방산에스테르는 대표적인 유화제이다.\n• 탄산암모늄: 팽창제, 프로피온산칼슘: 보존료, 탄산나트륨: 알칼리제",r:93,c:"ingredients"},
{q:"제품의 판매가격은 어떻게 결정하는가?",o:["총원가＋이익","제조원가＋이익","직접재료비＋직접경비","직접경비＋이익"],a:0,e:"판매가격 = 총원가 + 이익이다.\n• 제조원가, 직접재료비, 직접경비만으로는 판매가격을 결정할 수 없다.",r:77,c:"management"},
{q:"발효 전 무게는 1600g, 발효 후 무게가 1578g 일 때 발효 손실은?",o:["0.98%","1.375%","1.98%","2.375%"],a:1,e:"발효 손실률은 (발효 전 무게 - 발효 후 무게) ÷ 발효 전 무게 × 100으로 계산합니다. (1600 - 1578) ÷ 1600 × 100 = 22 ÷ 1600 × 100 = 1.375%이므로 정답은 1.375%입니다.",r:99,c:"manufacturing"},
{q:"다음 중 아미노산을 구성하는 주된 원소가 아닌 것은?",o:["탄소(C)","수소(H)","질소(N)","규소(Si)"],a:3,e:"아미노산을 구성하는 주된 원소는 탄소(C), 수소(H), 산소(O), 질소(N)이다. 규소(Si)는 아미노산 구성 원소가 아니다.",r:90,c:"nutrition"},
{q:"시유의 일반적인 수분과 고형질 함량은?",o:["물 68%, 고형질 38%","물 75%, 고형질 25%","물 88%, 고형질 12%","물 95%, 고형질 5%"],a:2,e:"시유(우유)의 일반적 조성은 수분 약 88%, 고형질 약 12%이다.\n• 고형질: 유지방 3.5%, 단백질 3.3%, 유당 4.7%, 무기질 0.7%",r:93,c:"nutrition"},
{q:"젤라틴(gelatin)에 대한 설명 중 틀린 것은?",o:["동물성 단백질이다.","응고제로 주로 이용된다.","물과 섞으면 용해된다.","콜로이드 용액의 젤 형성과정은 비가역적인 과정이다."],a:3,e:"젤라틴은 동물의 껍질이나 연골을 사용하며, 끓는 물에서 용해되고, 산에 약하고, 무스, 바바루아, 젤리 등에 쓰인다",r:99,c:"ingredients"},
{q:"다음 중 게란 흰자의 조성에서 함유량이 가장 적은 것은?",o:["오브알부민","콘알부민","라이소자임","카로틴"],a:3,e:"계란 흰자의 주요 성분 중 카로틴은 노른자에 들어있는 색소이며, 흰자에는 거의 함유되어 있지 않다.\n• 흰자: 오브알부민(54%), 콘알부민(13%), 라이소자임(3.5%)",r:90,c:"ingredients"},
{q:"아이싱 크림에 많이 쓰이는 퐁당(fondand)을 만들 때 끓이는 온도로 다음 중 가장 적합한 것은?",o:["78 ~ 80℃","98 ~ 100℃","114 ~ 116℃","130 ~ 132℃"],a:2,e:"퐁당(fondant)을 만들 때 설탕시럽을 114~116℃까지 끓인다.\n• 너무 낮으면 부드럽고 흐르고, 너무 높으면 딱딱해진다.",r:93,c:"ingredients"},
{q:"제빵용 물로 가장 적합한 것은?",o:["연수(1~60ppm)","아연수(61~120ppm)","아경수(121~180ppm)","경수(180ppm 이상)"],a:2,e:"제빵용으로 가장 적합한 물은 아경수(121~180ppm)이다. 아경수는 글루텐을 적당히 강화하고 이스트의 활성을 도와 발효와 빵 품질에 가장 유리하다.",r:75,c:"ingredients"},
{q:"〔H₃O⁺〕의 농도가 다음과 같을 때 가장 강산인 것은?",o:["10⁻² M/ℓ","10⁻³M/ℓ","10⁻⁴M/ℓ","10⁻⁵M/ℓ"],a:0,e:"수소이온 농도[H₃O⁺]가 클수록 강산이다. 10⁻² M/L이 가장 높은 농도이므로 가장 강산(pH 2)이다.",r:95,v:0,c:"nutrition"},
{q:"효모에 함유된 성분으로 특히 오래된 효모에 많고 환원제로 작용하여 반죽을 약화시키고 빵의 맛과 품질을 떨어뜨리는 것은?",o:["글루타치온","글리세린","글리아딘","글리코겐"],a:0,e:"글루타치온(glutathione)은 효모에 함유된 환원성 물질로, 특히 오래된 효모에 많다. 반죽의 글루텐 결합을 끊어 반죽을 약화시킨다.",r:93,c:"ingredients"},
{q:"일반적으로 포화지방산의 탄소수가 다음과 같을때 융점이 가장 높아서 상온에서 가장 딱딱한 유지가 되는 것은?",o:["6개","10개","14개","18개"],a:3,e:"포화지방산의 탄소수가 증가할수록 융점이 증가합니다. 이는 탄소수가 증가함에 따라 분자의 크기가 커지고, 분자 간의 인력이 강해지기 때문입니다. 따라서, 탄소수가 가장 많은 18개인 경우가 일반적으로 융점이 가장 높습니다 제과",r:99,c:"ingredients"},
{q:"글루텐을 형성하는 단백질은?",o:["알부민, 글리아딘","알부민, 글로불린","글루테닌, 글리아딘","글루테닌, 글로불린"],a:2,e:"글루텐을 형성하는 단백질은 글루테닌과 글리아딘이다.\n• 글루테닌: 탄력성, 글리아딘: 점성·신장성 부여\n• 알부민, 글로불린은 수용성 단백질로 글루텐 형성에 관여하지 않는다.",r:93,c:"ingredients"},
{q:"당류의 감미도가 강한 순서부터 나열된 것은?",o:["설탕 - 포도당 - 맥아당 - 유당","포도당 - 설탕 - 맥아당 - 유당","설탕 - 포도당 - 유당 - 맥아당","유당 - 맥아당 - 포도당 - 설탕"],a:0,e:"당류의 감미도 순서: 과당(173) > 설탕(100) > 포도당(74) > 맥아당(33) > 유당(16)\n※ 보기 '설탕-포도당-맥아당-유당'이 정답이다.",r:88,c:"ingredients"},
{q:"효소에 대한 설명으로 맞는 것은?",o:["단백질로 구성되어 있다.","화학적 촉매이다.","화학반응속도와는 관련이 없다.","일반적으로 10℃에서 활성이 가장 높다."],a:0,e:"효소는 생물학적(생체) 촉매이다. 보기 중 '단백질로 구성되어 있다'도 맞는 설명이지만, 출제 기준상 '화학적 촉매이다'를 정답으로 선택하고 있다.\n• 효소는 화학반응 속도를 높이고, 일반적으로 35~45℃에서 활성이 가장 높다.",r:83,c:"nutrition"},
{q:"다음 중 다당류에 속하는 것은?",o:["올리고당","맥아당","포도당","설탕"],a:0,e:"올리고당은 단당류 3~10개가 결합한 탄수화물로, 넓은 의미에서 다당류에 속한다. 맥아당, 설탕은 이당류, 포도당은 단당류이다.\n※ 엄밀히는 소당류(oligosaccharide)로 별도 분류하기도 하나, 보기 중에서는 다당류가 가장 가깝다.",r:88,c:"ingredients"},
{q:"다음 유지 중 가소성이 가장 좋은 것은?",o:["버터","식용유","쇼트닝","마가린"],a:2,e:"쇼트닝은 가소성(plasticity)이 가장 좋은 유지이다. 넓은 온도 범위에서 가소성을 유지한다.\n• 버터·마가린은 온도에 민감, 식용유는 액체라 가소성이 없다.",r:90,c:"ingredients"},
{q:"패리노그래프에 대한 설명으로 틀린 것은?",o:["고속 믹서 내에서 일어나는 물리적 성질을 파동곡선 기록기로 가록하여 해석한다.","흡수율, 믹싱내구성, 믹싱시간 등을 판단할 수 있다.","곡선이 500 B.U에 도달하는 시간 등으로 밀가루의 특성을 알 수 있다.","반죽의 신장도를 측정한다."],a:3,e:"BU (Brabender Units) 단위",r:99,c:"manufacturing"},
{q:"다음의 인체 모식도에서 탄수화물의 소화가 시작되는 곳은?",o:["1","2","3","4"],a:0,e:"탄수화물의 소화는 입(구강)에서 시작된다. 침 속의 프티알린(아밀라아제)이 전분을 분해한다.\n※ 1번이 입(구강)을 나타내는 것으로 본다.",r:85,c:"nutrition"},
{q:"유당이 가수분해되어 생성되는 단당류는?",o:["갈락토오스＋갈락토오스","포도당＋갈락토오스","포도당＋포도당","맥아당＋포도당"],a:1,e:"유당(lactose)이 가수분해되면 포도당(glucose) + 갈락토오스(galactose)가 생성된다.",r:77,c:"ingredients"},
{q:"체내에서 단백질의 역할이 아닌 것은?",o:["항체 형성","체조직의 구성","지용성 비타민 운반","호로몬 형성"],a:2,e:"지용성 비타민은 지방이 운반한다.",r:99,c:"nutrition"},
{q:"다음 지단백질(lipoprotein) 중 중성지질의 양이 가장 많은 것은?",o:["초저밀도 지단백질(VLDL)","고밀도 지단백질(HDL)","저밀도 지단백질(LDL)","카일로마이크론(chylomicron)"],a:3,e:"카일로마이크론(chylomicron)은 소장에서 흡수된 지방을 운반하는 지단백질로, 중성지질(트리글리세라이드) 함량이 가장 많다(약 85~95%).",r:93,c:"nutrition"},
{q:"다음 중 수용성 비타민?",o:["비타민 C","비타민 A","비타민 D","비타민 K"],a:0,e:"비타민 C(아스코르브산)는 수용성 비타민이다.\n• 비타민 A, D, E, K는 지용성 비타민이다.",r:85,c:"nutrition"},
{q:"일본에서 공장페수로 인해 오염된 식품을 섭취하고 이타이이타이(itai itai) 병이 발생하여 식품공해를 유발하였는데 이와 관련된 중금속은?",o:["카드뮴(Ca)","수은(Hg)","납(Pb)","비소(As)"],a:0,e:"이타이이타이(itai itai)병은 카드뮴(Cd) 중독에 의한 질병으로, 뼈가 약해지고 극심한 통증이 특징이다.\n• 수은: 미나마타병, 납: 빈혈·신경장애, 비소: 피부질환",r:93,c:"hygiene"},
{q:"살균제와 보존료의 설명으로 맞는 것은?",o:["살균제는 세균에만 효과가 있고 곰팡이에는 효과가 없다.","보존료는 미생물에 의한 부패를 방지할 목적으로 사용된다.","보존료는 사용기기준과 허용량이 대부분 정해져 있지 않다.","합성살균제로서 프로피온산나트륨이 있다."],a:1,e:"보존료는 미생물에 의한 부패를 방지할 목적으로 사용된다.\n• 살균제는 세균뿐 아니라 곰팡이에도 효과가 있으며, 보존료는 사용기준이 정해져 있다.",r:93,c:"hygiene"},
{q:"보존료의 구비 조건으로 바람직하지 않은 것은?",o:["미량으로 효과가 클 것","독성이 없거나 극히 낮을 것","공기, 광선에 잘 분해될 것","무미, 무취일 것"],a:2,e:"보존료는 공기와 광선에 안정해야 한다. 잘 분해되면 효력이 지속되지 않으므로 부적합하다.",r:82,c:"ingredients"},
{q:"감자의 독성분이 가장 많이 들어 있는 것은?",o:["감자즙","노란부분","겉껍질","싹튼부분"],a:3,e:"감자의 독성분(솔라닌)은 싹이 튼 부분에 가장 많이 들어 있다.\n• 껍질이나 녹색 부분에도 함유되어 있으므로 제거 후 사용한다.",r:85,c:"hygiene"},
{q:"단백질을 많이 함유한 식품의 주된 변질현상은?",o:["부패","발효","산패","갈변"],a:0,e:"단백질이 많은 식품은 미생물에 의해 부패되기 쉽다. 발효는 탄수화물, 산패는 지방의 변질이다.",r:82,c:"nutrition"},
{q:"마이코톡신(mycotoxin)의 설명으로 틀린 것은?",o:["진균독이라고 한다.","탄수화물이 풍부한 곡류에서 많이 발생한다.","원인식품의 세균이 분비하는 독성분이다.","중독의 발생은 계절과 관계가 깊다."],a:2,e:"마이코톡신(mycotoxin)은 곰팡이(진균)가 분비하는 독소이다. 세균이 분비하는 독성분이 아니다.\n• 대표적: 아플라톡신(곰팡이독소)",r:93,c:"hygiene"},
{q:"다음 중 세균에 의한 오염 위험성이 가장 낮은 것은?",o:["상수고가 공급되지 않는 지역의 세척수나 음료수","습도가 낮은 상태의 냉동고 내에서 보관 중인 식품","어항이나 포구 주변에서 잡은 물고기","분뇨처리가 미비한 농촌지역의 채소나 열매"],a:1,e:"습도가 낮은 냉동고 내에서 보관 중인 식품은 세균의 증식이 억제되어 오염 위험성이 가장 낮다.\n• 저온과 낮은 습도는 세균 증식을 억제한다.",r:93,c:"hygiene"},
{q:"경구전염병의 예방대책 중 전염원에 대한 대책으로 바람직하지 않은 것은?",o:["환자를 조기 발견하여 격리 치료한다.","환자가 발생하면 접촉자의 대변을 검사하고 보균자를 관리한다.","일반 및 유흥음식점에서 일하는 사람들은 장기적인 건강검진이 필요하다.","오염이 의심되는 물건은 어둡고 손이 닿지 않는 곳에 모아둔다."],a:3,e:"오염이 의심되는 물건은 소독하거나 폐기해야 하며, 어둡고 손이 닿지 않는 곳에 모아두는 것은 부적절하다.",r:85,c:"hygiene"},
{q:"여름철에 세균성 식중독이 많이 발생하는데 이에 미치는 영향이 가장 큰 것은?",o:["세균의 생육 Aw","세균의 생육 pH","세균의 생육 영양원","세균의 생육 온도"],a:3,e:"여름철 세균성 식중독이 많이 발생하는 가장 큰 원인은 세균의 생육에 적합한 온도(25~37℃)이다.\n• 여름철 높은 기온이 세균 증식을 촉진한다.",r:93,c:"hygiene"},
{q:"탄저, 브루셀라증과 같이 사람과 가축의 양쪽에 이환되는 전염병은?",o:["법정전염병","경구전염병","인축공통전염병","급성전염병"],a:2,e:"탄저, 브루셀라증처럼 사람과 가축 모두에 감염되는 전염병을 인수공통전염병이라 한다.",r:77,c:"hygiene"}]},
{title:"2007년 5회",desc:undefined,questions:[{q:"1000ml의 생크림 원료로 거품을 올려 2000ml의 생크림을 만들었다면 증량율(over run)은 얼마인가?",o:["50%","100%","150%","200%"],a:1,e:"증량률= (휘핑 후 체적-휘핑 전 체적)/취핑 전 체적*100% = (2000-1000)/1000*100%=100%",r:99,c:"ingredients"},
{q:"다음 중 파이롤러를 사용하지 않은 제품은?",o:["데니시 페이스트리","케이크 도넛","퍼프 페이스트리","롤 케이크"],a:3,e:"롤케이크 : 스펀지 케이크를 변형시켜 롤로 말아준 제품이다.",r:99,c:"manufacturing"},
{q:"파이나 퍼프 페이스트리는 무엇에 의하여 팽창되는가?",o:["화학적인 팽창","중조에 의한 팽창","유지에 의한 팽창","이스트에 의한 팽창"],a:2,e:"파이나 퍼프 페이스트리는 유지의 물리적 성질을 이용하여 팽창시키는 제품이다",r:99,c:"ingredients"},
{q:"도넛에 기름이 많이 흡수되는 이유에 대한 설명으로 틀린 것은?",o:["믹싱이 부족하다.","반죽에 수분이 많다.","배합에 설탕과 팽창제가 많다.","튀김온도가 높다."],a:3,e:"도넛에 기름이 많은 원인은 다양하지만 튀김 온도가 높은 것 이 아니라 낮은 경우 기름이 많아진다",r:99,c:"manufacturing"},
{q:"반죽희망 온도: 23℃, 밀가루 온도: 25℃, 실내 온도: 25℃, 설탕 온도: 25℃, 쇼트닝 온도: 20℃, 계란 온도: 20℃, 수돗물 온도: 23℃, 마찰계수: 20℃에서 물 온도를 계산하면?",o:["0℃","3℃","8℃","12℃"],a:1,e:"물 온도 = (희망온도 × 3) - (밀가루 온도 + 실내 온도 + 마찰계수)\n= (23 × 3) - (25 + 25 + 20) = 69 - 70 = -1℃\n※ 제과에서는 6요소 공식을 사용: (23×6)-(25+25+25+20+20+20) = 138-135 = 3℃",r:90,c:"manufacturing"},
{q:"쇼트도우쿠키의 제조상 유의사항으로 틀린 것은?",o:["밀어 펼 때 많은 양의 덧가루를 사용한다.","덧가루를 뿌린 면포 위에서 밀어 편다.","전면의 두께가 균일하도록 밀어 편다.","성형하기 위하여 밀어 펴기 전에 휴지를 통해 냉각 시킨다."],a:0,e:"밀어 펼 때 많은 양의 덧가루를 사용하지 않는다 . 성형하기 위하여 밀어 펴기 전 냉장고에서 20~30분 정도 반죽 표면이 마르지 않게 휴지를 시킨다. 손가락으로 눌렀을때 자국이 남아있어야 한다 (이때 휴지 종료)",r:99,c:"manufacturing"},
{q:"옐로 레이어 케이크를 제조할 때 달걀을 50% 사용했다면 같은 배합비율로 화이트 레이어 케이크를 제조할 경우 달걀 흰자는 몇 %를 사용해야 하는가?",o:["45%","55%","65%","75%"],a:2,e:"화이트 레이어 케이크의 달걀 흰자 사용량 : 전란 X 1.3",r:99,c:"manufacturing"},
{q:"겨울철 굳어버린 버터크림의 농도를 조절하기 위한 첨가물은?",o:["분당","초콜릿","식용유","캐러멜색소"],a:2,e:"겨울철 굳어진 버터크림에 식용유를 소량 첨가하면 농도가 부드러워진다.\n• 분당, 초콜릿은 오히려 더 굳어지게 하고, 캐러멜색소는 색만 변한다.",r:90,c:"ingredients"},
{q:"초콜릿 템퍼링의 방법으로 올바르지 않은 것은?",o:["중탕 그릇이 초콜릿 그릇보다 넓어야 한다.","중탕시 물의 온도는 60℃로 맞춘다.","용해된 초콜릿의 온도는 40~45℃로 맞춘다.","용해된 초콜릿에 물이 들어가지 않도록 주의한다."],a:0,e:"중탕 그릇이 초콜릿 그릇보다 넓으면 자칫 중탕의 물이 들어갈 수 있으며 안정적이지 않다.",r:99,c:"ingredients"},
{q:"일반적으로 슈 반죽에 사용되지 않는 재료는?",o:["밀가루","계란","설탕","이스트"],a:3,e:"이스트는 효모라고도 하는데 제빵에서의 팽창제라고 보시면되요",r:99,c:"ingredients"},
{q:"도넛과 케이크의 글레이즈(glaze) 사용 온도로 가장 적합한 것은?",o:["23℃","34℃","49℃","68℃"],a:2,e:"도넛 글레이즈 시 온도: 40∼50℃가 적당하다.",r:99,c:"manufacturing"},
{q:"도넛의 설탕이 수분을 흡수하여 녹는 현상을 방지하기 위한 방법으로 잘못된 것은?",o:["도넛에 묻는 설탕량을 증가시킨다.","튀김시간을 증가시킨다.","포장용 도넛의 수분은 38% 전후로 한다.","냉각 중 환기를 더 많이 시키면서 충분히 냉각한다."],a:2,e:"21~25% 제과",r:99,c:"manufacturing"},
{q:"반죽형 케이크의 결점과 원인의 연결이 잘못된 것은?",o:["고율배합 케이크의 부피가 작음 - 설탕과 액체재료의 사용량이 적었다.","굽는 동안 부풀어 올랐다가 가라앉음 - 설탕과 팽창제 사용량이 많았다.","케이크 껍질에 반점이 생김 - 입자가 굵고 크기가 서로 다르나 설탕을 사용했다.","케이크가 단단하고 질김 - 고율배합 케이크에 맞지 않은 밀가루를 사용했다."],a:0,e:"고율배합 케이크 부피가 큼 제과",r:99,c:"manufacturing"},
{q:"좋은 튀김기름의 조건이 아닌 것은?",o:["천연의 항산화제가 있다.","발연점이 높다.","수분이 10% 정도이다.","저장성과 안정성이 높다."],a:2,e:"수분이 없어야 한다.",r:99,c:"ingredients"},
{q:"다른 조건이 모두 동일할 때 케이크 반죽의 비중에 관한 설명으로 맞는 것은?",o:["비중이 높으면 제품의 부피가 크다.","비중이 낮으면 공기가 적게 포함되어 있음을 의미한다.","비중이 낮을수록 제품의 기공이 조밀하고 조직이 묵직하다.","일정한 온도에서 반죽의 무게를 같은 부피의 물의 무게로 나눈 값이다."],a:3,e:"1. 비중이 높으면 제품의 부피가 작다. 2. 비중이 낮으면 반죽 속에 공기가 많이 포함되어 있음을 의미한다. 3. 비중이 낮을수록 제품의 부피가 커지고 기공이 열려서 조직이 거칠다. 4. 비중값 = 같은 부피의 반죽 무게 / 같은 부피의 물 무게 ( / 나누기 에요 )",r:99,c:"manufacturing"},
{q:"오버 베이킹(over baking)에 대한 설명으로 옳은 것은?",o:["낮은 온도의 오븐에서 굽는다.","윗면 가운데가 올라오기 쉽다.","제품에 남는 수분이 많아진다.","중심 부분이 익지 않을 경우 주저앉기 쉽다."],a:0,e:"오버 베이킹 - 고율배합 - 저온에서 장시간 굽기 - 믹싱 중 공기 혼입은 많고 - 반죽의 비중은 낮고 - 화학 팽창제 사용량은 줄인다.",r:99,c:"ingredients"},
{q:"파이롤러의 사용에 가장 적합한 제품은?",o:["식빵","앙금빵","크로와상","모카빵"],a:2,e:"파이롤러는 반죽을 밀어 펴는 기계로 크로와상 제조에 가장 적합하다.\n• 식빵, 앙금빵, 모카빵은 파이롤러가 필요 없다.",r:93,c:"manufacturing"},
{q:"스펀지법에서 스펀지 발효점으로 적합한 것은?",o:["처음 부피의 8배로 될 때","발효된 생지가 최대로 팽창했을 때","핀홀(pinhole)이 생길 때","겉 표면의 탄성이 가장 클 때"],a:2,e:"스펀지법에서 스펀지 발효점은 핀홀(pinhole)이 생길 때이다. 스펀지 표면에 작은 구멍(핀홀)이 생기면 발효가 적절히 완료된 것이다.",r:93,c:"manufacturing"},
{q:"빵 제품의 모서리가 예리하게 된 것은 다음 중 어떤 반죽에서 오는 결과인가?",o:["발효가 지난친 반죽","과다하게 이형유를 사용한 반죽","어린 반죽","2차 발효가 지나친 반죽"],a:2,e:"빵 제품의 모서리가 예리한 것은 어린 반죽(발효 부족)의 특징이다.\n• 발효가 부족하면 가스 보유가 적어 오븐에서 팽창이 과도하게 일어나 모서리가 날카로워진다.",r:90,c:"manufacturing"},
{q:"다음 중 후염법의 가장 큰 장점은?",o:["반죽 시간이 단축된다.","발효가 빨리 된다.","밀가루의 수분흡수가 방지된다.","빵이 더욱 부드럽게 된다."],a:0,e:"후염법은 소금을 나중에 넣는 방법이다. 소금을 초기에 넣으면 글루텐 형성을 억제하여 밀가루의 수분흡수가 방해되는데, 소금을 나중에 넣으면 이를 방지할 수 있다.\n• 보기의 '밀가루의 수분흡수가 방지된다'는 '수분흡수 방해가 방지된다'는 의미로 해석되어 정답이다.\n• 반죽 시간 단축도 후염법의 장점 중 하나이다.",r:93,c:"ingredients"},
{q:"오븐에서 구운 빵을 냉각할 때 평균 몇 %의 수분 손실이 추가적으로 발생하는가?",o:["2%","4%","6%","8%"],a:0,e:"빵이 구워진 후 냉각하는 과정에서 내부의 수분이 증발하게 되며, 이때 약 2%의 수분이 손실됩니다. 이는 빵의 질감과 맛을 유지하는 데 중요한 요소로 작용합니다.",r:99,c:"manufacturing"},
{q:"빵을 구웠을 때 갈변이 되는 것은 어떤 반응에 의한 것인가?",o:["비타민 C의 산화에 의하여","효모에 의한 갈색반응에 의하여","마이야르(Maillard) 반응과 캐러멜화 반응이 동시에 일어나서","클로로필(chlorophyll)이 열에 의해 변성되어서"],a:2,e:"- 마이야르반응은 환원당과 아미노산이 결합하여 일어나는 반응 - 캐러멜화 반응은 설탕 성분이 갈변하는 반응",r:99,c:"nutrition"},
{q:"직접반죽법으로 식빵을 제조하려고 한다. 실내온도 23℃, 밀가루 온도 23℃, 수돗물온도 20℃, 마찰계수 20℃일 때 희망하는 반죽온도를 28℃로 만들려면 사용해야 될 물의 온도는?",o:["16℃","18℃","20℃","23℃"],a:1,e:"사용해야 될 물의 온도 = ( 희망하는 반죽온도 x 3 ) - ( 실내온도 + 밀가루 온도 + 마찰계수 ) ( 28 x 3 ) - ( 23 + 23 + 20 ) = 84 - 66 = 18",r:99,c:"manufacturing"},
{q:"다음 중 빵의 노화로 인한 현상이 아닌 것은?",o:["곰팡이 발생","탄력성 상실","껍질이 질겨짐","풍미의 변화"],a:0,e:"빵에 곰팡이가 발생하는 현상은 빵의 부패 단계이다.",r:99,c:"hygiene"},
{q:"스펀지법으로 만든 제품의 특징은?",o:["노화가 빠르다.","내상막이 얇다.","발효향이 적다.","부피가 감소한다."],a:1,e:"스펀지법 제품의 특징은 내상막이 얇고, 풍미가 좋으며, 노화가 느리고, 부피가 크다.",r:85,c:"manufacturing"},
{q:"빵 반죽을 정형기(moulder)에 통과시켰을 때 아령 모양으로 되었다면 정형기의 압력상태는?",o:["압력이 강하다.","압력이 약하다.","압력이 적당하다.","압력과는 관계없다."],a:0,e:"빵 반죽이 정형기를 통과할 때 아령 모양(양끝이 굵고 가운데가 잘록한 형태)이 되면 압력이 너무 강하다는 신호이다. 과도한 압력이 반죽 중앙부를 지나치게 압착하여 양쪽 끝이 부풀어 오른 아령 형태가 된다.",r:93,c:"manufacturing"},
{q:"중간발효를 시킬 때 가장 적합한 습도는?",o:["62~67%","72~77%","82~87%","89~94%"],a:1,e:"중간발효 적정 습도는 82~87%이다.\n• 1차 발효(65~70%)보다 높고, 2차 발효(85%)와 비슷한 수준이다.",r:93,c:"manufacturing"},
{q:"냉동반죽법의 장점이 아닌 것은?",o:["소비자에게 신선한 빵을 제공할 수 있다.","운송, 배달이 용이하다.","가스 발생력이 향상된다.","다품종 소량생산이 가능하다."],a:2,e:"냉동반죽의 장점은? 1.계획생산이 가능하다. 2.생산성향상,재고관리용이 3.인건비절감,다품종소량생산가능 4.가맹점의 시설투자비 감소",r:99,c:"manufacturing"},
{q:"이형유에 관한 설명 중 틀린 것은?",o:["틀을 실리콘으로 코팅하면 이형유 사용을 줄일 수 있다.","이형유는 발연점이 높은 기름을 사용한다.","이형유 사용량은 반죽무게에 대하여 0.1~0.2% 정도이다.","이형유 사용량이 많으면 밑껍질이 얇아지고 색상이 밝아진다."],a:3,e:"밑껍질이 두꺼워지고 색상이 어두워집니다.",r:99,c:"ingredients"},
{q:"완제품 중량이 400g인 빵 200개를 만들고자 한다. 발효 손실이 2%이고 굽기 및 냉각손실이 12%라고 할 때 밀가루 중량은? (총 배합율은 180%이며, g 이하는 반올림한다.)",o:["51536g","54725g","61320g","61940g"],a:0,e:"완제품의 총 중량 = 완제품 중량 x 개수 = 80000 80000 400 200 반죽 총 중량 =완제품의 총 중량 ÷ [1-(발효손실÷100)] ÷[1-(굽기손실÷100)]=92,764 92764 80000 2 12 밀가루 중량= 반죽 총 중량 x 밀가루비율 ÷ 총배합률 = 51536 51536 92764 1000 180 밀가루 비율이 1000 인 이유 흔히 사용하는 배합표 자체가 <밀가루 1Kg을 기준>으로 나머지 재료들의 무게를 정하는 배합이라서",r:99,c:"manufacturing"},
{q:"밀가루 중 밀기울 혼입율의 확정 기준이 되는 것은?",o:["지방 함량","섬유질 함량","회분 함량","비타민 함량"],a:2,e:"밀가루 등급(1등급, 2등급 등)의 기준은 회분(灰分) 함량이다. 회분이 적을수록 밀기울 혼입이 적고 등급이 높다.",r:90,c:"nutrition"},
{q:"식염이 반죽의 물성 및 발효에 미치는 영향에 대한 설명으로 틀린 것은?",o:["흡수율이 감소한다.","반죽시간이 길어진다.","껍질 색상을 더 진하게 한다.","프로테아제의 활성을 증가시킨다."],a:3,e:"이스트 푸드는 프로테아제의 활성을 증가시켜 반죽의 신장성을 강화한다.",r:99,c:"manufacturing"},
{q:"케이크 제품에서 계란의 기능이 아닌 것은?",o:["영양가 증대","결합제 역할","유화작용 저해","수분 증발 감소"],a:2,e:"노른자는 유화작용하는 레시틴이 있습니다.",r:99,c:"nutrition"},
{q:"빵에서 탈지분유의 역할이 아닌 것은?",o:["흡수율 감소","조직 개선","완충제 역할","껍질색 개선"],a:0,e:"탈지분유량을 1%증가할 경우 수분흡수율은 1.5~2% 증가한다.",r:99,c:"ingredients"},
{q:"물엿의 포도당당량 기준은?",o:["40.0 이상","30.0 이상","20.0 이상","10.0 이상"],a:2,e:"물엿의 포도당당량(DE, Dextrose Equivalent)은 40.0 이상이다.\n• DE가 높을수록 단맛이 강하고 점도가 낮다.",r:93,c:"ingredients"},
{q:"유지의 기능 중 크림성의 기능은?",o:["제품을 부드럽게 한다.","산패를 방지한다.","밀어 펴지는 성질을 부여한다.","공기를 포집하여 부피를 좋게 한다."],a:3,e:"유지의 물리적 특성인 크림성은 버터크림, 파운드케이크 제조시 필요한 기능이다",r:99,c:"ingredients"},
{q:"글리세린(glycerin, glycerol)에 대한 설명으로 틀린 것은?",o:["무색투명하다.","3개의 수산기(-OH)를 가지고 있다.","지당의 1/3 정도의 감미가 있다.","탄수화물의 가수분해로 얻는다."],a:3,e:"글리세린=3개의 수산기(-OH)를 가지며 지방을 가수분해해서 얻는다. 1. 보습성을 가지며 무색, 무취, 감미를 가진 시럽으로 물보다 비중이 크다.(화장품 로션에도 쓰임) 2. 용매 작용(향미제-케이크의 색과 향을 보존한다.) 3. 물*기름 유착액에 대한 안정성을 부여(유화제 역할)한다 [추가 해설] 탄수화물의 가수분해로 얻는 것은 포도당이다.",r:99,c:"ingredients"},
{q:"일반적으로 반죽을 강화시키는 재료는?",o:["유지, 탈지분유, 계란","소금, 산화제, 탈지분유","유지, 환원제, 설탕","소금, 산화제, 설탕"],a:1,e:"반죽을 강화시키는 재료는 소금, 산화제, 탈지분유이다.\n• 유지, 환원제, 설탕은 반죽을 약화(연화)시킨다.",r:93,c:"ingredients"},
{q:"제빵에 가장 적합한 물의 광물질 함량은?",o:["1~60ppm","60~120ppm","120~180ppm","180ppm 이상"],a:2,e:"경수(센물) - 180ppm이상 (제빵 부적합) ★아경수 - 120~180ppm (제과,제빵에 가장 적합한 물)★ 연수(단물) - 60ppm이하 (제빵 부적합)",r:99,c:"nutrition"},
{q:"반추위 동물의 위액에 존재하는 우유 응유효소는?",o:["펩신","트립신","레닌","펩티다아제"],a:2,e:"레닌은 젖속에 들어있는 효소 펩신은 위의 주세포에 준비되는 효소 트립신은 이자에서 준비되는 소화효소 펩티다아제는 아미노산 사이의 펩티드 결합을 가수분해시켜 더 작은 단위로 분해시키는 이화작용을 촉매시키는 효소",r:99,c:"ingredients"},
{q:"베이킹파우더가 반응을 일으키면 주로 어떤 가스가 발생하는가?",o:["질소가스","암모니아가스","탄산가스","산소가스"],a:2,e:"베이킹파우더는 탄산수소나트륨(중조)과 산제의 반응으로 주로 탄산가스(CO₂)를 발생시킨다.",r:85,c:"ingredients"},
{q:"유지의 산패 정도를 나타내는 값이 아닌 것은?",o:["과산화물값","산값","카보닝값","유화값"],a:3,e:"유지의 산패 정도를 나타내는 값: 과산화물값(POV), 산값(AV), 카보닐값(CV) 등이다. 유화값은 유화력과 관련된 것으로 산패와 직접 관련이 적다.",r:90,c:"ingredients"},
{q:"당과 산에 의해서 젤을 형성하며 젤화제, 증점제, 안정제, 유화제 등으로 사용되는 것은?",o:["펙틴","한천","젤라틴","씨엠씨(C.M.C)"],a:0,e:"펙틴은 당과 산의 존재 하에 젤을 형성하며, 잼·젤리 제조의 핵심 성분이다.\n• 한천: 해조류 추출, 젤라틴: 동물성 단백질, CMC: 합성 안정제",r:90,c:"ingredients"},
{q:"다음 중 단백질 분해효소가 아닌 것은?",o:["리파아제(Lipase)","브로멜린(bromelin)","파파인(papain)","피신(ficin)"],a:0,e:"리파아제는 지방 분해 효소이다.",r:99,c:"nutrition"},
{q:"지방의 불포화도를 측정하는 요오드값이 다음과 같을 때 불포화도가 가장 큰 건성유는?",o:["50 미만","50~100 미만","100~130 미만","130 이상"],a:3,e:"요오드값 130 이상이면 건성유로 불포화도가 가장 크다.\n• 130 이상: 건성유, 100~130: 반건성유, 100 미만: 불건성유",r:93,c:"nutrition"},
{q:"20대 한남성의 하루 열량 섭취량을 2500kcal로 했을 때 가장 이상적인 1일 지방 섭취량은?",o:["약 10~40g","약 40~70g","약 70~100g","약 100~130g"],a:1,e:"하루 2500kcal의 25~30%를 지방에서 섭취: 2500 × 0.25~0.30 = 625~750kcal ÷ 9kcal/g = 약 70~83g\n→ 약 70~100g 범위가 정답이다.",r:93,c:"nutrition"},
{q:"당대사의 중심물질로 두뇌와 신경, 적혈구의 에너지원으로 이용되는 단당류는?",o:["과당","포도당","맥아당","유당"],a:1,e:"포도당(glucose)은 당대사의 중심물질로 두뇌·신경·적혈구의 주요 에너지원이다.\n• 과당은 간에서 대사, 맥아당·유당은 이당류이다.",r:90,c:"ingredients"},
{q:"식품을 태웠을 때 재로 남는 성분은?",o:["유기질","무기질","단백질","비타민"],a:1,e:"식품을 태우면 유기물(탄수화물, 단백질, 지방, 비타민)은 연소되고 무기질(회분)만 재로 남는다.",r:82,c:"nutrition"},
{q:"다음 중 단백질의 함량이 가장 많은 것은?",o:["버터","밀가루","당근","설탕"],a:1,e:"밀가루의 단백질 함량은 약 10~13%로 보기 중 가장 많다.\n• 버터(단백질 약 1%), 당근(약 1%), 설탕(0%)보다 높다.",r:90,c:"ingredients"},
{q:"다음 중 불포화지방산과 포화지방산에 대한 설명으로 옳은 것은?",o:["불포화지방산은 포화지방산에 비하여 녹는점이 높다.","쇼트닝은 포화지방산에 수로를 첨가하여 가공한다.","필수지방산은 모두 불포화지방산이다.","포화지방산은 이중결합구조를 갖는다."],a:2,e:"필수 지방산은 리놀레산, 리놀렌산, 아라키돈산으로 모두 불포화지방산에 포함된다. 제과",r:99,c:"nutrition"},
{q:"팽창제에 대한 설명으로 틀린 것은?",o:["반죽 중에서 가스가 발생하여 제품에 독특한 다공성의 세포구조를 부여한다.","팽창제로 암모늄명반이 지정되어 있다.","화학적 팽창제는 가열에 의해서 발생되는 유리 탄산가스나 암모니아 가스만으로 팽창하는 것이다.","천연팽창제로는 효모가 대표적이다."],a:1,e:"팽창제로 암모늄명반은 식품첨가물로 지정되지 않았다.\n※ 반죽 중 가스 발생, 화학적 팽창제의 작동 원리, 효모가 천연팽창제라는 설명은 맞다.",r:85,c:"ingredients"},
{q:"장티푸스 질환을 가장 올바르게 설명한 것은?",o:["급성 전신성 열성질환","급성 이완성 마비질환","급성 간염 질환","만성 간염 질환"],a:0,e:"장티푸스는 살모넬라 타이피(Salmonella typhi)에 의한 급성 전신성 열성질환이다.\n• 고열, 장미진(rose spot), 비장 비대 등이 특징이다.",r:93,c:"hygiene"},
{q:"대장균에 대한 설명으로 틀린 것은?",o:["유당을 분해한다.","그램(Gram) 양성이다.","호기성 또는 통성 혐기성이다.","무아포 간균이다."],a:1,e:"대장균은 그램(gram)음성균으로서 아포를 형섣하지 않으며 호기성 또는 통성 혐기성인 간균을 총칭한다. 제과",r:99,c:"hygiene"},
{q:"식품의 부패를 판정할 때 화학적 판정방법이 아닌 것은?",o:["TMA 측정","ATP 측정","LD50 측정","VBN 측정"],a:2,e:"LD50(반수치사량)은 독성 측정 방법으로 식품 부패 판정의 화학적 방법이 아니다.\n• TMA(트리메틸아민), ATP, VBN(휘발성 염기질소)은 부패 판정 방법이다.",r:93,c:"hygiene"},
{q:"다음 중 야채를 통해 감염되는 기생충은?",o:["광절열두조충","선모충","회충","폐흡충"],a:2,e:"광절열두조충: 주요 종숙주는 사람의 소장에 서식 선모충: 돼지,쥐,고양이,사람 등 다숙주성 기생충 폐흡충: 물 속에서 생활하다가 게나 가재와 같은 중간 숙주를 통해 사람 등에 감염되는 기생충 회충: 채소에 부착하거나 먼지에 섞여 사람의 입으로 침입하여 감염",r:99,c:"hygiene"},
{q:"다음 중 HACCP 적용의 7가지 원칙에 해당하지 않는 것은?",o:["위해요소 분석","HACCP 팀구성","한계기준설정","기록유지 및 문서관리"],a:1,e:"HACCP은 준비단계의 5절차와 적용단계의 7단계가 있으며 HACCP 팀 구성은 준비단계의 5절차 중에서 첫번째이다. 제과",r:99,c:"hygiene"},
{q:"다음 중 병원체가 바이러스(Virus)인 질병은?",o:["유행성 간염","결핵","발진티푸스","말라리아"],a:0,e:"유행성 간염(A형·B형 간염)은 바이러스에 의한 질병이다.\n• 결핵: 결핵균, 발진티푸스: 리케차, 말라리아: 원충(기생충)",r:93,c:"hygiene"},
{q:"어패류의 생식과 가장 관계 깊은 식중독 세균은?",o:["프로테우스균","장염 비브리오균","살모넬라균","비실러스균"],a:1,e:"어패류 생식과 가장 관계 깊은 식중독 세균은 장염 비브리오균(Vibrio parahaemolyticus)이다.\n• 해수세균으로 식염 3%에서 잘 증식한다.",r:93,c:"hygiene"},
{q:"미나마타병(Minamata disease)의 원인물질은?",o:["카드뮴","납","수은","비소"],a:2,e:"미나마타병(Minamata disease)은 유기수은(메틸수은) 중독에 의한 신경계 질환이다.\n• 카드뮴: 이타이이타이병, 납: 빈혈, 비소: 피부 흑변",r:90,c:"hygiene"},
{q:"보존료의 이상적인 조건과 거리가 먼 것은?",o:["독성이 없거나 매우 적을 것","저렴한 가격일 것","사용방법이 간편할 것","다량으로 효력이 있을 것"],a:3,e:"소량으로 효력이 있을 것",r:99,c:"ingredients"}]},
{title:"2008년 1회",desc:undefined,questions:[{q:"아이스크림 제조에서 오버런(over-run)이란?",o:["교반에 의해 크림의 체적이 몇 % 증가하는가를 나타낸 수치","생크림 안에 들어 있는 유지방이 응집해서 완전히 액체로부터 분리된 것","살균 등의 가열조작에 의해 불안정하게 된 유지의 결정을 적용으로 해서 안정화시킨 숙성 조작","생유 안에 들어 있는 큰 지방구를 미세하게 해서 안정화하는 공정"],a:0,e:"오버런(over-run)은 교반에 의해 크림의 체적이 원래보다 몇 % 증가하는가를 나타내는 수치이다. 공기 포집 정도를 나타낸다.",r:93,c:"ingredients"},
{q:"다음 제품 중 찜류 제품이 아닌 것은?",o:["만쥬","무스","푸딩","치즈케이크"],a:1,e:"찜과류중에 만쥬 푸딩 치즈케이크가 맞구요 무스는 냉과류에 속합니다 (무스, 바바루아, 젤리, 블라망제)",r:99,c:"manufacturing"},
{q:"사과파이 껍질의 결의 크기는 어떻게 조절하는가?",o:["쇼트닝의 입자크기로 조절한다.","쇼트닝의 양으로 조절한다.","접기수로 조절한다.","밀가루 양으로 조절한다."],a:0,e:"사과파이 껍질의 결 크기는 접기수(fold)로 조절한다.\n• 접기 횟수가 많으면 결이 가늘고, 적으면 결이 크다.",r:93,c:"ingredients"},
{q:"젤리 롤 케이크를 말 때 터지는 경우의 조치 사항이 아닌 것은?",o:["계란에 노른자를 추가시켜 사용한다.","설탕(자당)의 일부를 물엿으로 대치한다.","덱스트린의 점착성을 이용한다.","팽창이 과도한 경우에는 팽창제 사용량을 감소시킨다."],a:0,e:"젤리 롤 케이크가 터질 때 노른자를 추가하면 반죽이 단단해져 오히려 더 터지기 쉽다.\n• 물엿 대체, 덱스트린 사용, 팽창제 감소가 올바른 조치이다.",r:90,c:"ingredients"},
{q:"다음 중 튀김용 반죽으로 적합한 것은?",o:["퍼프 페이스트리 반죽","스펀지케이크 반죽","슈 반죽","쇼트브레드 쿠키 반죽"],a:2,e:"튀김용 반죽으로 슈 반죽이 적합하다. 슈 반죽은 미리 호화시킨 반죽으로 튀김 시 바삭한 질감을 낸다.\n• 퍼프 반죽은 층이 분리되고, 스펀지·쇼트브레드는 튀김에 부적합하다.",r:90,c:"manufacturing"},
{q:"파운드케이크 제조시 2중팬을 사용하는 목적이 아닌 것은?",o:["제품 바닥의 두꺼운 껍질형성을 방지하기 위하여","제품 옆면의 두꺼운 껍질형성을 방지하기 위하여","제품의 조직과 맛을 좋게 하기 위하여","오븐에서의 열전도 효율을 높이기 위하여"],a:3,e:"파운드케이크에 2중팬을 사용하는 목적은 바닥·옆면의 두꺼운 껍질 형성 방지와 조직·맛 개선이다. 열전도 효율을 높이는 것이 아니라 오히려 열전도를 완화시켜 고른 굽기를 돕는다.",r:90,c:"manufacturing"},
{q:"파이 반죽을 냉장고에서 휴지시키는 효과가 아닌 것은?",o:["밀가루의 수분 흡수를 돕는다.","유지의 결 형성을 돕는다.","반점 형성을 방지한다.","유지가 흘러나오는 것을 촉진시킨다."],a:3,e:"파이 반죽 냉장 휴지 효과: 수분 흡수 촉진, 유지 결 형성, 반점 방지 등이다. 유지가 흘러나오는 것을 촉진시키는 것은 효과가 아니라 결점이다.",r:93,c:"ingredients"},
{q:"케이크 반죽을 혼합할 때 반죽의 온도가 최적범위 이상이나 이하로 설정될 경우에 나타나는 현상이 아닌 것은?",o:["쇼트닝의 크리밍성이 감소한다.","공기의 혼합능력이 떨어진다.","팽창속도가 변화한다.","케이크의 체적이 증가한다."],a:3,e:"반죽 온도가 최적범위를 벗어나면 크리밍성 감소, 공기 혼합능력 저하, 팽창속도 변화가 일어난다. 케이크 체적이 증가하지 않고 오히려 감소한다.",r:90,c:"ingredients"},
{q:"퍼프페이스트리 제조시 팽창이 부족하여 부피가 빈약해지는 결점의 원인에 해당하지 않는 것은?",o:["반죽의 휴지가 길었다.","밀어펴기가 부적절하였다.","부적합한 유지를 사용하였다.","오븐의 온도가 너무 높았다."],a:0,e:"퍼프페이스트리에서 오븐 온도가 너무 높으면 겉껍질이 빨리 형성되어 오히려 팽창이 억제될 수 있으나, 출제 기준에서는 높은 오븐 온도가 팽창 부족의 원인이 아닌 것으로 분류하고 있다.\n• 긴 휴지, 부적절한 밀어펴기, 부적합한 유지가 팽창 부족의 원인이다.",r:80,c:"manufacturing"},
{q:"옐로 레이어 케이크에서 쇼트닝과 계란의 사용량 관계를 바르게 나타낸 것은?",o:["쇼트닝 x 0.7 = 계란","쇼트닝 x 0.9 = 계란","쇼트닝 x 1.1= 계란","쇼트닝 x 1.3 = 계란"],a:2,e:"옐로 레이어 케이크에서 쇼트닝 × 1.1 = 계란이다.\n• 쇼트닝보다 계란을 약 10% 더 사용한다.",r:85,c:"ingredients"},
{q:"아이싱의 끈적거림 방지 방법으로 잘못된 것은?",o:["액체를 최소량으로 사용한다.","40℃ 정도로 가온한 아이싱 크림을 사용한다.","안정제를 사용한다.","케이크 제품이 냉각되기 전에 아이싱한다."],a:3,e:"액체를 최소로 넣는것은 굳은 아이싱을 풀어주는 조치중 하나이다.",r:99,c:"manufacturing"},
{q:"버터크림 제조시 당액의 온도로 가장 알맞은 것은?",o:["80~90℃","98~104℃","114~118℃","150~155℃"],a:2,e:"버터크림 제조 시 당액(설탕시럽)의 온도는 114~118℃가 적합하다.\n• 이 온도에서 설탕이 적절한 농도로 졸여진다.",r:93,c:"ingredients"},
{q:"기본적인 스펀지케이크의 필수재료가 아닌 것은?",o:["밀가루","설탕","분유","소금"],a:2,e:"스펀지케이크 : 밀가루100, 설탕166, 계란166, 소금2 (%)",r:99,c:"ingredients"},
{q:"가나슈크림에 대한 설명으로 옳은 것은?",o:["생크림은 절대 끓여서 사용하지 않는다.","초콜릿과 생크림의 배합비율은 10:1이 원칙이다.","초콜릿 종류는 달라도 카카오 성분은 같다.","끓인 생크림에 초콜릿을 더한 크림이다."],a:3,e:"가나슈크림은 끓인 생크림에 초콜릿을 더한 크림이다.\n• 생크림을 끓여서 사용하며, 초콜릿 종류에 따라 카카오 성분이 다르다.",r:93,c:"ingredients"},
{q:"제과용 기계 설비와 거리가 먼 것은?",o:["오븐","라운더","에어믹서","데포지터"],a:1,e:"라운더(rounder)는 빵 반죽을 둥글리기 하는 제빵 전용 설비로 제과와 가장 거리가 멀다. 오븐, 에어믹서, 데포지터는 제과에서도 사용된다.",r:90,c:"manufacturing"},
{q:"제빵시 팬기름의 조건으로 적합하지 않는 것은?",o:["발연점이 낮을 것","무취일 것","무색일 것","산패가 잘 안될 것"],a:0,e:"제빵 시 팬기름은 발연점이 높아야 한다. 발연점이 낮으면 굽기 중 연기가 나고 유해물질이 생성된다.",r:85,c:"ingredients"},
{q:"이스트의 사멸로 가스 발생력, 보유력이 떨어지며 환원성 물질이 나와 반죽이 끈적거리고 퍼지기 쉬운 단점을 지닌 제빵법은?",o:["냉동반죽법","호프종법","연속삭제빵법","액체발효법"],a:0,e:"냉동반죽법은 냉동 과정에서 이스트가 손상되어 가스 발생력과 보유력이 떨어지고, 글루타치온 등 환원성 물질이 유출되어 글루텐 구조가 약화된다.",r:93,c:"manufacturing"},
{q:"빵의 원재료 중 밀가루의 글루텐 함량이 많을 때 나타나는 품질적 결함이 아닌 것은?",o:["겉껍질이 두껍다.","기공이 불규칙하다.","비대칭성이다.","윗면이 검다."],a:3,e:"밀가루의 글루텐 함량이 많으면 겉껍질이 두껍고, 기공이 불규칙하며, 비대칭이 될 수 있다. 윗면이 검은 것은 당류 과다나 높은 오븐 온도에 의한 것이다.",r:93,c:"ingredients"},
{q:"액체발효법에서 발효가 종료된 것을 알기 위한 방법으로 가장 적합한 것은?",o:["시간의 경과 측정","pH 측정","거품의 상태 관창","색, 냄새 등 관능검사"],a:1,e:"액체발효법에서 발효 종료를 판단하는 방법으로 거품의 상태 관찰이 가장 적합하다. 거품이 올랐다가 가라앉으면 발효가 완료된 것이다.\n• pH 측정도 유효하지만, 보기 중에서는 거품 상태 관찰이 정답이다.",r:93,c:"manufacturing"},
{q:"과발효된(over proof) 반죽으로 만들어진 제품의 결함이 아닌 것은?",o:["조직이 거칠다.","식감이 건조하고 단단하다.","내부에 구멍이나 터널현상이 나타난다.","제품의 발효향이 약하다."],a:3,e:"과발효된 반죽의 제품은 발효향이 강하다(약하지 않다). 조직이 거칠고, 식감이 건조·단단하며, 내부에 구멍·터널이 생긴다.",r:90,c:"manufacturing"},
{q:"일반적인 스펀지도우법으로 식빵을 만들 때 도우(dough)의 가장 적당한 온도는?",o:["17℃ 정도","27℃ 정도","37℃ 정도","47℃ 정도"],a:1,e:"스펀지도우법에서 도우(dough)의 적정 온도는 약 27℃이다.\n• 스펀지 온도(24℃)보다 높게 설정한다.",r:93,c:"manufacturing"},
{q:"반죽을 믹싱(mixing)할 때 원료가 균일하게 혼합되고 글루텐의 구조가 형성도기 시작하는 단계는?",o:["픽업단계(pick up stage)","발전단계(development stage)","클린업단계(clean up stage)","렛다운단계(let down stage)"],a:0,e:"픽업단계(pick up stage)는 원료가 균일하게 혼합되고 글루텐 구조가 형성되기 시작하는 단계이다.\n• 클린업: 반죽이 깨끗해지는 단계, 발전: 글루텐 최적 발달, 렛다운: 과도한 믹싱",r:93,c:"manufacturing"},
{q:"밀가루 중에 포함된 α-amylase의 활성도를 측정하는 것은?",o:["아밀로그래프","믹서트론","익스텐소그래프","믹소그래프"],a:0,e:"아밀로그래프는 밀가루 중 α-amylase의 활성도를 측정하여 전분의 호화 특성을 파악하는 기기이다.",r:85,c:"ingredients"},
{q:"밀가루 성분 중 함량이 많을수록 노화가 지연되지 않는 것은?",o:["수분","단백질","비수용성 펜토산","아밀로오스"],a:3,e:"아밀로오스 함량이 많을수록 노화가 촉진된다(지연되지 않는다).\n• 수분, 단백질, 비수용성 펜토산은 노화를 지연시킨다.",r:93,c:"nutrition"},
{q:"제빵 공장에서 3명의 작업자가 10시간에 식빵 400개, 케이크 50개, 모카빵 200개를 만들고 있다. 1시간에 직원 1인에게 시간당 지급되는 비용이 1000원이라 할 때, 평균적으로 제품의 개당 노무비는 약 얼마인가?",o:["46원","54원","60원","73원"],a:0,e:"노무비 총액을 제품 수로 나누면 된다. (노무비 * 시간 * 인원)/제품수 = 1000*3*10/650 = 46원 제과",r:99,c:"manufacturing"},
{q:"굽기 중에 일어나는 변화로 가장 높은 온도에서 발생하는 것은?",o:["이스트의 사멸","전분의 호화","탄산가스 용해도 감소","단백질 변성"],a:3,e:"굽기 중 가장 높은 온도에서 발생하는 것은 단백질 변성이다.\n• 탄산가스 용해도 감소(약 50℃), 이스트 사멸(약 60℃), 전분 호화(약 65~70℃), 단백질 변성(약 70~80℃) 순이다.",r:93,c:"ingredients"},
{q:"베이커스 퍼센트(Baker's percent)에서 기준이 되는 재료는?",o:["이스트","물","밀가루","계란"],a:2,e:"베이커스 퍼센트에서 기준이 되는 재료는 밀가루이다. 밀가루 100%를 기준으로 다른 재료의 비율을 표시한다.",r:90,c:"ingredients"},
{q:"다음 중 제품의 부피가 작아지는 결점을 일으키는 원인이 아닌 것은?",o:["반죽 정도의 초과","소금 사용량 부족","설탕 사용량 과다","이스트푸드 사용량 부족"],a:1,e:"소금 사용량 부족 시 글루텐이 약해져 오히려 부피가 커질 수 있다. 부피가 작아지는 원인이 아니다.\n• 반죽 과다, 설탕 과다, 이스트푸드 부족이 부피 감소 원인이다.",r:93,c:"ingredients"},
{q:"주로 독일빵, 블란서빵 등 유럽빵이나 토스트브레드(toast bread) 등 된반죽을 치는데 사용하는 믹서는?",o:["수평형 믹서","수직형 믹서","나선형 믹서","혼합형 믹서"],a:2,e:"수직형 믹서는 주로 독일빵, 프랑스빵 등 유럽빵이나 토스트브레드 등 된반죽을 치는데 사용한다.\n• 수평형: 대량생산용, 나선형: 이탈리아빵 등",r:93,c:"manufacturing"},
{q:"둥글리기의 목적이 아닌 것은?",o:["글루텐의 구조와 방향 정돈","수분 흡수력 증가","반죽의 기공을 고르게 유지","반죽 표면에 얇은 막 형성"],a:1,e:"둥글리기 목적 1. 절단면의 점착성 감소 2. 표피를 형성하여 탄력 유지 3. 가스보유력 유지 4. 글루텐 구조정돈 5. 반죽의 기공을 고르게 유지",r:99,c:"ingredients"},
{q:"젤라틴에 대한 설명으로 틀린 것은?",o:["순수한 젤라틴은 무취, 무미, 무색이다.","해조류인 우뭇가사리에서 추출된다.","끓은 물에 용해되며, 냉각되면 단단한 젤(gel) 상태가 된다.","설탕량이 많으면 젤 상태가 단단하고, 산성 용액 중에서 가열하면 젤 능력이 줄거나 없어진다."],a:1,e:"해조류인 우뭇가사리에서 추출되는 것은 한천이다.(식물성) 젤라틴은 육류나 어류의 결체조직이나 뼈, 피부조직등의 '콜라겐'성분만을 추출하여 가공 (동물성)",r:99,c:"ingredients"},
{q:"물에 칼슘염과 마그네슘염이 일반적인 양보다 많이 녹아 있을 때의 물의 상태는?",o:["영구적 연수","일시적 연수","일시적 경수","영구적 경수"],a:3,e:"물에 칼슘염과 마그네슘염이 많이 녹아 있으면 영구적 경수이다.\n• 탄산염이 많으면 일시적 경수(끓이면 제거), 황산염·염화물이 많으면 영구적 경수(끓여도 제거 안 됨)",r:93,c:"nutrition"},
{q:"과일 잼 형성의 3가지 필수요건이 아닌 것은?",o:["설탕","펙틴","산(酸)","젤라틴"],a:3,e:"과일 잼 형성의 3가지 필수요건은 설탕, 펙틴, 산(酸)이다. 젤라틴은 잼이 아닌 젤리·무스 등에 사용된다.",r:90,c:"ingredients"},
{q:"전분을 덱스트린(dextrin)으로 변화시키는 효소는?",o:["β-아밀라아제(amylase)","α-아밀라아제(amylase)","말타아제(maltase)","찌마아제(zymase)"],a:1,e:"아밀라아제 - 전분(탄수화물) 분해 프로테아제 - 단백질 분해",r:99,c:"ingredients"},
{q:"압착효모(생이스트)의 고형분 함량은 보통 몇 %인가?",o:["10%","30%","50%","60%"],a:1,e:"압착효모(생이스트)는 수분 함량 약 68~73%이며, 고형분은 약 27~32%이다. 건조효모는 고형분이 92~96%이다.",r:95,c:"ingredients"},
{q:"계란 흰자의 고형분 함량은 약 몇 % 정도인가?",o:["12%","24%","30%","40%"],a:0,e:"계란의 흰자는 수분 88프로 고형질 12프로로 구성",r:99,c:"ingredients"},
{q:"유지의 가소성은 그 구성성분 중 주로 어떤 물질의 종류와 양에 의해 결정되는가?",o:["스테롤","트리글리세라이드","유리지방산","토코페롤"],a:1,e:"유지의 가소성은 트리글리세라이드(중성지방)의 종류와 양에 의해 결정된다.\n• 포화·불포화 지방산의 비율에 따라 결정화 특성이 달라진다.",r:93,c:"ingredients"},
{q:"바닐라에센스가 우유에 미치는 영향은?",o:["생취를 감소시킨다.","마일드한 감을 감소시킨다.","단백질의 영양가를 증가시키는 강화제 역할을 한다.","색감을 좋게 하는 착색료 역할을 한다."],a:0,e:"바닐라에센스는 우유의 생취(비린내)를 감소시키는 역할을 한다.\n• 향료로서 풍미를 개선하지만 영양가나 색감과는 관계가 적다.",r:85,c:"nutrition"},
{q:"일반적으로 밀가루의 단백질이 1% 증가할 때 흡수율은 어떻게 변하는가?",o:["1.5% 감소","1.5% 증가","2.5% 감소","2.5% 증가"],a:1,e:"밀가루의 단백질이 1% 증가하면 흡수율은 약 1.5~2.5% 증가한다.\n※ 보기에 2.5% 증가가 정답이다.",r:88,c:"ingredients"},
{q:"과자와 빵에 우유가 미치는 영향이 아닌 것은?",o:["영양을 강화시킨다.","보수력이 없어서 노화를 촉진시킨다.","겉껍질 색깔을 강하게 한다.","이스트에 의해 생성된 향을 착향시킨다."],a:1,e:"우유는 제품에 수분을 잡아두는 수분보유력이 노화를 지연하고 신선도를 연장시킨다",r:99,c:"ingredients"},
