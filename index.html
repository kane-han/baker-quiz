{q:"손에 화농성 염증이 있는 조리자가 만든 김밥을 먹고 감염될 수 있는 식중독은?",o:["비브리오 패혈증","살모넬라 식중독","보툴리누스 식중독","황색 포도상구균 식중독"],a:3,e:"조리사의 피부에 생긴 고름인 화농에 있는 황색 포도상구균에 의하여 식중독이 일어난다.",r:99,c:"hygiene"},
{q:"다음 중 독버섯 독성분은?",o:["솔라닌(solanine)","에르고톡신(ergotoxin)","무스카린(muscarine)","베네루핀(venerupin)"],a:2,e:"무스카린(muscarine)은 광대버섯 등 독버섯의 대표적인 독성분이다. 솔라닌은 감자, 에르고톡신은 맥각, 베네루핀은 조개의 독성분이다.",r:93,c:"hygiene"},
{q:"다음 중 밀가루 개량제가 아닌 것은?",o:["과산화벤조일","과황산암모늄","염화칼슘","이산화염소"],a:2,e:"염화칼슘은 밀가루 개량제가 아니라 두부 응고제나 이스트푸드의 성분이다. 과산화벤조일(표백제), 과황산암모늄(산화제), 이산화염소(표백·살균)는 밀가루 개량제이다.",r:93,c:"ingredients"},
{q:"식품보존료로서 갖추어야 할 요건으로 적합한 것은?",o:["공기, 광선에 안정할 것","사용방법이 까다로울 것","일시적으로 효력이 나타날 것","열에 의해 쉽게 파괴될 것"],a:0,e:"식품보존료는 공기·광선에 안정하고, 사용이 간편하며, 지속적 효력, 열에 안정해야 한다.",r:82,c:"hygiene"},
{q:"다음 중 곰팡이가 생존하기에 가장 어려운 서식처는?",o:["물","곡류식품","두류식품","토양"],a:0,e:"물(수중)은 곰팡이가 생존하기 어려운 환경이다. 곰팡이는 호기성이며 수분활성도가 낮은 곡류, 두류, 토양에서 잘 생존한다.",r:90,c:"hygiene"},
{q:"장티푸스에 대한 일반적인 설명으로 잘못된 것은?",o:["잠복기간은 7~14일 이다.","사망률은 10~20% 이다.","앓고 난 뒤 강한 면역이 생긴다.","예방할 수 있는 백신은 개발되어 있지 않다."],a:3,e:"장티푸스 예방 백신은 개발되어 있다. 경구용 Ty21a 백신과 주사용 Vi 다당류 백신이 사용되고 있다.",r:85,c:"hygiene"},
{q:"제1종 전염병으로 소화기계 전염병인 것은?",o:["결핵","화농성피부염","장티푸스","독감"],a:2,e:"장티푸스는 살모넬라균에 의한 소화기계 전염병으로 제1군(제1종) 전염병에 해당한다.",r:85,c:"hygiene"},
{q:"살모넬라 식중독의 예방대책으로 틀린 것은?",o:["조리된 식품을 냉장고에 장기 보관한다.","음식물을 철저히 가열하여 섭취한다.","개인위생관리를 철저히 한다.","유해동물과 해충을 방제한다."],a:0,e:"조리된 식품을 냉장고에 장기 보관하면 살모넬라균이 완전히 사멸하지 않아 식중독 위험이 있다. 가열 섭취, 개인위생, 해충 방제가 올바른 예방법이다.",r:93,c:"hygiene"}]},
{title:"2010년 1회",desc:undefined,questions:[{q:"아이싱의 끈적거림 방지 방법으로 잘못된 것은?",o:["액체를 최소량으로 사용한다.","40℃ 정도로 가온한 아이싱 크림을 사용한다.","안정제를 사용한다.","케이크 제품이 냉각되기 전에 아이싱한다."],a:3,e:"액체를 최소로 넣는것은 굳은 아이싱을 풀어주는 조치중 하나이다.",r:99,c:"manufacturing"},
{q:"파운드 케이크 제조시 윗면이 터지는 경우가 아닌 것은?",o:["굽기 중 껍질 형성이 느릴 때","반죽 내의 수분이 불충분할 때","설탕 입자가 용해되지 않고 남아 있을 때","반죽을 팬에 넣은 후 굽기까지 장시간 방치할 때"],a:0,e:"굽기 중 껍질 형성이 느리면 내부 팽창압이 분산되어 오히려 터짐이 방지된다. 반면 껍질이 빨리 형성되면 내부 가스가 빠져나가지 못해 표면이 터진다. 수분 부족, 미용해 설탕, 장시간 방치는 윗면 터짐의 원인이 된다.",r:93,c:"manufacturing"},
{q:"밤과자를 성형한 후 물을 뿌려주는 이유가 아닌 것은?",o:["덧가루의 제거","굽기 후 철판에서 분리용이","껍질색의 균일화","껍질의 터짐 방지"],a:1,e:"밤과자 성형 후 물을 뿌리는 주된 이유는 덧가루를 제거하고, 껍질색을 균일하게 하며, 표면 건조를 방지하여 껍질 터짐을 막기 위한 것이다. 굽기 후 철판에서의 분리는 물 뿌림의 목적과 관련이 없다.",r:85,c:"manufacturing"},
{q:"도넛의 흡유량이 높았을 때 그 원인은?",o:["고율배합 제품이다","튀김시간이 짧다.","튀김온도가 높았다.","휴지시간이 짧다."],a:0,e:"도넛 수분 과다 : 팽창과다, 흡유 과다, 형태불균형, 혹돌출, 외부링모양 과대 도넛 수분 부족 : 팽창부족, 형태불균형, 갈라짐, 점도가 큼, 외피에 톱늬모양 발생",r:99,c:"manufacturing"},
{q:"슈 껍질의 굽기 후 밑면이 좁고 공과 같은 형태를 가졌다면 그 원인은?",o:["밑불이 윗 불보다 강하고 팬에 기름칠이 적다.","반죽이 질고 글루텐이 형성된 반죽이다.","온도가 낮고 팬에 기름칠이 적다.","반죽이 되거나 윗 불이 강하다."],a:2,e:"오븐 온도가 낮으면 슈 반죽이 천천히 팽창하여 옆으로 퍼지지 못하고, 팬에 기름칠이 부족하면 밑면이 달라붙어 퍼지지 못해 밑면이 좁은 공 모양이 형성된다.",r:93,c:"manufacturing"},
{q:"다음 유당(lactose)의 설명 중 틀린 것은?",o:["포유동물의 젖에 많이 함유되어 있다.","사람에 따라서 유당을 분해하는 효소가 부족하여 잘 소화시키지 못하는 경우가 있다.","비환원당이다.","유산균에 의하여 유산을 생성한다."],a:2,e:"비 환원당은 설탕 (유일한 비 환원당임)",r:99,c:"nutrition"},
{q:"반죽형 과자반죽의 믹싱법과 장점이 잘못 짝지어진 것은?",o:["크림법 - 제품의부피를 크게 함","블렌딩법 -제품의 내상이 부드러움","설탕/물법 - 계량의 정확성과 운반의 편리성","1단계법 - 사용 재료의 절약"],a:3,e:"1단계법 : 모든 재료를 한 번에 넣어 반죽하는 방법으로 노동, 시간을 절약함.",r:99,c:"manufacturing"},
{q:"다음 중 반죽의 pH가 가장 낮아야 좋은 제품은?",o:["화이트레이어케이크","스펀지케이크","엔젤푸드케이크","파운드케이크"],a:2,e:"화이트레이어 7.4~7.8 스펀지 7.3~7.6 엔젤푸드 5.2~6.0 파운드 6.6~7.1",r:99,c:"manufacturing"},
{q:"푸딩의 제법에 관한 설명으로 틀린 것은?",o:["모든 재료를 섞어서 체에 거른다.","푸딩 컵에 부어 중탕으로 굽는다.","우유와 설탕을 섞어 설탕이 캐러멜화 될 때까지 끓인다.","다른 그릇에 계란, 소금 나머지 설탕을 넣어 홍합하고 우유를 섞는다."],a:2,e:"캐러멜 소스는 설탕과 물을 끓여 캐러멜화시키는 것이지, 우유와 설탕을 끓이는 것이 아니다. 우유는 따로 데워서 계란 혼합물에 섞는다.",r:93,c:"ingredients"},
{q:"비용적이 2.5(㎤/g)인 제품을 원형팬을 이용하여 만들고자 한다. 필요한 반죽의 무게는?",o:["100g","251g","628g","1570g"],a:1,e:"반죽 무게 = 팬 용적 ÷ 비용적이다. 원형팬 용적이 약 628㎤(반지름 10cm, 높이 2cm 기준)라면 628 ÷ 2.5 = 251g이 된다.",r:93,c:"ingredients"},
{q:"케이크 제조시 비중의 효과를 잘못 설명한 것은?",o:["비중이 낮은 반죽은 기공이 크고 거칠다.","비중이 낮은 반죽은 냉각 시 주저앉는다.","비중이 높은 반죽은 부피가 커진다.","제품별로 비중을 다르게 하여야 한다."],a:2,e:"비중이 높은 반죽은 공기 포집이 적어 부피가 작아진다(커지지 않는다). 비중이 낮을수록 공기가 많아 부피가 크다.",r:93,c:"manufacturing"},
{q:"데코레이션 케이크 하나를 완성하는데 한 작업자가 5분이 걸린다고 한다. 작업자 5명이 500개를 만드는데 몇 시간 몇 분이 걸리는가?",o:["약 8시간 15분","약 8시간 20분","약 8시간 25분","약 8시간 30분"],a:1,e:"1개 제조에 5분 걸리므로, 작업자 5명이 동시에 작업하면 분당 1개(=5명 × 1개/5분)를 생산합니다. 500개 생산에는 500분이 필요하며, 500분 = 8시간 20분(8 × 60 + 20 = 500)입니다. 따라서 정답은 약 8시간 20분입니다.",r:99,c:"manufacturing"},
{q:"도넛과 케이크의 글레이즈(glaze) 사용 온도로 가장 적합한 것은?",o:["23℃","34℃","49℃","68℃"],a:2,e:"도넛 글레이즈 시 온도: 40∼50℃가 적당하다.",r:99,c:"manufacturing"},
{q:"젤리를 만드는데 사용되는 재료가 아닌 것은?",o:["젤라틴","한천","레시틴","알긴산"],a:2,e:"레시틴은 계란 노른자에 있는 것으로 천연유화제",r:99,c:"ingredients"},
{q:"젤리 롤 케이크를 말아서 성형 할 때 표면이 터지는 결점에 대한 보완사항이 아닌 것은?",o:["노른자 함량을 증가하고 전란 함량은 감소한다.","화학적 팽창제 사용량을 감소시킨다.","배합의 점성을 증가시킬 수 있는 덱스트린을 첨가한다.","설탕의 일부를 물엿으로 대체한다."],a:0,e:"노른자의 비율이 높은 경우 표면이 터지기 쉬우므로 노른자를 줄이고 전란을 증가시킨다.",r:99,c:"ingredients"},
{q:"빵의 원재료 중 밀가루의 글루텐 함량이 많을 때 나타나는 결함이 아닌 것은?",o:["겉껍질이 두껍다.","기공이 불규칙하다.","비대칭성이다.","윗면이 검다."],a:3,e:"밀가루의 글루텐 함량이 많으면 겉껍질이 두껍고, 기공이 불규칙하며, 비대칭이 될 수 있다. 윗면이 검은 것은 당류 과다나 높은 오븐 온도에 의한 것이다.",r:93,c:"ingredients"},
{q:"제빵 배합율 작성시 베이커스 퍼센트(Baker's %)에서 기준이 되는 재료는?",o:["설탕","물","밀가루","유지"],a:2,e:"베이커스 퍼센트에서 기준이 되는 재료는 밀가루이다. 밀가루를 100%로 놓고 나머지 재료의 비율을 계산한다.",r:90,c:"ingredients"},
{q:"다음 표에 나타난 배합 비율을 이용하여 빵 반죽 1802g을 만들려고 한다. 다음 재료 중 계량된 무게가 틀린 것은?",o:["(가) 630g","(나) 2.4g","(다) 60g","(라) 30g"],a:1,e:"배합률을 이용한 밀가루 무게 계산 시, 총 반죽 무게에서 각 재료의 배합률 비율로 역산합니다. (나) 재료의 경우 계산 결과는 약 2g이 되어야 하지만 보기에는 2.4g으로 표기되어 있으므로, 계량된 무게가 틀린 것은 (나) 2.4g입니다.",r:99,c:"manufacturing"},
{q:"오븐 내에서 뜨거워진 공기를 강제 순환시키는 열전달 방식은?",o:["대류","전도","복사","전자파"],a:0,e:"뜨거운 공기를 강제 순환시키는 열전달 방식은 대류(convection)이다. 전도는 직접 접촉, 복사는 전자파에 의한 열전달이다.",r:90,c:"manufacturing"},
{q:"프랑스빵에서 스팀을 사용하는 이유로 부적당한 것은?",o:["거칠고 불규칙하게 터지는 것을 방지한다.","겉껍질에 광택을 내준다.","얇고 바삭거리는 껍질이 형성되도록 한다.","반죽의 흐름성을 크게 증가시킨다."],a:3,e:"스팀은 반죽의 흐름성을 크게 증가시키지 않는다. 스팀은 불규칙한 터짐 방지, 껍질 광택, 얇고 바삭한 껍질 형성에 도움을 준다.",r:93,c:"manufacturing"},
{q:"생산된 소득 중에서 인건비와 관련된 부분은?",o:["노동분배율","생산가치율","가치적 생산성","물량적 생산성"],a:0,e:"노동분배율은 생산된 소득(부가가치) 중에서 인건비가 차지하는 비율을 나타낸다.",r:85,c:"management"},
{q:"팬에 바르는 기름은 다음 중 무엇이 높은 것을 선택해야 하는가?",o:["산가","크림성","가소성","발연점"],a:3,e:"팬에 바르는 기름은 발연점이 높은 것을 선택해야 한다. 발연점이 낮으면 굽기 과정에서 연기가 나고 유해물질이 생성된다.",r:90,c:"ingredients"},
{q:"데니시 페이스트리의 일반적인 반죽 온도는?",o:["0 ~ 4℃","8 ~ 12℃","18 ~ 22℃","27 ~ 30℃"],a:2,e:"데니시 페이스트리의 반죽 온도는 18~22℃가 일반적이다. 이 온도 범위에서 이스트 활성을 유지하면서 유지층이 녹지 않도록 하여 층상 구조를 형성할 수 있다.",r:93,c:"manufacturing"},
{q:"굽기 후 빵을 썰어 포장하기에 가장 좋은 온도는?",o:["17℃","27℃","37℃","47℃"],a:2,e:"굽기 후 빵을 썰어 포장하기에 가장 좋은 빵 속 온도는 약 37℃이다. 이 온도에서 빵이 충분히 냉각되어 형태가 안정되면서도 수분이 적절히 유지되어 썰기와 포장에 적합한 상태가 된다.",r:90,c:"manufacturing"},
{q:"ppm을 나타낸 것으로 옳은 것은?",o:["g당 중량 백분율","g당 중량 만분율","g당 중량 십만분율","g당 중량 백만분율"],a:3,e:"parts per million, 즉 백만분율",r:99,c:"manufacturing"},
{q:"성형시 둥글리기의 목적과 거리가 먼 것은?",o:["표피를 형성시킨다.","가스포집을 돕는다.","끈적거림을 제거한다.","껍질색을 좋게한다."],a:3,e:"껍질색을 좋게 하는 것은 둥글리기가 아니라 굽기 공정의 결과이다. 둥글리기는 표피 형성, 가스 포집, 끈적거림 제거가 목적이다.",r:93,c:"manufacturing"},
{q:"펀치의 효과와 거리가 먼 것은?",o:["반죽의 온도를 균일하게 한다.","이스트의 활성을 돕는다.","산소공급으로 반죽의 산화숙성을 진전시킨다.","성형을 용이하게 한다."],a:3,e:"성형을 용이하게 하는 것은 중간발효(벤치타임)의 효과이다. 펀치는 온도 균일화, 이스트 활성화, 산소 공급에 의한 산화숙성 진전이 효과이다.",r:93,c:"manufacturing"},
{q:"빵반죽의 흡수율에 영향을 미치는 요소에 대한 설명으로 옳은 것은?",o:["설탕 5% 증가시 흡수율은 1%씩 감소한다.","빵반죽에 알맞은 물은 경수(센물)보다 연수(단물)이다.","반죽온도가 5℃ 증가함에 따라 흡수율이 3% 증가한다.","유화제 사용량이 많으면 물과 기름의 결합이 좋게되어 흡수율이 감소된다."],a:0,e:"1. 빵반죽에 연수를 사용하면 글루텐이 약해지며 흡수량이 적고 경수를 사용하면 글루텐이 강해지며 흡수량이 많다. 2. 반죽온도가 5도 증가하면 물흡수율은 3%감소한다.",r:99,c:"ingredients"},
{q:"빵의 노화 방지에 유효한 첨가물은?",o:["이스트푸드","산성탄산나트륨","모노글리세리드","탄산암모늄"],a:2,e:"모노글리세리드(유화제)는 전분과 복합체를 형성하여 노화를 지연시키는 대표적인 첨가물이다.",r:85,c:"ingredients"},
{q:"냉동반죽을 2차 발효시키는 방법 중 가장 올바른 것은?",o:["냉장고에서 15~16시간 냉장 해동시킨 후 30~33℃, 상대습도 80%의 2차 발효실에서 발효시킨다.","실온(25℃)에서 30~60분간 자연 해동 시킨 후 30℃, 상대습도 85%의 2차 발효실에서 발효시킨다.","냉동반죽을 30~33℃, 상대습도 80% 2차 발효실에 넣어 해동 시킨 후 발효시킨다.","냉동 반죽을 38~43℃, 상대습도 90%의 고온다습한 2차 발효실에 넣어 해동시킨 후 발효시킨다."],a:0,e:"냉동 반죽의 해동시, 완만해동, 냉장해동을 준수한다.",r:99,c:"manufacturing"},
{q:"상대적 감미도가 올바르게 연결된 것은?",o:["과당 : 135","포도당 : 75","맥아당 : 16","전화당 : 100"],a:1,e:"감미도 설탕(자당)이 100으로 기준이 됨. 과당 175 ＞전화당 130 ＞자당(설탕)100 ＞포도당 75 ＞맥아당 32 ＞유당(젖당) 16",r:99,c:"ingredients"},
{q:"젤리 형성의 3요소가 아닌 것은?",o:["당분","유기산","펙틴","염"],a:3,e:"젤리 형성의 3요소는 당분, 유기산(산), 펙틴이다. 염(소금)은 젤리 형성 요소가 아니다.",r:82,c:"manufacturing"},
{q:"다음 밀가루 중 빵을 만드는데 사용되는 것은?",o:["박력분","중력분","강력분","대두분"],a:2,e:"1. 박력분 : 단백질 함량 7~9%, 제과, 케이크, 튀김옷 등에 사용 2. 중력분 : 단백질 함량 9~11%, 쿠키, 만두피, 국수 등 면류에 사용(만일 중력분이 없을 때 박력분과 강력분을 1:1로 섞어 사용) 3. 강력분 : 단백질 함량 11~13%, 파이, 식빵, 스파게티 등 제빵에 사용",r:99,c:"ingredients"},
{q:"일반적으로 가소성 유지제품(쇼트닝, 마가린, 버터 등)은 상온에서 고형질이 얼마나 들어있는가?",o:["20 ~ 30 %","50 ~ 60 %","70 ~ 80%","90 ~ 100 %"],a:0,e:"가소성 유지제품(쇼트닝, 마가린, 버터 등)은 상온에서 고형 지방 함량이 약 20~30%이다. 이 범위의 고형질 비율이 소성(可塑性, plasticity)을 부여하여 반고체 상태를 유지하게 한다.",r:90,c:"ingredients"},
{q:"일반적인 생 이스트의 적장한 저장온도는?",o:["-15℃","-10~-5℃","0~5℃","15~20℃"],a:2,e:"생이스트의 적정 저장온도는 0~5℃(냉장)이다. 냉동하면 세포가 손상되고, 상온에서는 빨리 활성을 잃는다.",r:85,v:0,c:"hygiene"},
{q:"이스트푸드에 관한 사항 중 틀린 것은?",o:["물 조절제 - 칼슘염","이스트 영양분 - 암모늄염","반죽 조절제 - 산화제","이스트 조절제 - 글루텐"],a:3,e:"글루텐은 이스트 조절제가 아니다. 이스트푸드의 구성: 물 조절제(칼슘염), 이스트 영양분(암모늄염), 반죽 조절제(산화제)이다.",r:93,c:"ingredients"},
{q:"밀가루를 전문적으로 시험하는 기기로 이루어진 것은?",o:["패리노그래프, 가스크로마토그래피, 익스텐소그래프","패리노그래프. 아밀로그래프, 파이브로 미터","패리노그래프, 익스텐소그래프, 아밀로그래프","아밀로그래프, 익스텐소그래프, 펑츄어 테이터"],a:2,e:"패리노그래프(흡수율·믹싱특성), 익스텐소그래프(신장성·저항), 아밀로그래프(호화특성)가 밀가루 전문 시험 기기의 올바른 조합이다.",r:90,c:"ingredients"},
{q:"다음 중 코코아에 대한 설명으로 잘못된 것은?",o:["코코아에는 천연 코코아와 더취 코코아가 있다.","더취 코코아는 천연 코코아를 알칼리 처리하여 만든다.","더취 코코아는 색상이 진하고 물에 잘 분산된다.","천연 코코아는 중성을 더취 코코아는 산성을 나타낸다."],a:3,e:"천연 코코아는 산성을, 더취 코코아는 중성을 나타낸다.",r:99,c:"ingredients"},
{q:"바게트 배합률에서 비타민C 30ppm 사용하려고 할 때 이 용량을 %로 올바르게 타나낸 것은?",o:["0.3%","0.03%","0.003%","0.0003%"],a:2,e:"1ppm=1g/1ton=1g/1,000Kg=1g/1,000,000g=0.000001 30ppm=0.000001×30=0.00003×100=0.003%",r:99,c:"nutrition"},
{q:"일반적으로 제빵에 사용하는 밀가루의 단백질 함량은?",o:["7 ~9%","9 ~10%","11 ~13%","14 ~ 16%"],a:2,e:"제빵에 사용하는 밀가루 : 강력분 강력분의 단백질함량: 11.5~13% 중력분 : 9~11% 박력분 : 7~9%(제과에서 주로 사용)",r:99,c:"ingredients"},
{q:"유장(whey products) 에 탈지분유, 밀가루, 대두분 등을 혼합하여 탈지분유의 기능과 유사하게 한 제품은?",o:["시유","농축 우유","대용 분유","전지분유"],a:2,e:"대용 분유는 유장에 탈지분유, 밀가루, 대두분 등을 혼합하여 탈지분유의 기능을 대체할 수 있도록 만든 제품이다.",r:90,c:"ingredients"},
{q:"계란 흰자가 360g 필요하다고 할 때 전란 60g 짜리 계란은 몇 개 정도 필요한가?",o:["6개","8개","10개","13개"],a:2,e:"전란 60g에서 흰자는 약 60%인 36g에 해당한다. 필요한 흰자 360g ÷ 36g = 10개가 된다.",r:92,c:"ingredients"},
{q:"화이트 초콜릿에 들어 있는 카카오버터의 함량은?",o:["70% 이상","20% 이상","10% 이하","5% 이하"],a:1,e:"화이트 초콜릿에는 카카오버터가 20% 이상 함유되어 있다. 카카오매스는 들어있지 않고, 카카오버터, 설탕, 우유 분말로 만든다.",r:93,c:"ingredients"},
{q:"제빵용 이스트에 들어있지 않은 효소는?",o:["찌마아제","인버타아제","락타아제","말타아제"],a:2,e:"이스트에 들어 있는 효소는 말타아제, 인베르타아제, 치마아제, 프로테아제, 리파아제 제빵",r:99,c:"nutrition"},
{q:"다음 중 전화당의 특성이 아닌 것은?",o:["껍질색의 형성을 빠르게 한다.","제품에 신선한 향을 부여한다.","설탕의 결정화를 감소, 방지한다.","가스 발생력이 증가한다."],a:3,e:"전화당은 가스 발생력을 증가시키지 않는다. 전화당은 껍질색 형성 촉진, 신선한 향 부여, 설탕 결정화 방지의 특성을 가진다.",r:85,c:"ingredients"},
{q:"콜레스테롤에 관한 설명 중 잘못된 것은?",o:["담즙의 성분이다.","비타민 D3 의 전구체가 된다.","탄수화물 중 다당류에 속한다.","다량 섭취시 동맥경화의 원인 물질이 된다."],a:2,e:"콜레스테롤은 탄수화물이 아니라 지질(스테로이드계 지질)에 속한다. 담즙 성분, 비타민D3 전구체, 동맥경화 원인 물질은 올바른 설명이다.",r:93,c:"nutrition"},
{q:"다당류 중 포도당으로만 구성되어 있는 탄수화물이 아닌 것은?",o:["셀룰로오스","전분","펙틴","글리코겐"],a:2,e:"펙틴은 갈락투론산이 주성분으로 포도당으로만 구성되어 있지 않다. 셀룰로오스, 전분, 글리코겐은 포도당으로만 구성된 다당류이다.",r:90,c:"ingredients"},
{q:"건조된 아몬드 100g에 탄수화물 16g, 단백질 18g, 지방 54g이 함유되어 있다면 열량은?",o:["약 200kcal","약 364kcal","약 622kcal","약 751kcal"],a:2,e:"열량 = 탄수화물(16×4) + 단백질(18×4) + 지방(54×9)\n= 64 + 72 + 486 = 622kcal",r:93,c:"nutrition"},
{q:"성장기 어린이, 빈혈환자, 임산부 등 생리적 요구가 높을 때 흡수율이 높아지는 영양소는?",o:["철분","나트륨","칼륨","아연"],a:0,e:"철분은 생리적 요구가 높을 때(성장기, 빈혈, 임신) 장에서의 흡수율이 높아지는 특성이 있다.",r:82,c:"nutrition"},
{q:"음식물을 통해서만 얻어야 하는 아미노산과 거리가 먼 것은?",o:["메티오닌(methionine)","리신(lysine)","트립토판(tryptophan)","글루타민(glutamine)"],a:3,e:"체내 합성이 안 되므로 반드시 음식물에서 섭취해야 하는 아미노산은 이소류신, 류신, 리신, 메티오닌, 페닐알라닌, 트레오닌, 트립토판, 발란등 8종류 어린이와 회복기 환자에게는 8종류 + 히스타민을 합한 9종류 보기에 없는 글루타민이 답 4.",r:99,c:"nutrition"},
{q:"다음 중 인수공통전염병은?",o:["폴리오","이질","야토병","전염성 설사병"],a:2,e:"인수공통감염병에는 탄저병, 파상열, 결핵, 야토병, 돈닥독, Q열, 리스테리아증 이 있다. 제빵",r:99,c:"hygiene"},
{q:"절대적으로 공기와의 접촉이 차단된 상태에서만 생존할 수 있는 균은?",o:["호기성균","편성 호기성균","통성혐기성균","편성 혐기성균"],a:3,e:"편성 혐기성균은 산소가 없는 환경에서만 생존할 수 있다. 보툴리누스균이 대표적이며 통조림 등 밀봉 환경에서 증식한다.",r:93,v:0,c:"hygiene"},
{q:"물과 기름처럼 서로 혼합이 잘 되지 않은 두 종류의 액체를 혼합, 분산시켜주는 첨가물은?",o:["유화제","소포제","피막제","팽창제"],a:0,e:"유화제는 물과 기름처럼 섞이지 않는 두 액체를 혼합·분산시키는 식품첨가물이다. 레시틴, 모노글리세리드 등이 대표적이다.",r:90,c:"ingredients"},
{q:"주로 어패류에 의해서 감염되는 식중독균은?",o:["대장균","살모넬라균","장염비브리오균","리스테리아균"],a:2,e:"장염비브리오균(Vibrio parahaemolyticus)은 호염성 세균으로 주로 어패류를 통해 감염되는 식중독을 일으킨다.",r:93,c:"hygiene"},
{q:"병원성 대장균의 특성이 아닌 것은?",o:["감염시 주증상은 급성장염이다.","그람양성균이며 포자를 형성한다.","Lactose를 분해하여 산과 가스(CO2)를 생산한다.","열에 약하며 75℃에서 3분간 가열하면 사멸된다."],a:1,e:"병원성 대장균은 그람음성균이며 포자를 형성하지 않는다. '그람양성균이며 포자를 형성한다'는 틀린 설명이다.",r:85,c:"hygiene"},
{q:"다음의 경구 전염병을 일으키는 것으로 바르게 연결되지 않은 것은?",o:["곰팡이에 의한 것 - 아플라톡신","바이러스에 의한 것 - 유행성간염","원충류에 의한 것 - 아메바성 이질","세균에 의한 것 - 장티푸스"],a:0,e:"-경구감염병- 1. 세균성감염 : 세균성이질, 장티푸스, 파라티푸스, 콜레라, 성홍열, 디프테리아 2. 바이러스성 감염 : 유행성간염, 폴리오, 천열, 홍역 3. 원충성 : 아메바성이질",r:99,c:"hygiene"},
{q:"폐디스토마의 제1중간 숙주는?",o:["돼지고기","쇠고기","참붕어","다슬기"],a:3,e:"폐디스토마의 제1중간숙주는 다슬기이고, 제2중간숙주는 가재·민물게이다. 참붕어는 간디스토마의 제2중간숙주이다.",r:99,c:"manufacturing"},
{q:"식중독에 대한 설명 중 틀린 것은?",o:["클로스트리듐 보툴리늄균은 혐기성 세균이기 때문에 통조림 또는 진공포장 식품에서 증식하여 독소형 식중독을 일으킨다.","장염 비브리오균은 감염형 식중독 세균이며, 원인식품은 식육이나 유제품이다.","리스테리아균은 균수가 적어도 식중독을 일으키며 , 냉장온도에서도 증식이 가능하기 때문에 식품을 냉장상태로 보존하더라도 안심할 수 없다.","바실러스 세레우스균은 토양 또는 곡류 등 탄수화물 식품에서 식중독을 일으킬 수 있다."],a:1,e:"장염 비브리오균의 원인식품은 어패류이다.",r:99,c:"hygiene"},
{q:"합성감미료와 관련이 없는 것은?",o:["화합적 합성품이다.","아스파탐이 이에 해당한다.","일반적으로 설탕보다 감미 강도가 낮다.","인체 내에서 영양가를 제공하지 않는 합성감미료도 있다."],a:2,e:"합성감미료는 설탕(자당 100)보다 감미 강도가 높다.",r:99,c:"nutrition"},
{q:"식품과 부패에 관여하는 주요 미생물의 연결이 옳지 않은 것은?",o:["곡류 - 곰팡이","육류 - 세균","어패류 - 곰팡이","통조림 - 포자형성세균"],a:2,e:"어패류의 부패에 주로 관여하는 미생물은 세균이지 곰팡이가 아니다. 어패류는 수분이 많아 세균에 의한 부패가 주로 일어난다.",r:93,c:"hygiene"}]},
{title:"2010년 2회",desc:undefined,questions:[{q:"제과 제품을 평가하는데 있어 외부 특성에 해당하지 않는 것은?",o:["부피","껍질색","기공","균형"],a:2,e:"기공은 내부 특성 입니다",r:99,c:"manufacturing"},
{q:"일반적으로 옐로 레이어 케이크의 반죽온도는 어느 정도가 가장 적당한가?",o:["10˚C","16˚C","24˚C","34˚C"],a:2,e:"옐로 레이어 케이크의 적정 반죽온도는 약 24℃이다. 반죽형 케이크는 22~26℃ 범위에서 만든다.",r:77,c:"manufacturing"},
{q:"이탈리안 머랭에 대한 설명 중 틀린 것은?",o:["흰자를 거품으로 치대어 30% 정도의 거품을 만들고 설탕을 넣으면서 50% 정도의 머랭을 만든다.","흰자가 신선해야 거품이 튼튼하게 나온다.","뜨거운 시럽에 머랭을 한꺼번에 넣고 거품을 올린다.","강한 불에 구워 착색하는 제품을 만드는데 알맞다."],a:2,e:"머랭에 뜨거운 시럽(설탕100 : 물30 넣고 114~118도 로 끓인것)을 조금씩 나누어 넣으면서 거품(머랭)을 올린다(만든다)",r:99,c:"ingredients"},
{q:"다음 중 파운드케이크의 윗면이 자연적으로 터지는 원인이 아닌 것은?",o:["반죽 내에 수분이 불충분한 경우","설탕입자가 용해되지 않고 남아있는 경우","팬닝 후 장시간 방치하여 표피가 말랐을 경우","오븐 온도가 낮아 껍질 형성이 늦은 경우"],a:3,e:"오븐 온도가 높아 껍질이 빨리 생겨서 윗면이 자연적으로 터진다",r:99,c:"manufacturing"},
{q:"에클레어는 어떤 종류의 반죽으로 만드는가?",o:["스펀지 반죽","슈 반죽","비스킷 반죽","파이 반죽"],a:1,e:"에클레어는 슈 반죽(choux paste)으로 만든다. 밀가루를 끓는 물과 버터에 넣어 호화시킨 후 계란을 추가하는 반죽이다.",r:90,c:"manufacturing"},
{q:"다음 중 파이 껍질의 결점이 원인이 아닌 것은?",o:["강한 밀가루를 사용하거나 과도한 밀어펴기를 하는 경우","많은 파지를 사용하거나 불충분한 휴지를 하는 경우","적절한 밀가루와 유지를 혼합하여 파지를 사용하지 않은 경우","껍질에 구멍을 뚫지 않거나 계란 물칠을 너무 많이 한 경우"],a:2,e:"적절한 밀가루와 유지를 사용하고 파지를 사용하지 않는 것은 오히려 좋은 결과를 만든다. 강한 밀가루, 과도한 밀어펴기, 많은 파지, 불충분한 휴지, 구멍 미뚫기는 결점의 원인이다.",r:93,c:"ingredients"},
{q:"어떤 한 종류의 케이크를 만들기 위하여 믹싱을 끝내고 비중을 측정한 결과가 다음과 같을 때, 구운 후 기공이 조밀하고 부피가 가장 작아지는 비중의 수치는? 0.45, 0.55, 0.66, 0.75",o:["0.45","0.55","0.66","0.75"],a:3,e:"반죽 비중이 작을수록 커지고 공기가 많아져 기공이 커진다. 또한 조직이 거칠게 되는데 문제에서는 기공이 조밀하고 부피가 작아지는 비중의 수치를 원하니 비중이 큰 숫자 (0.75) 를 고르면 된다.",r:99,c:"manufacturing"},
{q:"다음 중 우유에 관한 설명이 아닌 것은?",o:["우유에 함유된 주 단백질은 카제인 이다.","연유나 생크림은 농축우유의 일종이다.","전지분유는 우유 중의 수분을 증발시키고 고형질 함량을 높인 것이다.","우유 교반시 비중의 차이로 지방입자가 뭉쳐 크림이 된다."],a:2,e:"농축우유 우유의 수분을 증발시켜 고형질 함량을 높인 것 전지분유 우유의 수분을 제거하여 가루로 만든 것",r:99,c:"ingredients"},
{q:"도넛의 튀김 기름이 갖추어야 할 조건은?",o:["산패취가 없다.","저장 중 안정성이 낮다.","발연점이 낮다.","산화와 가수분해가 쉽게 일어난다."],a:0,e:"도넛 튀김 기름의 조건: 산패취가 없고, 저장 안전성이 높고, 발연점이 높고, 산화·가수분해가 잘 일어나지 않아야 한다.",r:93,c:"ingredients"},
{q:"유화제를 사용하는 목적이 아닌 것은?",o:["물과 기름이 잘 혼합되게 한다.","빵이나 케익을 부드럽게 한다.","빵이나 케익이 노화되는 것을 지연시킬 수 있다.","달콤한 맛이 나게 하는데 사용한다."],a:3,e:"유화제는 무맛이다",r:99,c:"ingredients"},
{q:"핑거 쿠키 성형방법으로 옳지 않은 것은?",o:["원형 깍지를 이용하여 일정한 간격으로 짠다.","철판에 기름을 바르고 짠다.","5∼6cm 정도의 길이로 짠다.","짠 뒤에 윗면에 고르게 설탕을 뿌려준다."],a:1,e:"핑거 쿠키는 철판에 기름을 바르지 않고 유산지를 깔거나 그대로 짠다. 기름을 바르면 반죽이 미끄러져 모양이 잡히지 않는다.",r:93,v:0,c:"manufacturing"},
{q:"파운드 케이크의 팬닝은 틀 높이의 몇 % 정도까지 반죽을 채우는 것이 가장 적당한가?",o:["50%","70%","90%","100%"],a:1,e:"파운드케이크: 70% 레이어케이크류: 55~60% 스펀지케이크류: 60% 푸딩: 95% 초콜릿케이크: 55~60% 제빵",r:99,c:"manufacturing"},
{q:"아이싱에 사용되는 재료 중 다른 세 가지와 조성이 다른 것은?",o:["이탈리안 머랭","퐁당","버터크림","스위스 머랭"],a:2,e:"버터크림은 지방(버터)을 주원료로 하는 아이싱이고, 이탈리안 머랭, 퐁당, 스위스 머랭은 모두 설탕과 달걀흰자(또는 설탕 시럽)를 기본으로 하는 점에서 서로 유사한 조성을 갖는다.",r:90,c:"ingredients"},
{q:"생산부서의 지난달 원가관련 자료가 아래와 같을 때 생산가치율은 얼마인가?",o:["25%","30%","35%","40%"],a:1,e:"생산가치율 : 생산가치 / 생산액 * 100 300000000 / 1000000000 *100 300000000 / 1000000000 = 0.3 0.3 *100 = 30 제빵",r:99,c:"management"},
{q:"케이크에서 설탕의 역할과 거리가 먼 것은?",o:["감미를 준다.","껍질색을 진하게 한다.","수분 보유력이 있어 노화가 지연된다.","제품의 형태를 유지시킨다."],a:3,e:"설탕은 제품의 형태를 유지시키는 역할이 아니다. 형태 유지는 밀가루(글루텐)와 계란(단백질 응고)의 역할이다. 설탕은 감미, 껍질색, 노화 지연에 기여한다.",r:93,c:"ingredients"},
{q:"어린 생지로 만든 제품의 특성이 아닌 것은?",o:["부피가 적다.","속결이 거칠다.","빵 속 색깔이 희다.","모서리가 예리하다."],a:2,e:"어린 생지(발효 부족)로 만든 제품은 빵 속 색깔이 희지 않고 오히려 어둡거나 불균일한 색상을 띤다. 부피 부족, 속결 조밀, 예리한 모서리가 어린 생지의 특성이다.",r:93,c:"manufacturing"},
{q:"원가에 대한 설명 중 틀린 것은?",o:["기초원가는 직접 노무비, 직접 재료비를 말한다.","직접원가는 기초원가에 직접 경비를 더한 것이다.","제조원가는 간접비를 포함한 것으로 보통 제품의 원가라고 한다.","총원가는 제조원가에서 판매비용을 뺀 것이다."],a:3,e:"총원가 = 제조원가-판매비+일반관리비",r:99,c:"management"},
{q:"빵의 팬닝(팬 넣기)에 있어 팬의 온도로 가장 적합한 것은?",o:["0~5˚C","20~24˚C","30~35˚C","60˚C 이상"],a:2,e:"빵의 팬닝 시 팬의 온도는 30~35℃가 가장 적합하다. 반죽과 비슷한 온도를 유지해야 반죽의 온도가 급격히 변하지 않고 2차 발효가 안정적으로 진행된다.",r:85,c:"manufacturing"},
{q:"유지가 층상구조를 이루는 파이, 크로와상, 데니시 페이스트리 등의 제품은 유지의 어떤 성질을 이용한 것인가?",o:["쇼트닝성","가소성","안정성","크림성"],a:1,e:"가소성(plasticity)은 유지가 일정 온도에서 형태를 유지하면서 얇게 펴질 수 있는 성질이다. 이 성질 덕분에 반죽 사이에 얇은 유지층이 형성되어 층상구조가 만들어진다.",r:90,c:"ingredients"},
{q:"냉동반죽법에서 반죽의 냉동온도와 저장온도의 범위로 가장 적합한 것은?",o:["-5˚C, 0~4˚C","-20˚C, -18~0˚C","-40˚C, -25~-18˚C","-80˚C, -18~0˚C"],a:2,e:"냉동 반죽법에서 반죽의 냉동온도는 -40℃ 정도의 급속냉동이 적합하며, 저장온도는 -25~-18℃ 범위로 유지한다. 급속냉동으로 얼음 결정을 최소화하여 이스트와 글루텐 손상을 방지한다.",r:85,c:"manufacturing"},
{q:"빵의 관능적 평가법에서 내부적 특성을 평가하는 항복이 아닌 것은?",o:["기공(grain)","조직(texture)","속 색상(crumb color)","입안에서의 감촉(mouth feel)"],a:3,e:"입안에서의 감촉(mouth feel)은 관능적 평가의 별도 항목이지 내부적 특성 항목이 아니다. 기공, 조직, 속 색상이 내부적 특성이다.",r:93,c:"manufacturing"},
{q:"식빵 반죽의 제조공정에서 사용하지 않는 기계는?",o:["분할기(divider)","라운더(rounder)","성형기(moulder)","데포지터(depositor)"],a:3,e:"데포지터(depositor)는 케이크 반죽 등 묽은 반죽을 일정량씩 팬에 넣는 기계로, 식빵 반죽 제조에는 사용하지 않는다.",r:93,c:"manufacturing"},
{q:"믹서의 종류에 속하지 않는 것은?",o:["수직 믹서","스파이럴 믹서","수평 믹서","원형 믹서"],a:3,e:"원형 믹서라는 종류는 없다. 수직 믹서, 스파이럴 믹서, 수평 믹서가 제과·제빵에서 사용되는 믹서의 종류이다.",r:90,c:"manufacturing"},
{q:"냉동 반죽법의 냉동과 해동 방법으로 옳은 것은?",o:["급속냉동, 급속해동","급속냉동, 완만해동","완만해동, 급속해동","완만냉동, 완만해동"],a:1,e:"냉동반죽은 급속냉동, 완만해동이 올바른 방법이다. 급속냉동으로 빙결정을 작게 하여 글루텐 손상을 최소화하고, 완만해동으로 결로와 이스트 손상을 방지한다.",r:93,c:"manufacturing"},
{q:"스트레이트법에 의해 식빵을 만들 경우 밀가루 온도 22˚C, 실내온도 26˚C, 수도물온도 17˚C, 결과온도 30˚C, 희망온도 27˚C, 사용물량 1000g이면 얼음 사용량은 약 얼마인가?",o:["98g","93g","88g","83g"],a:1,e:"마찰계수=(결과온도×3)-(밀가루온도+실내온도+수돗물온도)=(30×3)-(22+26+17)=25 사용할물온도=(희망온도×3)-(밀가루온도+실내온도+마찰계수)=(27×3)-(22+26+25)=8 얼음사용량=총물사용량×(수돗물온도-사용할물온도)÷(80+수돗물온도)=1000×(17-8)÷(80+17)=92.783...",r:99,c:"manufacturing"},
{q:"튀김기름의 질을 저하시키는 요인이 아닌 것은?",o:["가열","공기","물","토코페롤"],a:3,e:"토코페롤은 vitanmin E로, 산화방지제이다.",r:99,c:"nutrition"},
{q:"빵 제조시 발효공정의 직접적인 목적이 아닌 것은?",o:["탄산가스의 발생으로 팽창작용을 한다.","유기산, 알코올 등을 생성시켜 빵 고유의 향을 발달시킨다.","글루텐을 발전, 숙성시켜 가스의 포집과 보유능력을 증대시킨다.","발효성 탄수화물의 공급으로 이스트 세포수를 증가시킨다."],a:3,e:"발효성 탄수화물의 공급으로 이스트 세포수를 증가시키는 것은 발효의 직접적인 목적이 아니다. 발효의 목적은 팽창, 향 생성, 글루텐 숙성이다.",r:93,c:"manufacturing"},
{q:"정통 불란서빵을 제조할 때 2차 발효실의 상대습도로 가장 적합한 것은?",o:["75~80%","85~88%","90~94%","95~99%"],a:0,e:"정통 프랑스빵(바게트 등)의 2차 발효 습도는 75~80%로 다소 낮게 유지한다. 습도가 너무 높으면 표면이 끈적해져 쿠프(칼집) 시 달라붙고, 낮은 습도에서 적당한 표면 건조가 이루어져 바삭한 크러스트 형성에 도움이 된다.",r:93,c:"manufacturing"},
{q:"빵의 포장온도로 가장 적합한 것은?",o:["15~20˚C","25~30˚C","35~40˚C","45~50˚C"],a:2,e:"38˚C가 적당합니다.",r:99,c:"manufacturing"},
{q:"식빵의 밑이 움푹 패이는 원인이 아닌 것은?",o:["2차 발효실의 습도가 높을 때","팬의 바닥에 수분이 있을 때","오븐 바닥열이 약할 때","팬에 기름칠을 하지 않을 때"],a:2,e:"오븐 바닥열이 강할 때 식빵 밑바닥이 움푹 패이는 결점이 생긴다.",r:99,c:"manufacturing"},
{q:"잎을 건조시켜 만든 향신료는?",o:["계피","넛메그","메이스","오레가노"],a:3,e:"오레가노는 꿀풀과에 속하는 다년생 식물이며, 잎과 꽃의 끝부분을 말린 것으로 피자에 많이 사용된다. 계피는 녹나무과 상록수 껍질을 벗겨 만든 향신료이다.",r:99,c:"ingredients"},
{q:"제분 직후의 숙성하지 않은 밀가루에 대한 설명으로 틀린 것은?",o:["밀가루의 pH는 6.1~6.2정도이다.","효소 작용이 활발하다.","밀가루 내의 지용성 색소인 크산토필 때문에 노란색을 띤다.","효소류의 작용으로 환원성 물질이 산화되어 반죽 글루텐의 파괴를 막아준다."],a:3,e:"제분 직후의 숙성되지않은 밀가루로 빵 반죽을 만들면 효소의 작용이 활발하여 글루텐이 파괴된다",r:99,c:"nutrition"},
{q:"제빵에 사용하는 물로 가장 적합한 형태는?",o:["아경수","알칼리수","증류수","염수"],a:0,e:"제빵에는 아경수(120~180ppm)가 적합하다.",r:99,c:"ingredients"},
{q:"유지의 분해산물인 글리세린에 대한 설명으로 틀린 것은?",o:["자당보다 감미가 크다.","향미제의 용매로 식품의 색택을 좋게 하는 독성이 없는 극소수 용매 중의 하나이다.","보습성이 뛰어나 빵류, 케이크류, 소프트 쿠키류의 저장성을 연장시킨다.","물-기름의 유탁액에 대한 안정 기능이 있다."],a:0,e:"*감미도 순서 과당＞전화당＞자당(설탕)＞포도당＞맥아당=갈락토오스＞유당 : 유지의 분해산물인 글리세린은 유당의 구성물이므로, 자당(설탕)보다 감미가 적다.",r:99,c:"ingredients"},
{q:"초콜릿의 팻 블룸(fat bloom) 현상에 대한 설명으로 틀린 것은?",o:["초콜릿 제조 시 온도 조절이 부적합 할 때 생기는 현상이다.","초콜릿 표면에 수분이 응축하며 나타나는 현상이다.","보관 중 온도관리가 나쁜 경우 발생되는 현상이다.","초콜릿의 균열을 통해서 표면에 침출하는 현상이다."],a:1,e:"블룸(bloom)현상이란? 초콜릿 표면에 하얀 무늬나 반점이 생기는 현상 1. 펫 블룸(fat bloom) : 지방유출 → 초콜릿이 녹아 지방 분리되었다 굳으며 얼룩이 생기는 현상 2. 설탕 블룸(suger bloom) : 설탕의 재 결정화 → 설탕이 수분을 흡수하여 녹았다가 재결정 시 표면이 하얗게 변하는 현상",r:99,c:"ingredients"},
{q:"밀가루 반죽이 일정한 점도에 도달하는데 요하는 흡수율과 반죽특성을 측정하는 기계는?",o:["패리노그래프(Farinograph)","아밀로그래프(Amylograph)","믹소그래프(Mixograph)","익스텐소그래프(Extensograph)"],a:0,e:"패미노그래프 : 밀가루 흡수율 측정 아밀로그래프 : a-아밀라아제 효과 측정 믹소그래프 : 반죽의 물성을 측정 익스텐소그래프 : 밀가루 개량제 효과 측정",r:99,c:"ingredients"},
{q:"호밀빵 제조시 호밀을 사용하는 이유 및 기능과 거리가 먼 것은?",o:["독특한 맛 부여","조직의 특성 부여","색상 향상","구조력 향상"],a:3,e:"호밀은 글루텐 형성 능력이 약하여 구조력(빵의 뼈대)을 향상시키지 못한다. 독특한 맛, 조직 특성, 진한 색상을 부여하는 것이 호밀의 기능이다.",r:93,c:"manufacturing"},
{q:"이스트의 3대 기능과 가장 거리가 먼 것은?",o:["팽창 작용","향 개발","반죽 발전","저장성 증가"],a:3,e:"이스트의 3대 기능은 팽창 작용(CO₂ 생성), 향 개발(풍미 물질 생성), 반죽 발전(글루텐 숙성)이다. 저장성 증가는 이스트의 기능이 아니다.",r:93,c:"ingredients"},
{q:"흰자를 사용하는 제품에 주석산 크림이나 식초를 첨가하는 이유로 적합하지 않은 것은?",o:["알칼리성의 흰자를 중화함.","pH를 낮춤으로 흰자를 강력하게 함.","풍미를 좋게 함.","색깔을 희게 함."],a:2,e:"주석산 크림이나 식초는 당의 열반응을 늦추므로 제품의 풍미를 떨어트린다.",r:99,c:"ingredients"},
{q:"다음 중 향신료가 아닌 것은?",o:["카다몬","오스파이스","카라야검","시너몬"],a:2,e:"카라야 검은 유화안정제",r:99,c:"ingredients"},
{q:"아밀로오스(amylose)의 특징이 아닌 것은?",o:["일반 곡물 전분 속에 약 17~28% 존재한다.","비교적 적은 분자량을 가졌다.","퇴화의 경향이 적다.","요오드 용액에 청색 반응을 일으킨다."],a:2,e:"아밀로오스는 퇴화(노화)의 경향이 크다(적지 않다). 직선형 구조로 서로 결합하기 쉬워 노화가 빠르다. 아밀로펙틴보다 노화 경향이 크다.",r:90,c:"nutrition"},
{q:"제과 · 제빵에서 유지의 기능이 아닌 것은?",o:["흡수율 증가","연화 작용","공기 포집","보존성 향상"],a:0,e:"유지는 흡수율을 증가시키지 않고 오히려 감소시킨다. 유지가 밀가루 입자를 코팅하여 수분 흡수를 방해하기 때문이다.",r:93,c:"ingredients"},
{q:"글루텐 형성의 주요 성분으로 탄력성을 갖는 단백질은 다음 중 어느 것인가?",o:["알부민","글로불린","글루테닌","글리아딘"],a:2,e:"글루테닌은 글루텐의 탄력성(elasticity)을 담당하는 단백질이다. 글리아딘은 신장성(extensibility)을 담당한다.",r:93,c:"nutrition"},
{q:"다음 중 연질 치즈로 곰팡이와 세균으로 숙성시킨 치즈는?",o:["크림 (cream) 치즈","로마노 (romano) 치즈","파머산 (parmesan) 치즈","카망베르 (camembert) 치즈"],a:3,e:"카망베르 치즈는 흰 곰팡이(Penicillium camemberti)로 표면을 숙성시킨 연질 치즈이다. 크림치즈는 비숙성, 로마노와 파머산은 경질 치즈이다.",r:93,c:"hygiene"},
{q:"다음 중 전화당에 대한 설명으로 틀린 것은?",o:["전화당의 상대적 감미도는 80 정도 이다.","수분 보유력이 높아 신선도를 유지한다.","포도당과 과당이 동량으로 혼합되어 있는 혼합물이다.","케이크와 쿠키의 저장성을 연장시킨다."],a:0,e:"전화당의 상대적 감미도는 130 정도 이다",r:99,c:"ingredients"},
{q:"효소를 구성하는 주요 구성 물질은?",o:["탄수화물","지질","단백질","비타민"],a:2,e:"효소는 단백질로 구성되어 있다. 아미노산이 펩타이드 결합으로 연결된 고분자 화합물이다.",r:82,c:"nutrition"},
{q:"무기질에 대한 설명으로 틀린 것은?",o:["황(S)은 당질 대사에 중요하면 혈액을 알칼리성으로 유지시킨다.","칼슘(Ca)은 주로 골격과 치아를 구성하고 혈액응고 작용을 돕는다.","나트륨(Na)은 주로 세포 외액에 들어있고 삼투압 유지에 관여한다.","요오드(I)는 갑상선 호르몬의 주성분으로 결핍되면 갑상선종을 일으킨다."],a:0,e:"마그네슘이 결핍시 혈압&수족냉증이 생깁니다 마그네슘은 다시마,견과류,바나나,콩류,아보카도,우유입니다",r:99,c:"nutrition"},
{q:"다음 중 단당류가 아닌 것은?",o:["포도당","올리고당","과당","갈락토오스"],a:1,e:"올리고당은 단당류 3~10개가 결합한 소당류로, 단당류가 아니다. 포도당·과당·갈락토오스는 모두 단당류이다.",r:99,c:"ingredients"},
{q:"동물성 지방을 과다 섭취하였을 때 발생할 가능성이 높아지는 질병은?",o:["신장병","골다공증","부종","동맥경화증"],a:3,e:"동물성 지방(포화지방)의 과다 섭취는 혈중 콜레스테롤을 높여 동맥경화증의 발생 가능성을 증가시킨다.",r:85,c:"nutrition"},
{q:"다음 중 필수 아미노산이 아닌 것은?",o:["트레오닌","메티오닌","글루타민","트립토판"],a:2,e:"필수아미노산(성인) : 이소류신, 류신, 리신, 페닐알라닌, 메티오닌, 트레오닌, 트립토판, 발린, 히스티딘 (어린아이의 경우는 아르기닌 포함)",r:99,c:"nutrition"},
{q:"호염성 세균으로서 어패류를 통화여 가장 많이 발생하는 식중독은?",o:["살모넬라 식중독","장염비브리오 식중독","병원성 대장균 식중독","포도상규균 식중독"],a:1,e:"장염비브리오(Vibrio parahaemolyticus)는 해수에 서식하는 호염성 세균으로 어패류를 통해 가장 많이 발생하는 식중독의 원인균이다.",r:93,c:"hygiene"},
{q:"발효가 부패와 다른 점은?",o:["미생물이 작용한다.","생산물을 식용으로 한다.","단백질의 변화반응이다.","성분의 변화가 일어난다."],a:1,e:"발효는 미생물의 작용으로 생산물을 식용(또는 유용)하게 이용하는 것이고, 부패는 유해한 산물을 생성하는 것이다.",r:90,c:"hygiene"},
{q:"다음 중 감염형 식중독 세균이 아닌 것은?",o:["살모넬라균","장염 비브리오균","황색포도상구균","캠필로박터균"],a:2,e:"황색포도상구균은 독소형 식중독 제빵",r:99,c:"hygiene"},
{q:"다음 중 동종간의 접촉에 의한 전염병이 없는 것은?",o:["세균성이질","조류독감","광우병","구제역"],a:2,e:"광우병(BSE)은 프리온에 의한 질병으로 동종 간 접촉 전염이 아니라 오염된 사료 섭취에 의해 발생한다.",r:82,c:"hygiene"},
{q:"다음 중 식품위생법에서 정하는 식품접객업에 속하지 않는 것은?",o:["식품소분업","유흥주점","제과점","휴게음식점"],a:0,e:"제과점은 식품위생법상 식품접객업이 아니라 즉석판매제조·가공업에 해당한다. 휴게음식점, 유흥주점 등은 식품접객업에 속한다.",r:93,c:"hygiene"},
{q:"전염병 발생의 3대 요인이 아닌 것은?",o:["전염원","전염경로","성별","숙주 감수성"],a:2,e:"성별은 전염병 발생의 3대 요인이 아니다. 전염원(병원체), 전염경로, 숙주 감수성이 전염병 발생의 3대 요인이다.",r:90,c:"hygiene"},
{q:"다음 중 이형제의 용도는?",o:["가수분해에 사용된 산제의 중화제로 사용된다.","제과/제빵을 구울 때 형틀에서 제품의 분리를 용이 하게 한다.","거품을 소멸 · 억제하기 위해 사용하는 첨가물이다.","원료가 덩어리지는 것을 방지하기 위해 사용한다."],a:1,e:"이형제는 제과·제빵을 구울 때 형틀에서 제품의 분리를 용이하게 하는 첨가물이다.",r:85,c:"ingredients"},
{q:"유지가 산패되는 경우가 아닌 것은?",o:["실온에 가까운 온도 범위에서 온도를 상승시킬 때","햇빛이 잘 드는 곳에 보관할 때","토코페롤을 첨가할 때","수분이 많은 식품을 넣고 튀길 때"],a:2,e:"토코페롤은 비타민E로 산화 방지에 쓰임. 산패를 막아줌",r:99,c:"ingredients"},
{q:"식품 등을 통해 전염되는 경구전염병의 특징이 아닌 것은?",o:["원인 미생물은 세균, 바이러스 등이다.","미량의 균량에서도 감염을 일으킨다.","2차 감염이 빈번하게 일어난다.","화학물질이 주요 원인이 된다."],a:3,e:"화학물질이 주요 원인이 되는 것은 경구전염병이 아니라 화학적 식중독의 특징이다. 경구전염병은 세균, 바이러스 등 미생물이 원인이다.",r:93,c:"hygiene"},
{q:"다음 세균성 식중독 중 일반적으로 치사율이 가장 높은 것은?",o:["살모넬라균에 의한 식중독","보툴리누스균에 의한 식중독","장염 비브리오균에 의한 식중독","포도상구균에 의한 식중독"],a:1,e:"보툴리누스균에 의한 식중독은 신경독소를 생산하여 치사율이 가장 높다(치료하지 않으면 30~60%). 호흡마비로 사망에 이를 수 있다.",r:93,c:"hygiene"}]},
{title:"2010년 4회",desc:undefined,questions:[{q:"로-마지팬(raw mazipan)에서 '아몬드 : 설탕'의 적합한 혼합비율은?",o:["1 : 0.5","1 : 1.5","1 : 2.5","1 : 3.5"],a:0,e:"로-마지팬(원료 마지팬)에서 아몬드와 설탕의 혼합비율은 아몬드 2 : 설탕 1(즉 아몬드 : 설탕 = 1 : 0.5)이 표준이다. 설탕 비율이 낮아 아몬드 풍미가 강하게 유지된다.",r:93,v:0,c:"ingredients"},
{q:"다음 중 달걀에 대한 설명이 틀린 것은?",o:["노른자의 수분함량은 약 50% 정도이다.","전란(흰자와 노른자) 의 수분함량은75%정도이다,","노른자에는 유화기능을 갖는 레시틴이 함유되어 있다.","달걀은 -5 ~ -10℃로 냉동 저장하여야 품질을 보장할 수 있다."],a:3,e:"달걀은 5~10도로 냉장 저장해야함",r:99,c:"ingredients"},
{q:"같은 용적의 팬에 같은 무게의 반죽을 팬닝 하였을 경우 부피가 가장 작은 제품은?",o:["시퐁 케이크","레이어 케이크","파운드 케이크","스펀지 케이크"],a:2,e:"파운드 케이크는 유지와 설탕이 많은 고율배합 제품으로, 비중이 높고(0.75~0.85) 같은 용적의 팬에 같은 무게를 넣으면 부피가 가장 작다. 시퐁·스펀지 케이크는 거품형으로 비중이 낮아 부피가 크다.",r:93,c:"manufacturing"},
{q:"다크 초콜릿을 템퍼링(Tempering) 할 때 맨 처음 녹이는 공정의 온도 범위로 가장 적합한 것은?",o:["10 ~ 20℃","20 ~ 30℃","30 ~ 40℃","40 ~ 50℃"],a:3,e:"1차 43-50 2차 27-29 제빵",r:99,c:"manufacturing"},
{q:"도넛에서 발한을 제거하는 방법은?",o:["도넛에 묻히는 설탕의 양을 감소시킨다.","기름을 충분히 예열시킨다.","결착력이 없는 기름을 사용한다.","튀김 시간을 증가시킨다."],a:3,e:"발한현상-겉면에 수분이 베어드는 현상(충분한 냉각 후 다향 설탕 투여, 튀김시간을 늘려 수분을 줄인다) 제빵",r:99,c:"manufacturing"},
{q:"다음 중 케이크의 아이싱에 주로 사용되는 것은?",o:["마지팬","프랄린","글레이즈","휘핑크림"],a:3,e:"케이크 아이싱에 주로 사용되는 것은 휘핑크림으로, 생크림을 거품 올려 케이크 표면에 바르거나 장식하는 데 널리 활용된다. 마지팬은 아몬드 반죽 장식용, 프랄린은 견과류 가공품, 글레이즈는 표면 코팅에 사용된다.",r:93,c:"manufacturing"},
{q:"충전물 또는 젤리가 롤케이크에 축축하게 스며드는 것을 막기 위해 조치해야 할 사항으로 틀린 것은?",o:["굽기 조정","물 사용량 감소","반죽시간 증가","밀가루 사용량 감소"],a:3,e:"물엿은 흡습성이 있음로 수분을 차단하지 않습니다. 반죽시간 증가 = 글루텐 형성 조직 강화 굽기 조정 = 표면 건조로 인해 수분 흡수 저하 물 사용 감소 = 흡수력 감소",r:99,c:"manufacturing"},
{q:"비중컵의 무게 40g, 물을 담은 비중컵의 무게 240g, 반죽을 담은 비중컵의 무게 180g일 때 반죽의 비중은?",o:["0.2","0.4","0.6","0.7"],a:3,e:"180-40/240-40=0.7 제빵",r:99,c:"manufacturing"},
{q:"다음 믹싱 방법 중 먼저 유지와 설탕을 섞는 방법으로 부피를 우선으로 할 때 사용하는 방법은?",o:["크림법","1단계법","블렌딩법","설탕/물법"],a:0,e:"유지 및 설탕 등을 혼합해 크림상태로 만든 후 계란을 천천히 넣어 반죽한 후 밀가루 및 베이킹파우더를 체에 쳐서 혼합하는 방법 반죽형 반죽의 대표적 방법이다. 부피를 크게늘리는데 적절/ 거품을 최대한으로 많이 포집/ 글루텐형성을 최소화한다.",r:99,c:"manufacturing"},
{q:"쿠키 포장지의 특성으로 적합하지 않은 것은?",o:["내용물의 색, 향이 변하지 않아야 한다.","독성 물질이 생성되지 않아야한다.","통기성이 있어야 한다.","방습성이 있어야 한다."],a:2,e:"쿠키는 수분 함량이 낮아 습기를 흡수하면 눅눅해지므로 방습성이 필요하다. 통기성이 있으면 외부 수분이 유입되어 품질이 저하된다.",r:90,c:"manufacturing"},
{q:"열원으로 찜(수증기)을 이용했을 때의 주 열전달 방식은?",o:["대류","전도","초음파","복사"],a:0,e:"대류는 열 때문에 유체가 상하로 뒤바뀌며 움직이는 현상이다.",r:99,c:"manufacturing"},
{q:"쇼트 브레드 쿠키 제조 시 휴지를 시킬 때 성형을 용이하게 하기 위한 조치는?",o:["반죽을 뜨겁게 한다.","반죽을 차게 한다.","휴지 전 단계에서 오랫동안 믹싱 한다.","휴지 전 단계에서 짧게 믹싱 한다."],a:1,e:"쇼트 브레드 쿠키는 유지 함량이 높아 반죽이 부드럽다. 휴지 시 반죽을 차게 하면 유지가 굳어져 성형이 용이해진다. 뜨거운 반죽은 유지가 녹아 끈적거린다.",r:93,c:"manufacturing"},
{q:"찜(수증기)을 이용하여 만들어진 제품이 아닌 것은?",o:["쇼프트 롤","찜 케이크","중화 만두","호빵"],a:0,e:"쇼프트 롤(소프트 롤)은 오븐에서 직접 굽는 빵 제품으로, 수증기(찜)를 이용하여 만드는 제품이 아니다. 찜 케이크, 중화 만두, 호빵은 모두 수증기로 익히는 찜 제품에 해당한다.",r:85,c:"manufacturing"},
{q:"다음 굽기 중 과일 충전물이 끓어 넘치는 원인으로 점검할 사항이 아닌 것은 ?",o:["배합의 부정확 여부를 확인한다.","충전물 온도가 높은지 점검한다.","바닥 껍질이 너무 얇지는 않은지를 점검한다.","껍데기에 구멍이 없어야 하고, 껍질 사이가 잘 봉해져 있는지의 여부를 확인한다."],a:3,e:"과일 충전물들이 끓어넘치는 원인은 과일 충전물 배합이 부정확할 경우, 오븐의 온도가 높아 굽는 시간이 짧은 경우 껍질에 수분이 너무 많아서 파이 껍질이 너무 얇아서",r:99,c:"manufacturing"},
{q:"스펀지 젤리롤을 만들 때 겉면이 터지는 결점에 대한 조치사항으로 올바르지 않은 것은?",o:["설탕의 일부를 물엿으로 대치한다.","팽창제 사용량을 감소시킨다.","계란 노른자를 감소시킨다.","반죽의 비중을 증가시킨다."],a:3,e:"반죽의 비중을 증가시키면 반죽이 더 단단해져 굽는 과정에서 압력을 견디지 못하고 겉면이 더 터지기 쉬워진다. 물엿 대치, 팽창제 감소, 노른자 감소가 겉면 터짐을 방지하는 올바른 조치이다.",r:93,c:"ingredients"},
{q:"2차 발효에 대한 설명으로 틀린 것은?",o:["이산화탄소를 생성시켜 최대한의 부피를 얻고 글루텐을 신장시키는 과정이다.","2차 발효실의 온도는 반죽의 온도보다 같거나 높아야 한다.","2차 발효실의 습도는 평균 75 ~ 90% 정도이다.","2차 발효실의 습도가 높을 경우 겉껍질이 형성되고 터짐 현상이 발생한다."],a:3,e:"겉껍질이 형성되고 터짐현상이 발생하는 원인은 2차 발효실의 습도가 낮은 경우이다. 제과",r:99,c:"manufacturing"},
{q:"빵을 포장하려 할 때 가장 적합한 빵의 중심온도와 수분 함량은?",o:["30℃, 30%","35℃, 38%","42℃, 45%","48℃, 55%"],a:1,e:"적정 중심온도 35~40도' 수분함량 38%",r:99,c:"ingredients"},
{q:"둥글리기가 끝난 반죽을 성형하기 전에 짧은 간 동안 발효시키는 목적으로 적합하지 않은 것은?",o:["가스 발생으로 반죽의 유연성을 회복시키기 위해","가스 발생력을 키워 반죽을 부풀리기 위해","반죽표면에 얇은 막을 만들어 성형할 때 끈적거리지 않도록 하기위해","분할, 둥글리기 하는 과정에서 손상된 글루텐 구조를 재 정돈하기 위해"],a:1,e:"중간발효(벤치타임)의 목적은 분할·둥글리기 과정에서 손상된 글루텐을 회복시키고 가스 발생으로 유연성을 되찾는 것이다. '가스 발생력을 키워 반죽을 부풀리기 위해'는 2차 발효의 목적이다.",r:93,v:0,c:"manufacturing"},
{q:"냉동빵 혼합(Mixing)시 흔히 사용하고 있는 제법으로, 환원제로 시스테인(cysteine)들을 사용하는 제법은?",o:["스트레이트법","스펀지법","액체발효법","노타임법"],a:3,e:"노타임법의 환원제 종류 -프로테아제 -L-시스테인 -소르브산",r:99,c:"manufacturing"},
{q:"식빵 껍질 표면에 물집이 생긴 이유가 아닌 것은?",o:["반죽이 질었다.","2차 발효실의 습도가 높았다.","발효가 과하였다.","오븐의 윗 열이 너무 높았다."],a:2,e:"표피에 수포가 생긴 이유 - 반죽이 질었다 - 발효가 부족하였다(어린반죽) - 2차 발효 시 발효실의 상대습도가 높았다 - 오븐 윗불 온도가 높았다 - 성형기의 취급 부주의",r:99,c:"manufacturing"},
{q:"빵의 품질평가 방법 중 내부 특성에 대한 평가항목이 아닌 것은?",o:["기공","속색","조직","껍질의 특성"],a:3,e:"껍질의 특성은 빵의 외부 특성 평가항목이다. 기공, 속색, 조직은 모두 내부 특성 평가항목에 해당한다.",r:85,c:"manufacturing"},
{q:"팬 오일의 조건이 아닌 것은?",o:["발연점이 130℃ 정도 되는 기름을 사용한다.","산패되기 쉬운 지방산이 적어야 한다.","보통 반죽 무게의 0.1 ~ 0.2 %를 사용한다.","면실유, 대두유등의 기름이 이용된다."],a:0,e:"팬 오일은 발연점이 높은(200℃ 이상) 기름을 사용해야 한다. 발연점이 130℃ 정도면 굽기 온도에서 연기가 나고 유해물질이 생성될 수 있다.",r:93,c:"ingredients"},
{q:"다음 중 반죽이 매끈해지고 글루텐이 가장 많이 형성되어 탄력성이 강한 것이 특징이며, 프랑스 빵 반죽의 믹싱 완료시기인 단계는?",o:["클린업 단계","발전단계","최종단계","렛다운 단계"],a:1,e:"프랑스 빵 반죽의 믹싱 완료시기는 발전단계(Development stage)이다. 이 단계에서 글루텐이 최대한 발달하여 반죽이 매끈해지고 탄력성이 가장 강하며, 프랑스 빵처럼 강한 구조가 필요한 제품에 적합하다.",r:93,c:"manufacturing"},
{q:"분할된 반죽을 둥그렇게 말아 하나의 피막을 형성되도록 하는 기계는 ?",o:["믹서(mixer)","오버헤드 프루퍼(overhead proofer)","정형기(moulder)","라운더(rounder)"],a:3,e:"라운더(Rounder)는 분할된 반죽을 둥그렇게 말아 표면에 피막을 형성하는 기계이다. 믹서는 반죽 혼합, 정형기는 최종 성형, 오버헤드 프루퍼는 중간발효 장치이다.",r:93,c:"manufacturing"},
{q:"식빵을 만드는데 실내온도 15℃, 수돗물 온도 10℃, 밀가루 온도 13℃일 때 믹싱 후의 반죽온도가 21℃가 되었다면 이 때 마찰계수는?",o:["5","10","20","25"],a:3,e:"마찰계수=(반죽결과온도×3)-(밀가루온도+실내온도+물온도) =(21×3)-(13+15+10) =63-38=25",r:99,c:"manufacturing"},
{q:"빵의 생산시 고려해야 할 원가요소와 가장 거리가 먼 것은?",o:["재료비","노무비","경비","학술비"],a:3,e:"원가의 3요소:재료비,노무비(인건비),경비 4번 학술비는 원가의3요소에 해당되지 않음.",r:99,c:"management"},
{q:"더운 여름에 얼음을 사용하여 반죽온도 조절시 계산 순서로 적합한 것은?",o:["마찰 계수→물 온도 계산→얼음 사용량","물 온도 계산→얼음 사용량→마찰계수","얼음 사용량→마찰계수→물 온도 계산","물 온도 계산→마찰 계수→얼음 사용량"],a:0,e:"더운 여름 얼음 사용 시 올바른 계산 순서는 마찰계수 산출 → 물 온도 계산 → 얼음 사용량 결정이다. 먼저 믹싱 중 발생하는 마찰열(마찰계수)을 구해야 정확한 목표 물 온도를 계산할 수 있고, 그 후 얼음 사용량을 결정한다.",r:90,c:"manufacturing"},
{q:"굽기 과정에서 일어나는 변화로 틀린 것은?",o:["당의 캐러멜화와 갈변반응으로 껍질색이 진해지며 특유의 향을 발생한다.","굽기가 완료되면 모든 미생물이 사멸하고 대부분의 효소도 불활성화가 된다.","전분 입자는 팽윤과 호화의 변화를 일으켜 구조형성으로 한다.","빵의 외부 층에 있는 전분이 내부 층의 전분보다 호화가 덜 진행된다."],a:3,e:"빵의 외부 층은 오븐 열에 직접 노출되어 고온이 되지만, 수분이 급격히 증발하여 호화보다는 덱스트린화·캐러멜화가 진행된다. 출제 기준에서는 '외부 층의 전분이 내부 층보다 호화가 덜 진행된다'는 설명을 틀린 것으로 보았다. 이는 외부 층이 고온에 노출되므로 호화가 더 진행된다는 관점에 따른 것이다.",r:83,c:"ingredients"},
{q:"대형공장에서 사용되고, 온도조절이 쉽다는 장점이 있는 반면에 넓은 면적이 필요하고 열손실이 큰 결점인 오븐은?",o:["회전식 오븐(rack oven)","데크오븐(deck oven)","터널식오븐(tunnel oven)","릴 오븐(reel oven)"],a:2,e:"터널식 오븐은 대형공장에서 대량생산에 사용되며 온도조절이 용이하다. 반면 넓은 면적이 필요하고 열손실이 크다는 단점이 있다.",r:85,c:"manufacturing"},
{q:"액체 발효법에서 액종 발효시 완충제 역할을 하는 재료는?",o:["탈지분유","설탕","소금","쇼트닝"],a:0,e:"액체 발효법에서 탈지분유는 완충제 역할을 하여 pH 변화를 억제하고 발효 안정성을 유지한다. 또한 이스트의 영양원으로도 작용한다.",r:93,c:"ingredients"},
{q:"제빵에 가장 적합한 물의 광물질 함량은?",o:["1~60ppm","60~120ppm","120~180ppm","180ppm 이상"],a:2,e:"경수(센물) - 180ppm이상 (제빵 부적합) ★아경수 - 120~180ppm (제과,제빵에 가장 적합한 물)★ 연수(단물) - 60ppm이하 (제빵 부적합)",r:99,c:"nutrition"},
{q:"아밀로그래프의 기능이 아닌 것은?",o:["전분의 점도 측정","아말라아제의 효소능력 측정","점도를 B.U 단위로 측정","전분의 다소(多小) 측정"],a:3,e:"아밀로그래프의 기능은 전분의 호화온도 전분의 점도 아밀라아제의 활성",r:99,c:"ingredients"},
{q:"다음 중 유지를 구성하는 분자가 아닌 것은?",o:["질소","수소","탄소","산소"],a:0,e:"유지는 글리세롤과 지방산으로 이루어져 있는데, 모두 탄소, 수소, 산소가 주성분 질소는 단백질의 주요 구성성분 제빵",r:99,c:"ingredients"},
{q:"코코아(cocoa)에 대한 설명 중 옳은 것은?",o:["초콜릿 리쿠어(chocolate liquor)를 압착 건조한 것이다.","코코아 버터(cocoa butter)를 만들고 남은 박(press cake) 을 분쇄한 것이다.","카카오 니브스(cacao nibs)를 건조한 것이다.","비터 초콜릿(butter chocolate) 을 건조 분쇄한 것이다."],a:1,e:"코코아는 초콜릿 리쿠어에서 코코아 버터를 압착 추출하고 남은 박(press cake)을 분쇄한 것이다. 카카오 니브스를 갈면 초콜릿 리쿠어가 된다.",r:93,c:"ingredients"},
{q:"다음 중 환원당이 아닌 당은?",o:["포도당","과당","자당","맥아당"],a:2,e:"자당(설탕)은 구조면에서 환원작용을 나타내는 알데히드기가 존재하지 않기 때문에 비환원당입니다.",r:99,c:"ingredients"},
{q:"유지의 크림성이 가장 중요한 제품은?",o:["케이크","쿠키","식빵","단과자빵"],a:0,e:"유지의 크림성은 공기를 포집하는 능력으로, 케이크 제조에서 가장 중요하다. 케이크는 유지의 크림성으로 공기를 혼입하여 부피와 조직을 형성한다.",r:90,c:"manufacturing"},
{q:"제과제빵에서 안정제의 기능이 아닌 것은?",o:["파이 충전물의 증점제 역할을 한다.","제품의 수분흡수율을 감소시킨다.","아이싱의 끈적거림을 방지한다.","토핑물을 부드럽게 만든다."],a:1,e:"제과제빵에서 안정제(하이드로콜로이드류)는 파이 충전물의 농후화(증점), 아이싱의 끈적거림 방지, 머랭의 수분 배출 억제, 토핑의 거품 안정, 노화 지연 등의 역할을 합니다. 그러나 안정제는 수분 보유력을 높여 제품의 수분흡수율을 증가시키므로 '수분흡수율을 감소시킨다'는 설명은 안정제의 기능이 아닙니다.",r:99,c:"ingredients"},
{q:"계란의 흰자 540g을 얻으려고 한다. 계란 한 개의 평균 무게가 60g 이라면 몇 개의 계란이 필요한가?",o:["10개","15개","20개","25개"],a:1,e:"계란은 껍질10%,노른자30%,흰자60%로 구성 계란의 흰자 540g을 얻으려한다면 계란 한 개의 평균무게가 60g일때 60g×0.6 (60%)=36g 계란 한개에서 나오는 흰자는 36g이다. 따라서 540g÷36g=15개",r:99,c:"ingredients"},
{q:"다음 당류 중 일반적인 제빵용 이스트에 의하여 분해되지 않는 것은?",o:["설탕","맥아당","과당","유당"],a:3,e:"유당은 갈락토오스와 포도당으로 구성된 이당류로, 제빵용 이스트가 분비하는 효소로는 분해되지 않는다. 설탕, 맥아당, 과당은 이스트에 의해 발효된다.",r:90,c:"ingredients"},
{q:"빵반죽의 특성인 글루텐을 형성하는 밀가루의 단백질 중 탄력성과 가장 관계가 깊은 것은?",o:["알부민(albumin)","글로불린(globulin)","글루테닌(glutenin)","글리아딘(gliadin)"],a:2,e:"글루테닌(Glutenin)은 밀가루 단백질 중 탄력성(elasticity)을 담당한다. 글리아딘은 점성(viscosity)과 신장성을 담당하며, 두 단백질이 결합하여 글루텐을 형성한다.",r:93,c:"ingredients"},
{q:"아밀로펙틴이 요오드 정색 반응에서 나타나는 색은?",o:["적자색","청색","황색","흑색"],a:0,e:"아밀로오스: 청색",r:99,c:"nutrition"},
{q:"설탕을 포도당과 과당으로 분해하는 효소는?",o:["인버타아제(Invertase)","지마아제(Zymaes)","말타아제(Maltase)","알파 아밀라아제(ɑ-amylase)"],a:0,e:"인버타아제 - 포도당 + 과당 지마아제(산화효소) - 포도당,갈락토오스,과당과 같은 단당류를 에틸알코올과 이산화탄서로 산화시킨 효소 말타아제 - 포도당 + 포도당 알파 아밀라제 - 전분을 덱스트린 단위로 잘라 액화시킨",r:99,c:"ingredients"},
{q:"다음 유제품 중 일반적으로 100g 당 열량을 가장 많이 내는 것은?",o:["요구르트","탈지분유","가공치즈","시유"],a:2,e:"가공치즈는 수분이 적고 단백질·지방이 농축되어 100g당 열량이 약 300~350kcal로 높다. 요구르트는 약 65kcal, 시유는 약 60kcal이다. 탈지분유는 분말 상태에서 100g당 약 360kcal이나, 유제품으로서의 일반적 비교에서는 가공치즈가 가장 높은 열량을 내는 것으로 출제되었다.",r:93,c:"nutrition"},
{q:"패리노 그래프의 기능이 아닌 것은?",o:["산화제 첨가 필요량 측정","밀가루의 흡수율 측정","믹싱시간 측정","믹싱내구성 측정"],a:0,e:"패리노그래프는 밀가루의 흡수율, 믹싱시간, 믹싱 내구성을 측정하는 장치이다. 산화제 첨가 필요량 측정은 패리노그래프의 기능이 아니다.",r:93,c:"ingredients"},
{q:"다음 중 식물성 검류가 아닌 것은?",o:["젤라틴","펙틴","구아검","아라비아검"],a:0,e:"젤라틴은 동물의 껍질과 연골 속에 콜라겐에서 추출하는 동물성 단백질이다.",r:99,c:"ingredients"},
{q:"팔미트산(16:0)이 모두 아세틸 CoA로 분해되려면 ß-산화를 몇 번 반복하여야 하나?",o:["5번","6번","7번","8번"],a:2,e:"베타산화횟수=탄소수/2-1 16/2-1=7",r:99,c:"nutrition"},
{q:"비타민의 결핍 증상이 잘못 짝지어진 것은?",o:["비타민 B₁ - 각기병","비타민 C - 괴혈병","비타민 B₂ - 야맹증","나이아신 - 펠라그라"],a:2,e:"비타민 B2 : 성장촉진비타민, 항구각성 비타민 야맹증 : 비타민 A 결핍시 나타나는 증상",r:99,c:"nutrition"},
{q:"질병에 대한 저항력을 지닌 항체를 만드는데 꼭 필요한 영양소는?",o:["탄수화물","지방","칼슘","단백질"],a:3,e:"항체(면역글로불린)는 단백질로 구성되어 있으므로, 항체 생성에 단백질이 필수적이다. 탄수화물은 에너지원, 지방은 에너지 저장, 칼슘은 뼈·치아 형성에 주로 관여한다.",r:90,c:"nutrition"},
{q:"다음 중 포화지방산을 가장 많이 함유하고 있는 식품은?",o:["올리브유","버터","콩기름","홍화유"],a:1,e:"포화지방산은 동물성이고 불포화지방산은 식물성이다.버터는 우유의 지방이므로 동물성 즉 포화지방산함유한다. 제과",r:99,c:"nutrition"},
{q:"다음 중 단당류가 아닌 것은?",o:["갈락토오스","포도당","과당","맥아당"],a:3,e:"맥아당은 이당류 제빵",r:99,c:"ingredients"},
{q:"주로 단백질이 세균에 의해 분해되어 악취, 유해물질을 생성하는 현상은?",o:["발효","부패","변패","산패"],a:1,e:"1. 발효 : 유익균을 생성하며 섭취가 가능 2. 부패 : 단백질에 의함 3. 변패 : 탄수화물에 의함 4. 산패 : 지방에 의함",r:99,c:"hygiene"},
{q:"탄수화물이 많이 든 식품을 고온에서 가열하거나 튀길 때 생성되는 발암성 물질은?",o:["니트로사민(nitrosamine)","다이옥신(dioxins)","벤조피렌(benzopyrene)","아크릴아마이드(acrylamide)"],a:3,e:"아크릴아마이드는 탄수화물이 많은 식품을 120℃ 이상 고온에서 가열·튀길 때 아스파라긴과 환원당의 반응으로 생성되는 발암성 물질이다.",r:93,c:"nutrition"},
{q:"우리나라의 식품위생법에서 정하고 있는 내용이 아닌 것은?",o:["건강기능식품의 검사","건강진단 및 위생교육","조리사 및 영양사의 면허","식중독에 관한 조사보고"],a:0,e:"건강기능식품의 검사·관리는 「건강기능식품에 관한 법률」에서 규정하고 있습니다. 식품위생법에서는 식품위생 감시, 건강진단 및 위생교육, 조리사·영양사의 면허, 식중독 조사보고 등을 규정하며, 건강기능식품 검사는 식품위생법의 적용 대상이 아닙니다.",r:99,c:"hygiene"},
{q:"다음 식품첨가물 중에서 보존제로 허용되지 않은 것은?",o:["소르빈산칼륨","말라카이트 그린","데히드로초산","안식향산나트륨"],a:1,e:"보존제 (방부제) : 미생물의 번식으로 인한 식품의 변질 방지 디하이드로초산,프로피온산칼슘,프로피온산나트륨,안식향산,소르브산 **말라카이트그린 = 살균제, 염색제 등으로 쓰이는 산업용 염료, 어류의 알에 감염된 박테리아나 균류를 죽이는 살균제 등에서 사용되는 염기성 염료.",r:99,c:"nutrition"},
{q:"작업장의 방충, 방서용 금서망의 그물로 적당한 크기는?",o:["5 mesh","15 mesh","20 mesh","30 mesh"],a:3,e:"mesh 숫자가 클수록 그물 망 크기는 작아진다. 방충을 위해서는 그물망 크기가 조밀해야 한다.",r:99,c:"hygiene"},
{q:"병원성 대장균 식중독의 가장 적합한 예방책은?",o:["곡류의 수분을 10% 이하로 조정한다.","어류의 내장을 제거하고 충분히 세척한다.","어패류는 민물로 깨끗이 씻는다.","건강보균자나 환자의 분변 오염을 방지한다."],a:3,e:"병원성 대장균은 사람의 분변을 통해 전파되므로, 건강보균자나 환자의 분변 오염을 방지하는 것이 가장 적합한 예방책이다.",r:93,c:"hygiene"},
{q:"다음 중 제 1군 법정전염병은?",o:["결핵","디프테리아","장티푸스","말라리아"],a:1,e:"디프테리아는 제1군 법정전염병에 해당한다. 결핵과 말라리아는 제3군, 장티푸스는 제2군에 해당한다(구 전염병예방법 기준).",r:88,v:0,c:"hygiene"},
{q:"클로스트리디움 보툴리늄 식중독과 관련 있는 것은?",o:["화농성 질환의 대표균","저온살균 처리로 예방","내열성 포자 형성","감염형 식중독"],a:2,e:"클로스트리디움 보툴리늄(Clostridium botulinum)은 내열성 포자를 형성하는 혐기성 세균이다. 독소형 식중독을 일으키며, 통조림 등 혐기 환경에서 증식한다.",r:93,c:"hygiene"},
{q:"병원성대장균 식중독의 원인균에 관한 설명으로 옳은 것은?",o:["독소를 생산하는 것도 있다.","보통의 대장균과 똑같다.","혐기성 또는 강한 혐기성이다.","장내 상재균총의 대표격이다."],a:0,e:"병원성 대장균 중 일부는 장독소(enterotoxin)나 베로독소 등 독소를 생산한다. 보통 대장균과 달리 병원성이 있으며, 통성혐기성균이다.",r:90,c:"hygiene"},
{q:"다음 중 전염병과 관련 내용이 바르게 연결되지 않은 것은?",o:["콜레라 - 외래 전염병","파상열 - 바이러스성 인수공통전염병","장티푸스 - 고열 수반","세균성 이질 - 점액성 혈변"],a:1,e:"파상열은 다른 말로 브루셀라증이라하며 소, 돼지 등에 유산을 일으키며 사람에게는 열성 질환을 가져오는 경구 감염 인축공통감염병입니다. 이는 주로 병에 걸린 동물의 유즙, 유제품이나 고기를 거쳐 경구 감염됩니다.",r:99,c:"hygiene"}]},
{title:"2010년 5회",desc:undefined,questions:[{q:"파운드 케이크를 구운 직후 계란 노른자에 설탕을 넣어 칠할 때 설탕의 역할이 아닌 것은?",o:["광택제 효과","보존기간 개선","탈색 효과","맛의 개선"],a:2,e:"설탕과 계란노른자를 합하여 파운드케익의 표면에 발라줌으로써 맛의 보완과 광택제 효과를 크게얻을수 있으며 보존기간도 늘릴 수 있다. 하지만 탈색효과는 전혀 해당되지 않는다. 제빵",r:99,c:"ingredients"},
{q:"기포를 안정되게 하기 위해 오븐에 들어가기 직전 충격을 가하는 제품은?",o:["카스테라","슈","마카롱","쇼트브레드"],a:0,e:"카스테라는 기포가 생기면 안에기공이 커지기 때문에 오븐에 들어가기 직전에 충격을 죠서 평평하게 안다음 오븐에 넣는다 제빵",r:99,c:"manufacturing"},
{q:"제품제조 공장에서의 선별 및 포장 공정의 조도로 알맞은 것은?",o:["75룩스","100룩스","200룩스","500룩스"],a:3,e:"발효 - 50룩스 계량,반죽,조리,성형 - 200룩스 굽기 - 100룩스 포장,장식,마무리작업 - 500룩스",r:99,c:"manufacturing"},
{q:"모카 아이싱(Mocha icing)의 특징을 결정하는 재료는?",o:["커피","코코아","초콜릿","분당"],a:0,e:"모카는 커피이다 제빵",r:99,c:"ingredients"},
{q:"데블스 푸드 케이크(devils food cake)에서 설탕 120%, 유화쇼트닝 54%, 천연코코아 20% fmf 사용하였다면 물과 분유 사용량은?",o:["분유 12.6%, 물 113.4%","분유 113.4%, 물 12.6%","분유 108.54%, 물 12.06%","분유 12.06%, 물 108.54%"],a:3,e:"데블스 푸드 케이크는 레이어 케이크의 한 종류로 배합률이 아래와 같습니다. ● 달걀(전란) = 쇼트닝 * 1.1 문제에서 유화 쇼트닝 54%사용 → 달걀 : 54*1.1 = 59.4% ● 우유 = 설탕+30+(코코아*1.5)-전란 문제에서 설탕 120%사용, 코코아 20%사용, 위에서 달걀사용량 59.4% 대입하면 우유 : 120+30+(20*1.5)-59.4 = 120.6% ☆우유는 수분이 90%, 고형분이 10%이므로 수분은 물, 고형분은 분유로 사용 따라서 물은 120.6*0.9 = 108.54%, 분유는 120.6*0.1 = 12.06%이므로 답이 4번!",r:99,c:"ingredients"},
{q:"퐁당(fondant)을 만들기 위하여 시럽을 끓일 때 시럽의 온도로 가장 적당한 범위는?",o:["72 ~ 78℃","82 ~85℃","114 ~ 118℃","131 ~136℃"],a:2,e:"퐁당(fondant)을 끓이는 온도는 114~118℃이다. 제빵",r:99,c:"ingredients"},
{q:"푸딩 포면에 기포 자국이 많이 생기는 경우는?",o:["가열이 지나친 경우","계란의 양이 많은 경우","계란이 오래된 경우","오븐 온도가 낮은 경우"],a:0,e:"푸딩을 지나치게 가열하면 단백질이 과응고되면서 내부에서 끓어오른 기포가 표면에 자국으로 남는다. 적정 온도(160~180℃ 중탕)를 초과하면 표면에 기포 자국이 많이 생긴다.",r:93,c:"ingredients"},
{q:"퍼프 페이스트리에서 불규칙한 팽창이 발생하는 원인이 아닌 것은?",o:["덧가루를 과량으로 사용하였다.","밀어펴기 사이에 휴지시간이 불충분하였다.","예리하지 못한 칼을 사용하였다.","쇼트닝이 너무 부드러웠다."],a:3,e:"쇼트닝이 너무 부드러우면 반죽과 유지 층의 분리가 어려워져 팽창이 불량해질 수는 있으나, '불규칙한 팽창'의 직접적 원인이 아닌 것으로 출제되었다.\n• 과도한 덧가루, 불충분한 휴지, 무딘 칼 사용이 불규칙 팽창의 원인이다.",r:93,c:"ingredients"},
{q:"파운드 케이크 제조에 대한 설명으로 맞는 것은?",o:["오븐 온도가 너무 높으면 케이크의 표기가 갈라진다.","너무 뜨거운 오븐에서는 표피에 비늘 모양이나 점이 형성된다.","여름철에는 유지온도가 30℃ 이상이 되어야 크림성이 좋다.","윗면이 터지게 하려면 굽기 전후에 스팀을 분무한다."],a:0,e:"터지는 원인 오븐온도가 높다 설탕용해가 덜되었다 반죽수분이 부족하다 표면이 말랐다 제빵",r:99,c:"manufacturing"},
{q:"흰자를 사용하는 제품에 주석산 크림과 같은 산을 넣는 이유가 아닌 것은?",o:["흰자의 알칼리성을 중화한다.","흰자의 거품을 강하게 만든다.","머랭의 색상을 희게 한다.","전체 흡수율을 높여 노화를 지연시킨다."],a:3,e:"흡수율이 높으면 노화가 빨리 진행된다.",r:99,c:"ingredients"},
{q:"다음 제품 중 패닝 할 때 제품의 간격을 가장 충분히 유지하여야 하는 제품은?",o:["슈","오믈렛","애플파이","쇼트브레드쿠키"],a:0,e:"슈(Choux)는 오븐에서 크게 팽창하므로 패닝 시 제품 간격을 가장 충분히 유지해야 한다. 팽창률이 3~4배에 달하기 때문이다.",r:90,c:"manufacturing"},
{q:"도넛의 가장 적합한 튀김온도는?",o:["130℃ 정도","150℃정도","180℃ 정도","220℃정도"],a:2,e:"도넛의 튀김 온도는 185~196℃ 도넛의 설탕 아이싱은 식기 전 40~45℃에 한다.",r:99,c:"manufacturing"},
{q:"데블스 푸드 케이크 제조 시 반죽의 비중을 측정하기 위해 필요한 무게가 아닌 것은?",o:["비중컵의 무게","코코아를 담은 비중컵의 무게","물을 담은 비중컵의 무게","반죽을 담은 비중컵의 무게"],a:1,e:"비중 측정에는 비중컵의 무게, 물을 담은 비중컵의 무게, 반죽을 담은 비중컵의 무게만 필요하다. 코코아를 담은 비중컵의 무게는 비중 측정에 사용되지 않는다.",r:93,c:"manufacturing"},
{q:"가나슈 크림에 대한 설명으로 옳은 것은?",o:["생크림은 절대 끓여서 사용하지 않는다.","초콜릿과 생크림의 배합비율은 10:1이 원칙이다.","초콜릿 종류는 달라도 카카오 성분은 같다.","끓인 생크림에 초콜릿을 더한 크림이다."],a:3,e:"가나슈 크림은 끓인 생크림에 초콜릿을 더하여 만든 크림이다. 생크림을 끓여서 사용하며, 초콜릿과 생크림의 비율은 1:1~2:1 정도이다.",r:93,c:"ingredients"},
{q:"다음 제품 중 건조 방지를 목적으로 나무틀을 사용하여 굽기를 하는 제품은?",o:["슈","밀푀유","카스테라","퍼프 페이스트리"],a:2,e:"카스테라는 나무틀을 사용하여 굽기하며, 나무틀이 수분 증발을 억제하여 건조를 방지한다. 나무의 단열 효과로 균일한 열전달이 이루어진다.",r:93,c:"manufacturing"},
{q:"노화에 대한 설명으로 틀린 것은?",o:["a화 전분이 b화 전분으로 변하는 것","빵의 속이 딱딱해지는 것","수분이 감소하는 것","빵의 내부에 곰팡이가 피는 것"],a:3,e:"곰팡이는 노화가 아니고 부패이다 제빵",r:99,c:"hygiene"},
{q:"빵의 부피와 가장 관련이 깊은 것은?",o:["소맥분의 단백질 함량","소맥분의 전분함량","소맥분의 수분 함량","소맥분의 회분함량"],a:0,e:"빵의 부피는 소맥분(밀가루)의 단백질 함량과 가장 관련이 깊다. 단백질(글루텐)이 많을수록 가스 보유력이 높아져 빵의 부피가 커진다.",r:93,c:"ingredients"},
{q:"냉동반죽 제품의 장점이 아닌 것은?",o:["계획생산이 가능하다.","인당 생산량이 증가한다.","이스트의 사용량이 감소된다.","반죽의 저장성이 향상된다."],a:2,e:"냉동반죽은 이스트 함량을 2배정도 늘려 사용한다.",r:99,c:"manufacturing"},
{q:"제빵 시 가수량, 믹싱 내구성, 믹싱 시간, 믹싱의 최적시기를 판단하는데 유용한 기계는?",o:["레오미터(Rheometer)","익스텐소그래프(Extensograph)","패리노그래프(Farinograph)","아밀로그래프(Amylograph)"],a:2,e:"반죽의물리적방법 : 아밀로그래프, 익스텐소그래프, 패리노그래프 패리노그래프 : 밀가루의 점탄성을 측정, 300g의 밀가루를 30°C로 보온한 믹서에 반죽의 경도가 500B.U에 도달하도록 물을 가하면서 측정하는 방법으로 흡수율, 믹싱내구성, 믹싱시간을 측정한다.",r:99,c:"manufacturing"},
{q:"2차 발효에 관련된 설명으로 틀린 것은?",o:["원하는 크기와 글루텐의 숙성을 위한 과정이다.","2차 발효는 온도, 습도, 시간의 세 가지 요소에 의하여 조절된다.","2차 발효실의 상대습도 75~90%가 적당하다.","2차 발효실의 습도가 지나치게 높으면 껍질이 과도하게 터진다."],a:3,e:"2차 발효실의 습도가 지나치게 높으면 반죽 표면에 수분이 응결되어 끈적거리고 제품 표면이 거칠어진다. 껍질이 과도하게 터지는 것은 습도가 낮을 때 발생한다.",r:93,c:"manufacturing"},
{q:"다음 재료 중 발효에 미치는 영향이 가장 적은 것은?",o:["이스트양","온도","소금","유지"],a:3,e:"유지는 발효에 미치는 영향이 가장 적다. 유지는 글루텐을 윤활하고 가스 보유력을 높이지만 발효 속도 자체에는 큰 영향을 주지 않는다. 이스트양, 온도, 소금은 발효에 직접적 영향을 준다.",r:90,c:"ingredients"},
{q:"500g의 완제품 식빵 200개를 제조하려 할 때, 발효 손실이 1%, 굽기 냉각 손실이 12%, 총 배합률이 180%라면 밀가루의 무게는 약 얼마인가?",o:["47Kg","55Kg","64kg","71kg"],a:2,e:"500g의 완제품 식빵 200개는 완제품의 무게가 500*200=100,000임을 알 수 있습니다. 이 때 총 반죽무게는 완제품 무게/(1-분할손실)이므로 100,000/(1-1%-12%) = 100,000/(1-0.13) = 100,000/0.87 = 114,942 밀가루의 무게는 총 재료무게*밀가루배합률/총배합률이므로 114,942*100/180 = 6384.44... 입니다. 여태 g으로 계산했으므로 위의 답지가 kg이니까 단위환산을 하면 63.844..kg 답은 반올림하여 64kg, 3 번입니다.",r:99,c:"manufacturing"},
{q:"스트레이트법으로 식빵을 만들 때, 밀가루온도 22℃, 실내온도 26℃, 수돗물온도 17℃, 결과온도 30℃, 희망온도 27℃라면 계산된 물 온도는?",o:["2℃","4℃","6℃","8℃"],a:3,e:"* 스트레이트법 마찰계수 (결과온도x3)-(밀가루온도+실내온도+수돗물 온도) = (30x3)-(22+26+17)=25 * 스트레이트법 사용물 온도 (희망온도x3)-(밀가루온도+실내온도+마찰계수) = (27x3)-(22+26+25)=8 * 계산된 물 온도는 8˚C 제빵",r:99,c:"manufacturing"},
{q:"제빵 시 정형(make-up)의 범에 들어가지 않는 것은?",o:["둥글리기","분할","성형","2차 발효"],a:3,e:"제빵의 정형은 둥글리기, 정형, 성형 3단계이다.",r:99,c:"manufacturing"},
{q:"굽기 중 전분의 호화 개시 온도와 이스트의 사멸온도로 가장 적당한 것은?",o:["20℃","30℃","40℃","60℃"],a:3,e:"전분의 호화 개시 온도와 이스트의 사멸 온도는 모두 약 60℃이다. 60℃에서 전분이 물을 흡수하여 팽윤하기 시작하고, 이스트도 이 온도에서 사멸한다.",r:90,c:"ingredients"},
{q:"다음의 재료 중 많이 사용할 때 반죽의 흡수량이 감소되는 것은?",o:["활성 글루텐","손상전분","유화제","설탕"],a:3,e:"설탕 5% 증가 시 흡수율은 1% 감소된다.",r:99,c:"ingredients"},
{q:"발효의 설명으로 잘못된 것은?",o:["발효 속도는 발효의 온도가 38℃일 때 최대이다.","이스트의 최적 pH는 4.7이다.","알코올 농도가 최고에 달했을 때 즉 발효의 마지막 단계에서 발효 속도는 증가한다.","소금은 약 1% 이상에서 발효를 지연시킨다."],a:2,e:"발효의 마지막 단계에서는 알코올 농도가 높아져 이스트 활성이 억제되므로 발효 속도가 감소한다. 발효 속도가 증가한다는 설명은 틀리다.",r:93,c:"ingredients"},
{q:"제품의 판매가격은 어떻게 결정하는가?",o:["총원가＋이익","제조원가＋이익","직접재료비＋직접경비","직접경비＋이익"],a:0,e:"판매가격 = 총원가 + 이익이다.\n• 제조원가, 직접재료비, 직접경비만으로는 판매가격을 결정할 수 없다.",r:77,c:"management"},
{q:"성형하여 철판에 반죽을 놓을 때, 일반적으로 가장 적당한 철판의 온도는?",o:["약 10℃","약 25℃","약32℃","약 55℃"],a:2,e:"성형 후 반죽을 놓을 때 철판 온도는 약 32℃가 적당하다. 이 온도는 이스트 활성에 적합하며, 너무 차가우면 발효가 지연되고 너무 뜨거우면 바닥이 과발효된다.",r:85,c:"manufacturing"},
{q:"제빵용 포장지의 구비조건이 아닌 것은?",o:["탄력성","작업성","위생성","보호성"],a:0,e:"제빵용 포장지에 탄력성은 필수 조건이 아니다. 작업성(포장 용이), 위생성(식품 안전), 보호성(수분·산소 차단)이 포장지의 주요 구비조건이다.",r:90,c:"hygiene"},
{q:"물에 대한 설명 중 옳은 것은?",o:["연수 사용 시 이스트푸드로 경도를 조정한다.","경수 사용 시 발효시간이 감소한다.","경도는 물의 염화나트륨(NaCl)양에 따라 변한다.","일시적 경수는 화학적 처리에 의해서만 연수가 된다."],a:0,e:"물처리방법 연수:흡수율1~2% 감소,이스트량감소, 이스트푸드와소금량증가 경수:이스트량증가, 이스트푸드사용량감소, 맥아첨가",r:99,c:"ingredients"},
{q:"달걀흰자의 고형분 함량은 약 몇 % 인가?",o:["12%","24%","30%","40%"],a:0,e:"흰자-수분88%, 고형분12% ☆계란1개의 무게가 60g이 넘으면 노른자의 비율이 감소하고,흰자비율이 증가한다.",r:99,c:"ingredients"},
{q:"제빵에서 글루텐을 강하게 하는 것은?",o:["전분","우유","맥아","산화제"],a:3,e:"산화제 : 글루텐의 탄력성을 부여",r:99,c:"ingredients"},
{q:"패리노그래프와 관계가 적은 것은?",o:["흡수율 측정","믹싱시간 측정","믹싱 내구성 측정","호화특성 측정"],a:3,e:"4.호화특성-아밀로그래프",r:99,c:"ingredients"},
{q:"유황을 함유한 아미노산으로 -S-S-결합을 가진 것은?",o:["리신 (lysine)","루신 (leucine)","시스틴 (cystine)","글루타민산 (glutamic acid)"],a:2,e:"시스틴(Cystine)은 유황을 함유한 아미노산으로 두 개의 시스테인이 -S-S-(이황화) 결합으로 연결된 구조이다. 이 결합은 글루텐 구조 형성에 중요한 역할을 한다.",r:93,c:"nutrition"},
{q:"통상적인 우유(시유)의 고형질 함량은 약 얼마인가?",o:["12%","20%","80%","88%"],a:0,e:"우유(시유)의수분함량은87.5%, 고형질12.5%",r:99,c:"nutrition"},
{q:"밀가루와 밀의 현탁액을 일정한 온도로 균일하게 상승시킬 때 일어나는 점도의 변화를 계속적으로 자동 기록하는 장치는?",o:["아밀로그래프(Amylograph)","모세관 점도계(Capillary viscometer)","피서 점도계 (Fisher viscometer)","브룩필드 점도계 (Brookfield viscometer)"],a:0,e:"아밀로그래프(Amylograph)는 밀가루 현탁액의 온도를 균일하게 상승시키면서 점도 변화를 자동 기록하는 장치이다. 전분의 호화 특성과 효소 활성을 평가한다.",r:93,c:"ingredients"},
{q:"밀가루 단백질 중 알코올에 녹고 주로 점성이 높아지는 성질을 가진 것은?",o:["글루테닌","글로부린","알부민","글리아딘"],a:3,e:"글리아딘(Gliadin)은 알코올에 용해되는 밀가루 단백질로, 주로 점성(viscosity)을 부여한다. 글루테닌은 탄력성, 알부민은 수용성, 글로불린은 염용성 단백질이다.",r:93,c:"ingredients"},
{q:"메성 옥수수 (non-waxy corn)전분의 호화 온도는?",o:["45℃","70℃","80℃","95℃"],a:2,e:"메성 옥수수(non-waxy corn) 전분의 호화 완료 온도는 약 80℃이다. 호화가 시작되는 온도는 약 62℃이나, 충분히 호화가 이루어지는 기준 온도는 80℃로 본다.",r:80,c:"ingredients"},
{q:"버터크림을 만드는데 사용하는 유지의 가장 중요한 기능은?",o:["완충제 기능","크림화 기능","호화 기능","젤화 기능"],a:1,e:"버터크림에 사용하는 유지의 가장 중요한 기능은 크림화(Creaming) 기능이다. 유지가 공기를 포집하여 부드럽고 가벼운 크림을 만든다.",r:93,c:"ingredients"},
{q:"기름의 산패를 촉진시키는 요인들로만 짝지은 것은?",o:["산소, 고온, 자외선, 동","산소, 고온, 자외선, 질소","산소, 고온, 동, 질소","고온, 자외선, 동, 질소"],a:0,e:"질소는 음식의 부패 및 산패를 막아준다.",r:99,c:"ingredients"},
{q:"머랭(meringue)을 만드는데 1kg의 흰자가 필요하다면 껍질을 포함한 평균무게가 60g인 계란은 약 몇 개가 필요한가?",o:["20개","24개","28개","32개"],a:2,e:"계란은껍질10%, 노른자30%, 흰자60% 1kg의흰자가필요하다. 계란1개의껍질을포함한평균무개가60g일때 계란한개에흰자는60g×0.6=36g이다. 1000g÷36g=27.778개 이에답은3번28개이다.",r:99,c:"ingredients"},
{q:"밀가루 속의 단백질 함량은 반주(Dough)의 흡수율에 밀접한 관련이 있다고 한다. 일반적으로 단백질 1%에 대하여 반죽 흡수율은 얼마나 증가되는가?",o:["약 1.5%","약 2.5%","약 3.5%","약 5%"],a:0,e:"단백질 1%에 대하여 반죽 흡수율은 약 1.5% 증가한다. 단백질이 물을 흡수하여 글루텐을 형성하기 때문이다.",r:98,c:"ingredients"},
{q:"일반적으로 반죽을 강화시키는 재료는?",o:["유지, 탈지분유, 계란","소금, 산화제, 탈지분유","유지, 환원제, 설탕","소금, 산화제, 설탕"],a:1,e:"반죽을 강화시키는 재료는 소금, 산화제, 탈지분유이다.\n• 유지, 환원제, 설탕은 반죽을 약화(연화)시킨다.",r:93,c:"ingredients"},
{q:"이스트에 함유되어 있는 효소 중에서 지방을 지방산과 글리세린으로 분해하는 효소는?",o:["프로테아제(protease)","리파아제(lipase)","인버타아제(invertase)","말타아제(maltase)"],a:1,e:"프로테아제 : 단백질을 펩톤, 폴리펩티드, 아미노산으로 분해 리파아제 : 지방을 지방산과 글리세린으로 분해 말타아제 : 맥아당을 두개의 포도당으로 분해 찌마아제 : 포도당, 과당, 갈락토오스 같은 단당류를 알콜과 Co2로 분해",r:99,c:"nutrition"},
{q:"대장 내의 작용에 대한 설명으로 틀린 것은?",o:["무기질의 흡수가 일어난다.","수분흡수가 주로 일어난다.","소화되지 못한 물질의 부패가 일어난다.","섬유소가 완전 소화되어 정장작용을 한다."],a:3,e:"대장에서 섬유소는 완전히 소화되지 않으며, 장내 세균에 의해 일부만 분해된다. 섬유소는 장운동을 촉진하여 정장작용을 하지만 완전 소화되지는 않는다.",r:90,c:"nutrition"},
{q:"탄수화물 식품 중 동물성 급원인 것은?",o:["곡류","두류","유즙류","감자류"],a:2,e:"유즙류(우유 등)에 포함된 유당(lactose)은 동물성 탄수화물이다. 곡류, 두류, 감자류는 모두 식물성 탄수화물 급원이다.",r:90,c:"nutrition"},
{q:"필수지방산의 기능이 아닌 것은?",o:["머리카락, 손톱의 구성 성분이다.","세포막의 구조적 성분이다.","혈청 콜레스테롤을 감소시킨다.","뇌와 신경조직, 시각기능을 유지시킨다."],a:0,e:"머리카락과 손톱의 주성분은 케라틴(단백질)이며, 필수지방산의 기능이 아니다. 필수지방산은 세포막 구성, 혈청 콜레스테롤 감소, 뇌·신경·시각 기능 유지에 관여한다.",r:90,c:"nutrition"},
{q:"단백질 소화에 관한 설명으로 옳은 것은?",o:["췌장에서 분비되는 trypsinogen은 활성형이다.","pepsin은 casein을 응고시킨다.","소장에서 aminopeptidase가 분비된다.","위내 염산이 pepsinogen을 pepsin으로 전환시킨다."],a:2,e:"소장 점막에서 아미노펩티다아제(aminopeptidase)가 분비되어 펩타이드를 아미노산으로 최종 분해한다. 트립시노겐은 비활성형이며, 펩신이 카세인을 응고시키는 것은 위에서 일어나는 반응이다.",r:90,v:0,c:"nutrition"},
{q:"제품 100g에 무기질이 2g 들어있다면 이 무기질로부터 얻을 수 있는 열량은?",o:["0kcal","4kcal","14kcal","18kcal"],a:0,e:"탄수화물 및 단백질 : 4kcal/1g 지방 : 9kcal/1g 무기질 : 0kcal",r:99,c:"nutrition"},
{q:"장독소 (enterotoxin)에 의해 발생하는 식중독은?",o:["포도상구균 식중독","살모넬라 식중독","웰치균 식중독","장염비브리오 식중독"],a:0,e:"포도상구균:화농에 황색 포도상구균이 있으며, 포도상구균 자체는 열에 약하나 이 균이 체외로 분비하는 독소인 엔테로톡신은 내열성이 강해 일반가열조리법 즉, 100도에서 30분간 가열해도 파괴되지 않는다.구토,복통,설사 등의 증상이 나타난다.",r:99,c:"hygiene"},
{q:"일반적으로 식품의 저온 살균온도로 가장 적합한 것은?",o:["20 ~ 30℃","60 ~ 70℃","100 ~ 110℃","130 ~ 140℃"],a:1,e:"저온장시간살균 : 약 62~65℃에서 30분간 가열 후 살균 고온순간살균 : 약 70~75℃에서 15초간 가열 후 살균 초고온순간살균 : 약 130~150℃에서 2초간 가열 후 살균",r:99,c:"hygiene"},
{q:"화학적 식중독에서 나타나는 일반적 증상과 가장 거리가 먼 것은?",o:["두통","구토","복통","고열"],a:3,e:"화학적 식중독은 두통, 구토, 복통 등이 주요 증상이며, 고열은 일반적 증상이 아니다. 고열은 세균성 식중독(감염형)에서 주로 나타난다.",r:90,c:"hygiene"},
{q:"제과, 제빵의 부패요인과 관계가 가장 먼 것은?",o:["수분함량","제품 색","보관온도","pH"],a:1,e:"제품 색은 제과·제빵의 부패와 직접적 관계가 가장 적다. 수분함량, 보관온도, pH는 미생물 증식에 직접 영향을 미치는 부패 요인이다.",r:90,c:"hygiene"},
{q:"폐디스토마의 제1 중간 숙주는?",o:["쇠고기","배추","다슬기","붕어"],a:2,e:"페디스토마 -> 제1 중간숙주 : 다슬기 / 제2 중간숙주 : 가재, 민물게 간디스토마 -> 제1 중간숙주 : 왜우렁이 / 제2 중간숙주 : 담수어",r:99,c:"manufacturing"},
{q:"식품첨가물의 구분 및 종류에 대한 설명 중 틀린 것은?",o:["식품첨가물은 그 원료물질에 따라 화학적합성품, 천연첨가물 및 혼합제제류로 나뉜다.","화학적함성품과 천연첨가물은 화합물 성격상 구조적인 차이가 있다.","식품첨가물 중 유화제는 물에 혼합되지 않는 액체를 분산시키는데 사용된다.","증점안정제는 식품의 점도 증가 또는 결착력 증가에 사용된다."],a:1,e:"화학적합성품과 천연첨가물은 화합물 성격상 구조적 차이가 없을 수 있다(같은 화학구조). 예를 들어 합성 비타민C와 천연 비타민C는 구조가 동일하다.",r:93,c:"ingredients"},
{q:"다음 중 발병 시 전염성이 가장 낮은 것은?",o:["콜레라","장티푸스","납 중독","폴리오"],a:2,e:"납 중독은 화학적 중독으로 전염성이 없다. 콜레라, 장티푸스, 폴리오는 모두 전염성이 있는 감염병이다.",r:82,c:"hygiene"},
{q:"동에게 유산을 일으키며 사람에게는 열병을 나타내는 인수공통전염병은?",o:["탄저병","리스테리아증","돈단독","브루셀라증"],a:3,e:"브루셀라증은 동물에게 유산을 일으키며, 사람에게는 파상열(물결모양 열)을 나타내는 인수공통전염병이다. 탄저병은 피부·폐 감염, 리스테리아증은 뇌막염, 돈단독은 피부 감염이 특징이다.",r:93,v:0,c:"hygiene"},
{q:"우리나라 식중독 월별 발생 상황 중 환자의 수가 92% 이상을 차지하는 계절은?",o:["1 ~ 2월","3 ~ 4월","5 ~ 9월","10 ~ 12월"],a:2,e:"5월은 여름이시작되는 때이고 9월은 여름이 끝났지만 아직 온도가 높은 때다. 이때는 온도가높아 균의 활동이활발해 음식물이 부패하기 쉽다. 음식물의 부패가시작되면 식중독균도 활발해지기때문에 식중독 환자가 많은 것이다. 제빵",r:99,c:"hygiene"},
{q:"다음 중 유해 표백제는?",o:["페릴라르틴","롱갈릿","아우라민","둘신"],a:1,e:"유해 표백제-롱갈리트,삼영화질소 유해 감미료-둘신,페닐라틴 유해 착색료-아우라민,로다민",r:99,c:"ingredients"}]},
{title:"2011년 1회",desc:undefined,questions:[{q:"나가사끼 카스테라 제조 시 굽기 과정에서 휘젓기를 하는 이유가 아닌 것은?",o:["반죽온도를 균일하게 한다.","껍질표면을 매끄럽게 한다.","내상을 균일하게 한다.","팽창을 원할하게 한다."],a:3,e:"매끄럽고 균일하게 해주는게 휘젖기 제빵",r:99,c:"manufacturing"},
{q:"다음 중 스펀지 케이크 반죽을 팬에 담을 때 팬 용적의 어느 정도가 가장 적당한가?",o:["약 10 ~ 20%","약 30 ~ 40%","약 70 ~ 80%","약 50 ~ 60%"],a:3,e:"레이어케익 55% 파운드케익 70% 스퍼지케익 60% 엔절푸드케잌 60-70% 제빵",r:99,c:"manufacturing"},
{q:"코코아 20%에 해당하는 초콜릿을 사용하여 케이크를 만들려고 할 때 초콜릿 사용량은?",o:["16%","20%","28%","32%"],a:3,e:"초콜릿×5/8=20% 코코아는 32%",r:99,c:"ingredients"},
{q:"40g의 계량컵에 물을 가득 채웠더니 240g이었다. 과자반죽을 넣고 달아보니 220g이 되었다면 이 반죽의 비중은 얼마인가?",o:["0.85","0.9","0.92","0.95"],a:1,e:"(220-40)/(240-40)=180/200=9/10=0.9",r:99,c:"manufacturing"},
{q:"직접배합에 사용하는 불의 온도로 반죽온도 조절이 편리한 제품은?",o:["젤리 롤 케이크","과일 케이크","퍼프 페이스트리","버터 스펀지 케이크"],a:2,e:"퍼프 페이스트리는 직접배합(스트레이트법)에서 물의 온도를 조절하여 반죽온도를 간편하게 맞출 수 있는 제품이다. 접기 공정 전 반죽 온도 관리가 중요하며 물 온도가 주요 변수가 된다.",r:93,v:0,c:"manufacturing"},
{q:"롤 케이크를 말 때 표면이 터지는 결점을 방지하기 위한 조치 방법이 아닌 것은?",o:["덱스트린을 적당량 첨가한다.","노른자를 줄이고 전란을 증가시킨다.","오버 베이킹이 되도록 한다.","설탕의 일부를 물엿으로 대체한다."],a:2,e:"롤케이크 표면 터지는 현상=반죽 수분 부족 1. 설탕의 일부를 물엿으로 대치(설탕보다 물엿이 수분 있음) 2. 덱스트린의 점착성 이용(끈적함) 3. 노른자 비율을 감소시키고 전란을 증가(노른자 수분함량: 50%, 전란: 75%)",r:99,c:"ingredients"},
{q:"일반 파운드 케이크와는 달리 마블 파운드 케이크에 첨가하여 색상을 나타내는 재료는?",o:["코코아","버터","밀가루","계란"],a:0,e:"마블 파운드 케이크에 코코아를 첨가하여 갈색 마블(대리석) 무늬를 나타낸다. 버터, 밀가루, 계란은 일반 파운드 케이크에도 들어가는 기본 재료이다.",r:90,c:"ingredients"},
{q:"커스터드 푸딩을 컵에 채워 몇℃의 오븐에서 중탕으로 굽는 것이 가장 적당한가?",o:["160 ~ 170℃","190 ~ 200℃","201 ~ 220℃","230 ~ 240℃"],a:0,e:"커스터드 푸딩은 160~170℃ 오븐에서 중탕으로 굽는 것이 적당하다. 온도가 너무 높으면 계란 단백질이 급격히 응고되어 기포가 생기고 조직이 거칠어진다.",r:93,c:"manufacturing"},
{q:"케이크 반죽의 혼합 완료 정도는 무엇으로 알 수 있는가?",o:["반죽의 온도","반죽의 점도","반죽의 비중","반죽의 색상"],a:2,e:"케이크 반죽의 혼합 완료 정도는 비중으로 판단한다. 적정 비중에 도달하면 공기 포집이 충분히 이루어진 것으로, 혼합이 완료된 것이다.",r:93,c:"manufacturing"},
{q:"퍼프 페이스트리 반죽의 휴지 효과에 대한 설명으로 틀린 것은?",o:["글루텐을 재정돈 시킨다.","밀어 펴기가 용이해 진다.","CO₂ 가스를 최대한 발생시킨다.","절단 시 수축을 방지한다."],a:2,e:"퍼프 페이스트리 반죽의 휴지는 글루텐 재정돈, 밀어펴기 용이, 수축 방지 효과가 있다. CO₂ 가스 발생은 이스트 발효 제품의 특성이며, 퍼프 페이스트리는 화학적 팽창을 하지 않는다.",r:90,c:"manufacturing"},
{q:"튀김기름의 품질을 저하시키는 요인으로만 나열된 것은?",o:["수분, 탄소, 질소","수분, 공기, 철","공기, 금속, 토코페롤","공기, 탄소, 세사몰"],a:1,e:"기름의 4대 적은 온도(열), 수분(물), 공기(산소), 이물질 외 철 등이다.",r:99,c:"nutrition"},
{q:"퐁당(fondant)에 대한 설명으로 가장 적합한 것은?",o:["시럽을 214℃까지 끓인다.","40℃ 전후로 식혀서 휘 젓는다.","굳으면 설탕 1 : 물 1로 만든 시럽을 첨가한다.","유화제를 사용하면 부드럽게 할 수 있다."],a:1,e:"설탕 100 : 물 30 비율로 114~118℃ 에 끌여 시럽 후 38~44℃ 냉각하여 사용.",r:99,c:"ingredients"},
{q:"쿠키가 잘 퍼지지(spread) 않은 이유가 아닌 것은?",o:["고운 입자의 설탕 사용","과도한 믹싱","알칼리 반죽 사용","너무 높은 굽기 온도"],a:2,e:"알칼리의 경우 제품 모양과 형태를 유지하는 단백질이 용해되어 쿠키가 잘 퍼진다.",r:99,c:"manufacturing"},
{q:"머랭(meringgue)중에서 설탕을 끓여서 시럽으로 만들어 제조하는 것은?",o:["이탈리안 머랭","스위스 머랭","냉제 머랭","온제 머랭"],a:0,e:"이탈리안 머랭은 설탕을 끓여 시럽(118~121℃)으로 만들어 흰자에 부으면서 제조한다. 스위스 머랭은 중탕, 냉제 머랭은 상온에서 만든다.",r:93,c:"ingredients"},
{q:"다음 중 제과 생산관리에서 제1차 관리 3대 요소가 아닌 것은?",o:["사람(Man)","재료(material)","방법(metaod)","자금(Money)"],a:2,e:"방법, 시설, 시간, 시장은 2차 관리에 해당된다.",r:99,c:"management"},
{q:"제빵시 2차 발효의 목적이 아닌 것은?",o:["성형공정을 거치면서 가스가 빠진 반죽을 다시 부풀리기 위해","발효산물 중 유기산과 알코올이 글루텐의 신장성과 탄력성을 높여 오븐 팽창이 잘 일어나도록 하기 위해","온도와 습도를 조절하여 이스트의 활성을 촉진시키기 위해","빵의 향에 관계하는 발효산물인 알코올 유기산 및 그 밖의 방향성 물질을 날려 보내기 위해"],a:3,e:"2차 발효의 목적 1.성형에서 가스빼기가 된 반죽을 다시 그물구조로 부풀린다. 2.반죽 온도의 상승에 따라 이스트와 효소가 활성화된다. 3.바람직한 외형과 식감을 얻을 수 있다. 4.알콜, 유기산 및 그 외의 방향성 물질을 생산한다. 5.발효 산물인 유기산과 알콜이 글루텐에 작용한 결과 생기는 반죽의 신장성 증가가 . 오븐 팽창이 잘 일어나도록 돕는다.",r:99,c:"manufacturing"},
{q:"분할기에 의한 식빵 분할은 최대 몇 분 이내에 완료하는 것이 가장 적합한가?",o:["20분","30분","40분","50문"],a:0,e:"기계 분할: 분할기를 사용하여 식빵류를 기준으로 15분~20분 이내에 분할한다.",r:99,c:"manufacturing"},
{q:"어떤 과자점에서 여름에 반죽 온도를 24℃로 하여 빵을 만들려고 한다. 사용수 온도는 10℃, 수돗물의 온도는 18℃, 사용수 양은 3kg, 얼음 사용량은 900g일 때 조치사항으로 옳은 것은?",o:["믹서에 얼음만 900g을 넣는다.","믹서에 수돗물만 3kg을 넣는다.","믹서에 수돗물 3kg과 얼음 900g을 넣는다.","믹서에 수돗물 2.1kg과 얼음 900g을 넣는다."],a:3,e:"물 사용량 공식 물양3000-얼음양900=2100 (=2.1kg) 제빵",r:99,c:"manufacturing"},
{q:"어느 제과점의 지난 달 생산실적이 다음과 같은 경우 노동분배율은? (외부가치 600만원, 생산가치 3000만원, 인건비 1500만원, 총인원 10명)",o:["50%","45%","55%","60%"],a:0,e:"노동분배율 = 인건비 / 생산가치 1500만원 / 3000만원",r:99,c:"management"},
{q:"빵 발효에 영향을 주는 요소에 대한 설명으로 틀린 것은?",o:["사용하는 이스트의 양이 많으면 발효시간은 감소된다.","삼투압이 높으면 발효가 지연된다.","제빵용 이스트는 약알칼리성에서 가장 잘 발효된다.","적정량의 손상된 전분은 발효성 탄수화물을 공급한다."],a:2,e:"삼투압이 높아지면 발효시간은 길어진다.",r:99,c:"ingredients"},
{q:"다음 중 제품의 특성을 고려하여 혼합 시 반죽을 가장 많이 발전시키는 것은?",o:["불란서빵","햄버거 빵","과자빵","식빵"],a:1,e:"햄버거빵은 믹싱단계를 렛다운단계까지 믹싱한다.",r:99,c:"manufacturing"},
{q:"수평형 믹서를 청소하는 방법으로 올바르지 않은 것은?",o:["청소하기 전에 전원을 차단한다.","생산 직후 청소를 실시한다","물을 가득 채워 회전시킨다.","금속으로 된 스크레이퍼를 이용하여 반죽을 긁어낸다."],a:3,e:"금속으로된 스크레퍼를 사용하면 믹서 상함 스크레치난다 금속으로 된 스크레퍼는 분할 할때 사용한다.",r:99,c:"manufacturing"},
{q:"성형한 식빵 반죽을 팬에 넣을 때 이음매의 위치는 어느 쪽이 가장 좋은가?",o:["위","아래","좌측","우측"],a:1,e:"성형한 식빵 반죽을 팬에 넣을 때 이음매는 아래쪽에 놓는다. 이음매가 위에 있으면 발효·굽기 중 벌어질 수 있다.",r:90,c:"manufacturing"},
{q:"빵 포장의 목적으로 부적합한 것은?",o:["빵의 저장성 증대","빵의 미생물오염 방지","수분증발 촉진","상품의 가치 항상"],a:2,e:"빵 포장의 목적은 저장성 증대, 미생물 오염 방지, 상품 가치 향상이다. 수분증발 촉진이 아니라 수분증발 억제가 목적이다.",r:93,c:"hygiene"},
{q:"냉동 반죽법에 적합한 반죽의 온도는?",o:["18 ~ 22℃","26 ~ 30℃","32 ~ 36℃","38 ~ 42℃"],a:0,e:"냉동 반죽법에 적합한 반죽 온도는 18~22℃이다. 온도가 높으면 냉동 전 발효가 진행되어 냉동 내구성이 떨어진다.",r:93,c:"manufacturing"},
{q:"완제품 중량이 400g인 빵 200개를 만들고자 한다. 발효 손실이 2%이고 굽기 및 냉각손실이 12%라고 할 때 밀가루 중량은? (단, 총 배합율은 180%이며, 소수점 이하는 반올림한다.)",o:["51536g","54725g","61320g","61940g"],a:0,e:"(400x200)/(0.98x0.88x1.8)=51536 제빵",r:99,c:"manufacturing"},
{q:"빵의 제품평가에서 브레이크와 슈레드 부족현상의 이유가 아닌 것은?",o:["발효시간이 짧거나 길었다.","오븐의 온도가 높았다.","2차 발효실의 습도가 낮았다","오븐의 증기가 너무 많았다."],a:3,e:"오래된 밀가루 사용 효소제 많이 사용 단물사용 이스트푸드사용량부족 발효시간이 길거나 짧음 2차발효실온도 높거나 습도 낮거나 시간이 김",r:99,c:"manufacturing"},
{q:"스펀지법에 비교해서 스트레이크법의 장점은?",o:["노화가 느리다","발효에 대한 내구성이 좋다","노동력이 감소된다.","기계에 대한 내구성이 증가한다."],a:2,e:"스트레이트법은 모든 재료를 한 번에 혼합하므로 스펀지법에 비해 노동력(인건비)이 감소한다. 반면 노화가 빠르고 발효 내구성이 떨어지는 단점이 있다.",r:85,v:0,c:"manufacturing"},
{q:"다음 중 빵 굽기의 반응이 아닌 것은?",o:["이산화탄소의 방출과 노화를 촉진시킨다.","빵의 풍미 및 색깔을 좋게 한다.","제빵 제조 공정의 최종 단계로 빵의 형태를 만든다.","전분의 호화로 식품의 가치를 향상시킨다."],a:0,e:"노화는 오븐에서 나온 직후 부터 시작됨 굽기 반응 x",r:99,c:"manufacturing"},
{q:"진한 껍질색의 빵에 대한 대책으로 적합하지 못한 것은?",o:["설탕, 우유 사용량 감소","1차 발효 감소","오븐 온도 감소","2차 발효 습도 조절"],a:1,e:"1차 발효를 감소시키면 환원당 생성이 줄어 마이야르 반응이 약해지므로 껍질색이 밝아질 수 있다. 즉, 1차 발효 감소는 진한 껍질색의 대책이 될 수 있으므로 '적합하지 못한 것'이 아닌 것처럼 보인다. 그러나 출제 기준에서는 1차 발효 감소를 적합하지 않은 대책으로 보았다. 이는 발효 부족으로 인한 다른 품질 문제(부피 감소 등)를 고려한 것으로 해석된다.",r:80,c:"manufacturing"},
{q:"반추위 동물의 위액에 존재하는 우유 응유 효소는?",o:["펩신","트립신","레닌","펩티다아제"],a:2,e:"레닌은 젖속에 들어있는 효소 펩신은 위의 주세포에 준비되는 효소 트립신은 이자에서 준비되는 소화효소 펩티다아제는 아미노산 사이의 펩티드 결합을 가수분해시켜 더 작은 단위로 분해시키는 이화작용을 촉매시키는 효소",r:99,c:"ingredients"},
{q:"다음 혼성주 중 오렌지 성분을 원료로 하여 만들지 않는 것은?",o:["그랑 마르니에(Grand Marnier)","마라스키노(Maraschino)","쿠앵트로(Cointreau)","큐라소(Curacao)"],a:1,e:"마라스키노는 체리혼성주",r:99,c:"ingredients"},
{q:"전분의 노화에 대한 설명 중 틀린 것은?",o:["-18℃ 이하의 온도에서는 잘 일어나지 않는다.","노화된 전분은 소화가 잘 된다.","노화란 α-전분이β-전분으로 되는 것을 말한다.","노화된 전분은 향이 손실된다."],a:1,e:"노화란 물리, 화학적 변화로 맛과 향이 바뀌며 딱딱해진 제품 특징 : 선선도 저하, 소화 어려움, 맛과 풍미 저하 등 요인 : 시간, 온도, 배합율/공정 → 믹싱, 발효, 굽기 노화를 지연시키는 방법은 ① 18℃ 이하 또는 20~35℃에 저장 ② 당(설탕)류 첨가, 유화제 첨가, 수분 증가, 단백질(탈지분유, 달걀) 증가, 좋은 재료 사용, 방습포장 등",r:99,c:"ingredients"},
{q:"다음 중 중화가를 구하는 식은?",o:["중조의 양 / 산성제의 양","중조의 양 / 산성제의 양","산성제의 양×중조의 양 / 100","산성제의 양×중조의 양"],a:0,e:"중화가 = 중조(베이킹소다)의 양 / 산성제의 양이다. 중화가는 산성제 1에 대해 필요한 중조의 양을 나타내는 값으로, 산성제의 종류에 따라 달라진다.",r:93,c:"manufacturing"},
{q:"일시적 경수에 대한 설명으로 맞는 것은?",o:["가열시 탄산염으로 되어 침전된다.","끓여도 경도가 제거되지 않는다.","황산염에 기인한다.","제빵에 사용하기에 가장 좋다."],a:0,e:"일시적 경수: 탄산칼슘의 형태로 들어있는 경수로 끓이면 불용성 탄산염으로 분해되고 가라앉아 연수가 된다.",r:99,c:"nutrition"},
{q:"생크림 보존온도로 가장 적합한 것은?",o:["-18℃이하","-5 ~ -1℃","0 ~ 10℃","15 ~ 18℃"],a:2,e:"생크림 보존 온도는 냉장온도인 5℃ 전후가 좋다.",r:99,c:"hygiene"},
{q:"제과에서 유지의 기능이 아닌 것은?",o:["연화작용","공기포집 기능","보존성 개선 기능","노화촉진 기능"],a:3,e:"유지의 노화촉진 기능은 유지의 기능이 아니다. 유지는 오히려 노화를 지연시키는 역할을 한다. 연화작용, 공기포집, 보존성 개선은 유지의 주요 기능이다.",r:93,c:"ingredients"},
{q:"제과․제빵용 건조 재료와 팽창제 및 유지 재료를 알맞은 배합율로 균일하게 혼합한 원료는?",o:["프리믹스","팽창제","향신료","밀가루 개량제"],a:0,e:"프리믹스(Premix)는 밀가루, 팽창제, 유지 등 건조 재료를 알맞은 배합률로 균일하게 혼합한 원료이다. 물이나 계란만 추가하면 바로 사용할 수 있다.",r:93,v:0,c:"ingredients"},
{q:"반죽의 신장성과 신장에 대한 저항성을 측정하는 기기는?",o:["패리노그래프","레오퍼멘토에터","믹서트론","익스텐소그래프"],a:3,e:"익스텐소그래프:밀가루 반죽을 끊어질 때까지 늘려서 반죽의 신장성에 대한 저항을 측정하는 기계",r:99,c:"manufacturing"},
{q:"전화당을 설명한 것 중 틀린 것은?",o:["설탕의 1.3배의 감미를 갖는다.","설탕을 가수분해시켜 생긴 포도당과 과당의 혼합물 이다.","흡습성이 강해서 제품의 보존기간을 지속시킬 수 있다.","상대적인 감미도는 맥아당보다 낮으나 쿠키의 광택과 촉감을 위해 사용한다."],a:3,e:"당류의 감미도 순서 과당 > 전화당 > 자당 > 포도당 > 맥아당 > 갈락토오스 > 유당",r:99,c:"ingredients"},
{q:"커스타드 크림에서 달걀의 주요 역할은?",o:["영양가를 높이는 역할","결합제의 역할","팽창제의 역할","저장성을 높이는 역할"],a:1,e:"커스터드 크림에서 달걀은 열을 가하면 응고되어 결합제(바인더) 역할을 한다. 달걀 단백질의 열응고 성질로 크림에 적절한 점도와 형태를 부여한다.",r:85,c:"nutrition"},
{q:"우유에 대한 설명으로 옳은 것은?",o:["시유의 비중은 1.3 정도이다.","우유 단백질 중 가장 많은 것은 카제인이다.","우유의 유당은 이스트에 의해 쉽게 분해된다.","시유의 현탁액은 비타민 B2에 의한 것이다."],a:1,e:"우유 단백질 중 가장 많은 것은 카제인(casein)으로 전체 우유 단백질의 약 80%를 차지한다. 시유의 비중은 약 1.03, 유당은 이스트에 의해 분해되지 않는다.",r:93,c:"ingredients"},
{q:"안정제의 사용 목적이 아닌 것은?",o:["흡수제로 노화 지연 효과","머랭의 수분 배출 유도","아이싱이 부서지는 것 방지","크림 토핑의 거품 안정"],a:1,e:"머랭과 크림토핑의 수분 배출을 억제하여 거품을 안정시킨다.",r:99,c:"ingredients"},
{q:"카카오버커의 결정이 거칠어지고 설탕의 결정이 석출되어 초콜릿의 조직이 노화하는 현상은?",o:["템퍼링(tempering)","블룸(bloom)","콘칭(conching)","페이스트(paste)"],a:1,e:"블룸(Bloom)은 초콜릿 표면에 코코아버터 결정이 거칠어지거나 설탕이 석출되어 흰색 반점이 생기는 노화 현상이다. 템퍼링은 결정화 공정, 콘칭은 정련 공정이다.",r:85,v:0,c:"ingredients"},
{q:"과실이 익어감에 따라 어떤 효소의 작용에 의해 수용성 펙틴이 생성되는가?",o:["펙틴리가아제","아밀라아제","프로토펙틴 가수분해효소","브로멜린"],a:2,e:"프로토펙틴 가수분해효소(protopectinase)의 작용으로 불용성 프로토펙틴이 수용성 펙틴으로 변환되어 과실이 익으면서 부드러워진다.",r:93,c:"nutrition"},
{q:"소화기관에 대한 설명으로 틀린 것은?",o:["위는 강알칼리의 위액을 분비한다.","이자(체장)는 당대사호르몬의 내분비선이다.","소장은 영양분을 소화, 흡수한다.","대장은 수분을 흡수하는 역할을 한다."],a:0,e:"위는 강산성의 위액을 분비한다. 제빵",r:99,c:"nutrition"},
{q:"한 개의 무게가 50g인 과자가 있다. 이 과자 100g중에 탄수화물 70g, 단백질 5g, 지방 15g, 무기질 4g, 물 6g이 들어 있다면 이 과자 10개를 먹을 때 얼마의 열량을 낼 수 있는가?",o:["1230 kcal","2175 kcal","2750 kcal","1800 kcal"],a:1,e:"탄수화물 35(g)×4(kcal)×10(개) 단백질 2.5(g)×4(kcal)×10(개) 지방 7.5(g)×9(kcal)×10(개)",r:99,c:"nutrition"},
{q:"비타민과 관련된 결핍증의 연결이 틀린 것은?",o:["비타민 A - 야맹증","비타민 B₁ - 구내염","비타민 C - 괴혈병","비타민 D - 구루병"],a:1,e:"지용성비타민 A D E K 비A 야맹증 비D 골다공 구루병 비C(아스코르브산) 괴혈병 비E 불임 근육위축 비B1(티아민) 각기병 비B2 구순구각영 설염 니아신 펠라그라병 비B12 빈혈 제빵",r:99,c:"nutrition"},
{q:"적혈구, 뇌세포, 신경세표의 주요 에너지원으로 혈당을 형성하는 당은?",o:["과당","설탕","유당","포도당"],a:3,e:"포도당은 적혈구, 뇌세포, 신경세포의 주요 에너지원이며 혈당을 형성하는 당이다. 이들 세포는 포도당만을 에너지원으로 사용한다.",r:90,c:"ingredients"},
{q:"다음 중 수소를 첨가하여 얻는 유지류는?",o:["쇼트닝","버터","라드","양기름"],a:0,e:"쇼트닝 : 라드의 대용품으로 동식물성 유지에 수소를 첨가하여 경화유로 제조하며 수분 함량이 0%로 무색,무취,무미이다",r:99,c:"ingredients"},
{q:"장염비브리오 식중독을 일으키는 주요 원인식품은?",o:["달걀","어패류","채소류","육류"],a:1,e:"장염비브리오 식중독의 주요 원인식품은 어패류(생선, 조개 등)이다. 장염비브리오균은 해수세균으로 어패류를 생식할 때 감염된다.",r:90,c:"hygiene"},
{q:"빵을 제조하는 과정에서 반죽 후 분할기로부터 분할할 때나 구울 때 달라붙지 않게 할 목적으로 허용되어 있는 첨가물은?",o:["글리세린","프로필렌 글리콜","초산 비닐수지","유동 파라핀"],a:3,e:"파라핀(유동 파라핀)은 식품첨가물로 허용된 이형제로, 빵 반죽이 분할기나 팬에 달라붙지 않도록 하는 목적으로 사용이 허용되어 있다.",r:93,c:"manufacturing"},
{q:"밀가루의 표백과 숙성을 위하여 사용하는 첨가물은?",o:["개량제","유황제","정착제","팽창제"],a:0,e:"밀가루 개량제: 밀가루의 표백과 숙성시간을 단축시키고, 제빵효과의 저해물질을 파괴시켜 품질을 개량하는 것",r:99,c:"ingredients"},
{q:"부패를 판정하는 방법으로 사람에 의한 관능검사를 실시할 때 검사하는 항목이 아닌 것은?",o:["색","맛","냄새","균수"],a:3,e:"부패 판정 시 관능검사는 색, 맛, 냄새를 사람의 감각으로 평가한다. 균수 측정은 미생물학적 검사 방법이지 관능검사 항목이 아니다.",r:90,c:"hygiene"},
{q:"위생동물의 일반적인 특성이 아닌 것은?",o:["식성 범위가 넓다.","음식물과 농작물에 피해를 준다.","병원미생물을 식품에 감염시키는 것도 있다.","발육기간이 길다."],a:3,e:"위생동물: 파리, 벌, 바퀴벌레, 쥐 등의 위생상 위해를 주는 동물",r:99,c:"hygiene"},
{q:"물수건의 소독방법으로 가장 적합한 것은?",o:["비누로 세척한 후 건조한다.","삶거나 차아염소산 소독 후 일광 건조한다.","3%과산화수소로 살균 후 일광 건조한다.","크레졸(cresol) 비누액으로 소독하고 일광 건조한다."],a:1,e:"물수건은 삶거나 차아염소산 소독 후 일광 건조하는 것이 가장 적합하다. 비누 세척만으로는 살균이 불충분하다.",r:93,c:"hygiene"},
{q:"결핵의 주요한 감염원이 될 수 있는 것은?",o:["토끼고기","양고기","돼지고기","불완전 살균우유"],a:3,e:"불완전 살균우유로 감염되는 병 :결핵,Q열,파상열",r:99,c:"hygiene"},
{q:"살모넬라균에 의한 식중독 증상과 가장 거리가 먼 것은?",o:["심한 설사","급격한 발열","심한 복통","신경마비"],a:3,e:"살모넬라균 식중독의 주요 증상은 심한 설사, 급격한 발열, 심한 복통이다. 신경마비는 보툴리누스균 식중독의 특징적 증상이다.",r:93,c:"hygiene"},
{q:"급성감염병을 일으키는 병원체로 포자는 내열성이 강하며 생물학전이나 생물테러에 사용될 수 있는 위험성이 높은 병원체는?",o:["브루셀라균","탄저균","결핵균","리스테리아균"],a:1,e:"탄저의 원인 균은 바실러스 안트라시스이며, 수육을 조리하지 않고, 섭취하거나 피부 상처 부위로 감염되기 쉽다.",r:99,c:"hygiene"},
{q:"세균성 식중독에 관한 사항 중 옳은 내용으로만 짝지은 것은?",o:["1, 2","2, 3","2, 4","3, 4"],a:3,e:"세균성 식중독에 관한 올바른 내용의 조합은 3번과 4번이다. 세균성 식중독은 감염형(살모넬라, 장염비브리오 등)과 독소형(포도상구균, 보툴리누스균 등)으로 나뉘며, 이 두 항목이 옳은 내용에 해당한다.",r:90,c:"hygiene"}]},
{title:"2011년 2회",desc:undefined,questions:[{q:"도넛 설탕 아이싱을 사용할 때의 온도로 적합한 것은?",o:["20℃ 전후","25℃ 전후","40℃ 전후","60℃ 전후"],a:2,e:"도넛 글레이즈를 49℃전후로 데워 사용 설탕은 점착력이 큰 온도인 40℃ 전후에 뿌린다",r:99,c:"manufacturing"},
{q:"도넛 반죽의 휴지 효과가 아닌 것은?",o:["밀어펴기 작업이 쉬워진다.","표피가 빠르게 마르지 않는다.","각 재료에서 수분이 발산된다.","이산화탄소가 발생하여 반죽이 부푼다."],a:2,e:"도넛 반죽의 휴지 효과 1. 밀어펴기가 쉬워진다. 2. 표피가 쉽게 마르지 않는다. 3. 각 재료에 수분이 흡수된다. 4. 이산화탄소가 발생하여 반죽이 부푼다. 5. 과한 지방흡수를 막는다. 6. 도넛 모양을 균형있게 만든다.",r:99,c:"manufacturing"},
{q:"완성된 쿠키의 크기가 퍼지지 않아 작았다면, 그 원인이 아닌 것은?",o:["사용한 반죽이 묽었다.","굽기 온도가 높았다.","반죽이 산성이었다.","가루 설탕을 사용하였다."],a:0,e:"퍼짐의 결핍 1. 산성반죽 2. 된반죽 3. 과도한 믹싱 4. 높은 오븐 온도 5. 입자가 곱거나 적은양의 설탕 사용",r:99,c:"manufacturing"},
{q:"과자 반죽의 모양을 만드는 방법이 아닌 것은?",o:["짤주머니로 짜기","밀대로 밀어펴기","성형 틀로 찍어내기","발효 후 가스빼기"],a:3,e:"과자 반죽의 모양을 만드는 방법에는 짤주머니 짜기, 밀대 밀어펴기, 성형 틀 찍어내기 등이 있다. 발효 후 가스빼기는 빵 반죽의 공정이지 과자 반죽 성형 방법이 아니다.",r:93,c:"manufacturing"},
{q:"도넛의 흡유량이 높았을 때 그 원인은?",o:["고율배합 제품이다.","튀김시간이 짧다.","튀김온도가 높다.","휴지시간이 짧다."],a:0,e:"도넛 수분 과다 : 팽창과다, 흡유 과다, 형태불균형, 혹돌출, 외부링모양 과대 도넛 수분 부족 : 팽창부족, 형태불균형, 갈라짐, 점도가 큼, 외피에 톱늬모양 발생",r:99,c:"manufacturing"},
{q:"스펀지 케이크 제조 시 덥게 하는 방법으로 사용할 때 계란과 설탕은 몇 도로 중탕하고 혼합하는 것이 가장 적당한가?",o:["30℃","43℃","10℃","25℃"],a:1,e:"더운믹싱: 가온법이라고도 하며, 중탕으로 43도까지 데운 뒤 믹싱 - 장점: 기포시간 단축, 균일한색상(설탕이 잘 녹아서), 계란 비린내 감소 찬믹싱: 22~24도",r:99,c:"ingredients"},
{q:"실내온도 30℃ 실외온도 35℃ 밀가루온도 24℃ 설탕온도 20℃ 쇼트닝온도 20℃ 계란온도 24℃ 마찰계수가 22이다. 반죽온도가 25℃가 되기 위해서 필요한 물의 온도는?",o:["8℃","9℃","10℃","12℃"],a:2,e:"(희망온도*6)-(밀가루온도+실내온도+설탕온도+쇼트닝온도+계란온도+마찰계수) 제빵",r:99,c:"manufacturing"},
{q:"오버 베이킹에 대한 설명 중 옳은 것은?",o:["높은 온도에서 짧은 시간 동안 구운 것이다.","노화가 빨리 진행된다.","수분 함량이 많다.","가라앉기 쉽다."],a:1,e:"오버베이킹 : 낮은온도에서 구워서 수분손실이잇고 노화가빠름 언더베이킹 : 높은온도에서 구워서 중심부가 부푸러 갈라짐",r:99,c:"manufacturing"},
{q:"다음 중 일반적으로 초콜릿에 사용되는 원료가 아닌 것은?",o:["카카오버터","전지분유","이스트","레시틴"],a:2,e:"이스트는 빵을 부풀리기 위해 사용!",r:99,c:"ingredients"},
{q:"다음 중 달걀노른자를 사용하지 않는 케이크는?",o:["파운드케이크","엔젤푸드케이크","소프트 롤케이크","옐로 레이어케이크"],a:1,e:"엔젤 푸드 케이크는 하얀색이 특징입니다. 따라서 노란색인 노른자는 사용하지 않죠",r:99,c:"manufacturing"},
{q:"다음 중 제과용 믹서로 적합하지 않은 것은?",o:["에어믹서","버티컬믹서","연속식 믹서","스파이럴믹서"],a:3,e:"스파이럴 제빵용믹서",r:99,c:"manufacturing"},
{q:"반죽무게를 구하는 식은?",o:["틀부피×비용적","틀부피＋비용적","틀부피÷비용적","틀부피－비용적"],a:2,e:"비용적(specific volume)은 단위 무게당 부피(mL/g)이다. 따라서 반죽무게 = 틀부피 ÷ 비용적이 올바른 공식이다.",r:87,c:"ingredients"},
{q:"다음의 케이크 반죽 중 일반적으로 PH가 가장 낮은 것은?",o:["스펀지 케이크","엔젤 푸드케이크","파운드 케이크","데블스 푸드케이크"],a:1,e:"제품의 PH 1.스펀지케이크 7.3~7.6 2.엔젤푸드케이크 5.2~6.0 3.파운드케이크 6.6~7.1 4.데블스푸드케이크 8.5~9.2",r:99,c:"manufacturing"},
{q:"화이트 레이어 케이크 제조 시 주석산 크림을 사용하는 목적과 거리가 먼 것은?",o:["흰자를 강하게 하기 위하여","껍질색을 밝게 하기 위하여","속색을 하얗게 하기 위하여","제품의 색깔을 진하게 하기 위하여"],a:3,e:"색깔이 진한이유는 오븐 온도 때문!!",r:99,c:"ingredients"},
{q:"다음 제품 중 일반적으로 비중이 가장 낮은 것은?",o:["파운드케이크","레이어 케이크","스펀지케이크","과일케이크"],a:2,e:"숫자가 적을수록 공기가 많이 들어갔다. 1. 파운드 케이크 : 비중 0.75 전후 2. 레이어 케이크 : 비중 0.85 전후 3. 스펀지 케이크 : 비중 0.55 전후 4 과일 케이크 : 비중 0.80 전후 거품형 반죽 케이크가 비중이 낮다. 5. 롤 케이크 : 비중 0.40 ~ 0.45 6. 시폰 케이크 : 비중 0.45 ~ 0.50 ",r:99,c:"manufacturing"},
{q:"팬 오일의 구비조건이 아닌 것은?",o:["높은 발연점","무색, 무미, 무취","가소성","항산화성"],a:2,e:"팬 오일의 구비조건 1. 산패에 강할것 2. 반죽 무게의 0.1~0.2%를 사용할것 3. 발연점이 210도 이상될것 4. 무색 무취 무미일것",r:99,c:"ingredients"},
{q:"둥글리기의 목적이 아닌 것은?",o:["글루텐의 구조와 방향정돈","수분 흡수력 증가","반죽의 기공을 고르게 유지","반죽 표면에 얇은 막 형성"],a:1,e:"둥글리기 목적 1. 절단면의 점착성 감소 2. 표피를 형성하여 탄력 유지 3. 가스보유력 유지 4. 글루텐 구조정돈 5. 반죽의 기공을 고르게 유지",r:99,c:"ingredients"},
{q:"굽기 과정 중 당류의 캐러멜화가 개시되는 온도로 가장 적합한 것은?",o:["100℃","120℃","150℃","185℃"],a:2,e:"캐러맬화 반응:설탕 성분이 높은 온도(160~180도)에서 껍질이 갈색으로 변하는 반응 제빵",r:99,c:"ingredients"},
{q:"냉동 반죽법에 대한 설명 중 틀린 것은?",o:["저율배합 제품은 냉동시 노화의 진행이 비교적 빠르다","고율배합 제품은 비교적 완만한 냉동에 견딘다.","저율배합 제품일수록 냉동 처리에 더욱 주의해야 한다.","프랑스빵 반죽은 비교적 노화의 진행이 느리다"],a:3,e:"프랑스 하면 바게트 바게트하면 금방 딱딱(노화)해짐!!!!",r:99,c:"manufacturing"},
{q:"식빵 제조시 최고 부피를 얻을 수 있는 유지의 양은?",o:["2%","4%","8%","12%"],a:1,e:"식빵 제조 시 최고 부피를 얻을 수 있는 유지의 양은 밀가루 대비 약 4%이다. 유지가 글루텐을 윤활하고 가스 보유력을 높여 부피를 증가시킨다.",r:90,v:0,c:"manufacturing"},
{q:"빵을 포장하는 프로필렌 포장지의 기능이 아닌 것은?",o:["수분증발의 억제로 노화지연","빵의 풍미 성분 손실 지연","포장 후 미생물 오염 최소화","빵의 로프균 오염방지"],a:3,e:"프로필렌 포장지는 수분증발 억제, 풍미 손실 지연, 미생물 오염 최소화 기능이 있다. 로프균(rope) 오염은 포장 전에 이미 발생하는 것으로 포장지로 방지할 수 없다.",r:93,c:"manufacturing"},
{q:"불란서빵의 2차 발효실 습도로 가장 적합한 것은?",o:["65~70%","75~80%","80~85%","85~90%"],a:1,e:"불란서빵=바게트 하스브레드류(바게트,하드롤 등): 75~80% 일반적인 조건: 85~90% 식빵, 단과자: 85~90% 도넛류: 75%",r:99,c:"manufacturing"},
{q:"희망 반죽온도 26℃ 마찰계수 20 실내온도 26℃ 스펀지 반죽온도 28℃ 밀가루온도 21℃ 일 때 스펀지법에서 사용할 물의 온도는?",o:["11℃","8℃","7℃","9℃"],a:3,e:"스편지법에서 사용할 물의 온도= 희망온도(26)*4-(밀가루온도21+실내온도26+마찰계수20+스펀지반죽온도28) 답은 104-95=9",r:99,c:"manufacturing"},
{q:"빵 제품의 노화 지연 방법으로 옳은 것은?",o:["-18℃냉동보관","냉장보관","저배합, 고속 믹싱 빵제조","수분 30~60% 유지"],a:0,e:"-18℃ 이하 냉동보관은 빵 노화를 효과적으로 지연시킨다. 냉장(0~10℃)은 오히려 노화를 촉진하고, 수분 30~60%는 노화가 잘 일어나는 조건이다.",r:85,c:"manufacturing"},
{q:"대량생산 공장에서 많이 사용되는 오븐으로 반죽이 들어가는 입구와 제품이 나오는 출구가 서로 다른 오븐은?",o:["데크오븐","터널오븐","로터리 래크 오븐","컨벡션오븐"],a:1,e:"터널 오븐은 입구와 출구가 서로 달라 연속 생산이 가능하여 대량생산 공장에서 많이 사용된다.",r:77,c:"manufacturing"},
{q:"스펀지 도법에 있어서 스펀지 반죽에 사용하는 일반적인 밀가루의 사용 범위는?",o:["0~20%","20~40%","40~60%","60~100%"],a:3,e:"스펀지 도법에서 스펀지 반죽에 사용하는 밀가루의 일반적인 범위는 전체의 60~100%이다. 통상 60~70%를 사용하며, 나머지 밀가루는 본반죽(도) 단계에서 추가한다.",r:93,c:"ingredients"},
{q:"다음 중 스트레이트법과 비교한 스펀지 도법에 대한 설명이 옳은 것은?",o:["노화가 빠르다.","발효 내구성이 좋다.","속결이 거칠고 부피가 작다.","발효향과 맛이 나쁘다."],a:1,e:"장점: 작업공정에 대한 융통성이 있어 잘못된 공정을 수정할 기회가 있음, 풍부한 발효향, 노화가 지연되어 저장성이 좋음, 빵의 부피가 크고 속 결이 부드러움 단점: 시설과 공간이 필요히므로 경비가 증가됨, 산미나 산취가 강함, 공정시간이 길어 노동력이 많이 듦, 발효손실의 증가",r:99,c:"manufacturing"},
{q:"발효 중 펀치의 효과와 거리가 먼 것은?",o:["반죽의 온도를 균일하게 한다.","이스트의 활성을 돕는다.","산소공급으로 반죽의 산화숙성을 진전시킨다.","성형을 용이하게 한다."],a:3,e:"펀치를 하는 이유 1. 반죽에 산소 공급 2. 이스트의 활성과 산화, 숙성촉진 3. 반죽온도 균일 4. 발효촉진",r:99,c:"manufacturing"},
{q:"제조공정상 비상반죽법에서 가장 많은 시간을 단축할 수 있는 공정은?",o:["재료계량","믹싱","1차 발효","굽기"],a:2,e:"생이스트를 2배 증가 시키고 반죽온도도 30도로 증가시켜서 일반적인방법보다 발효속도가 빠르다",r:99,c:"manufacturing"},
{q:"모닝빵을 1000개 만드는데 한 사람이 3시간 걸렸다. 1500개 만드는데 30분 내에 끝내려면 몇 사람이 작업해야 하는가?",o:["2명","3명","9명","5명"],a:2,e:"한사람이 필요시간에 작업할수있는 수량 =(1,000개 ÷ 180분)×30분=167(166.66) 필요 인원 1,500개 ÷ 167=9명(8.98)",r:99,c:"management"},
{q:"시유의 수분함량은 약 얼마인가?",o:["12%","78%","87%","95%"],a:2,e:"수분 88%(비중 1.032), 고형물 12%(이중 단백질이 3.4%이며 그 중 카세인을 많이 함유하고 있음. 탄수화물의 주성분은 유당, 지방 외 비중 0.93)",r:99,c:"ingredients"},
{q:"다음 중 발효시간을 단축시키는 물은?",o:["연수","경수","염수","알칼리수"],a:0,e:"연수는 미네랄 함량이 낮아 이스트의 삼투압 부담이 적고 반죽을 부드럽게 하여 발효가 빠르게 진행된다. 반면 경수는 미네랄이 글루텐을 강화하여 발효를 다소 지연시킬 수 있다.",r:82,c:"ingredients"},
{q:"비중이 1.04인 우유에 비중이 1.00인 물을 1:1 부피로 혼합하였을 때 물을 섞은 우유의 비중은?",o:["2.04","1.02","1.04","0.04"],a:1,e:"두 액체를 동일 부피로 혼합했을 때 혼합 비중은 두 비중의 산술평균으로 계산합니다. 비중 1.04인 우유와 비중 1.00인 물을 1:1로 혼합하면 (1.04 + 1.00) ÷ 2 = 1.02가 됩니다.",r:99,c:"manufacturing"},
{q:"카제인이 산이나 효소에 의하여 응고되는 성질은 어떤 식품의 제조에 이용되는가?",o:["아이스크림","생크림","버터","치즈"],a:3,e:"카제인이 산이나 레닌(효소)에 의해 응고되는 성질은 치즈 제조에 이용된다. 아이스크림, 생크림, 버터는 카제인 응고를 이용하지 않는다.",r:90,c:"ingredients"},
{q:"이스트의 가스 생산과 보유를 고려할 때 제빵에 가장 좋은 물의 경도는?",o:["0~60 ppm","120~180ppm","180ppm이상(일시)","180ppm이상(영구)"],a:1,e:"이스트의 가스 생산과 보유를 고려할 때 제빵에 가장 좋은 물의 경도는 120~180ppm이다. 적절한 경도가 글루텐을 강화하고 이스트 영양분을 공급한다.",r:93,c:"ingredients"},
{q:"분당은 저장 중 응고되기 쉬운데 이를 방지하기 위하여 어떤 재료를 첨가하는가?",o:["소금","설탕","글리세린","전분"],a:3,e:"분당을 실온에 방치하면 수분을 흡수하여 덩어리가 되므로 전분 3%를 첨가하여 이를 방지한다.",r:99,c:"ingredients"},
{q:"전분은 밀가루 중량의 약 몇 % 정도인가?",o:["30%","50%","70%","90%"],a:2,e:"전분은 밀가루 중량의 약 70% 정도를 차지한다. 나머지는 단백질(8~14%), 수분(12~14%), 지방, 회분 등으로 구성된다.",r:95,c:"ingredients"},
{q:"일반적인 버터의 수분 함량은?",o:["18%이하","25%이하","30%이하","45%이하"],a:0,e:"버터의 수분함량은 16% 내외이다.",r:99,c:"ingredients"},
{q:"밀가루의 물성을 전문적으로 시험하는 기기로 이루어진 것은?",o:["패리노그래프, 가스크로마토그래피, 익스텐소그래프","패리노그래프, 아밀로그래프, 파이브로미터","패리노그래프, 아밀로그래프, 익스텐소그래프","아밀로그래프, 익스텐소그래프, 펑츄어 테스터"],a:2,e:"패리노그래프 : 밀가루 흡수율 측정 아밀로그래프 : a-아밀라아제 효과 측정 익스텐소그래프 : 밀가루 개량제 효과 측정",r:99,c:"ingredients"},
{q:"제과에 많이 쓰이는 럼주의 원료는?",o:["옥수수 전분","포도당","당밀","타피오카"],a:2,e:"럼주(Rum)는 당밀(사탕수수 부산물)을 원료로 발효·증류하여 만든 술이다. 제과에서 향료로 많이 사용된다.",r:90,c:"ingredients"},
{q:"케이크 제조에 사용되는 달걀의 역할이 아닌 것은?",o:["결합제 역할","글루텐 형성작용","유화력 보유","팽창 작용"],a:1,e:"달걀은 케이크에서 결합제, 유화력, 팽창 작용의 역할을 한다. 글루텐 형성은 밀가루 단백질의 기능이지 달걀의 역할이 아니다.",r:93,c:"ingredients"},
{q:"다음 중 반죽의 PH가 가장 낮아야 좋은 것은?",o:["레이어 케이크","스펀지 케이크","파운드 케이크","과일 케이크"],a:3,e:"제품별 ph 옐로레이어케이크 7.2~7.6 스펀지케이크 7.3~7.6 파운드 케이크 6.6~7.1 과일케이크 4.4~5.0",r:99,c:"manufacturing"},
{q:"빵 제조시 밀가루를 체로 치는 이유가 아닌 것은?",o:["제품의 착색","입자의 균질","공기의 혼입","불순물의 제거"],a:0,e:"-가루재료를 체로 치는 이유- 1. 불순물 제거 2. 공기를 혼입시켜 이스트의 활성을 촉진 3. 고른 분산 4. 밀가루 15% 부피 증가 5. 흡수율 증가 6. 공기를 혼입시켜 반죽의 산화를 촉진",r:99,c:"ingredients"},
{q:"이스트푸드 성분 중 물 조절제로 사용되는 것은?",o:["황산암모늄","전분","칼슘염","이스트"],a:2,e:"이스트푸드 성분 중 물조절제로 사용되는 것 : 황산칼슘,인산칼슘,과산화칼슘",r:99,c:"ingredients"},
{q:"열대성 다년초의 다육질 뿌리로, 매운맛과 특유의 방향을 가지고 있는 향신료는?",o:["넛메그","계피","올스파이스","생강"],a:3,e:"생강은 열대성 다년초의 다육질 뿌리로, 매운맛(진저롤)과 특유의 방향을 가진 향신료이다. 넛메그는 육두구 씨앗, 계피는 나무껍질, 올스파이스는 열매이다.",r:90,c:"ingredients"},
{q:"빵, 과자 속에 함유되어 있는 지방이 리파아제에 의해 소화되면 무엇으로 분해되는가?",o:["동물성지방＋식물성지방","글리세롤＋지방산","포도당＋과당","트립토판＋리신"],a:1,e:"지방이 리파아제에 의해 소화되면 글리세롤과 지방산으로 분해된다. 지방은 트리글리세라이드(글리세롤 + 지방산 3개)로 구성되어 있다.",r:85,c:"ingredients"},
{q:"다음 중 감미가 가장 강한 것은?",o:["맥아당","설탕","과당","포도당"],a:2,e:"감미도순 : 과당> 전화당> 설탕> 포도당> 맥아당> 갈락토오스> 유당",r:99,c:"ingredients"},
{q:"유아에게 필요한 필수 아미노산이 아닌 것은?",o:["발린","트립토판","히스티딘","글루타민"],a:3,e:"유아에게 필요한 필수 아미노산 :리신 류신 이소류신 트레오닌 트립토판 발린 메티오닌 페닐알라닌 히스티딘 알기닌",r:99,c:"nutrition"},
{q:"시금치에 들어 있으며 칼슘의 흡수를 방해하는 유기산은?",o:["초산","호박산","수산","구연산"],a:2,e:"수산(옥살산)은 시금치에 많이 들어있으며, 칼슘과 결합하여 불용성 수산칼슘을 형성해 칼슘 흡수를 방해한다.",r:82,c:"nutrition"},
{q:"순수한 지방 20g이 내는 열량은?",o:["80kcal","140kcal","180kcal","200kcal"],a:2,e:"지방 1g=9kcalX20g=180kcal 제빵",r:99,c:"nutrition"},
{q:"정제가 불충분한 면실유에 들어 있을 수 있는 독성분은?",o:["듀린","테무린","고시폴","브렉큰 펀 톡신"],a:2,e:"감염형세균성식중독: 살모넬라, 장염비브리오, 병원성대장균 독소형세균성식중독: 월치스, 보튤리누스, 포도상구균 자연독: 복어(테트로도톡신), 조개(베네루핀), 섭조개(삭시토신),독버섯(무스카린), 감자(솔라닌), 면실유(고시폴)",r:99,c:"manufacturing"},
{q:"제1군 감염병으로 소화기계 감염병인 것은?",o:["결핵","화농성 피부염","장티푸스","독감"],a:2,e:"장티푸스는 제1군 감염병으로 소화기계를 통해 전파되는 감염병이다. 결핵은 호흡기 감염병, 화농성 피부염은 접촉 감염, 독감은 호흡기 감염병이다.",r:93,v:0,c:"hygiene"},
{q:"다음 중 바이러스에 의한 경구감염병이 아닌 것은?",o:["폴리오","유행성 간염","전염성 설사","성홍열"],a:3,e:"바이러스형: 폴리오(소아마비), 유행성간염, 전염성설사",r:99,c:"hygiene"},
{q:"빵이나 카스테라 등을 부풀게 하기 위하여 첨가하는 합성 팽창제 (baking powder) 의 주성분은?",o:["염화나트륨","탄산나트륨","탄산수소나트륨","탄산칼슘"],a:2,e:"합성 팽창제(베이킹파우더)의 주성분은 탄산수소나트륨(중조, NaHCO₃)이다. 열이나 산과 반응하여 CO₂ 가스를 발생시켜 반죽을 부풀린다.",r:93,c:"ingredients"},
{q:"세균성 식중독의 예방원칙에 해당되지 않는 것은?",o:["세균 오염 방지","세균 가열 방지","세균 증식 방지","세균의 사멸"],a:1,e:"세균 가열 방지는 세균성 식중독 예방원칙이 아니다. 예방원칙은 세균 오염 방지(청결), 세균 증식 방지(냉장), 세균 사멸(가열 살균)이다.",r:90,c:"hygiene"},
{q:"식품첨가물 중 보존료의 조건이 아닌 것은?",o:["변패를 일으키는 각종 미생물의 증식을 억제할 것","무미, 무취하고 자극성이 없을 것","식품의 성분과 반응을 잘하여 성분을 변화시킬 것","장기간 효력을 나타낼 것"],a:2,e:"1. 무미,무취,무색으로 식품과 화학반응을 하지 않아야함 2. 독성이 없거나 적어야 함 3. 산,알칼리에 안전해야함 4. 식품의 변질 미생물에 대한 저지 효과가 커야함 5. 사용하기 쉬워야 함 보존료 종류: 프로피온산칼슘,프로피온산나트륨(빵,과자) 안식향산(간장, 청량음료 등) 소르빈산(어육 연제품, 고추장, 팥앙금 등)",r:99,c:"ingredients"},
{q:"식품 또는 식품첨가물을 채취, 제조, 가공, 조리, 저장, 운반 또는 판매하는 직접 종사자들이 정기건강진단을 받아야 하는 주기는?",o:["1회/월","1회/3개월","1회/6개월","1회/년"],a:3,e:"식품 관련 직접 종사자들은 1년에 1회 정기건강진단을 받아야 한다.",r:77,c:"hygiene"},
{q:"곰팡이의 일반적인 특성으로 틀린 것은?",o:["광합성능이 있다.","주로 무성포자에 의해 번식한다.","진핵세포를 가진 다세포 미생물이다.","분류학상 진균류에 속한다."],a:0,e:"균류 중 실 모양의 균사를 형성하며, 식품의 제조와 변질에 관여한다. 건조식품이 온도가 높은 곳에 노출되었거나, 산성에 보관되었거나 일정한 건조도에 달하여 세균의 증식이 저지되었을 때 곰팡이가 발생한다 곰팡이의 종류에는 누룩곰팡이, 푸른곰팡이, 거미줄곰팡이속, 솜털곰팡이속 등이 있으며 누룩 곰팡이 속에는 된장, 간장의 제조에 이용 푸른곰팡이속에는 버터, 통조림, 야채 과실 등의 변패가 되며 거미줄곰팡이 속에는 빵 곰팡이의 원인이된다 (리조푸스속) 솜털곰팡이 속에는 전분의 당화, 치즈 숙성등에 이용되나 과실 등의 변패를 일으키기도 함",r:99,c:"hygiene"},
{q:"부패의 물리학적 판정에 이용되지 않는 것은?",o:["냄새","점도","색 및 전기저항","탄성"],a:0,e:"부패는 단백질 식품이 혐기성 미생물에 의해 분해되어 저분자의 물질로 변화되는 현상 부패세균에는 어위니아균, 슈도모나스균, 고초균이 있다.",r:99,c:"hygiene"},
{q:"다음 중 감염형 세균성 식중독에 속하는 것은?",o:["파라티푸스균","보툴리누스균","포도상구균","장염비브리오균"],a:3,e:"감염성 살모넬라,장염비브리오,병원성대장균 독소형 웰치균, 보툴리누스, 포도상구균 제빵",r:99,c:"hygiene"}]},
{title:"2011년 4회",desc:undefined,questions:[{q:"도넛 제조 시 수분이 적을 때 나타나는 결점이 아닌 것은?",o:["팽창이 부족하다.","혹이 튀어나온다.","형태가 일정하지 않다.","표면이 갈라진다."],a:1,e:"도넛제조시 수분이 적을때 나타나는 현상 1. 팽창부족 2. 형태 불균일 3. 딱딱한내부 4. 표면의 요철 5. 표면갈라짐 6. 톱지모양의 외피 7. 강한점도 [추가 해설] 도넛 제조 시 수분이 많으면 완제품에 \"혹\" 모양이 돌출한다.",r:99,c:"manufacturing"},
{q:"파운드케이크의 팬닝은 틀 높이의 몇 % 정도까지 반죽을 채우는 것이 가장 적당한가?",o:["50%","70%","90%","100%"],a:1,e:"파운드케이크: 70% 레이어케이크류: 55~60% 스펀지케이크류: 60% 푸딩: 95% 초콜릿케이크: 55~60% 제빵",r:99,c:"manufacturing"},
{q:"쿠키의 제조 방법에 따른 분류 중 계란흰자와 설탕으로 만든 머랭 쿠키는?",o:["짜서 성형하는 쿠키","밀어 펴서 성형하는 쿠키","프랑스식 쿠키","마카롱 쿠키"],a:3,e:"마카롱은 대표적인 머랭제품이다. 계란과 설탕으로만든다.",r:99,c:"ingredients"},
{q:"구워낸 케이크 제품이 너무 딱딱한 경우 그 원인으로 틀린 것은?",o:["배합비에서 설탕의 비율이 높을 때","밀가루의 단백질 함량이 너무 많을 때","높은 오븐 온도에서 구웠을 때","장시간 굽기 했을 때"],a:0,e:"배합비에서 설탕의 비율이 높아지면 반죽의 글루텐을 연화시켜 제품의 질감을 부드럽게 한다.",r:99,c:"manufacturing"},
{q:"다음 재료들을 동일한 크기의 그릇에 측정하여 중량이 가장 높은 것은?",o:["우유","분유","쇼트닝","분당"],a:0,e:"4가지 재료 중에서 물을 기준으로측정하는 비중값이 가장 큰것이 우유 이므로 중량이 가장 높다.",r:99,c:"ingredients"},
{q:"생산공장시설의 효율적 배치에 대한 설명 중 적합하지 않은 것은?",o:["작업용 바닥면적은 그 장소를 이용하는 사람들의 수에 따라 달라진다.","판매장소와 공장의 면적배분(판매 3 : 공장 1)의 비율로 구성되는 것이 바람직하다.","공장의 소요면적은 주방설비의 설치면적과 기술자의 작업을 위한 공간면적으로 이루어진다.","공장의 모든 업무가 효과적으로 진행되기 위한 기본은 주방의 위치와 규모에 대한 설계이다."],a:1,e:"판매장소와 공장의 면적배분은 2:1이 이상적이다. 제빵",r:99,c:"manufacturing"},
{q:"열원으로 찜(수증기)을 이용했을 때의 주 열전달 방식은?",o:["대류","전도","초음파","복사"],a:0,e:"대류는 열 때문에 유체가 상하로 뒤바뀌며 움직이는 현상이다.",r:99,c:"manufacturing"},
{q:"반죽의 온도가 정상보다 높을 때, 예상되는 결과는?",o:["기공이 밀착된다.","노화가 촉진된다.","표면이 터진다.","부피가 작다."],a:1,e:"반죽 온도가 높을때 .기공이 열린다.조직이 거칠어진다.노화가 빠르다 반죽 온도가 낮을때 .제품의 기공이 조밀.부피가 작아진다.식감이 나쁘다.표면이 거칠고 터진다 제빵",r:99,c:"manufacturing"},
{q:"다음 중 비중이 제일 작은 케이크는?",o:["레이어케이크","파운드케이크","시퐁케이크","버터 스펀지케이크"],a:2,e:"레이어케이크 0.75-0.85 파운드케이크 0.8-0.9 시퐁케이크 0.45-0.5",r:99,c:"manufacturing"},
{q:"다음 중 반죽형 케익에 대한 설명으로 틀린 것은?",o:["밀가루, 계란, 분유 등과 같은 재료에 의해 케이크의 구조가 형성된다.","유지의 공기 포집력, 화학적 팽창제에 의해 부피가 팽창하기 때문에 부드럽다.","레이어 케이크, 파운드케이크, 마들렌 등이 반죽형 케익에 해당된다.","제품의 특징은 해면성(海面性)이 크고 가볍다."],a:3,e:"해면성이 크고 가벼우면 거품형 케이크",r:99,c:"ingredients"},
{q:"베이킹파우더(baking powder)에 대한 설명으로 틀린 것은?",o:["소다가 기본이 되고 여기에 산을 첨가하여 중화가를 맞추어 놓은 것이다.","베이킹파우더의 팽창력은 이산화탄소에 의한 것이다.","케익이나 쿠키를 만드는데 많이 사용된다.","과량의 산은 반죽의 ph를 높게, 과량의 중조는 ph를 낮게 만든다."],a:3,e:"과량의 산은 반죽의 ph를 낮게, 과량의 중조는 ph를 높게 만든다.",r:99,c:"ingredients"},
{q:"젤리 롤 케이크 반죽을 만들어 팬닝하는 방법으로 틀린 것은?",o:["넘치는 것을 방지하기 위하여 팬 종이는 팬 높이보다 2cm 정도 높게 한다.","평평하게 팬닝하기 위해 고무주걱 등으로 윗부분을 마무리한다.","기포가 꺼지므로 팬닝은 가능한 빨리 한다.","철판에 팬닝하고 보울에 남은 반죽으로 무늬반죽을 만든다."],a:0,e:"팬종이가 팬 높이보다 높으면 높은 만큼 제품의 가장자리에 그림자 현상이 생겨 착색이 여리게 된다.",r:99,c:"manufacturing"},
{q:"젤리 롤 케이크 반죽 굽기에 대한 설명으로 틀린 것은?",o:["두껍게 편 반죽은 낮은 온도에서 굽는다.","구운 후 철판에서 꺼내지 않고 냉각시킨다.","양이 적은 반죽은 높은 온도에서 굽는다.","열이 식으면 압력을 가해 수평을 맞춘다."],a:1,e:"롤 케이크는 구운 후 즉시 팬에서 꺼낸다. 완제품이 찐득거리는 것, 수축하는 것, 말기 시 표면이 터지는 것을 방지할 수 있다.",r:99,c:"manufacturing"},
{q:"도넛을 글레이즈 할 때 글레이즈의 적정한 품온은?",o:["24 ~27℃","28~32℃","33~36 ℃","43~49℃"],a:3,e:"ㄷ글레이즈란 과자류 표면에 광택을 내는 일 또는 표면이 마르지 않도록 젤라틴, 젤리, 시럽, 퐁당, 초콜릿 등을 바르는 일과 이런 모든 재료를 총칭하며 사용범위가 43~50℃로 넗다.",r:99,c:"manufacturing"},
{q:"다음 중 케이크 제품의 부피 변화에 대한 설명이 틀린 것은?",o:["계란은 혼합 중 공기를 보유하는 능력을 가지고 있으므로 계란이 부족한 반죽은 부피가 줄어든다.","크림법으로 만드는 반죽에 사용하는 유지의 크림성이 나쁘면 부피가 작아진다.","오븐 온도가 높으면 껍질 형성이 빨라 팽창에 제한을 받아 부피가 작아진다.","오븐 온도가 높으면 지나친 수분의 손실로 최종 부피가 커진다."],a:3,e:"오븐 온도가 높으면 제품 내에 잔유수분함량이 많아 주저앉기 쉽다.",r:99,c:"manufacturing"},
{q:"다음 무게에 관한 것 중 옳은 것은?",o:["1kg은 10g 이다.","1kg은 100g 이다.","1kg은1000g 이다.","1kg은 10000g 이다"],a:2,e:"1kg의 \"k\" + 10^3을 뜻한다 1kg = 1*10^3 =1000[g]",r:99,c:"manufacturing"},
{q:"빵과자 배합표의 자료 활용법으로 적당하지 않은 것은?",o:["빵의 생산기준 자료","재료 사용량 파악 자료","원가 산출","국가별 빵의 종류 파악 자료"],a:3,e:"국가별 정보는 필요로 하지 않는다.",r:99,c:"management"},
{q:"빵을 구웠을 때 갈변이 되는 것은 어떤 반응에 의한 것인가?",o:["비타민 C의 산화에 의하여","효모에 의한 갈색반응에 의하여","마이야르(maillard) 반응과 캐러멜화 반응이 동시에 일어나서","클로로필(chlorophyll)이 열에 의해 변성되어서"],a:2,e:"- 마이야르반응은 환원당과 아미노산이 결합하여 일어나는 반응 - 캐러멜화 반응은 설탕 성분이 갈변하는 반응",r:99,c:"nutrition"},
{q:"제빵 시 적절한 2차 발효점은 완제품 용적의 몇 %가 가장 적당한가?",o:["40 ~ 45%","50 ~ 55%","70 ~ 80%","90 ~ 95%"],a:2,e:"2차 발효 :성형과정을 거치는 동안 불완전한 상태의 반죽을 온도 38도 전후,습도 80%전후의 발효실에 넣어 숙성시켜 좋은 외형과 식감의 제품을 얻기 위하여 제품 부피의 70~80%까지 부풀리는 작업으로 발효의 최종 단계이다.",r:99,c:"manufacturing"},
{q:"냉동 반죽법에서 혼합 후 반죽의 결과온도로 가장 적합한 것은?",o:["0℃","10℃","20℃","30℃"],a:2,e:"냉동반죽법의 반죽온도는 반죽의 글루텐 생성과 발전능력, 급속냉동 시 냉해에 대한 피해방지를 고려하여 설정",r:99,c:"manufacturing"},
{q:"다음 발효 중 일어나는 생화학적 생성 물질이 아닌 것은?",o:["덱스트린","맥아당","포도당","이성화당"],a:3,e:"이성화당은 전분을 가수분해해서 얻어진 포도당액 효소를 알칼리 처리해서 만들어진 전분당이다.",r:99,c:"ingredients"},
{q:"오븐에서 구운 빵을 냉각할 때 평균 몇 %의 수분 손실이 추가적으로 발생하는가?",o:["2%","4%","6%","8%"],a:0,e:"빵이 구워진 후 냉각하는 과정에서 내부의 수분이 증발하게 되며, 이때 약 2%의 수분이 손실됩니다. 이는 빵의 질감과 맛을 유지하는 데 중요한 요소로 작용합니다.",r:99,c:"manufacturing"},
